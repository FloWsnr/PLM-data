preset: wave
parameters:
  channel_height:
    sample: uniform
    min: 0.92
    max: 1.08
  damping:
    sample: uniform
    min: 0.005
    max: 0.016
  wall_absorption:
    sample: uniform
    min: 0.28
    max: 0.65
coefficients:
  c_sq:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.98
        max: 1.18
      value_right:
        sample: uniform
        min: 1.62
        max: 2.08
      x_split:
        sample: uniform
        min: 0.96
        max: 1.2
      axis: 0
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 2.1
    max: 2.36
  height: "param:channel_height"
  obstacle_center:
    - sample: uniform
      min: 1.0
      max: 1.18
    - sample: uniform
      min: 0.4
      max: 0.6
  obstacle_radius:
    sample: uniform
    min: 0.11
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.024
time:
  dt: 0.0038
  t_end: 1.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 1.55
          max: 2.35
        value_right:
          sample: uniform
          min: -0.25
          max: 0.08
        x_split:
          sample: uniform
          min: 0.22
          max: 0.36
        axis: 0
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
    obstacle:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [256, 128]
  num_frames: 61
seed: 42
