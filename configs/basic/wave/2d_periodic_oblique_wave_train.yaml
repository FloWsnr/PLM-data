preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.001
    max: 0.008
coefficients:
  c_sq:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.3
        max: 1.8
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [128, 128]
time:
  dt: 0.004
  t_end: 1.6
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 1.6
            max: 2.5
          cycles:
          - sample: uniform
            min: 1.6
            max: 2.6
          - 0.0
          phase:
            sample: uniform
            min: -0.5
            max: 0.5
          angle:
            sample: uniform
            min: 0.32
            max: 0.96
        - amplitude:
            sample: uniform
            min: -0.9
            max: -0.35
          cycles:
          - sample: uniform
            min: 3.0
            max: 4.4
          - 0.0
          phase:
            sample: uniform
            min: 0.7
            max: 1.5
          angle:
            sample: uniform
            min: -0.18
            max: 0.22
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 61
seed: 42
