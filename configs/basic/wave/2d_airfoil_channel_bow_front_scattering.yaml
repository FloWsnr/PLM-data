preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.0035
    max: 0.011
coefficients:
  c_sq:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.96
        max: 1.12
      value_right:
        sample: uniform
        min: 1.48
        max: 1.92
      x_split:
        sample: uniform
        min: 1.0
        max: 1.34
      axis: 0
domain:
  allow_sampling: true
  type: airfoil_channel
  length:
    sample: uniform
    min: 2.4
    max: 2.8
  height:
    sample: uniform
    min: 1.0
    max: 1.15
  airfoil_center:
    - sample: uniform
      min: 1.05
      max: 1.35
    - sample: uniform
      min: 0.48
      max: 0.66
  chord_length:
    sample: uniform
    min: 0.52
    max: 0.64
  thickness_ratio:
    sample: uniform
    min: 0.1
    max: 0.16
  attack_angle_degrees:
    sample: uniform
    min: -10.0
    max: 10.0
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0038
  t_end: 1.35
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 1.35
          max: 2.15
        value_right:
          sample: uniform
          min: -0.25
          max: 0.05
        x_split:
          sample: uniform
          min: 0.32
          max: 0.48
        axis: 0
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    airfoil:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [224, 128]
  num_frames: 57
seed: 42
