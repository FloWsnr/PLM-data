preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.002
    max: 0.01
coefficients:
  c_sq:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.96
        max: 1.12
      x:
        sample: uniform
        min: -0.18
        max: 0.18
      y:
        sample: uniform
        min: -0.18
        max: 0.18
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [144, 144]
time:
  dt: 0.004
  t_end: 1.5
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.75
            max: 1.0
          cycles: [1, 1]
          phase: 0.0
        - amplitude:
            sample: uniform
            min: -0.42
            max: -0.22
          cycles: [2, 1]
          phase: 0.0
        - amplitude:
            sample: uniform
            min: -0.18
            max: 0.18
          cycles: [1, 3]
          phase: 0.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.14
            max: 0.3
          cycles: [1, 2]
          phase: 0.0
        - amplitude:
            sample: uniform
            min: -0.14
            max: 0.14
          cycles: [2, 2]
          phase: 0.0
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [144, 144]
  num_frames: 61
seed: 42
