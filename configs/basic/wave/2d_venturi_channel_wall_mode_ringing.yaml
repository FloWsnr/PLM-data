preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.01
    max: 0.028
  wall_absorption:
    sample: uniform
    min: 0.42
    max: 0.8
  outlet_absorption:
    sample: uniform
    min: 0.28
    max: 0.58
coefficients:
  c_sq:
    type: sine_waves
    params:
      background:
        sample: uniform
        min: 1.0
        max: 1.18
      modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.14
          cycles: [0.0, 2.0]
          phase:
            sample: uniform
            min: -0.4
            max: 0.4
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.08
          cycles: [1.0, 0.0]
          phase:
            sample: uniform
            min: 0.3
            max: 1.1
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.94
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.32
    max: 0.44
  constriction_center_x:
    sample: uniform
    min: 0.96
    max: 1.14
  constriction_radius:
    sample: uniform
    min: 0.44
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0036
  t_end: 1.55
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 1.25
              max: 1.9
            cycles: [0.6, 2.0]
            phase:
              sample: uniform
              min: -0.2
              max: 0.2
          - amplitude:
              sample: uniform
              min: -0.72
              max: -0.32
            cycles: [1.4, 0.0]
            phase:
              sample: uniform
              min: 0.0
              max: 1.0
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.42
            cycles: [0.0, 3.0]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:outlet_absorption"
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [224, 128]
  num_frames: 61
seed: 42
