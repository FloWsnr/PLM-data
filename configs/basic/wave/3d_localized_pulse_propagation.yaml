preset: wave
parameters:
  damping: 0.002
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base: 1.8
      amplitude: 0.75
      frequency: 10.0
      center:
      - 0.5
      - 0.5
      - 0.5
domain:
  type: box
  size:
  - 1.0
  - 1.0
  - 1.0
  mesh_resolution:
  - 20
  - 20
  - 20
time:
  dt: 0.006
  t_end: 0.6
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 11.9
            max: 16.1
          sigma:
            sample: uniform
            min: 0.035
            max: 0.075
          center:
          - sample: uniform
            min: 0.4175
            max: 0.5825
          - sample: uniform
            min: 0.4175
            max: 0.5825
          - sample: uniform
            min: 0.4175
            max: 0.5825
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution:
  - 32
  - 32
  - 32
  num_frames: 18
seed: 42
