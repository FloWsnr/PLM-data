preset: wave
parameters:
  airfoil_center_x:
    sample: uniform
    min: 1.05
    max: 1.35
  airfoil_center_y:
    sample: uniform
    min: 0.48
    max: 0.66
  damping:
    sample: uniform
    min: 0.01
    max: 0.028
  outlet_absorption:
    sample: uniform
    min: 0.25
    max: 0.5
  wall_absorption:
    sample: uniform
    min: 0.28
    max: 0.62
  airfoil_absorption:
    sample: uniform
    min: 0.45
    max: 0.82
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 1.12
        max: 1.34
      amplitude:
        sample: uniform
        min: 0.12
        max: 0.24
      frequency:
        sample: uniform
        min: 6.0
        max: 10.0
      center: ["param:airfoil_center_x", "param:airfoil_center_y"]
domain:
  allow_sampling: true
  type: airfoil_channel
  length:
    sample: uniform
    min: 2.4
    max: 2.8
  height:
    sample: uniform
    min: 1.0
    max: 1.15
  airfoil_center: ["param:airfoil_center_x", "param:airfoil_center_y"]
  chord_length:
    sample: uniform
    min: 0.52
    max: 0.64
  thickness_ratio:
    sample: uniform
    min: 0.1
    max: 0.16
  attack_angle_degrees:
    sample: uniform
    min: -10.0
    max: 10.0
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0038
  t_end: 1.6
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 1.3
              max: 1.9
            cycles: [0.8, 2.0]
            phase:
              sample: uniform
              min: -0.2
              max: 0.2
          - amplitude:
              sample: uniform
              min: -0.7
              max: -0.3
            cycles: [1.4, 0.0]
            phase:
              sample: uniform
              min: 0.0
              max: 1.0
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.38
            cycles: [0.0, 3.0]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:outlet_absorption"
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
    airfoil:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:airfoil_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [224, 128]
  num_frames: 61
seed: 42
