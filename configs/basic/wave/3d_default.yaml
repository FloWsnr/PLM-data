preset: wave
parameters:
  damping: 0.01
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base: 1.8
      amplitude: 0.55
      frequency: 16.0
      center: [0.5, 0.5, 0.5]
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [16, 16, 16]
time:
  dt: 0.01
  t_end: 0.25
inputs:
  u:
    initial_condition:
      type: zero
      params: {}
  v:
    initial_condition:
      type: gaussian_bump
      params:
        sigma: 0.08
        amplitude: 8.0
        center: [0.3, 0.42, 0.55]
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [24, 24, 24]
  num_frames: 10
seed: 42
