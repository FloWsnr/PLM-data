preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.004
    max: 0.015
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 1.18
        max: 1.5
      amplitude:
        sample: uniform
        min: 0.18
        max: 0.36
      frequency:
        sample: uniform
        min: 7.0
        max: 10.0
      center:
      - sample: uniform
        min: 1.02
        max: 1.22
      - sample: uniform
        min: 0.42
        max: 0.58
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 2.15
    max: 2.35
  height: 1.0
  obstacle_center:
  - sample: uniform
    min: 1.04
    max: 1.18
  - sample: uniform
    min: 0.42
    max: 0.58
  obstacle_radius:
    sample: uniform
    min: 0.11
    max: 0.15
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.024
time:
  dt: 0.004
  t_end: 1.4
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 8.0
            max: 12.0
          sigma:
            sample: uniform
            min: 0.05
            max: 0.085
          aspect_ratio:
            sample: uniform
            min: 1.3
            max: 2.5
          center:
          - sample: uniform
            min: 0.24
            max: 0.46
          - sample: uniform
            min: 0.34
            max: 0.76
        - count: 1
          amplitude:
            sample: uniform
            min: -3.0
            max: -0.8
          sigma:
            sample: uniform
            min: 0.03
            max: 0.055
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 0.46
            max: 0.66
          - sample: uniform
            min: 0.24
            max: 0.76
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: dirichlet
      value: 0.0
    obstacle:
    - operator: dirichlet
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [256, 128]
  num_frames: 61
seed: 42
