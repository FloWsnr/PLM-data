preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.006
    max: 0.02
coefficients:
  c_sq:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.9
        max: 1.12
      value_right:
        sample: uniform
        min: 1.52
        max: 1.92
      x_split:
        sample: uniform
        min: 0.38
        max: 0.5
      axis: 0
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.18
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.18
  cutout_width:
    sample: uniform
    min: 0.32
    max: 0.48
  cutout_height:
    sample: uniform
    min: 0.32
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.0035
  t_end: 1.35
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 8.0
              max: 11.5
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 2.0
            center:
              - sample: uniform
                min: 0.16
                max: 0.34
              - sample: uniform
                min: 0.16
                max: 0.34
          - count: 1
            amplitude:
              sample: uniform
              min: -3.4
              max: -1.4
            sigma:
              sample: uniform
              min: 0.035
              max: 0.055
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: 0.24
                max: 0.48
              - sample: uniform
                min: 0.4
                max: 0.66
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [176, 176]
  num_frames: 57
seed: 42
