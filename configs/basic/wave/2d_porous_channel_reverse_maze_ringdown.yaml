preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.012
    max: 0.03
  inlet_absorption:
    sample: uniform
    min: 0.28
    max: 0.58
  wall_absorption:
    sample: uniform
    min: 0.3
    max: 0.65
coefficients:
  c_sq:
    type: step
    params:
      value_left:
        sample: uniform
        min: 1.58
        max: 1.94
      value_right:
        sample: uniform
        min: 0.9
        max: 1.14
      x_split:
        sample: uniform
        min: 1.2
        max: 1.5
      axis: 0
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.75
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.25
    max: 0.29
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.3
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0038
  t_end: 1.55
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 8.0
              max: 11.0
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 2.0
            center:
              - sample: uniform
                min: 2.04
                max: 2.42
              - sample: uniform
                min: 0.24
                max: 0.76
          - count: 1
            amplitude:
              sample: uniform
              min: -4.4
              max: -1.6
            sigma:
              sample: uniform
              min: 0.03
              max: 0.05
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 1.68
                max: 2.02
              - sample: uniform
                min: 0.28
                max: 0.72
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:inlet_absorption"
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
    obstacles:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [224, 128]
  num_frames: 61
seed: 42
