preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.004
    max: 0.014
coefficients:
  c_sq:
    type: affine
    params:
      constant:
        sample: uniform
        min: 1.16
        max: 1.42
      x:
        sample: uniform
        min: 0.22
        max: 0.48
      y:
        sample: uniform
        min: -0.18
        max: 0.18
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.18
    max: 1.3
  height:
    sample: uniform
    min: 0.88
    max: 0.98
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.36
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.46
          max: 0.64
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.9
          max: 1.0
        - sample: uniform
          min: 0.22
          max: 0.36
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.021
    max: 0.028
time:
  dt: 0.0038
  t_end: 1.35
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 9.0
              max: 12.5
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.3
              max: 2.4
            center:
              - sample: uniform
                min: 0.1
                max: 0.22
              - sample: uniform
                min: 0.22
                max: 0.74
          - count: 1
            amplitude:
              sample: uniform
              min: -4.2
              max: -1.8
            sigma:
              sample: uniform
              min: 0.032
              max: 0.055
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: 0.4
                max: 0.72
              - sample: uniform
                min: 0.24
                max: 0.74
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    holes:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [192, 144]
  num_frames: 57
seed: 42
