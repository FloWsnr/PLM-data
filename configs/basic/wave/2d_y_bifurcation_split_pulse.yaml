preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.004
    max: 0.014
coefficients:
  c_sq:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.98
        max: 1.18
      value_right:
        sample: uniform
        min: 1.46
        max: 1.88
      x_split:
        sample: uniform
        min: 0.72
        max: 0.92
      axis: 0
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.88
    max: 1.06
  branch_length:
    sample: uniform
    min: 0.84
    max: 1.04
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 44.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.25
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.032
time:
  dt: 0.0038
  t_end: 1.4
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 8.5
              max: 11.8
            sigma:
              sample: uniform
              min: 0.06
              max: 0.095
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.24
                max: 0.46
              - sample: uniform
                min: -0.06
                max: 0.06
          - count: 1
            amplitude:
              sample: uniform
              min: -3.0
              max: -1.0
            sigma:
              sample: uniform
              min: 0.035
              max: 0.06
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 0.44
                max: 0.68
              - sample: uniform
                min: -0.08
                max: 0.08
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [192, 144]
  num_frames: 57
seed: 42
