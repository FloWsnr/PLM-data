preset: wave
parameters:
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  damping:
    sample: uniform
    min: 0.01
    max: 0.026
  outlet_absorption:
    sample: uniform
    min: 0.28
    max: 0.58
coefficients:
  c_sq:
    type: sine_waves
    params:
      background:
        sample: uniform
        min: 1.04
        max: 1.22
      modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.14
          cycles: [1.0, 0.0]
          phase:
            sample: uniform
            min: -0.5
            max: 0.5
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.08
          cycles: [0.0, 1.0]
          phase:
            sample: uniform
            min: 0.2
            max: 1.0
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: "param:channel_length"
  lane_spacing: "param:lane_spacing"
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0036
  t_end: 1.8
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 1.2
              max: 1.9
            cycles: [0.8, 1.0]
            phase:
              sample: uniform
              min: -0.2
              max: 0.2
          - amplitude:
              sample: uniform
              min: -0.7
              max: -0.28
            cycles: [1.6, 0.0]
            phase:
              sample: uniform
              min: 0.0
              max: 1.0
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.42
            cycles: [0.0, 2.6]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:outlet_absorption"
    walls:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [160, 224]
  num_frames: 61
seed: 42
