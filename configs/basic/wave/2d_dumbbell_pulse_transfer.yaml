preset: wave
parameters:
  centerline_y:
    sample: uniform
    min: 0.46
    max: 0.54
  damping:
    sample: uniform
    min: 0.008
    max: 0.03
coefficients:
  c_sq:
    type: affine
    params:
      constant:
        sample: uniform
        min: 1.2
        max: 1.45
      x:
        sample: uniform
        min: 0.4
        max: 0.75
      y:
        sample: uniform
        min: -0.16
        max: 0.16
domain:
  type: dumbbell
  allow_sampling: true
  left_center:
  - sample: uniform
    min: 0.26
    max: 0.3
  - "param:centerline_y"
  right_center:
  - sample: uniform
    min: 0.7
    max: 0.74
  - "param:centerline_y"
  lobe_radius:
    sample: uniform
    min: 0.2
    max: 0.24
  neck_width:
    sample: uniform
    min: 0.08
    max: 0.14
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.019
time:
  dt: 0.0035
  t_end: 1.1
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 8.8
            max: 13.0
          sigma:
            sample: uniform
            min: 0.035
            max: 0.06
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.0
          center:
          - sample: uniform
            min: 0.14
            max: 0.31
          - sample: uniform
            min: 0.28
            max: 0.72
        - count: 1
          amplitude:
            sample: uniform
            min: -4.4
            max: -1.8
          sigma:
            sample: uniform
            min: 0.028
            max: 0.05
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.7
          center:
          - sample: uniform
            min: 0.25
            max: 0.38
          - sample: uniform
            min: 0.36
            max: 0.64
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution:
  - 160
  - 160
  num_frames: 45
seed: 42
