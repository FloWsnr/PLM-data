preset: wave
parameters:
  damping: 0.03
coefficients:
  c_sq:
    type: constant
    params:
      value: 4.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [64, 64]
time:
  dt: 0.005
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: zero
      params: {}
  v:
    initial_condition:
      type: gaussian_bump
      params:
        sigma: 0.05
        amplitude: 18.0
        center: [0.32, 0.46]
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    x-:
      - operator: dirichlet
        value: 0.0
    x+:
      - operator: dirichlet
        value: 0.0
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
solver:
  ksp_type: preonly
  pc_type: lu
output:
  resolution: [64, 64]
  num_frames: 31
  formats: [numpy, gif]
  fields:
    u: scalar
    v: scalar
seed: 42
