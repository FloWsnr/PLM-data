preset: wave
parameters:
  damping: 0.01
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base: 1.8
      amplitude: 0.65
      frequency: 18.0
      center: [0.5, 0.5]
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [64, 64]
time:
  dt: 0.004
  t_end: 0.8
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        blobs:
          - amplitude: 12.0
            sigma: 0.06
            center: [0.28, 0.44]
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [64, 64]
  num_frames: 25
seed: 42
