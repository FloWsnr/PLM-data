preset: wave
parameters:
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  damping:
    sample: uniform
    min: 0.008
    max: 0.024
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 1.04
        max: 1.24
      amplitude:
        sample: uniform
        min: 0.1
        max: 0.24
      frequency:
        sample: uniform
        min: 8.0
        max: 14.0
      center:
        - "param:cavity_center_x"
        - sample: uniform
          min: 0.82
          max: 1.08
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.36
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.48
  cavity_center_x: "param:cavity_center_x"
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0038
  t_end: 1.45
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.4
          max: 0.7
        frequency:
          sample: uniform
          min: 10.0
          max: 16.0
        center:
          - "param:cavity_center_x"
          - sample: uniform
            min: 0.84
            max: 1.06
  v:
    initial_condition:
      type: constant
      params:
        value: 0.0
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [192, 144]
  num_frames: 57
seed: 42
