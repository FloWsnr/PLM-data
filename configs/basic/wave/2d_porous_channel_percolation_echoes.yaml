preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.005
    max: 0.016
coefficients:
  c_sq:
    type: affine
    params:
      constant:
        sample: uniform
        min: 1.14
        max: 1.36
      x:
        sample: uniform
        min: 0.22
        max: 0.44
      y:
        sample: uniform
        min: -0.12
        max: 0.12
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.75
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.25
    max: 0.29
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.3
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0038
  t_end: 1.4
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 8.0
              max: 11.4
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.9
            center:
              - sample: uniform
                min: 0.14
                max: 0.28
              - sample: uniform
                min: 0.24
                max: 0.42
          - count: 1
            amplitude:
              sample: uniform
              min: 4.0
              max: 7.0
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: 0.18
                max: 0.34
              - sample: uniform
                min: 0.58
                max: 0.78
          - count: 1
            amplitude:
              sample: uniform
              min: -3.6
              max: -1.2
            sigma:
              sample: uniform
              min: 0.03
              max: 0.05
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 0.4
                max: 0.6
              - sample: uniform
                min: 0.3
                max: 0.7
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacles:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [224, 128]
  num_frames: 57
seed: 42
