preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.004
    max: 0.015
coefficients:
  c_sq:
    type: affine
    params:
      constant:
        sample: uniform
        min: 1.12
        max: 1.38
      y:
        sample: uniform
        min: -0.24
        max: 0.24
domain:
  type: rectangle
  size: [1.6, 1.0]
  mesh_resolution: [192, 128]
time:
  dt: 0.004
  t_end: 1.6
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 7.0
            max: 11.0
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.8
            max: 3.2
          center:
          - sample: uniform
            min: 0.34
            max: 0.66
          - sample: uniform
            min: 0.42
            max: 0.58
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    x-:
    - operator: periodic
      pair_with: x+
    x+:
    - operator: periodic
      pair_with: x-
    y-:
    - operator: dirichlet
      value: 0.0
    y+:
    - operator: dirichlet
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [192, 128]
  num_frames: 61
seed: 42
