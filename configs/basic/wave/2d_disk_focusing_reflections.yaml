preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.004
    max: 0.014
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 1.05
        max: 1.34
      amplitude:
        sample: uniform
        min: 0.16
        max: 0.42
      frequency:
        sample: uniform
        min: 7.0
        max: 11.0
      center:
      - sample: uniform
        min: -0.14
        max: 0.14
      - sample: uniform
        min: -0.14
        max: 0.14
domain:
  type: disk
  allow_sampling: true
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 0.95
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.017
    max: 0.021
time:
  dt: 0.004
  t_end: 1.4
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 7.0
            max: 11.0
          sigma:
            sample: uniform
            min: 0.08
            max: 0.14
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.0
          center:
          - sample: uniform
            min: 0.28
            max: 0.56
          - sample: uniform
            min: -0.28
            max: 0.28
        - count: 1
          amplitude:
            sample: uniform
            min: -3.2
            max: -1.0
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: -0.12
            max: 0.18
          - sample: uniform
            min: -0.18
            max: 0.18
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 51
seed: 42
