preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.003
    max: 0.012
coefficients:
  c_sq:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.85
        max: 1.15
      value_right:
        sample: uniform
        min: 2.0
        max: 2.8
      x_split:
        sample: uniform
        min: 0.52
        max: 0.68
      axis: 0
domain:
  type: rectangle
  size: [1.4, 1.0]
  mesh_resolution: [180, 128]
time:
  dt: 0.004
  t_end: 1.2
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 8.0
            max: 12.0
          sigma:
            sample: uniform
            min: 0.045
            max: 0.075
          aspect_ratio:
            sample: uniform
            min: 1.3
            max: 2.4
          center:
          - sample: uniform
            min: 0.18
            max: 0.32
          - sample: uniform
            min: 0.28
            max: 0.72
        - count: 1
          amplitude:
            sample: uniform
            min: -3.8
            max: -1.4
          sigma:
            sample: uniform
            min: 0.035
            max: 0.055
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: 0.26
            max: 0.42
          - sample: uniform
            min: 0.18
            max: 0.82
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [180, 128]
  num_frames: 51
seed: 42
