preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.004
    max: 0.015
  throat_center_x:
    sample: uniform
    min: 0.95
    max: 1.15
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 1.16
        max: 1.4
      amplitude:
        sample: uniform
        min: 0.12
        max: 0.28
      frequency:
        sample: uniform
        min: 8.0
        max: 12.0
      center:
        - "param:throat_center_x"
        - sample: uniform
          min: 0.42
          max: 0.58
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.48
  constriction_center_x: "param:throat_center_x"
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0035
  t_end: 1.3
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 8.8
              max: 12.0
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.4
              max: 2.6
            center:
              - sample: uniform
                min: 0.28
                max: 0.54
              - sample: uniform
                min: 0.36
                max: 0.64
          - count: 1
            amplitude:
              sample: uniform
              min: -3.8
              max: -1.4
            sigma:
              sample: uniform
              min: 0.03
              max: 0.05
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.76
                max: 1.02
              - sample: uniform
                min: 0.42
                max: 0.58
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [224, 128]
  num_frames: 57
seed: 42
