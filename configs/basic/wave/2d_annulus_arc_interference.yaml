preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.006
    max: 0.018
coefficients:
  c_sq:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.98
        max: 1.24
      amplitude:
        sample: uniform
        min: 0.12
        max: 0.28
      frequency:
        sample: uniform
        min: 6.0
        max: 9.5
      center: [0.0, 0.0]
domain:
  type: annulus
  allow_sampling: true
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.36
  outer_radius:
    sample: uniform
    min: 0.98
    max: 1.12
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.019
time:
  dt: 0.004
  t_end: 1.6
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 6.0
            max: 8.8
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: 0.38
            max: 0.76
          - sample: uniform
            min: 0.38
            max: 0.76
        - count: 1
          amplitude:
            sample: uniform
            min: -7.2
            max: -4.4
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.7
          center:
          - sample: uniform
            min: -0.78
            max: -0.4
          - sample: uniform
            min: -0.74
            max: -0.36
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inner:
    - operator: dirichlet
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 61
seed: 42
