preset: wave
parameters:
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  damping:
    sample: uniform
    min: 0.006
    max: 0.018
coefficients:
  c_sq:
    type: affine
    params:
      constant:
        sample: uniform
        min: 1.12
        max: 1.34
      y:
        sample: uniform
        min: -0.24
        max: 0.24
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: "param:channel_length"
  lane_spacing: "param:lane_spacing"
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0036
  t_end: 1.75
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 8.5
              max: 12.0
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.8
            center:
              - sample: uniform
                min: 0.12
                max: 0.28
              - sample: uniform
                min: -0.06
                max: 0.06
          - count: 1
            amplitude:
              sample: uniform
              min: -3.8
              max: -1.4
            sigma:
              sample: uniform
              min: 0.03
              max: 0.05
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: 0.42
                max: 0.68
              - sample: uniform
                min: 0.26
                max: 0.54
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [160, 224]
  num_frames: 61
seed: 42
