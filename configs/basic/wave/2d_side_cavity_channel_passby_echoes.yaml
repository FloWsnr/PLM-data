preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.006
    max: 0.02
  wall_absorption:
    sample: uniform
    min: 0.35
    max: 0.7
coefficients:
  c_sq:
    type: affine
    params:
      constant:
        sample: uniform
        min: 1.08
        max: 1.3
      x:
        sample: uniform
        min: 0.1
        max: 0.28
      y:
        sample: uniform
        min: -0.12
        max: 0.12
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.36
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.48
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0038
  t_end: 1.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 8.2
              max: 11.2
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 2.0
            center:
              - sample: uniform
                min: 0.3
                max: 0.56
              - sample: uniform
                min: 0.24
                max: 0.42
          - count: 1
            amplitude:
              sample: uniform
              min: 2.6
              max: 5.2
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: 0.98
                max: 1.34
              - sample: uniform
                min: 0.56
                max: 0.88
          - count: 1
            amplitude:
              sample: uniform
              min: -3.6
              max: -1.2
            sigma:
              sample: uniform
              min: 0.03
              max: 0.05
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 0.84
                max: 1.16
              - sample: uniform
                min: 0.54
                max: 0.8
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [192, 144]
  num_frames: 61
seed: 42
