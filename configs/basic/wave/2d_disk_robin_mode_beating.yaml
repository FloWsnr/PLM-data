preset: wave
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  damping:
    sample: uniform
    min: 0.01
    max: 0.026
  wall_absorption:
    sample: uniform
    min: 0.38
    max: 0.78
coefficients:
  c_sq:
    type: sine_waves
    params:
      background:
        sample: uniform
        min: 1.14
        max: 1.32
      modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.16
          cycles: [1.0, 0.0]
          phase:
            sample: uniform
            min: -0.4
            max: 0.4
        - amplitude:
            sample: uniform
            min: -0.12
            max: 0.12
          cycles: [0.0, 1.0]
          phase:
            sample: uniform
            min: 0.2
            max: 1.0
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.08
          cycles: [1.0, 1.0]
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
domain:
  type: disk
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.94
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.02
time:
  dt: 0.0038
  t_end: 1.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 1.6
              max: 2.2
            cycles: [1.0, 1.0]
            phase:
              sample: uniform
              min: -0.2
              max: 0.2
            angle:
              sample: uniform
              min: 0.0
              max: 1.4
          - amplitude:
              sample: uniform
              min: -0.8
              max: -0.35
            cycles: [2.0, 1.0]
            phase:
              sample: uniform
              min: 0.0
              max: 0.9
            angle:
              sample: uniform
              min: 0.0
              max: 1.4
          - amplitude:
              sample: uniform
              min: 0.25
              max: 0.55
            cycles: [1.0, 2.0]
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: 0.0
              max: 1.4
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 57
seed: 42
