preset: wave
parameters:
  damping:
    sample: uniform
    min: 0.012
    max: 0.03
  outer_absorption:
    sample: uniform
    min: 0.45
    max: 0.8
  right_hole_absorption:
    sample: uniform
    min: 0.25
    max: 0.55
coefficients:
  c_sq:
    type: sine_waves
    params:
      background:
        sample: uniform
        min: 1.04
        max: 1.22
      modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.14
          cycles: [1.0, 0.0]
          phase:
            sample: uniform
            min: -0.4
            max: 0.4
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.08
          cycles: [0.0, 2.0]
          phase:
            sample: uniform
            min: 0.2
            max: 1.0
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.18
    max: 1.28
  height:
    sample: uniform
    min: 0.88
    max: 0.96
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.46
          max: 0.62
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 0.88
          max: 0.98
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.029
time:
  dt: 0.0038
  t_end: 1.55
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.5
            max: 0.68
          - sample: uniform
            min: 0.34
            max: 0.48
        region_values:
          "00":
            sample: uniform
            min: 1.1
            max: 1.6
          "01":
            sample: uniform
            min: -0.7
            max: -0.25
          "10":
            sample: uniform
            min: 0.28
            max: 0.72
          "11":
            sample: uniform
            min: -0.95
            max: -0.4
  forcing:
    source:
      type: none
      params: {}
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:outer_absorption"
    holes_left:
      - operator: dirichlet
        value: 0.0
    hole_center:
      - operator: neumann
        value: 0.0
    holes_right:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:right_hole_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [192, 144]
  num_frames: 61
seed: 42
