preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.54
    max: 0.65
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.92
        max: 1.1
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.004
        max: 0.01
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.18
        max: 0.24
      value_right:
        sample: uniform
        min: 0.28
        max: 0.36
      x_split: 0.0
      axis: 1
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.08
  branch_length:
    sample: uniform
    min: 0.86
    max: 1.08
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 44.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0045
  t_end: 0.6
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 1.1
            max: 1.4
          sigma:
            sample: uniform
            min: 0.075
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center:
          - sample: uniform
            min: 0.18
            max: 0.38
          - sample: uniform
            min: -0.06
            max: 0.06
        - count: 1
          amplitude:
            sample: uniform
            min: 0.35
            max: 0.6
          sigma:
            sample: uniform
            min: 0.06
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center:
          - sample: uniform
            min: 0.46
            max: 0.72
          - sample: uniform
            min: 0.06
            max: 0.18
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet_upper:
    - operator: simply_supported
    outlet_lower:
    - operator: simply_supported
    walls:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 192
  - 144
  num_frames: 36
seed: 42
