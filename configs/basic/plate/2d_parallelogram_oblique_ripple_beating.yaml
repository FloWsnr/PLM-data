preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.53
    max: 0.63
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.95
        max: 1.15
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.006
        max: 0.015
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.22
        max: 0.28
      x:
        sample: uniform
        min: -0.04
        max: 0.04
      y:
        sample: uniform
        min: 0.03
        max: 0.07
domain:
  type: parallelogram
  allow_sampling: true
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y:
  - sample: uniform
    min: 0.25
    max: 0.45
  - sample: uniform
    min: 0.9
    max: 1.1
  mesh_resolution:
  - 88
  - 88
time:
  dt: 0.005
  t_end: 1.25
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.13
          cycles:
          - sample: uniform
            min: 1.2
            max: 1.9
          - sample: uniform
            min: 1.8
            max: 2.8
          phase:
            sample: uniform
            min: -0.25
            max: 0.25
          angle:
            sample: uniform
            min: 0.45
            max: 0.85
        - amplitude:
            sample: uniform
            min: 0.03
            max: 0.06
          cycles:
          - sample: uniform
            min: 2.2
            max: 3.4
          - sample: uniform
            min: 0.8
            max: 1.3
          phase:
            sample: uniform
            min: 0.5
            max: 1.2
          angle:
            sample: uniform
            min: -0.1
            max: 0.2
  velocity:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.015
            max: 0.04
          cycles:
          - sample: uniform
            min: 0.8
            max: 1.4
          - sample: uniform
            min: 1.1
            max: 1.8
          phase:
            sample: uniform
            min: -0.4
            max: 0.4
          angle:
            sample: uniform
            min: 0.15
            max: 0.45
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    $ref: boundary_field.scalar.simply_supported_2d
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 160
  - 160
  num_frames: 46
seed: 42
