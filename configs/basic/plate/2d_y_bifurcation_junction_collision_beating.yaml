preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.6
    max: 0.72
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.2
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.008
        max: 0.02
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.18
        max: 0.24
      value_right:
        sample: uniform
        min: 0.28
        max: 0.36
      x_split: 0.0
      axis: 1
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.06
  branch_length:
    sample: uniform
    min: 0.84
    max: 1.02
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.005
  t_end: 0.56
inputs:
  deflection:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.1
            max: 0.16
          sigma:
            sample: uniform
            min: 0.06
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center:
          - sample: uniform
            min: 1.2
            max: 1.5
          - sample: uniform
            min: 0.24
            max: 0.46
        - count: 1
          amplitude:
            sample: uniform
            min: -0.16
            max: -0.1
          sigma:
            sample: uniform
            min: 0.06
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center:
          - sample: uniform
            min: 1.2
            max: 1.5
          - sample: uniform
            min: -0.46
            max: -0.24
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.45
            max: 0.75
          sigma:
            sample: uniform
            min: 0.045
            max: 0.065
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center:
          - sample: uniform
            min: 1.08
            max: 1.36
          - sample: uniform
            min: 0.16
            max: 0.34
        - count: 1
          amplitude:
            sample: uniform
            min: -0.75
            max: -0.45
          sigma:
            sample: uniform
            min: 0.045
            max: 0.065
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center:
          - sample: uniform
            min: 1.08
            max: 1.36
          - sample: uniform
            min: -0.34
            max: -0.16
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet_upper:
    - operator: simply_supported
    outlet_lower:
    - operator: simply_supported
    walls:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 192
  - 144
  num_frames: 34
seed: 42
