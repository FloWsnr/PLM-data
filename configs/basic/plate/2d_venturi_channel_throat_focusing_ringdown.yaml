preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.54
    max: 0.65
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.92
        max: 1.12
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.006
        max: 0.014
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.18
        max: 0.24
      y:
        sample: uniform
        min: 0.03
        max: 0.08
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.32
    max: 0.46
  constriction_center_x:
    sample: uniform
    min: 0.96
    max: 1.16
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0045
  t_end: 1.5
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.75
          max: 1.15
        frequency:
          sample: uniform
          min: 8.0
          max: 12.0
        center:
        - sample: uniform
          min: 0.98
          max: 1.18
        - sample: uniform
          min: 0.44
          max: 0.56
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 54
seed: 42
