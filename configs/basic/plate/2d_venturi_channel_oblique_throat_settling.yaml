preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.68
    max: 0.8
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.2
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.04
        max: 0.09
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.18
        max: 0.24
      value_right:
        sample: uniform
        min: 0.28
        max: 0.36
      x_split:
        sample: uniform
        min: 0.9
        max: 1.15
      axis: 0
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.48
  constriction_center_x:
    sample: uniform
    min: 0.96
    max: 1.16
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.006
  t_end: 1.45
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.09
          cycles:
          - sample: uniform
            min: 0.9
            max: 1.3
          - sample: uniform
            min: 2.0
            max: 2.8
          phase:
            sample: uniform
            min: -0.25
            max: 0.25
          angle:
            sample: uniform
            min: 0.35
            max: 0.75
        - amplitude:
            sample: uniform
            min: 0.02
            max: 0.05
          cycles:
          - sample: uniform
            min: 1.6
            max: 2.2
          - sample: uniform
            min: 0.8
            max: 1.3
          phase:
            sample: uniform
            min: 0.5
            max: 1.2
          angle:
            sample: uniform
            min: -0.12
            max: 0.12
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.12
            max: 0.18
          cycles:
          - sample: uniform
            min: 0.8
            max: 1.2
          - sample: uniform
            min: 2.0
            max: 3.0
          phase:
            sample: uniform
            min: -0.2
            max: 0.2
          angle:
            sample: uniform
            min: 0.4
            max: 0.8
        - amplitude:
            sample: uniform
            min: -0.08
            max: -0.04
          cycles:
          - sample: uniform
            min: 1.6
            max: 2.2
          - sample: uniform
            min: 0.7
            max: 1.1
          phase:
            sample: uniform
            min: 0.8
            max: 1.5
          angle:
            sample: uniform
            min: -0.25
            max: 0.0
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 48
seed: 42
