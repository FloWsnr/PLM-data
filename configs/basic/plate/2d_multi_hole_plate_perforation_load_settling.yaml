preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.68
    max: 0.8
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.2
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.04
        max: 0.08
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.2
        max: 0.26
      x:
        sample: uniform
        min: 0.04
        max: 0.08
      y:
        sample: uniform
        min: -0.03
        max: 0.03
domain:
  type: multi_hole_plate
  allow_sampling: true
  width:
    sample: uniform
    min: 1.2
    max: 1.32
  height:
    sample: uniform
    min: 0.9
    max: 1.0
  holes:
  - center:
    - sample: uniform
      min: 0.26
      max: 0.34
    - sample: uniform
      min: 0.22
      max: 0.3
    radius:
      sample: uniform
      min: 0.05
      max: 0.07
    boundary_name: hole_lower_left
  - center:
    - sample: uniform
      min: 0.58
      max: 0.66
    - sample: uniform
      min: 0.64
      max: 0.76
    radius:
      sample: uniform
      min: 0.055
      max: 0.075
    boundary_name: hole_upper_mid
  - center:
    - sample: uniform
      min: 0.62
      max: 0.72
    - sample: uniform
      min: 0.36
      max: 0.48
    radius:
      sample: uniform
      min: 0.06
      max: 0.08
    boundary_name: hole_center
  - center:
    - sample: uniform
      min: 0.92
      max: 1.02
    - sample: uniform
      min: 0.28
      max: 0.4
    radius:
      sample: uniform
      min: 0.05
      max: 0.07
    boundary_name: hole_right
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.006
  t_end: 1.55
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.09
          cycles:
          - sample: uniform
            min: 1.0
            max: 1.6
          - sample: uniform
            min: 1.6
            max: 2.4
          phase:
            sample: uniform
            min: -0.35
            max: 0.35
          angle:
            sample: uniform
            min: 0.25
            max: 0.7
        - amplitude:
            sample: uniform
            min: -0.05
            max: -0.02
          cycles:
          - sample: uniform
            min: 2.0
            max: 2.8
          - sample: uniform
            min: 0.7
            max: 1.2
          phase:
            sample: uniform
            min: 0.5
            max: 1.3
          angle:
            sample: uniform
            min: -0.1
            max: 0.15
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.11
            max: 0.18
          cycles:
          - sample: uniform
            min: 1.1
            max: 1.7
          - sample: uniform
            min: 1.6
            max: 2.4
          phase:
            sample: uniform
            min: -0.2
            max: 0.2
          angle:
            sample: uniform
            min: 0.15
            max: 0.55
        - amplitude:
            sample: uniform
            min: -0.09
            max: -0.04
          cycles:
          - sample: uniform
            min: 0.7
            max: 1.2
          - sample: uniform
            min: 2.1
            max: 2.8
          phase:
            sample: uniform
            min: 0.7
            max: 1.4
          angle:
            sample: uniform
            min: -0.25
            max: 0.05
boundary_conditions:
  deflection:
    outer:
    - operator: simply_supported
    hole_lower_left:
    - operator: simply_supported
    hole_upper_mid:
    - operator: simply_supported
    hole_center:
    - operator: simply_supported
    hole_right:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 192
  - 144
  num_frames: 52
seed: 42
