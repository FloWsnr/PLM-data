preset: plate
parameters:
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  theta:
    sample: uniform
    min: 0.66
    max: 0.78
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.18
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.008
        max: 0.016
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.18
        max: 0.24
      value_right:
        sample: uniform
        min: 0.28
        max: 0.36
      x_split:
        sample: uniform
        min: 0.45
        max: 0.75
      axis: 1
domain:
  type: serpentine_channel
  allow_sampling: true
  channel_length: param:channel_length
  lane_spacing: param:lane_spacing
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0055
  t_end: 0.42
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.07
            max: 0.12
          cycles:
          - sample: uniform
            min: 0.18
            max: 0.3
          - sample: uniform
            min: 1.1
            max: 1.6
          phase:
            sample: uniform
            min: -0.25
            max: 0.25
          angle:
            sample: uniform
            min: -0.08
            max: 0.12
        - amplitude:
            sample: uniform
            min: -0.07
            max: -0.03
          cycles:
          - sample: uniform
            min: 0.45
            max: 0.68
          - sample: uniform
            min: 0.0
            max: 0.08
          phase:
            sample: uniform
            min: 0.6
            max: 1.2
          angle:
            sample: uniform
            min: -0.08
            max: 0.08
  velocity:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.12
          cycles:
          - sample: uniform
            min: 0.0
            max: 0.08
          - sample: uniform
            min: 1.0
            max: 1.5
          phase:
            sample: uniform
            min: 0.9
            max: 1.5
          angle:
            sample: uniform
            min: -0.08
            max: 0.08
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 160
  - 224
  num_frames: 30
seed: 42
