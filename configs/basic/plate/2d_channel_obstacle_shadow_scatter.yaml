preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.54
    max: 0.66
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.92
        max: 1.12
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.012
        max: 0.03
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.18
        max: 0.23
      y:
        sample: uniform
        min: 0.03
        max: 0.08
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 1.8
    max: 2.2
  height: 1.0
  obstacle_center:
  - sample: uniform
    min: 0.85
    max: 1.15
  - sample: uniform
    min: 0.42
    max: 0.62
  obstacle_radius:
    sample: uniform
    min: 0.12
    max: 0.18
  mesh_size: 0.03
time:
  dt: 0.0045
  t_end: 1.25
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.8
            max: 1.2
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center:
          - sample: uniform
            min: 0.18
            max: 0.34
          - sample: uniform
            min: 0.35
            max: 0.65
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
    obstacle:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 256
  - 128
  num_frames: 48
seed: 42
