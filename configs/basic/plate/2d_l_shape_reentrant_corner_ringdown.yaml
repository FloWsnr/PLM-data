preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.53
    max: 0.64
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.94
        max: 1.12
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.006
        max: 0.014
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.18
        max: 0.24
      x:
        sample: uniform
        min: 0.04
        max: 0.08
      y:
        sample: uniform
        min: -0.05
        max: -0.02
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 0.96
    max: 1.14
  outer_height:
    sample: uniform
    min: 0.96
    max: 1.12
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.48
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0045
  t_end: 1.55
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.2
          sigma:
            sample: uniform
            min: 0.055
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center:
          - sample: uniform
            min: 0.5
            max: 0.76
          - sample: uniform
            min: 0.48
            max: 0.72
        - count: 1
          amplitude:
            sample: uniform
            min: -0.45
            max: -0.2
          sigma:
            sample: uniform
            min: 0.05
            max: 0.075
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 0.18
            max: 0.42
          - sample: uniform
            min: 0.18
            max: 0.36
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    outer:
    - operator: simply_supported
    notch:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 176
  - 176
  num_frames: 54
seed: 42
