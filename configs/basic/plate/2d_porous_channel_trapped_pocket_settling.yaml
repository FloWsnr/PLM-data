preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.68
    max: 0.8
coefficients:
  rho_h:
    type: step
    params:
      value_left:
        sample: uniform
        min: 1.0
        max: 1.18
      value_right:
        sample: uniform
        min: 0.78
        max: 0.96
      x_split:
        sample: uniform
        min: 1.15
        max: 1.45
      axis: 0
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.035
        max: 0.075
  rigidity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.2
        max: 0.28
domain:
  type: porous_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.55
    max: 2.8
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.25
    max: 0.29
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.3
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.6
inputs:
  deflection:
    initial_condition:
      type: quadrants
      params:
        split:
        - sample: uniform
          min: 1.0
          max: 1.45
        - sample: uniform
          min: 0.42
          max: 0.58
        region_values:
          "00":
            sample: uniform
            min: 0.05
            max: 0.1
          "01":
            sample: uniform
            min: -0.1
            max: -0.05
          "10":
            sample: uniform
            min: -0.06
            max: -0.02
          "11":
            sample: uniform
            min: 0.03
            max: 0.08
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.2
        sigma:
          sample: uniform
          min: 0.08
          max: 0.12
        center:
        - sample: uniform
          min: 1.0
          max: 1.8
        - sample: uniform
          min: 0.3
          max: 0.7
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
    obstacles:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 52
seed: 42
