preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.54
    max: 0.65
coefficients:
  rho_h:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.94
        max: 1.12
      value_right:
        sample: uniform
        min: 0.78
        max: 0.96
      x_split:
        sample: uniform
        min: 0.6
        max: 0.72
      axis: 0
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.008
        max: 0.018
  rigidity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.17
        max: 0.24
domain:
  type: multi_hole_plate
  allow_sampling: true
  width:
    sample: uniform
    min: 1.22
    max: 1.34
  height:
    sample: uniform
    min: 0.9
    max: 1.02
  holes:
  - center:
    - sample: uniform
      min: 0.24
      max: 0.32
    - sample: uniform
      min: 0.22
      max: 0.32
    radius:
      sample: uniform
      min: 0.055
      max: 0.075
    boundary_name: holes
  - center:
    - sample: uniform
      min: 0.34
      max: 0.42
    - sample: uniform
      min: 0.66
      max: 0.78
    radius:
      sample: uniform
      min: 0.05
      max: 0.07
    boundary_name: holes
  - center:
    - sample: uniform
      min: 0.62
      max: 0.72
    - sample: uniform
      min: 0.42
      max: 0.54
    radius:
      sample: uniform
      min: 0.06
      max: 0.085
    boundary_name: holes
  - center:
    - sample: uniform
      min: 0.92
      max: 1.04
    - sample: uniform
      min: 0.24
      max: 0.36
    radius:
      sample: uniform
      min: 0.055
      max: 0.08
    boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.0045
  t_end: 1.9
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.2
          sigma:
            sample: uniform
            min: 0.05
            max: 0.075
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 1.9
          center:
          - sample: uniform
            min: 0.1
            max: 0.24
          - sample: uniform
            min: 0.28
            max: 0.72
        - count: 1
          amplitude:
            sample: uniform
            min: 0.25
            max: 0.45
          sigma:
            sample: uniform
            min: 0.045
            max: 0.07
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 0.44
            max: 0.72
          - sample: uniform
            min: 0.24
            max: 0.74
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    outer:
    - operator: simply_supported
    holes:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 192
  - 144
  num_frames: 60
seed: 42
