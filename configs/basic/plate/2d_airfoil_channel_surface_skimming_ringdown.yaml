preset: plate
parameters:
  airfoil_center_x:
    sample: uniform
    min: 1.05
    max: 1.35
  airfoil_center_y:
    sample: uniform
    min: 0.48
    max: 0.66
  theta:
    sample: uniform
    min: 0.54
    max: 0.65
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.92
        max: 1.12
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.007
        max: 0.015
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.18
        max: 0.24
      x:
        sample: uniform
        min: 0.03
        max: 0.06
      y:
        sample: uniform
        min: -0.02
        max: 0.02
domain:
  type: airfoil_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.4
    max: 2.8
  height:
    sample: uniform
    min: 1.0
    max: 1.16
  airfoil_center:
  - "param:airfoil_center_x"
  - "param:airfoil_center_y"
  chord_length:
    sample: uniform
    min: 0.52
    max: 0.64
  thickness_ratio:
    sample: uniform
    min: 0.1
    max: 0.16
  attack_angle_degrees:
    sample: uniform
    min: -12.0
    max: 12.0
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0048
  t_end: 1.7
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.8
            max: 1.05
          sigma:
            sample: uniform
            min: 0.055
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 1.8
          center:
          - sample: uniform
            min: 0.74
            max: 0.98
          - sample: uniform
            min: 0.54
            max: 0.74
        - count: 1
          amplitude:
            sample: uniform
            min: -0.45
            max: -0.2
          sigma:
            sample: uniform
            min: 0.045
            max: 0.07
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center:
          - sample: uniform
            min: 0.78
            max: 1.02
          - sample: uniform
            min: 0.34
            max: 0.5
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
    airfoil:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 58
seed: 42
