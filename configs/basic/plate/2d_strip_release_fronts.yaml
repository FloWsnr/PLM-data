preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.56
    max: 0.68
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.88
        max: 1.08
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.02
        max: 0.05
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.18
        max: 0.24
      value_right:
        sample: uniform
        min: 0.28
        max: 0.36
      x_split:
        sample: uniform
        min: 0.9
        max: 1.15
      axis: 0
domain:
  type: rectangle
  allow_sampling: true
  size:
  - sample: uniform
    min: 1.8
    max: 2.2
  - sample: uniform
    min: 0.72
    max: 0.9
  mesh_resolution:
  - 72
  - 40
time:
  dt: 0.0055
  t_end: 1.4
inputs:
  deflection:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.08
          max: 0.13
        value_right:
          sample: uniform
          min: -0.13
          max: -0.08
        x_split:
          sample: uniform
          min: 0.85
          max: 1.25
        axis: 0
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    $ref: boundary_field.scalar.simply_supported_2d
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 42
seed: 42
