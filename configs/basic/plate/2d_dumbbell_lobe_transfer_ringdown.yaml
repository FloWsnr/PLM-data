preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.55
    max: 0.66
coefficients:
  rho_h:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.98
        max: 1.16
      value_right:
        sample: uniform
        min: 0.76
        max: 0.92
      x_split: 0.0
      axis: 0
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.006
        max: 0.015
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.17
        max: 0.23
      value_right:
        sample: uniform
        min: 0.11
        max: 0.17
      x_split: 0.0
      axis: 0
domain:
  type: dumbbell
  allow_sampling: true
  left_center: [-0.68, 0.0]
  right_center: [0.68, 0.0]
  lobe_radius:
    sample: uniform
    min: 0.45
    max: 0.52
  neck_width:
    sample: uniform
    min: 0.24
    max: 0.34
  mesh_size: 0.035
time:
  dt: 0.0045
  t_end: 2.2
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.3
          sigma:
            sample: uniform
            min: 0.08
            max: 0.12
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: -0.58
            max: -0.28
          - sample: uniform
            min: -0.18
            max: 0.18
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    $ref: boundary_field.scalar.simply_supported_outer
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 60
seed: 42
