preset: plate
parameters:
  theta: 0.5
coefficients:
  rho_h:
    type: constant
    params:
      value: 1.0
  damping:
    type: constant
    params:
      value: 0.0
  rigidity:
    type: constant
    params:
      value: 0.2
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 32
  - 32
time:
  $ref: time.unit_interval_dt_0p01
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.12
          cycles:
          - 1
          - 1
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
          angle: 0.0
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    x-:
    - operator: simply_supported
    x+:
    - operator: simply_supported
    y-:
    - operator: simply_supported
    y+:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 64
  - 64
  num_frames: 40
seed: 42
