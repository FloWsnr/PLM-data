preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.62
    max: 0.78
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.2
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.05
        max: 0.11
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.24
        max: 0.32
      x:
        sample: uniform
        min: -0.04
        max: 0.04
domain:
  type: annulus
  allow_sampling: true
  inner_radius:
    sample: uniform
    min: 0.3
    max: 0.42
  outer_radius:
    sample: uniform
    min: 0.95
    max: 1.08
  mesh_size: 0.03
time:
  dt: 0.007
  t_end: 1.75
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.14
            max: 0.22
          cycles:
          - sample: uniform
            min: 1.6
            max: 2.4
          - 0.0
          phase:
            sample: uniform
            min: -0.2
            max: 0.2
          angle:
            sample: uniform
            min: 0.0
            max: 0.3
        - amplitude:
            sample: uniform
            min: -0.12
            max: -0.06
          cycles:
          - 0.0
          - sample: uniform
            min: 1.6
            max: 2.4
          phase:
            sample: uniform
            min: 0.7
            max: 1.3
          angle:
            sample: uniform
            min: -0.3
            max: 0.0
        - amplitude:
            sample: uniform
            min: 0.03
            max: 0.07
          cycles:
          - sample: uniform
            min: 0.8
            max: 1.2
          - sample: uniform
            min: 0.8
            max: 1.2
          phase:
            sample: uniform
            min: 0.0
            max: 1.4
          angle:
            sample: uniform
            min: 0.5
            max: 1.0
boundary_conditions:
  deflection:
    inner:
    - operator: simply_supported
    outer:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 160
  - 160
  num_frames: 40
seed: 42
