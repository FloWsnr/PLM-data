preset: plate
parameters:
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  theta:
    sample: uniform
    min: 0.68
    max: 0.8
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.18
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.04
        max: 0.085
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.18
        max: 0.24
      value_right:
        sample: uniform
        min: 0.3
        max: 0.38
      x_split:
        sample: uniform
        min: 0.62
        max: 0.82
      axis: 1
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.36
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.48
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.55
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.09
          cycles:
          - sample: uniform
            min: 0.5
            max: 0.8
          - sample: uniform
            min: 1.2
            max: 1.8
          phase:
            sample: uniform
            min: -0.25
            max: 0.25
          angle:
            sample: uniform
            min: -0.08
            max: 0.12
        - amplitude:
            sample: uniform
            min: -0.05
            max: -0.02
          cycles:
          - sample: uniform
            min: 1.1
            max: 1.7
          - sample: uniform
            min: 0.4
            max: 0.7
          phase:
            sample: uniform
            min: 0.5
            max: 1.2
          angle:
            sample: uniform
            min: -0.15
            max: 0.15
  velocity:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.01
            max: 0.03
          cycles:
          - sample: uniform
            min: 0.4
            max: 0.7
          - sample: uniform
            min: 1.0
            max: 1.5
          phase:
            sample: uniform
            min: 0.7
            max: 1.4
          angle:
            sample: uniform
            min: -0.12
            max: 0.12
  load:
    source:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.2
        frequency:
          sample: uniform
          min: 6.0
          max: 10.0
        center:
        - sample: uniform
          min: 0.96
          max: 1.44
        - sample: uniform
          min: 0.76
          max: 0.94
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 192
  - 144
  num_frames: 50
seed: 42
