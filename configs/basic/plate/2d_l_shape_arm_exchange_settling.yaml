preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.68
    max: 0.8
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.18
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.04
        max: 0.085
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.18
        max: 0.24
      value_right:
        sample: uniform
        min: 0.28
        max: 0.36
      x_split:
        sample: uniform
        min: 0.42
        max: 0.62
      axis: 1
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.14
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.14
  cutout_width:
    sample: uniform
    min: 0.32
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.32
    max: 0.46
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.006
  t_end: 1.6
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.06
            max: 0.1
          cycles:
          - sample: uniform
            min: 1.0
            max: 1.5
          - sample: uniform
            min: 1.2
            max: 1.9
          phase:
            sample: uniform
            min: -0.3
            max: 0.3
          angle:
            sample: uniform
            min: 0.35
            max: 0.8
        - amplitude:
            sample: uniform
            min: -0.06
            max: -0.025
          cycles:
          - sample: uniform
            min: 0.6
            max: 1.0
          - sample: uniform
            min: 2.0
            max: 2.8
          phase:
            sample: uniform
            min: 0.4
            max: 1.2
          angle:
            sample: uniform
            min: -0.15
            max: 0.15
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.18
          max: 0.28
        sigma:
          sample: uniform
          min: 0.12
          max: 0.18
        center:
        - sample: uniform
          min: 0.58
          max: 0.82
        - sample: uniform
          min: 0.58
          max: 0.82
boundary_conditions:
  deflection:
    outer:
    - operator: simply_supported
    notch:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 176
  - 176
  num_frames: 50
seed: 42
