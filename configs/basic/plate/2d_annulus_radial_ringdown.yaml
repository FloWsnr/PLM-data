preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.52
    max: 0.62
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.95
        max: 1.1
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.006
        max: 0.016
  rigidity:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.18
        max: 0.24
      amplitude:
        sample: uniform
        min: 0.02
        max: 0.05
      frequency:
        sample: uniform
        min: 4.5
        max: 6.5
      center: [0.0, 0.0]
domain:
  type: annulus
  allow_sampling: true
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.42
  outer_radius:
    sample: uniform
    min: 0.95
    max: 1.05
  mesh_size: 0.03
time:
  dt: 0.004
  t_end: 1.1
inputs:
  deflection:
    initial_condition:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.05
          max: 0.09
        frequency:
          sample: uniform
          min: 6.0
          max: 10.0
        center: [0.0, 0.0]
  velocity:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.01
            max: 0.03
          cycles:
          - sample: uniform
            min: 0.8
            max: 1.2
          - sample: uniform
            min: 0.8
            max: 1.2
          phase:
            sample: uniform
            min: -0.4
            max: 0.4
          angle:
            sample: uniform
            min: -0.35
            max: 0.35
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inner:
    - operator: simply_supported
    outer:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 160
  - 160
  num_frames: 44
seed: 42
