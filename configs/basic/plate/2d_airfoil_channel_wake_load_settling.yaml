preset: plate
parameters:
  airfoil_center_x:
    sample: uniform
    min: 1.05
    max: 1.35
  airfoil_center_y:
    sample: uniform
    min: 0.48
    max: 0.66
  theta:
    sample: uniform
    min: 0.68
    max: 0.8
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 1.0
        max: 1.18
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.04
        max: 0.08
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.2
        max: 0.26
      value_right:
        sample: uniform
        min: 0.28
        max: 0.36
      x_split:
        sample: uniform
        min: 1.1
        max: 1.35
      axis: 0
domain:
  type: airfoil_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.4
    max: 2.8
  height:
    sample: uniform
    min: 1.0
    max: 1.15
  airfoil_center:
  - "param:airfoil_center_x"
  - "param:airfoil_center_y"
  chord_length:
    sample: uniform
    min: 0.52
    max: 0.64
  thickness_ratio:
    sample: uniform
    min: 0.1
    max: 0.16
  attack_angle_degrees:
    sample: uniform
    min: -10.0
    max: 10.0
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.006
  t_end: 1.55
inputs:
  deflection:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.09
          cycles:
          - sample: uniform
            min: 0.9
            max: 1.3
          - sample: uniform
            min: 1.8
            max: 2.4
          phase:
            sample: uniform
            min: -0.25
            max: 0.25
          angle:
            sample: uniform
            min: 0.2
            max: 0.6
        - amplitude:
            sample: uniform
            min: -0.05
            max: -0.02
          cycles:
          - sample: uniform
            min: 1.6
            max: 2.2
          - sample: uniform
            min: 0.8
            max: 1.2
          phase:
            sample: uniform
            min: 0.5
            max: 1.2
          angle:
            sample: uniform
            min: -0.15
            max: 0.12
  velocity:
    initial_condition:
      type: constant
      params:
        value: 0.0
  load:
    source:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.2
        frequency:
          sample: uniform
          min: 6.0
          max: 10.0
        center:
        - sample: uniform
          min: 1.45
          max: 1.82
        - sample: uniform
          min: 0.46
          max: 0.66
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
    airfoil:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 50
seed: 42
