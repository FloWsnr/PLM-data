preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.52
    max: 0.63
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.9
        max: 1.12
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.008
        max: 0.02
  rigidity:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.16
        max: 0.22
      value_right:
        sample: uniform
        min: 0.3
        max: 0.4
      x_split:
        sample: uniform
        min: 0.75
        max: 0.95
      axis: 0
domain:
  type: rectangle
  allow_sampling: true
  size:
  - sample: uniform
    min: 1.45
    max: 1.75
  - sample: uniform
    min: 0.9
    max: 1.1
  mesh_resolution:
  - 68
  - 44
time:
  dt: 0.0045
  t_end: 1.15
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.2
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.1
          center:
          - sample: uniform
            min: 0.25
            max: 0.45
          - sample: uniform
            min: 0.28
            max: 0.72
        - count: 1
          amplitude:
            sample: uniform
            min: -0.55
            max: -0.25
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: 0.35
            max: 0.6
          - sample: uniform
            min: 0.25
            max: 0.75
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    $ref: boundary_field.scalar.simply_supported_2d
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 192
  - 128
  num_frames: 44
seed: 42
