preset: plate
parameters:
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.48
  theta:
    sample: uniform
    min: 0.53
    max: 0.64
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.92
        max: 1.12
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.003
        max: 0.008
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.18
        max: 0.24
      y:
        sample: uniform
        min: 0.03
        max: 0.08
domain:
  type: serpentine_channel
  allow_sampling: true
  channel_length: param:channel_length
  lane_spacing: param:lane_spacing
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0048
  t_end: 0.55
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.2
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.1
            max: 1.7
          center:
          - sample: uniform
            min: 0.12
            max: 0.3
          - sample: uniform
            min: -0.04
            max: 0.04
        - count: 1
          amplitude:
            sample: uniform
            min: -0.5
            max: -0.24
          sigma:
            sample: uniform
            min: 0.045
            max: 0.07
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center:
          - sample: uniform
            min: 0.64
            max: 0.98
          - sample: uniform
            min: 0.28
            max: 0.56
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 160
  - 224
  num_frames: 36
seed: 42
