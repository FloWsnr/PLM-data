preset: plate
parameters:
  theta:
    sample: uniform
    min: 0.54
    max: 0.65
coefficients:
  rho_h:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.92
        max: 1.12
  damping:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.008
        max: 0.018
  rigidity:
    type: affine
    params:
      constant:
        sample: uniform
        min: 0.18
        max: 0.24
      x:
        sample: uniform
        min: 0.03
        max: 0.06
      y:
        sample: uniform
        min: -0.02
        max: 0.02
domain:
  type: porous_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.55
    max: 2.8
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.082
    max: 0.108
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.24
    max: 0.29
  x_margin:
    sample: uniform
    min: 0.18
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.1
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.24
    max: 0.46
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0048
  t_end: 1.9
inputs:
  deflection:
    initial_condition:
      type: constant
      params:
        value: 0.0
  velocity:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.88
            max: 1.15
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.1
            max: 1.8
          center:
          - sample: uniform
            min: 0.16
            max: 0.3
          - sample: uniform
            min: 0.24
            max: 0.42
        - count: 1
          amplitude:
            sample: uniform
            min: 0.28
            max: 0.54
          sigma:
            sample: uniform
            min: 0.045
            max: 0.07
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center:
          - sample: uniform
            min: 0.18
            max: 0.34
          - sample: uniform
            min: 0.58
            max: 0.78
  load:
    source:
      type: none
      params: {}
boundary_conditions:
  deflection:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
    obstacles:
    - operator: simply_supported
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  $ref: output.template.deflection_velocity
  resolution:
  - 224
  - 128
  num_frames: 60
seed: 42
