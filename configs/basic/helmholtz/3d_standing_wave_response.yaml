preset: helmholtz
parameters:
  kappa: 1.0
  k: 2.0
  f_amplitude: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [16, 16, 16]
inputs:
  u:
    source:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude: "param:f_amplitude"
            cycles: [1, 1, 1]
            phase: 0.0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_3d
solver:
  $ref: solver.profile.stationary_indefinite_direct
output:
  $ref: output.template.scalar_u
  resolution: [16, 16, 16]
  num_frames: 1
seed: 42
