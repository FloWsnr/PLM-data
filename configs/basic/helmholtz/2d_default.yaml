preset: helmholtz
parameters:
  kappa: 1.0
  k: 6.8
  f_amplitude: 1.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [64, 64]
inputs:
  u:
    source:
      type: gaussian_bump
      params:
        amplitude: "param:f_amplitude"
        sigma: 0.08
        center: [0.38, 0.58]
boundary_conditions:
  u:
    x-:
      - operator: dirichlet
        value: 0.0
    x+:
      - operator: dirichlet
        value: 0.0
    y-:
      - operator: dirichlet
        value: 0.0
    y+:
      - operator: dirichlet
        value: 0.0
solver:
  ksp_type: preonly
  pc_type: lu
output:
  resolution: [64, 64]
  num_frames: 1
  formats: [numpy, gif]
  fields:
    u: scalar
seed: 42
