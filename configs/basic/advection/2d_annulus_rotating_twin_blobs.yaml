preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: -1.58
            max: -1.32
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: 1.32
            max: 1.58
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00018
        max: 0.00034
domain:
  type: annulus
  inner_radius: 0.35
  outer_radius: 1.0
  mesh_size: 0.02
time:
  dt: 0.005
  t_end: 3.0
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.1
          sigma:
            sample: uniform
            min: 0.06
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.35
          center:
          - sample: uniform
            min: 0.62
            max: 0.74
          - sample: uniform
            min: -0.08
            max: 0.08
        - count: 1
          amplitude:
            sample: uniform
            min: 0.8
            max: 1.0
          sigma:
            sample: uniform
            min: 0.07
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.35
          center:
          - sample: uniform
            min: -0.64
            max: -0.46
          - sample: uniform
            min: 0.14
            max: 0.32
boundary_conditions:
  u:
    inner:
    - operator: neumann
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.01
            max: 0.01
    outer:
    - operator: neumann
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.008
            max: 0.008
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [128, 128]
  num_frames: 61
seed: 42
