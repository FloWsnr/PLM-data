preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background:
            sample: uniform
            min: 0.16
            max: 0.24
          modes:
            - amplitude:
                sample: uniform
                min: 0.82
                max: 1.08
              cycles: [0.0, 2.0]
              phase:
                sample: uniform
                min: -0.3
                max: 0.3
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.14
            max: 0.22
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0001
        max: 0.00022
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.005
  t_end: 2.0
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
        - sample: uniform
          min: 0.42
          max: 0.58
        - sample: uniform
          min: 0.42
          max: 0.58
        region_values:
          "00":
            sample: uniform
            min: 0.9
            max: 1.1
          "01":
            sample: uniform
            min: 0.0
            max: 0.08
          "10":
            sample: uniform
            min: 0.0
            max: 0.08
          "11":
            sample: uniform
            min: 0.9
            max: 1.1
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 128
  - 128
  num_frames: 61
seed: 42
