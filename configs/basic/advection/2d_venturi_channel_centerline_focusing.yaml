preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.58
            max: 0.74
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.36
            max: 0.5
          y:
            sample: uniform
            min: -0.95
            max: -0.75
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00055
        max: 0.00095
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.48
  constriction_center_x:
    sample: uniform
    min: 0.95
    max: 1.15
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.006
  t_end: 1.25
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.15
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.6
            center:
              - sample: uniform
                min: 0.22
                max: 0.42
              - sample: uniform
                min: 0.24
                max: 0.4
          - count: 1
            amplitude:
              sample: uniform
              min: 0.62
              max: 0.92
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.6
            center:
              - sample: uniform
                min: 0.22
                max: 0.42
              - sample: uniform
                min: 0.62
                max: 0.76
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 53
seed: 42
