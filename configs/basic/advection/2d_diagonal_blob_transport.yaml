preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.84
            max: 1.16
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.22
            max: 0.48
  diffusivity:
    type: zero
    params: {}
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.01
  t_end: 1.8
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 3
          amplitude:
            sample: uniform
            min: 0.8
            max: 1.2
          sigma:
            sample: uniform
            min: 0.035
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center:
          - sample: uniform
            min: 0.08
            max: 0.36
          - sample: uniform
            min: 0.18
            max: 0.5
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 128
  - 128
  num_frames: 37
seed: 42
