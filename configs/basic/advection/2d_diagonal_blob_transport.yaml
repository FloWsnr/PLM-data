preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.92
            max: 1.08
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.28
            max: 0.42
  diffusivity:
    type: zero
    params: {}
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.01
  t_end: 1.8
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 0.04
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.13
            max: 0.31
          - sample: uniform
            min: 0.25
            max: 0.43
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 128
  - 128
  num_frames: 37
seed: 42
