preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.78
            max: 0.94
          y:
            sample: uniform
            min: -1.18
            max: -0.92
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.46
            max: -0.3
          x:
            sample: uniform
            min: 1.0
            max: 1.24
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00012
        max: 0.00028
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.16
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.16
  cutout_width:
    sample: uniform
    min: 0.32
    max: 0.44
  cutout_height:
    sample: uniform
    min: 0.32
    max: 0.44
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.032
time:
  dt: 0.005
  t_end: 1.6
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 0.7
              max: 0.95
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.25
              - sample: uniform
                min: 2.0
                max: 2.8
            phase:
              sample: uniform
              min: -0.35
              max: 0.35
            angle:
              sample: uniform
              min: 0.24
              max: 0.6
          - amplitude:
              sample: uniform
              min: 0.2
              max: 0.42
            cycles:
              - sample: uniform
                min: 1.8
                max: 2.6
              - sample: uniform
                min: 0.7
                max: 1.1
            phase:
              sample: uniform
              min: 0.8
              max: 1.3
            angle:
              sample: uniform
              min: -0.16
              max: 0.16
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 61
seed: 42
