preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.32
            max: 0.46
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.02
            max: 0.06
          y:
            sample: uniform
            min: -0.14
            max: -0.1
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00045
        max: 0.00075
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.36
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.48
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.1
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.76
              max: 1.04
            sigma:
              sample: uniform
              min: 0.055
              max: 0.09
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 1.0
                max: 1.34
              - sample: uniform
                min: 0.86
                max: 1.14
          - count: 1
            amplitude:
              sample: uniform
              min: 0.24
              max: 0.5
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 0.9
                max: 1.2
              - sample: uniform
                min: 0.54
                max: 0.8
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 49
seed: 42
