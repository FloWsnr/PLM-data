preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.35
          modes:
            - amplitude: 0.75
              cycles: [0.0, 2.0]
              phase: 0.0
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude: -0.75
              cycles: [2.0, 0.0]
              phase: 0.0
  diffusivity:
    type: constant
    params:
      value: 0.00025
domain:
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y: [0.35, 1.0]
  mesh_resolution: [128, 128]
time:
  dt: 0.005
  t_end: 2.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude: 0.9
            cycles: [1.0, 3.0]
            phase: 0.0
            angle: 0.55
          - amplitude: 0.35
            cycles: [2.0, 1.0]
            phase: 0.9
            angle: 0.0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [128, 128]
  num_frames: 61
seed: 42
