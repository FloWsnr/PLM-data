preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background:
            sample: uniform
            min: 0.28
            max: 0.42
          modes:
            - amplitude:
                sample: uniform
                min: 0.62
                max: 0.88
              cycles: [0.0, 2.0]
              phase:
                sample: uniform
                min: -0.2
                max: 0.2
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: -0.88
                max: -0.62
              cycles: [2.0, 0.0]
              phase:
                sample: uniform
                min: -0.2
                max: 0.2
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00018
        max: 0.00034
domain:
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y: [0.35, 1.0]
  mesh_resolution: [128, 128]
time:
  dt: 0.005
  t_end: 2.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 0.8
              max: 1.0
            cycles:
            - sample: uniform
              min: 0.85
              max: 1.15
            - sample: uniform
              min: 2.6
              max: 3.4
            phase:
              sample: uniform
              min: -0.2
              max: 0.2
            angle:
              sample: uniform
              min: 0.42
              max: 0.68
          - amplitude:
              sample: uniform
              min: 0.25
              max: 0.45
            cycles:
            - sample: uniform
              min: 1.6
              max: 2.4
            - sample: uniform
              min: 0.8
              max: 1.2
            phase:
              sample: uniform
              min: 0.7
              max: 1.1
            angle:
              sample: uniform
              min: -0.1
              max: 0.1
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [128, 128]
  num_frames: 61
seed: 42
