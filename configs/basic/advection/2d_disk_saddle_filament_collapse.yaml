preset: advection
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          x:
            sample: uniform
            min: 1.05
            max: 1.35
          y:
            sample: uniform
            min: -0.32
            max: -0.12
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.32
            max: -0.12
          y:
            sample: uniform
            min: -1.35
            max: -1.05
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00008
        max: 0.00018
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.92
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.005
  t_end: 1.35
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: -0.08
            max: 0.08
          - sample: uniform
            min: -0.08
            max: 0.08
        region_values:
          "00":
            sample: uniform
            min: 0.85
            max: 1.1
          "01":
            sample: uniform
            min: -0.45
            max: -0.18
          "10":
            sample: uniform
            min: -0.45
            max: -0.18
          "11":
            sample: uniform
            min: 0.85
            max: 1.1
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [144, 144]
  num_frames: 55
seed: 42
