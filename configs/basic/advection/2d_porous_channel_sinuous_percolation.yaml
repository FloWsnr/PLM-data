preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.48
            max: 0.66
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.16
                max: 0.26
              cycles:
                - sample: uniform
                  min: 0.38
                  max: 0.52
                - 0.0
              phase:
                sample: uniform
                min: 0.3
                max: 0.9
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00065
        max: 0.0011
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.75
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.25
    max: 0.29
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.3
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.55
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.1
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.8
            center:
              - sample: uniform
                min: 0.14
                max: 0.28
              - sample: uniform
                min: 0.24
                max: 0.42
          - count: 1
            amplitude:
              sample: uniform
              min: 0.32
              max: 0.58
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: 0.18
                max: 0.34
              - sample: uniform
                min: 0.58
                max: 0.78
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacles:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 57
seed: 42
