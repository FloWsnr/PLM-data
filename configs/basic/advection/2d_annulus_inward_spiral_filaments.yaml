preset: advection
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.58
            max: -0.36
          y:
            sample: uniform
            min: -1.28
            max: -1.02
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: 1.02
            max: 1.28
          y:
            sample: uniform
            min: -0.58
            max: -0.36
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0001
        max: 0.00022
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.3
    max: 0.42
  outer_radius:
    sample: uniform
    min: 0.92
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.019
    max: 0.024
time:
  dt: 0.005
  t_end: 2.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.72
              max: 1.02
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.52
                max: 0.74
              - sample: uniform
                min: -0.14
                max: 0.14
          - count: 1
            amplitude:
              sample: uniform
              min: 0.58
              max: 0.9
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: -0.7
                max: -0.48
              - sample: uniform
                min: 0.14
                max: 0.34
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.3
              max: 0.6
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: -0.22
                max: 0.18
              - sample: uniform
                min: -0.74
                max: -0.46
boundary_conditions:
  u:
    inner:
      - operator: dirichlet
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 61
seed: 42
