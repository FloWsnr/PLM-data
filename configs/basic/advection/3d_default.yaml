preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_product
        params:
          amplitude: 0.9
          ky: 2.0
      y:
        type: sine_product
        params:
          amplitude: 0.9
          kz: 2.0
      z:
        type: sine_product
        params:
          amplitude: 0.9
          kx: 2.0
  diffusivity:
    type: constant
    params:
      value: 0.001
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [18, 18, 18]
time:
  dt: 0.02
  t_end: 1.2
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_bump
      params:
        sigma: 0.08
        amplitude: 1.0
        center: [0.28, 0.42, 0.61]
boundary_conditions:
  u:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: periodic
        pair_with: y+
    y+:
      - operator: periodic
        pair_with: y-
    z-:
      - operator: periodic
        pair_with: z+
    z+:
      - operator: periodic
        pair_with: z-
solver:
  strategy: constant_lhs_scalar_nonsymmetric
  serial:
    ksp_type: preonly
    pc_type: lu
  mpi:
    ksp_type: gmres
    pc_type: hypre
    pc_hypre_type: boomeramg
    ksp_rtol: 1.0e-9
    ksp_error_if_not_converged: 1
output:
  resolution: [48, 48, 48]
  num_frames: 19
  formats: [numpy, gif]
  fields:
    u: scalar
seed: 42
