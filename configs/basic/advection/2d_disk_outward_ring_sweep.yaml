preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          x:
            sample: uniform
            min: 1.0
            max: 1.3
      y:
        type: affine
        params:
          y:
            sample: uniform
            min: 1.0
            max: 1.3
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00012
        max: 0.00028
domain:
  type: disk
  center: [0.0, 0.0]
  radius: 1.0
  mesh_size: 0.025
time:
  dt: 0.005
  t_end: 0.9
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.9
          max: 1.1
        frequency:
          sample: uniform
          min: 6.8
          max: 9.2
        center:
        - sample: uniform
          min: -0.08
          max: 0.08
        - sample: uniform
          min: -0.08
          max: 0.08
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.01
            max: 0.01
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [128, 128]
  num_frames: 61
seed: 42
