preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 1.0
      y:
        type: constant
        params:
          value: 0.35
  diffusivity:
    type: zero
    params: {}
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 80
  - 80
time:
  $ref: time.unit_interval_dt_0p01
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 0.04
            max: 0.08
          center:
          - sample: uniform
            min: 0.13
            max: 0.31
          - sample: uniform
            min: 0.25
            max: 0.43
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 96
  - 96
  num_frames: 21
seed: 42
