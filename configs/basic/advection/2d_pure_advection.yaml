preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 1.0
      y:
        type: constant
        params:
          value: 0.35
  diffusivity:
    type: zero
    params: {}
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [80, 80]
time:
  $ref: time.unit_interval_dt_0p01
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        blobs:
          - amplitude: 1.0
            sigma: 0.06
            center: [0.22, 0.34]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [96, 96]
  num_frames: 21
seed: 42
