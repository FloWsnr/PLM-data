preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude: 0.9
              cycles: [0.0, 1.0]
              phase: 0.0
      y:
        type: constant
        params:
          value: 0.0
  diffusivity:
    type: constant
    params:
      value: 0.0008
domain:
  type: dumbbell
  left_center: [0.32, 0.5]
  right_center: [0.68, 0.5]
  lobe_radius: 0.24
  neck_width: 0.14
  mesh_size: 0.015
time:
  dt: 0.005
  t_end: 0.7
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude: 1.0
          sigma: 0.045
          aspect_ratio: 1.0
          center: [0.24, 0.5]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [128, 128]
  num_frames: 41
seed: 42
