preset: advection
parameters:
  center_y:
    sample: uniform
    min: 0.47
    max: 0.53
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.78
                max: 1.02
              cycles: [0.0, 1.0]
              phase:
                sample: uniform
                min: -0.2
                max: 0.2
      y:
        type: constant
        params:
          value: 0.0
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00065
        max: 0.001
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 0.29
      max: 0.33
    - param:center_y
  right_center:
    - sample: uniform
      min: 0.67
      max: 0.71
    - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.26
  neck_width:
    sample: uniform
    min: 0.12
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.005
  t_end: 0.7
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.1
          sigma:
            sample: uniform
            min: 0.035
            max: 0.055
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center:
          - sample: uniform
            min: 0.2
            max: 0.28
          - sample: uniform
            min: 0.45
            max: 0.55
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.008
            max: 0.008
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [128, 128]
  num_frames: 41
seed: 42
