preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 1.2
                max: 1.5
              cycles: [0.0, 4.0]
              phase:
                sample: uniform
                min: -0.15
                max: 0.15
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: -1.5
                max: -1.2
              cycles: [4.0, 0.0]
              phase:
                sample: uniform
                min: -0.15
                max: 0.15
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00005
        max: 0.00016
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.005
  t_end: 1.6
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: 0.75
            max: 0.95
          sigma:
            sample: uniform
            min: 0.024
            max: 0.038
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.25
          center:
          - sample: uniform
            min: 0.18
            max: 0.82
          - sample: uniform
            min: 0.18
            max: 0.82
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 128
  - 128
  num_frames: 61
seed: 42
