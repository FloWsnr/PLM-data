preset: advection
parameters:
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  lane_cycles:
    sample: uniform
    min: 1.08
    max: 1.42
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.9
                max: 1.12
              cycles: [0.0, "param:lane_cycles"]
              phase:
                sample: uniform
                min: 1.4
                max: 1.7
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.48
                max: 0.7
              cycles: [0.5, 0.0]
              phase:
                sample: uniform
                min: 1.35
                max: 1.75
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00018
        max: 0.00032
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: param:channel_length
  lane_spacing: param:lane_spacing
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.8
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.82
              max: 1.08
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.7
            center:
              - sample: uniform
                min: 0.12
                max: 0.28
              - sample: uniform
                min: -0.04
                max: 0.04
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 224]
  num_frames: 61
seed: 42
