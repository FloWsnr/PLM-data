preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.68
            max: -0.52
      y:
        type: affine
        params:
          y:
            sample: uniform
            min: -0.82
            max: -0.62
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00055
        max: 0.00095
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.88
    max: 1.06
  branch_length:
    sample: uniform
    min: 0.84
    max: 1.02
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.1
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.82
              max: 1.08
            sigma:
              sample: uniform
              min: 0.045
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 1.24
                max: 1.56
              - sample: uniform
                min: 0.26
                max: 0.5
          - count: 1
            amplitude:
              sample: uniform
              min: 0.64
              max: 0.9
            sigma:
              sample: uniform
              min: 0.045
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 1.24
                max: 1.56
              - sample: uniform
                min: -0.5
                max: -0.26
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 49
seed: 42
