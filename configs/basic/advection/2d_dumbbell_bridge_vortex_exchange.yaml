preset: advection
parameters:
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.42
            max: 0.58
          y:
            sample: uniform
            min: -1.15
            max: -0.95
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.62
            max: -0.48
          x:
            sample: uniform
            min: 1.0
            max: 1.24
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00035
        max: 0.00065
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 0.28
      max: 0.34
    - param:center_y
  right_center:
    - sample: uniform
      min: 0.66
      max: 0.72
    - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.26
  neck_width:
    sample: uniform
    min: 0.12
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.005
  t_end: 1.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.15
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: 0.18
                max: 0.3
              - sample: uniform
                min: 0.42
                max: 0.58
          - count: 1
            amplitude:
              sample: uniform
              min: 0.3
              max: 0.62
            sigma:
              sample: uniform
              min: 0.035
              max: 0.055
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 0.7
                max: 0.82
              - sample: uniform
                min: 0.42
                max: 0.58
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 128]
  num_frames: 57
seed: 42
