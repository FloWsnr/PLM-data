preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.32
            max: -0.12
          y:
            sample: uniform
            min: 0.98
            max: 1.22
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: 1.08
            max: 1.28
          x:
            sample: uniform
            min: -1.22
            max: -0.98
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00095
        max: 0.00135
domain:
  type: channel_obstacle
  length: 2.0
  height: 1.0
  obstacle_center: [1.08, 0.34]
  obstacle_radius: 0.13
  mesh_size: 0.025
time:
  dt: 0.005
  t_end: 0.95
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.1
          sigma:
            sample: uniform
            min: 0.042
            max: 0.06
          aspect_ratio:
            sample: uniform
            min: 1.15
            max: 1.8
          center:
          - sample: uniform
            min: 0.68
            max: 0.76
          - sample: uniform
            min: 0.44
            max: 0.52
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.008
            max: 0.008
    outlet:
    - operator: neumann
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.008
            max: 0.008
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [256, 128]
  num_frames: 51
seed: 42
