preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant: -1.1
          y: 2.2
      y:
        type: affine
        params:
          constant: 1.1
          x: -2.2
  diffusivity:
    type: constant
    params:
      value: 0.0004
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [96, 96]
time:
  dt: 0.01
  t_end: 2.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        blobs:
          - amplitude: 1.0
            sigma: 0.035
            center: [0.78, 0.42]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [96, 96]
  num_frames: 49
seed: 42
