preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant: -0.65
          y: 1.3
      y:
        type: affine
        params:
          constant: 0.65
          x: -1.3
  diffusivity:
    type: constant
    params:
      value: 0.002
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [96, 96]
time:
  dt: 0.01
  t_end: 1.6
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_bump
      params:
        sigma: 0.06
        amplitude: 1.0
        center: [0.72, 0.5]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [96, 96]
  num_frames: 33
seed: 42
