preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.94
            max: -0.76
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: -0.5
                max: -0.32
              cycles:
                - sample: uniform
                  min: 0.42
                  max: 0.6
                - 0.0
              phase:
                sample: uniform
                min: -0.5
                max: 0.2
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00022
        max: 0.00042
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.75
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.25
    max: 0.29
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.3
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 0.7
              max: 0.95
            cycles:
              - sample: uniform
                min: 0.3
                max: 0.42
              - sample: uniform
                min: 1.3
                max: 1.9
            phase:
              sample: uniform
              min: -0.3
              max: 0.3
            angle:
              sample: uniform
              min: 0.06
              max: 0.28
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.36
            cycles:
              - sample: uniform
                min: 0.2
                max: 0.32
              - sample: uniform
                min: 2.0
                max: 2.8
            phase:
              sample: uniform
              min: 0.8
              max: 1.4
            angle:
              sample: uniform
              min: -0.18
              max: 0.08
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacles:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 49
seed: 42
