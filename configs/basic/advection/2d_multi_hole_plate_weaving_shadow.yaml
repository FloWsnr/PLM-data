preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.48
            max: 0.64
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.18
                max: 0.28
              cycles:
                - sample: uniform
                  min: 0.45
                  max: 0.62
                - 0.0
              phase:
                sample: uniform
                min: -0.2
                max: 0.4
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00075
        max: 0.0012
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.18
    max: 1.3
  height:
    sample: uniform
    min: 0.88
    max: 0.98
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.36
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.46
          max: 0.64
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.9
          max: 1.0
        - sample: uniform
          min: 0.22
          max: 0.36
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.006
  t_end: 1.3
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.95
              max: 1.2
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.4
              max: 2.1
            center:
              - sample: uniform
                min: 0.06
                max: 0.16
              - sample: uniform
                min: 0.24
                max: 0.7
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.24
              max: 0.48
            sigma:
              sample: uniform
              min: 0.035
              max: 0.06
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: 0.42
                max: 0.72
              - sample: uniform
                min: 0.24
                max: 0.74
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    holes:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 53
seed: 42
