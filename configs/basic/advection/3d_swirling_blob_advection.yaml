preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.72
                max: 1.08
              cycles: [0.0, 2.0, 0.0]  # ky: 2.0
              phase:
                sample: uniform
                min: -0.35
                max: 0.35
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.72
                max: 1.08
              cycles: [0.0, 0.0, 2.0]  # kz: 2.0
              phase:
                sample: uniform
                min: -0.35
                max: 0.35
      z:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.72
                max: 1.08
              cycles: [2.0, 0.0, 0.0]  # kx: 2.0
              phase:
                sample: uniform
                min: -0.35
                max: 0.35
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00065
        max: 0.00135
domain:
  type: box
  size:
  - 1.0
  - 1.0
  - 1.0
  mesh_resolution:
  - 18
  - 18
  - 18
time:
  dt: 0.02
  t_end: 1.2
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.78
            max: 1.18
          sigma:
            sample: uniform
            min: 0.06
            max: 0.11
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.35
          center:
          - sample: uniform
            min: 0.28
            max: 0.62
          - sample: uniform
            min: 0.28
            max: 0.62
          - sample: uniform
            min: 0.28
            max: 0.62
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 48
  - 48
  - 48
  num_frames: 19
seed: 42
