preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.78
                max: 1.02
              cycles: [0.0, 2.0, 0.0]  # ky: 2.0
              phase:
                sample: uniform
                min: -0.2
                max: 0.2
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.78
                max: 1.02
              cycles: [0.0, 0.0, 2.0]  # kz: 2.0
              phase:
                sample: uniform
                min: -0.2
                max: 0.2
      z:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.78
                max: 1.02
              cycles: [2.0, 0.0, 0.0]  # kx: 2.0
              phase:
                sample: uniform
                min: -0.2
                max: 0.2
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00075
        max: 0.00125
domain:
  type: box
  size:
  - 1.0
  - 1.0
  - 1.0
  mesh_resolution:
  - 18
  - 18
  - 18
time:
  dt: 0.02
  t_end: 1.2
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 3
          amplitude:
            sample: uniform
            min: 0.8
            max: 1.15
          sigma:
            sample: uniform
            min: 0.055
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.25
          center:
          - sample: uniform
            min: 0.16
            max: 0.4
          - sample: uniform
            min: 0.3
            max: 0.54
          - sample: uniform
            min: 0.49
            max: 0.73
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 48
  - 48
  - 48
  num_frames: 19
seed: 42
