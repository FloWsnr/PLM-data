preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_product
        params:
          amplitude: 0.9
          ky: 2.0
      y:
        type: sine_product
        params:
          amplitude: 0.9
          kz: 2.0
      z:
        type: sine_product
        params:
          amplitude: 0.9
          kx: 2.0
  diffusivity:
    type: constant
    params:
      value: 0.001
domain:
  type: box
  size:
  - 1.0
  - 1.0
  - 1.0
  mesh_resolution:
  - 18
  - 18
  - 18
time:
  dt: 0.02
  t_end: 1.2
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          center:
          - sample: uniform
            min: 0.16
            max: 0.4
          - sample: uniform
            min: 0.3
            max: 0.54
          - sample: uniform
            min: 0.49
            max: 0.73
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 48
  - 48
  - 48
  num_frames: 19
seed: 42
