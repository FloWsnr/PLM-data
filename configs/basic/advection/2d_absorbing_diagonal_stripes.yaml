preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.82
            max: 0.98
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.74
            max: -0.58
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00035
        max: 0.00065
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.005
  t_end: 1.05
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude: 0.9
            cycles:
            - sample: uniform
              min: 1.8
              max: 2.3
            - sample: uniform
              min: 0.9
              max: 1.15
            phase:
              sample: uniform
              min: -0.35
              max: 0.35
            angle:
              sample: uniform
              min: -0.18
              max: 0.18
          - amplitude:
              sample: uniform
              min: 0.25
              max: 0.45
            cycles:
            - sample: uniform
              min: 0.85
              max: 1.2
            - sample: uniform
              min: 2.6
              max: 3.4
            phase:
              sample: uniform
              min: 0.8
              max: 1.4
            angle:
              sample: uniform
              min: -0.12
              max: 0.12
boundary_conditions:
  u:
    x-:
    - operator: dirichlet
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.012
            max: 0.012
    x+:
    - operator: dirichlet
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.012
            max: 0.012
    y-:
    - operator: dirichlet
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.012
            max: 0.012
    y+:
    - operator: dirichlet
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.012
            max: 0.012
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [128, 128]
  num_frames: 51
seed: 42
