preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: sine_product
        params:
          amplitude: 1.25
          ky: 2.0
      y:
        type: sine_product
        params:
          amplitude: -1.25
          kx: 2.0
  diffusivity:
    type: constant
    params:
      value: 0.0005
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 96
  - 96
time:
  dt: 0.01
  t_end: 2.0
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          center:
          - sample: uniform
            min: 0.205
            max: 0.415
          - sample: uniform
            min: 0.465
            max: 0.675
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution:
  - 96
  - 96
  num_frames: 41
seed: 42
