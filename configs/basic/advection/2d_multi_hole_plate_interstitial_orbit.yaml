preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.58
            max: 0.74
          y:
            sample: uniform
            min: -1.18
            max: -0.94
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.22
            max: -0.08
          x:
            sample: uniform
            min: 0.94
            max: 1.18
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00008
        max: 0.0002
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.18
    max: 1.28
  height:
    sample: uniform
    min: 0.88
    max: 0.96
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.46
          max: 0.62
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 0.88
          max: 0.98
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.006
  t_end: 1.6
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.5
            max: 0.68
          - sample: uniform
            min: 0.34
            max: 0.48
        region_values:
          "00":
            sample: uniform
            min: 0.75
            max: 1.02
          "01":
            sample: uniform
            min: -0.36
            max: -0.14
          "10":
            sample: uniform
            min: 0.18
            max: 0.45
          "11":
            sample: uniform
            min: -0.36
            max: -0.14
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.04
              max: 0.04
    holes_right:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 57
seed: 42
