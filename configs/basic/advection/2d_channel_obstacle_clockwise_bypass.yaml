preset: advection
parameters: {}
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.92
            max: 1.08
          y:
            sample: uniform
            min: -1.34
            max: -1.08
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -1.26
            max: -1.02
          x:
            sample: uniform
            min: 1.08
            max: 1.34
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00085
        max: 0.0012
domain:
  type: channel_obstacle
  length: 2.0
  height: 1.0
  obstacle_center: [0.95, 0.63]
  obstacle_radius: 0.14
  mesh_size: 0.025
time:
  dt: 0.005
  t_end: 1.1
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.9
            max: 1.1
          sigma:
            sample: uniform
            min: 0.045
            max: 0.065
          aspect_ratio:
            sample: uniform
            min: 1.1
            max: 1.7
          center:
          - sample: uniform
            min: 0.24
            max: 0.32
          - sample: uniform
            min: 0.44
            max: 0.5
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.008
            max: 0.008
    outlet:
    - operator: neumann
      value:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.008
            max: 0.008
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  resolution: [256, 128]
  num_frames: 51
seed: 42
