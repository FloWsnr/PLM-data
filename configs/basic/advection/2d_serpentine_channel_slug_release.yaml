preset: advection
parameters:
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  lane_cycles:
    sample: uniform
    min: 1.08
    max: 1.42
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: -0.56
                max: -0.42
              cycles: [0.0, "param:lane_cycles"]
              phase:
                sample: uniform
                min: 1.4
                max: 1.7
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: -0.24
                max: -0.16
              cycles: [0.5, 0.0]
              phase:
                sample: uniform
                min: 1.35
                max: 1.75
  diffusivity:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00055
        max: 0.00085
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: param:channel_length
  lane_spacing: param:lane_spacing
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.006
  t_end: 1.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 0.78
              max: 0.98
            cycles:
              - sample: uniform
                min: 0.18
                max: 0.28
              - sample: uniform
                min: 1.08
                max: 1.42
            phase:
              sample: uniform
              min: -0.25
              max: 0.25
            angle:
              sample: uniform
              min: -0.08
              max: 0.12
          - amplitude:
              sample: uniform
              min: 0.22
              max: 0.4
            cycles:
              - sample: uniform
                min: 0.4
                max: 0.62
              - sample: uniform
                min: 0.0
                max: 0.08
            phase:
              sample: uniform
              min: 0.65
              max: 1.15
            angle:
              sample: uniform
              min: -0.08
              max: 0.08
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 224]
  num_frames: 57
seed: 42
