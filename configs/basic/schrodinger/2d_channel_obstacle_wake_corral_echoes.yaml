preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.025
    max: 0.04
  theta: 0.5
  channel_length:
    sample: uniform
    min: 1.95
    max: 2.2
  channel_height:
    sample: uniform
    min: 0.94
    max: 1.08
  obstacle_center_x:
    sample: uniform
    min: 0.92
    max: 1.08
  obstacle_center_y:
    sample: uniform
    min: 0.42
    max: 0.58
  obstacle_radius:
    sample: uniform
    min: 0.13
    max: 0.17
  mesh_size:
    sample: uniform
    min: 0.017
    max: 0.023
  packet_amplitude:
    sample: uniform
    min: 0.88
    max: 1.08
  packet_sigma:
    sample: uniform
    min: 0.055
    max: 0.085
  packet_center_x:
    sample: uniform
    min: 0.18
    max: 0.32
  packet_center_y:
    sample: uniform
    min: 0.26
    max: 0.42
  packet_kx:
    sample: uniform
    min: 8.5
    max: 11.0
  packet_ky:
    sample: uniform
    min: -2.0
    max: 1.0
  wake_well_amplitude:
    sample: uniform
    min: -2.5
    max: -1.4
  wake_well_sigma:
    sample: uniform
    min: 0.08
    max: 0.13
  wake_well_center_x:
    sample: uniform
    min: 1.24
    max: 1.52
  wake_well_center_y:
    sample: uniform
    min: 0.36
    max: 0.64
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:wake_well_amplitude"
      sigma: "param:wake_well_sigma"
      center: ["param:wake_well_center_x", "param:wake_well_center_y"]
domain:
  allow_sampling: true
  type: channel_obstacle
  length: "param:channel_length"
  height: "param:channel_height"
  obstacle_center: ["param:obstacle_center_x", "param:obstacle_center_y"]
  obstacle_radius: "param:obstacle_radius"
  mesh_size: "param:mesh_size"
time:
  dt: 0.0028
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_channel_obstacle
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_channel_obstacle
output:
  $ref: output.template.schrodinger
  resolution: [224, 128]
  num_frames: 81
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
