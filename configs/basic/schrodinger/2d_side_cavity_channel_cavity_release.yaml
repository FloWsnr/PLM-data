preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.024
    max: 0.038
  theta: 0.5
  channel_length:
    sample: uniform
    min: 2.2
    max: 2.7
  channel_height:
    sample: uniform
    min: 0.68
    max: 0.8
  cavity_width:
    sample: uniform
    min: 0.4
    max: 0.52
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.44
  cavity_center_x:
    sample: uniform
    min: 1.18
    max: 1.4
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.025
  packet_amplitude:
    sample: uniform
    min: 0.88
    max: 1.08
  packet_sigma:
    sample: uniform
    min: 0.055
    max: 0.085
  packet_center_x:
    sample: uniform
    min: 1.08
    max: 1.5
  packet_center_y:
    sample: uniform
    min: 0.84
    max: 0.94
  packet_kx:
    sample: uniform
    min: -1.0
    max: 1.0
  packet_ky:
    sample: uniform
    min: -8.5
    max: -5.5
  mouth_barrier_amplitude:
    sample: uniform
    min: 1.2
    max: 2.4
  mouth_barrier_sigma:
    sample: uniform
    min: 0.08
    max: 0.13
  mouth_center_y:
    sample: uniform
    min: 0.74
    max: 0.8
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:mouth_barrier_amplitude"
      sigma: "param:mouth_barrier_sigma"
      center: ["param:cavity_center_x", "param:mouth_center_y"]
domain:
  allow_sampling: true
  type: side_cavity_channel
  length: "param:channel_length"
  height: "param:channel_height"
  cavity_width: "param:cavity_width"
  cavity_depth: "param:cavity_depth"
  cavity_center_x: "param:cavity_center_x"
  mesh_size: "param:mesh_size"
time:
  dt: 0.003
  t_end: 1.05
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_side_cavity_channel
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_side_cavity_channel
output:
  $ref: output.template.schrodinger
  resolution: [224, 144]
  num_frames: 81
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
