preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.024
    max: 0.038
  theta: 0.5
  inner_radius:
    sample: uniform
    min: 0.3
    max: 0.4
  outer_radius:
    sample: uniform
    min: 0.9
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.019
  packet_amplitude:
    sample: uniform
    min: 0.9
    max: 1.08
  packet_sigma:
    sample: uniform
    min: 0.055
    max: 0.085
  packet_center_x:
    sample: uniform
    min: -0.08
    max: 0.08
  packet_center_y:
    sample: uniform
    min: 0.56
    max: 0.74
  packet_kx:
    sample: uniform
    min: -1.5
    max: 1.5
  packet_ky:
    sample: uniform
    min: -13.0
    max: -9.5
  lattice_x_amplitude:
    sample: uniform
    min: 0.28
    max: 0.52
  lattice_y_amplitude:
    sample: uniform
    min: -0.52
    max: -0.28
  lattice_x_phase:
    sample: uniform
    min: -0.4
    max: 0.4
  lattice_y_phase:
    sample: uniform
    min: 0.2
    max: 1.0
coefficients:
  potential:
    type: sine_waves
    params:
      background: 0.0
      modes:
        - amplitude: "param:lattice_x_amplitude"
          cycles: [1.0, 0.0]
          phase: "param:lattice_x_phase"
        - amplitude: "param:lattice_y_amplitude"
          cycles: [0.0, 1.0]
          phase: "param:lattice_y_phase"
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius: "param:inner_radius"
  outer_radius: "param:outer_radius"
  mesh_size: "param:mesh_size"
time:
  dt: 0.0022
  t_end: 0.9
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_annulus
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_annulus
output:
  $ref: output.template.schrodinger
  resolution: [176, 176]
  num_frames: 77
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
