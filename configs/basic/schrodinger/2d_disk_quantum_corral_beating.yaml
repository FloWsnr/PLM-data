preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.024
    max: 0.038
  theta: 0.5
  domain_center_x:
    sample: uniform
    min: 0.48
    max: 0.52
  domain_center_y:
    sample: uniform
    min: 0.48
    max: 0.52
  domain_radius:
    sample: uniform
    min: 0.45
    max: 0.52
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.017
  corral_base:
    sample: uniform
    min: -0.4
    max: 0.3
  corral_amplitude:
    sample: uniform
    min: 1.2
    max: 2.0
  corral_frequency:
    sample: uniform
    min: 9.0
    max: 13.0
  mode1_amplitude:
    sample: uniform
    min: 0.55
    max: 0.85
  mode1_cycles_x:
    sample: uniform
    min: 1.0
    max: 1.6
  mode1_cycles_y:
    sample: uniform
    min: 2.0
    max: 2.8
  mode1_phase_u:
    sample: uniform
    min: -0.4
    max: 0.4
  mode1_phase_v:
    sample: uniform
    min: 1.1
    max: 2.0
  mode1_angle:
    sample: uniform
    min: 0.0
    max: 0.5
  mode2_amplitude:
    sample: uniform
    min: 0.25
    max: 0.55
  mode2_cycles_x:
    sample: uniform
    min: 2.0
    max: 3.0
  mode2_cycles_y:
    sample: uniform
    min: 1.0
    max: 2.0
  mode2_phase_u:
    sample: uniform
    min: 0.9
    max: 1.8
  mode2_phase_v:
    sample: uniform
    min: 2.5
    max: 3.4
  mode2_angle:
    sample: uniform
    min: -0.5
    max: 0.2
coefficients:
  potential:
    type: radial_cosine
    params:
      base: "param:corral_base"
      amplitude: "param:corral_amplitude"
      frequency: "param:corral_frequency"
      center: ["param:domain_center_x", "param:domain_center_y"]
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius: "param:domain_radius"
  mesh_size: "param:mesh_size"
time:
  dt: 0.003
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude: "param:mode1_amplitude"
            cycles: ["param:mode1_cycles_x", "param:mode1_cycles_y"]
            phase: "param:mode1_phase_u"
            angle: "param:mode1_angle"
          - amplitude: "param:mode2_amplitude"
            cycles: ["param:mode2_cycles_x", "param:mode2_cycles_y"]
            phase: "param:mode2_phase_u"
            angle: "param:mode2_angle"
  v:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude: "param:mode1_amplitude"
            cycles: ["param:mode1_cycles_x", "param:mode1_cycles_y"]
            phase: "param:mode1_phase_v"
            angle: "param:mode1_angle"
          - amplitude: "param:mode2_amplitude"
            cycles: ["param:mode2_cycles_x", "param:mode2_cycles_y"]
            phase: "param:mode2_phase_v"
            angle: "param:mode2_angle"
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
output:
  $ref: output.template.schrodinger
  resolution: [160, 160]
  num_frames: 81
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
