preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.015
    max: 0.028
  theta: 0.5
  channel_length:
    sample: uniform
    min: 2.0
    max: 2.3
  channel_height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.48
  constriction_center_x:
    sample: uniform
    min: 0.96
    max: 1.16
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.025
  packet_amplitude:
    sample: uniform
    min: 1.0
    max: 1.35
  packet_sigma:
    sample: uniform
    min: 0.035
    max: 0.06
  packet_center_x:
    sample: uniform
    min: 0.18
    max: 0.44
  packet_center_y:
    sample: uniform
    min: 0.36
    max: 0.64
  packet_kx:
    sample: uniform
    min: 7.5
    max: 11.5
  packet_ky:
    sample: uniform
    min: -4.0
    max: 4.0
  throat_well_amplitude:
    sample: uniform
    min: -4.0
    max: -1.5
  throat_well_sigma:
    sample: uniform
    min: 0.05
    max: 0.14
  throat_well_center_y:
    sample: uniform
    min: 0.28
    max: 0.72
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:throat_well_amplitude"
      sigma: "param:throat_well_sigma"
      center: ["param:constriction_center_x", "param:throat_well_center_y"]
domain:
  allow_sampling: true
  type: venturi_channel
  length: "param:channel_length"
  height: "param:channel_height"
  throat_height: "param:throat_height"
  constriction_center_x: "param:constriction_center_x"
  constriction_radius: "param:constriction_radius"
  mesh_size: "param:mesh_size"
time:
  dt: 0.0022
  t_end: 0.56
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_venturi_channel
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_venturi_channel
output:
  $ref: output.template.schrodinger
  resolution: [224, 128]
  num_frames: 69
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
