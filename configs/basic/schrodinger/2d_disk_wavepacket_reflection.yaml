preset: schrodinger
parameters:
  D: 0.05
  theta: 0.5
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: 8.0
      sigma: 0.05
      center:
      - 0.55
      - 0.5
domain:
  type: disk
  center: [0.5, 0.5]
  radius: 0.48
  mesh_size: 0.015
time:
  $ref: time.schrodinger_default
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude:
          sample: uniform
          min: 0.9
          max: 1.1
        sigma:
          sample: uniform
          min: 0.05
          max: 0.09
        center:
        - sample: uniform
          min: 0.145
          max: 0.355
        - sample: uniform
          min: 0.395
          max: 0.605
        wavevector:
        - sample: uniform
          min: 12.32
          max: 15.68
        - 0.0
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude:
          sample: uniform
          min: 0.9
          max: 1.1
        sigma:
          sample: uniform
          min: 0.05
          max: 0.09
        center:
        - sample: uniform
          min: 0.145
          max: 0.355
        - sample: uniform
          min: 0.395
          max: 0.605
        wavevector:
        - sample: uniform
          min: 12.32
          max: 15.68
        - 0.0
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
output:
  $ref: output.template.schrodinger
  resolution:
  - 128
  - 128
  num_frames: 64
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
