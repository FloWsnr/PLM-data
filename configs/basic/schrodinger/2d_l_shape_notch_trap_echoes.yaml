preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.025
    max: 0.038
  theta: 0.5
  outer_width:
    sample: uniform
    min: 1.0
    max: 1.18
  outer_height:
    sample: uniform
    min: 1.0
    max: 1.18
  cutout_width:
    sample: uniform
    min: 0.36
    max: 0.5
  cutout_height:
    sample: uniform
    min: 0.3
    max: 0.44
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
  packet_amplitude:
    sample: uniform
    min: 0.88
    max: 1.08
  packet_sigma:
    sample: uniform
    min: 0.055
    max: 0.085
  packet_center_x:
    sample: uniform
    min: 0.18
    max: 0.34
  packet_center_y:
    sample: uniform
    min: 0.72
    max: 0.92
  packet_kx:
    sample: uniform
    min: 6.0
    max: 8.5
  packet_ky:
    sample: uniform
    min: -7.5
    max: -5.0
  notch_well_amplitude:
    sample: uniform
    min: -3.0
    max: -1.8
  notch_well_sigma:
    sample: uniform
    min: 0.08
    max: 0.12
  notch_well_center_x:
    sample: uniform
    min: 0.42
    max: 0.6
  notch_well_center_y:
    sample: uniform
    min: 0.36
    max: 0.56
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:notch_well_amplitude"
      sigma: "param:notch_well_sigma"
      center: ["param:notch_well_center_x", "param:notch_well_center_y"]
domain:
  allow_sampling: true
  type: l_shape
  outer_width: "param:outer_width"
  outer_height: "param:outer_height"
  cutout_width: "param:cutout_width"
  cutout_height: "param:cutout_height"
  mesh_size: "param:mesh_size"
time:
  dt: 0.003
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_l_shape
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_l_shape
output:
  $ref: output.template.schrodinger
  resolution: [176, 176]
  num_frames: 81
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
