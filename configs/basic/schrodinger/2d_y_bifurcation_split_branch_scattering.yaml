preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.036
    max: 0.052
  theta: 0.5
  inlet_length:
    sample: uniform
    min: 0.88
    max: 1.08
  branch_length:
    sample: uniform
    min: 0.86
    max: 1.04
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 44.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.019
    max: 0.026
  packet_amplitude:
    sample: uniform
    min: 0.9
    max: 1.1
  packet_sigma:
    sample: uniform
    min: 0.055
    max: 0.085
  packet_center_x:
    sample: uniform
    min: 0.24
    max: 0.42
  packet_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  packet_kx:
    sample: uniform
    min: 9.5
    max: 12.5
  packet_ky:
    sample: uniform
    min: -0.8
    max: 0.8
  junction_barrier_amplitude:
    sample: uniform
    min: 1.8
    max: 3.2
  junction_barrier_sigma:
    sample: uniform
    min: 0.08
    max: 0.13
  junction_barrier_center_x:
    sample: uniform
    min: 0.92
    max: 1.12
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:junction_barrier_amplitude"
      sigma: "param:junction_barrier_sigma"
      center: ["param:junction_barrier_center_x", 0.0]
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length: "param:inlet_length"
  branch_length: "param:branch_length"
  branch_angle_degrees: "param:branch_angle_degrees"
  channel_width: "param:channel_width"
  mesh_size: "param:mesh_size"
time:
  dt: 0.0022
  t_end: 0.92
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_y_bifurcation
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_y_bifurcation
output:
  $ref: output.template.schrodinger
  resolution: [208, 160]
  num_frames: 77
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
