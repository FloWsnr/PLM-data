preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.026
    max: 0.04
  theta: 0.5
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  left_center_x:
    sample: uniform
    min: 0.27
    max: 0.33
  right_center_x:
    sample: uniform
    min: 0.68
    max: 0.74
  lobe_radius:
    sample: uniform
    min: 0.21
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.1
    max: 0.15
  mesh_size:
    sample: uniform
    min: 0.013
    max: 0.018
  packet_amplitude:
    sample: uniform
    min: 0.88
    max: 1.08
  packet_sigma:
    sample: uniform
    min: 0.05
    max: 0.075
  packet_center_x:
    sample: uniform
    min: 0.72
    max: 0.82
  packet_center_y:
    sample: uniform
    min: 0.6
    max: 0.72
  packet_kx:
    sample: uniform
    min: -11.5
    max: -8.0
  packet_ky:
    sample: uniform
    min: -6.0
    max: -3.5
  capture_well_amplitude:
    sample: uniform
    min: -2.5
    max: -1.4
  capture_well_sigma:
    sample: uniform
    min: 0.09
    max: 0.14
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:capture_well_amplitude"
      sigma: "param:capture_well_sigma"
      center: [0.28, "param:center_y"]
domain:
  allow_sampling: true
  type: dumbbell
  left_center: ["param:left_center_x", "param:center_y"]
  right_center: ["param:right_center_x", "param:center_y"]
  lobe_radius: "param:lobe_radius"
  neck_width: "param:neck_width"
  mesh_size: "param:mesh_size"
time:
  dt: 0.0025
  t_end: 0.95
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
output:
  $ref: output.template.schrodinger
  resolution: [192, 160]
  num_frames: 77
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
