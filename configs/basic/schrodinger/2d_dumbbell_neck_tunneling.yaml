preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.035
    max: 0.05
  theta: 0.5
  center_y:
    sample: uniform
    min: 0.47
    max: 0.53
  left_center_x:
    sample: uniform
    min: 0.28
    max: 0.33
  right_center_x:
    sample: uniform
    min: 0.67
    max: 0.72
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.11
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.013
    max: 0.017
  packet_amplitude:
    sample: uniform
    min: 0.9
    max: 1.1
  packet_sigma:
    sample: uniform
    min: 0.045
    max: 0.07
  packet_center_x:
    sample: uniform
    min: 0.16
    max: 0.26
  packet_center_y:
    sample: uniform
    min: 0.44
    max: 0.56
  packet_kx:
    sample: uniform
    min: 9.5
    max: 13.0
  packet_ky:
    sample: uniform
    min: -1.0
    max: 1.0
  neck_barrier_amplitude:
    sample: uniform
    min: 1.8
    max: 3.2
  neck_barrier_sigma:
    sample: uniform
    min: 0.05
    max: 0.08
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:neck_barrier_amplitude"
      sigma: "param:neck_barrier_sigma"
      center: [0.5, "param:center_y"]
domain:
  allow_sampling: true
  type: dumbbell
  left_center: ["param:left_center_x", "param:center_y"]
  right_center: ["param:right_center_x", "param:center_y"]
  lobe_radius: "param:lobe_radius"
  neck_width: "param:neck_width"
  mesh_size: "param:mesh_size"
time:
  dt: 0.002
  t_end: 0.78
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_outer
output:
  $ref: output.template.schrodinger
  resolution: [192, 160]
  num_frames: 67
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
