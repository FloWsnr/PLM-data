preset: schrodinger
parameters:
  D:
    sample: uniform
    min: 0.036
    max: 0.052
  theta: 0.5
  channel_length:
    sample: uniform
    min: 2.2
    max: 2.8
  channel_height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.36
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.48
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.025
  packet_amplitude:
    sample: uniform
    min: 0.88
    max: 1.08
  packet_sigma:
    sample: uniform
    min: 0.05
    max: 0.075
  packet_center_x:
    sample: uniform
    min: 0.28
    max: 0.52
  packet_center_y:
    sample: uniform
    min: 0.36
    max: 0.48
  packet_kx:
    sample: uniform
    min: 9.0
    max: 12.0
  packet_ky:
    sample: uniform
    min: -0.6
    max: 0.6
  cavity_well_amplitude:
    sample: uniform
    min: -2.4
    max: -1.2
  cavity_well_sigma:
    sample: uniform
    min: 0.1
    max: 0.18
  cavity_well_center_y:
    sample: uniform
    min: 0.84
    max: 0.94
coefficients:
  potential:
    type: gaussian_bump
    params:
      amplitude: "param:cavity_well_amplitude"
      sigma: "param:cavity_well_sigma"
      center: ["param:cavity_center_x", "param:cavity_well_center_y"]
domain:
  allow_sampling: true
  type: side_cavity_channel
  length: "param:channel_length"
  height: "param:channel_height"
  cavity_width: "param:cavity_width"
  cavity_depth: "param:cavity_depth"
  cavity_center_x: "param:cavity_center_x"
  mesh_size: "param:mesh_size"
time:
  dt: 0.0022
  t_end: 0.92
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: 0.0
  v:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude: "param:packet_amplitude"
        sigma: "param:packet_sigma"
        center: ["param:packet_center_x", "param:packet_center_y"]
        wavevector: ["param:packet_kx", "param:packet_ky"]
        phase: -1.5707963267948966
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_side_cavity_channel
  v:
    $ref: boundary_field.scalar.homogeneous_dirichlet_side_cavity_channel
output:
  $ref: output.template.schrodinger
  resolution: [224, 144]
  num_frames: 77
solver:
  $ref: solver.profile.constant_lhs_block_direct
seed: 42
