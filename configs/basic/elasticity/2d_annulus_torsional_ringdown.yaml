preset: elasticity
parameters:
  domain_center_x:
    sample: uniform
    min: -0.06
    max: 0.06
  domain_center_y:
    sample: uniform
    min: -0.06
    max: 0.06
  young_modulus:
    sample: uniform
    min: 4.0
    max: 5.2
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.31
  density:
    sample: uniform
    min: 1.0
    max: 1.3
  eta_mass:
    sample: uniform
    min: 0.008
    max: 0.013
  eta_stiffness:
    sample: uniform
    min: 0.00045
    max: 0.0008
domain:
  type: annulus
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.22
    max: 0.29
  outer_radius:
    sample: uniform
    min: 0.99
    max: 1.09
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.034
time:
  dt: 0.004
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.04
                max: 0.08
              cycles: [1.0, 1.0]
              phase:
                sample: uniform
                min: -1.2
                max: 1.2
              angle:
                sample: uniform
                min: 0.0
                max: 1.57
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.08
                max: -0.04
              cycles: [1.0, 1.0]
              phase:
                sample: uniform
                min: 0.5
                max: 2.0
              angle:
                sample: uniform
                min: 0.0
                max: 1.57
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -1.35
              max: -0.65
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.65
              max: 1.35
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inner:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    outer:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 128
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
