preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.0
    max: 5.2
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.31
  density:
    sample: uniform
    min: 1.0
    max: 1.3
  eta_mass:
    sample: uniform
    min: 0.008
    max: 0.013
  eta_stiffness:
    sample: uniform
    min: 0.00045
    max: 0.0008
domain:
  type: annulus
  inner_radius: 0.25
  outer_radius: 1.05
  mesh_size: 0.03
time:
  dt: 0.004
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -1.2
              max: -0.8
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.8
              max: 1.2
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inner:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    outer:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 128
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
