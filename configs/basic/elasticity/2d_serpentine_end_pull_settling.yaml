preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 3.6
    max: 5.0
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.35
  density:
    sample: uniform
    min: 0.92
    max: 1.14
  eta_mass:
    sample: uniform
    min: 0.014
    max: 0.024
  eta_stiffness:
    sample: uniform
    min: 0.0009
    max: 0.0018
domain:
  type: serpentine_channel
  allow_sampling: true
  channel_length:
    sample: uniform
    min: 0.88
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.34
    max: 0.48
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.15
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0045
  t_end: 1.35
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.045
                max: -0.01
          y:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.04
                max: 0.08
              y:
                sample: uniform
                min: -0.05
                max: 0.05
    walls:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [160, 224]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
