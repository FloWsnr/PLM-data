preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 5.2
    max: 6.9
  poisson_ratio:
    sample: uniform
    min: 0.27
    max: 0.34
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.016
    max: 0.024
  eta_stiffness:
    sample: uniform
    min: 0.0015
    max: 0.0025
domain:
  type: box
  size:
  - 2.0
  - 0.4
  - 0.4
  mesh_resolution:
  - 28
  - 8
  - 8
time:
  dt: 0.008
  t_end: 0.6
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.15
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            center:
            - sample: uniform
              min: 1.39
              max: 1.71
            - sample: uniform
              min: 0.05
              max: 0.35
            - sample: uniform
              min: 0.05
              max: 0.35
        z:
          type: constant
          params:
            value: 0.0
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
      - 0.0
    y-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
      - 0.0
    y+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
      - 0.0
    z-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
      - 0.0
    z+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 64
  - 16
  - 16
  num_frames: 18
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
