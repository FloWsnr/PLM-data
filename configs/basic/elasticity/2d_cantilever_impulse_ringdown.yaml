preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 6.0
    max: 8.2
  poisson_ratio:
    sample: uniform
    min: 0.28
    max: 0.34
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.009
    max: 0.015
  eta_stiffness:
    sample: uniform
    min: 0.001
    max: 0.0019
domain:
  type: rectangle
  size:
  - 2.4
  - 0.45
  mesh_resolution:
  - 120
  - 30
time:
  dt: 0.0035
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 1.2
              max: 1.9
            sigma:
              sample: uniform
              min: 0.07
              max: 0.12
            center:
            - sample: uniform
              min: 1.8
              max: 2.18
            - sample: uniform
              min: 0.22
              max: 0.37
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 192
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
