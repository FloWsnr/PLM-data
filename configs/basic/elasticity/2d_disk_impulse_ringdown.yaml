preset: elasticity
parameters:
  domain_center_x:
    sample: uniform
    min: -0.06
    max: 0.06
  domain_center_y:
    sample: uniform
    min: -0.06
    max: 0.06
  young_modulus:
    sample: uniform
    min: 5.2
    max: 6.9
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.33
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.011
    max: 0.017
  eta_stiffness:
    sample: uniform
    min: 0.0009
    max: 0.0015
domain:
  type: disk
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.94
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.032
    max: 0.038
time:
  dt: 0.0035
  t_end: 0.95
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 1.1
              max: 1.8
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            center:
            - sample: uniform
              min: 0.35
              max: 0.7
            - sample: uniform
              min: 0.35
              max: 0.7
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    $ref: boundary_field.vector.homogeneous_dirichlet_outer
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 128
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
