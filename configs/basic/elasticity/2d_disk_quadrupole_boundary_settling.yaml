preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 6.4
    max: 8.8
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.34
  density:
    sample: uniform
    min: 0.88
    max: 1.12
  eta_mass:
    sample: uniform
    min: 0.005
    max: 0.01
  eta_stiffness:
    sample: uniform
    min: 0.0002
    max: 0.00065
domain:
  type: disk
  center: [0.0, 0.0]
  radius: 1.0
  mesh_size: 0.032
time:
  dt: 0.0035
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              x:
                sample: uniform
                min: 0.055
                max: 0.12
              y:
                sample: uniform
                min: -0.03
                max: 0.03
          y:
            type: affine
            params:
              x:
                sample: uniform
                min: -0.03
                max: 0.03
              y:
                sample: uniform
                min: -0.12
                max: -0.055
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [128, 128]
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
