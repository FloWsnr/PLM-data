preset: elasticity
parameters:
  young_modulus: 7.5
  poisson_ratio: 0.29
  density: 1.0
  eta_mass: 0.007
  eta_stiffness: 0.0004
domain:
  type: disk
  center: [0.0, 0.0]
  radius: 1.0
  mesh_size: 0.032
time:
  dt: 0.0035
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              x: 0.09
          y:
            type: affine
            params:
              y: -0.09
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [128, 128]
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
