preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 6.6
    max: 8.5
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.33
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.0055
    max: 0.009
  eta_stiffness:
    sample: uniform
    min: 0.00025
    max: 0.0006
domain:
  type: disk
  center: [0.0, 0.0]
  radius: 1.0
  mesh_size: 0.032
time:
  dt: 0.0035
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              x:
                sample: uniform
                min: 0.06
                max: 0.11
          y:
            type: affine
            params:
              y:
                sample: uniform
                min: -0.11
                max: -0.06
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [128, 128]
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
