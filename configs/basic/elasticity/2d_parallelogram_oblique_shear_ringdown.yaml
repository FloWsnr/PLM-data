preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 5.7
    max: 7.5
  poisson_ratio:
    sample: uniform
    min: 0.18
    max: 0.27
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.008
    max: 0.013
  eta_stiffness:
    sample: uniform
    min: 0.0007
    max: 0.0013
domain:
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.4, 0.0]
  axis_y: [0.45, 1.0]
  mesh_resolution: [96, 64]
time:
  dt: 0.0035
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.65
                max: 1.05
              sigma:
                sample: uniform
                min: 0.09
                max: 0.15
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.22
                max: 0.48
              - sample: uniform
                min: 0.12
                max: 0.32
            - count: 1
              amplitude:
                sample: uniform
                min: -0.9
                max: -0.45
              sigma:
                sample: uniform
                min: 0.11
                max: 0.18
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 1.1
                max: 1.34
              - sample: uniform
                min: 0.7
                max: 0.9
        y:
          type: constant
          params:
            value: 0.0
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 160
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
