preset: elasticity
parameters:
  young_modulus: 6.5
  poisson_ratio: 0.22
  density: 1.0
  eta_mass: 0.01
  eta_stiffness: 0.001
domain:
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.4, 0.0]
  axis_y: [0.45, 1.0]
  mesh_resolution: [96, 64]
time:
  dt: 0.0035
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude: 0.9
              sigma: 0.12
              aspect_ratio: 1.0
              center: [0.35, 0.22]
            - count: 1
              amplitude: -0.7
              sigma: 0.15
              aspect_ratio: 1.0
              center: [1.25, 0.82]
        y:
          type: constant
          params:
            value: 0.0
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 160
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
