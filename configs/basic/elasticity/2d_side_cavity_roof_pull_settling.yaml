preset: elasticity
parameters:
  cavity_center_x:
    sample: uniform
    min: 0.95
    max: 1.55
  young_modulus:
    sample: uniform
    min: 3.2
    max: 4.6
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.35
  density:
    sample: uniform
    min: 0.92
    max: 1.15
  eta_mass:
    sample: uniform
    min: 0.008
    max: 0.015
  eta_stiffness:
    sample: uniform
    min: 0.0005
    max: 0.0012
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.25
    max: 2.85
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.58
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.52
  cavity_center_x: "param:cavity_center_x"
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0045
  t_end: 1.35
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value:
        components:
          x:
            type: gaussian_bump
            params:
              amplitude:
                sample: uniform
                min: -0.04
                max: 0.04
              sigma:
                sample: uniform
                min: 0.06
                max: 0.1
              center: ["param:cavity_center_x", 0.88]
          y:
            type: gaussian_bump
            params:
              amplitude:
                sample: uniform
                min: 0.16
                max: 0.28
              sigma:
                sample: uniform
                min: 0.05
                max: 0.09
              center: ["param:cavity_center_x", 0.88]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 144]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
