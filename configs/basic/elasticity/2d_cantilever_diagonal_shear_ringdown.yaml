preset: elasticity
parameters:
  young_modulus: 8.5
  poisson_ratio: 0.24
  density: 0.9
  eta_mass: 0.006
  eta_stiffness: 0.0008
domain:
  type: rectangle
  size:
  - 2.0
  - 0.5
  mesh_resolution:
  - 120
  - 32
time:
  dt: 0.003
  t_end: 0.9
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: -0.9
            sigma: 0.08
            center:
            - 1.65
            - 0.36
        y:
          type: gaussian_bump
          params:
            amplitude: 1.2
            sigma: 0.1
            center:
            - 1.52
            - 0.16
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 192
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
