preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 7.4
    max: 9.8
  poisson_ratio:
    sample: uniform
    min: 0.2
    max: 0.28
  density:
    sample: uniform
    min: 0.82
    max: 0.98
  eta_mass:
    sample: uniform
    min: 0.0045
    max: 0.0075
  eta_stiffness:
    sample: uniform
    min: 0.0006
    max: 0.001
domain:
  type: rectangle
  size:
  - 2.0
  - 0.5
  mesh_resolution:
  - 120
  - 32
time:
  dt: 0.003
  t_end: 0.9
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -1.1
              max: -0.6
            sigma:
              sample: uniform
              min: 0.06
              max: 0.11
            center:
            - sample: uniform
              min: 1.45
              max: 1.78
            - sample: uniform
              min: 0.28
              max: 0.42
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.9
              max: 1.5
            sigma:
              sample: uniform
              min: 0.08
              max: 0.13
            center:
            - sample: uniform
              min: 1.35
              max: 1.68
            - sample: uniform
              min: 0.1
              max: 0.24
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 192
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
