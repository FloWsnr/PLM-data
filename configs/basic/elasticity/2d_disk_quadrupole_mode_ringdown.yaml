preset: elasticity
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  young_modulus:
    sample: uniform
    min: 4.3
    max: 5.8
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.32
  density:
    sample: uniform
    min: 0.95
    max: 1.2
  eta_mass:
    sample: uniform
    min: 0.008
    max: 0.013
  eta_stiffness:
    sample: uniform
    min: 0.00055
    max: 0.0011
domain:
  type: disk
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.95
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.032
    max: 0.038
time:
  dt: 0.0035
  t_end: 1.0
inputs:
  displacement:
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.045
                max: 0.065
              cycles: [1.0, 1.0]
              phase:
                sample: uniform
                min: -0.5
                max: 0.5
              angle:
                sample: uniform
                min: 0.55
                max: 1.05
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.065
                max: -0.045
              cycles: [1.0, 1.0]
              phase:
                sample: uniform
                min: 1.05
                max: 2.1
              angle:
                sample: uniform
                min: 0.55
                max: 1.05
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 128
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
