preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 5.2
    max: 7.2
  poisson_ratio:
    sample: uniform
    min: 0.22
    max: 0.31
  density:
    sample: uniform
    min: 0.92
    max: 1.12
  eta_mass:
    sample: uniform
    min: 0.007
    max: 0.013
  eta_stiffness:
    sample: uniform
    min: 0.00035
    max: 0.00085
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.35
  height:
    sample: uniform
    min: 0.94
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.3
    max: 0.48
  constriction_center_x:
    sample: uniform
    min: 0.9
    max: 1.2
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.65
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0038
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.3
                max: 0.65
              sigma:
                sample: uniform
                min: 0.05
                max: 0.08
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.72
                max: 0.98
              - sample: uniform
                min: 0.32
                max: 0.68
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.85
                max: 1.35
              sigma:
                sample: uniform
                min: 0.05
                max: 0.085
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.76
                max: 1.02
              - sample: uniform
                min: 0.58
                max: 0.76
            - count: 1
              amplitude:
                sample: uniform
                min: -1.35
                max: -0.85
              sigma:
                sample: uniform
                min: 0.05
                max: 0.085
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.76
                max: 1.02
              - sample: uniform
                min: 0.18
                max: 0.42
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [224, 128]
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
