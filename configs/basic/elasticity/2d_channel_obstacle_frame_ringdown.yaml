preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 6.0
    max: 8.1
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.33
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.006
    max: 0.011
  eta_stiffness:
    sample: uniform
    min: 0.0004
    max: 0.0009
domain:
  type: channel_obstacle
  length: 2.4
  height: 1.0
  obstacle_center: [1.2, 0.5]
  obstacle_radius: 0.22
  mesh_size: 0.035
time:
  dt: 0.0035
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.3
                max: 0.6
              sigma:
                sample: uniform
                min: 0.07
                max: 0.12
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.7
              center:
              - sample: uniform
                min: 0.9
                max: 1.0
              - sample: uniform
                min: 0.44
                max: 0.56
            - count: 1
              amplitude:
                sample: uniform
                min: -0.6
                max: -0.3
              sigma:
                sample: uniform
                min: 0.07
                max: 0.12
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.7
              center:
              - sample: uniform
                min: 1.4
                max: 1.5
              - sample: uniform
                min: 0.44
                max: 0.56
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 1.0
                max: 1.5
              sigma:
                sample: uniform
                min: 0.07
                max: 0.11
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.7
              center:
              - sample: uniform
                min: 1.15
                max: 1.25
              - sample: uniform
                min: 0.72
                max: 0.82
            - count: 1
              amplitude:
                sample: uniform
                min: -1.5
                max: -1.0
              sigma:
                sample: uniform
                min: 0.07
                max: 0.11
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.7
              center:
              - sample: uniform
                min: 1.15
                max: 1.25
              - sample: uniform
                min: 0.18
                max: 0.28
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    outlet:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    walls:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    obstacle:
    - operator: neumann
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 192
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
