preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 3.2
    max: 4.5
  poisson_ratio:
    sample: uniform
    min: 0.3
    max: 0.38
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.014
    max: 0.022
  eta_stiffness:
    sample: uniform
    min: 0.0011
    max: 0.0019
domain:
  type: dumbbell
  left_center: [-0.65, 0.0]
  right_center: [0.65, 0.0]
  lobe_radius: 0.42
  neck_width: 0.22
  mesh_size: 0.03
time:
  dt: 0.004
  t_end: 1.2
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 1.1
              max: 1.8
            sigma:
              sample: uniform
              min: 0.06
              max: 0.11
            center:
            - sample: uniform
              min: -0.78
              max: -0.52
            - sample: uniform
              min: 0.08
              max: 0.24
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 160
  - 128
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
