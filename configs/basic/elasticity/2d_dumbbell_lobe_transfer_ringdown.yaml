preset: elasticity
parameters:
  young_modulus: 3.8
  poisson_ratio: 0.34
  density: 1.0
  eta_mass: 0.018
  eta_stiffness: 0.0015
domain:
  type: dumbbell
  left_center: [-0.65, 0.0]
  right_center: [0.65, 0.0]
  lobe_radius: 0.42
  neck_width: 0.22
  mesh_size: 0.03
time:
  dt: 0.004
  t_end: 1.2
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: gaussian_bump
          params:
            amplitude: 1.5
            sigma: 0.08
            center:
            - -0.65
            - 0.18
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 160
  - 128
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
