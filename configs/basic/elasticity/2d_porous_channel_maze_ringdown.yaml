preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.6
    max: 6.0
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.33
  density:
    sample: uniform
    min: 0.95
    max: 1.18
  eta_mass:
    sample: uniform
    min: 0.007
    max: 0.012
  eta_stiffness:
    sample: uniform
    min: 0.00045
    max: 0.0009
domain:
  type: porous_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.45
    max: 2.75
  height:
    sample: uniform
    min: 0.95
    max: 1.06
  obstacle_radius:
    sample: uniform
    min: 0.07
    max: 0.1
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.24
    max: 0.28
  x_margin:
    sample: uniform
    min: 0.18
    max: 0.26
  y_margin:
    sample: uniform
    min: 0.1
    max: 0.14
  row_shift_fraction:
    sample: uniform
    min: 0.25
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.004
  t_end: 1.2
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.35
                max: 0.75
              sigma:
                sample: uniform
                min: 0.05
                max: 0.085
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.32
                max: 0.62
              - sample: uniform
                min: 0.24
                max: 0.76
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.9
                max: 1.45
              sigma:
                sample: uniform
                min: 0.05
                max: 0.085
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.7
              center:
              - sample: uniform
                min: 0.36
                max: 0.7
              - sample: uniform
                min: 0.32
                max: 0.78
            - count: 1
              amplitude:
                sample: uniform
                min: -0.7
                max: -0.25
              sigma:
                sample: uniform
                min: 0.045
                max: 0.075
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.6
              center:
              - sample: uniform
                min: 1.18
                max: 1.7
              - sample: uniform
                min: 0.22
                max: 0.74
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: neumann
      value: [0.0, 0.0]
    obstacles:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [224, 128]
  num_frames: 42
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
