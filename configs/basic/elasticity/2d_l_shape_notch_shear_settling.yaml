preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 3.6
    max: 5.0
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.35
  density:
    sample: uniform
    min: 0.9
    max: 1.15
  eta_mass:
    sample: uniform
    min: 0.014
    max: 0.024
  eta_stiffness:
    sample: uniform
    min: 0.0009
    max: 0.0017
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 1.04
    max: 1.22
  outer_height:
    sample: uniform
    min: 0.96
    max: 1.18
  cutout_width:
    sample: uniform
    min: 0.3
    max: 0.42
  cutout_height:
    sample: uniform
    min: 0.42
    max: 0.58
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.032
time:
  dt: 0.0045
  t_end: 1.3
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    notch:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.02
                max: 0.06
              y:
                sample: uniform
                min: -0.08
                max: -0.03
          y:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.06
                max: 0.12
              x:
                sample: uniform
                min: 0.02
                max: 0.06
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [176, 176]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
