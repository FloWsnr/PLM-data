preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 3.8
    max: 5.2
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.35
  density:
    sample: uniform
    min: 0.95
    max: 1.15
  eta_mass:
    sample: uniform
    min: 0.014
    max: 0.023
  eta_stiffness:
    sample: uniform
    min: 0.001
    max: 0.0018
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.12
  branch_length:
    sample: uniform
    min: 0.82
    max: 1.08
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 0.19
    max: 0.27
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0045
  t_end: 1.3
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet_upper:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.025
                max: 0.065
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.05
                max: 0.1
    outlet_lower:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.025
                max: 0.065
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.1
                max: -0.05
    walls:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 144]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
