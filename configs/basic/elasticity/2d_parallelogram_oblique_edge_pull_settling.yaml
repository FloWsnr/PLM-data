preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 5.2
    max: 7.5
  poisson_ratio:
    sample: uniform
    min: 0.18
    max: 0.29
  density:
    sample: uniform
    min: 0.88
    max: 1.12
  eta_mass:
    sample: uniform
    min: 0.0065
    max: 0.0135
  eta_stiffness:
    sample: uniform
    min: 0.0005
    max: 0.0012
domain:
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.35, 0.0]
  axis_y: [0.38, 0.95]
  mesh_resolution: [104, 72]
time:
  dt: 0.0035
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value: [0.0, 0.0]
    x+:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.055
                max: 0.125
              y:
                sample: uniform
                min: -0.02
                max: 0.02
          y:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.025
                max: 0.09
              y:
                sample: uniform
                min: -0.015
                max: 0.015
    y-:
    - operator: neumann
      value: [0.0, 0.0]
    y+:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [160, 128]
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
