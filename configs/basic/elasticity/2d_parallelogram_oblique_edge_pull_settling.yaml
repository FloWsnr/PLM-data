preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 5.4
    max: 7.2
  poisson_ratio:
    sample: uniform
    min: 0.2
    max: 0.28
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.007
    max: 0.012
  eta_stiffness:
    sample: uniform
    min: 0.00055
    max: 0.0011
domain:
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.35, 0.0]
  axis_y: [0.38, 0.95]
  mesh_resolution: [104, 72]
time:
  dt: 0.0035
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: dirichlet
      value: [0.0, 0.0]
    x+:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.06
                max: 0.12
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.03
                max: 0.08
    y-:
    - operator: neumann
      value: [0.0, 0.0]
    y+:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [160, 128]
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
