preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 5.0
    max: 6.8
  poisson_ratio:
    sample: uniform
    min: 0.22
    max: 0.31
  density:
    sample: uniform
    min: 0.92
    max: 1.12
  eta_mass:
    sample: uniform
    min: 0.006
    max: 0.012
  eta_stiffness:
    sample: uniform
    min: 0.0003
    max: 0.00075
domain:
  type: airfoil_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.4
    max: 2.8
  height:
    sample: uniform
    min: 1.0
    max: 1.15
  airfoil_center:
  - sample: uniform
    min: 1.05
    max: 1.35
  - sample: uniform
    min: 0.48
    max: 0.66
  chord_length:
    sample: uniform
    min: 0.52
    max: 0.64
  thickness_ratio:
    sample: uniform
    min: 0.1
    max: 0.16
  attack_angle_degrees:
    sample: uniform
    min: -10.0
    max: 10.0
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0038
  t_end: 1.15
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.28
                max: 0.65
              sigma:
                sample: uniform
                min: 0.05
                max: 0.08
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.36
                max: 0.66
              - sample: uniform
                min: 0.34
                max: 0.78
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.9
                max: 1.45
              sigma:
                sample: uniform
                min: 0.05
                max: 0.085
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.34
                max: 0.62
              - sample: uniform
                min: 0.46
                max: 0.82
            - count: 1
              amplitude:
                sample: uniform
                min: -0.75
                max: -0.28
              sigma:
                sample: uniform
                min: 0.045
                max: 0.075
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.6
              center:
              - sample: uniform
                min: 1.5
                max: 2.0
              - sample: uniform
                min: 0.28
                max: 0.74
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: neumann
      value: [0.0, 0.0]
    airfoil:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [224, 128]
  num_frames: 42
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
