preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.0
    max: 5.6
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.35
  density:
    sample: uniform
    min: 0.92
    max: 1.14
  eta_mass:
    sample: uniform
    min: 0.015
    max: 0.024
  eta_stiffness:
    sample: uniform
    min: 0.0009
    max: 0.0017
domain:
  type: multi_hole_plate
  allow_sampling: true
  width:
    sample: uniform
    min: 1.14
    max: 1.28
  height:
    sample: uniform
    min: 0.84
    max: 0.98
  holes:
  - center:
    - sample: uniform
      min: 0.24
      max: 0.32
    - sample: uniform
      min: 0.22
      max: 0.34
    radius:
      sample: uniform
      min: 0.055
      max: 0.08
    boundary_name: left_holes
  - center:
    - sample: uniform
      min: 0.34
      max: 0.46
    - sample: uniform
      min: 0.58
      max: 0.72
    radius:
      sample: uniform
      min: 0.05
      max: 0.075
    boundary_name: left_holes
  - center:
    - sample: uniform
      min: 0.58
      max: 0.7
    - sample: uniform
      min: 0.42
      max: 0.58
    radius:
      sample: uniform
      min: 0.055
      max: 0.08
    boundary_name: center_hole
  - center:
    - sample: uniform
      min: 0.86
      max: 0.96
    - sample: uniform
      min: 0.24
      max: 0.38
    radius:
      sample: uniform
      min: 0.05
      max: 0.075
    boundary_name: right_holes
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.031
time:
  dt: 0.0045
  t_end: 1.3
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    left_holes:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.015
                max: 0.015
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.045
                max: 0.085
    center_hole:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.018
                max: 0.045
              y:
                sample: uniform
                min: -0.035
                max: 0.035
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.015
                max: 0.015
    right_holes:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.015
                max: 0.015
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.085
                max: -0.045
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 144]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
