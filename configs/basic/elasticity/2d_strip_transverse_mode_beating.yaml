preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.8
    max: 6.4
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.32
  density:
    sample: uniform
    min: 1.35
    max: 1.8
  eta_mass:
    sample: uniform
    min: 0.008
    max: 0.013
  eta_stiffness:
    sample: uniform
    min: 0.00035
    max: 0.00075
domain:
  type: rectangle
  size:
  - 1.6
  - 0.6
  mesh_resolution:
  - 112
  - 48
time:
  dt: 0.004
  t_end: 1.3
inputs:
  displacement:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.04
                max: 0.06
              cycles: [0.625, 1.6666666666666667]
              phase:
                sample: uniform
                min: -0.6
                max: 0.6
              angle: 0.0
            - amplitude:
                sample: uniform
                min: 0.018
                max: 0.032
              cycles: [1.875, 1.6666666666666667]
              phase:
                sample: uniform
                min: -0.9
                max: 0.9
              angle: 0.0
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    y+:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 192
  - 128
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
