preset: elasticity
parameters:
  young_modulus: 5.5
  poisson_ratio: 0.28
  density: 1.6
  eta_mass: 0.01
  eta_stiffness: 0.0005
domain:
  type: rectangle
  size:
  - 1.6
  - 0.6
  mesh_resolution:
  - 112
  - 48
time:
  dt: 0.004
  t_end: 1.3
inputs:
  displacement:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude: 0.05
              cycles: [0.625, 1.6666666666666667]
              phase: 0.0
              angle: 0.0
            - amplitude: 0.025
              cycles: [1.875, 1.6666666666666667]
              phase: 0.0
              angle: 0.0
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    x+:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    y-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    y+:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 192
  - 128
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
