preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.8
    max: 6.4
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.33
  density:
    sample: uniform
    min: 0.95
    max: 1.2
  eta_mass:
    sample: uniform
    min: 0.006
    max: 0.012
  eta_stiffness:
    sample: uniform
    min: 0.00035
    max: 0.0008
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 1.0
    max: 1.18
  outer_height:
    sample: uniform
    min: 1.0
    max: 1.18
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.48
  cutout_height:
    sample: uniform
    min: 0.32
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.032
time:
  dt: 0.004
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: -0.65
                max: -0.25
              sigma:
                sample: uniform
                min: 0.05
                max: 0.08
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.8
              center:
              - sample: uniform
                min: 0.54
                max: 0.74
              - sample: uniform
                min: 0.42
                max: 0.6
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.95
                max: 1.45
              sigma:
                sample: uniform
                min: 0.05
                max: 0.08
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.7
              center:
              - sample: uniform
                min: 0.52
                max: 0.72
              - sample: uniform
                min: 0.42
                max: 0.62
            - count: 1
              amplitude:
                sample: uniform
                min: -0.45
                max: -0.12
              sigma:
                sample: uniform
                min: 0.05
                max: 0.075
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.6
              center:
              - sample: uniform
                min: 0.72
                max: 0.96
              - sample: uniform
                min: 0.1
                max: 0.22
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    notch:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [176, 176]
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
