preset: elasticity
parameters:
  domain_center_x:
    sample: uniform
    min: -0.06
    max: 0.06
  domain_center_y:
    sample: uniform
    min: -0.06
    max: 0.06
  young_modulus:
    sample: uniform
    min: 4.2
    max: 6.0
  poisson_ratio:
    sample: uniform
    min: 0.23
    max: 0.32
  density:
    sample: uniform
    min: 0.98
    max: 1.28
  eta_mass:
    sample: uniform
    min: 0.0065
    max: 0.0135
  eta_stiffness:
    sample: uniform
    min: 0.0003
    max: 0.0009
domain:
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius: 0.24
  outer_radius: 1.0
  mesh_size: 0.03
time:
  dt: 0.0035
  t_end: 1.2
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inner:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              x:
                sample: uniform
                min: -0.06
                max: 0.06
              y:
                sample: uniform
                min: -0.38
                max: -0.2
          y:
            type: affine
            params:
              x:
                sample: uniform
                min: 0.2
                max: 0.38
              y:
                sample: uniform
                min: -0.06
                max: 0.06
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [128, 128]
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
