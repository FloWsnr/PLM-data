preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.4
    max: 5.8
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.31
  density:
    sample: uniform
    min: 1.0
    max: 1.25
  eta_mass:
    sample: uniform
    min: 0.006
    max: 0.012
  eta_stiffness:
    sample: uniform
    min: 0.00035
    max: 0.0008
domain:
  type: annulus
  inner_radius: 0.24
  outer_radius: 1.0
  mesh_size: 0.03
time:
  dt: 0.0035
  t_end: 1.2
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inner:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              y:
                sample: uniform
                min: -0.34
                max: -0.22
          y:
            type: affine
            params:
              x:
                sample: uniform
                min: 0.22
                max: 0.34
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [128, 128]
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
