preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.0
    max: 5.4
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.35
  density:
    sample: uniform
    min: 0.92
    max: 1.15
  eta_mass:
    sample: uniform
    min: 0.015
    max: 0.025
  eta_stiffness:
    sample: uniform
    min: 0.0009
    max: 0.0018
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.02
    max: 2.4
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.28
    max: 0.44
  constriction_center_x:
    sample: uniform
    min: 0.88
    max: 1.24
  constriction_radius:
    sample: uniform
    min: 0.4
    max: 0.68
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.0045
  t_end: 1.3
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.045
                max: 0.095
          y:
            type: constant
            params:
              value: 0.0
    outlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.095
                max: -0.045
          y:
            type: constant
            params:
              value: 0.0
    walls:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [224, 128]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
