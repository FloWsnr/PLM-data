preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 6.3
    max: 8.3
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.32
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.008
    max: 0.013
  eta_stiffness:
    sample: uniform
    min: 0.00045
    max: 0.001
domain:
  type: channel_obstacle
  length: 2.4
  height: 1.0
  obstacle_center: [1.2, 0.5]
  obstacle_radius: 0.22
  mesh_size: 0.03
time:
  dt: 0.0035
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    obstacle:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.03
                max: 0.03
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.07
                max: 0.13
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 128]
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
