preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 6.1
    max: 8.5
  poisson_ratio:
    sample: uniform
    min: 0.23
    max: 0.33
  density:
    sample: uniform
    min: 0.88
    max: 1.12
  eta_mass:
    sample: uniform
    min: 0.0085
    max: 0.0145
  eta_stiffness:
    sample: uniform
    min: 0.0004
    max: 0.0011
domain:
  type: channel_obstacle
  length: 2.4
  height: 1.0
  obstacle_center: [1.2, 0.5]
  obstacle_radius: 0.22
  mesh_size: 0.03
time:
  dt: 0.0035
  t_end: 1.1
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    obstacle:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              constant:
                sample: uniform
                min: -0.05
                max: 0.05
              y:
                sample: uniform
                min: -0.02
                max: 0.02
          y:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.065
                max: 0.145
              x:
                sample: uniform
                min: -0.02
                max: 0.02
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 128]
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
