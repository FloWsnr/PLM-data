preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.8
    max: 6.4
  poisson_ratio:
    sample: uniform
    min: 0.22
    max: 0.31
  density:
    sample: uniform
    min: 0.92
    max: 1.16
  eta_mass:
    sample: uniform
    min: 0.007
    max: 0.012
  eta_stiffness:
    sample: uniform
    min: 0.00035
    max: 0.0008
domain:
  type: serpentine_channel
  allow_sampling: true
  channel_length:
    sample: uniform
    min: 0.88
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.48
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.004
  t_end: 1.25
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.45
              max: 0.9
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            center: [0.18, 0.0]
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.9
              max: 1.4
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            center: [0.22, 0.0]
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [160, 224]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
