preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.8
    max: 6.9
  poisson_ratio:
    sample: uniform
    min: 0.23
    max: 0.32
  density:
    sample: uniform
    min: 0.98
    max: 1.4
  eta_mass:
    sample: uniform
    min: 0.006
    max: 0.0125
  eta_stiffness:
    sample: uniform
    min: 0.0003
    max: 0.0008
domain:
  type: rectangle
  size: [1.8, 0.55]
  mesh_resolution: [120, 40]
time:
  dt: 0.0035
  t_end: 1.2
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: neumann
      value: [0.0, 0.0]
    x+:
    - operator: neumann
      value: [0.0, 0.0]
    y-:
    - operator: dirichlet
      value: [0.0, 0.0]
    y+:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: 0.0
          y:
            type: sine_waves
            params:
              background: 0.0
              modes:
              - amplitude:
                  sample: uniform
                  min: 0.06
                  max: 0.11
                cycles:
                - sample: uniform
                  min: 0.48
                  max: 0.68
                - 0.0
                phase:
                  sample: uniform
                  min: -0.65
                  max: 0.65
                angle: 0.0
              - amplitude:
                  sample: uniform
                  min: -0.05
                  max: -0.015
                cycles:
                - sample: uniform
                  min: 1.45
                  max: 1.95
                - 0.0
                phase:
                  sample: uniform
                  min: -1.0
                  max: 1.0
                angle: 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 128]
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
