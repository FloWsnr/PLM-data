preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 5.0
    max: 6.6
  poisson_ratio:
    sample: uniform
    min: 0.24
    max: 0.31
  density:
    sample: uniform
    min: 1.0
    max: 1.35
  eta_mass:
    sample: uniform
    min: 0.006
    max: 0.011
  eta_stiffness:
    sample: uniform
    min: 0.00035
    max: 0.0007
domain:
  type: rectangle
  size: [1.8, 0.55]
  mesh_resolution: [120, 40]
time:
  dt: 0.0035
  t_end: 1.2
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    x-:
    - operator: neumann
      value: [0.0, 0.0]
    x+:
    - operator: neumann
      value: [0.0, 0.0]
    y-:
    - operator: dirichlet
      value: [0.0, 0.0]
    y+:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: 0.0
          y:
            type: sine_waves
            params:
              background: 0.0
              modes:
              - amplitude:
                  sample: uniform
                  min: 0.065
                  max: 0.1
                cycles: [0.5555555555555556, 0.0]
                phase:
                  sample: uniform
                  min: -0.5
                  max: 0.5
                angle: 0.0
              - amplitude:
                  sample: uniform
                  min: -0.04
                  max: -0.02
                cycles: [1.6666666666666667, 0.0]
                phase:
                  sample: uniform
                  min: -0.75
                  max: 0.75
                angle: 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 128]
  num_frames: 40
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
