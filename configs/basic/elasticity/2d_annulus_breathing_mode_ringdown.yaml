preset: elasticity
parameters:
  young_modulus: 9.0
  poisson_ratio: 0.32
  density: 1.0
  eta_mass: 0.015
  eta_stiffness: 0.001
domain:
  type: annulus
  inner_radius: 0.35
  outer_radius: 1.0
  mesh_size: 0.03
time:
  dt: 0.003
  t_end: 0.8
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            x: 0.75
        y:
          type: affine
          params:
            y: 0.75
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inner:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    outer:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 128
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
