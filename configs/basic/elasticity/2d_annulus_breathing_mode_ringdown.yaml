preset: elasticity
parameters:
  domain_center_x:
    sample: uniform
    min: -0.06
    max: 0.06
  domain_center_y:
    sample: uniform
    min: -0.06
    max: 0.06
  young_modulus:
    sample: uniform
    min: 8.0
    max: 10.2
  poisson_ratio:
    sample: uniform
    min: 0.29
    max: 0.35
  density:
    sample: uniform
    min: 0.9
    max: 1.1
  eta_mass:
    sample: uniform
    min: 0.012
    max: 0.018
  eta_stiffness:
    sample: uniform
    min: 0.0008
    max: 0.0013
domain:
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius: 0.35
  outer_radius: 1.0
  mesh_size: 0.03
time:
  dt: 0.003
  t_end: 0.8
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.6
              max: 0.9
        y:
          type: affine
          params:
            y:
              sample: uniform
              min: 0.6
              max: 0.9
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inner:
    - operator: neumann
      value:
      - 0.0
      - 0.0
    outer:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution:
  - 128
  - 128
  num_frames: 36
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
