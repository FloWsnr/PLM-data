preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 4.0
    max: 5.4
  poisson_ratio:
    sample: uniform
    min: 0.25
    max: 0.35
  density:
    sample: uniform
    min: 0.9
    max: 1.14
  eta_mass:
    sample: uniform
    min: 0.014
    max: 0.023
  eta_stiffness:
    sample: uniform
    min: 0.00095
    max: 0.0017
domain:
  type: airfoil_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.35
    max: 2.85
  height:
    sample: uniform
    min: 0.94
    max: 1.12
  airfoil_center:
  - sample: uniform
    min: 0.95
    max: 1.35
  - sample: uniform
    min: 0.44
    max: 0.72
  chord_length:
    sample: uniform
    min: 0.48
    max: 0.62
  thickness_ratio:
    sample: uniform
    min: 0.08
    max: 0.14
  attack_angle_degrees:
    sample: uniform
    min: -14.0
    max: 14.0
  mesh_size:
    sample: uniform
    min: 0.027
    max: 0.034
time:
  dt: 0.0045
  t_end: 1.3
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: neumann
      value: [0.0, 0.0]
    airfoil:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              constant:
                sample: uniform
                min: -0.02
                max: 0.02
              y:
                sample: uniform
                min: -0.03
                max: 0.03
          y:
            type: affine
            params:
              constant:
                sample: uniform
                min: 0.05
                max: 0.1
              x:
                sample: uniform
                min: -0.03
                max: 0.03
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [224, 128]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
