preset: elasticity
parameters:
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  young_modulus:
    sample: uniform
    min: 4.6
    max: 6.0
  poisson_ratio:
    sample: uniform
    min: 0.23
    max: 0.32
  density:
    sample: uniform
    min: 0.94
    max: 1.18
  eta_mass:
    sample: uniform
    min: 0.007
    max: 0.012
  eta_stiffness:
    sample: uniform
    min: 0.0004
    max: 0.0009
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.25
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.5
  cavity_center_x: "param:cavity_center_x"
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.004
  t_end: 1.25
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.35
              max: 0.75
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            center: ["param:cavity_center_x", 0.88]
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count: 1
              amplitude:
                sample: uniform
                min: 0.95
                max: 1.45
              sigma:
                sample: uniform
                min: 0.05
                max: 0.08
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.6
              center: ["param:cavity_center_x", 0.88]
            - count: 1
              amplitude:
                sample: uniform
                min: -0.7
                max: -0.25
              sigma:
                sample: uniform
                min: 0.05
                max: 0.075
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 1.6
              center:
              - sample: uniform
                min: 1.58
                max: 2.12
              - sample: uniform
                min: 0.24
                max: 0.46
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [192, 144]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
