preset: elasticity
parameters:
  dumbbell_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  young_modulus:
    sample: uniform
    min: 3.8
    max: 5.2
  poisson_ratio:
    sample: uniform
    min: 0.28
    max: 0.37
  density:
    sample: uniform
    min: 0.9
    max: 1.15
  eta_mass:
    sample: uniform
    min: 0.012
    max: 0.02
  eta_stiffness:
    sample: uniform
    min: 0.0008
    max: 0.0015
domain:
  type: dumbbell
  allow_sampling: true
  left_center:
  - sample: uniform
    min: -0.76
    max: -0.62
  - "param:dumbbell_center_y"
  right_center:
  - sample: uniform
    min: 0.62
    max: 0.76
  - "param:dumbbell_center_y"
  lobe_radius:
    sample: uniform
    min: 0.38
    max: 0.46
  neck_width:
    sample: uniform
    min: 0.16
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.034
time:
  dt: 0.004
  t_end: 1.25
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    outer:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              constant:
                sample: uniform
                min: -0.01
                max: 0.01
              y:
                sample: uniform
                min: 0.12
                max: 0.18
          y:
            type: affine
            params:
              constant:
                sample: uniform
                min: -0.01
                max: 0.01
              x:
                sample: uniform
                min: -0.18
                max: -0.12
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [160, 128]
  num_frames: 42
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
