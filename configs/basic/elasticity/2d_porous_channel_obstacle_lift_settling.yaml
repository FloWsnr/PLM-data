preset: elasticity
parameters:
  young_modulus:
    sample: uniform
    min: 3.8
    max: 5.0
  poisson_ratio:
    sample: uniform
    min: 0.26
    max: 0.36
  density:
    sample: uniform
    min: 0.92
    max: 1.14
  eta_mass:
    sample: uniform
    min: 0.015
    max: 0.024
  eta_stiffness:
    sample: uniform
    min: 0.001
    max: 0.0018
domain:
  type: porous_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.55
    max: 2.75
  height:
    sample: uniform
    min: 0.95
    max: 1.06
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.26
    max: 0.28
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.32
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.0045
  t_end: 1.32
inputs:
  displacement:
    initial_condition:
      type: zero
      params: {}
  velocity:
    initial_condition:
      type: zero
      params: {}
  forcing:
    source:
      type: zero
      params: {}
boundary_conditions:
  displacement:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: neumann
      value: [0.0, 0.0]
    obstacles:
    - operator: dirichlet
      value:
        components:
          x:
            type: affine
            params:
              constant:
                sample: uniform
                min: -0.015
                max: 0.015
              y:
                sample: uniform
                min: -0.025
                max: 0.025
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.045
                max: 0.09
solver:
  $ref: solver.profile.constant_lhs_block_direct
output:
  resolution: [224, 128]
  num_frames: 44
  formats:
    $ref: output.formats.standard
  fields:
    displacement: components
    velocity: components
    von_mises: scalar
seed: 42
