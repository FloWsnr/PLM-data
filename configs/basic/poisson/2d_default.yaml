preset: poisson
parameters:
  kappa: 1.0
  f_amplitude: 10.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [64, 64]
inputs:
  u:
    source:
      type: sine_product
      params:
        amplitude: "param:f_amplitude"
        kx: 4
        ky: 3
boundary_conditions:
  u:
    x-:
      - operator: dirichlet
        value: 0.0
    x+:
      - operator: dirichlet
        value: 0.0
    y-:
      - operator: dirichlet
        value: 0.0
    y+:
      - operator: dirichlet
        value: 0.0
solver:
  strategy: stationary_scalar_spd
  serial:
    ksp_type: preonly
    pc_type: lu
  mpi:
    ksp_type: cg
    pc_type: hypre
    pc_hypre_type: boomeramg
    ksp_rtol: 1.0e-10
    ksp_error_if_not_converged: 1
output:
  resolution: [64, 64]
  num_frames: 1
  formats: [numpy, gif]
  fields:
    u: scalar
seed: 42
