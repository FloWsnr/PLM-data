preset: poisson
parameters:
  kappa: 1.0
  f_amplitude: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [16, 16, 16]
inputs:
  u:
    source:
      type: sine_product
      params:
        amplitude: "param:f_amplitude"
        kx: 1
        ky: 1
        kz: 1
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_3d
solver:
  $ref: solver.profile.stationary_scalar_spd
output:
  $ref: output.template.scalar_u
  resolution: [16, 16, 16]
  num_frames: 1
seed: 42
