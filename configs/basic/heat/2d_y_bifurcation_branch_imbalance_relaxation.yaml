preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.012
        max: 0.022
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.88
    max: 1.12
  branch_length:
    sample: uniform
    min: 0.78
    max: 1.08
  branch_angle_degrees:
    sample: uniform
    min: 30.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.28
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.01
  t_end: 1.5
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: -0.9
          max: -0.45
        value_right:
          sample: uniform
          min: 0.65
          max: 1.05
        x_split: 0.0
        axis: 1
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 49
seed: 42
