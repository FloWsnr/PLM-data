preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.004
        max: 0.01
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y:
    - sample: uniform
      min: 0.28
      max: 0.48
    - 1.0
  mesh_resolution: [144, 144]
time:
  dt: 0.01
  t_end: 1.6
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        modes:
          - amplitude:
              sample: uniform
              min: 0.7
              max: 0.95
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.4
              - sample: uniform
                min: 3.2
                max: 4.4
            phase:
              sample: uniform
              min: -0.4
              max: 0.4
            angle:
              sample: uniform
              min: 0.4
              max: 0.75
          - amplitude:
              sample: uniform
              min: 0.22
              max: 0.38
            cycles:
              - sample: uniform
                min: 2.2
                max: 3.2
              - sample: uniform
                min: 0.8
                max: 1.2
            phase:
              sample: uniform
              min: 0.5
              max: 1.2
            angle:
              sample: uniform
              min: -0.1
              max: 0.1
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 49
seed: 42
