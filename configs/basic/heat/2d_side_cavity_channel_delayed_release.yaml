preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.018
        max: 0.03
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.36
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.48
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.01
  t_end: 1.5
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.03
          max: 0.03
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.6
              max: 1.0
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center: [0.42, 0.34]
          - count: 1
            amplitude:
              sample: uniform
              min: 0.22
              max: 0.55
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center: [1.08, 0.56]
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.95
              max: 1.2
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.08
              max: 0.04
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 49
seed: 42
