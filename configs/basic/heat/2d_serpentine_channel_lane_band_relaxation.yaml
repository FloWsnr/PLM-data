preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.012
        max: 0.022
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 0.88
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.34
    max: 0.48
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.15
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.01
  t_end: 1.7
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        modes:
          - amplitude:
              sample: uniform
              min: 0.48
              max: 0.78
            cycles:
              - sample: uniform
                min: 1.1
                max: 1.7
              - sample: uniform
                min: 3.2
                max: 4.4
            phase:
              sample: uniform
              min: -0.7
              max: 0.7
            angle:
              sample: uniform
              min: -0.08
              max: 0.08
          - amplitude:
              sample: uniform
              min: -0.18
              max: -0.06
            cycles:
              - 0.0
              - sample: uniform
                min: 1.4
                max: 2.0
            phase:
              sample: uniform
              min: 0.2
              max: 1.2
            angle: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 224]
  num_frames: 49
seed: 42
