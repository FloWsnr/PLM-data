preset: heat
parameters: {}
coefficients:
  kappa:
    type: radial_cosine
    params:
      base: 0.05
      amplitude: 0.03
      frequency: 12.566370614359172
      center: [0.5, 0.5]
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [128, 128]
time:
  dt: 0.005
  t_end: 0.5
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 1.0
boundary_conditions:
  u:
    x-:
      - operator: dirichlet
        value: 0.0
    x+:
      - operator: dirichlet
        value: 0.0
    y-:
      - operator: dirichlet
        value: 0.0
    y+:
      - operator: dirichlet
        value: 0.0
solver:
  strategy: constant_lhs_scalar_spd
  serial:
    ksp_type: preonly
    pc_type: lu
  mpi:
    ksp_type: cg
    pc_type: hypre
    pc_hypre_type: boomeramg
    ksp_rtol: 1.0e-10
    ksp_error_if_not_converged: 1
output:
  resolution: [64, 64]
  num_frames: 20
  formats: [numpy, gif]
  fields:
    u: scalar
seed: 42
