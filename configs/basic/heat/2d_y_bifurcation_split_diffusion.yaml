preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value: 0.024
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.08
  branch_length:
    sample: uniform
    min: 0.82
    max: 0.98
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 0.2
    max: 0.26
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.01
  t_end: 1.2
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude: 0.9
            sigma: 0.11
            aspect_ratio: 1.15
            center: [0.34, 0.0]
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: 1.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: 0.0
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 49
seed: 42
