preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.006
        max: 0.014
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [144, 144]
time:
  dt: 0.008
  t_end: 1.2
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.8
              max: 1.25
            sigma:
              sample: uniform
              min: 0.05
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 0.18
                max: 0.42
              - sample: uniform
                min: 0.18
                max: 0.82
          - count: 1
            amplitude:
              sample: uniform
              min: 0.35
              max: 0.75
            sigma:
              sample: uniform
              min: 0.04
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 0.58
                max: 0.82
              - sample: uniform
                min: 0.18
                max: 0.82
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 41
seed: 42
