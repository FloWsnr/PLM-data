preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.018
        max: 0.032
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 1.02
    max: 1.22
  outer_height:
    sample: uniform
    min: 1.0
    max: 1.24
  cutout_width:
    sample: uniform
    min: 0.28
    max: 0.44
  cutout_height:
    sample: uniform
    min: 0.42
    max: 0.58
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.032
time:
  dt: 0.008
  t_end: 1.05
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.48
            max: 0.68
          - sample: uniform
            min: 0.38
            max: 0.62
        region_values:
          "00":
            sample: uniform
            min: 0.3
            max: 0.55
          "01":
            sample: uniform
            min: -0.25
            max: 0.02
          "10":
            sample: uniform
            min: -0.55
            max: -0.25
          "11":
            sample: uniform
            min: 0.05
            max: 0.3
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.65
              max: 0.95
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.95
              max: -0.55
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 49
seed: 42
