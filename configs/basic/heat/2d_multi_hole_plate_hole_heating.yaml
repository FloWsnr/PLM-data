preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.018
        max: 0.028
domain:
  allow_sampling: true
  type: multi_hole_plate
  width: 1.2
  height: 0.9
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.36
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.48
          max: 0.66
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
    - center:
        - sample: uniform
          min: 0.86
          max: 0.97
        - sample: uniform
          min: 0.22
          max: 0.36
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.032
time:
  dt: 0.008
  t_end: 0.96
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: 0.0
    holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.15
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 49
seed: 42
