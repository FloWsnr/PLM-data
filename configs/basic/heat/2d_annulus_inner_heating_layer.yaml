preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.018
        max: 0.036
domain:
  allow_sampling: true
  type: annulus
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.38
  outer_radius: 1.0
  mesh_size: 0.03
time:
  dt: 0.008
  t_end: 1.25
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.35
              max: 0.65
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: 0.42
                max: 0.68
              - sample: uniform
                min: -0.18
                max: 0.18
          - count: 1
            amplitude:
              sample: uniform
              min: -0.28
              max: -0.08
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: -0.58
                max: -0.24
              - sample: uniform
                min: 0.24
                max: 0.52
boundary_conditions:
  u:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.75
              max: 1.15
    outer:
      - operator: robin
        value:
          type: constant
          params:
            value: 0.0
        operator_parameters:
          alpha: 0.8
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 49
seed: 42
