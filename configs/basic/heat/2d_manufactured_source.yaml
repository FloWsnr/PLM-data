preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value: 0.1
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [128, 128]
time:
  dt: 0.02
  t_end: 2.0
inputs:
  u:
    source:
      type: cosine_product
      params:
        amplitude: 1.9739208802178716
        kx: 1.0
        ky: 1.0
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  resolution: [64, 64]
  num_frames: 20
seed: 42
