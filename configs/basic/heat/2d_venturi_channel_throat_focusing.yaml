preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.018
        max: 0.03
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.9
    max: 1.1
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.5
  constriction_center_x:
    sample: uniform
    min: 0.95
    max: 1.15
  constriction_radius:
    sample: uniform
    min: 0.4
    max: 0.65
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.01
  t_end: 1.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.6
              max: 0.95
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center: [0.42, 0.5]
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.96
              max: 1.18
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.06
              max: 0.04
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
seed: 42
