preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.018
        max: 0.03
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.45
    max: 2.75
  height:
    sample: uniform
    min: 0.95
    max: 1.06
  obstacle_radius:
    sample: uniform
    min: 0.07
    max: 0.1
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.24
    max: 0.28
  x_margin:
    sample: uniform
    min: 0.18
    max: 0.26
  y_margin:
    sample: uniform
    min: 0.1
    max: 0.14
  row_shift_fraction:
    sample: uniform
    min: 0.25
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.01
  t_end: 1.45
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.02
              max: 0.04
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.04
              max: 0.02
    walls:
      - operator: neumann
        value: 0.0
    obstacles:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.92
              max: 1.18
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 49
seed: 42
