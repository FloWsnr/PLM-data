preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.016
        max: 0.035
domain:
  type: disk
  center: [0.0, 0.0]
  radius: 1.0
  mesh_size: 0.028
time:
  dt: 0.008
  t_end: 1.2
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.45
          max: 0.7
        amplitude:
          sample: uniform
          min: 0.3
          max: 0.55
        frequency:
          sample: uniform
          min: 5.2
          max: 8.4
        center:
          - sample: uniform
            min: -0.12
            max: 0.12
          - sample: uniform
            min: -0.12
            max: 0.12
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.03
              max: 0.03
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 49
seed: 42
