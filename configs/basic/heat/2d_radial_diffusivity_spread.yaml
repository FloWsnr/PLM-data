preset: heat
parameters: {}
coefficients:
  kappa:
    type: radial_cosine
    params:
      base: 0.05
      amplitude: 0.03
      frequency: 12.566370614359172
      center:
      - 0.5
      - 0.5
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.005
  t_end: 0.8
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.5
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.425
            max: 0.575
          sigma:
            sample: uniform
            min: 0.096
            max: 0.144
          center:
          - sample: uniform
            min: 0.2
            max: 0.56
          - sample: uniform
            min: 0.44
            max: 0.8
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  resolution:
  - 64
  - 64
  num_frames: 24
seed: 42
