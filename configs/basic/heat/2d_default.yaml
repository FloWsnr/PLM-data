preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value: 0.01
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [128, 128]
time:
  $ref: time.unit_interval_dt_0p01
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_bump
      params:
        sigma: 0.1
        amplitude: 1.0
        center: [0.5, 0.5]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  resolution: [64, 64]
  num_frames: 20
seed: 42
