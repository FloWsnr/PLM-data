preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value: 0.04
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 96
  - 96
time:
  dt: 0.01
  t_end: 0.3
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 0.07
            max: 0.11
          center:
          - sample: uniform
            min: 0.245
            max: 0.515
          - sample: uniform
            min: 0.385
            max: 0.655
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: -0.5175
            max: -0.3825
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          center:
          - sample: uniform
            min: 0.575
            max: 0.785
          - sample: uniform
            min: 0.315
            max: 0.525
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
stochastic:
  states:
    u:
      coupling: additive
      intensity: 0.06
  coefficients:
    kappa:
      mode: multiplicative
      std: 0.35
      smoothing:
        pseudo_dt: 0.005
        steps: 3
      clamp_min: 0.01
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  resolution:
  - 96
  - 96
  num_frames: 25
seed: 42
