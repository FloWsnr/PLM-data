preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.022
        max: 0.05
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [144, 144]
time:
  dt: 0.008
  t_end: 0.7
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.08
          max: 0.08
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.15
            sigma:
              sample: uniform
              min: 0.05
              max: 0.09
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.16
                max: 0.46
              - sample: uniform
                min: 0.24
                max: 0.76
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: -0.75
              max: -0.35
            sigma:
              sample: uniform
              min: 0.05
              max: 0.09
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 0.54
                max: 0.84
              - sample: uniform
                min: 0.24
                max: 0.76
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
stochastic:
  states:
    u:
      coupling: additive
      intensity: 0.04
  coefficients:
    kappa:
      mode: multiplicative
      std: 0.42
      smoothing:
        pseudo_dt: 0.005
        steps: 3
      clamp_min: 0.006
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 45
seed: 42
