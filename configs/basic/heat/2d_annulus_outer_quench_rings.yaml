preset: heat
parameters:
  domain_center_x:
    sample: uniform
    min: -0.08
    max: 0.08
  domain_center_y:
    sample: uniform
    min: -0.08
    max: 0.08
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.02
        max: 0.038
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.24
    max: 0.34
  outer_radius:
    sample: uniform
    min: 0.9
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.034
time:
  dt: 0.008
  t_end: 1.3
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.04
          max: 0.14
        amplitude:
          sample: uniform
          min: 0.28
          max: 0.46
        frequency:
          sample: uniform
          min: 6.2
          max: 9.0
        center: ["param:domain_center_x", "param:domain_center_y"]
boundary_conditions:
  u:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.65
              max: -0.35
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.7
              max: 1.05
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 49
seed: 42
