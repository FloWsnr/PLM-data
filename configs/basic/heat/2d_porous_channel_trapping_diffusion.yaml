preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.014
        max: 0.028
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.75
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.26
    max: 0.28
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.32
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.026
    max: 0.034
time:
  dt: 0.01
  t_end: 1.5
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.03
          max: 0.03
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.65
              max: 1.0
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: 0.2
                max: 0.45
              - sample: uniform
                min: 0.22
                max: 0.78
          - count: 1
            amplitude:
              sample: uniform
              min: -0.32
              max: -0.14
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center:
              - sample: uniform
                min: 1.25
                max: 1.95
              - sample: uniform
                min: 0.2
                max: 0.8
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.95
              max: 1.25
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.12
              max: 0.05
    walls:
      - operator: neumann
        value: 0.0
    obstacles:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.22
              max: -0.04
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 49
seed: 42
