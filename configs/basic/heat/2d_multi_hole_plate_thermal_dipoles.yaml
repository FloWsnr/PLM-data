preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.015
        max: 0.026
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.14
    max: 1.28
  height:
    sample: uniform
    min: 0.84
    max: 0.96
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: hot_holes
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.48
          max: 0.62
      radius:
        sample: uniform
        min: 0.06
        max: 0.09
      boundary_name: cold_holes
    - center:
        - sample: uniform
          min: 0.86
          max: 0.96
        - sample: uniform
          min: 0.22
          max: 0.36
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: warm_holes
    - center:
        - sample: uniform
          min: 0.78
          max: 0.92
        - sample: uniform
          min: 0.62
          max: 0.74
      radius:
        sample: uniform
        min: 0.045
        max: 0.07
      boundary_name: hot_holes
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.031
time:
  dt: 0.008
  t_end: 1.02
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    outer:
      - operator: robin
        value:
          type: constant
          params:
            value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.55
            max: 0.9
    hot_holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.95
              max: 1.2
    cold_holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.95
              max: -0.65
    warm_holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.35
              max: 0.6
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 49
seed: 42
