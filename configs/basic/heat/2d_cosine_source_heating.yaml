preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.05
        max: 0.095
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [144, 144]
time:
  dt: 0.008
  t_end: 0.9
inputs:
  u:
    source:
      type: sine_waves
      params:
        background: 0.0
        modes:
          - amplitude:
              sample: uniform
              min: 0.75
              max: 1.05
            cycles: [2.0, 2.0]
            phase:
              sample: uniform
              min: -0.5
              max: 0.5
            angle:
              sample: uniform
              min: -0.2
              max: 0.2
          - amplitude:
              sample: uniform
              min: -0.4
              max: -0.22
            cycles: [4.0, 0.0]
            phase:
              sample: uniform
              min: 0.4
              max: 1.2
            angle:
              sample: uniform
              min: -0.15
              max: 0.15
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.34
            cycles: [0.0, 4.0]
            phase:
              sample: uniform
              min: -1.0
              max: 1.0
            angle:
              sample: uniform
              min: -0.15
              max: 0.15
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.42
            max: 0.58
          - sample: uniform
            min: 0.42
            max: 0.58
        region_values:
          "00":
            sample: uniform
            min: 0.18
            max: 0.34
          "01":
            sample: uniform
            min: -0.16
            max: 0.06
          "10":
            sample: uniform
            min: -0.32
            max: -0.12
          "11":
            sample: uniform
            min: 0.08
            max: 0.24
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_dirichlet_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 49
seed: 42
