preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value: 0.01
domain:
  type: box
  size:
  - 1.0
  - 1.0
  - 1.0
  mesh_resolution:
  - 32
  - 32
  - 32
time:
  $ref: time.unit_interval_dt_0p01
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 0.08
            max: 0.12
          center:
          - sample: uniform
            min: 0.35
            max: 0.65
          - sample: uniform
            min: 0.35
            max: 0.65
          - sample: uniform
            min: 0.35
            max: 0.65
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  resolution:
  - 64
  - 64
  - 64
  num_frames: 10
seed: 42
