preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value: 0.01
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [32, 32, 32]
time:
  dt: 0.01
  t_end: 1.0
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_bump
      params:
        sigma: 0.1
        amplitude: 1.0
        center: [0.5, 0.5, 0.5]
boundary_conditions:
  u:
    x-:
      - operator: neumann
        value: 0.0
    x+:
      - operator: neumann
        value: 0.0
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
    z-:
      - operator: neumann
        value: 0.0
    z+:
      - operator: neumann
        value: 0.0
solver:
  ksp_type: preonly
  pc_type: lu
output:
  resolution: [64, 64, 64]
  num_frames: 10
  formats: [numpy, gif]
  fields:
    u: scalar
seed: 42
