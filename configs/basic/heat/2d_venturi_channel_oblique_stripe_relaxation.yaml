preset: heat
parameters:
  stripe_angle:
    sample: uniform
    min: -0.35
    max: 0.35
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.016
        max: 0.028
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.02
    max: 2.42
  height:
    sample: uniform
    min: 0.88
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.26
    max: 0.46
  constriction_center_x:
    sample: uniform
    min: 0.88
    max: 1.24
  constriction_radius:
    sample: uniform
    min: 0.38
    max: 0.68
  mesh_size:
    sample: uniform
    min: 0.028
    max: 0.036
time:
  dt: 0.01
  t_end: 1.55
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        modes:
          - amplitude:
              sample: uniform
              min: 0.58
              max: 0.82
            cycles:
              - sample: uniform
                min: 1.5
                max: 2.1
              - sample: uniform
                min: 2.8
                max: 3.8
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle: "param:stripe_angle"
          - amplitude:
              sample: uniform
              min: -0.22
              max: -0.08
            cycles:
              - 0.0
              - sample: uniform
                min: 1.4
                max: 2.2
            phase:
              sample: uniform
              min: 0.4
              max: 1.4
            angle:
              sample: uniform
              min: -0.1
              max: 0.1
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
seed: 42
