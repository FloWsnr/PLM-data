preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.007
        max: 0.016
domain:
  allow_sampling: true
  type: dumbbell
  left_center: [0.28, 0.5]
  right_center: [0.72, 0.5]
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.255
  neck_width:
    sample: uniform
    min: 0.08
    max: 0.16
  mesh_size: 0.014
time:
  dt: 0.01
  t_end: 1.4
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.2
            sigma:
              sample: uniform
              min: 0.055
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.16
                max: 0.32
              - sample: uniform
                min: 0.36
                max: 0.64
          - count: 1
            amplitude:
              sample: uniform
              min: -0.5
              max: -0.2
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.68
                max: 0.82
              - sample: uniform
                min: 0.36
                max: 0.64
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 128]
  num_frames: 45
seed: 42
