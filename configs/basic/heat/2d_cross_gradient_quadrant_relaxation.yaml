preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.018
        max: 0.04
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [144, 144]
time:
  dt: 0.008
  t_end: 1.1
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.42
            max: 0.58
          - sample: uniform
            min: 0.38
            max: 0.62
        region_values:
          "00":
            sample: uniform
            min: 0.75
            max: 1.0
          "01":
            sample: uniform
            min: 0.35
            max: 0.65
          "10":
            sample: uniform
            min: -0.35
            max: -0.1
          "11":
            sample: uniform
            min: -0.1
            max: 0.2
boundary_conditions:
  u:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.8
              max: 1.05
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.12
              max: 0.08
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 45
seed: 42
