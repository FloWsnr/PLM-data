preset: heat
parameters: {}
coefficients:
  kappa:
    type: constant
    params:
      value: 0.022
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 0.96
    max: 1.12
  outer_height:
    sample: uniform
    min: 0.96
    max: 1.12
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.46
  mesh_size:
    sample: uniform
    min: 0.024
    max: 0.032
time:
  dt: 0.008
  t_end: 0.96
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: 1.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 49
seed: 42
