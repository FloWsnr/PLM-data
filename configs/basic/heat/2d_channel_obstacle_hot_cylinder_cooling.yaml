preset: heat
parameters:
  wall_exchange:
    sample: uniform
    min: 0.4
    max: 0.75
coefficients:
  kappa:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.017
        max: 0.03
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.05
    max: 2.35
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  obstacle_center:
    - sample: uniform
      min: 0.92
      max: 1.18
    - sample: uniform
      min: 0.34
      max: 0.66
  obstacle_radius:
    sample: uniform
    min: 0.12
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.032
    max: 0.038
time:
  dt: 0.01
  t_end: 1.5
inputs:
  u:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.06
              max: 0.04
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.04
              max: 0.06
    walls:
      - operator: robin
        value:
          type: constant
          params:
            value: 0.0
        operator_parameters:
          alpha: "param:wall_exchange"
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.95
              max: 1.25
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
seed: 42
