preset: compressible_euler
parameters:
  gamma: 1.4
  cfl: 0.45
  density_floor: 1.0e-06
  pressure_floor: 1.0e-06
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.01
  t_end: 1.0
inputs:
  density:
    initial_condition:
      type: sine_waves
      params:
        background: 1.0
        modes:
        - amplitude: 0.05
          cycles: [1.0, 0.0]
          phase: 0.0
          angle: 0.0
        - amplitude: 0.03
          cycles: [0.0, 2.0]
          phase: 1.5707963267948966
          angle: 0.0
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  pressure:
    initial_condition:
      type: sine_waves
      params:
        background: 1.0
        modes:
        - amplitude: 0.05
          cycles: [1.0, 0.0]
          phase: 0.0
          angle: 0.0
        - amplitude: 0.03
          cycles: [0.0, 2.0]
          phase: 1.5707963267948966
          angle: 0.0
boundary_conditions:
  state:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.transient_explicit
output:
  formats:
    $ref: output.formats.standard
  resolution:
  - 128
  - 128
  num_frames: 41
  fields:
    density:
      mode: scalar
    velocity:
      mode: components
    pressure:
      mode: scalar
    total_energy:
      mode: scalar
seed: 42
