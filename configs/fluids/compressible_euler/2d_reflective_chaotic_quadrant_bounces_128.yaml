preset: compressible_euler
parameters:
  gamma: 1.4
  cfl: 0.35
  density_floor: 1.0e-06
  pressure_floor: 1.0e-06
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.01
  t_end: 0.4
inputs:
  density:
    initial_condition:
      type: quadrants
      params:
        split: [0.46, 0.58]
        region_values:
          "00": 0.14
          "01": 0.62
          "10": 2.35
          "11": 1.35
  velocity:
    initial_condition:
      components:
        x:
          type: quadrants
          params:
            split: [0.46, 0.58]
            region_values:
              "00": 2.15
              "01": 0.45
              "10": -1.05
              "11": -0.35
        y:
          type: quadrants
          params:
            split: [0.46, 0.58]
            region_values:
              "00": 1.75
              "01": -1.05
              "10": 0.65
              "11": -0.55
  pressure:
    initial_condition:
      type: quadrants
      params:
        split: [0.46, 0.58]
        region_values:
          "00": 0.04
          "01": 1.25
          "10": 0.24
          "11": 2.3
boundary_conditions:
  state:
    $ref: boundary_field.scalar.reflective_2d
solver:
  $ref: solver.profile.transient_explicit
output:
  formats:
    $ref: output.formats.standard
  resolution:
  - 128
  - 128
  num_frames: 61
  fields:
    density:
      mode: scalar
    velocity:
      mode: components
    pressure:
      mode: scalar
    total_energy:
      mode: scalar
seed: 42
