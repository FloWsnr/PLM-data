preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.08
    max: 0.12
  porosity:
    sample: uniform
    min: 0.28
    max: 0.38
coefficients:
  mobility:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.17
        max: 0.23
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.05
      frequency:
        sample: uniform
        min: 7.0
        max: 10.0
      center:
        - sample: uniform
          min: 0.44
          max: 0.86
        - sample: uniform
          min: 0.24
          max: 0.7
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0007
        max: 0.0013
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.18
    max: 1.3
  height:
    sample: uniform
    min: 0.88
    max: 0.98
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 0.56
          max: 0.7
        - sample: uniform
          min: 0.44
          max: 0.62
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 0.88
          max: 1.0
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.005
  t_end: 0.95
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.42
            max: 0.64
          - sample: uniform
            min: 0.32
            max: 0.5
        region_values:
          "00":
            sample: uniform
            min: 0.06
            max: 0.16
          "01":
            sample: uniform
            min: 0.56
            max: 0.84
          "10":
            sample: uniform
            min: 0.22
            max: 0.42
          "11":
            sample: uniform
            min: 0.72
            max: 1.0
boundary_conditions:
  pressure:
    outer:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant:
              sample: uniform
              min: 0.55
              max: 0.72
            x:
              sample: uniform
              min: -0.72
              max: -0.54
            y:
              sample: uniform
              min: 0.12
              max: 0.24
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: neumann
        value: 0.0
    holes_right:
      - operator: neumann
        value: 0.0
  concentration:
    outer:
      - operator: dirichlet
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: dirichlet
        value: 0.0
    holes_right:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 45
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
