preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.17
    max: 0.25
  porosity:
    sample: uniform
    min: 0.38
    max: 0.54
  inlet_pressure:
    sample: uniform
    min: 0.92
    max: 1.12
  outlet_pressure:
    sample: uniform
    min: -0.04
    max: 0.06
coefficients:
  mobility:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.15
        max: 0.22
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0014
        max: 0.0022
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.25
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.58
  cavity_depth:
    sample: uniform
    min: 0.32
    max: 0.5
  cavity_center_x:
    sample: uniform
    min: 0.96
    max: 1.56
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.006
  t_end: 1.55
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.7
              max: 1.0
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: 0.94
                max: 1.54
              - sample: uniform
                min: 0.78
                max: 1.14
boundary_conditions:
  pressure:
    inlet:
      - operator: dirichlet
        value: param:inlet_pressure
    outlet:
      - operator: dirichlet
        value: param:outlet_pressure
    walls:
      - operator: neumann
        value: 0.0
  concentration:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [224, 144]
  num_frames: 49
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
