preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.08
    max: 0.12
  porosity:
    sample: uniform
    min: 0.28
    max: 0.36
  inlet_pressure:
    sample: uniform
    min: 0.96
    max: 1.18
  outlet_pressure:
    sample: uniform
    min: -0.08
    max: 0.04
coefficients:
  mobility:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.16
        max: 0.23
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.001
        max: 0.0016
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.005
  t_end: 1.15
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.82
          max: 1.08
        value_right: 0.0
        x_split:
          sample: uniform
          min: 0.18
          max: 0.32
        axis: 0
boundary_conditions:
  pressure:
    inlet:
      - operator: dirichlet
        value: param:inlet_pressure
    outlet:
      - operator: dirichlet
        value: param:outlet_pressure
    walls:
      - operator: neumann
        value: 0.0
  concentration:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [160, 224]
  num_frames: 45
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
