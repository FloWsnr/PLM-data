preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.28
    max: 0.4
  porosity:
    sample: uniform
    min: 0.58
    max: 0.74
  outer_pressure:
    sample: uniform
    min: 0.22
    max: 0.34
  center_hole_pressure:
    sample: uniform
    min: -0.14
    max: -0.04
coefficients:
  mobility:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.11
        max: 0.16
      value_right:
        sample: uniform
        min: 0.17
        max: 0.24
      x_split:
        sample: uniform
        min: 0.46
        max: 0.64
      axis: 0
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00055
        max: 0.001
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.18
    max: 1.3
  height:
    sample: uniform
    min: 0.88
    max: 0.98
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 0.56
          max: 0.7
        - sample: uniform
          min: 0.44
          max: 0.62
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 0.88
          max: 1.0
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.005
  t_end: 0.72
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.74
              max: 1.0
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.15
              max: 1.8
            center:
              - sample: uniform
                min: 0.18
                max: 0.38
              - sample: uniform
                min: 0.52
                max: 0.74
          - count: 1
            amplitude:
              sample: uniform
              min: 0.62
              max: 0.9
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.15
              max: 1.8
            center:
              - sample: uniform
                min: 0.48
                max: 0.72
              - sample: uniform
                min: 0.14
                max: 0.34
          - count: 1
            amplitude:
              sample: uniform
              min: 0.58
              max: 0.9
            sigma:
              sample: uniform
              min: 0.05
              max: 0.078
            aspect_ratio:
              sample: uniform
              min: 1.15
              max: 1.8
            center:
              - sample: uniform
                min: 0.78
                max: 0.98
              - sample: uniform
                min: 0.5
                max: 0.72
boundary_conditions:
  pressure:
    outer:
      - operator: dirichlet
        value: param:outer_pressure
    holes_left:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.08
              max: 0.18
    hole_center:
      - operator: dirichlet
        value: param:center_hole_pressure
    holes_right:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.06
              max: 0.16
  concentration:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: dirichlet
        value: 0.0
    holes_right:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 37
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
