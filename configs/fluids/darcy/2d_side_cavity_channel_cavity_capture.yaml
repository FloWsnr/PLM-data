preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.08
    max: 0.12
  porosity:
    sample: uniform
    min: 0.28
    max: 0.38
  inlet_pressure:
    sample: uniform
    min: 0.95
    max: 1.2
  outlet_pressure:
    sample: uniform
    min: -0.06
    max: 0.05
coefficients:
  mobility:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.17
        max: 0.23
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.05
      frequency:
        sample: uniform
        min: 6.0
        max: 9.0
      center:
        - sample: uniform
          min: 1.0
          max: 1.5
        - sample: uniform
          min: 0.68
          max: 1.08
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0012
        max: 0.0019
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.25
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.46
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.005
  t_end: 1.2
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.72
              max: 1.0
            sigma:
              sample: uniform
              min: 0.045
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.7
            center:
              - sample: uniform
                min: 0.24
                max: 0.56
              - sample: uniform
                min: 0.2
                max: 0.44
boundary_conditions:
  pressure:
    inlet:
      - operator: dirichlet
        value: param:inlet_pressure
    outlet:
      - operator: dirichlet
        value: param:outlet_pressure
    walls:
      - operator: neumann
        value: 0.0
  concentration:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [224, 144]
  num_frames: 49
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
