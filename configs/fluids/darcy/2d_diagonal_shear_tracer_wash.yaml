preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.16
    max: 0.24
  porosity:
    sample: uniform
    min: 0.4
    max: 0.54
  left_base:
    sample: uniform
    min: 0.9
    max: 1.12
  left_tilt:
    sample: uniform
    min: 0.12
    max: 0.24
  right_base:
    sample: uniform
    min: -0.06
    max: 0.08
  right_tilt:
    sample: uniform
    min: -0.24
    max: -0.1
  bottom_base:
    sample: uniform
    min: 0.36
    max: 0.52
  bottom_tilt:
    sample: uniform
    min: -0.18
    max: -0.06
  top_base:
    sample: uniform
    min: 0.12
    max: 0.28
  top_tilt:
    sample: uniform
    min: 0.04
    max: 0.12
coefficients:
  mobility:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.16
        max: 0.22
      amplitude:
        sample: uniform
        min: 0.05
        max: 0.08
      frequency:
        sample: uniform
        min: 5.5
        max: 8.5
      center:
        - sample: uniform
          min: 0.78
          max: 1.22
        - sample: uniform
          min: 0.28
          max: 1.02
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0014
        max: 0.0024
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 1.3
      max: 1.6
    - sample: uniform
      min: 1.15
      max: 1.45
  mesh_resolution: [128, 128]
time:
  dt: 0.005
  t_end: 1.2
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.48
            max: 0.78
          - sample: uniform
            min: 0.38
            max: 0.82
        region_values:
          "00":
            sample: uniform
            min: 0.02
            max: 0.14
          "01":
            sample: uniform
            min: 0.48
            max: 0.72
          "10":
            sample: uniform
            min: 0.18
            max: 0.34
          "11":
            sample: uniform
            min: 0.74
            max: 0.96
boundary_conditions:
  pressure:
    x-:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant: param:left_base
            y: param:left_tilt
    x+:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant: param:right_base
            y: param:right_tilt
    y-:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant: param:bottom_base
            x: param:bottom_tilt
    y+:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant: param:top_base
            x: param:top_tilt
  concentration:
    x-:
      - operator: neumann
        value: 0.0
    x+:
      - operator: neumann
        value: 0.0
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 45
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
