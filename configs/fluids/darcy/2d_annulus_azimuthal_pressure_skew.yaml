preset: darcy
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  storage:
    sample: uniform
    min: 0.22
    max: 0.32
  porosity:
    sample: uniform
    min: 0.42
    max: 0.56
coefficients:
  mobility:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.12
        max: 0.17
      amplitude:
        sample: uniform
        min: 0.025
        max: 0.045
      frequency:
        sample: uniform
        min: 8.0
        max: 12.0
      center: ["param:domain_center_x", "param:domain_center_y"]
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00055
        max: 0.001
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.3
    max: 0.4
  outer_radius:
    sample: uniform
    min: 0.94
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.023
time:
  dt: 0.005
  t_end: 0.85
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.72
              max: 0.98
            sigma:
              sample: uniform
              min: 0.065
              max: 0.095
            aspect_ratio:
              sample: uniform
              min: 1.25
              max: 1.95
            center:
              - sample: uniform
                min: 0.44
                max: 0.66
              - sample: uniform
                min: -0.12
                max: 0.16
          - count: 1
            amplitude:
              sample: uniform
              min: 0.56
              max: 0.86
            sigma:
              sample: uniform
              min: 0.06
              max: 0.09
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.9
            center:
              - sample: uniform
                min: -0.46
                max: -0.16
              - sample: uniform
                min: 0.26
                max: 0.56
          - count: 1
            amplitude:
              sample: uniform
              min: 0.56
              max: 0.86
            sigma:
              sample: uniform
              min: 0.06
              max: 0.09
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.9
            center:
              - sample: uniform
                min: -0.6
                max: -0.26
              - sample: uniform
                min: -0.6
                max: -0.3
          - count: 1
            amplitude:
              sample: uniform
              min: 0.48
              max: 0.76
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.85
            center:
              - sample: uniform
                min: -0.02
                max: 0.24
              - sample: uniform
                min: -0.7
                max: -0.42
boundary_conditions:
  pressure:
    inner:
      - operator: dirichlet
        value:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.55
                  max: 0.82
                cycles: [1.0, 0.0]
                phase:
                  sample: uniform
                  min: -0.2
                  max: 0.35
    outer:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant:
              sample: uniform
              min: -0.05
              max: 0.05
            x:
              sample: uniform
              min: -0.55
              max: -0.28
            y:
              sample: uniform
              min: 0.2
              max: 0.42
  concentration:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 41
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
