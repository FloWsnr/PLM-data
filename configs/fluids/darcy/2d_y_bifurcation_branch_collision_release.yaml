preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.16
    max: 0.24
  porosity:
    sample: uniform
    min: 0.44
    max: 0.62
  inlet_pressure:
    sample: uniform
    min: 0.04
    max: 0.14
  upper_pressure:
    sample: uniform
    min: 0.9
    max: 1.08
  lower_pressure:
    sample: uniform
    min: 0.78
    max: 0.96
coefficients:
  mobility:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.15
        max: 0.21
      value_right:
        sample: uniform
        min: 0.2
        max: 0.28
      x_split:
        sample: uniform
        min: -0.03
        max: 0.05
      axis: 1
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0016
        max: 0.0025
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.88
    max: 1.06
  branch_length:
    sample: uniform
    min: 0.84
    max: 1.05
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.006
  t_end: 1.55
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.76
              max: 1.02
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.05
              max: 1.6
            center:
              - sample: uniform
                min: 1.58
                max: 1.86
              - sample: uniform
                min: 0.34
                max: 0.62
          - count: 1
            amplitude:
              sample: uniform
              min: 0.52
              max: 0.78
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.05
              max: 1.6
            center:
              - sample: uniform
                min: 1.58
                max: 1.86
              - sample: uniform
                min: -0.62
                max: -0.34
boundary_conditions:
  pressure:
    inlet:
      - operator: dirichlet
        value: param:inlet_pressure
    outlet_upper:
      - operator: dirichlet
        value: param:upper_pressure
    outlet_lower:
      - operator: dirichlet
        value: param:lower_pressure
    walls:
      - operator: neumann
        value: 0.0
  concentration:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value: 0.0
    outlet_lower:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [224, 144]
  num_frames: 49
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
