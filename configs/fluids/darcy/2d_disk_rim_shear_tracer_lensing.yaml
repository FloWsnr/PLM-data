preset: darcy
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  storage:
    sample: uniform
    min: 0.12
    max: 0.18
  porosity:
    sample: uniform
    min: 0.26
    max: 0.36
coefficients:
  mobility:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.2
        max: 0.27
      amplitude:
        sample: uniform
        min: 0.04
        max: 0.06
      frequency:
        sample: uniform
        min: 5.5
        max: 7.5
      center:
        - sample: uniform
          min: -0.22
          max: 0.22
        - sample: uniform
          min: -0.22
          max: 0.22
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.00055
        max: 0.0011
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.94
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.023
time:
  dt: 0.005
  t_end: 0.9
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.56
              max: 0.82
            sigma:
              sample: uniform
              min: 0.045
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.6
            center:
              - sample: uniform
                min: -0.56
                max: -0.28
              - sample: uniform
                min: -0.12
                max: 0.16
          - count: 1
            amplitude:
              sample: uniform
              min: 0.46
              max: 0.74
            sigma:
              sample: uniform
              min: 0.045
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.6
            center:
              - sample: uniform
                min: -0.04
                max: 0.24
              - sample: uniform
                min: 0.28
                max: 0.56
          - count: 1
            amplitude:
              sample: uniform
              min: 0.46
              max: 0.74
            sigma:
              sample: uniform
              min: 0.045
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.6
            center:
              - sample: uniform
                min: 0.18
                max: 0.46
              - sample: uniform
                min: -0.48
                max: -0.22
boundary_conditions:
  pressure:
    outer:
      - operator: dirichlet
        value:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.45
                  max: 0.7
                cycles: [1.0, 0.0]
                phase:
                  sample: uniform
                  min: -0.4
                  max: 0.4
              - amplitude:
                  sample: uniform
                  min: 0.28
                  max: 0.46
                cycles: [0.0, 1.0]
                phase:
                  sample: uniform
                  min: 0.5
                  max: 1.1
  concentration:
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 45
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
