preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.16
    max: 0.24
  porosity:
    sample: uniform
    min: 0.44
    max: 0.62
  inlet_pressure:
    sample: uniform
    min: 0.04
    max: 0.14
  outlet_pressure:
    sample: uniform
    min: 0.86
    max: 1.04
coefficients:
  mobility:
    type: sine_waves
    params:
      background:
        sample: uniform
        min: 0.18
        max: 0.24
      modes:
        - amplitude:
            sample: uniform
            min: 0.02
            max: 0.04
          cycles:
            - sample: uniform
              min: 0.45
              max: 0.7
            - 0.0
          phase:
            sample: uniform
            min: 0.1
            max: 0.45
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0015
        max: 0.0023
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.006
  t_end: 1.55
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.78
              max: 1.04
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.8
            center:
              - sample: uniform
                min: 0.72
                max: 1.04
              - sample: uniform
                min: 0.7
                max: 1.6
boundary_conditions:
  pressure:
    inlet:
      - operator: dirichlet
        value: param:inlet_pressure
    outlet:
      - operator: dirichlet
        value: param:outlet_pressure
    walls:
      - operator: neumann
        value: 0.0
  concentration:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [160, 224]
  num_frames: 49
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
