preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.08
    max: 0.12
  porosity:
    sample: uniform
    min: 0.26
    max: 0.34
  inlet_pressure:
    sample: uniform
    min: 0.98
    max: 1.24
  outlet_pressure:
    sample: uniform
    min: -0.06
    max: 0.05
coefficients:
  mobility:
    type: sine_waves
    params:
      background:
        sample: uniform
        min: 0.2
        max: 0.26
      modes:
        - amplitude:
            sample: uniform
            min: 0.03
            max: 0.05
          cycles:
            - sample: uniform
              min: 0.45
              max: 0.7
            - 0.0
          phase:
            sample: uniform
            min: -0.1
            max: 0.3
        - amplitude:
            sample: uniform
            min: 0.02
            max: 0.04
          cycles:
            - 0.0
            - sample: uniform
              min: 2.0
              max: 2.8
          phase:
            sample: uniform
            min: 0.5
            max: 1.1
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0008
        max: 0.0013
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.8
  height:
    sample: uniform
    min: 0.96
    max: 1.08
  obstacle_radius:
    sample: uniform
    min: 0.082
    max: 0.104
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.24
    max: 0.29
  x_margin:
    sample: uniform
    min: 0.18
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.1
    max: 0.16
  row_shift_fraction:
    sample: uniform
    min: 0.3
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.005
  t_end: 1.2
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 2
            amplitude:
              sample: uniform
              min: 0.62
              max: 0.95
            sigma:
              sample: uniform
              min: 0.04
              max: 0.06
            aspect_ratio:
              sample: uniform
              min: 1.05
              max: 1.6
            center:
              - sample: uniform
                min: 0.12
                max: 0.34
              - sample: uniform
                min: 0.2
                max: 0.8
boundary_conditions:
  pressure:
    inlet:
      - operator: dirichlet
        value: param:inlet_pressure
    outlet:
      - operator: dirichlet
        value: param:outlet_pressure
    walls:
      - operator: neumann
        value: 0.0
    obstacles:
      - operator: neumann
        value: 0.0
  concentration:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacles:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 49
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
