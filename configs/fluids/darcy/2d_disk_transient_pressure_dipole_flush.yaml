preset: darcy
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  storage:
    sample: uniform
    min: 0.16
    max: 0.24
  porosity:
    sample: uniform
    min: 0.34
    max: 0.46
coefficients:
  mobility:
    type: step
    params:
      value_left:
        sample: uniform
        min: 0.1
        max: 0.15
      value_right:
        sample: uniform
        min: 0.18
        max: 0.26
      x_split:
        sample: uniform
        min: -0.05
        max: 0.08
      axis: 1
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0003
        max: 0.00065
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.9
    max: 1.04
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
time:
  dt: 0.005
  t_end: 0.55
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 1.1
              max: 1.5
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.8
            center:
              - sample: uniform
                min: -0.5
                max: -0.12
              - sample: uniform
                min: -0.22
                max: 0.22
          - count: 1
            amplitude:
              sample: uniform
              min: -1.5
              max: -1.1
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.8
            center:
              - sample: uniform
                min: 0.12
                max: 0.5
              - sample: uniform
                min: -0.22
                max: 0.22
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.78
              max: 1.02
            sigma:
              sample: uniform
              min: 0.06
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.15
              max: 1.8
            center:
              - sample: uniform
                min: -0.14
                max: 0.12
              - sample: uniform
                min: 0.12
                max: 0.32
          - count: 1
            amplitude:
              sample: uniform
              min: 0.68
              max: 0.94
            sigma:
              sample: uniform
              min: 0.055
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.15
              max: 1.8
            center:
              - sample: uniform
                min: -0.3
                max: 0.04
              - sample: uniform
                min: -0.34
                max: -0.1
          - count: 1
            amplitude:
              sample: uniform
              min: 0.56
              max: 0.86
            sigma:
              sample: uniform
              min: 0.05
              max: 0.078
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.7
            center:
              - sample: uniform
                min: 0.18
                max: 0.42
              - sample: uniform
                min: -0.08
                max: 0.16
boundary_conditions:
  pressure:
    outer:
      - operator: dirichlet
        value: 0.0
  concentration:
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 37
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
