preset: darcy
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  storage:
    sample: uniform
    min: 0.12
    max: 0.18
  porosity:
    sample: uniform
    min: 0.4
    max: 0.54
  inner_pressure:
    sample: uniform
    min: 0.78
    max: 0.98
  outer_pressure:
    sample: uniform
    min: 0.0
    max: 0.12
coefficients:
  mobility:
    type: radial_cosine
    params:
      base:
        sample: uniform
        min: 0.15
        max: 0.2
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.05
      frequency:
        sample: uniform
        min: 6.0
        max: 9.0
      center: ["param:domain_center_x", "param:domain_center_y"]
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0008
        max: 0.0014
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.38
  outer_radius:
    sample: uniform
    min: 0.94
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.023
time:
  dt: 0.005
  t_end: 0.9
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.36
          max: 0.5
        amplitude:
          sample: uniform
          min: 0.26
          max: 0.38
        frequency:
          sample: uniform
          min: 6.2
          max: 8.8
        center: ["param:domain_center_x", "param:domain_center_y"]
boundary_conditions:
  pressure:
    inner:
      - operator: dirichlet
        value: param:inner_pressure
    outer:
      - operator: dirichlet
        value: param:outer_pressure
  concentration:
    inner:
      - operator: dirichlet
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 45
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
