preset: darcy
parameters:
  storage:
    sample: uniform
    min: 0.08
    max: 0.12
  porosity:
    sample: uniform
    min: 0.28
    max: 0.36
  inlet_pressure:
    sample: uniform
    min: 1.02
    max: 1.24
  outlet_pressure:
    sample: uniform
    min: -0.08
    max: 0.04
coefficients:
  mobility:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.18
        max: 0.26
  dispersion:
    type: constant
    params:
      value:
        sample: uniform
        min: 0.0009
        max: 0.0014
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.35
    max: 2.7
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.28
    max: 0.42
  constriction_center_x:
    sample: uniform
    min: 1.06
    max: 1.42
  constriction_radius:
    sample: uniform
    min: 0.34
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.005
  t_end: 1.0
inputs:
  pressure:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 0.0
  concentration:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.76
              max: 1.02
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.9
            center:
              - sample: uniform
                min: 0.24
                max: 0.56
              - sample: uniform
                min: 0.28
                max: 0.72
boundary_conditions:
  pressure:
    inlet:
      - operator: dirichlet
        value: param:inlet_pressure
    outlet:
      - operator: dirichlet
        value: param:outlet_pressure
    walls:
      - operator: neumann
        value: 0.0
  concentration:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.darcy
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 45
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
seed: 42
