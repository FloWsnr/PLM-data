preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.05
  c_v:
    sample: uniform
    min: 1.55
    max: 1.96
  mu:
    sample: uniform
    min: 0.018
    max: 0.032
  bulk_viscosity:
    sample: uniform
    min: 0.008
    max: 0.018
  thermal_conductivity:
    sample: uniform
    min: 0.024
    max: 0.044
  k: 1.0
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  base_density:
    sample: uniform
    min: 0.97
    max: 1.05
  rim_temperature:
    sample: uniform
    min: 0.9
    max: 1.02
  pulse_center_x:
    sample: uniform
    min: -0.32
    max: -0.12
  pulse_center_y:
    sample: uniform
    min: 0.18
    max: 0.38
domain:
  type: disk
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.94
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0025
  t_end: 0.48
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_density
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.02
              max: 0.07
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.72
          max: 1.16
        sigma:
          sample: uniform
          min: 0.08
          max: 0.12
        center: ["param:pulse_center_x", "param:pulse_center_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:rim_temperature
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.34
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: -0.34
                max: -0.08
              - sample: uniform
                min: 0.12
                max: 0.42
boundary_conditions:
  density:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:rim_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
