preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.04
  c_v:
    sample: uniform
    min: 1.52
    max: 1.86
  mu:
    sample: uniform
    min: 0.01
    max: 0.02
  bulk_viscosity:
    sample: uniform
    min: 0.004
    max: 0.01
  thermal_conductivity:
    sample: uniform
    min: 0.014
    max: 0.026
  k: 1.0
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  base_density:
    sample: uniform
    min: 0.98
    max: 1.04
  inner_temperature:
    sample: uniform
    min: 1.0
    max: 1.12
  outer_temperature:
    sample: uniform
    min: 0.9
    max: 1.0
domain:
  type: annulus
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.3
    max: 0.38
  outer_radius:
    sample: uniform
    min: 0.94
    max: 1.04
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.003
  t_end: 0.96
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: param:base_density
        modes:
          - amplitude:
              sample: uniform
              min: 0.015
              max: 0.05
            cycles:
              - sample: uniform
                min: 2.2
                max: 4.0
              - sample: uniform
                min: 2.2
                max: 4.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: 0.0
              max: 1.57
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -0.76
              max: -0.48
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.48
              max: 0.76
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.94
          max: 1.08
        amplitude:
          sample: uniform
          min: 0.16
          max: 0.28
        frequency:
          sample: uniform
          min: 6.2
          max: 9.2
        center:
          - 0.0
          - 0.0
boundary_conditions:
  density:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    inner:
      - operator: dirichlet
        value: [0.0, 0.0]
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:inner_temperature
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:outer_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
