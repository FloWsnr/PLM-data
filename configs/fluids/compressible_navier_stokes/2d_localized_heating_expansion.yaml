preset: compressible_navier_stokes
parameters:
  gas_constant: 1.0
  c_v: 1.5
  mu: 0.03
  bulk_viscosity: 0.015
  thermal_conductivity: 0.04
  k: 1.0
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 32
  - 32
time:
  dt: 0.01
  t_end: 0.2
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: 1.0
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude: 2.5
        sigma: 0.1
        center:
        - 0.35
        - 0.5
    initial_condition:
      type: gaussian_blobs
      params:
        background: 1.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.2
            max: 0.4
          sigma:
            sample: uniform
            min: 0.08
            max: 0.12
          center:
          - sample: uniform
            min: 0.2
            max: 0.5
          - sample: uniform
            min: 0.35
            max: 0.65
boundary_conditions:
  density:
    x-:
    - operator: dirichlet
      value: 1.0
    x+:
    - operator: dirichlet
      value: 1.0
    y-:
    - operator: dirichlet
      value: 1.0
    y+:
    - operator: dirichlet
      value: 1.0
  velocity:
    $ref: boundary_field.vector.homogeneous_dirichlet_2d
  temperature:
    x-:
    - operator: dirichlet
      value: 1.0
    x+:
    - operator: dirichlet
      value: 1.0
    y-:
    - operator: dirichlet
      value: 1.0
    y+:
    - operator: dirichlet
      value: 1.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  resolution:
  - 96
  - 96
  num_frames: 24
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
