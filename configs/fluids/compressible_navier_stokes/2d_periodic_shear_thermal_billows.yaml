preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.06
  c_v:
    sample: uniform
    min: 1.55
    max: 1.9
  mu:
    sample: uniform
    min: 0.012
    max: 0.022
  bulk_viscosity:
    sample: uniform
    min: 0.004
    max: 0.012
  thermal_conductivity:
    sample: uniform
    min: 0.014
    max: 0.03
  k: 1.0
  base_density:
    sample: uniform
    min: 0.98
    max: 1.04
  lower_temperature:
    sample: uniform
    min: 1.05
    max: 1.26
  upper_temperature:
    sample: uniform
    min: 0.76
    max: 0.94
  lower_shear:
    sample: uniform
    min: 0.32
    max: 0.5
  upper_shear:
    sample: uniform
    min: -0.5
    max: -0.32
  interface_y:
    sample: uniform
    min: 0.44
    max: 0.56
domain:
  type: rectangle
  allow_sampling: true
  size:
    - sample: uniform
      min: 1.55
      max: 1.85
    - sample: uniform
      min: 0.92
      max: 1.08
  mesh_resolution: [224, 160]
time:
  dt: 0.002
  t_end: 0.55
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: param:base_density
        modes:
          - amplitude:
              sample: uniform
              min: 0.012
              max: 0.04
            cycles:
              - sample: uniform
                min: 1.6
                max: 3.0
              - sample: uniform
                min: 1.2
                max: 2.4
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: -0.16
              max: 0.16
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            axis: 1
            x_split: param:interface_y
            value_left: param:lower_shear
            value_right: param:upper_shear
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.025
                  max: 0.055
                cycles:
                  - sample: uniform
                    min: 2.0
                    max: 4.0
                  - sample: uniform
                    min: 0.8
                    max: 1.8
                phase:
                  sample: uniform
                  min: -0.6
                  max: 0.6
                angle:
                  sample: uniform
                  min: -0.1
                  max: 0.1
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.08
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.34
            cycles:
              - sample: uniform
                min: 1.2
                max: 2.4
              - sample: uniform
                min: 1.6
                max: 3.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: -0.18
              max: 0.18
          - amplitude:
              sample: uniform
              min: -0.12
              max: -0.04
            cycles:
              - sample: uniform
                min: 3.0
                max: 5.0
              - sample: uniform
                min: 0.8
                max: 1.6
            phase:
              sample: uniform
              min: -0.4
              max: 0.4
            angle:
              sample: uniform
              min: -0.08
              max: 0.08
boundary_conditions:
  density:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:lower_shear
            y:
              type: constant
              params:
                value: 0.0
    y+:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:upper_shear
            y:
              type: constant
              params:
                value: 0.0
  temperature:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:lower_temperature
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:upper_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
