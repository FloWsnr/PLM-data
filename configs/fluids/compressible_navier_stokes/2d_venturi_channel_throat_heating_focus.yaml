preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.04
  c_v:
    sample: uniform
    min: 1.56
    max: 1.9
  mu:
    sample: uniform
    min: 0.02
    max: 0.032
  bulk_viscosity:
    sample: uniform
    min: 0.008
    max: 0.016
  thermal_conductivity:
    sample: uniform
    min: 0.04
    max: 0.06
  k: 1.0
  base_density:
    sample: uniform
    min: 0.98
    max: 1.05
  inlet_temperature:
    sample: uniform
    min: 0.96
    max: 1.06
  wall_temperature:
    sample: uniform
    min: 0.98
    max: 1.04
  inlet_speed:
    sample: uniform
    min: 0.28
    max: 0.42
  throat_center_x:
    sample: uniform
    min: 0.9
    max: 1.2
  throat_heat_y:
    sample: uniform
    min: 0.46
    max: 0.54
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.4
  height:
    sample: uniform
    min: 0.9
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.38
    max: 0.5
  constriction_center_x: param:throat_center_x
  constriction_radius:
    sample: uniform
    min: 0.52
    max: 0.68
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.0018
  t_end: 0.32
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: param:base_density
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.08
          max: 0.22
        sigma:
          sample: uniform
          min: 0.05
          max: 0.08
        center: ["param:throat_center_x", "param:throat_heat_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_temperature
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.03
              max: 0.1
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 0.3
                max: 0.7
              - sample: uniform
                min: 0.22
                max: 0.78
boundary_conditions:
  density:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: 0.0
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:inlet_temperature
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:inlet_temperature
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
