preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.05
  c_v:
    sample: uniform
    min: 1.5
    max: 1.88
  mu:
    sample: uniform
    min: 0.012
    max: 0.024
  bulk_viscosity:
    sample: uniform
    min: 0.004
    max: 0.012
  thermal_conductivity:
    sample: uniform
    min: 0.014
    max: 0.028
  k: 1.0
  base_density:
    sample: uniform
    min: 0.98
    max: 1.05
  lower_temperature:
    sample: uniform
    min: 1.02
    max: 1.18
  upper_temperature:
    sample: uniform
    min: 0.78
    max: 0.94
  lower_shear:
    sample: uniform
    min: 0.28
    max: 0.46
  upper_shear:
    sample: uniform
    min: -0.46
    max: -0.28
  interface_y:
    sample: uniform
    min: 0.42
    max: 0.58
domain:
  type: parallelogram
  allow_sampling: true
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y:
    - sample: uniform
      min: 0.28
      max: 0.48
    - sample: uniform
      min: 0.92
      max: 1.08
  mesh_resolution: [192, 160]
time:
  dt: 0.0022
  t_end: 0.6
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: param:base_density
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            axis: 1
            x_split: param:interface_y
            value_left: param:lower_shear
            value_right: param:upper_shear
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.02
                  max: 0.05
                cycles:
                  - sample: uniform
                    min: 2.2
                    max: 4.2
                  - sample: uniform
                    min: 0.8
                    max: 1.6
                phase:
                  sample: uniform
                  min: -0.5
                  max: 0.5
                angle:
                  sample: uniform
                  min: 0.24
                  max: 0.56
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.9
          max: 1.06
        modes:
          - amplitude:
              sample: uniform
              min: 0.16
              max: 0.3
            cycles:
              - sample: uniform
                min: 1.1
                max: 2.2
              - sample: uniform
                min: 1.4
                max: 2.8
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: 0.24
              max: 0.6
boundary_conditions:
  density:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:lower_shear
            y:
              type: constant
              params:
                value: 0.0
    y+:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:upper_shear
            y:
              type: constant
              params:
                value: 0.0
  temperature:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:lower_temperature
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:upper_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
