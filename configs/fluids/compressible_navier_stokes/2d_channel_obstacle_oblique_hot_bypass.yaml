preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.04
  c_v:
    sample: uniform
    min: 1.56
    max: 1.9
  mu:
    sample: uniform
    min: 0.02
    max: 0.032
  bulk_viscosity:
    sample: uniform
    min: 0.008
    max: 0.016
  thermal_conductivity:
    sample: uniform
    min: 0.03
    max: 0.05
  k: 1.0
  base_density:
    sample: uniform
    min: 0.98
    max: 1.05
  inlet_temperature:
    sample: uniform
    min: 0.96
    max: 1.06
  wall_temperature:
    sample: uniform
    min: 0.96
    max: 1.02
  obstacle_temperature:
    sample: uniform
    min: 1.0
    max: 1.08
  inlet_speed:
    sample: uniform
    min: 0.28
    max: 0.4
  inlet_crossflow:
    sample: uniform
    min: 0.03
    max: 0.09
  obstacle_center_x:
    sample: uniform
    min: 0.74
    max: 0.92
  obstacle_center_y:
    sample: uniform
    min: 0.28
    max: 0.38
  pulse_center_x:
    sample: uniform
    min: 0.36
    max: 0.56
  pulse_center_y:
    sample: uniform
    min: 0.46
    max: 0.6
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 1.68
    max: 1.95
  height:
    sample: uniform
    min: 0.72
    max: 0.88
  obstacle_center: ["param:obstacle_center_x", "param:obstacle_center_y"]
  obstacle_radius:
    sample: uniform
    min: 0.06
    max: 0.09
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0016
  t_end: 0.36
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: param:base_density
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.28
        sigma:
          sample: uniform
          min: 0.045
          max: 0.075
        center: ["param:pulse_center_x", "param:pulse_center_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_temperature
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.05
              max: 0.14
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: param:inlet_crossflow
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
    obstacle:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:inlet_temperature
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:inlet_temperature
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:obstacle_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
