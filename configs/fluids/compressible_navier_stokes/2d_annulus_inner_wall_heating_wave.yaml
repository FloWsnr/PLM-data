preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.04
  c_v:
    sample: uniform
    min: 1.55
    max: 1.92
  mu:
    sample: uniform
    min: 0.014
    max: 0.026
  bulk_viscosity:
    sample: uniform
    min: 0.006
    max: 0.014
  thermal_conductivity:
    sample: uniform
    min: 0.02
    max: 0.038
  k: 1.0
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  base_density:
    sample: uniform
    min: 0.98
    max: 1.06
  inner_temperature:
    sample: uniform
    min: 1.18
    max: 1.38
  outer_temperature:
    sample: uniform
    min: 0.82
    max: 0.96
  pulse_center_x:
    sample: uniform
    min: 0.34
    max: 0.48
  pulse_center_y:
    sample: uniform
    min: -0.1
    max: 0.1
domain:
  type: annulus
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.36
  outer_radius:
    sample: uniform
    min: 0.94
    max: 1.04
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.003
  t_end: 0.72
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: param:base_density
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.34
          max: 0.72
        sigma:
          sample: uniform
          min: 0.06
          max: 0.1
        center: ["param:pulse_center_x", "param:pulse_center_y"]
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.96
          max: 1.08
        amplitude:
          sample: uniform
          min: 0.08
          max: 0.18
        frequency:
          sample: uniform
          min: 4.4
          max: 6.4
        center:
          - 0.0
          - 0.0
boundary_conditions:
  density:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    inner:
      - operator: dirichlet
        value: [0.0, 0.0]
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:inner_temperature
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:outer_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
