preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.05
  c_v:
    sample: uniform
    min: 1.55
    max: 1.98
  mu:
    sample: uniform
    min: 0.016
    max: 0.03
  bulk_viscosity:
    sample: uniform
    min: 0.006
    max: 0.016
  thermal_conductivity:
    sample: uniform
    min: 0.02
    max: 0.04
  k: 1.0
  base_density:
    sample: uniform
    min: 0.97
    max: 1.04
  wall_temperature:
    sample: uniform
    min: 0.9
    max: 1.02
  pulse_center_x:
    sample: uniform
    min: 0.18
    max: 0.34
  pulse_center_y:
    sample: uniform
    min: 0.58
    max: 0.82
  drift_x:
    sample: uniform
    min: 0.12
    max: 0.24
  drift_y:
    sample: uniform
    min: -0.3
    max: -0.12
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.16
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.16
  cutout_width:
    sample: uniform
    min: 0.32
    max: 0.44
  cutout_height:
    sample: uniform
    min: 0.32
    max: 0.44
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0026
  t_end: 0.66
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_density
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.02
              max: 0.08
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:drift_x
        y:
          type: constant
          params:
            value: param:drift_y
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.68
          max: 1.12
        sigma:
          sample: uniform
          min: 0.07
          max: 0.11
        center: ["param:pulse_center_x", "param:pulse_center_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:wall_temperature
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.32
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
    notch:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
