preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.04
  c_v:
    sample: uniform
    min: 1.5
    max: 1.86
  mu:
    sample: uniform
    min: 0.012
    max: 0.024
  bulk_viscosity:
    sample: uniform
    min: 0.004
    max: 0.012
  thermal_conductivity:
    sample: uniform
    min: 0.016
    max: 0.03
  k: 1.0
  base_density:
    sample: uniform
    min: 0.98
    max: 1.04
  outer_temperature:
    sample: uniform
    min: 1.0
    max: 1.12
  hole_temperature:
    sample: uniform
    min: 0.84
    max: 0.94
  drift_x:
    sample: uniform
    min: 0.1
    max: 0.2
domain:
  type: multi_hole_plate
  allow_sampling: true
  width:
    sample: uniform
    min: 1.16
    max: 1.28
  height:
    sample: uniform
    min: 0.88
    max: 0.96
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.46
          max: 0.62
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.88
          max: 0.98
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0026
  t_end: 0.58
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background: param:base_density
        modes:
          - amplitude:
              sample: uniform
              min: 0.02
              max: 0.06
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.6
              - sample: uniform
                min: 1.4
                max: 2.6
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: 0.24
              max: 0.56
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:drift_x
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: -0.16
              max: -0.06
            constant:
              sample: uniform
              min: 0.02
              max: 0.1
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.06
        modes:
          - amplitude:
              sample: uniform
              min: 0.16
              max: 0.28
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.6
              - sample: uniform
                min: 1.4
                max: 2.6
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: 0.24
              max: 0.56
boundary_conditions:
  density:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
    holes:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:outer_temperature
    holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:hole_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
