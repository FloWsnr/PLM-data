preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.04
  c_v:
    sample: uniform
    min: 1.52
    max: 1.86
  mu:
    sample: uniform
    min: 0.02
    max: 0.032
  bulk_viscosity:
    sample: uniform
    min: 0.008
    max: 0.016
  thermal_conductivity:
    sample: uniform
    min: 0.04
    max: 0.06
  k: 1.0
  base_density:
    sample: uniform
    min: 0.98
    max: 1.05
  inlet_temperature:
    sample: uniform
    min: 0.98
    max: 1.08
  upper_temperature:
    sample: uniform
    min: 0.96
    max: 1.0
  lower_temperature:
    sample: uniform
    min: 1.0
    max: 1.06
  wall_temperature:
    sample: uniform
    min: 0.98
    max: 1.04
  inlet_speed:
    sample: uniform
    min: 0.28
    max: 0.38
  inlet_crossflow:
    sample: uniform
    min: -0.05
    max: 0.05
  pulse_center_x:
    sample: uniform
    min: 0.36
    max: 0.54
  pulse_center_y:
    sample: uniform
    min: 0.08
    max: 0.18
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.88
    max: 1.1
  branch_length:
    sample: uniform
    min: 0.82
    max: 1.08
  branch_angle_degrees:
    sample: uniform
    min: 30.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 0.2
    max: 0.28
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.0022
  t_end: 0.24
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: constant
      params:
        value: param:base_density
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_temperature
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.06
              max: 0.14
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.4
              max: 2.2
            center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: param:inlet_crossflow
    outlet_upper:
      - operator: neumann
        value: [0.0, 0.0]
    outlet_lower:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:inlet_temperature
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:upper_temperature
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:lower_temperature
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
