preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.04
  c_v:
    sample: uniform
    min: 1.55
    max: 1.92
  mu:
    sample: uniform
    min: 0.014
    max: 0.026
  bulk_viscosity:
    sample: uniform
    min: 0.006
    max: 0.014
  thermal_conductivity:
    sample: uniform
    min: 0.018
    max: 0.034
  k: 1.0
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  base_density:
    sample: uniform
    min: 0.98
    max: 1.05
  wall_temperature:
    sample: uniform
    min: 0.92
    max: 1.04
  left_hot_x:
    sample: uniform
    min: 0.18
    max: 0.3
  left_hot_y:
    sample: uniform
    min: 0.42
    max: 0.58
  drift_x:
    sample: uniform
    min: 0.18
    max: 0.32
domain:
  type: dumbbell
  allow_sampling: true
  left_center:
    - sample: uniform
      min: 0.28
      max: 0.34
    - param:center_y
  right_center:
    - sample: uniform
      min: 0.66
      max: 0.72
    - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.26
  neck_width:
    sample: uniform
    min: 0.11
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.003
  t_end: 0.78
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_density
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.02
              max: 0.06
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center: ["param:left_hot_x", "param:left_hot_y"]
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:drift_x
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: -0.06
                  max: 0.06
                cycles:
                  - sample: uniform
                    min: 1.4
                    max: 2.6
                  - sample: uniform
                    min: 1.6
                    max: 2.8
                phase:
                  sample: uniform
                  min: -0.5
                  max: 0.5
                angle:
                  sample: uniform
                  min: -0.2
                  max: 0.2
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.52
          max: 0.92
        sigma:
          sample: uniform
          min: 0.06
          max: 0.1
        center: ["param:left_hot_x", "param:left_hot_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:wall_temperature
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.4
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.4
            center: ["param:left_hot_x", "param:left_hot_y"]
boundary_conditions:
  density:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
