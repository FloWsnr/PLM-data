preset: compressible_navier_stokes
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.06
  c_v:
    sample: uniform
    min: 1.6
    max: 2.02
  mu:
    sample: uniform
    min: 0.018
    max: 0.034
  bulk_viscosity:
    sample: uniform
    min: 0.008
    max: 0.018
  thermal_conductivity:
    sample: uniform
    min: 0.024
    max: 0.042
  k: 1.0
  base_density:
    sample: uniform
    min: 0.97
    max: 1.04
  wall_temperature:
    sample: uniform
    min: 0.9
    max: 1.02
  pulse_center_x:
    sample: uniform
    min: 0.18
    max: 0.34
  pulse_center_y:
    sample: uniform
    min: 0.58
    max: 0.8
  drift_x:
    sample: uniform
    min: 0.08
    max: 0.2
  drift_y:
    sample: uniform
    min: -0.26
    max: -0.08
domain:
  type: parallelogram
  allow_sampling: true
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y:
    - sample: uniform
      min: 0.24
      max: 0.42
    - sample: uniform
      min: 0.94
      max: 1.1
  mesh_resolution: [176, 160]
time:
  dt: 0.0024
  t_end: 0.42
inputs:
  density:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_density
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.02
              max: 0.07
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:drift_x
        y:
          type: constant
          params:
            value: param:drift_y
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.68
          max: 1.14
        sigma:
          sample: uniform
          min: 0.07
          max: 0.11
        center: ["param:pulse_center_x", "param:pulse_center_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:wall_temperature
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.14
              max: 0.34
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.16
                max: 0.4
              - sample: uniform
                min: 0.54
                max: 0.84
boundary_conditions:
  density:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:base_density
  velocity:
    $ref: boundary_field.vector.homogeneous_dirichlet_2d
  temperature:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:wall_temperature
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
