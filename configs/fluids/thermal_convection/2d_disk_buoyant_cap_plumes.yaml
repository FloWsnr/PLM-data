preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 70000.0
    max: 220000.0
  Pr:
    sample: uniform
    min: 0.9
    max: 3.0
  k: 1.0
domain:
  type: disk
  allow_sampling: true
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 0.96
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
time:
  dt: 0.018
  t_end: 6.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.1
          max: 0.1
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.35
              max: 0.68
            sigma:
              sample: uniform
              min: 0.12
              max: 0.18
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: -0.3
                max: 0.3
              - sample: uniform
                min: -0.72
                max: -0.36
          - count: 1
            amplitude:
              sample: uniform
              min: -0.4
              max: -0.16
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: -0.25
                max: 0.25
              - sample: uniform
                min: 0.28
                max: 0.68
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant:
              sample: uniform
              min: 0.24
              max: 0.46
            y:
              sample: uniform
              min: -1.05
              max: -0.8
output:
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
