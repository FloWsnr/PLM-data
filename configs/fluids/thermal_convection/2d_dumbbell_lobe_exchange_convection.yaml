preset: thermal_convection
parameters:
  center_y:
    sample: uniform
    min: 0.47
    max: 0.53
  Ra:
    sample: uniform
    min: 70000.0
    max: 240000.0
  Pr:
    sample: uniform
    min: 1.0
    max: 4.0
  k: 1.0
domain:
  type: dumbbell
  allow_sampling: true
  left_center: [0.28, "param:center_y"]
  right_center: [0.72, "param:center_y"]
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.08
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.018
  t_end: 7.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.18
          max: 0.34
        std:
          sample: uniform
          min: 0.08
          max: 0.16
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: step
          params:
            axis: 0
            x_split: 0.5
            value_left:
              sample: uniform
              min: 0.95
              max: 1.25
            value_right:
              sample: uniform
              min: -0.32
              max: 0.04
output:
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 45
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
