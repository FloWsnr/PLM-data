preset: thermal_convection
parameters:
  source_x:
    sample: uniform
    min: 0.82
    max: 0.98
  source_y:
    sample: uniform
    min: 0.34
    max: 0.54
  Ra:
    sample: uniform
    min: 80000.0
    max: 220000.0
  Pr:
    sample: uniform
    min: 1.0
    max: 3.8
  k: 1.0
domain:
  type: serpentine_channel
  allow_sampling: true
  channel_length:
    sample: uniform
    min: 0.88
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.34
    max: 0.48
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.018
  t_end: 6.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.95
          max: 1.42
        sigma:
          sample: uniform
          min: 0.06
          max: 0.1
        center: ["param:source_x", "param:source_y"]
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.06
          max: 0.06
        modes:
          - amplitude:
              sample: uniform
              min: 0.26
              max: 0.44
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.6
              - sample: uniform
                min: 1.8
                max: 2.6
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
            angle:
              sample: uniform
              min: -0.12
              max: 0.12
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.1
              max: 0.04
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.1
              max: 0.04
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.06
              max: 0.04
output:
  formats: [numpy, gif]
  resolution: [160, 224]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
