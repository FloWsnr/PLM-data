preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 55000.0
    max: 170000.0
  Pr:
    sample: uniform
    min: 2.2
    max: 6.2
  k: 1.0
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.9
    max: 1.08
  obstacle_center:
    - sample: uniform
      min: 1.0
      max: 1.24
    - sample: uniform
      min: 0.34
      max: 0.54
  obstacle_radius:
    sample: uniform
    min: 0.13
    max: 0.18
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.018
  t_end: 7.4
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.08
        modes:
          - amplitude:
              sample: uniform
              min: 0.38
              max: 0.65
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.8
              - sample: uniform
                min: 1.4
                max: 2.4
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: -0.35
              max: 0.35
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
    obstacle:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.62
              max: 0.92
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.35
              max: -0.05
    walls:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant:
              sample: uniform
              min: 0.28
              max: 0.46
            y:
              sample: uniform
              min: -0.95
              max: -0.68
    obstacle:
      - operator: neumann
        value: 0.0
output:
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 45
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
