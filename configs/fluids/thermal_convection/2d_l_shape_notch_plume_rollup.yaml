preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 60000.0
    max: 180000.0
  Pr:
    sample: uniform
    min: 1.2
    max: 4.5
  k: 1.0
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.16
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.16
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.48
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.018
  t_end: 6.9
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.08
          max: 0.22
        std:
          sample: uniform
          min: 0.08
          max: 0.16
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
    notch:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.25
              max: 0.02
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.95
              max: 1.28
output:
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
