preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 160000.0
    max: 460000.0
  Pr:
    sample: uniform
    min: 0.7
    max: 2.6
  k: 1.0
domain:
  type: rectangle
  allow_sampling: true
  size:
    - sample: uniform
      min: 2.2
      max: 2.8
    - sample: uniform
      min: 1.0
      max: 1.18
  mesh_resolution: [192, 128]
time:
  dt: 0.02
  t_end: 9.2
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: -0.035
                  max: 0.035
                cycles:
                  - sample: uniform
                    min: 1.2
                    max: 2.6
                  - sample: uniform
                    min: 1.8
                    max: 3.6
                phase:
                  sample: uniform
                  min: -0.8
                  max: 0.8
                angle:
                  sample: uniform
                  min: -0.25
                  max: 0.25
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: -0.045
                  max: 0.045
                cycles:
                  - sample: uniform
                    min: 0.8
                    max: 1.6
                  - sample: uniform
                    min: 2.8
                    max: 4.8
                phase:
                  sample: uniform
                  min: -0.8
                  max: 0.8
                angle:
                  sample: uniform
                  min: -0.2
                  max: 0.2
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.22
          max: 0.42
        modes:
          - amplitude:
              sample: uniform
              min: 0.28
              max: 0.46
            cycles:
              - sample: uniform
                min: 1.4
                max: 2.6
              - sample: uniform
                min: 2.2
                max: 4.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
          - amplitude:
              sample: uniform
              min: -0.16
              max: -0.05
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.3
              - sample: uniform
                min: 4.0
                max: 6.0
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: -0.1
              max: 0.1
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 1.0
              max: 1.3
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.2
              max: 0.08
output:
  formats: [numpy, gif]
  resolution: [256, 160]
  num_frames: 41
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
