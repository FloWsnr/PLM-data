preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 50000.0
    max: 150000.0
  Pr:
    sample: uniform
    min: 2.0
    max: 6.8
  k: 1.0
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.18
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.18
  cutout_width:
    sample: uniform
    min: 0.36
    max: 0.5
  cutout_height:
    sample: uniform
    min: 0.28
    max: 0.44
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.018
  t_end: 7.6
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split: [0.5, 0.5]
        region_values:
          "00":
            sample: uniform
            min: 0.55
            max: 0.9
          "01":
            sample: uniform
            min: -0.22
            max: 0.08
          "10":
            sample: uniform
            min: 0.02
            max: 0.28
          "11":
            sample: uniform
            min: -0.45
            max: -0.12
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
    notch:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant:
              sample: uniform
              min: 0.35
              max: 0.55
            x:
              sample: uniform
              min: -0.85
              max: -0.55
            y:
              sample: uniform
              min: -0.85
              max: -0.55
    notch:
      - operator: neumann
        value: 0.0
output:
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 45
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
