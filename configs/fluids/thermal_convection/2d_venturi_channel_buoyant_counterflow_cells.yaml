preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 50000.0
    max: 150000.0
  Pr:
    sample: uniform
    min: 2.0
    max: 6.5
  k: 1.0
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.4
  height:
    sample: uniform
    min: 0.9
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.26
    max: 0.44
  constriction_center_x:
    sample: uniform
    min: 0.88
    max: 1.22
  constriction_radius:
    sample: uniform
    min: 0.38
    max: 0.66
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.018
  t_end: 7.6
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.06
          max: 0.06
        modes:
          - amplitude:
              sample: uniform
              min: 0.4
              max: 0.72
            cycles:
              - sample: uniform
                min: 1.1
                max: 1.8
              - sample: uniform
                min: 1.6
                max: 2.6
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.65
              max: 0.95
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.3
              max: -0.02
    walls:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant:
              sample: uniform
              min: 0.32
              max: 0.52
            y:
              sample: uniform
              min: -0.88
              max: -0.62
output:
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 45
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
