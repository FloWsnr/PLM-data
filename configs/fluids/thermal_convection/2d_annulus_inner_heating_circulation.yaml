preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 50000.0
    max: 180000.0
  Pr:
    sample: uniform
    min: 1.4
    max: 4.8
  k: 1.0
domain:
  type: annulus
  allow_sampling: true
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.24
    max: 0.34
  outer_radius:
    sample: uniform
    min: 0.94
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
time:
  dt: 0.018
  t_end: 7.4
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.15
          max: 0.3
        modes:
          - amplitude:
              sample: uniform
              min: 0.24
              max: 0.42
            cycles:
              - sample: uniform
                min: 2.0
                max: 4.0
              - sample: uniform
                min: 1.0
                max: 2.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: -0.7
              max: 0.7
boundary_conditions:
  velocity:
    inner:
      - operator: dirichlet
        value: [0.0, 0.0]
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.95
              max: 1.2
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.28
              max: 0.0
output:
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 45
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
