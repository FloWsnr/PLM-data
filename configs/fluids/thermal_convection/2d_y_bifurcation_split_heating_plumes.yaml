preset: thermal_convection
parameters:
  split_x:
    sample: uniform
    min: 0.46
    max: 0.62
  split_y:
    sample: uniform
    min: -0.1
    max: 0.1
  Ra:
    sample: uniform
    min: 120000.0
    max: 320000.0
  Pr:
    sample: uniform
    min: 0.8
    max: 4.8
  k: 1.0
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.86
    max: 1.1
  branch_length:
    sample: uniform
    min: 0.8
    max: 1.08
  branch_angle_degrees:
    sample: uniform
    min: 30.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.27
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.028
time:
  dt: 0.016
  t_end: 8.4
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: -0.035
                  max: 0.035
                cycles:
                  - sample: uniform
                    min: 1.2
                    max: 2.4
                  - sample: uniform
                    min: 1.6
                    max: 3.2
                phase:
                  sample: uniform
                  min: -0.9
                  max: 0.9
                angle:
                  sample: uniform
                  min: -0.4
                  max: 0.4
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: -0.04
                  max: 0.04
                cycles:
                  - sample: uniform
                    min: 0.8
                    max: 1.8
                  - sample: uniform
                    min: 2.2
                    max: 4.2
                phase:
                  sample: uniform
                  min: -0.9
                  max: 0.9
                angle:
                  sample: uniform
                  min: -0.4
                  max: 0.4
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.35
          max: 0.95
        sigma:
          sample: uniform
          min: 0.05
          max: 0.1
        center: ["param:split_x", "param:split_y"]
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.08
          max: 0.08
        modes:
          - amplitude:
              sample: uniform
              min: 0.2
              max: 0.42
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.8
              - sample: uniform
                min: 1.4
                max: 2.6
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
            angle:
              sample: uniform
              min: -0.55
              max: 0.55
          - amplitude:
              sample: uniform
              min: -0.22
              max: -0.06
            cycles:
              - sample: uniform
                min: 2.2
                max: 4.0
              - sample: uniform
                min: 0.7
                max: 1.5
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
            angle:
              sample: uniform
              min: -0.35
              max: 0.35
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet_upper:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet_lower:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.72
              max: 1.2
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.5
              max: 0.04
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.5
              max: 0.04
    walls:
      - operator: neumann
        value: 0.0
output:
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 45
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
