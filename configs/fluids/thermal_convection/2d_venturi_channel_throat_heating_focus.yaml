preset: thermal_convection
parameters:
  throat_center_x:
    sample: uniform
    min: 0.9
    max: 1.22
  throat_heat_y:
    sample: uniform
    min: 0.34
    max: 0.66
  Ra:
    sample: uniform
    min: 70000.0
    max: 220000.0
  Pr:
    sample: uniform
    min: 1.0
    max: 4.2
  k: 1.0
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.4
  height:
    sample: uniform
    min: 0.9
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.24
    max: 0.42
  constriction_center_x: param:throat_center_x
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.68
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.018
  t_end: 6.6
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.95
          max: 1.45
        sigma:
          sample: uniform
          min: 0.08
          max: 0.13
        center: ["param:throat_center_x", "param:throat_heat_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.2
              max: 0.42
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.32
                max: 0.72
              - sample: uniform
                min: 0.22
                max: 0.78
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.12
              max: 0.02
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.12
              max: 0.02
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.06
              max: 0.05
output:
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
