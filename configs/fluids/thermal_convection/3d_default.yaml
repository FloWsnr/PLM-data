preset: thermal_convection
parameters:
  Ra: 20000.0
  Pr: 1.0
  k: 1.0
domain:
  type: box
  size: [2.0, 2.0, 1.0]
  mesh_resolution: [12, 12, 6]
time:
  dt: 0.02
  t_end: 1.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      type: zero
      params: {}
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: conductive_noise
      params:
        amplitude: 0.18
        num_modes: 4
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: periodic
        pair_with: y+
    y+:
      - operator: periodic
        pair_with: y-
    z-:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
    z+:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
  temperature:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: periodic
        pair_with: y+
    y+:
      - operator: periodic
        pair_with: y-
    z-:
      - operator: dirichlet
        value: 1.0
    z+:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.velocity_pressure_temperature
  resolution: [24, 24, 12]
  num_frames: 12
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
