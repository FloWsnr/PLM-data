preset: thermal_convection
parameters:
  Ra: 5000.0
  Pr: 1.0
  k: 1.0
domain:
  type: box
  size: [2.0, 2.0, 1.0]
  mesh_resolution: [8, 8, 4]
time:
  dt: 0.02
  t_end: 0.2
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      type: zero
      params: {}
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: conductive_noise
      params:
        amplitude: 0.08
        num_modes: 2
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: periodic
        pair_with: y+
    y+:
      - operator: periodic
        pair_with: y-
    z-:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
    z+:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
  temperature:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: periodic
        pair_with: y+
    y+:
      - operator: periodic
        pair_with: y-
    z-:
      - operator: dirichlet
        value: 1.0
    z+:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.velocity_pressure_temperature_numpy
  resolution: [16, 16, 8]
  num_frames: 5
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
