preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 65000.0
    max: 200000.0
  Pr:
    sample: uniform
    min: 1.0
    max: 3.8
  k: 1.0
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.9
    max: 1.08
  obstacle_center:
    - sample: uniform
      min: 0.94
      max: 1.18
    - sample: uniform
      min: 0.4
      max: 0.62
  obstacle_radius:
    sample: uniform
    min: 0.14
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.018
  t_end: 6.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.08
          max: 0.08
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.28
              max: 0.52
            sigma:
              sample: uniform
              min: 0.08
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: 0.42
                max: 0.82
              - sample: uniform
                min: 0.18
                max: 0.76
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
    obstacle:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.18
              max: 0.04
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.18
              max: 0.04
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.12
              max: 0.08
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.95
              max: 1.28
output:
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
