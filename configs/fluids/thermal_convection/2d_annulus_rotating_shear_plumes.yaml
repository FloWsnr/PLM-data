preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 70000.0
    max: 220000.0
  Pr:
    sample: uniform
    min: 0.9
    max: 3.2
  inner_spin:
    sample: uniform
    min: 0.22
    max: 0.36
  outer_spin:
    sample: uniform
    min: 0.08
    max: 0.18
  k: 1.0
domain:
  type: annulus
  allow_sampling: true
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.22
    max: 0.32
  outer_radius:
    sample: uniform
    min: 0.96
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
time:
  dt: 0.018
  t_end: 6.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.28
              max: 0.48
            sigma:
              sample: uniform
              min: 0.12
              max: 0.18
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: -0.46
                max: -0.18
              - sample: uniform
                min: -0.24
                max: 0.24
boundary_conditions:
  velocity:
    inner:
      - operator: dirichlet
        value:
          components:
            x:
              type: affine
              params:
                y: param:inner_spin
            y:
              type: affine
              params:
                x:
                  sample: uniform
                  min: -0.36
                  max: -0.22
    outer:
      - operator: dirichlet
        value:
          components:
            x:
              type: affine
              params:
                y:
                  sample: uniform
                  min: -0.18
                  max: -0.08
            y:
              type: affine
              params:
                x: param:outer_spin
  temperature:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.18
    outer:
      - operator: dirichlet
        value:
          type: affine
          params:
            constant:
              sample: uniform
              min: 0.18
              max: 0.36
            y:
              sample: uniform
              min: -0.85
              max: -0.6
output:
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
