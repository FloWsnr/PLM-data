preset: thermal_convection
parameters:
  cavity_center_x:
    sample: uniform
    min: 0.98
    max: 1.52
  cavity_source_y:
    sample: uniform
    min: 0.82
    max: 1.04
  Ra:
    sample: uniform
    min: 75000.0
    max: 240000.0
  Pr:
    sample: uniform
    min: 1.1
    max: 4.8
  k: 1.0
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.25
    max: 2.85
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.4
    max: 0.6
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.54
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.018
  t_end: 6.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 1.0
          max: 1.5
        sigma:
          sample: uniform
          min: 0.06
          max: 0.11
        center: ["param:cavity_center_x", "param:cavity_source_y"]
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.06
          max: 0.06
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: -0.34
              max: -0.12
            sigma:
              sample: uniform
              min: 0.08
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.32
                max: 0.78
              - sample: uniform
                min: 0.16
                max: 0.42
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.12
              max: 0.04
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.16
              max: 0.0
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.08
              max: 0.06
output:
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
