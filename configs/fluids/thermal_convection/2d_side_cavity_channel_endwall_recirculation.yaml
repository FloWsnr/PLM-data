preset: thermal_convection
parameters:
  cavity_center_x:
    sample: uniform
    min: 0.98
    max: 1.52
  Ra:
    sample: uniform
    min: 55000.0
    max: 170000.0
  Pr:
    sample: uniform
    min: 2.4
    max: 7.2
  k: 1.0
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.4
    max: 0.6
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.52
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.03
time:
  dt: 0.018
  t_end: 7.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.82
            max: 1.45
          - sample: uniform
            min: 0.34
            max: 0.58
        region_values:
          "00":
            sample: uniform
            min: 0.65
            max: 0.95
          "01":
            sample: uniform
            min: -0.35
            max: -0.05
          "10":
            sample: uniform
            min: 0.1
            max: 0.35
          "11":
            sample: uniform
            min: -0.2
            max: 0.1
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    outlet:
      - operator: dirichlet
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.82
              max: 1.12
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.32
              max: -0.04
    walls:
      - operator: neumann
        value: 0.0
output:
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 45
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
