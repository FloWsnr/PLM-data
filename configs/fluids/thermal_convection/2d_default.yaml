preset: thermal_convection
parameters:
  Ra: 100000.0
  Pr: 1.0
  k: 1.0
domain:
  type: rectangle
  size: [2.0, 1.0]
  mesh_resolution: [32, 16]
time:
  dt: 0.02
  t_end: 8.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.5
        std: 0.15
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: 1.0
    y+:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.velocity_pressure_temperature
  resolution: [64, 32]
  num_frames: 24
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
