preset: thermal_convection
parameters:
  Ra: 100000.0
  Pr: 1.0
  k: 1.0
domain:
  type: rectangle
  size: [2.0, 1.0]
  mesh_resolution: [32, 16]
time:
  dt: 0.02
  t_end: 8.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      type: zero
      params: {}
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: conductive_noise
      params:
        amplitude: 0.15
        num_modes: 4
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: 1.0
    y+:
      - operator: dirichlet
        value: 0.0
output:
  resolution: [64, 32]
  num_frames: 24
  formats: [numpy, gif]
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  ksp_type: preonly
  pc_type: lu
  pc_factor_mat_solver_type: mumps
  mat_mumps_icntl_14: 80
  mat_mumps_icntl_24: 1
  mat_mumps_icntl_25: 0
  ksp_error_if_not_converged: 1
seed: 42
