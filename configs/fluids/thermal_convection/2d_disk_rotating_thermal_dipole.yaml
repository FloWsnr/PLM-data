preset: thermal_convection
parameters:
  Ra:
    sample: uniform
    min: 65000.0
    max: 180000.0
  Pr:
    sample: uniform
    min: 0.8
    max: 2.4
  rim_spin:
    sample: uniform
    min: 0.18
    max: 0.32
  k: 1.0
domain:
  type: disk
  allow_sampling: true
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 0.96
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
time:
  dt: 0.018
  t_end: 6.2
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: none
      params: {}
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.05
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: -0.48
                max: -0.14
              - sample: uniform
                min: -0.24
                max: 0.24
          - count: 1
            amplitude:
              sample: uniform
              min: -0.62
              max: -0.28
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.7
            center:
              - sample: uniform
                min: 0.14
                max: 0.48
              - sample: uniform
                min: -0.24
                max: 0.24
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value:
          components:
            x:
              type: affine
              params:
                y: param:rim_spin
            y:
              type: affine
              params:
                x:
                  sample: uniform
                  min: -0.32
                  max: -0.18
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: step
          params:
            axis: 0
            x_split: 0.0
            value_left:
              sample: uniform
              min: 0.9
              max: 1.2
            value_right:
              sample: uniform
              min: -0.35
              max: 0.02
output:
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
