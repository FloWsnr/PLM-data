preset: thermal_convection
parameters:
  center_y:
    sample: uniform
    min: 0.47
    max: 0.53
  source_x:
    sample: uniform
    min: 0.42
    max: 0.58
  source_y:
    sample: uniform
    min: 0.34
    max: 0.48
  Ra:
    sample: uniform
    min: 80000.0
    max: 260000.0
  Pr:
    sample: uniform
    min: 1.2
    max: 4.6
  k: 1.0
domain:
  type: dumbbell
  allow_sampling: true
  left_center: [0.28, "param:center_y"]
  right_center: [0.72, "param:center_y"]
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.09
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.018
  t_end: 6.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  temperature:
    source:
      type: gaussian_bump
      params:
        amplitude:
          sample: uniform
          min: 0.95
          max: 1.45
        sigma:
          sample: uniform
          min: 0.06
          max: 0.1
        center: ["param:source_x", "param:source_y"]
    initial_condition:
      type: quadrants
      params:
        split: [0.5, 0.5]
        region_values:
          "00":
            sample: uniform
            min: 0.25
            max: 0.55
          "01":
            sample: uniform
            min: -0.18
            max: 0.08
          "10":
            sample: uniform
            min: -0.25
            max: 0.02
          "11":
            sample: uniform
            min: 0.05
            max: 0.28
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  temperature:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.08
              max: 0.05
output:
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 43
  fields:
    velocity: components
    pressure: scalar
    temperature: scalar
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
