preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 60.0
    max: 140.0
  k: 1.0
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.46
  inlet_speed:
    sample: uniform
    min: 0.24
    max: 0.52
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.7
    max: 0.84
  cavity_width:
    sample: uniform
    min: 0.42
    max: 0.62
  cavity_depth:
    sample: uniform
    min: 0.32
    max: 0.54
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0035
  t_end: 1.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: param:inlet_speed
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.18
                  max: 0.34
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.2
                  max: 2.0
                center:
                  - param:cavity_center_x
                  - sample: uniform
                    min: 0.96
                    max: 1.14
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.34
                  max: -0.18
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.2
                  max: 2.0
                center:
                  - param:cavity_center_x
                  - sample: uniform
                    min: 0.74
                    max: 0.92
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.34
                  max: -0.18
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 0.82
                    max: 1.06
                  - sample: uniform
                    min: 0.86
                    max: 1.08
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.18
                  max: 0.34
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 1.1
                    max: 1.34
                  - sample: uniform
                    min: 0.78
                    max: 1.0
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: 0.0
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 44
