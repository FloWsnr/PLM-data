preset: navier_stokes

parameters:
  Re: 100.0
  k: 1.0

domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [32, 32]

boundary_conditions:
  velocity:
    x-:
      type: dirichlet
      value: [0.0, 0.0]
    x+:
      type: dirichlet
      value: [0.0, 0.0]
    y-:
      type: dirichlet
      value: [0.0, 0.0]
    y+:
      type: dirichlet
      value: [1.0, 0.0]
  pressure: {}

source_terms:
  velocity:
    type: none
  pressure:
    type: none

initial_conditions:
  velocity:
    type: custom
    params: {}

dt: 0.01
t_end: 5.0

output_resolution: [64, 64]
output:
  path: ./output
  num_frames: 20
  formats: [numpy]

solver:
  ksp_type: preonly
  pc_type: lu
  pc_factor_mat_solver_type: mumps
  mat_mumps_icntl_14: 80
  mat_mumps_icntl_24: 1
  mat_mumps_icntl_25: 0
  ksp_error_if_not_converged: 1

seed: 42
