preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 90.0
    max: 180.0
  k: 1.0
  inlet_speed:
    sample: uniform
    min: 0.66
    max: 0.98
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.1
    max: 2.5
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.5
  constriction_center_x:
    sample: uniform
    min: 0.96
    max: 1.32
  constriction_radius:
    sample: uniform
    min: 0.56
    max: 0.82
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.003
  t_end: 1.2
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.02
              max: 0.06
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            center:
              - sample: uniform
                min: 0.26
                max: 0.54
              - sample: uniform
                min: 0.28
                max: 0.72
            wavevector:
              - 0.0
              - sample: uniform
                min: 4.0
                max: 7.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: 0.0
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 53
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
