preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 90.0
    max: 180.0
  k: 1.0
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
domain:
  type: dumbbell
  allow_sampling: true
  left_center:
    - sample: uniform
      min: 0.28
      max: 0.34
    - param:center_y
  right_center:
    - sample: uniform
      min: 0.66
      max: 0.72
    - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.12
    max: 0.18
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0045
  t_end: 1.0
inputs:
  velocity:
    source:
      components:
        x:
          type: step
          params:
            axis: 0
            x_split: 0.5
            value_left:
              sample: uniform
              min: 0.22
              max: 0.48
            value_right:
              sample: uniform
              min: -0.48
              max: -0.22
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: -0.08
                  max: 0.08
                cycles:
                  - 1.0
                  - sample: uniform
                    min: 1.0
                    max: 2.0
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.2
                  max: 0.2
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.28
                  max: 0.56
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.46
                    max: 0.56
                  - sample: uniform
                    min: 0.56
                    max: 0.68
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.56
                  max: -0.28
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.44
                    max: 0.54
                  - sample: uniform
                    min: 0.32
                    max: 0.44
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.56
                  max: -0.28
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.34
                    max: 0.44
                  - sample: uniform
                    min: 0.44
                    max: 0.56
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.28
                  max: 0.56
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.56
                    max: 0.66
                  - sample: uniform
                    min: 0.42
                    max: 0.54
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 57
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
