preset: navier_stokes
parameters:
  Re: 180.0
  k: 1.0
domain:
  type: channel_obstacle
  length: 1.6
  height: 1.0
  obstacle_center: [0.75, 0.5]
  obstacle_radius: 0.12
  mesh_size: 0.03
time:
  dt: 0.02
  t_end: 4.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_noise
          params:
            mean: 0.95
            std: 0.02
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std: 0.02
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: sine_waves
              params:
                background: 0.0
                modes:
                  - amplitude: 1.5
                    cycles: [0.0, 1.0]
                    phase: 0.0
            y:
              type: constant
              params:
                value: 0.0
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
    obstacle:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  resolution:
  - 128
  - 80
  num_frames: 32
solver:
  $ref: solver.profile.transient_saddle_point
seed: 42
