preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 150.0
    max: 240.0
  k: 1.0
  inlet_speed:
    sample: uniform
    min: 0.8
    max: 1.08
  obstacle_center_x:
    sample: uniform
    min: 0.76
    max: 0.9
  obstacle_center_y:
    sample: uniform
    min: 0.42
    max: 0.58
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 1.8
    max: 2.1
  height:
    sample: uniform
    min: 0.86
    max: 1.02
  obstacle_center: ["param:obstacle_center_x", "param:obstacle_center_y"]
  obstacle_radius:
    sample: uniform
    min: 0.09
    max: 0.12
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.008
  t_end: 4.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            center:
              - sample: uniform
                min: 0.18
                max: 0.34
              - sample: uniform
                min: 0.28
                max: 0.72
            wavevector:
              - 0.0
              - sample: uniform
                min: 5.0
                max: 8.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: 0.0
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
    obstacle:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution:
  - 224
  - 160
  num_frames: 49
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
