preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 80.0
    max: 180.0
  k: 1.0
  rim_spin:
    sample: uniform
    min: 0.34
    max: 0.68
domain:
  type: disk
  allow_sampling: true
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 0.94
    max: 1.04
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.004
  t_end: 1.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.008
              max: 0.02
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.008
              max: 0.02
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value:
          components:
            x:
              type: affine
              params:
                y:
                  sample: uniform
                  min: -0.68
                  max: -0.34
            y:
              type: affine
              params:
                x: param:rim_spin
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
