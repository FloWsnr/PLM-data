preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 70.0
    max: 150.0
  k: 1.0
  source_spin:
    sample: uniform
    min: 0.06
    max: 0.14
  left_x:
    sample: uniform
    min: -0.42
    max: -0.18
  right_x:
    sample: uniform
    min: 0.18
    max: 0.42
  upper_y:
    sample: uniform
    min: 0.18
    max: 0.42
  lower_y:
    sample: uniform
    min: -0.42
    max: -0.18
domain:
  type: annulus
  allow_sampling: true
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.38
  outer_radius:
    sample: uniform
    min: 0.96
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0045
  t_end: 1.8
inputs:
  velocity:
    source:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -0.14
              max: -0.06
        y:
          type: affine
          params:
            x: param:source_spin
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.24
                  max: 0.44
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:left_x", "param:upper_y"]
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.44
                  max: -0.24
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:right_x", "param:lower_y"]
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.44
                  max: -0.24
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:left_x", "param:upper_y"]
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.24
                  max: 0.44
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:right_x", "param:lower_y"]
boundary_conditions:
  velocity:
    inner:
      - operator: dirichlet
        value: [0.0, 0.0]
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 57
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
