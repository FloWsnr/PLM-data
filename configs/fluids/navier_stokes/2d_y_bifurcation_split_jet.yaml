preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 80.0
    max: 160.0
  k: 1.0
  inlet_speed:
    sample: uniform
    min: 0.66
    max: 0.96
  inlet_crossflow:
    sample: uniform
    min: -0.1
    max: 0.1
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.1
  branch_length:
    sample: uniform
    min: 0.86
    max: 1.12
  branch_angle_degrees:
    sample: uniform
    min: 30.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 0.2
    max: 0.28
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.013
time:
  dt: 0.003
  t_end: 1.1
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            sigma:
              sample: uniform
              min: 0.05
              max: 0.09
            center:
              - sample: uniform
                min: 0.24
                max: 0.42
              - sample: uniform
                min: -0.04
                max: 0.04
            wavevector:
              - sample: uniform
                min: 2.0
                max: 4.0
              - sample: uniform
                min: 2.0
                max: 5.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: param:inlet_crossflow
    outlet_upper:
      - operator: neumann
        value: [0.0, 0.0]
    outlet_lower:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 53
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
