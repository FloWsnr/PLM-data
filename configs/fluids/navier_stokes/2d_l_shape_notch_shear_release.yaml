preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 90.0
    max: 180.0
  k: 1.0
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 1.0
    max: 1.14
  outer_height:
    sample: uniform
    min: 1.0
    max: 1.14
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.46
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0035
  t_end: 1.4
inputs:
  velocity:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.32
            sigma:
              sample: uniform
              min: 0.12
              max: 0.18
            center:
              - sample: uniform
                min: 0.24
                max: 0.46
              - sample: uniform
                min: 0.16
                max: 0.34
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.32
              max: -0.18
            sigma:
              sample: uniform
              min: 0.12
              max: 0.18
            center:
              - sample: uniform
                min: 0.16
                max: 0.34
              - sample: uniform
                min: 0.46
                max: 0.72
    initial_condition:
      components:
        x:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.008
              max: 0.02
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.008
              max: 0.02
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
    notch:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 57
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
