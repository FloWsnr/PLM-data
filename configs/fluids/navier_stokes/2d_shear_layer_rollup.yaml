preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 220.0
    max: 340.0
  k: 1.0
  lower_shear:
    sample: uniform
    min: 0.92
    max: 1.08
  upper_shear:
    sample: uniform
    min: -1.08
    max: -0.92
domain:
  type: rectangle
  size:
  - sample: uniform
    min: 0.96
    max: 1.06
  - sample: uniform
    min: 0.96
    max: 1.06
  mesh_resolution:
  - 160
  - 160
  allow_sampling: true
time:
  dt: 0.002
  t_end: 0.96
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: quadrants
          params:
            split:
            - sample: uniform
              min: 0.44
              max: 0.56
            - sample: uniform
              min: 0.46
              max: 0.54
            region_values:
              '00': param:lower_shear
              '01': param:upper_shear
              '10': param:lower_shear
              '11': param:upper_shear
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.06
                max: 0.11
              cycles:
              - 4
              - 0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.12
                max: 0.12
            - amplitude:
                sample: uniform
                min: -0.04
                max: 0.04
              cycles:
              - sample: uniform
                min: 2.0
                max: 3.5
              - 0.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.08
                max: 0.08
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:lower_shear
            y:
              type: constant
              params:
                value: 0.0
    y+:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:upper_shear
            y:
              type: constant
              params:
                value: 0.0
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution:
  - 160
  - 160
  num_frames: 49
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
