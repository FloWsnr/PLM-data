preset: navier_stokes
parameters:
  Re: 50.0
  k: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [4, 4, 4]
time:
  dt: 0.01
  t_end: 0.1
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      type: custom
      params: {}
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.lid_driven_cavity_3d
output:
  $ref: output.template.velocity_pressure
  resolution: [8, 8, 8]
  num_frames: 5
solver:
  $ref: solver.profile.transient_saddle_point
seed: 42
