preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 130.0
    max: 210.0
  k: 1.0
  inlet_speed:
    sample: uniform
    min: 0.72
    max: 0.98
  inlet_crossflow:
    sample: uniform
    min: 0.05
    max: 0.12
  obstacle_center_x:
    sample: uniform
    min: 0.8
    max: 0.96
  obstacle_center_y:
    sample: uniform
    min: 0.28
    max: 0.42
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 1.86
    max: 2.14
  height:
    sample: uniform
    min: 0.82
    max: 0.96
  obstacle_center: ["param:obstacle_center_x", "param:obstacle_center_y"]
  obstacle_radius:
    sample: uniform
    min: 0.08
    max: 0.11
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.0065
  t_end: 4.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            center:
              - sample: uniform
                min: 0.16
                max: 0.3
              - sample: uniform
                min: 0.58
                max: 0.8
            wavevector:
              - 0.0
              - sample: uniform
                min: 4.0
                max: 7.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: param:inlet_crossflow
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
    obstacle:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 49
solver:
  $ref: solver.profile.transient_saddle_point
seed: 42
