preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 120.0
    max: 240.0
  k: 1.0
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.46
  inlet_speed:
    sample: uniform
    min: 0.74
    max: 1.08
  inlet_crossflow:
    sample: uniform
    min: 0.03
    max: 0.1
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.7
    max: 0.84
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.58
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.5
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.003
  t_end: 1.3
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.03
              max: 0.09
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            center:
              - sample: uniform
                min: 0.58
                max: 0.92
              - sample: uniform
                min: 0.3
                max: 0.54
            wavevector:
              - sample: uniform
                min: 1.0
                max: 2.0
              - sample: uniform
                min: 4.0
                max: 7.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: param:inlet_crossflow
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 53
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
