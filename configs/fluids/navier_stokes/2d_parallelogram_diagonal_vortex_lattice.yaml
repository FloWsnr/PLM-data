preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 260.0
    max: 380.0
  k: 1.0
  lower_shear:
    sample: uniform
    min: 0.9
    max: 1.04
  upper_shear:
    sample: uniform
    min: -1.04
    max: -0.9
domain:
  type: parallelogram
  allow_sampling: true
  origin: [0.0, 0.0]
  axis_x:
    - sample: uniform
      min: 1.55
      max: 1.82
    - 0.0
  axis_y:
    - sample: uniform
      min: 0.34
      max: 0.5
    - sample: uniform
      min: 0.92
      max: 1.08
  mesh_resolution: [192, 144]
time:
  dt: 0.0018
  t_end: 0.9
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            axis: 1
            x_split:
              sample: uniform
              min: 0.36
              max: 0.48
            value_left: param:lower_shear
            value_right: param:upper_shear
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.08
                  max: 0.13
                cycles:
                  - sample: uniform
                    min: 3.5
                    max: 5.5
                  - sample: uniform
                    min: 1.0
                    max: 1.8
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.26
                  max: 0.26
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:lower_shear
            y:
              type: constant
              params:
                value: 0.0
    y+:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:upper_shear
            y:
              type: constant
              params:
                value: 0.0
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 57
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
