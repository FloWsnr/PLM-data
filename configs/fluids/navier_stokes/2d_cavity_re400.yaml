preset: navier_stokes
parameters:
  Re: 400.0
  k: 1.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [48, 48]
time:
  dt: 0.005
  t_end: 6.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      type: custom
      params: {}
boundary_conditions:
  velocity:
    x-:
      - operator: dirichlet
        value: [0.0, 0.0]
    x+:
      - operator: dirichlet
        value: [0.0, 0.0]
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: dirichlet
        value: [1.0, 0.0]
output:
  resolution: [96, 96]
  num_frames: 30
  formats: [numpy, gif]
  fields:
    velocity: components
    pressure: scalar
solver:
  strategy: transient_saddle_point
  serial:
    ksp_type: preonly
    pc_type: lu
    pc_factor_mat_solver_type: mumps
    mat_mumps_icntl_14: 80
    mat_mumps_icntl_24: 1
    mat_mumps_icntl_25: 0
    ksp_error_if_not_converged: 1
  mpi:
    ksp_type: gmres
    ksp_rtol: 1.0e-8
    ksp_error_if_not_converged: 1
    pc_type: fieldsplit
    pc_fieldsplit_type: schur
    pc_fieldsplit_schur_fact_type: upper
    pc_fieldsplit_schur_precondition: selfp
    fieldsplit_velocity_0_ksp_type: preonly
    fieldsplit_velocity_0_pc_type: gamg
    fieldsplit_pressure_1_ksp_type: preonly
    fieldsplit_pressure_1_pc_type: jacobi
seed: 42
