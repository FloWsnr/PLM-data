preset: navier_stokes
parameters:
  Re: 300.0
  k: 1.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [64, 64]
time:
  dt: 0.0025
  t_end: 0.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: quadrants
          params:
            split: [0.5, 0.5]
            region_values:
              "00": 1.0
              "01": -1.0
              "10": 1.0
              "11": -1.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude: 0.08
                cycles: [4, 0]
                phase: 1.5707963267948966
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.periodic_shear_layer_2d
output:
  $ref: output.template.velocity_pressure
  resolution: [128, 128]
  num_frames: 30
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
