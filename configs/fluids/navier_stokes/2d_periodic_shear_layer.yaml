preset: navier_stokes
parameters:
  Re: 300.0
  k: 1.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [64, 64]
time:
  dt: 0.0025
  t_end: 0.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left: 1.0
            value_right: -1.0
            x_split: 0.5
            axis: 1
        y:
          type: sine_product
          params:
            amplitude: 0.08
            kx: 4.0
            ky: 1.0
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: [1.0, 0.0]
    y+:
      - operator: dirichlet
        value: [-1.0, 0.0]
output:
  resolution: [128, 128]
  num_frames: 30
  formats: [numpy, gif]
  fields:
    velocity: components
    pressure: scalar
solver:
  strategy: transient_mixed_direct
  serial:
    ksp_type: preonly
    pc_type: lu
    pc_factor_mat_solver_type: mumps
    mat_mumps_icntl_14: 80
    mat_mumps_icntl_24: 1
    mat_mumps_icntl_25: 0
    ksp_error_if_not_converged: 1
  mpi:
    ksp_type: preonly
    pc_type: lu
    pc_factor_mat_solver_type: mumps
    mat_mumps_icntl_14: 80
    mat_mumps_icntl_24: 1
    mat_mumps_icntl_25: 0
    ksp_error_if_not_converged: 1
seed: 42
