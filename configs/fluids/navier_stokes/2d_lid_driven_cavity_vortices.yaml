preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 280.0
    max: 520.0
  k: 1.0
  lid_speed:
    sample: uniform
    min: 0.82
    max: 1.18
domain:
  type: rectangle
  size:
  - sample: uniform
    min: 0.96
    max: 1.04
  - sample: uniform
    min: 0.96
    max: 1.04
  mesh_resolution:
  - 144
  - 144
  allow_sampling: true
time:
  dt: 0.0045
  t_end: 6.2
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.02
              max: 0.05
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.02
              max: 0.05
boundary_conditions:
  velocity:
    x-:
      - operator: dirichlet
        value: [0.0, 0.0]
    x+:
      - operator: dirichlet
        value: [0.0, 0.0]
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:lid_speed
            y:
              type: constant
              params:
                value: 0.0
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution:
  - 160
  - 160
  num_frames: 49
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
