preset: navier_stokes
parameters:
  Re: 400.0
  k: 1.0
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 48
  - 48
time:
  dt: 0.005
  t_end: 6.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_noise
          params:
            mean: 0.0
            std: 0.03
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std: 0.03
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.lid_driven_cavity_2d
output:
  $ref: output.template.velocity_pressure
  resolution:
  - 96
  - 96
  num_frames: 30
solver:
  $ref: solver.profile.transient_saddle_point
seed: 42
