preset: navier_stokes
parameters:
  Re: 800.0
  k: 1.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [64, 64]
time:
  dt: 0.0015
  t_end: 0.75
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left: 1.0
            value_right: -1.0
            x_split: 0.5
            axis: 1
        y:
          type: sine_product
          params:
            amplitude: 0.12
            kx: 6.0
            ky: 1.0
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.periodic_shear_layer_2d
output:
  $ref: output.template.velocity_pressure
  resolution: [128, 128]
  num_frames: 30
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
