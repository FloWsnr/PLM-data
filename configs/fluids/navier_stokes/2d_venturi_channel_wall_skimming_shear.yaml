preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 120.0
    max: 220.0
  k: 1.0
  inlet_speed:
    sample: uniform
    min: 0.76
    max: 1.08
  inlet_crossflow:
    sample: uniform
    min: -0.1
    max: -0.04
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.1
    max: 2.5
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.38
    max: 0.54
  constriction_center_x:
    sample: uniform
    min: 1.0
    max: 1.34
  constriction_radius:
    sample: uniform
    min: 0.52
    max: 0.78
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0025
  t_end: 1.0
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: param:inlet_speed
            y:
              type: constant
              params:
                value: param:inlet_crossflow
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 53
solver:
  $ref: solver.profile.transient_saddle_point
seed: 42
