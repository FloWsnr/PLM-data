preset: navier_stokes
parameters:
  Re:
    sample: uniform
    min: 120.0
    max: 220.0
  k: 1.0
  source_spin:
    sample: uniform
    min: 0.05
    max: 0.12
  left_x:
    sample: uniform
    min: -0.38
    max: -0.16
  right_x:
    sample: uniform
    min: 0.16
    max: 0.38
  upper_y:
    sample: uniform
    min: 0.14
    max: 0.36
  lower_y:
    sample: uniform
    min: -0.36
    max: -0.14
domain:
  type: disk
  allow_sampling: true
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 0.94
    max: 1.04
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.004
  t_end: 1.2
inputs:
  velocity:
    source:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -0.12
              max: -0.05
        y:
          type: affine
          params:
            x: param:source_spin
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.32
                  max: 0.58
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:left_x", "param:upper_y"]
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.58
                  max: -0.32
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:right_x", "param:lower_y"]
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.58
                  max: -0.32
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:left_x", "param:upper_y"]
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.32
                  max: 0.58
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center: ["param:right_x", "param:lower_y"]
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.velocity_pressure
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
