preset: stokes
parameters:
  nu: 1.0
domain:
  type: channel_obstacle
  length: 1.6
  height: 1.0
  obstacle_center: [0.75, 0.5]
  obstacle_radius: 0.12
  mesh_size: 0.03
inputs:
  velocity:
    source:
      type: none
      params: {}
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.channel_obstacle_flow_2d
output:
  $ref: output.template.velocity_pressure
  resolution: [128, 80]
  num_frames: 1
solver:
  $ref: solver.profile.steady_saddle_point
seed: 42
