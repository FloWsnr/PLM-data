preset: stokes
parameters:
  nu: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [8, 8, 8]
inputs:
  velocity:
    source:
      type: none
      params: {}
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.lid_driven_cavity_3d
output:
  $ref: output.template.velocity_pressure
  resolution: [16, 16, 16]
  num_frames: 1
solver:
  $ref: solver.profile.steady_saddle_point
seed: 42
