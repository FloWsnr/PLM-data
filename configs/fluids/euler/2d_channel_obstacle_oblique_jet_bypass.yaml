preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.2
    max: 3.1
  k: 1.0
  inlet_density:
    sample: uniform
    min: 0.96
    max: 1.08
  inlet_pressure:
    sample: uniform
    min: 1.12
    max: 1.38
  inlet_speed:
    sample: uniform
    min: 1.04
    max: 1.36
  inlet_crossflow:
    sample: uniform
    min: 0.06
    max: 0.18
  pulse_center_x:
    sample: uniform
    min: 0.18
    max: 0.34
  pulse_center_y:
    sample: uniform
    min: 0.18
    max: 0.32
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 1.65
    max: 1.95
  height:
    sample: uniform
    min: 0.66
    max: 0.82
  obstacle_center:
  - sample: uniform
    min: 0.68
    max: 0.9
  - sample: uniform
    min: 0.24
    max: 0.34
  obstacle_radius:
    sample: uniform
    min: 0.06
    max: 0.09
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.013
time:
  dt: 0.0005
  t_end: 0.2
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_density
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.02
            max: 0.07
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_pressure
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.1
            max: 0.24
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_density
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: slip
    obstacle:
    - operator: slip
  pressure:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_pressure
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
