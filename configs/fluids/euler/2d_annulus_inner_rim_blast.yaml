preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.1
    max: 3.1
  k: 1.0
  pulse_center_x:
    sample: uniform
    min: 0.28
    max: 0.52
  pulse_center_y:
    sample: uniform
    min: -0.18
    max: 0.18
  base_density:
    sample: uniform
    min: 0.92
    max: 1.04
  base_pressure:
    sample: uniform
    min: 0.82
    max: 1.0
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.22
    max: 0.32
  outer_radius:
    sample: uniform
    min: 0.98
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.0012
  t_end: 0.86
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_density
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.1
            max: 0.26
          sigma:
            sample: uniform
            min: 0.07
            max: 0.12
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -0.44
              max: -0.16
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.16
              max: 0.44
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_pressure
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.68
            max: 1.15
          sigma:
            sample: uniform
            min: 0.07
            max: 0.12
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    inner:
    - operator: slip
    outer:
    - operator: slip
  pressure:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
