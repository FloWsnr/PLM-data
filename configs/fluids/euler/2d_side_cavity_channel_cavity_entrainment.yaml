preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.2
    max: 3.1
  k: 1.0
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.5
  inlet_density:
    sample: uniform
    min: 0.94
    max: 1.08
  inlet_pressure:
    sample: uniform
    min: 0.84
    max: 1.04
  inlet_speed:
    sample: uniform
    min: 1.1
    max: 1.6
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.7
    max: 0.84
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.58
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.5
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0005
  t_end: 0.22
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_density
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.12
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center:
          - sample: uniform
            min: 0.58
            max: 0.92
          - sample: uniform
            min: 0.24
            max: 0.44
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.06
              max: 0.06
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_pressure
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.2
            max: 0.52
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center:
          - sample: uniform
            min: 0.58
            max: 0.92
          - sample: uniform
            min: 0.24
            max: 0.44
boundary_conditions:
  density:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_density
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: 0.0
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: slip
  pressure:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_pressure
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
