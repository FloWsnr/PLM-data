preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.08
  c_v:
    sample: uniform
    min: 2.0
    max: 3.0
  k: 1.0
  pulse_center_x:
    sample: uniform
    min: 0.56
    max: 0.82
  pulse_center_y:
    sample: uniform
    min: 0.16
    max: 0.34
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.14
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.14
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.46
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0011
  t_end: 0.66
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.96
          max: 1.04
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.12
          sigma:
            sample: uniform
            min: 0.07
            max: 0.11
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -0.16
              max: -0.08
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.08
              max: 0.16
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.96
          max: 1.08
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.18
            max: 0.38
          sigma:
            sample: uniform
            min: 0.07
            max: 0.11
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: slip
    notch:
    - operator: slip
  pressure:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 61
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
