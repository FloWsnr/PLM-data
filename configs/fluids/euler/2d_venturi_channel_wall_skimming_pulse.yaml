preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.2
    max: 3.1
  k: 1.0
  inlet_density:
    sample: uniform
    min: 0.94
    max: 1.08
  inlet_pressure:
    sample: uniform
    min: 0.84
    max: 1.04
  inlet_speed:
    sample: uniform
    min: 1.05
    max: 1.45
  inlet_crossflow:
    sample: uniform
    min: -0.28
    max: -0.12
  pulse_center_x:
    sample: uniform
    min: 0.14
    max: 0.32
  pulse_center_y:
    sample: uniform
    min: 0.74
    max: 0.96
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.6
  height:
    sample: uniform
    min: 0.96
    max: 1.14
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.5
  constriction_center_x:
    sample: uniform
    min: 1.02
    max: 1.42
  constriction_radius:
    sample: uniform
    min: 0.58
    max: 0.9
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.00045
  t_end: 0.16
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_density
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.12
          sigma:
            sample: uniform
            min: 0.07
            max: 0.12
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:inlet_pressure
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.18
            max: 0.4
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_density
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: slip
  pressure:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_pressure
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
