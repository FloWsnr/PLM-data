preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.1
    max: 3.1
  k: 1.0
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  pulse_center_x:
    sample: uniform
    min: 0.18
    max: 0.3
  pulse_center_y:
    sample: uniform
    min: 0.42
    max: 0.58
  base_density:
    sample: uniform
    min: 0.92
    max: 1.06
  base_pressure:
    sample: uniform
    min: 0.9
    max: 1.04
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: 0.28
    max: 0.34
  - param:center_y
  right_center:
  - sample: uniform
    min: 0.66
    max: 0.72
  - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.12
    max: 0.18
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0011
  t_end: 0.72
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_density
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.2
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.08
              max: 0.2
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.0
                max: 0.03
              cycles:
              - sample: uniform
                min: 0.8
                max: 1.6
              - sample: uniform
                min: 0.8
                max: 1.6
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.2
                max: 0.2
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_pressure
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.38
            max: 0.76
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: slip
  pressure:
    outer:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
