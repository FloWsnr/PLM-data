preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.1
    max: 3.1
  k: 1.0
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  left_blob_x:
    sample: uniform
    min: 0.18
    max: 0.3
  right_blob_x:
    sample: uniform
    min: 0.7
    max: 0.82
  blob_y:
    sample: uniform
    min: 0.42
    max: 0.58
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: 0.28
    max: 0.34
  - param:center_y
  right_center:
  - sample: uniform
    min: 0.66
    max: 0.72
  - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.12
    max: 0.18
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0012
  t_end: 0.7
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.06
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.12
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center: ["param:left_blob_x", "param:blob_y"]
        - count: 1
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.12
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center: ["param:right_blob_x", "param:blob_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.86
          max: 0.98
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.22
            max: 0.42
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center: ["param:left_blob_x", "param:blob_y"]
        - count: 1
          amplitude:
            sample: uniform
            min: 0.22
            max: 0.42
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.4
          center: ["param:right_blob_x", "param:blob_y"]
boundary_conditions:
  density:
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: slip
  pressure:
    outer:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
