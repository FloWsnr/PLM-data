preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.1
    max: 3.1
  k: 1.0
  pulse_center_x:
    sample: uniform
    min: 0.14
    max: 0.24
  pulse_center_y:
    sample: uniform
    min: 0.34
    max: 0.56
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.16
    max: 1.28
  height:
    sample: uniform
    min: 0.88
    max: 0.98
  holes:
  - center:
    - sample: uniform
      min: 0.24
      max: 0.32
    - sample: uniform
      min: 0.24
      max: 0.34
    radius:
      sample: uniform
      min: 0.05
      max: 0.075
    boundary_name: holes_left
  - center:
    - sample: uniform
      min: 0.58
      max: 0.68
    - sample: uniform
      min: 0.46
      max: 0.6
    radius:
      sample: uniform
      min: 0.05
      max: 0.08
    boundary_name: hole_center
  - center:
    - sample: uniform
      min: 0.9
      max: 0.98
    - sample: uniform
      min: 0.22
      max: 0.34
    radius:
      sample: uniform
      min: 0.05
      max: 0.075
    boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.013
time:
  dt: 0.0011
  t_end: 0.14
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.96
          max: 1.04
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.03
            max: 0.08
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.1
              max: 0.18
        y:
          type: constant
          params:
            value: 0.0
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.98
          max: 1.1
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.24
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    outer:
    - operator: neumann
      value: 0.0
    holes_left:
    - operator: neumann
      value: 0.0
    hole_center:
    - operator: neumann
      value: 0.0
    holes_right:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: slip
    holes_left:
    - operator: slip
    hole_center:
    - operator: slip
    holes_right:
    - operator: slip
  pressure:
    outer:
    - operator: neumann
      value: 0.0
    holes_left:
    - operator: neumann
      value: 0.0
    hole_center:
    - operator: neumann
      value: 0.0
    holes_right:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
