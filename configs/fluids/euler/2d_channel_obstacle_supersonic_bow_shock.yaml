preset: euler
parameters:
  gas_constant: 1.0
  c_v: 2.5
  k: 1.0
domain:
  type: channel_obstacle
  length: 1.6
  height: 0.6
  obstacle_center: [0.68, 0.3]
  obstacle_radius: 0.08
  mesh_size: 0.02
time:
  dt: 0.0005
  t_end: 0.03
inputs:
  density:
    initial_condition:
      type: constant
      params:
        value: 1.0
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 2.4
        y:
          type: constant
          params:
            value: 0.0
  pressure:
    initial_condition:
      type: constant
      params:
        value: 1.0
boundary_conditions:
  density:
    inlet:
    - operator: dirichlet
      value: 1.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value: [2.4, 0.0]
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: slip
    obstacle:
    - operator: slip
  pressure:
    inlet:
    - operator: dirichlet
      value: 1.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  resolution:
  - 256
  - 96
  num_frames: 48
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
