preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.96
    max: 1.08
  c_v:
    sample: uniform
    min: 2.0
    max: 3.0
  k: 1.0
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.2
    max: 0.3
  outer_radius:
    sample: uniform
    min: 0.98
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.001
  t_end: 0.8
inputs:
  density:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.96
          max: 1.06
        amplitude:
          sample: uniform
          min: 0.04
          max: 0.1
        frequency:
          sample: uniform
          min: 5.0
          max: 8.0
        center: [0.0, 0.0]
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -0.48
              max: -0.22
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.22
              max: 0.48
  pressure:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.98
          max: 1.12
        amplitude:
          sample: uniform
          min: 0.1
          max: 0.24
        frequency:
          sample: uniform
          min: 5.0
          max: 8.0
        center: [0.0, 0.0]
boundary_conditions:
  density:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    inner:
    - operator: slip
    outer:
    - operator: slip
  pressure:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
