preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.2
    max: 3.0
  k: 1.0
domain:
  allow_sampling: true
  type: rectangle
  size:
  - sample: uniform
    min: 1.24
    max: 1.42
  - sample: uniform
    min: 0.4
    max: 0.52
  mesh_resolution:
  - 320
  - 128
time:
  dt: 0.00035
  t_end: 0.16
inputs:
  density:
    initial_condition:
      type: step
      params:
        axis: 0
        x_split:
          sample: uniform
          min: 0.56
          max: 0.72
        value_left:
          sample: uniform
          min: 1.0
          max: 1.28
        value_right:
          sample: uniform
          min: 0.14
          max: 0.28
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.01
                max: 0.04
              cycles:
              - sample: uniform
                min: 3.0
                max: 6.0
              - sample: uniform
                min: 0.8
                max: 1.4
              phase:
                sample: uniform
                min: -0.5
                max: 0.5
              angle:
                sample: uniform
                min: -0.08
                max: 0.08
  pressure:
    initial_condition:
      type: step
      params:
        axis: 0
        x_split:
          sample: uniform
          min: 0.56
          max: 0.72
        value_left:
          sample: uniform
          min: 1.1
          max: 1.55
        value_right:
          sample: uniform
          min: 0.08
          max: 0.2
boundary_conditions:
  density:
    x-:
    - operator: neumann
      value: 0.0
    x+:
    - operator: neumann
      value: 0.0
    y-:
    - operator: neumann
      value: 0.0
    y+:
    - operator: neumann
      value: 0.0
  velocity:
    x-:
    - operator: neumann
      value: [0.0, 0.0]
    x+:
    - operator: neumann
      value: [0.0, 0.0]
    y-:
    - operator: slip
    y+:
    - operator: slip
  pressure:
    x-:
    - operator: neumann
      value: 0.0
    x+:
    - operator: neumann
      value: 0.0
    y-:
    - operator: neumann
      value: 0.0
    y+:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution:
  - 320
  - 128
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
