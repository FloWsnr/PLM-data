preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.2
    max: 3.1
  k: 1.0
  branch_density:
    sample: uniform
    min: 0.94
    max: 1.08
  branch_pressure:
    sample: uniform
    min: 0.84
    max: 1.04
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.94
    max: 1.14
  branch_length:
    sample: uniform
    min: 0.96
    max: 1.22
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 46.0
  channel_width:
    sample: uniform
    min: 0.22
    max: 0.3
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.013
time:
  dt: 0.00045
  t_end: 0.18
inputs:
  density:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.96
          max: 1.04
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.9
          max: 1.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.28
          sigma:
            sample: uniform
            min: 0.08
            max: 0.14
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 0.82
            max: 1.02
          - sample: uniform
            min: -0.08
            max: 0.08
boundary_conditions:
  density:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:branch_density
    outlet_lower:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:branch_density
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: neumann
      value: [0.0, 0.0]
    outlet_upper:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -1.55
                max: -1.1
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.95
                max: -0.5
    outlet_lower:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -1.55
                max: -1.1
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.5
                max: 0.95
    walls:
    - operator: slip
  pressure:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:branch_pressure
    outlet_lower:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:branch_pressure
    walls:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
