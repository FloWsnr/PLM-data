preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.1
    max: 3.1
  k: 1.0
  base_density:
    sample: uniform
    min: 0.96
    max: 1.04
  base_pressure:
    sample: uniform
    min: 0.96
    max: 1.08
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y:
  - sample: uniform
    min: 0.24
    max: 0.42
  - sample: uniform
    min: 0.92
    max: 1.08
  mesh_resolution: [160, 160]
time:
  dt: 0.0009
  t_end: 0.38
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_density
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.02
            max: 0.08
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.18
            max: 0.3
          - sample: uniform
            min: 0.18
            max: 0.3
        - count: 1
          amplitude:
            sample: uniform
            min: 0.02
            max: 0.08
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.66
            max: 0.8
          - sample: uniform
            min: 0.18
            max: 0.3
        - count: 1
          amplitude:
            sample: uniform
            min: 0.02
            max: 0.08
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.2
            max: 0.34
          - sample: uniform
            min: 0.66
            max: 0.8
        - count: 1
          amplitude:
            sample: uniform
            min: 0.02
            max: 0.08
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.66
            max: 0.8
          - sample: uniform
            min: 0.66
            max: 0.8
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background: param:base_pressure
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.26
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.18
            max: 0.3
          - sample: uniform
            min: 0.18
            max: 0.3
        - count: 1
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.26
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.66
            max: 0.8
          - sample: uniform
            min: 0.18
            max: 0.3
        - count: 1
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.26
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.2
            max: 0.34
          - sample: uniform
            min: 0.66
            max: 0.8
        - count: 1
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.26
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.3
          center:
          - sample: uniform
            min: 0.66
            max: 0.8
          - sample: uniform
            min: 0.66
            max: 0.8
boundary_conditions:
  density:
    $ref: boundary_field.scalar.full_periodic_2d
  velocity:
    $ref: boundary_field.vector.full_periodic_2d
  pressure:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
