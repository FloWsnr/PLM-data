preset: euler
parameters:
  gas_constant:
    sample: uniform
    min: 0.95
    max: 1.08
  c_v:
    sample: uniform
    min: 2.2
    max: 3.1
  k: 1.0
  outlet_density:
    sample: uniform
    min: 0.94
    max: 1.08
  outlet_pressure:
    sample: uniform
    min: 0.84
    max: 1.04
  reverse_speed:
    sample: uniform
    min: -1.65
    max: -1.1
  pulse_center_x:
    sample: uniform
    min: 2.2
    max: 2.48
  pulse_center_y:
    sample: uniform
    min: 0.24
    max: 0.76
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.8
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.25
    max: 0.3
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.18
  row_shift_fraction:
    sample: uniform
    min: 0.28
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.00045
  t_end: 0.2
inputs:
  density:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.96
          max: 1.04
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.12
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center: ["param:pulse_center_x", "param:pulse_center_y"]
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.24
              max: -0.04
        y:
          type: constant
          params:
            value: 0.0
  pressure:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.9
          max: 1.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.18
            max: 0.46
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center: ["param:pulse_center_x", "param:pulse_center_y"]
boundary_conditions:
  density:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:outlet_density
    walls:
    - operator: neumann
      value: 0.0
    obstacles:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: neumann
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:reverse_speed
          y:
            type: constant
            params:
              value: 0.0
    walls:
    - operator: slip
    obstacles:
    - operator: slip
  pressure:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:outlet_pressure
    walls:
    - operator: neumann
      value: 0.0
    obstacles:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.density_velocity_pressure_temperature
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
