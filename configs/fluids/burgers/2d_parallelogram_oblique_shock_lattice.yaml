preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.0016
    max: 0.0032
domain:
  type: parallelogram
  allow_sampling: true
  origin:
  - sample: uniform
    min: -0.04
    max: 0.04
  - sample: uniform
    min: -0.04
    max: 0.04
  axis_x:
  - sample: uniform
    min: 1.0
    max: 1.18
  - sample: uniform
    min: -0.1
    max: 0.1
  axis_y:
  - sample: uniform
    min: -0.36
    max: -0.18
  - sample: uniform
    min: 0.92
    max: 1.08
  mesh_resolution:
  - sample: randint
    min: 132
    max: 156
  - sample: randint
    min: 132
    max: 156
time:
  dt: 0.003
  t_end: 0.62
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left:
              sample: uniform
              min: 0.95
              max: 1.35
            value_right:
              sample: uniform
              min: -0.45
              max: -0.15
            x_split:
              sample: uniform
              min: 0.36
              max: 0.58
            axis: 0
        y:
          type: sine_waves
          params:
            background:
              sample: uniform
              min: -0.25
              max: 0.25
            modes:
            - amplitude:
                sample: uniform
                min: 0.65
                max: 1.05
              cycles:
              - sample: uniform
                min: 1.5
                max: 3.5
              - sample: uniform
                min: 1.0
                max: 2.5
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: 0.45
                max: 0.95
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.full_periodic_2d
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 43
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
