preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.002
    max: 0.005
domain:
  type: parallelogram
  allow_sampling: true
  origin:
  - sample: uniform
    min: -0.03
    max: 0.03
  - sample: uniform
    min: -0.03
    max: 0.03
  axis_x:
  - sample: uniform
    min: 0.95
    max: 1.12
  - sample: uniform
    min: -0.08
    max: 0.08
  axis_y:
  - sample: uniform
    min: 0.18
    max: 0.38
  - sample: uniform
    min: 0.92
    max: 1.10
  mesh_resolution:
  - sample: randint
    min: 128
    max: 148
  - sample: randint
    min: 128
    max: 148
time:
  dt: 0.004
  t_end: 0.8
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.75
                max: 1.15
              cycles:
              - 0
              - 2
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.3
                max: 0.3
            - amplitude:
                sample: uniform
                min: -0.45
                max: 0.45
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 1.0
                max: 2.5
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: 0.35
                max: 0.95
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -1.15
                max: -0.75
              cycles:
              - 2
              - 0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.3
                max: 0.3
            - amplitude:
                sample: uniform
                min: -0.45
                max: 0.45
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 1.0
                max: 2.5
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.95
                max: -0.35
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.full_periodic_2d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  resolution:
  - 144
  - 144
  num_frames: 41
  formats:
  - numpy
  - gif
  fields:
    velocity:
      mode: components
seed: 42
