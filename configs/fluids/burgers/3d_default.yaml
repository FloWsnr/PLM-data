preset: burgers
parameters:
  nu: 0.004
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [18, 18, 18]
time:
  dt: 0.01
  t_end: 0.6
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude: 0.9
                cycles: [0, 2, 0]
                phase: 1.5707963267948966
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude: 0.9
                cycles: [0, 0, 2]
                phase: 1.5707963267948966
        z:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude: -0.9
                cycles: [2, 0, 0]
                phase: 1.5707963267948966
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.full_periodic_3d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  resolution: [24, 24, 24]
  num_frames: 16
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
