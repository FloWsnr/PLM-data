preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.0028
    max: 0.006
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.3
    max: 2.65
  height:
    sample: uniform
    min: 1.05
    max: 1.22
  throat_height:
    sample: uniform
    min: 0.38
    max: 0.56
  constriction_center_x:
    sample: uniform
    min: 1.05
    max: 1.45
  constriction_radius:
    sample: uniform
    min: 0.65
    max: 0.95
  mesh_size:
    sample: uniform
    min: 0.013
    max: 0.018
time:
  dt: 0.003
  t_end: 0.68
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background:
              sample: uniform
              min: 0.45
              max: 0.75
            generators:
            - count:
                sample: randint
                min: 2
                max: 4
              amplitude:
                sample: uniform
                min: 0.25
                max: 0.75
              sigma:
                sample: uniform
                min: 0.08
                max: 0.15
              center:
              - sample: uniform
                min: 0.22
                max: 1.0
              - sample: uniform
                min: 0.22
                max: 0.9
              aspect_ratio:
                sample: uniform
                min: 1.2
                max: 3.4
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.35
                max: 0.35
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.0
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.25
                max: 0.25
boundary_conditions:
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.9
                max: 1.25
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.08
                max: 0.08
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 41
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
