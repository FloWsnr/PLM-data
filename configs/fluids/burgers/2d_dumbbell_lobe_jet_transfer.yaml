preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.003
    max: 0.0065
  lobe_y:
    sample: uniform
    min: -0.04
    max: 0.04
domain:
  type: dumbbell
  allow_sampling: true
  left_center: [-0.62, "param:lobe_y"]
  right_center: [0.62, "param:lobe_y"]
  lobe_radius:
    sample: uniform
    min: 0.48
    max: 0.58
  neck_width:
    sample: uniform
    min: 0.22
    max: 0.36
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.019
time:
  dt: 0.0035
  t_end: 0.82
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background:
              sample: uniform
              min: 0.15
              max: 0.35
            generators:
            - count:
                sample: randint
                min: 2
                max: 4
              amplitude:
                sample: uniform
                min: 0.55
                max: 1.2
              sigma:
                sample: uniform
                min: 0.08
                max: 0.14
              center:
              - sample: uniform
                min: -0.92
                max: -0.22
              - sample: uniform
                min: -0.32
                max: 0.32
              aspect_ratio:
                sample: uniform
                min: 1.2
                max: 3.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.45
                max: 0.45
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 1.0
                max: 3.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.5
                max: 0.5
boundary_conditions:
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 43
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
