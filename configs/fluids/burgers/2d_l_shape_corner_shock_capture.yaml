preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.0035
    max: 0.007
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 1.32
    max: 1.48
  outer_height:
    sample: uniform
    min: 1.32
    max: 1.48
  cutout_width:
    sample: uniform
    min: 0.48
    max: 0.62
  cutout_height:
    sample: uniform
    min: 0.48
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.0035
  t_end: 0.78
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.2
            sigma:
              sample: uniform
              min: 0.12
              max: 0.2
            center:
            - sample: uniform
              min: 0.16
              max: 0.42
            - sample: uniform
              min: 0.78
              max: 1.12
            wavevector:
            - sample: uniform
              min: 5.0
              max: 9.0
            - sample: uniform
              min: -8.0
              max: -4.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -1.0
              max: -0.55
            sigma:
              sample: uniform
              min: 0.12
              max: 0.2
            center:
            - sample: uniform
              min: 0.55
              max: 1.05
            - sample: uniform
              min: 0.12
              max: 0.42
            wavevector:
            - sample: uniform
              min: -8.0
              max: -4.0
            - sample: uniform
              min: 5.0
              max: 9.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
boundary_conditions:
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    notch:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 43
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
