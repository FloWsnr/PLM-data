preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.003
    max: 0.007
domain:
  type: multi_hole_plate
  allow_sampling: true
  width:
    sample: uniform
    min: 1.55
    max: 1.75
  height:
    sample: uniform
    min: 1.1
    max: 1.28
  holes:
  - center:
    - sample: uniform
      min: 0.42
      max: 0.52
    - sample: uniform
      min: 0.36
      max: 0.48
    radius:
      sample: uniform
      min: 0.105
      max: 0.14
  - center:
    - sample: uniform
      min: 0.78
      max: 0.9
    - sample: uniform
      min: 0.68
      max: 0.82
    radius:
      sample: uniform
      min: 0.105
      max: 0.14
  - center:
    - sample: uniform
      min: 1.14
      max: 1.28
    - sample: uniform
      min: 0.36
      max: 0.48
    radius:
      sample: uniform
      min: 0.105
      max: 0.14
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.0035
  t_end: 0.75
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background:
              sample: uniform
              min: 0.35
              max: 0.65
            modes:
            - amplitude:
                sample: uniform
                min: 0.45
                max: 0.85
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.45
                max: 0.45
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 3
                max: 5
              amplitude:
                sample: uniform
                min: -0.75
                max: 0.75
              sigma:
                sample: uniform
                min: 0.07
                max: 0.12
              center:
              - sample: uniform
                min: 0.18
                max: 1.4
              - sample: uniform
                min: 0.16
                max: 0.98
              aspect_ratio:
                sample: uniform
                min: 1.2
                max: 3.2
boundary_conditions:
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    holes:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 43
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
