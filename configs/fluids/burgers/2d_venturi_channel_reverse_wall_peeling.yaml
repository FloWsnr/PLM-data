preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.005
    max: 0.011
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.25
    max: 2.6
  height:
    sample: uniform
    min: 1.05
    max: 1.24
  throat_height:
    sample: uniform
    min: 0.42
    max: 0.62
  constriction_center_x:
    sample: uniform
    min: 1.05
    max: 1.45
  constriction_radius:
    sample: uniform
    min: 0.68
    max: 0.98
  mesh_size:
    sample: uniform
    min: 0.013
    max: 0.018
time:
  dt: 0.004
  t_end: 0.92
inputs:
  velocity:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.14
              max: -0.06
            sigma:
              sample: uniform
              min: 0.2
              max: 0.32
            center:
            - sample: uniform
              min: 1.1
              max: 1.55
            - sample: uniform
              min: 0.15
              max: 0.32
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.16
              max: 0.28
            center:
            - sample: uniform
              min: 1.1
              max: 1.55
            - sample: uniform
              min: 0.7
              max: 1.0
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background:
              sample: uniform
              min: -0.5
              max: -0.25
            modes:
            - amplitude:
                sample: uniform
                min: 0.35
                max: 0.7
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.35
                max: 0.35
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 3
                max: 5
              amplitude:
                sample: uniform
                min: -0.65
                max: 0.65
              sigma:
                sample: uniform
                min: 0.07
                max: 0.13
              center:
              - sample: uniform
                min: 0.85
                max: 2.1
              - sample: uniform
                min: 0.16
                max: 0.96
              aspect_ratio:
                sample: uniform
                min: 1.3
                max: 3.4
boundary_conditions:
  velocity:
    inlet:
    - operator: neumann
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.9
                max: -0.55
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.08
                max: 0.08
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 45
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
