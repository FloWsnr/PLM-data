preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.006
    max: 0.012
domain:
  type: disk
  allow_sampling: true
  center:
  - sample: uniform
    min: -0.03
    max: 0.03
  - sample: uniform
    min: -0.03
    max: 0.03
  radius:
    sample: uniform
    min: 0.96
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.004
  t_end: 0.95
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -1.15
              max: -0.65
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.65
              max: 1.15
boundary_conditions:
  velocity:
    outer:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  resolution: [144, 144]
  num_frames: 45
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
