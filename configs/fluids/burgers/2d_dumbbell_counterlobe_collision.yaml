preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.004
    max: 0.009
  lobe_y:
    sample: uniform
    min: -0.035
    max: 0.035
domain:
  type: dumbbell
  allow_sampling: true
  left_center: [-0.58, "param:lobe_y"]
  right_center: [0.58, "param:lobe_y"]
  lobe_radius:
    sample: uniform
    min: 0.5
    max: 0.6
  neck_width:
    sample: uniform
    min: 0.18
    max: 0.3
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.004
  t_end: 0.95
inputs:
  velocity:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.18
              max: -0.08
            sigma:
              sample: uniform
              min: 0.12
              max: 0.18
            center:
            - sample: uniform
              min: 0.12
              max: 0.36
            - sample: uniform
              min: -0.16
              max: 0.16
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.08
              max: 0.08
            sigma:
              sample: uniform
              min: 0.16
              max: 0.24
            center:
            - sample: uniform
              min: -0.1
              max: 0.1
            - sample: uniform
              min: -0.18
              max: 0.18
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left:
              sample: uniform
              min: 0.7
              max: 1.15
            value_right:
              sample: uniform
              min: -1.15
              max: -0.7
            x_split:
              sample: uniform
              min: -0.08
              max: 0.08
            axis: 0
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 2
                max: 3
              amplitude:
                sample: uniform
                min: -0.6
                max: 0.6
              sigma:
                sample: uniform
                min: 0.09
                max: 0.16
              center:
              - sample: uniform
                min: -0.85
                max: 0.85
              - sample: uniform
                min: -0.34
                max: 0.34
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 2.2
boundary_conditions:
  velocity:
    outer:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 45
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
