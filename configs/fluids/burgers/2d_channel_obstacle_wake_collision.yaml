preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.005
    max: 0.011
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 2.25
    max: 2.55
  height:
    sample: uniform
    min: 1.08
    max: 1.24
  obstacle_center:
  - sample: uniform
    min: 1.0
    max: 1.25
  - sample: uniform
    min: 0.42
    max: 0.68
  obstacle_radius:
    sample: uniform
    min: 0.14
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.013
    max: 0.018
time:
  dt: 0.004
  t_end: 0.9
inputs:
  velocity:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.16
              max: -0.06
            sigma:
              sample: uniform
              min: 0.18
              max: 0.28
            center:
            - sample: uniform
              min: 1.2
              max: 1.7
            - sample: uniform
              min: 0.42
              max: 0.75
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.12
            sigma:
              sample: uniform
              min: 0.16
              max: 0.26
            center:
            - sample: uniform
              min: 1.1
              max: 1.7
            - sample: uniform
              min: 0.35
              max: 0.85
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background:
              sample: uniform
              min: -0.25
              max: 0.05
            generators:
            - count:
                sample: randint
                min: 3
                max: 5
              amplitude:
                sample: uniform
                min: -1.0
                max: 1.0
              sigma:
                sample: uniform
                min: 0.08
                max: 0.14
              center:
              - sample: uniform
                min: 0.65
                max: 2.0
              - sample: uniform
                min: 0.18
                max: 0.95
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 2.5
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.35
                max: 0.7
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: -0.4
                max: 0.4
boundary_conditions:
  velocity:
    inlet:
    - operator: neumann
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.45
                max: -0.18
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.08
                max: 0.08
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    obstacle:
    - operator: neumann
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 45
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
