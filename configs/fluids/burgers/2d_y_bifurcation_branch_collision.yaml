preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.005
    max: 0.011
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.12
  branch_length:
    sample: uniform
    min: 1.0
    max: 1.28
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 52.0
  channel_width:
    sample: uniform
    min: 0.28
    max: 0.36
  mesh_size:
    sample: uniform
    min: 0.0075
    max: 0.0105
time:
  dt: 0.004
  t_end: 0.95
inputs:
  velocity:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.15
              max: -0.05
            sigma:
              sample: uniform
              min: 0.12
              max: 0.2
            center:
            - sample: uniform
              min: 0.7
              max: 1.05
            - sample: uniform
              min: -0.08
              max: 0.08
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.08
              max: 0.08
            sigma:
              sample: uniform
              min: 0.12
              max: 0.2
            center:
            - sample: uniform
              min: 0.7
              max: 1.05
            - sample: uniform
              min: -0.08
              max: 0.08
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left:
              sample: uniform
              min: -0.7
              max: -0.35
            value_right:
              sample: uniform
              min: 0.45
              max: 0.85
            x_split:
              sample: uniform
              min: 0.7
              max: 0.98
            axis: 0
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.75
              max: 0.75
            sigma:
              sample: uniform
              min: 0.1
              max: 0.16
            center:
            - sample: uniform
              min: 1.05
              max: 1.55
            - sample: uniform
              min: -0.45
              max: 0.45
            wavevector:
            - sample: uniform
              min: -9.0
              max: -5.0
            - sample: uniform
              min: -4.0
              max: 4.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
boundary_conditions:
  velocity:
    inlet:
    - operator: neumann
      value: [0.0, 0.0]
    outlet_upper:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.75
                max: -0.45
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.18
                max: -0.04
    outlet_lower:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.75
                max: -0.45
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.04
                max: 0.18
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 45
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
