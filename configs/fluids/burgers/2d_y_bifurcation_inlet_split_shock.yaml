preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.0028
    max: 0.0065
domain:
  type: y_bifurcation
  allow_sampling: true
  inlet_length:
    sample: uniform
    min: 0.95
    max: 1.15
  branch_length:
    sample: uniform
    min: 1.0
    max: 1.25
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 0.28
    max: 0.36
  mesh_size:
    sample: uniform
    min: 0.0075
    max: 0.0105
time:
  dt: 0.003
  t_end: 0.7
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.8
              max: 1.25
            sigma:
              sample: uniform
              min: 0.1
              max: 0.16
            center:
            - sample: uniform
              min: 0.08
              max: 0.36
            - sample: uniform
              min: -0.08
              max: 0.08
            wavevector:
            - sample: uniform
              min: 6.0
              max: 10.0
            - sample: uniform
              min: -2.0
              max: 2.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 2
                max: 4
              amplitude:
                sample: uniform
                min: -0.45
                max: 0.45
              sigma:
                sample: uniform
                min: 0.06
                max: 0.12
              center:
              - sample: uniform
                min: 0.08
                max: 1.0
              - sample: uniform
                min: -0.18
                max: 0.18
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 2.8
boundary_conditions:
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.85
                max: 1.2
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.08
                max: 0.08
    outlet_upper:
    - operator: neumann
      value: [0.0, 0.0]
    outlet_lower:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 41
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
