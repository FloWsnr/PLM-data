preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.005
    max: 0.011
domain:
  type: multi_hole_plate
  allow_sampling: true
  width:
    sample: uniform
    min: 1.5
    max: 1.72
  height:
    sample: uniform
    min: 1.12
    max: 1.32
  holes:
  - center:
    - sample: uniform
      min: 0.36
      max: 0.48
    - sample: uniform
      min: 0.58
      max: 0.74
    radius:
      sample: uniform
      min: 0.11
      max: 0.145
  - center:
    - sample: uniform
      min: 0.76
      max: 0.92
    - sample: uniform
      min: 0.34
      max: 0.48
    radius:
      sample: uniform
      min: 0.09
      max: 0.125
  - center:
    - sample: uniform
      min: 1.14
      max: 1.3
    - sample: uniform
      min: 0.62
      max: 0.8
    radius:
      sample: uniform
      min: 0.105
      max: 0.14
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.004
  t_end: 0.95
inputs:
  velocity:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.16
              max: 0.25
            center:
            - sample: uniform
              min: 0.6
              max: 1.0
            - sample: uniform
              min: 0.45
              max: 0.8
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.18
              max: -0.08
            sigma:
              sample: uniform
              min: 0.16
              max: 0.25
            center:
            - sample: uniform
              min: 0.6
              max: 1.0
            - sample: uniform
              min: 0.45
              max: 0.8
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 4
                max: 6
              amplitude:
                sample: uniform
                min: -0.9
                max: 0.9
              sigma:
                sample: uniform
                min: 0.065
                max: 0.11
              center:
              - sample: uniform
                min: 0.18
                max: 1.38
              - sample: uniform
                min: 0.18
                max: 1.0
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 2.6
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 4
                max: 6
              amplitude:
                sample: uniform
                min: -0.9
                max: 0.9
              sigma:
                sample: uniform
                min: 0.065
                max: 0.11
              center:
              - sample: uniform
                min: 0.18
                max: 1.38
              - sample: uniform
                min: 0.18
                max: 1.0
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 2.6
boundary_conditions:
  velocity:
    outer:
    - operator: neumann
      value: [0.0, 0.0]
    holes:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.25
                max: 0.25
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.25
                max: 0.25
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 45
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
