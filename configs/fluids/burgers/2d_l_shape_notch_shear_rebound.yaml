preset: burgers
parameters:
  nu:
    sample: uniform
    min: 0.005
    max: 0.011
domain:
  type: l_shape
  allow_sampling: true
  outer_width:
    sample: uniform
    min: 1.28
    max: 1.46
  outer_height:
    sample: uniform
    min: 1.28
    max: 1.46
  cutout_width:
    sample: uniform
    min: 0.42
    max: 0.58
  cutout_height:
    sample: uniform
    min: 0.42
    max: 0.58
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.004
  t_end: 0.9
inputs:
  velocity:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.06
              max: 0.16
            sigma:
              sample: uniform
              min: 0.18
              max: 0.28
            center:
            - sample: uniform
              min: 0.58
              max: 0.88
            - sample: uniform
              min: 0.58
              max: 0.88
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.16
              max: -0.06
            sigma:
              sample: uniform
              min: 0.18
              max: 0.28
            center:
            - sample: uniform
              min: 0.58
              max: 0.88
            - sample: uniform
              min: 0.58
              max: 0.88
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.45
                max: 0.85
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
              angle:
                sample: uniform
                min: 0.4
                max: 0.9
        y:
          type: step
          params:
            value_left:
              sample: uniform
              min: -0.75
              max: -0.35
            value_right:
              sample: uniform
              min: 0.35
              max: 0.75
            x_split:
              sample: uniform
              min: 0.45
              max: 0.7
            axis: 1
boundary_conditions:
  velocity:
    outer:
    - operator: neumann
      value: [0.0, 0.0]
    notch:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value:
                sample: uniform
                min: 0.35
                max: 0.75
          y:
            type: constant
            params:
              value:
                sample: uniform
                min: -0.35
                max: 0.35
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
output:
  resolution: [144, 144]
  num_frames: 45
  formats: [numpy, gif]
  fields:
    velocity:
      mode: components
seed: 42
