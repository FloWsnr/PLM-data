preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 1.0
    max: 1.14
  mean_depth:
    sample: uniform
    min: 1.08
    max: 1.22
  drag:
    sample: uniform
    min: 0.016
    max: 0.03
  viscosity:
    sample: uniform
    min: 0.003
    max: 0.0052
  coriolis:
    sample: uniform
    min: -0.12
    max: 0.12
  inlet_height:
    sample: uniform
    min: 0.015
    max: 0.045
  inlet_speed:
    sample: uniform
    min: 0.08
    max: 0.18
  inlet_crossflow:
    sample: uniform
    min: -0.02
    max: 0.02
coefficients:
  bathymetry:
    type: sine_waves
    params:
      background: 0.0
      modes:
      - amplitude:
          sample: uniform
          min: 0.01
          max: 0.04
        cycles:
        - sample: uniform
          min: 1.0
          max: 2.0
        - sample: uniform
          min: 2.0
          max: 3.0
        phase:
          sample: uniform
          min: 0.0
          max: 6.283185
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.8
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.095
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 4
  pitch_x:
    sample: uniform
    min: 0.36
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.27
    max: 0.3
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.18
  row_shift_fraction:
    sample: uniform
    min: 0.3
    max: 0.42
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0034
  t_end: 0.92
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 2
          amplitude:
            sample: uniform
            min: -0.08
            max: 0.1
          sigma:
            sample: uniform
            min: 0.04
            max: 0.07
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.7
          center:
          - sample: uniform
            min: 0.6
            max: 2.2
          - sample: uniform
            min: 0.18
            max: 0.82
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacles:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    obstacles:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
