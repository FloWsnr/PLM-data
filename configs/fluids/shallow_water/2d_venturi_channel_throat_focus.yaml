preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 1.0
    max: 1.28
  mean_depth:
    sample: uniform
    min: 0.98
    max: 1.16
  drag:
    sample: uniform
    min: 0.012
    max: 0.028
  viscosity:
    sample: uniform
    min: 0.0024
    max: 0.0054
  coriolis:
    sample: uniform
    min: -0.08
    max: 0.08
  inlet_height:
    sample: uniform
    min: 0.05
    max: 0.12
  inlet_speed:
    sample: uniform
    min: 0.18
    max: 0.34
  inlet_crossflow:
    sample: uniform
    min: -0.04
    max: 0.04
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.6
  height:
    sample: uniform
    min: 0.96
    max: 1.14
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.5
  constriction_center_x:
    sample: uniform
    min: 1.02
    max: 1.42
  constriction_radius:
    sample: uniform
    min: 0.58
    max: 0.9
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0032
  t_end: 1.0
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.06
            max: 0.14
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center:
          - sample: uniform
            min: 0.16
            max: 0.34
          - sample: uniform
            min: 0.42
            max: 0.66
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
