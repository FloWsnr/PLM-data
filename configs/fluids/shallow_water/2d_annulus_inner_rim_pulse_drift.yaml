preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.92
    max: 1.16
  mean_depth:
    sample: uniform
    min: 0.94
    max: 1.12
  drag:
    sample: uniform
    min: 0.006
    max: 0.018
  viscosity:
    sample: uniform
    min: 0.0018
    max: 0.004
  coriolis:
    sample: uniform
    min: -0.78
    max: -0.38
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: -0.08
        max: -0.03
      sigma:
        sample: uniform
        min: 0.18
        max: 0.28
      center:
      - sample: uniform
        min: -0.18
        max: 0.18
      - sample: uniform
        min: -0.18
        max: 0.18
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.22
    max: 0.3
  outer_radius:
    sample: uniform
    min: 0.96
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.014
time:
  dt: 0.0042
  t_end: 1.7
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.06
            max: 0.12
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 0.26
            max: 0.42
          - sample: uniform
            min: -0.12
            max: 0.12
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: 0.22
              max: 0.38
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: -0.38
              max: -0.22
boundary_conditions:
  height:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    inner:
    - operator: dirichlet
      value: [0.0, 0.0]
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
