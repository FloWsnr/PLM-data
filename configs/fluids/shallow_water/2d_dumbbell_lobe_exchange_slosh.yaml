preset: shallow_water
parameters:
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  gravity:
    sample: uniform
    min: 1.0
    max: 1.28
  mean_depth:
    sample: uniform
    min: 0.96
    max: 1.18
  drag:
    sample: uniform
    min: 0.01
    max: 0.026
  viscosity:
    sample: uniform
    min: 0.0022
    max: 0.005
  coriolis:
    sample: uniform
    min: -0.08
    max: 0.08
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.05
        max: 0.11
      sigma:
        sample: uniform
        min: 0.06
        max: 0.1
      center: [0.5, param:center_y]
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: 0.28
    max: 0.34
  - param:center_y
  right_center:
  - sample: uniform
    min: 0.66
    max: 0.72
  - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.1
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.0135
time:
  dt: 0.0042
  t_end: 1.5
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.18
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.5
          center:
          - sample: uniform
            min: 0.18
            max: 0.32
          - param:center_y
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.08
              max: 0.18
        y:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.04
              max: 0.04
boundary_conditions:
  height:
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
