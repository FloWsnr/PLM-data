preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.86
    max: 1.08
  mean_depth:
    sample: uniform
    min: 0.92
    max: 1.12
  drag:
    sample: uniform
    min: 0.004
    max: 0.012
  viscosity:
    sample: uniform
    min: 0.0016
    max: 0.0034
  coriolis:
    sample: uniform
    min: 0.72
    max: 1.12
coefficients:
  bathymetry:
    type: radial_cosine
    params:
      base: 0.0
      amplitude:
        sample: uniform
        min: 0.015
        max: 0.05
      frequency:
        sample: uniform
        min: 2.0
        max: 4.0
      center: [0.0, 0.0]
domain:
  allow_sampling: true
  type: disk
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 0.94
    max: 1.04
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.014
time:
  dt: 0.0044
  t_end: 1.8
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.16
          sigma:
            sample: uniform
            min: 0.07
            max: 0.12
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 1.8
          center: [0.24, 0.0]
        - count: 1
          amplitude:
            sample: uniform
            min: -0.14
            max: -0.06
          sigma:
            sample: uniform
            min: 0.07
            max: 0.12
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 1.8
          center: [-0.24, 0.0]
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            constant: 0.18
            y:
              sample: uniform
              min: -0.42
              max: -0.26
        y:
          type: affine
          params:
            constant: -0.18
            x:
              sample: uniform
              min: 0.26
              max: 0.42
boundary_conditions:
  height:
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
