preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 1.0
    max: 1.28
  mean_depth:
    sample: uniform
    min: 0.98
    max: 1.18
  drag:
    sample: uniform
    min: 0.012
    max: 0.028
  viscosity:
    sample: uniform
    min: 0.0026
    max: 0.0054
  coriolis:
    sample: uniform
    min: -0.08
    max: 0.08
  inlet_height:
    sample: uniform
    min: 0.05
    max: 0.12
  inlet_speed:
    sample: uniform
    min: 0.16
    max: 0.3
  inlet_crossflow:
    sample: uniform
    min: -0.04
    max: 0.04
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  allow_sampling: true
  type: porous_channel
  length:
    sample: uniform
    min: 2.55
    max: 2.8
  height: 1.0
  obstacle_radius:
    sample: uniform
    min: 0.085
    max: 0.11
  n_rows:
    sample: randint
    min: 2
    max: 3
  n_cols:
    sample: randint
    min: 4
    max: 5
  pitch_x:
    sample: uniform
    min: 0.34
    max: 0.4
  pitch_y:
    sample: uniform
    min: 0.25
    max: 0.3
  x_margin:
    sample: uniform
    min: 0.2
    max: 0.28
  y_margin:
    sample: uniform
    min: 0.12
    max: 0.18
  row_shift_fraction:
    sample: uniform
    min: 0.28
    max: 0.48
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0032
  t_end: 0.95
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 2
          amplitude:
            sample: uniform
            min: 0.05
            max: 0.12
          sigma:
            sample: uniform
            min: 0.05
            max: 0.08
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: 0.12
            max: 0.28
          - sample: uniform
            min: 0.2
            max: 0.8
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.05
                max: 0.05
              cycles:
              - sample: uniform
                min: 0.3
                max: 0.6
              - 0.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacles:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    obstacles:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
