preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.9
    max: 1.12
  mean_depth:
    sample: uniform
    min: 0.96
    max: 1.16
  drag:
    sample: uniform
    min: 0.004
    max: 0.012
  viscosity:
    sample: uniform
    min: 0.0016
    max: 0.0034
  coriolis:
    sample: uniform
    min: 0.58
    max: 0.96
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  allow_sampling: true
  type: rectangle
  size:
  - sample: uniform
    min: 0.96
    max: 1.1
  - sample: uniform
    min: 0.96
    max: 1.1
  mesh_resolution: [160, 160]
time:
  dt: 0.0045
  t_end: 1.8
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 3
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.18
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.7
          center:
          - sample: uniform
            min: 0.18
            max: 0.44
          - sample: uniform
            min: 0.24
            max: 0.58
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            constant:
              sample: uniform
              min: 0.16
              max: 0.28
            y:
              sample: uniform
              min: -0.48
              max: -0.28
        y:
          type: affine
          params:
            constant:
              sample: uniform
              min: -0.28
              max: -0.16
            x:
              sample: uniform
              min: 0.28
              max: 0.48
boundary_conditions:
  height:
    $ref: boundary_field.scalar.full_periodic_2d
  velocity:
    $ref: boundary_field.vector.full_periodic_2d
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
