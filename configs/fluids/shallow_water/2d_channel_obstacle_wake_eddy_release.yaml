preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.98
    max: 1.1
  mean_depth:
    sample: uniform
    min: 1.18
    max: 1.32
  drag:
    sample: uniform
    min: 0.024
    max: 0.04
  viscosity:
    sample: uniform
    min: 0.0042
    max: 0.0068
  coriolis:
    sample: uniform
    min: -0.12
    max: -0.02
  inlet_height:
    sample: uniform
    min: 0.008
    max: 0.03
  inlet_speed:
    sample: uniform
    min: 0.06
    max: 0.13
  inlet_crossflow:
    sample: uniform
    min: -0.02
    max: 0.0
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.01
        max: 0.03
      sigma:
        sample: uniform
        min: 0.1
        max: 0.14
      center:
      - sample: uniform
        min: 0.96
        max: 1.22
      - sample: uniform
        min: 0.24
        max: 0.4
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 1.65
    max: 1.95
  height:
    sample: uniform
    min: 0.66
    max: 0.82
  obstacle_center:
  - sample: uniform
    min: 0.68
    max: 0.9
  - sample: uniform
    min: 0.31
    max: 0.38
  obstacle_radius:
    sample: uniform
    min: 0.055
    max: 0.07
  mesh_size:
    sample: uniform
    min: 0.0095
    max: 0.0135
time:
  dt: 0.003
  t_end: 0.84
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.055
            max: 0.11
          sigma:
            sample: uniform
            min: 0.045
            max: 0.07
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 2.0
          center:
          - sample: uniform
            min: 0.9
            max: 1.12
          - sample: uniform
            min: 0.16
            max: 0.28
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    obstacle:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
