preset: shallow_water
parameters:
  center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  gravity:
    sample: uniform
    min: 1.04
    max: 1.36
  mean_depth:
    sample: uniform
    min: 0.96
    max: 1.2
  drag:
    sample: uniform
    min: 0.01
    max: 0.028
  viscosity:
    sample: uniform
    min: 0.0022
    max: 0.0052
  coriolis:
    sample: uniform
    min: -0.08
    max: 0.08
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.04
        max: 0.1
      sigma:
        sample: uniform
        min: 0.14
        max: 0.22
      center:
      - sample: uniform
        min: -0.18
        max: 0.22
      - sample: uniform
        min: -0.18
        max: 0.22
domain:
  allow_sampling: true
  type: disk
  center: [param:center_x, param:center_y]
  radius:
    sample: uniform
    min: 0.94
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.014
time:
  dt: 0.0042
  t_end: 1.6
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.1
            max: 0.22
          sigma:
            sample: uniform
            min: 0.08
            max: 0.14
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: -0.28
            max: 0.16
          - sample: uniform
            min: -0.18
            max: 0.24
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  height:
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
