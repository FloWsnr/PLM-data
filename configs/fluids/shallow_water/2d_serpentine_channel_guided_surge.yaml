preset: shallow_water
parameters:
  channel_length:
    sample: uniform
    min: 0.94
    max: 1.04
  lane_spacing:
    sample: uniform
    min: 0.4
    max: 0.48
  gravity:
    sample: uniform
    min: 1.04
    max: 1.24
  mean_depth:
    sample: uniform
    min: 1.08
    max: 1.22
  drag:
    sample: uniform
    min: 0.02
    max: 0.034
  viscosity:
    sample: uniform
    min: 0.0034
    max: 0.0056
  coriolis:
    sample: uniform
    min: -0.04
    max: 0.04
  inlet_height:
    sample: uniform
    min: 0.045
    max: 0.09
  inlet_speed:
    sample: uniform
    min: 0.12
    max: 0.22
  inlet_crossflow:
    sample: uniform
    min: -0.02
    max: 0.02
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: param:channel_length
  lane_spacing: param:lane_spacing
  n_bends:
    sample: randint
    min: 2
    max: 3
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0032
  t_end: 0.92
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.05
            max: 0.11
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 1.8
          center:
          - sample: uniform
            min: 0.16
            max: 0.36
          - sample: uniform
            min: 0.18
            max: 0.36
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [192, 224]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
