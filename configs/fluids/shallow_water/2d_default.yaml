preset: shallow_water
parameters:
  gravity: 1.0
  mean_depth: 1.0
  drag: 0.01
  viscosity: 0.002
  coriolis: 0.5
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 64
  - 64
time:
  dt: 0.005
  t_end: 2.0
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.1275
            max: 0.1725
          sigma:
            sample: uniform
            min: 0.04
            max: 0.08
          center:
          - sample: uniform
            min: 0.22
            max: 0.4
          - sample: uniform
            min: 0.34
            max: 0.52
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  height:
    $ref: boundary_field.scalar.full_periodic_2d
  velocity:
    $ref: boundary_field.vector.full_periodic_2d
output:
  $ref: output.template.height_velocity
  resolution:
  - 96
  - 96
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
