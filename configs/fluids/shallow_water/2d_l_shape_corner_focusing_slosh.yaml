preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 1.02
    max: 1.34
  mean_depth:
    sample: uniform
    min: 0.98
    max: 1.2
  drag:
    sample: uniform
    min: 0.01
    max: 0.026
  viscosity:
    sample: uniform
    min: 0.0022
    max: 0.0048
  coriolis:
    sample: uniform
    min: -0.1
    max: 0.1
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.04
        max: 0.09
      sigma:
        sample: uniform
        min: 0.1
        max: 0.16
      center:
      - sample: uniform
        min: 0.6
        max: 0.82
      - sample: uniform
        min: 0.6
        max: 0.82
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.14
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.14
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.46
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.0135
time:
  dt: 0.0042
  t_end: 1.5
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.09
            max: 0.18
          sigma:
            sample: uniform
            min: 0.08
            max: 0.13
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 0.16
            max: 0.34
          - sample: uniform
            min: 0.14
            max: 0.34
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.08
              max: 0.18
        y:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.08
              max: 0.18
boundary_conditions:
  height:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    notch:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
