preset: shallow_water
parameters:
  channel_length:
    sample: uniform
    min: 0.94
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.38
    max: 0.48
  gravity:
    sample: uniform
    min: 0.92
    max: 1.14
  mean_depth:
    sample: uniform
    min: 0.94
    max: 1.12
  drag:
    sample: uniform
    min: 0.008
    max: 0.02
  viscosity:
    sample: uniform
    min: 0.0022
    max: 0.0046
  coriolis:
    sample: uniform
    min: -0.18
    max: 0.18
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.08
      sigma:
        sample: uniform
        min: 0.08
        max: 0.14
      center:
      - sample: uniform
        min: 0.52
        max: 0.9
      - sample: uniform
        min: 0.42
        max: 1.18
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: param:channel_length
  lane_spacing: param:lane_spacing
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0036
  t_end: 1.2
inputs:
  height:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.09
          cycles:
          - sample: uniform
            min: 0.6
            max: 1.0
          - sample: uniform
            min: 2.0
            max: 4.0
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  height:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [192, 224]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
