preset: shallow_water
parameters:
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.5
  gravity:
    sample: uniform
    min: 0.92
    max: 1.14
  mean_depth:
    sample: uniform
    min: 0.94
    max: 1.12
  drag:
    sample: uniform
    min: 0.008
    max: 0.02
  viscosity:
    sample: uniform
    min: 0.0022
    max: 0.0046
  coriolis:
    sample: uniform
    min: -0.18
    max: 0.18
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.08
      sigma:
        sample: uniform
        min: 0.08
        max: 0.14
      center:
      - param:cavity_center_x
      - sample: uniform
        min: 0.82
        max: 1.0
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.7
    max: 0.84
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.58
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.5
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0036
  t_end: 1.2
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.16
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - param:cavity_center_x
          - sample: uniform
            min: 0.82
            max: 1.0
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  height:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
