preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.9
    max: 1.12
  mean_depth:
    sample: uniform
    min: 0.92
    max: 1.12
  drag:
    sample: uniform
    min: 0.006
    max: 0.016
  viscosity:
    sample: uniform
    min: 0.0018
    max: 0.004
  coriolis:
    sample: uniform
    min: -0.24
    max: 0.24
coefficients:
  bathymetry:
    type: step
    params:
      axis: 0
      x_split:
        sample: uniform
        min: 0.42
        max: 0.64
      value_left:
        sample: uniform
        min: -0.06
        max: -0.02
      value_right:
        sample: uniform
        min: 0.02
        max: 0.08
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 0.98
    max: 1.14
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.14
  cutout_width:
    sample: uniform
    min: 0.34
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.46
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.0135
time:
  dt: 0.004
  t_end: 1.45
inputs:
  height:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.09
          cycles:
          - sample: uniform
            min: 1.5
            max: 3.0
          - sample: uniform
            min: 2.0
            max: 4.0
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
          angle:
            sample: uniform
            min: 0.2
            max: 0.8
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.12
              max: 0.24
        y:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.24
              max: -0.12
boundary_conditions:
  height:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    notch:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
