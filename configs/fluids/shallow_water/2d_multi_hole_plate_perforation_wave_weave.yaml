preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 1.0
    max: 1.28
  mean_depth:
    sample: uniform
    min: 0.98
    max: 1.2
  drag:
    sample: uniform
    min: 0.01
    max: 0.024
  viscosity:
    sample: uniform
    min: 0.0022
    max: 0.0046
  coriolis:
    sample: uniform
    min: -0.1
    max: 0.1
coefficients:
  bathymetry:
    type: sine_waves
    params:
      background: 0.0
      modes:
      - amplitude:
          sample: uniform
          min: 0.015
          max: 0.05
        cycles:
        - sample: uniform
          min: 1.0
          max: 2.0
        - sample: uniform
          min: 2.0
          max: 4.0
        phase:
          sample: uniform
          min: 0.0
          max: 6.283185
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.16
    max: 1.28
  height:
    sample: uniform
    min: 0.88
    max: 0.98
  holes:
  - center:
    - sample: uniform
      min: 0.24
      max: 0.32
    - sample: uniform
      min: 0.24
      max: 0.34
    radius:
      sample: uniform
      min: 0.05
      max: 0.075
    boundary_name: holes_left
  - center:
    - sample: uniform
      min: 0.58
      max: 0.68
    - sample: uniform
      min: 0.46
      max: 0.6
    radius:
      sample: uniform
      min: 0.05
      max: 0.08
    boundary_name: hole_center
  - center:
    - sample: uniform
      min: 0.9
      max: 0.98
    - sample: uniform
      min: 0.22
      max: 0.34
    radius:
      sample: uniform
      min: 0.05
      max: 0.075
    boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.0095
    max: 0.0135
time:
  dt: 0.0038
  t_end: 1.2
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.16
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: 0.12
            max: 0.24
          - sample: uniform
            min: 0.36
            max: 0.56
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.14
              max: 0.24
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.05
                max: 0.05
              cycles:
              - sample: uniform
                min: 0.6
                max: 1.2
              - 0.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
boundary_conditions:
  height:
    outer:
    - operator: neumann
      value: 0.0
    holes_left:
    - operator: neumann
      value: 0.0
    hole_center:
    - operator: neumann
      value: 0.0
    holes_right:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    holes_left:
    - operator: dirichlet
      value: [0.0, 0.0]
    hole_center:
    - operator: dirichlet
      value: [0.0, 0.0]
    holes_right:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
