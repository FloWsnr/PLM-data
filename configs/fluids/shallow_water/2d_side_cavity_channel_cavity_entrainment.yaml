preset: shallow_water
parameters:
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.5
  gravity:
    sample: uniform
    min: 1.02
    max: 1.18
  mean_depth:
    sample: uniform
    min: 1.16
    max: 1.3
  drag:
    sample: uniform
    min: 0.024
    max: 0.038
  viscosity:
    sample: uniform
    min: 0.004
    max: 0.006
  coriolis:
    sample: uniform
    min: -0.02
    max: 0.02
  inlet_height:
    sample: uniform
    min: 0.02
    max: 0.06
  inlet_speed:
    sample: uniform
    min: 0.08
    max: 0.16
  inlet_crossflow:
    sample: uniform
    min: -0.01
    max: 0.01
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.7
  height:
    sample: uniform
    min: 0.7
    max: 0.84
  cavity_width:
    sample: uniform
    min: 0.38
    max: 0.48
  cavity_depth:
    sample: uniform
    min: 0.3
    max: 0.38
  cavity_center_x: param:cavity_center_x
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0032
  t_end: 0.84
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.03
            max: 0.08
          sigma:
            sample: uniform
            min: 0.06
            max: 0.085
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 1.7
          center:
          - sample: uniform
            min: 0.72
            max: 1.08
          - sample: uniform
            min: 0.28
            max: 0.46
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
