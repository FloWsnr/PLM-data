preset: shallow_water
parameters:
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  gravity:
    sample: uniform
    min: 0.88
    max: 1.12
  mean_depth:
    sample: uniform
    min: 0.92
    max: 1.12
  drag:
    sample: uniform
    min: 0.005
    max: 0.014
  viscosity:
    sample: uniform
    min: 0.0016
    max: 0.0036
  coriolis:
    sample: uniform
    min: 0.42
    max: 0.76
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: 0.28
    max: 0.34
  - param:center_y
  right_center:
  - sample: uniform
    min: 0.66
    max: 0.72
  - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.1
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.0135
time:
  dt: 0.0044
  t_end: 1.7
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.06
            max: 0.12
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center: [0.26, param:center_y]
        - count: 1
          amplitude:
            sample: uniform
            min: -0.12
            max: -0.05
          sigma:
            sample: uniform
            min: 0.05
            max: 0.09
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center: [0.74, param:center_y]
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            constant: 0.18
            y:
              sample: uniform
              min: -0.44
              max: -0.28
        y:
          type: affine
          params:
            constant: -0.18
            x:
              sample: uniform
              min: 0.28
              max: 0.44
boundary_conditions:
  height:
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
