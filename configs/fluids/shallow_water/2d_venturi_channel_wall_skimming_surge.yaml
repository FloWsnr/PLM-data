preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.92
    max: 1.14
  mean_depth:
    sample: uniform
    min: 0.94
    max: 1.12
  drag:
    sample: uniform
    min: 0.008
    max: 0.02
  viscosity:
    sample: uniform
    min: 0.002
    max: 0.0046
  coriolis:
    sample: uniform
    min: -0.24
    max: -0.06
  inlet_height:
    sample: uniform
    min: 0.03
    max: 0.08
  inlet_speed:
    sample: uniform
    min: 0.14
    max: 0.28
  inlet_crossflow:
    sample: uniform
    min: -0.12
    max: -0.04
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.08
      sigma:
        sample: uniform
        min: 0.1
        max: 0.16
      center:
      - sample: uniform
        min: 1.12
        max: 1.48
      - sample: uniform
        min: 0.72
        max: 0.92
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.6
  height:
    sample: uniform
    min: 0.96
    max: 1.14
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.5
  constriction_center_x:
    sample: uniform
    min: 1.02
    max: 1.42
  constriction_radius:
    sample: uniform
    min: 0.58
    max: 0.9
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0034
  t_end: 1.1
inputs:
  height:
    initial_condition:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.05
          max: 0.12
        frequency:
          sample: uniform
          min: 3.0
          max: 5.0
        center:
        - sample: uniform
          min: 0.22
          max: 0.38
        - sample: uniform
          min: 0.76
          max: 0.96
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
