preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.9
    max: 1.12
  mean_depth:
    sample: uniform
    min: 0.94
    max: 1.12
  drag:
    sample: uniform
    min: 0.008
    max: 0.02
  viscosity:
    sample: uniform
    min: 0.0022
    max: 0.0048
  coriolis:
    sample: uniform
    min: -0.24
    max: -0.04
  inlet_height:
    sample: uniform
    min: 0.03
    max: 0.08
  inlet_speed:
    sample: uniform
    min: 0.16
    max: 0.3
  inlet_crossflow:
    sample: uniform
    min: -0.12
    max: -0.04
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: -0.05
        max: -0.02
      sigma:
        sample: uniform
        min: 0.1
        max: 0.16
      center:
      - sample: uniform
        min: 1.46
        max: 1.88
      - sample: uniform
        min: 0.32
        max: 0.48
domain:
  allow_sampling: true
  type: airfoil_channel
  length:
    sample: uniform
    min: 2.4
    max: 2.8
  height:
    sample: uniform
    min: 1.0
    max: 1.16
  airfoil_center:
  - sample: uniform
    min: 1.06
    max: 1.34
  - sample: uniform
    min: 0.46
    max: 0.62
  chord_length:
    sample: uniform
    min: 0.52
    max: 0.66
  thickness_ratio:
    sample: uniform
    min: 0.1
    max: 0.16
  attack_angle_degrees:
    sample: uniform
    min: 4.0
    max: 12.0
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.014
time:
  dt: 0.0034
  t_end: 1.1
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.05
            max: 0.12
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.0
          center:
          - sample: uniform
            min: 0.28
            max: 0.58
          - sample: uniform
            min: 0.22
            max: 0.42
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: param:inlet_speed
        y:
          type: constant
          params:
            value: param:inlet_crossflow
boundary_conditions:
  height:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:inlet_height
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    airfoil:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value:
        components:
          x:
            type: constant
            params:
              value: param:inlet_speed
          y:
            type: constant
            params:
              value: param:inlet_crossflow
    outlet:
    - operator: neumann
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    airfoil:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
