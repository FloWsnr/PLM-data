preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.9
    max: 1.14
  mean_depth:
    sample: uniform
    min: 0.94
    max: 1.14
  drag:
    sample: uniform
    min: 0.008
    max: 0.02
  viscosity:
    sample: uniform
    min: 0.002
    max: 0.0044
  coriolis:
    sample: uniform
    min: -0.16
    max: 0.16
coefficients:
  bathymetry:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.08
      sigma:
        sample: uniform
        min: 0.1
        max: 0.16
      center:
      - sample: uniform
        min: 0.9
        max: 1.16
      - sample: uniform
        min: -0.06
        max: 0.06
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.94
    max: 1.14
  branch_length:
    sample: uniform
    min: 0.96
    max: 1.22
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 46.0
  channel_width:
    sample: uniform
    min: 0.22
    max: 0.3
  mesh_size:
    sample: uniform
    min: 0.0095
    max: 0.0135
time:
  dt: 0.0036
  t_end: 1.2
inputs:
  height:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.06
            max: 0.12
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 1.52
            max: 1.92
          - sample: uniform
            min: 0.28
            max: 0.56
        - count: 1
          amplitude:
            sample: uniform
            min: -0.12
            max: -0.05
          sigma:
            sample: uniform
            min: 0.06
            max: 0.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 1.52
            max: 1.92
          - sample: uniform
            min: -0.56
            max: -0.28
  velocity:
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  height:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: neumann
      value: 0.0
    outlet_lower:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  velocity:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet_upper:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet_lower:
    - operator: dirichlet
      value: [0.0, 0.0]
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 57
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
