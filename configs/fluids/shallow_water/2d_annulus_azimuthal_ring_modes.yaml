preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.84
    max: 1.04
  mean_depth:
    sample: uniform
    min: 0.96
    max: 1.18
  drag:
    sample: uniform
    min: 0.004
    max: 0.012
  viscosity:
    sample: uniform
    min: 0.0018
    max: 0.0036
  coriolis:
    sample: uniform
    min: 0.2
    max: 0.5
coefficients:
  bathymetry:
    type: radial_cosine
    params:
      base: 0.0
      amplitude:
        sample: uniform
        min: 0.03
        max: 0.07
      frequency:
        sample: uniform
        min: 2.0
        max: 4.0
      center: [0.0, 0.0]
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.24
    max: 0.32
  outer_radius:
    sample: uniform
    min: 0.96
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.014
time:
  dt: 0.0045
  t_end: 1.8
inputs:
  height:
    initial_condition:
      type: radial_cosine
      params:
        base: 0.0
        amplitude:
          sample: uniform
          min: 0.06
          max: 0.12
        frequency:
          sample: uniform
          min: 4.0
          max: 7.0
        center: [0.0, 0.0]
  velocity:
    initial_condition:
      components:
        x:
          type: affine
          params:
            y:
              sample: uniform
              min: -0.34
              max: -0.2
        y:
          type: affine
          params:
            x:
              sample: uniform
              min: 0.2
              max: 0.34
boundary_conditions:
  height:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
  velocity:
    inner:
    - operator: dirichlet
      value: [0.0, 0.0]
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 53
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
