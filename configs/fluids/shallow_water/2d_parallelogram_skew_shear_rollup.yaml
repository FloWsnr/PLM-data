preset: shallow_water
parameters:
  gravity:
    sample: uniform
    min: 0.92
    max: 1.18
  mean_depth:
    sample: uniform
    min: 0.96
    max: 1.14
  drag:
    sample: uniform
    min: 0.005
    max: 0.016
  viscosity:
    sample: uniform
    min: 0.0018
    max: 0.0042
  coriolis:
    sample: uniform
    min: -0.18
    max: 0.18
  lower_wall_speed:
    sample: uniform
    min: 0.18
    max: 0.34
  upper_wall_speed:
    sample: uniform
    min: -0.34
    max: -0.18
coefficients:
  bathymetry:
    type: constant
    params:
      value: 0.0
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [1.0, 0.0]
  axis_y:
  - sample: uniform
    min: 0.24
    max: 0.42
  - sample: uniform
    min: 0.9
    max: 1.06
  mesh_resolution: [160, 160]
time:
  dt: 0.004
  t_end: 1.4
inputs:
  height:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.035
            max: 0.08
          cycles:
          - sample: uniform
            min: 3.0
            max: 5.0
          - sample: uniform
            min: 1.0
            max: 2.0
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
          angle:
            sample: uniform
            min: 0.3
            max: 0.7
  velocity:
    initial_condition:
      components:
        x:
          type: step
          params:
            axis: 1
            x_split:
              sample: uniform
              min: 0.42
              max: 0.58
            value_left: param:lower_wall_speed
            value_right: param:upper_wall_speed
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.015
                max: 0.04
              cycles:
              - sample: uniform
                min: 2.0
                max: 4.0
              - sample: uniform
                min: 1.0
                max: 2.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185
boundary_conditions:
  height:
    x-:
    - operator: periodic
      pair_with: x+
    x+:
    - operator: periodic
      pair_with: x-
    y-:
    - operator: dirichlet
      value: 0.0
    y+:
    - operator: dirichlet
      value: 0.0
  velocity:
    x-:
    - operator: periodic
      pair_with: x+
    x+:
    - operator: periodic
      pair_with: x-
    y-:
    - operator: dirichlet
      value: [param:lower_wall_speed, 0.0]
    y+:
    - operator: dirichlet
      value: [param:upper_wall_speed, 0.0]
output:
  $ref: output.template.height_velocity
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
