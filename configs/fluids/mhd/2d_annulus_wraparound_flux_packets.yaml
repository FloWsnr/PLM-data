preset: mhd
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  Re:
    sample: uniform
    min: 28.0
    max: 54.0
  Rm:
    sample: uniform
    min: 18.0
    max: 40.0
  k: 1.0
domain:
  type: annulus
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.24
    max: 0.34
  outer_radius:
    sample: uniform
    min: 0.96
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.017
time:
  dt: 0.008
  t_end: 0.78
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.5
                  max: 0.85
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.7
                center:
                  - sample: uniform
                    min: 0.46
                    max: 0.76
                  - sample: uniform
                    min: -0.18
                    max: 0.18
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.85
                  max: -0.5
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.1
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.7
                center:
                  - sample: uniform
                    min: -0.76
                    max: -0.46
                  - sample: uniform
                    min: -0.18
                    max: 0.18
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.22
                  max: 0.5
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.095
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: -0.2
                    max: 0.2
                  - sample: uniform
                    min: 0.46
                    max: 0.74
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.5
                  max: -0.22
                sigma:
                  sample: uniform
                  min: 0.06
                  max: 0.095
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: -0.2
                    max: 0.2
                  - sample: uniform
                    min: -0.74
                    max: -0.46
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.35
                  max: 0.72
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.22
                    max: 0.48
                  - sample: uniform
                    min: 0.42
                    max: 0.7
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.72
                  max: -0.35
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: -0.48
                    max: -0.22
                  - sample: uniform
                    min: -0.7
                    max: -0.42
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.3
                  max: 0.6
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: -0.58
                    max: -0.28
                  - sample: uniform
                    min: 0.2
                    max: 0.46
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.6
                  max: -0.3
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.28
                    max: 0.58
                  - sample: uniform
                    min: -0.46
                    max: -0.2
boundary_conditions:
  velocity:
    inner:
      - operator: dirichlet
        value: [0.0, 0.0]
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    inner:
      - operator: neumann
        value: [0.0, 0.0]
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [160, 160]
  num_frames: 42
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
