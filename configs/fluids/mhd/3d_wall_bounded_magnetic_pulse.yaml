preset: mhd
parameters:
  Re: 35.0
  Rm: 30.0
  k: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [10, 10, 10]
time:
  dt: 0.01
  t_end: 0.12
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: 0.42
            sigma: 0.16
            center: [0.4, 0.5, 0.5]
        y:
          type: constant
          params:
            value: 0.0
        z:
          type: gaussian_bump
          params:
            amplitude: -0.28
            sigma: 0.14
            center: [0.65, 0.5, 0.5]
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: gaussian_bump
          params:
            amplitude: 0.34
            sigma: 0.12
            center: [0.6, 0.5, 0.5]
        z:
          type: gaussian_bump
          params:
            amplitude: 0.26
            sigma: 0.12
            center: [0.35, 0.45, 0.55]
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.homogeneous_dirichlet_3d
  magnetic_field:
    $ref: boundary_field.vector.homogeneous_dirichlet_3d
output:
  formats:
    $ref: output.formats.standard
  fields:
    velocity:
      $ref: output.mode.components
    pressure: hidden
    magnetic_field:
      $ref: output.mode.components
    magnetic_constraint: hidden
  resolution: [24, 24, 24]
  num_frames: 12
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 13
