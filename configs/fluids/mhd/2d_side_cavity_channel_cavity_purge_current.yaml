preset: mhd
parameters:
  Re:
    sample: uniform
    min: 16.0
    max: 34.0
  Rm:
    sample: uniform
    min: 10.0
    max: 22.0
  inlet_speed:
    sample: uniform
    min: 0.12
    max: 0.28
  inlet_field:
    sample: uniform
    min: 0.05
    max: 0.14
  k: 1.0
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.4
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.34
    max: 0.5
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.008
  t_end: 1.3
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: 0.08
                  max: 0.2
                sigma:
                  sample: uniform
                  min: 0.045
                  max: 0.075
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 1.04
                    max: 1.38
                  - sample: uniform
                    min: 0.82
                    max: 1.0
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.12
                  max: 0.12
                sigma:
                  sample: uniform
                  min: 0.045
                  max: 0.075
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 1.02
                    max: 1.4
                  - sample: uniform
                    min: 0.82
                    max: 1.02
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: 0.12
                  max: 0.3
                sigma:
                  sample: uniform
                  min: 0.045
                  max: 0.075
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 1.04
                    max: 1.4
                  - sample: uniform
                    min: 0.82
                    max: 1.02
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.18
                  max: 0.18
                sigma:
                  sample: uniform
                  min: 0.045
                  max: 0.075
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 1.04
                    max: 1.4
                  - sample: uniform
                    min: 0.8
                    max: 1.04
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: ["param:inlet_speed", 0.0]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    inlet:
      - operator: dirichlet
        value: ["param:inlet_field", 0.0]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [192, 144]
  num_frames: 54
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
