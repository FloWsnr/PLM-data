preset: mhd
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  Re:
    sample: uniform
    min: 24.0
    max: 48.0
  Rm:
    sample: uniform
    min: 14.0
    max: 32.0
  k: 1.0
domain:
  type: disk
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.96
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.017
time:
  dt: 0.008
  t_end: 0.68
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.75
                  max: 1.05
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.7
                center:
                  - sample: uniform
                    min: -0.48
                    max: -0.18
                  - sample: uniform
                    min: -0.22
                    max: 0.18
              - count: 1
                amplitude:
                  sample: uniform
                  min: -1.05
                  max: -0.75
                sigma:
                  sample: uniform
                  min: 0.08
                  max: 0.12
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.7
                center:
                  - sample: uniform
                    min: 0.18
                    max: 0.48
                  - sample: uniform
                    min: -0.18
                    max: 0.22
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.25
                  max: 0.55
                sigma:
                  sample: uniform
                  min: 0.07
                  max: 0.11
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: -0.22
                    max: 0.06
                  - sample: uniform
                    min: 0.18
                    max: 0.48
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.55
                  max: -0.25
                sigma:
                  sample: uniform
                  min: 0.07
                  max: 0.11
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: -0.06
                    max: 0.22
                  - sample: uniform
                    min: -0.48
                    max: -0.18
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.45
                  max: 0.8
                sigma:
                  sample: uniform
                  min: 0.07
                  max: 0.11
                aspect_ratio:
                  sample: uniform
                  min: 1.1
                  max: 1.7
                center:
                  - sample: uniform
                    min: -0.4
                    max: -0.16
                  - sample: uniform
                    min: 0.18
                    max: 0.46
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.8
                  max: -0.45
                sigma:
                  sample: uniform
                  min: 0.07
                  max: 0.11
                aspect_ratio:
                  sample: uniform
                  min: 1.1
                  max: 1.7
                center:
                  - sample: uniform
                    min: 0.16
                    max: 0.4
                  - sample: uniform
                    min: -0.46
                    max: -0.18
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.35
                  max: 0.7
                sigma:
                  sample: uniform
                  min: 0.07
                  max: 0.11
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.18
                    max: 0.44
                  - sample: uniform
                    min: 0.16
                    max: 0.4
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.7
                  max: -0.35
                sigma:
                  sample: uniform
                  min: 0.07
                  max: 0.11
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: -0.44
                    max: -0.18
                  - sample: uniform
                    min: -0.4
                    max: -0.16
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    outer:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [160, 160]
  num_frames: 40
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
