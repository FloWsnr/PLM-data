preset: mhd
parameters:
  Re:
    sample: uniform
    min: 35.0
    max: 80.0
  Rm:
    sample: uniform
    min: 22.0
    max: 52.0
  lid_speed:
    sample: uniform
    min: 0.25
    max: 0.6
  k: 1.0
domain:
  type: rectangle
  allow_sampling: true
  size:
    - sample: uniform
      min: 1.0
      max: 1.25
    - sample: uniform
      min: 1.0
      max: 1.2
  mesh_resolution: [144, 144]
time:
  dt: 0.008
  t_end: 0.85
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.08
                  max: 0.18
                cycles: [1.0, 2.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.12
                  max: 0.12
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.24
                    max: 0.76
                  - sample: uniform
                    min: 0.24
                    max: 0.76
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left:
              sample: uniform
              min: 0.24
              max: 0.46
            value_right:
              sample: uniform
              min: -0.46
              max: -0.24
            x_split:
              sample: uniform
              min: 0.38
              max: 0.62
            axis: 1
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.1
                  max: 0.2
                cycles: [2.0, 0.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
boundary_conditions:
  velocity:
    x-:
      - operator: dirichlet
        value: [0.0, 0.0]
    x+:
      - operator: dirichlet
        value: [0.0, 0.0]
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: dirichlet
        value: ["param:lid_speed", 0.0]
  magnetic_field:
    x-:
      - operator: dirichlet
        value: [0.0, 0.0]
    x+:
      - operator: dirichlet
        value: [0.0, 0.0]
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [160, 160]
  num_frames: 42
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
