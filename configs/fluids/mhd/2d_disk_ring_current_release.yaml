preset: mhd
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  Re:
    sample: uniform
    min: 40.0
    max: 90.0
  Rm:
    sample: uniform
    min: 28.0
    max: 70.0
  k: 1.0
domain:
  type: disk
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.96
    max: 1.1
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.017
time:
  dt: 0.007
  t_end: 0.9
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.16
                  max: 0.3
                cycles: [0.0, 2.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
              - amplitude:
                  sample: uniform
                  min: 0.08
                  max: 0.16
                cycles: [2.0, 0.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.8
                  max: 0.8
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.1
                  max: 0.2
                cycles: [2.0, 2.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.8
                  max: 0.8
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.35
              max: 0.65
            frequency:
              sample: uniform
              min: 9.0
              max: 14.0
            center: ["param:domain_center_x", "param:domain_center_y"]
        y:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: -0.55
              max: -0.3
            frequency:
              sample: uniform
              min: 7.0
              max: 12.0
            center: ["param:domain_center_x", "param:domain_center_y"]
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [160, 160]
  num_frames: 44
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
