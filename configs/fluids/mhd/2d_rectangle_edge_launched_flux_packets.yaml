preset: mhd
parameters:
  Re:
    sample: uniform
    min: 18.0
    max: 40.0
  Rm:
    sample: uniform
    min: 12.0
    max: 28.0
  k: 1.0
domain:
  type: rectangle
  allow_sampling: true
  size:
    - sample: uniform
      min: 1.0
      max: 1.22
    - sample: uniform
      min: 1.0
      max: 1.22
  mesh_resolution: [144, 144]
time:
  dt: 0.008
  t_end: 0.72
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.28
                  max: 0.52
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.7
                center:
                  - sample: uniform
                    min: 0.14
                    max: 0.28
                  - sample: uniform
                    min: 0.36
                    max: 0.66
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.52
                  max: -0.28
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.7
                center:
                  - sample: uniform
                    min: 0.72
                    max: 0.88
                  - sample: uniform
                    min: 0.36
                    max: 0.66
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.18
                  max: 0.18
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.2
                    max: 0.82
                  - sample: uniform
                    min: 0.22
                    max: 0.78
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.28
                  max: 0.56
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 0.34
                    max: 0.66
                  - sample: uniform
                    min: 0.14
                    max: 0.3
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.56
                  max: -0.28
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 0.34
                    max: 0.66
                  - sample: uniform
                    min: 0.72
                    max: 0.88
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.22
                  max: 0.22
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 0.22
                    max: 0.78
                  - sample: uniform
                    min: 0.22
                    max: 0.78
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.homogeneous_dirichlet_2d
  magnetic_field:
    x-:
      - operator: dirichlet
        value: [0.0, 0.0]
    x+:
      - operator: dirichlet
        value: [0.0, 0.0]
    y-:
      - operator: neumann
        value: [0.0, 0.0]
    y+:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [160, 160]
  num_frames: 40
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
