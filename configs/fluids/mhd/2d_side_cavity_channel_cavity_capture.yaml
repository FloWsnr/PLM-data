preset: mhd
parameters:
  Re:
    sample: uniform
    min: 46.0
    max: 110.0
  Rm:
    sample: uniform
    min: 26.0
    max: 70.0
  inlet_speed:
    sample: uniform
    min: 0.75
    max: 1.15
  jet_center:
    sample: uniform
    min: 0.28
    max: 0.54
  jet_sigma:
    sample: uniform
    min: 0.08
    max: 0.14
  inlet_field:
    sample: uniform
    min: 0.22
    max: 0.48
  k: 1.0
domain:
  type: side_cavity_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.2
    max: 2.8
  height:
    sample: uniform
    min: 0.68
    max: 0.82
  cavity_width:
    sample: uniform
    min: 0.36
    max: 0.56
  cavity_depth:
    sample: uniform
    min: 0.28
    max: 0.48
  cavity_center_x:
    sample: uniform
    min: 1.0
    max: 1.55
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.008
  t_end: 1.5
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      type: zero
      params: {}
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.24
                  max: 0.48
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.3
                    max: 0.56
                  - sample: uniform
                    min: 0.26
                    max: 0.46
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.28
                  max: 0.56
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 1.0
                    max: 1.42
                  - sample: uniform
                    min: 0.58
                    max: 0.94
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.32
                  max: 0.32
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 0.96
                    max: 1.44
                  - sample: uniform
                    min: 0.56
                    max: 0.96
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: gaussian_bump
              params:
                amplitude: "param:inlet_speed"
                sigma: "param:jet_sigma"
                center: [0.0, "param:jet_center"]
            y:
              type: constant
              params:
                value: 0.0
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: 0.0
            y:
              type: gaussian_bump
              params:
                amplitude: "param:inlet_field"
                sigma: "param:jet_sigma"
                center: [0.0, "param:jet_center"]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [192, 144]
  num_frames: 50
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
