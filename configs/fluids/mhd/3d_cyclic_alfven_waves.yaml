preset: mhd
parameters:
  Re: 35.0
  Rm: 40.0
  k: 1.0
domain:
  type: box
  size:
  - 1.0
  - 1.0
  - 1.0
  mesh_resolution:
  - 10
  - 10
  - 10
time:
  dt: 0.01
  t_end: 0.12
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.2125
                  max: 0.2875
                cycles: [0.0, 2.0, 0.0]
                phase: 0.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.2125
                  max: 0.2875
                cycles: [0.0, 0.0, 2.0]
                phase: 0.0
        z:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.2125
                  max: 0.2875
                cycles: [2.0, 0.0, 0.0]
                phase: 0.0
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.17
                  max: 0.23
                cycles: [0.0, 2.0, 0.0]
                phase: 1.5707963267948966
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.17
                  max: 0.23
                cycles: [0.0, 0.0, 2.0]
                phase: 1.5707963267948966
        z:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.17
                  max: 0.23
                cycles: [2.0, 0.0, 0.0]
                phase: 1.5707963267948966
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.full_periodic_3d
  magnetic_field:
    $ref: boundary_field.vector.full_periodic_3d
output:
  formats:
    $ref: output.formats.standard
  fields:
    velocity:
      $ref: output.mode.components
    pressure: hidden
    magnetic_field:
      $ref: output.mode.components
    magnetic_constraint: hidden
  resolution:
  - 24
  - 24
  - 24
  num_frames: 12
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 7
