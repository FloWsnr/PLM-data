preset: mhd
parameters:
  Re:
    sample: uniform
    min: 24.0
    max: 52.0
  Rm:
    sample: uniform
    min: 16.0
    max: 38.0
  k: 1.0
domain:
  type: rectangle
  allow_sampling: true
  size:
    - sample: uniform
      min: 1.0
      max: 1.28
    - sample: uniform
      min: 1.0
      max: 1.2
  mesh_resolution: [144, 144]
time:
  dt: 0.008
  t_end: 0.78
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.12
                  max: 0.24
                cycles: [1.0, 2.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: 0.25
                  max: 0.75
              - amplitude:
                  sample: uniform
                  min: 0.05
                  max: 0.12
                cycles: [2.0, 1.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.3
                  max: 0.3
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.08
                  max: 0.18
                cycles: [2.0, 1.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: 0.25
                  max: 0.75
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.2
                  max: 0.38
                cycles: [0.0, 3.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: 0.2
                  max: 0.7
        y:
          type: step
          params:
            value_left:
              sample: uniform
              min: 0.18
              max: 0.36
            value_right:
              sample: uniform
              min: -0.36
              max: -0.18
            x_split:
              sample: uniform
              min: 0.38
              max: 0.62
            axis: 1
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.homogeneous_dirichlet_2d
  magnetic_field:
    x-:
      - operator: neumann
        value: [0.0, 0.0]
    x+:
      - operator: neumann
        value: [0.0, 0.0]
    y-:
      - operator: neumann
        value: [0.0, 0.0]
    y+:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [160, 160]
  num_frames: 42
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
