preset: mhd
parameters:
  Re:
    sample: uniform
    min: 55.0
    max: 130.0
  Rm:
    sample: uniform
    min: 30.0
    max: 80.0
  inlet_speed:
    sample: uniform
    min: 0.8
    max: 1.2
  jet_center:
    sample: uniform
    min: 0.38
    max: 0.62
  jet_sigma:
    sample: uniform
    min: 0.08
    max: 0.14
  inlet_field:
    sample: uniform
    min: 0.18
    max: 0.4
  k: 1.0
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.35
  height:
    sample: uniform
    min: 0.9
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.32
    max: 0.48
  constriction_center_x:
    sample: uniform
    min: 0.95
    max: 1.15
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.008
  t_end: 1.4
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      type: zero
      params: {}
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: 0.22
                  max: 0.45
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 0.24
                    max: 0.56
                  - sample: uniform
                    min: 0.22
                    max: 0.78
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.36
                  max: 0.36
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.09
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.8
                center:
                  - sample: uniform
                    min: 0.32
                    max: 0.64
                  - sample: uniform
                    min: 0.18
                    max: 0.82
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: gaussian_bump
              params:
                amplitude: "param:inlet_speed"
                sigma: "param:jet_sigma"
                center: [0.0, "param:jet_center"]
            y:
              type: constant
              params:
                value: 0.0
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    inlet:
      - operator: dirichlet
        value:
          components:
            x:
              type: constant
              params:
                value: 0.0
            y:
              type: gaussian_bump
              params:
                amplitude: "param:inlet_field"
                sigma: "param:jet_sigma"
                center: [0.0, "param:jet_center"]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [224, 128]
  num_frames: 48
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
