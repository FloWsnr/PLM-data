preset: mhd
parameters:
  Re:
    sample: uniform
    min: 28.0
    max: 68.0
  Rm:
    sample: uniform
    min: 18.0
    max: 46.0
  inlet_speed:
    sample: uniform
    min: 0.35
    max: 0.75
  inlet_field:
    sample: uniform
    min: 0.15
    max: 0.35
  k: 1.0
domain:
  type: venturi_channel
  allow_sampling: true
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  throat_height:
    sample: uniform
    min: 0.34
    max: 0.48
  constriction_center_x:
    sample: uniform
    min: 0.95
    max: 1.15
  constriction_radius:
    sample: uniform
    min: 0.42
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.008
  t_end: 1.6
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left:
              sample: uniform
              min: 0.18
              max: 0.38
            value_right:
              sample: uniform
              min: -0.38
              max: -0.18
            x_split:
              sample: uniform
              min: 0.42
              max: 0.66
            axis: 1
        y:
          type: constant
          params:
            value: 0.0
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left:
              sample: uniform
              min: 0.2
              max: 0.45
            value_right:
              sample: uniform
              min: -0.45
              max: -0.2
            x_split:
              sample: uniform
              min: 0.4
              max: 0.68
            axis: 1
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.24
                  max: 0.24
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.36
                    max: 0.72
                  - sample: uniform
                    min: 0.2
                    max: 0.82
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: ["param:inlet_speed", 0.0]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    inlet:
      - operator: dirichlet
        value: ["param:inlet_field", 0.0]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [224, 128]
  num_frames: 50
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
