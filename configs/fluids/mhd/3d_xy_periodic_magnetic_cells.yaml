preset: mhd
parameters:
  Re: 40.0
  Rm: 45.0
  k: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [10, 10, 10]
time:
  dt: 0.01
  t_end: 0.12
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.2
                  max: 0.26
                cycles: [0.0, 0.0, 1.0]
                phase: 0.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.16
                  max: 0.22
                cycles: [0.0, 0.0, 2.0]
                phase: 0.0
        z:
          type: constant
          params:
            value: 0.0
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.2
                  max: 0.28
                cycles: [1.0, 1.0, 0.0]
                phase: 0.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: -0.24
                  max: -0.18
                cycles: [1.0, 0.0, 0.0]
                phase: 0.0
        z:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.12
                  max: 0.18
                cycles: [0.0, 1.0, 0.0]
                phase: 0.0
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: periodic
        pair_with: y+
    y+:
      - operator: periodic
        pair_with: y-
    z-:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
    z+:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
  magnetic_field:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: periodic
        pair_with: y+
    y+:
      - operator: periodic
        pair_with: y-
    z-:
      - operator: neumann
        value: [0.0, 0.0, 0.0]
    z+:
      - operator: neumann
        value: [0.0, 0.0, 0.0]
output:
  formats:
    $ref: output.formats.standard
  fields:
    velocity:
      $ref: output.mode.components
    pressure: hidden
    magnetic_field:
      $ref: output.mode.components
    magnetic_constraint: hidden
  resolution: [24, 24, 24]
  num_frames: 12
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 11
