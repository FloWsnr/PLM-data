preset: mhd
parameters:
  Re:
    sample: uniform
    min: 40.0
    max: 95.0
  Rm:
    sample: uniform
    min: 20.0
    max: 55.0
  inlet_speed:
    sample: uniform
    min: 0.55
    max: 0.95
  cross_bias:
    sample: uniform
    min: -0.16
    max: 0.16
  inlet_field:
    sample: uniform
    min: 0.2
    max: 0.5
  k: 1.0
domain:
  type: channel_obstacle
  allow_sampling: true
  length:
    sample: uniform
    min: 1.95
    max: 2.2
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  obstacle_center:
    - sample: uniform
      min: 1.0
      max: 1.16
    - sample: uniform
      min: 0.28
      max: 0.68
  obstacle_radius:
    sample: uniform
    min: 0.12
    max: 0.17
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.008
  t_end: 1.5
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.18
                  max: 0.4
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: 0.36
                    max: 0.64
                  - sample: uniform
                    min: 0.24
                    max: 0.76
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.22
                  max: 0.22
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: 0.42
                    max: 0.72
                  - sample: uniform
                    min: 0.22
                    max: 0.78
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: 0.22
                  max: 0.44
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.32
                    max: 0.74
                  - sample: uniform
                    min: 0.18
                    max: 0.82
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count:
                  sample: randint
                  min: 1
                  max: 2
                amplitude:
                  sample: uniform
                  min: -0.34
                  max: 0.34
                sigma:
                  sample: uniform
                  min: 0.05
                  max: 0.085
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.34
                    max: 0.82
                  - sample: uniform
                    min: 0.18
                    max: 0.82
boundary_conditions:
  velocity:
    inlet:
      - operator: dirichlet
        value: ["param:inlet_speed", "param:cross_bias"]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: dirichlet
        value: [0.0, 0.0]
    obstacle:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    inlet:
      - operator: dirichlet
        value: ["param:inlet_field", 0.0]
    outlet:
      - operator: neumann
        value: [0.0, 0.0]
    walls:
      - operator: neumann
        value: [0.0, 0.0]
    obstacle:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [224, 128]
  num_frames: 50
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
