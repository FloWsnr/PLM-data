preset: mhd
parameters:
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  Re:
    sample: uniform
    min: 46.0
    max: 92.0
  Rm:
    sample: uniform
    min: 30.0
    max: 72.0
  inner_field:
    sample: uniform
    min: 0.25
    max: 0.6
  k: 1.0
domain:
  type: annulus
  allow_sampling: true
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.22
    max: 0.32
  outer_radius:
    sample: uniform
    min: 0.94
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.017
time:
  dt: 0.007
  t_end: 0.9
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.16
                  max: 0.28
                cycles: [2.0, 1.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.8
                  max: 0.8
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.12
                  max: 0.24
                cycles: [1.0, 2.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.8
                  max: 0.8
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.25
              max: 0.5
            frequency:
              sample: uniform
              min: 10.0
              max: 14.0
            center: ["param:domain_center_x", "param:domain_center_y"]
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.16
                  max: 0.28
                cycles: [2.0, 1.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
                angle:
                  sample: uniform
                  min: -0.8
                  max: 0.8
boundary_conditions:
  velocity:
    inner:
      - operator: dirichlet
        value: [0.0, 0.0]
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    inner:
      - operator: dirichlet
        value: ["param:inner_field", 0.0]
    outer:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [160, 160]
  num_frames: 44
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
