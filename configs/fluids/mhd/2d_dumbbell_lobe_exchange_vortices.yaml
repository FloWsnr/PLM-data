preset: mhd
parameters:
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  Re:
    sample: uniform
    min: 26.0
    max: 50.0
  Rm:
    sample: uniform
    min: 18.0
    max: 38.0
  k: 1.0
domain:
  type: dumbbell
  allow_sampling: true
  left_center:
    - sample: uniform
      min: 0.28
      max: 0.34
    - "param:center_y"
  right_center:
    - sample: uniform
      min: 0.66
      max: 0.72
    - "param:center_y"
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.11
    max: 0.17
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.008
  t_end: 0.82
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.65
                  max: 0.95
                sigma:
                  sample: uniform
                  min: 0.045
                  max: 0.07
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.18
                    max: 0.3
                  - sample: uniform
                    min: 0.42
                    max: 0.58
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.95
                  max: -0.65
                sigma:
                  sample: uniform
                  min: 0.045
                  max: 0.07
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.6
                center:
                  - sample: uniform
                    min: 0.7
                    max: 0.82
                  - sample: uniform
                    min: 0.42
                    max: 0.58
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.18
                  max: 0.42
                sigma:
                  sample: uniform
                  min: 0.04
                  max: 0.065
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.4
                center:
                  - sample: uniform
                    min: 0.44
                    max: 0.56
                  - sample: uniform
                    min: 0.42
                    max: 0.58
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.35
                  max: 0.65
                sigma:
                  sample: uniform
                  min: 0.04
                  max: 0.065
                aspect_ratio:
                  sample: uniform
                  min: 1.1
                  max: 1.7
                center:
                  - sample: uniform
                    min: 0.22
                    max: 0.34
                  - sample: uniform
                    min: 0.54
                    max: 0.66
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.65
                  max: -0.35
                sigma:
                  sample: uniform
                  min: 0.04
                  max: 0.065
                aspect_ratio:
                  sample: uniform
                  min: 1.1
                  max: 1.7
                center:
                  - sample: uniform
                    min: 0.66
                    max: 0.78
                  - sample: uniform
                    min: 0.34
                    max: 0.46
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.12
                  max: 0.24
                cycles: [2.0, 0.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    outer:
      - operator: neumann
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [176, 128]
  num_frames: 42
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
