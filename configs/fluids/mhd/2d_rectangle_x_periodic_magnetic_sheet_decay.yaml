preset: mhd
parameters:
  Re: 28.0
  Rm: 26.0
  k: 1.0
domain:
  type: rectangle
  size: [2.0, 1.0]
  mesh_resolution: [36, 18]
time:
  dt: 0.01
  t_end: 0.4
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.35
                  max: 0.55
                cycles: [0.0, 2.0]
                phase: 0.0
        y:
          type: constant
          params:
            value: 0.0
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.28
                  max: 0.38
                cycles: [0.0, 1.0]
                phase: 0.0
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.18
                  max: 0.26
                cycles: [1.0, 0.0]
                phase: 0.0
boundary_conditions:
  velocity:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: [0.0, 0.0]
    y+:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: neumann
        value: [0.0, 0.0]
    y+:
      - operator: neumann
        value: [0.0, 0.0]
output:
  formats:
    $ref: output.formats.standard
  fields:
    velocity:
      $ref: output.mode.components
    pressure: hidden
    magnetic_field:
      $ref: output.mode.components
    magnetic_constraint: hidden
  resolution: [128, 64]
  num_frames: 24
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 24
