preset: mhd
parameters:
  Re: 45.0
  Rm: 45.0
  k: 1.0
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 28
  - 28
time:
  dt: 0.01
  t_end: 0.5
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_product
          params:
            amplitude:
              sample: uniform
              min: -1.15
              max: -0.85
            ky: 2.0
        y:
          type: sine_product
          params:
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.15
            kx: 2.0
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: sine_product
          params:
            amplitude:
              sample: uniform
              min: -0.9775
              max: -0.7225
            ky: 2.0
        y:
          type: sine_product
          params:
            amplitude:
              sample: uniform
              min: 0.7225
              max: 0.9775
            kx: 4.0
boundary_conditions:
  velocity:
    $ref: boundary_field.vector.full_periodic_2d
  magnetic_field:
    $ref: boundary_field.vector.full_periodic_2d
output:
  formats:
    $ref: output.formats.standard
  fields:
    velocity:
      $ref: output.mode.components
    pressure: hidden
    magnetic_field:
      $ref: output.mode.components
    magnetic_constraint: hidden
  resolution:
  - 96
  - 96
  num_frames: 32
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
