preset: mhd
parameters:
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
  Re:
    sample: uniform
    min: 38.0
    max: 76.0
  Rm:
    sample: uniform
    min: 26.0
    max: 64.0
  k: 1.0
domain:
  type: dumbbell
  allow_sampling: true
  left_center:
    - sample: uniform
      min: 0.28
      max: 0.34
    - "param:center_y"
  right_center:
    - sample: uniform
      min: 0.66
      max: 0.72
    - "param:center_y"
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.12
    max: 0.18
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.007
  t_end: 0.95
inputs:
  velocity:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: step
          params:
            value_left:
              sample: uniform
              min: 0.3
              max: 0.55
            value_right:
              sample: uniform
              min: -0.55
              max: -0.3
            x_split:
              sample: uniform
              min: 0.46
              max: 0.54
            axis: 0
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.18
                  max: 0.42
                sigma:
                  sample: uniform
                  min: 0.035
                  max: 0.055
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.4
                center:
                  - sample: uniform
                    min: 0.44
                    max: 0.56
                  - sample: uniform
                    min: 0.46
                    max: 0.56
  magnetic_field:
    source:
      type: none
      params: {}
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.4
                  max: 0.72
                sigma:
                  sample: uniform
                  min: 0.03
                  max: 0.05
                aspect_ratio:
                  sample: uniform
                  min: 1.3
                  max: 2.0
                center:
                  - sample: uniform
                    min: 0.44
                    max: 0.56
                  - sample: uniform
                    min: 0.44
                    max: 0.56
              - count: 1
                amplitude:
                  sample: uniform
                  min: -0.38
                  max: -0.18
                sigma:
                  sample: uniform
                  min: 0.04
                  max: 0.06
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: 0.2
                    max: 0.3
                  - sample: uniform
                    min: 0.46
                    max: 0.56
              - count: 1
                amplitude:
                  sample: uniform
                  min: 0.18
                  max: 0.38
                sigma:
                  sample: uniform
                  min: 0.04
                  max: 0.06
                aspect_ratio:
                  sample: uniform
                  min: 1.0
                  max: 1.5
                center:
                  - sample: uniform
                    min: 0.7
                    max: 0.8
                  - sample: uniform
                    min: 0.46
                    max: 0.56
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
              - amplitude:
                  sample: uniform
                  min: 0.1
                  max: 0.22
                cycles: [3.0, 0.0]
                phase:
                  sample: uniform
                  min: 0.0
                  max: 6.283185
boundary_conditions:
  velocity:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
  magnetic_field:
    outer:
      - operator: dirichlet
        value: [0.0, 0.0]
output:
  $ref: output.template.mhd_velocity_magnetic
  resolution: [176, 128]
  num_frames: 44
solver:
  $ref: solver.profile.transient_mixed_direct
seed: 42
