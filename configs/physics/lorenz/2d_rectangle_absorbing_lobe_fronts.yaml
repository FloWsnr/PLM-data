preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 12.0
    max: 17.0
  rho:
    sample: uniform
    min: 31.0
    max: 44.0
  beta:
    sample: uniform
    min: 2.3
    max: 3.15
  D:
    sample: uniform
    min: 0.45
    max: 1.1
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 7.5
      max: 9.0
    - sample: uniform
      min: 4.8
      max: 5.8
  mesh_resolution:
    - sample: randint
      min: 160
      max: 184
    - sample: randint
      min: 128
      max: 144
time:
  dt: 0.0012
  t_end: 3.6
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -1.0
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: 5.0
              max: 8.5
            cycles:
              - sample: uniform
                min: 0.35
                max: 0.55
              - sample: uniform
                min: 0.6
                max: 0.95
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: -0.45
              max: 0.45
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -1.0
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: -8.5
              max: -5.0
            cycles:
              - sample: uniform
                min: 0.45
                max: 0.75
              - sample: uniform
                min: 0.3
                max: 0.55
            phase:
              sample: uniform
              min: 1.0
              max: 2.2
            angle:
              sample: uniform
              min: -0.35
              max: 0.35
  z:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 18.0
          max: 24.0
        value_right:
          sample: uniform
          min: 31.0
          max: 39.0
        x_split:
          sample: uniform
          min: 3.2
          max: 5.4
        axis: 0
boundary_conditions:
  x:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 6.0
              max: 10.0
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -10.0
              max: -6.0
    y-:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.15
            max: 0.35
    y+:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.15
            max: 0.35
  y:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 6.0
              max: 10.0
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -10.0
              max: -6.0
    y-:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.15
            max: 0.35
    y+:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.15
            max: 0.35
  z:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 23.0
              max: 29.0
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 31.0
              max: 38.0
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [224, 144]
  num_frames: 61
seed: 4201
