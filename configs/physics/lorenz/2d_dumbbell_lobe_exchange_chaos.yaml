preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 8.0
    max: 12.0
  rho:
    sample: uniform
    min: 28.0
    max: 39.0
  beta:
    sample: uniform
    min: 2.4
    max: 3.0
  D:
    sample: uniform
    min: 0.015
    max: 0.045
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -0.58
      max: -0.52
    - 0.0
  right_center:
    - sample: uniform
      min: 0.58
      max: 0.66
    - 0.0
  lobe_radius:
    sample: uniform
    min: 0.52
    max: 0.62
  neck_width:
    sample: uniform
    min: 0.18
    max: 0.28
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.0105
time:
  dt: 0.0015
  t_end: 4.8
inputs:
  x:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -1.0
          max: 1.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 7.0
              max: 12.0
            sigma:
              sample: uniform
              min: 0.11
              max: 0.18
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: -0.65
                max: -0.3
              - sample: uniform
                min: -0.22
                max: 0.22
          - count: 1
            amplitude:
              sample: uniform
              min: -10.0
              max: -5.0
            sigma:
              sample: uniform
              min: 0.1
              max: 0.17
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.28
                max: 0.72
              - sample: uniform
                min: -0.22
                max: 0.22
  y:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -1.0
          max: 1.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: -11.0
              max: -6.0
            sigma:
              sample: uniform
              min: 0.1
              max: 0.17
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: -0.65
                max: -0.3
              - sample: uniform
                min: -0.22
                max: 0.22
          - count: 1
            amplitude:
              sample: uniform
              min: 6.0
              max: 11.0
            sigma:
              sample: uniform
              min: 0.1
              max: 0.17
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 0.28
                max: 0.72
              - sample: uniform
                min: -0.22
                max: 0.22
  z:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 21.0
          max: 27.0
        value_right:
          sample: uniform
          min: 31.0
          max: 39.0
        x_split:
          sample: uniform
          min: -0.06
          max: 0.06
        axis: 0
boundary_conditions:
  x:
    outer:
      - operator: neumann
        value: 0.0
  y:
    outer:
      - operator: neumann
        value: 0.0
  z:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [208, 128]
  num_frames: 81
seed: 4206
