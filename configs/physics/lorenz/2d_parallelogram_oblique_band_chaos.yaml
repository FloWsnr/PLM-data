preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 8.5
    max: 12.5
  rho:
    sample: uniform
    min: 27.0
    max: 38.0
  beta:
    sample: uniform
    min: 2.4
    max: 3.0
  D:
    sample: uniform
    min: 0.18
    max: 0.55
domain:
  allow_sampling: true
  type: parallelogram
  origin:
    - sample: uniform
      min: -0.15
      max: 0.15
    - sample: uniform
      min: -0.15
      max: 0.15
  axis_x:
    - sample: uniform
      min: 8.2
      max: 9.5
    - sample: uniform
      min: -0.15
      max: 0.15
  axis_y:
    - sample: uniform
      min: 1.2
      max: 2.8
    - sample: uniform
      min: 7.5
      max: 8.9
  mesh_resolution:
    - sample: randint
      min: 128
      max: 144
    - sample: randint
      min: 128
      max: 144
time:
  dt: 0.0015
  t_end: 4.5
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.5
          max: 0.5
        modes:
          - amplitude:
              sample: uniform
              min: 5.0
              max: 8.5
            cycles:
              - sample: uniform
                min: 0.35
                max: 0.65
              - sample: uniform
                min: 0.8
                max: 1.25
            phase:
              sample: uniform
              min: -0.5
              max: 0.5
            angle:
              sample: uniform
              min: 0.35
              max: 0.9
          - amplitude:
              sample: uniform
              min: 1.5
              max: 3.0
            cycles:
              - sample: uniform
                min: 0.75
                max: 1.1
              - sample: uniform
                min: 0.0
                max: 0.25
            phase:
              sample: uniform
              min: 1.0
              max: 2.4
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.5
          max: 0.5
        modes:
          - amplitude:
              sample: uniform
              min: -8.5
              max: -5.0
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.25
              - sample: uniform
                min: 0.35
                max: 0.65
            phase:
              sample: uniform
              min: 1.1
              max: 2.4
            angle:
              sample: uniform
              min: 0.35
              max: 0.9
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 24.0
          max: 32.0
        std:
          sample: uniform
          min: 2.0
          max: 5.0
boundary_conditions:
  x:
    $ref: boundary_field.scalar.full_periodic_2d
  y:
    $ref: boundary_field.scalar.full_periodic_2d
  z:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 76
seed: 4208
