preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 13.0
    max: 17.0
  rho:
    sample: uniform
    min: 32.0
    max: 44.0
  beta:
    sample: uniform
    min: 2.25
    max: 3.2
  D:
    sample: uniform
    min: 0.11
    max: 0.24
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -0.6
      max: -0.54
    - 0.0
  right_center:
    - sample: uniform
      min: 0.6
      max: 0.68
    - 0.0
  lobe_radius:
    sample: uniform
    min: 0.54
    max: 0.64
  neck_width:
    sample: uniform
    min: 0.12
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.0105
time:
  dt: 0.001
  t_end: 3.6
inputs:
  x:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 7.0
          max: 12.0
        value_right:
          sample: uniform
          min: -12.0
          max: -7.0
        x_split:
          sample: uniform
          min: -0.04
          max: 0.04
        axis: 0
  y:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: -11.0
          max: -6.0
        value_right:
          sample: uniform
          min: 6.0
          max: 11.0
        x_split:
          sample: uniform
          min: -0.04
          max: 0.04
        axis: 0
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 24.0
          max: 32.0
        std:
          sample: uniform
          min: 2.0
          max: 4.5
boundary_conditions:
  x:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.18
  y:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.18
  z:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [208, 128]
  num_frames: 61
seed: 4207
