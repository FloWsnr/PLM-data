preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 12.0
    max: 17.0
  rho:
    sample: uniform
    min: 31.0
    max: 44.0
  beta:
    sample: uniform
    min: 2.25
    max: 3.15
  D:
    sample: uniform
    min: 0.08
    max: 0.18
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.78
    max: 0.95
  branch_length:
    sample: uniform
    min: 0.82
    max: 1.05
  branch_angle_degrees:
    sample: uniform
    min: 36.0
    max: 50.0
  channel_width:
    sample: uniform
    min: 0.24
    max: 0.32
  mesh_size:
    sample: uniform
    min: 0.0075
    max: 0.009
time:
  dt: 0.0012
  t_end: 3.7
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        modes:
          - amplitude:
              sample: uniform
              min: 6.0
              max: 10.0
            cycles:
              - sample: uniform
                min: 1.2
                max: 1.9
              - sample: uniform
                min: 1.0
                max: 1.8
            phase:
              sample: uniform
              min: -0.4
              max: 0.4
            angle:
              sample: uniform
              min: -0.9
              max: 0.9
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        modes:
          - amplitude:
              sample: uniform
              min: -10.0
              max: -6.0
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.8
              - sample: uniform
                min: 1.2
                max: 1.9
            phase:
              sample: uniform
              min: 1.2
              max: 2.5
            angle:
              sample: uniform
              min: -0.9
              max: 0.9
  z:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.7
            max: 0.92
          - sample: uniform
            min: -0.03
            max: 0.03
        region_values:
          "00":
            sample: uniform
            min: 25.0
            max: 33.0
          "01":
            sample: uniform
            min: 18.0
            max: 25.0
          "10":
            sample: uniform
            min: 31.0
            max: 39.0
          "11":
            sample: uniform
            min: 20.0
            max: 28.0
boundary_conditions:
  x:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 7.0
              max: 11.0
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -11.0
              max: -7.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.2
  y:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -11.0
              max: -7.0
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 7.0
              max: 11.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.2
  z:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 20.0
              max: 28.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 31.0
              max: 39.0
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 31.0
              max: 39.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 62
seed: 4217
