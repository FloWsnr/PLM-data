preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 12.0
    max: 16.5
  rho:
    sample: uniform
    min: 31.0
    max: 44.0
  beta:
    sample: uniform
    min: 2.25
    max: 3.15
  D:
    sample: uniform
    min: 0.07
    max: 0.16
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.55
    max: 1.78
  height:
    sample: uniform
    min: 1.12
    max: 1.28
  holes:
    - center:
        - sample: uniform
          min: 0.36
          max: 0.5
        - sample: uniform
          min: 0.62
          max: 0.82
      radius:
        sample: uniform
        min: 0.075
        max: 0.11
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.78
          max: 0.94
        - sample: uniform
          min: 0.28
          max: 0.44
      radius:
        sample: uniform
        min: 0.075
        max: 0.105
      boundary_name: holes
    - center:
        - sample: uniform
          min: 1.18
          max: 1.36
        - sample: uniform
          min: 0.66
          max: 0.86
      radius:
        sample: uniform
        min: 0.075
        max: 0.11
      boundary_name: holes
    - center:
        - sample: uniform
          min: 1.12
          max: 1.32
        - sample: uniform
          min: 0.24
          max: 0.4
      radius:
        sample: uniform
        min: 0.055
        max: 0.085
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.0105
time:
  dt: 0.0012
  t_end: 3.8
inputs:
  x:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 6.0
          max: 11.0
        value_right:
          sample: uniform
          min: -11.0
          max: -6.0
        x_split:
          sample: uniform
          min: 0.72
          max: 0.96
        axis: 0
  y:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: -11.0
          max: -6.0
        value_right:
          sample: uniform
          min: 6.0
          max: 11.0
        x_split:
          sample: uniform
          min: 0.72
          max: 0.96
        axis: 0
  z:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 24.0
          max: 33.0
        modes:
          - amplitude:
              sample: uniform
              min: 3.0
              max: 7.0
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.6
              - sample: uniform
                min: 1.0
                max: 1.6
            phase:
              sample: uniform
              min: -0.5
              max: 0.8
            angle:
              sample: uniform
              min: -0.7
              max: 0.7
boundary_conditions:
  x:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.0
              max: 1.0
    holes:
      - operator: neumann
        value: 0.0
  y:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.0
              max: 1.0
    holes:
      - operator: neumann
        value: 0.0
  z:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 22.0
              max: 30.0
    holes:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 65
seed: 4213
