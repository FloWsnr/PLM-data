preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 9.0
    max: 13.0
  rho:
    sample: uniform
    min: 28.0
    max: 39.0
  beta:
    sample: uniform
    min: 2.4
    max: 3.0
  D:
    sample: uniform
    min: 0.018
    max: 0.055
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 1.25
    max: 1.45
  outer_height:
    sample: uniform
    min: 1.25
    max: 1.45
  cutout_width:
    sample: uniform
    min: 0.43
    max: 0.58
  cutout_height:
    sample: uniform
    min: 0.43
    max: 0.58
  mesh_size:
    sample: uniform
    min: 0.0095
    max: 0.0115
time:
  dt: 0.0015
  t_end: 4.5
inputs:
  x:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 5.0
              max: 9.0
            sigma:
              sample: uniform
              min: 0.07
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 0.18
                max: 0.85
              - sample: uniform
                min: 0.18
                max: 0.85
  y:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: -9.0
              max: -5.0
            sigma:
              sample: uniform
              min: 0.07
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 0.18
                max: 0.85
              - sample: uniform
                min: 0.18
                max: 0.85
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 24.0
          max: 33.0
        std:
          sample: uniform
          min: 2.0
          max: 4.5
boundary_conditions:
  x:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 6.0
              max: 10.0
  y:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -10.0
              max: -6.0
  z:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 24.0
              max: 32.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 76
seed: 4210
