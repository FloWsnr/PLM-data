preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 13.0
    max: 18.0
  rho:
    sample: uniform
    min: 32.0
    max: 43.0
  beta:
    sample: uniform
    min: 2.2
    max: 3.05
  D:
    sample: uniform
    min: 0.09
    max: 0.22
domain:
  allow_sampling: true
  type: disk
  center:
    - sample: uniform
      min: -0.03
      max: 0.03
    - sample: uniform
      min: -0.03
      max: 0.03
  radius:
    sample: uniform
    min: 0.94
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.013
    max: 0.0155
time:
  dt: 0.001
  t_end: 3.6
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.0
          max: 5.0
        modes:
          - amplitude:
              sample: uniform
              min: 5.5
              max: 9.5
            cycles:
              - sample: uniform
                min: 1.1
                max: 1.8
              - sample: uniform
                min: 0.8
                max: 1.5
            phase:
              sample: uniform
              min: -0.7
              max: 0.7
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.0
          max: 5.0
        modes:
          - amplitude:
              sample: uniform
              min: 5.5
              max: 9.5
            cycles:
              - sample: uniform
                min: 0.7
                max: 1.4
              - sample: uniform
                min: 1.0
                max: 1.8
            phase:
              sample: uniform
              min: 1.0
              max: 2.4
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
  z:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 24.0
          max: 31.0
        amplitude:
          sample: uniform
          min: 3.0
          max: 7.0
        frequency:
          sample: uniform
          min: 3.4
          max: 5.8
        center:
          - sample: uniform
            min: -0.1
            max: 0.1
          - sample: uniform
            min: -0.1
            max: 0.1
boundary_conditions:
  x:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.0
              max: 1.0
  y:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.0
              max: 1.0
  z:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 24.0
              max: 32.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 61
seed: 4203
