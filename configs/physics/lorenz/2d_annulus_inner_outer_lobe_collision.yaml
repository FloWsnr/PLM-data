preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 10.0
    max: 15.0
  rho:
    sample: uniform
    min: 30.0
    max: 42.0
  beta:
    sample: uniform
    min: 2.25
    max: 3.1
  D:
    sample: uniform
    min: 0.07
    max: 0.18
domain:
  allow_sampling: true
  type: annulus
  center:
    - sample: uniform
      min: -0.03
      max: 0.03
    - sample: uniform
      min: -0.03
      max: 0.03
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.42
  outer_radius:
    sample: uniform
    min: 1.0
    max: 1.12
  mesh_size:
    sample: uniform
    min: 0.0135
    max: 0.016
time:
  dt: 0.0012
  t_end: 4.0
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -2.0
          max: 2.0
        modes:
          - amplitude:
              sample: uniform
              min: 6.0
              max: 10.0
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.4
              - sample: uniform
                min: 1.2
                max: 2.0
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
            angle:
              sample: uniform
              min: -0.9
              max: 0.9
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -2.0
          max: 2.0
        modes:
          - amplitude:
              sample: uniform
              min: -10.0
              max: -6.0
            cycles:
              - sample: uniform
                min: 1.2
                max: 2.0
              - sample: uniform
                min: 0.8
                max: 1.4
            phase:
              sample: uniform
              min: 1.2
              max: 2.6
            angle:
              sample: uniform
              min: -0.9
              max: 0.9
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 25.0
          max: 34.0
        std:
          sample: uniform
          min: 2.5
          max: 5.5
boundary_conditions:
  x:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 7.0
              max: 11.0
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -11.0
              max: -7.0
  y:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -11.0
              max: -7.0
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 7.0
              max: 11.0
  z:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 22.0
              max: 28.0
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 32.0
              max: 40.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 67
seed: 4205
