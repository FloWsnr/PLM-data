preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 12.0
    max: 17.0
  rho:
    sample: uniform
    min: 29.0
    max: 39.0
  beta:
    sample: uniform
    min: 2.35
    max: 3.05
  D:
    sample: uniform
    min: 1.6
    max: 3.8
domain:
  allow_sampling: true
  type: parallelogram
  origin:
    - sample: uniform
      min: -0.1
      max: 0.1
    - sample: uniform
      min: -0.1
      max: 0.1
  axis_x:
    - sample: uniform
      min: 8.5
      max: 10.0
    - sample: uniform
      min: -0.1
      max: 0.1
  axis_y:
    - sample: uniform
      min: -2.4
      max: -1.1
    - sample: uniform
      min: 7.5
      max: 9.2
  mesh_resolution:
    - sample: randint
      min: 128
      max: 144
    - sample: randint
      min: 128
      max: 144
time:
  dt: 0.001
  t_end: 3.8
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.5
          max: 4.0
        modes:
          - amplitude:
              sample: uniform
              min: 7.0
              max: 11.0
            cycles:
              - sample: uniform
                min: 0.18
                max: 0.32
              - sample: uniform
                min: 0.18
                max: 0.32
            phase:
              sample: uniform
              min: -0.4
              max: 0.4
            angle:
              sample: uniform
              min: -0.6
              max: 0.6
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.5
          max: 4.0
        modes:
          - amplitude:
              sample: uniform
              min: 7.0
              max: 11.0
            cycles:
              - sample: uniform
                min: 0.18
                max: 0.32
              - sample: uniform
                min: 0.18
                max: 0.32
            phase:
              sample: uniform
              min: 1.1
              max: 2.0
            angle:
              sample: uniform
              min: -0.6
              max: 0.6
  z:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 24.0
          max: 31.0
        modes:
          - amplitude:
              sample: uniform
              min: 4.0
              max: 8.0
            cycles:
              - sample: uniform
                min: 0.16
                max: 0.3
              - sample: uniform
                min: 0.16
                max: 0.3
            phase:
              sample: uniform
              min: 0.0
              max: 1.4
            angle:
              sample: uniform
              min: -0.6
              max: 0.6
boundary_conditions:
  x:
    $ref: boundary_field.scalar.full_periodic_2d
  y:
    $ref: boundary_field.scalar.full_periodic_2d
  z:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 65
seed: 4209
