preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 12.0
    max: 17.0
  rho:
    sample: uniform
    min: 31.0
    max: 44.0
  beta:
    sample: uniform
    min: 2.25
    max: 3.15
  D:
    sample: uniform
    min: 0.09
    max: 0.2
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.25
    max: 2.6
  height:
    sample: uniform
    min: 1.05
    max: 1.2
  obstacle_center:
    - sample: uniform
      min: 0.95
      max: 1.25
    - sample: uniform
      min: 0.42
      max: 0.72
  obstacle_radius:
    sample: uniform
    min: 0.13
    max: 0.19
  mesh_size:
    sample: uniform
    min: 0.008
    max: 0.0095
time:
  dt: 0.0012
  t_end: 3.6
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -1.0
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: 6.0
              max: 10.0
            cycles:
              - sample: uniform
                min: 0.6
                max: 1.0
              - sample: uniform
                min: 1.2
                max: 2.0
            phase:
              sample: uniform
              min: -0.4
              max: 0.4
            angle:
              sample: uniform
              min: -0.45
              max: 0.45
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -1.0
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: -10.0
              max: -6.0
            cycles:
              - sample: uniform
                min: 0.6
                max: 1.0
              - sample: uniform
                min: 1.2
                max: 2.0
            phase:
              sample: uniform
              min: 1.2
              max: 2.4
            angle:
              sample: uniform
              min: -0.45
              max: 0.45
  z:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 21.0
          max: 28.0
        value_right:
          sample: uniform
          min: 31.0
          max: 39.0
        x_split:
          sample: uniform
          min: 0.9
          max: 1.35
        axis: 0
boundary_conditions:
  x:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 7.0
              max: 11.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -11.0
              max: -7.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.2
    obstacle:
      - operator: neumann
        value: 0.0
  y:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -11.0
              max: -7.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 7.0
              max: 11.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.2
    obstacle:
      - operator: neumann
        value: 0.0
  z:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 22.0
              max: 29.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 32.0
              max: 40.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [240, 128]
  num_frames: 61
seed: 4215
