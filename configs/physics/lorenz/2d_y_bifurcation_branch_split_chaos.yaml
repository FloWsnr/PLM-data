preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 9.0
    max: 13.5
  rho:
    sample: uniform
    min: 28.0
    max: 40.0
  beta:
    sample: uniform
    min: 2.35
    max: 3.05
  D:
    sample: uniform
    min: 0.025
    max: 0.07
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.75
    max: 0.9
  branch_length:
    sample: uniform
    min: 0.8
    max: 1.0
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 45.0
  channel_width:
    sample: uniform
    min: 0.24
    max: 0.32
  mesh_size:
    sample: uniform
    min: 0.0075
    max: 0.009
time:
  dt: 0.0015
  t_end: 4.2
inputs:
  x:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.6
          max: 0.6
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 5.0
              max: 9.0
            sigma:
              sample: uniform
              min: 0.055
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.5
            center:
              - sample: uniform
                min: 0.12
                max: 1.25
              - sample: uniform
                min: -0.45
                max: 0.45
  y:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.6
          max: 0.6
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: -9.0
              max: -5.0
            sigma:
              sample: uniform
              min: 0.055
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.5
            center:
              - sample: uniform
                min: 0.12
                max: 1.25
              - sample: uniform
                min: -0.45
                max: 0.45
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 24.0
          max: 33.0
        std:
          sample: uniform
          min: 2.0
          max: 4.5
boundary_conditions:
  x:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 5.0
              max: 9.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  y:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 5.0
              max: 9.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  z:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 24.0
              max: 31.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 71
seed: 4216
