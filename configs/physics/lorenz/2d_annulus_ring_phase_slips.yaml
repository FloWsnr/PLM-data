preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 8.0
    max: 12.0
  rho:
    sample: uniform
    min: 28.0
    max: 38.0
  beta:
    sample: uniform
    min: 2.35
    max: 2.95
  D:
    sample: uniform
    min: 0.018
    max: 0.05
domain:
  allow_sampling: true
  type: annulus
  center:
    - sample: uniform
      min: -0.04
      max: 0.04
    - sample: uniform
      min: -0.04
      max: 0.04
  inner_radius:
    sample: uniform
    min: 0.25
    max: 0.36
  outer_radius:
    sample: uniform
    min: 0.98
    max: 1.1
  mesh_size:
    sample: uniform
    min: 0.0135
    max: 0.016
time:
  dt: 0.0015
  t_end: 4.8
inputs:
  x:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: -1.0
          max: 1.0
        amplitude:
          sample: uniform
          min: 6.0
          max: 10.5
        frequency:
          sample: uniform
          min: 5.5
          max: 8.2
        center:
          - sample: uniform
            min: -0.06
            max: 0.06
          - sample: uniform
            min: -0.06
            max: 0.06
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -1.0
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: -9.5
              max: -5.5
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.8
              - sample: uniform
                min: 1.0
                max: 1.8
            phase:
              sample: uniform
              min: 0.7
              max: 2.4
            angle:
              sample: uniform
              min: -1.0
              max: 1.0
  z:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 25.0
          max: 32.0
        amplitude:
          sample: uniform
          min: -6.5
          max: -2.5
        frequency:
          sample: uniform
          min: 4.5
          max: 7.5
        center:
          - sample: uniform
            min: -0.06
            max: 0.06
          - sample: uniform
            min: -0.06
            max: 0.06
boundary_conditions:
  x:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  y:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  z:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 81
seed: 4204
