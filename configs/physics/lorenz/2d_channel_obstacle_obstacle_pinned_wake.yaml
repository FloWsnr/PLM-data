preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 9.0
    max: 13.5
  rho:
    sample: uniform
    min: 28.0
    max: 39.0
  beta:
    sample: uniform
    min: 2.35
    max: 3.0
  D:
    sample: uniform
    min: 0.025
    max: 0.07
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.2
    max: 2.55
  height:
    sample: uniform
    min: 1.05
    max: 1.18
  obstacle_center:
    - sample: uniform
      min: 0.9
      max: 1.2
    - sample: uniform
      min: 0.45
      max: 0.68
  obstacle_radius:
    sample: uniform
    min: 0.14
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.008
    max: 0.0095
time:
  dt: 0.0015
  t_end: 4.2
inputs:
  x:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 5.0
              max: 9.5
            sigma:
              sample: uniform
              min: 0.07
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 0.18
                max: 1.75
              - sample: uniform
                min: 0.22
                max: 0.9
  y:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: -9.5
              max: -5.0
            sigma:
              sample: uniform
              min: 0.07
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 0.18
                max: 1.75
              - sample: uniform
                min: 0.22
                max: 0.9
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 24.0
          max: 33.0
        std:
          sample: uniform
          min: 2.0
          max: 4.5
boundary_conditions:
  x:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 5.0
              max: 9.0
  y:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -9.0
              max: -5.0
  z:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 23.0
              max: 31.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [240, 128]
  num_frames: 71
seed: 4214
