preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 8.5
    max: 13.0
  rho:
    sample: uniform
    min: 28.0
    max: 39.0
  beta:
    sample: uniform
    min: 2.35
    max: 3.0
  D:
    sample: uniform
    min: 0.02
    max: 0.06
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 0.95
    max: 1.15
  lane_spacing:
    sample: uniform
    min: 0.34
    max: 0.44
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.2
    max: 0.28
  mesh_size:
    sample: uniform
    min: 0.0075
    max: 0.009
time:
  dt: 0.0015
  t_end: 4.6
inputs:
  x:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        modes:
          - amplitude:
              sample: uniform
              min: 5.5
              max: 9.5
            cycles:
              - sample: uniform
                min: 0.6
                max: 1.0
              - sample: uniform
                min: 1.2
                max: 2.2
            phase:
              sample: uniform
              min: -0.4
              max: 0.4
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
  y:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        modes:
          - amplitude:
              sample: uniform
              min: -9.5
              max: -5.5
            cycles:
              - sample: uniform
                min: 0.6
                max: 1.0
              - sample: uniform
                min: 1.2
                max: 2.2
            phase:
              sample: uniform
              min: 1.2
              max: 2.5
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 24.0
          max: 33.0
        std:
          sample: uniform
          min: 2.0
          max: 4.5
boundary_conditions:
  x:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  y:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  z:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [192, 224]
  num_frames: 77
seed: 4218
