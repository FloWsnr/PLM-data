preset: lorenz
parameters:
  sigma:
    sample: uniform
    min: 9.0
    max: 13.5
  rho:
    sample: uniform
    min: 28.0
    max: 40.0
  beta:
    sample: uniform
    min: 2.35
    max: 3.05
  D:
    sample: uniform
    min: 0.02
    max: 0.06
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.55
    max: 1.75
  height:
    sample: uniform
    min: 1.1
    max: 1.25
  holes:
    - center:
        - sample: uniform
          min: 0.38
          max: 0.48
        - sample: uniform
          min: 0.3
          max: 0.42
      radius:
        sample: uniform
        min: 0.075
        max: 0.105
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.82
          max: 0.96
        - sample: uniform
          min: 0.62
          max: 0.78
      radius:
        sample: uniform
        min: 0.08
        max: 0.115
      boundary_name: holes
    - center:
        - sample: uniform
          min: 1.22
          max: 1.36
        - sample: uniform
          min: 0.28
          max: 0.46
      radius:
        sample: uniform
        min: 0.07
        max: 0.1
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.0105
time:
  dt: 0.0015
  t_end: 4.4
inputs:
  x:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        generators:
          - count:
              sample: randint
              min: 3
              max: 5
            amplitude:
              sample: uniform
              min: 4.5
              max: 8.5
            sigma:
              sample: uniform
              min: 0.055
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.7
            center:
              - sample: uniform
                min: 0.15
                max: 1.45
              - sample: uniform
                min: 0.15
                max: 0.95
  y:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.8
          max: 0.8
        generators:
          - count:
              sample: randint
              min: 3
              max: 5
            amplitude:
              sample: uniform
              min: -8.5
              max: -4.5
            sigma:
              sample: uniform
              min: 0.055
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.7
            center:
              - sample: uniform
                min: 0.15
                max: 1.45
              - sample: uniform
                min: 0.15
                max: 0.95
  z:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 24.0
          max: 33.0
        std:
          sample: uniform
          min: 2.0
          max: 5.0
boundary_conditions:
  x:
    outer:
      - operator: neumann
        value: 0.0
    holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.5
              max: 1.5
  y:
    outer:
      - operator: neumann
        value: 0.0
    holes:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.5
              max: 1.5
  z:
    outer:
      - operator: neumann
        value: 0.0
    holes:
      - operator: robin
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 20.0
              max: 28.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.2
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_xyz
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 75
seed: 4212
