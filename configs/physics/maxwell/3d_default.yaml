preset: maxwell
parameters:
  epsilon_r: 1.0
  mu_r: 1.0
  k0: 8.0
  source_amplitude: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [10, 10, 10]
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: "param:source_amplitude"
            sigma: 0.1
            center: [0.35, 0.5, 0.5]
        y:
          type: zero
          params: {}
        z:
          type: zero
          params: {}
boundary_conditions:
  electric_field:
    x-:
      - operator: absorbing
        value: {type: zero, params: {}}
    x+:
      - operator: absorbing
        value: {type: zero, params: {}}
    y-:
      - operator: absorbing
        value: {type: zero, params: {}}
    y+:
      - operator: absorbing
        value: {type: zero, params: {}}
    z-:
      - operator: absorbing
        value: {type: zero, params: {}}
    z+:
      - operator: absorbing
        value: {type: zero, params: {}}
solver:
  strategy: stationary_indefinite_direct
  serial:
    ksp_type: preonly
    pc_type: lu
  mpi:
    ksp_type: preonly
    pc_type: lu
    pc_factor_mat_solver_type: mumps
    mat_mumps_icntl_14: 80
    mat_mumps_icntl_24: 1
    mat_mumps_icntl_25: 0
    ksp_error_if_not_converged: 1
output:
  resolution: [24, 24, 24]
  num_frames: 1
  formats: [numpy, gif]
  fields:
    electric_field: components
seed: 42
