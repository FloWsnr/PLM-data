preset: maxwell
parameters:
  epsilon_r: 1.0
  mu_r: 1.0
  k0: 8.0
  source_amplitude: 1.0
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [10, 10, 10]
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: "param:source_amplitude"
            sigma: 0.1
            center: [0.35, 0.5, 0.5]
        y:
          type: zero
          params: {}
        z:
          type: zero
          params: {}
boundary_conditions:
  electric_field:
    x-:
      - operator: absorbing
        value: {type: zero, params: {}}
    x+:
      - operator: absorbing
        value: {type: zero, params: {}}
    y-:
      - operator: absorbing
        value: {type: zero, params: {}}
    y+:
      - operator: absorbing
        value: {type: zero, params: {}}
    z-:
      - operator: absorbing
        value: {type: zero, params: {}}
    z+:
      - operator: absorbing
        value: {type: zero, params: {}}
solver:
  $ref: solver.profile.stationary_indefinite_direct
output:
  $ref: output.template.harmonic_maxwell
  resolution: [24, 24, 24]
  num_frames: 1
seed: 42
