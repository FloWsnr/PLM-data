preset: maxwell
parameters:
  epsilon_r: 1.0
  mu_r: 1.0
  k0: 10.0
  source_amplitude: 1.0
domain:
  type: disk
  center: [0.5, 0.5]
  radius: 0.48
  mesh_size: 0.03
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: "param:source_amplitude"
            sigma: 0.08
            center: [0.35, 0.5]
        y:
          type: zero
          params: {}
boundary_conditions:
  electric_field:
    outer:
      - operator: absorbing
        value: {type: zero, params: {}}
solver:
  $ref: solver.profile.stationary_indefinite_direct
output:
  $ref: output.template.harmonic_maxwell
  resolution: [64, 64]
  num_frames: 1
seed: 42
