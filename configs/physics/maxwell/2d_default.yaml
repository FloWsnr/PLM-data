preset: maxwell
parameters:
  epsilon_r: 1.0
  mu_r: 1.0
  k0: 10.0
  source_amplitude: 1.0
domain:
  type: rectangle
  size: [1.0, 1.0]
  mesh_resolution: [32, 32]
fields:
  electric_field:
    boundary_conditions:
      x-:
        type: absorbing
        value: {type: zero, params: {}}
      x+:
        type: absorbing
        value: {type: zero, params: {}}
      y-:
        type: absorbing
        value: {type: zero, params: {}}
      y+:
        type: absorbing
        value: {type: zero, params: {}}
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: "param:source_amplitude"
            sigma: 0.08
            center: [0.35, 0.5]
        y:
          type: zero
          params: {}
    output: components
solver:
  ksp_type: preonly
  pc_type: lu
output:
  path: ./output
  resolution: [64, 64]
  num_frames: 1
  formats: [numpy]
seed: 42
