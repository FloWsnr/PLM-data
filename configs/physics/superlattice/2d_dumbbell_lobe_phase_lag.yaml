preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.04
    max: 0.065
  D_v1:
    sample: uniform
    min: 0.18
    max: 0.42
  D_u2:
    sample: uniform
    min: 0.24
    max: 0.4
  D_v2:
    sample: uniform
    min: 8.5
    max: 15.0
  a:
    sample: uniform
    min: 2.9
    max: 3.12
  b:
    sample: uniform
    min: 8.75
    max: 9.4
  c:
    sample: uniform
    min: 14.5
    max: 15.8
  d:
    sample: uniform
    min: 8.5
    max: 10.0
  alpha:
    sample: uniform
    min: 0.14
    max: 0.3
  left_x:
    sample: uniform
    min: -11.5
    max: -9.0
  right_x:
    sample: uniform
    min: 9.0
    max: 11.5
  lobe_y:
    sample: uniform
    min: -0.8
    max: 0.8
domain:
  allow_sampling: true
  type: dumbbell
  left_center: [param:left_x, param:lobe_y]
  right_center: [param:right_x, param:lobe_y]
  lobe_radius:
    sample: uniform
    min: 8.2
    max: 10.2
  neck_width:
    sample: uniform
    min: 3.4
    max: 5.8
  mesh_size:
    sample: uniform
    min: 0.16
    max: 0.23
time:
  dt: 0.025
  t_end: 22.0
inputs:
  u_1:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.88
          max: 3.08
        generators:
          - count:
              sample: randint
              min: 3
              max: 6
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.32
            sigma:
              sample: uniform
              min: 1.0
              max: 2.3
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.2
            center:
              - sample: uniform
                min: -15.0
                max: -4.0
              - sample: uniform
                min: -5.5
                max: 5.5
          - count:
              sample: randint
              min: 2
              max: 5
            amplitude:
              sample: uniform
              min: -0.18
              max: 0.14
            sigma:
              sample: uniform
              min: 1.0
              max: 2.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 4.0
                max: 15.0
              - sample: uniform
                min: -5.5
                max: 5.5
  v_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.84
          max: 3.14
        std:
          sample: uniform
          min: 0.05
          max: 0.14
  u_2:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 2.75
          max: 3.0
        value_right:
          sample: uniform
          min: 3.12
          max: 3.42
        x_split:
          sample: uniform
          min: -1.0
          max: 1.0
        axis: 0
  v_2:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 9.8
          max: 10.8
        modes:
          - amplitude:
              sample: uniform
              min: 0.15
              max: 0.5
            cycles:
              - sample: uniform
                min: 0.12
                max: 0.28
              - sample: uniform
                min: 0.08
                max: 0.24
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.5
              max: 0.5
boundary_conditions:
  u_1:
    outer:
      - operator: neumann
        value: 0.0
  v_1:
    outer:
      - operator: neumann
        value: 0.0
  u_2:
    outer:
      - operator: neumann
        value: 0.0
  v_2:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 89
seed: 5440
