preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.035
    max: 0.058
  D_v1:
    sample: uniform
    min: 0.22
    max: 0.55
  D_u2:
    sample: uniform
    min: 0.24
    max: 0.38
  D_v2:
    sample: uniform
    min: 8.5
    max: 14.0
  a:
    sample: uniform
    min: 2.88
    max: 3.1
  b:
    sample: uniform
    min: 8.65
    max: 9.25
  c:
    sample: uniform
    min: 14.4
    max: 15.7
  d:
    sample: uniform
    min: 8.2
    max: 9.6
  alpha:
    sample: uniform
    min: 0.08
    max: 0.16
  domain_center_x:
    sample: uniform
    min: -0.8
    max: 0.8
  domain_center_y:
    sample: uniform
    min: -0.8
    max: 0.8
  rim_exchange:
    sample: uniform
    min: 0.001
    max: 0.008
  u1_inner_value:
    sample: uniform
    min: 3.04
    max: 3.16
  u1_outer_value:
    sample: uniform
    min: 2.9
    max: 3.04
  v1_inner_value:
    sample: uniform
    min: 3.02
    max: 3.14
  v1_outer_value:
    sample: uniform
    min: 2.9
    max: 3.04
  u2_inner_value:
    sample: uniform
    min: 3.04
    max: 3.18
  u2_outer_value:
    sample: uniform
    min: 2.88
    max: 3.04
  v2_inner_value:
    sample: uniform
    min: 10.2
    max: 10.8
  v2_outer_value:
    sample: uniform
    min: 9.6
    max: 10.15
domain:
  allow_sampling: true
  type: annulus
  center: [param:domain_center_x, param:domain_center_y]
  inner_radius:
    sample: uniform
    min: 5.5
    max: 7.5
  outer_radius:
    sample: uniform
    min: 16.0
    max: 19.5
  mesh_size:
    sample: uniform
    min: 0.22
    max: 0.3
time:
  dt: 0.015
  t_end: 16.0
inputs:
  u_1:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 2.9
          max: 3.1
        amplitude:
          sample: uniform
          min: 0.05
          max: 0.14
        frequency:
          sample: uniform
          min: 0.5
          max: 0.9
        center: [param:domain_center_x, param:domain_center_y]
  v_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.82
          max: 3.15
        std:
          sample: uniform
          min: 0.04
          max: 0.12
  u_2:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 2.8
          max: 3.18
        amplitude:
          sample: uniform
          min: -0.1
          max: 0.1
        frequency:
          sample: uniform
          min: 0.35
          max: 0.65
        center: [param:domain_center_x, param:domain_center_y]
  v_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 9.8
          max: 10.8
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: -0.18
              max: 0.18
            sigma:
              sample: uniform
              min: 1.0
              max: 2.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.0
            center:
              - sample: uniform
                min: -14.0
                max: 14.0
              - sample: uniform
                min: -14.0
                max: 14.0
boundary_conditions:
  u_1:
    inner:
      - operator: robin
        value: param:u1_inner_value
        operator_parameters:
          alpha: param:rim_exchange
    outer:
      - operator: robin
        value: param:u1_outer_value
        operator_parameters:
          alpha: param:rim_exchange
  v_1:
    inner:
      - operator: robin
        value: param:v1_inner_value
        operator_parameters:
          alpha: param:rim_exchange
    outer:
      - operator: robin
        value: param:v1_outer_value
        operator_parameters:
          alpha: param:rim_exchange
  u_2:
    inner:
      - operator: robin
        value: param:u2_inner_value
        operator_parameters:
          alpha: param:rim_exchange
    outer:
      - operator: robin
        value: param:u2_outer_value
        operator_parameters:
          alpha: param:rim_exchange
  v_2:
    inner:
      - operator: robin
        value: param:v2_inner_value
        operator_parameters:
          alpha: param:rim_exchange
    outer:
      - operator: robin
        value: param:v2_outer_value
        operator_parameters:
          alpha: param:rim_exchange
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 73
seed: 5431
