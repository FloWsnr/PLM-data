preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.04
    max: 0.07
  D_v1:
    sample: uniform
    min: 0.5
    max: 1.15
  D_u2:
    sample: uniform
    min: 0.26
    max: 0.44
  D_v2:
    sample: uniform
    min: 9.0
    max: 16.0
  a:
    sample: uniform
    min: 2.9
    max: 3.14
  b:
    sample: uniform
    min: 8.75
    max: 9.45
  c:
    sample: uniform
    min: 14.5
    max: 15.8
  d:
    sample: uniform
    min: 8.4
    max: 10.0
  alpha:
    sample: uniform
    min: 0.12
    max: 0.26
  obstacle_exchange:
    sample: uniform
    min: 0.012
    max: 0.05
  u1_inlet_value:
    sample: uniform
    min: 3.08
    max: 3.34
  u1_outlet_value:
    sample: uniform
    min: 2.72
    max: 2.98
  v1_inlet_value:
    sample: uniform
    min: 3.05
    max: 3.3
  v1_outlet_value:
    sample: uniform
    min: 2.7
    max: 3.0
  u2_inlet_value:
    sample: uniform
    min: 3.12
    max: 3.44
  u2_outlet_value:
    sample: uniform
    min: 2.68
    max: 2.98
  v2_inlet_value:
    sample: uniform
    min: 10.4
    max: 11.4
  v2_outlet_value:
    sample: uniform
    min: 9.0
    max: 9.9
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 38.0
    max: 48.0
  height:
    sample: uniform
    min: 18.0
    max: 24.0
  obstacle_center:
    - sample: uniform
      min: 16.0
      max: 24.0
    - sample: uniform
      min: 8.0
      max: 16.0
  obstacle_radius:
    sample: uniform
    min: 2.2
    max: 4.2
  mesh_size:
    sample: uniform
    min: 0.18
    max: 0.25
time:
  dt: 0.03
  t_end: 20.0
inputs:
  u_1:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.9
          max: 3.12
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.2
            cycles:
              - sample: uniform
                min: 0.12
                max: 0.28
              - sample: uniform
                min: 0.1
                max: 0.26
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.6
              max: 0.6
  v_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.84
          max: 3.15
        std:
          sample: uniform
          min: 0.06
          max: 0.16
  u_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.8
          max: 3.18
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.28
            sigma:
              sample: uniform
              min: 1.0
              max: 2.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.5
            center:
              - sample: uniform
                min: 6.0
                max: 32.0
              - sample: uniform
                min: 4.0
                max: 18.0
  v_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 9.8
          max: 10.8
        std:
          sample: uniform
          min: 0.14
          max: 0.38
boundary_conditions:
  u_1:
    inlet:
      - operator: dirichlet
        value: param:u1_inlet_value
    outlet:
      - operator: dirichlet
        value: param:u1_outlet_value
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value: 2.75
        operator_parameters:
          alpha: param:obstacle_exchange
  v_1:
    inlet:
      - operator: dirichlet
        value: param:v1_inlet_value
    outlet:
      - operator: dirichlet
        value: param:v1_outlet_value
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value: 2.75
        operator_parameters:
          alpha: param:obstacle_exchange
  u_2:
    inlet:
      - operator: dirichlet
        value: param:u2_inlet_value
    outlet:
      - operator: dirichlet
        value: param:u2_outlet_value
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value: 2.65
        operator_parameters:
          alpha: param:obstacle_exchange
  v_2:
    inlet:
      - operator: dirichlet
        value: param:v2_inlet_value
    outlet:
      - operator: dirichlet
        value: param:v2_outlet_value
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value: 9.0
        operator_parameters:
          alpha: param:obstacle_exchange
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 71
seed: 5470
