preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.04
    max: 0.072
  D_v1:
    sample: uniform
    min: 0.5
    max: 1.05
  D_u2:
    sample: uniform
    min: 0.26
    max: 0.44
  D_v2:
    sample: uniform
    min: 9.0
    max: 15.5
  a:
    sample: uniform
    min: 2.9
    max: 3.14
  b:
    sample: uniform
    min: 8.75
    max: 9.45
  c:
    sample: uniform
    min: 14.5
    max: 15.8
  d:
    sample: uniform
    min: 8.4
    max: 10.0
  alpha:
    sample: uniform
    min: 0.12
    max: 0.24
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 32.0
    max: 42.0
  outer_height:
    sample: uniform
    min: 30.0
    max: 40.0
  cutout_width:
    sample: uniform
    min: 11.0
    max: 17.0
  cutout_height:
    sample: uniform
    min: 10.0
    max: 16.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.28
time:
  dt: 0.03
  t_end: 21.0
inputs:
  u_1:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.9
          max: 3.12
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.2
            cycles:
              - sample: uniform
                min: 0.16
                max: 0.34
              - sample: uniform
                min: 0.14
                max: 0.32
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.7
              max: 0.7
  v_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.82
          max: 3.15
        std:
          sample: uniform
          min: 0.05
          max: 0.15
  u_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.8
          max: 3.18
        generators:
          - count:
              sample: randint
              min: 4
              max: 8
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.28
            sigma:
              sample: uniform
              min: 1.1
              max: 2.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.5
            center:
              - sample: uniform
                min: 14.0
                max: 28.0
              - sample: uniform
                min: 13.0
                max: 27.0
  v_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 9.8
          max: 10.8
        std:
          sample: uniform
          min: 0.14
          max: 0.38
boundary_conditions:
  u_1:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
  v_1:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
  u_2:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
  v_2:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 71
seed: 5450
