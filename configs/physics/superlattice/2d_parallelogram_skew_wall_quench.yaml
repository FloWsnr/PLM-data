preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.035
    max: 0.06
  D_v1:
    sample: uniform
    min: 0.42
    max: 0.9
  D_u2:
    sample: uniform
    min: 0.24
    max: 0.42
  D_v2:
    sample: uniform
    min: 8.5
    max: 15.0
  a:
    sample: uniform
    min: 2.9
    max: 3.1
  b:
    sample: uniform
    min: 8.8
    max: 9.35
  c:
    sample: uniform
    min: 14.6
    max: 15.6
  d:
    sample: uniform
    min: 8.4
    max: 9.9
  alpha:
    sample: uniform
    min: 0.10
    max: 0.18
  skew_x:
    sample: uniform
    min: -9.0
    max: -4.0
  axis_x_length:
    sample: uniform
    min: 34.0
    max: 44.0
  axis_y_height:
    sample: uniform
    min: 24.0
    max: 32.0
  u1_lower_value:
    sample: uniform
    min: 2.72
    max: 2.96
  u1_upper_value:
    sample: uniform
    min: 3.18
    max: 3.48
  v1_lower_value:
    sample: uniform
    min: 2.7
    max: 3.0
  v1_upper_value:
    sample: uniform
    min: 3.12
    max: 3.42
  u2_lower_value:
    sample: uniform
    min: 2.65
    max: 2.95
  u2_upper_value:
    sample: uniform
    min: 3.18
    max: 3.55
  v2_lower_value:
    sample: uniform
    min: 9.0
    max: 9.9
  v2_upper_value:
    sample: uniform
    min: 10.45
    max: 11.6
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [param:axis_x_length, 0.0]
  axis_y: [param:skew_x, param:axis_y_height]
  mesh_resolution: [176, 128]
time:
  dt: 0.018
  t_end: 18.0
inputs:
  u_1:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 14.0
            max: 22.0
          - sample: uniform
            min: 10.0
            max: 16.0
        region_values:
          "00":
            sample: uniform
            min: 2.78
            max: 2.98
          "01":
            sample: uniform
            min: 3.05
            max: 3.24
          "10":
            sample: uniform
            min: 2.9
            max: 3.12
          "11":
            sample: uniform
            min: 3.16
            max: 3.42
  v_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.84
          max: 3.16
        std:
          sample: uniform
          min: 0.06
          max: 0.16
  u_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.76
          max: 3.14
        generators:
          - count:
              sample: randint
              min: 4
              max: 8
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.32
            sigma:
              sample: uniform
              min: 1.0
              max: 2.4
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 4.0
            center:
              - sample: uniform
                min: 4.0
                max: 34.0
              - sample: uniform
                min: 3.0
                max: 25.0
  v_2:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 9.75
          max: 10.85
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.55
            cycles:
              - sample: uniform
                min: 0.08
                max: 0.24
              - sample: uniform
                min: 0.16
                max: 0.34
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.55
              max: 0.55
boundary_conditions:
  u_1:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: param:u1_lower_value
    y+:
      - operator: dirichlet
        value: param:u1_upper_value
  v_1:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: param:v1_lower_value
    y+:
      - operator: dirichlet
        value: param:v1_upper_value
  u_2:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: param:u2_lower_value
    y+:
      - operator: dirichlet
        value: param:u2_upper_value
  v_2:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value: param:v2_lower_value
    y+:
      - operator: dirichlet
        value: param:v2_upper_value
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 73
seed: 5411
