preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.035
    max: 0.058
  D_v1:
    sample: uniform
    min: 0.45
    max: 0.95
  D_u2:
    sample: uniform
    min: 0.22
    max: 0.34
  D_v2:
    sample: uniform
    min: 7.4
    max: 13.4
  a:
    sample: uniform
    min: 2.88
    max: 3.12
  b:
    sample: uniform
    min: 8.65
    max: 9.4
  c:
    sample: uniform
    min: 14.5
    max: 15.8
  d:
    sample: uniform
    min: 8.4
    max: 10.0
  alpha:
    sample: uniform
    min: 0.12
    max: 0.28
  domain_center_x:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_center_y:
    sample: uniform
    min: -1.0
    max: 1.0
  rim_exchange:
    sample: uniform
    min: 0.004
    max: 0.02
  u1_rim_value:
    sample: uniform
    min: 2.65
    max: 2.92
  v1_rim_value:
    sample: uniform
    min: 2.65
    max: 2.95
  u2_rim_value:
    sample: uniform
    min: 2.6
    max: 2.95
  v2_rim_value:
    sample: uniform
    min: 8.8
    max: 9.8
domain:
  allow_sampling: true
  type: disk
  center: [param:domain_center_x, param:domain_center_y]
  radius:
    sample: uniform
    min: 15.0
    max: 18.5
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.27
time:
  dt: 0.018
  t_end: 18.0
inputs:
  u_1:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.92
          max: 3.15
        generators:
          - count:
              sample: randint
              min: 5
              max: 10
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.36
            sigma:
              sample: uniform
              min: 1.0
              max: 2.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 4.0
            center:
              - sample: uniform
                min: -11.0
                max: 11.0
              - sample: uniform
                min: -11.0
                max: 11.0
  v_1:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 2.86
          max: 3.16
        amplitude:
          sample: uniform
          min: -0.16
          max: 0.16
        frequency:
          sample: uniform
          min: 0.45
          max: 0.85
        center: [param:domain_center_x, param:domain_center_y]
  u_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.8
          max: 3.2
        std:
          sample: uniform
          min: 0.06
          max: 0.18
  v_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 9.8
          max: 10.9
        generators:
          - count:
              sample: randint
              min: 3
              max: 7
            amplitude:
              sample: uniform
              min: -0.55
              max: 0.35
            sigma:
              sample: uniform
              min: 1.4
              max: 3.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.0
            center:
              - sample: uniform
                min: -10.0
                max: 10.0
              - sample: uniform
                min: -10.0
                max: 10.0
boundary_conditions:
  u_1:
    outer:
      - operator: robin
        value: param:u1_rim_value
        operator_parameters:
          alpha: param:rim_exchange
  v_1:
    outer:
      - operator: robin
        value: param:v1_rim_value
        operator_parameters:
          alpha: param:rim_exchange
  u_2:
    outer:
      - operator: robin
        value: param:u2_rim_value
        operator_parameters:
          alpha: param:rim_exchange
  v_2:
    outer:
      - operator: robin
        value: param:v2_rim_value
        operator_parameters:
          alpha: param:rim_exchange
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 5421
