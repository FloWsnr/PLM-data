preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.038
    max: 0.06
  D_v1:
    sample: uniform
    min: 0.17
    max: 0.34
  D_u2:
    sample: uniform
    min: 0.22
    max: 0.36
  D_v2:
    sample: uniform
    min: 8.0
    max: 14.0
  a:
    sample: uniform
    min: 2.9
    max: 3.12
  b:
    sample: uniform
    min: 8.75
    max: 9.35
  c:
    sample: uniform
    min: 14.5
    max: 15.7
  d:
    sample: uniform
    min: 8.4
    max: 9.8
  alpha:
    sample: uniform
    min: 0.12
    max: 0.22
  domain_center_x:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_center_y:
    sample: uniform
    min: -1.2
    max: 1.2
domain:
  allow_sampling: true
  type: disk
  center: [param:domain_center_x, param:domain_center_y]
  radius:
    sample: uniform
    min: 14.5
    max: 18.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.27
time:
  dt: 0.025
  t_end: 22.0
inputs:
  u_1:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 2.9
          max: 3.08
        amplitude:
          sample: uniform
          min: 0.08
          max: 0.18
        frequency:
          sample: uniform
          min: 0.55
          max: 0.9
        center: [param:domain_center_x, param:domain_center_y]
  v_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.85
          max: 3.15
        std:
          sample: uniform
          min: 0.05
          max: 0.13
  u_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.78
          max: 3.16
        generators:
          - count:
              sample: randint
              min: 6
              max: 11
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.26
            sigma:
              sample: uniform
              min: 0.9
              max: 2.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.0
            center:
              - sample: uniform
                min: -12.0
                max: 12.0
              - sample: uniform
                min: -12.0
                max: 12.0
  v_2:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 9.7
          max: 10.7
        amplitude:
          sample: uniform
          min: 0.25
          max: 0.7
        frequency:
          sample: uniform
          min: 0.42
          max: 0.75
        center: [param:domain_center_x, param:domain_center_y]
boundary_conditions:
  u_1:
    outer:
      - operator: neumann
        value: 0.0
  v_1:
    outer:
      - operator: neumann
        value: 0.0
  u_2:
    outer:
      - operator: neumann
        value: 0.0
  v_2:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 89
seed: 5420
