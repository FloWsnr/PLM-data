preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.035
    max: 0.06
  D_v1:
    sample: uniform
    min: 0.45
    max: 0.9
  D_u2:
    sample: uniform
    min: 0.21
    max: 0.36
  D_v2:
    sample: uniform
    min: 7.2
    max: 13.2
  a:
    sample: uniform
    min: 2.88
    max: 3.12
  b:
    sample: uniform
    min: 8.65
    max: 9.35
  c:
    sample: uniform
    min: 14.4
    max: 15.8
  d:
    sample: uniform
    min: 8.3
    max: 9.8
  alpha:
    sample: uniform
    min: 0.12
    max: 0.28
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 42.0
    max: 54.0
  height:
    sample: uniform
    min: 18.0
    max: 24.0
  throat_height:
    sample: uniform
    min: 7.0
    max: 11.0
  constriction_center_x:
    sample: uniform
    min: 19.0
    max: 30.0
  constriction_radius:
    sample: uniform
    min: 8.0
    max: 13.0
  mesh_size:
    sample: uniform
    min: 0.18
    max: 0.25
time:
  dt: 0.018
  t_end: 18.0
inputs:
  u_1:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.88
          max: 3.12
        modes:
          - amplitude:
              sample: uniform
              min: 0.1
              max: 0.28
            cycles:
              - sample: uniform
                min: 0.12
                max: 0.28
              - sample: uniform
                min: 0.16
                max: 0.36
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.7
              max: 0.7
  v_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.82
          max: 3.14
        std:
          sample: uniform
          min: 0.06
          max: 0.16
  u_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.8
          max: 3.18
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.3
            sigma:
              sample: uniform
              min: 1.0
              max: 2.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.5
            center:
              - sample: uniform
                min: 6.0
                max: 38.0
              - sample: uniform
                min: 4.0
                max: 18.0
  v_2:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 9.8
          max: 10.8
        modes:
          - amplitude:
              sample: uniform
              min: 0.24
              max: 0.65
            cycles:
              - sample: uniform
                min: 0.08
                max: 0.24
              - sample: uniform
                min: 0.18
                max: 0.4
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u_1:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 3.35
  v_1:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 3.3
  u_2:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 3.45
  v_2:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 11.1
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 73
seed: 5491
