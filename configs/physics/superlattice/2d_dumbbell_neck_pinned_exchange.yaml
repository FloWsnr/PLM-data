preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.036
    max: 0.06
  D_v1:
    sample: uniform
    min: 0.45
    max: 0.9
  D_u2:
    sample: uniform
    min: 0.21
    max: 0.34
  D_v2:
    sample: uniform
    min: 7.2
    max: 12.8
  a:
    sample: uniform
    min: 2.88
    max: 3.12
  b:
    sample: uniform
    min: 8.7
    max: 9.35
  c:
    sample: uniform
    min: 14.4
    max: 15.8
  d:
    sample: uniform
    min: 8.3
    max: 9.8
  alpha:
    sample: uniform
    min: 0.12
    max: 0.28
  left_x:
    sample: uniform
    min: -11.0
    max: -8.8
  right_x:
    sample: uniform
    min: 8.8
    max: 11.0
  lobe_y:
    sample: uniform
    min: -0.8
    max: 0.8
domain:
  allow_sampling: true
  type: dumbbell
  left_center: [param:left_x, param:lobe_y]
  right_center: [param:right_x, param:lobe_y]
  lobe_radius:
    sample: uniform
    min: 8.4
    max: 10.4
  neck_width:
    sample: uniform
    min: 2.8
    max: 4.7
  mesh_size:
    sample: uniform
    min: 0.16
    max: 0.23
time:
  dt: 0.018
  t_end: 20.0
inputs:
  u_1:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 3.08
          max: 3.36
        value_right:
          sample: uniform
          min: 2.72
          max: 2.98
        x_split:
          sample: uniform
          min: -0.8
          max: 0.8
        axis: 0
  v_1:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.85
          max: 3.14
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.18
            sigma:
              sample: uniform
              min: 0.9
              max: 2.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.5
            center:
              - sample: uniform
                min: -3.5
                max: 3.5
              - sample: uniform
                min: -3.0
                max: 3.0
  u_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.82
          max: 3.2
        generators:
          - count:
              sample: randint
              min: 2
              max: 5
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.38
            sigma:
              sample: uniform
              min: 1.1
              max: 2.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.0
            center:
              - sample: uniform
                min: -4.0
                max: 4.0
              - sample: uniform
                min: -2.5
                max: 2.5
  v_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 9.8
          max: 10.8
        std:
          sample: uniform
          min: 0.12
          max: 0.34
boundary_conditions:
  u_1:
    outer:
      - operator: neumann
        value: 0.0
  v_1:
    outer:
      - operator: neumann
        value: 0.0
  u_2:
    outer:
      - operator: neumann
        value: 0.0
  v_2:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 81
seed: 5441
