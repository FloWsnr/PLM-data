preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.038
    max: 0.058
  D_v1:
    sample: uniform
    min: 0.45
    max: 0.95
  D_u2:
    sample: uniform
    min: 0.22
    max: 0.38
  D_v2:
    sample: uniform
    min: 8.0
    max: 14.5
  a:
    sample: uniform
    min: 2.92
    max: 3.12
  b:
    sample: uniform
    min: 8.65
    max: 9.45
  c:
    sample: uniform
    min: 14.4
    max: 15.8
  d:
    sample: uniform
    min: 8.6
    max: 10.0
  alpha:
    sample: uniform
    min: 0.12
    max: 0.3
  domain_size_x:
    sample: uniform
    min: 34.0
    max: 44.0
  domain_size_y:
    sample: uniform
    min: 24.0
    max: 32.0
  u1_left_value:
    sample: uniform
    min: 2.82
    max: 3.04
  u1_right_value:
    sample: uniform
    min: 3.12
    max: 3.36
  v1_left_value:
    sample: uniform
    min: 2.76
    max: 3.02
  v1_right_value:
    sample: uniform
    min: 3.08
    max: 3.38
  u2_left_value:
    sample: uniform
    min: 2.72
    max: 3.02
  u2_right_value:
    sample: uniform
    min: 3.14
    max: 3.48
  v2_left_value:
    sample: uniform
    min: 9.25
    max: 10.05
  v2_right_value:
    sample: uniform
    min: 10.35
    max: 11.35
domain:
  allow_sampling: true
  type: rectangle
  size:
    - param:domain_size_x
    - param:domain_size_y
  mesh_resolution: [176, 128]
time:
  dt: 0.018
  t_end: 20.0
inputs:
  u_1:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.86
          max: 3.08
        generators:
          - count:
              sample: randint
              min: 4
              max: 8
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.24
            sigma:
              sample: uniform
              min: 0.9
              max: 2.2
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 3.4
            center:
              - sample: uniform
                min: 3.0
                max: 31.0
              - sample: uniform
                min: 2.4
                max: 21.5
  v_1:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.86
          max: 3.18
        modes:
          - amplitude:
              sample: uniform
              min: 0.06
              max: 0.15
            cycles: [0.18, 0.0]
            phase:
              sample: uniform
              min: -1.0
              max: 1.0
          - amplitude:
              sample: uniform
              min: -0.1
              max: 0.1
            cycles: [0.0, 0.26]
            phase:
              sample: uniform
              min: -1.0
              max: 1.0
  u_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.8
          max: 3.22
        std:
          sample: uniform
          min: 0.05
          max: 0.14
  v_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 9.7
          max: 10.8
        generators:
          - count:
              sample: randint
              min: 3
              max: 6
            amplitude:
              sample: uniform
              min: -0.45
              max: 0.35
            sigma:
              sample: uniform
              min: 1.2
              max: 2.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 3.0
                max: 31.0
              - sample: uniform
                min: 2.4
                max: 21.5
boundary_conditions:
  u_1:
    x-:
      - operator: dirichlet
        value: param:u1_left_value
    x+:
      - operator: dirichlet
        value: param:u1_right_value
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
  v_1:
    x-:
      - operator: dirichlet
        value: param:v1_left_value
    x+:
      - operator: dirichlet
        value: param:v1_right_value
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
  u_2:
    x-:
      - operator: dirichlet
        value: param:u2_left_value
    x+:
      - operator: dirichlet
        value: param:u2_right_value
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
  v_2:
    x-:
      - operator: dirichlet
        value: param:v2_left_value
    x+:
      - operator: dirichlet
        value: param:v2_right_value
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 81
seed: 5401
