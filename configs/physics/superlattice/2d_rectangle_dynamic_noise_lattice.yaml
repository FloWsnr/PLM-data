preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.055
    max: 0.085
  D_v1:
    sample: uniform
    min: 0.7
    max: 1.15
  D_u2:
    sample: uniform
    min: 0.28
    max: 0.43
  D_v2:
    sample: uniform
    min: 9.5
    max: 15.5
  a:
    sample: uniform
    min: 2.9
    max: 3.12
  b:
    sample: uniform
    min: 8.7
    max: 9.35
  c:
    sample: uniform
    min: 14.6
    max: 15.6
  d:
    sample: uniform
    min: 8.4
    max: 9.8
  alpha:
    sample: uniform
    min: 0.12
    max: 0.2
  domain_size_x:
    sample: uniform
    min: 28.0
    max: 36.0
  domain_size_y:
    sample: uniform
    min: 28.0
    max: 36.0
domain:
  allow_sampling: true
  type: rectangle
  size:
    - param:domain_size_x
    - param:domain_size_y
  mesh_resolution: [144, 144]
time:
  dt: 0.03
  t_end: 21.0
inputs:
  u_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.95
          max: 3.08
        std:
          sample: uniform
          min: 0.07
          max: 0.16
  v_1:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.82
          max: 3.15
        modes:
          - amplitude:
              sample: uniform
              min: 0.06
              max: 0.16
            cycles:
              - sample: uniform
                min: 0.18
                max: 0.34
              - sample: uniform
                min: 0.05
                max: 0.16
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.45
              max: 0.45
          - amplitude:
              sample: uniform
              min: -0.1
              max: 0.1
            cycles:
              - sample: uniform
                min: 0.05
                max: 0.18
              - sample: uniform
                min: 0.18
                max: 0.36
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
  u_2:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.82
          max: 3.22
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: -0.16
              max: 0.24
            sigma:
              sample: uniform
              min: 1.2
              max: 2.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.2
            center:
              - sample: uniform
                min: 3.0
                max: 33.0
              - sample: uniform
                min: 3.0
                max: 33.0
  v_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 9.8
          max: 10.7
        std:
          sample: uniform
          min: 0.12
          max: 0.38
boundary_conditions:
  u_1:
    $ref: boundary_field.scalar.full_periodic_2d
  v_1:
    $ref: boundary_field.scalar.full_periodic_2d
  u_2:
    $ref: boundary_field.scalar.full_periodic_2d
  v_2:
    $ref: boundary_field.scalar.full_periodic_2d
stochastic:
  states:
    u_1:
      coupling: saturating_self
      intensity: 0.0006
      offset: 0.5
    u_2:
      coupling: saturating_self
      intensity: 0.0005
      offset: 0.5
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [144, 144]
  num_frames: 71
seed: 5400
