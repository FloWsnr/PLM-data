preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.035
    max: 0.06
  D_v1:
    sample: uniform
    min: 0.45
    max: 0.95
  D_u2:
    sample: uniform
    min: 0.21
    max: 0.36
  D_v2:
    sample: uniform
    min: 7.5
    max: 13.5
  a:
    sample: uniform
    min: 2.88
    max: 3.12
  b:
    sample: uniform
    min: 8.65
    max: 9.35
  c:
    sample: uniform
    min: 14.4
    max: 15.8
  d:
    sample: uniform
    min: 8.3
    max: 9.8
  alpha:
    sample: uniform
    min: 0.12
    max: 0.28
  u1_notch_value:
    sample: uniform
    min: 2.55
    max: 2.9
  v1_notch_value:
    sample: uniform
    min: 2.55
    max: 2.95
  u2_notch_value:
    sample: uniform
    min: 2.5
    max: 2.92
  v2_notch_value:
    sample: uniform
    min: 8.6
    max: 9.7
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 32.0
    max: 42.0
  outer_height:
    sample: uniform
    min: 30.0
    max: 40.0
  cutout_width:
    sample: uniform
    min: 12.0
    max: 18.0
  cutout_height:
    sample: uniform
    min: 10.0
    max: 16.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.28
time:
  dt: 0.018
  t_end: 18.0
inputs:
  u_1:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.92
          max: 3.15
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.34
            sigma:
              sample: uniform
              min: 0.9
              max: 2.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.5
            center:
              - sample: uniform
                min: 4.0
                max: 24.0
              - sample: uniform
                min: 4.0
                max: 24.0
  v_1:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 14.0
            max: 22.0
          - sample: uniform
            min: 12.0
            max: 20.0
        region_values:
          "00":
            sample: uniform
            min: 2.8
            max: 3.0
          "01":
            sample: uniform
            min: 2.95
            max: 3.2
          "10":
            sample: uniform
            min: 2.9
            max: 3.15
          "11":
            sample: uniform
            min: 3.08
            max: 3.36
  u_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.82
          max: 3.18
        std:
          sample: uniform
          min: 0.06
          max: 0.18
  v_2:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 9.7
          max: 10.8
        modes:
          - amplitude:
              sample: uniform
              min: 0.2
              max: 0.55
            cycles:
              - sample: uniform
                min: 0.16
                max: 0.34
              - sample: uniform
                min: 0.12
                max: 0.28
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.5
              max: 0.5
boundary_conditions:
  u_1:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: param:u1_notch_value
  v_1:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: param:v1_notch_value
  u_2:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: param:u2_notch_value
  v_2:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: param:v2_notch_value
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 73
seed: 5451
