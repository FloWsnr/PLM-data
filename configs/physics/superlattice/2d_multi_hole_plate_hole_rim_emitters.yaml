preset: superlattice
parameters:
  D_u1:
    sample: uniform
    min: 0.035
    max: 0.06
  D_v1:
    sample: uniform
    min: 0.45
    max: 0.95
  D_u2:
    sample: uniform
    min: 0.21
    max: 0.36
  D_v2:
    sample: uniform
    min: 7.5
    max: 13.5
  a:
    sample: uniform
    min: 2.88
    max: 3.12
  b:
    sample: uniform
    min: 8.65
    max: 9.35
  c:
    sample: uniform
    min: 14.4
    max: 15.8
  d:
    sample: uniform
    min: 8.3
    max: 9.8
  alpha:
    sample: uniform
    min: 0.12
    max: 0.28
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 34.0
    max: 42.0
  height:
    sample: uniform
    min: 24.0
    max: 30.0
  holes:
    - boundary_name: holes_hot
      center:
        - sample: uniform
          min: 8.5
          max: 11.5
        - sample: uniform
          min: 6.5
          max: 9.5
      radius:
        sample: uniform
        min: 1.2
        max: 1.9
    - boundary_name: holes_cold
      center:
        - sample: uniform
          min: 18.0
          max: 22.5
        - sample: uniform
          min: 12.0
          max: 16.5
      radius:
        sample: uniform
        min: 1.1
        max: 1.8
    - boundary_name: holes_hot
      center:
        - sample: uniform
          min: 28.0
          max: 31.5
        - sample: uniform
          min: 6.5
          max: 10.5
      radius:
        sample: uniform
        min: 1.1
        max: 1.9
    - boundary_name: holes_cold
      center:
        - sample: uniform
          min: 14.0
          max: 18.5
        - sample: uniform
          min: 19.0
          max: 22.5
      radius:
        sample: uniform
        min: 1.0
        max: 1.6
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.28
time:
  dt: 0.018
  t_end: 18.0
inputs:
  u_1:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.9
          max: 3.12
        std:
          sample: uniform
          min: 0.06
          max: 0.18
  v_1:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.82
          max: 3.15
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.18
            sigma:
              sample: uniform
              min: 0.9
              max: 2.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.2
            center:
              - sample: uniform
                min: 4.0
                max: 31.0
              - sample: uniform
                min: 4.0
                max: 22.0
  u_2:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.78
          max: 3.2
        modes:
          - amplitude:
              sample: uniform
              min: 0.1
              max: 0.28
            cycles:
              - sample: uniform
                min: 0.14
                max: 0.3
              - sample: uniform
                min: 0.14
                max: 0.3
            phase:
              sample: uniform
              min: -3.14159
              max: 3.14159
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
  v_2:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 9.8
          max: 10.8
        std:
          sample: uniform
          min: 0.14
          max: 0.4
boundary_conditions:
  u_1:
    outer:
      - operator: neumann
        value: 0.0
    holes_hot:
      - operator: dirichlet
        value: 3.35
    holes_cold:
      - operator: dirichlet
        value: 2.65
  v_1:
    outer:
      - operator: neumann
        value: 0.0
    holes_hot:
      - operator: dirichlet
        value: 3.3
    holes_cold:
      - operator: dirichlet
        value: 2.65
  u_2:
    outer:
      - operator: neumann
        value: 0.0
    holes_hot:
      - operator: dirichlet
        value: 3.45
    holes_cold:
      - operator: dirichlet
        value: 2.55
  v_2:
    outer:
      - operator: neumann
        value: 0.0
    holes_hot:
      - operator: dirichlet
        value: 11.2
    holes_cold:
      - operator: dirichlet
        value: 8.8
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_u1_v1_u2_v2
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 73
seed: 5461
