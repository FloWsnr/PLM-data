preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.09
  Dv:
    sample: uniform
    min: 3.2
    max: 6.2
  a:
    sample: uniform
    min: 0.04
    max: 0.1
  b:
    sample: uniform
    min: 0.6
    max: 0.85
  domain_center_x:
    sample: uniform
    min: -0.3
    max: 0.3
  domain_center_y:
    sample: uniform
    min: -0.3
    max: 0.3
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 2.0
    max: 3.4
  outer_radius:
    sample: uniform
    min: 9.5
    max: 12.5
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.17
time:
  dt: 0.012
  t_end: 22.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.78
          max: 0.98
        generators:
        - count:
            sample: randint
            min: 6
            max: 10
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.16
          sigma:
            sample: uniform
            min: 0.65
            max: 1.35
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.2
          center:
          - sample: uniform
            min: -7.0
            max: 7.0
          - sample: uniform
            min: -7.0
            max: 7.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.72
          max: 1.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.1
          cycles: [5.0, 0.0]
          phase:
            sample: uniform
            min: -1.5
            max: 1.5
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.06
          cycles: [0.0, 5.0]
          phase:
            sample: uniform
            min: -1.5
            max: 1.5
boundary_conditions:
  u:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
  v:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 72
seed: 4270
