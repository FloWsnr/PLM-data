preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.06
    max: 0.09
  Dv:
    sample: uniform
    min: 2.8
    max: 4.8
  a:
    sample: uniform
    min: 0.04
    max: 0.1
  b:
    sample: uniform
    min: 0.65
    max: 0.9
  lobe_y:
    sample: uniform
    min: -0.25
    max: 0.25
  rim_absorption:
    sample: uniform
    min: 0.005
    max: 0.015
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -6.6
    max: -5.6
  - param:lobe_y
  right_center:
  - sample: uniform
    min: 5.6
    max: 6.6
  - param:lobe_y
  lobe_radius:
    sample: uniform
    min: 4.8
    max: 5.8
  neck_width:
    sample: uniform
    min: 1.4
    max: 2.4
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.16
time:
  dt: 0.012
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.98
          max: 1.18
        value_right:
          sample: uniform
          min: 0.68
          max: 0.9
        x_split:
          sample: uniform
          min: -0.8
          max: 0.8
        axis: 0
  v:
    initial_condition:
      type: quadrants
      params:
        split:
        - sample: uniform
          min: -1.2
          max: 1.2
        - sample: uniform
          min: -0.8
          max: 0.8
        region_values:
          "00":
            sample: uniform
            min: 0.72
            max: 0.92
          "01":
            sample: uniform
            min: 0.86
            max: 1.08
          "10":
            sample: uniform
            min: 0.62
            max: 0.82
          "11":
            sample: uniform
            min: 0.78
            max: 1.0
boundary_conditions:
  u:
    outer:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:rim_absorption
  v:
    outer:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:rim_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 68
seed: 4290
