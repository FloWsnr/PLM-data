preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.05
    max: 0.075
  Dv:
    sample: uniform
    min: 2.2
    max: 4.0
  a:
    sample: uniform
    min: 0.055
    max: 0.11
  b:
    sample: uniform
    min: 0.68
    max: 0.9
  u_upper_value:
    sample: uniform
    min: 1.0
    max: 1.22
  u_lower_value:
    sample: uniform
    min: 0.72
    max: 0.94
  v_upper_value:
    sample: uniform
    min: 0.58
    max: 0.82
  v_lower_value:
    sample: uniform
    min: 0.86
    max: 1.1
  wall_absorption:
    sample: uniform
    min: 0.004
    max: 0.012
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 10.0
    max: 14.0
  branch_length:
    sample: uniform
    min: 12.0
    max: 16.0
  branch_angle_degrees:
    sample: uniform
    min: 35.0
    max: 50.0
  channel_width:
    sample: uniform
    min: 3.6
    max: 5.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.17
time:
  dt: 0.01
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.82
          max: 1.02
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.1
          sigma:
            sample: uniform
            min: 0.7
            max: 1.5
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.6
          center:
          - sample: uniform
            min: 12.0
            max: 24.0
          - sample: uniform
            min: 2.2
            max: 8.0
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: -0.08
            max: 0.06
          sigma:
            sample: uniform
            min: 0.7
            max: 1.5
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.6
          center:
          - sample: uniform
            min: 12.0
            max: 24.0
          - sample: uniform
            min: -8.0
            max: -2.2
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.68
          max: 0.95
        modes:
        - amplitude:
            sample: uniform
            min: 0.03
            max: 0.08
          cycles: [3.0, 2.0]
          phase:
            sample: uniform
            min: -1.2
            max: 1.2
          angle:
            sample: uniform
            min: -0.6
            max: 0.6
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: dirichlet
      value: param:u_upper_value
    outlet_lower:
    - operator: dirichlet
      value: param:u_lower_value
    walls:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:wall_absorption
  v:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: dirichlet
      value: param:v_upper_value
    outlet_lower:
    - operator: dirichlet
      value: param:v_lower_value
    walls:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:wall_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 60
seed: 4390
