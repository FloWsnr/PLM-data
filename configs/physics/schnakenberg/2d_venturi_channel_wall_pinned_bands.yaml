preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 2.4
    max: 4.5
  a:
    sample: uniform
    min: 0.055
    max: 0.11
  b:
    sample: uniform
    min: 0.68
    max: 0.9
  u_inlet_value:
    sample: uniform
    min: 0.72
    max: 0.94
  u_outlet_value:
    sample: uniform
    min: 0.98
    max: 1.18
  v_inlet_value:
    sample: uniform
    min: 0.86
    max: 1.1
  v_outlet_value:
    sample: uniform
    min: 0.58
    max: 0.82
  wall_absorption:
    sample: uniform
    min: 0.005
    max: 0.014
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 28.0
    max: 34.0
  height:
    sample: uniform
    min: 10.0
    max: 14.0
  throat_height:
    sample: uniform
    min: 4.0
    max: 6.5
  constriction_center_x:
    sample: uniform
    min: 13.0
    max: 18.0
  constriction_radius:
    sample: uniform
    min: 7.0
    max: 10.0
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.18
time:
  dt: 0.01
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.82
          max: 1.02
        modes:
        - amplitude:
            sample: uniform
            min: 0.03
            max: 0.08
          cycles: [4.0, 1.0]
          phase:
            sample: uniform
            min: -1.2
            max: 1.2
          angle:
            sample: uniform
            min: -0.3
            max: 0.3
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.68
          max: 0.95
        modes:
        - amplitude:
            sample: uniform
            min: -0.06
            max: 0.06
          cycles: [2.0, 4.0]
          phase:
            sample: uniform
            min: -1.2
            max: 1.2
          angle:
            sample: uniform
            min: 0.15
            max: 0.65
boundary_conditions:
  u:
    inlet:
    - operator: dirichlet
      value: param:u_inlet_value
    outlet:
    - operator: dirichlet
      value: param:u_outlet_value
    walls:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:wall_absorption
  v:
    inlet:
    - operator: dirichlet
      value: param:v_inlet_value
    outlet:
    - operator: dirichlet
      value: param:v_outlet_value
    walls:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:wall_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 60
seed: 4370
