preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.065
    max: 0.095
  Dv:
    sample: uniform
    min: 2.8
    max: 5.0
  a:
    sample: uniform
    min: 0.05
    max: 0.1
  b:
    sample: uniform
    min: 0.55
    max: 0.8
  axis_x_length:
    sample: uniform
    min: 22.0
    max: 30.0
  axis_y_x:
    sample: uniform
    min: 5.0
    max: 10.0
  axis_y_y:
    sample: uniform
    min: 16.0
    max: 22.0
  u_low_wall:
    sample: uniform
    min: 0.72
    max: 0.9
  u_high_wall:
    sample: uniform
    min: 0.96
    max: 1.18
  v_low_wall:
    sample: uniform
    min: 0.62
    max: 0.82
  v_high_wall:
    sample: uniform
    min: 0.82
    max: 1.08
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
  - param:axis_x_length
  - 0.0
  axis_y:
  - param:axis_y_x
  - param:axis_y_y
  mesh_resolution: [160, 128]
time:
  dt: 0.012
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.82
          max: 1.02
        modes:
        - amplitude:
            sample: uniform
            min: 0.06
            max: 0.14
          cycles: [3.0, 1.0]
          phase:
            sample: uniform
            min: -1.4
            max: 1.4
          angle:
            sample: uniform
            min: 0.2
            max: 0.85
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.04
          cycles: [1.0, 4.0]
          phase:
            sample: uniform
            min: -1.4
            max: 1.4
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.72
          max: 0.98
        modes:
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.08
          cycles: [2.0, 3.0]
          phase:
            sample: uniform
            min: -1.4
            max: 1.4
          angle:
            sample: uniform
            min: -0.7
            max: -0.15
boundary_conditions:
  u:
    x-:
    - operator: periodic
      pair_with: x+
    x+:
    - operator: periodic
      pair_with: x-
    y-:
    - operator: dirichlet
      value: param:u_low_wall
    y+:
    - operator: dirichlet
      value: param:u_high_wall
  v:
    x-:
    - operator: periodic
      pair_with: x+
    x+:
    - operator: periodic
      pair_with: x-
    y-:
    - operator: dirichlet
      value: param:v_high_wall
    y+:
    - operator: dirichlet
      value: param:v_low_wall
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 128]
  num_frames: 64
seed: 4230
