preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.04
    max: 0.06
  Dv:
    sample: uniform
    min: 1.6
    max: 2.6
  a:
    sample: uniform
    min: 0.08
    max: 0.14
  b:
    sample: uniform
    min: 0.78
    max: 1.0
  lobe_y:
    sample: uniform
    min: -0.3
    max: 0.3
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -6.8
    max: -5.7
  - param:lobe_y
  right_center:
  - sample: uniform
    min: 5.7
    max: 6.8
  - param:lobe_y
  lobe_radius:
    sample: uniform
    min: 4.8
    max: 5.8
  neck_width:
    sample: uniform
    min: 1.8
    max: 3.0
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.16
time:
  dt: 0.015
  t_end: 24.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.9
          max: 1.08
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: 0.05
            max: 0.16
          sigma:
            sample: uniform
            min: 0.6
            max: 1.35
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.0
          center:
          - sample: uniform
            min: -8.8
            max: -3.8
          - sample: uniform
            min: -2.4
            max: 2.4
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: -0.12
            max: 0.08
          sigma:
            sample: uniform
            min: 0.7
            max: 1.5
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.8
          center:
          - sample: uniform
            min: 3.8
            max: 8.8
          - sample: uniform
            min: -2.4
            max: 2.4
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.72
          max: 1.0
        std:
          sample: uniform
          min: 0.035
          max: 0.075
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
  v:
    outer:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 76
seed: 4280
