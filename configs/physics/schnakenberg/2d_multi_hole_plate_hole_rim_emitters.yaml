preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.06
    max: 0.095
  Dv:
    sample: uniform
    min: 3.0
    max: 5.8
  a:
    sample: uniform
    min: 0.04
    max: 0.1
  b:
    sample: uniform
    min: 0.6
    max: 0.88
  u_hot_hole:
    sample: uniform
    min: 1.02
    max: 1.24
  u_cool_hole:
    sample: uniform
    min: 0.68
    max: 0.9
  v_hot_hole:
    sample: uniform
    min: 0.58
    max: 0.78
  v_cool_hole:
    sample: uniform
    min: 0.86
    max: 1.12
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 24.0
    max: 30.0
  height:
    sample: uniform
    min: 16.0
    max: 22.0
  holes:
  - center:
    - sample: uniform
      min: 5.8
      max: 7.6
    - sample: uniform
      min: 4.8
      max: 6.4
    radius:
      sample: uniform
      min: 0.85
      max: 1.2
    boundary_name: hot_holes
  - center:
    - sample: uniform
      min: 15.8
      max: 17.8
    - sample: uniform
      min: 4.8
      max: 6.4
    radius:
      sample: uniform
      min: 0.85
      max: 1.2
    boundary_name: cool_holes
  - center:
    - sample: uniform
      min: 10.8
      max: 13.0
    - sample: uniform
      min: 10.6
      max: 12.6
    radius:
      sample: uniform
      min: 0.85
      max: 1.2
    boundary_name: hot_holes
  - center:
    - sample: uniform
      min: 20.0
      max: 21.5
    - sample: uniform
      min: 10.2
      max: 12.4
    radius:
      sample: uniform
      min: 0.8
      max: 1.15
    boundary_name: cool_holes
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.18
time:
  dt: 0.012
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.82
          max: 1.04
        std:
          sample: uniform
          min: 0.04
          max: 0.09
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.68
          max: 0.96
        std:
          sample: uniform
          min: 0.04
          max: 0.09
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    hot_holes:
    - operator: dirichlet
      value: param:u_hot_hole
    cool_holes:
    - operator: dirichlet
      value: param:u_cool_hole
  v:
    outer:
    - operator: neumann
      value: 0.0
    hot_holes:
    - operator: dirichlet
      value: param:v_hot_hole
    cool_holes:
    - operator: dirichlet
      value: param:v_cool_hole
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 64
seed: 4330
