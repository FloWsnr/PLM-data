preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.04
    max: 0.065
  Dv:
    sample: uniform
    min: 1.8
    max: 3.4
  a:
    sample: uniform
    min: 0.08
    max: 0.16
  b:
    sample: uniform
    min: 0.82
    max: 1.05
  u_hole_value:
    sample: uniform
    min: 0.82
    max: 1.05
  v_hole_value:
    sample: uniform
    min: 0.62
    max: 0.88
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 24.0
    max: 30.0
  height:
    sample: uniform
    min: 16.0
    max: 22.0
  holes:
  - center:
    - sample: uniform
      min: 5.8
      max: 7.6
    - sample: uniform
      min: 4.8
      max: 6.4
    radius:
      sample: uniform
      min: 0.9
      max: 1.3
  - center:
    - sample: uniform
      min: 15.8
      max: 17.8
    - sample: uniform
      min: 4.8
      max: 6.4
    radius:
      sample: uniform
      min: 0.9
      max: 1.3
  - center:
    - sample: uniform
      min: 10.8
      max: 13.0
    - sample: uniform
      min: 10.6
      max: 12.6
    radius:
      sample: uniform
      min: 0.85
      max: 1.25
  - center:
    - sample: uniform
      min: 20.0
      max: 21.5
    - sample: uniform
      min: 10.2
      max: 12.4
    radius:
      sample: uniform
      min: 0.8
      max: 1.15
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.18
time:
  dt: 0.015
  t_end: 22.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.88
          max: 1.08
        modes:
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.1
          cycles: [3.0, 1.0]
          phase:
            sample: uniform
            min: -1.4
            max: 1.4
          angle:
            sample: uniform
            min: -0.45
            max: 0.45
        - amplitude:
            sample: uniform
            min: -0.06
            max: 0.06
          cycles: [0.0, 4.0]
          phase:
            sample: uniform
            min: -1.4
            max: 1.4
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.68
          max: 0.95
        generators:
        - count:
            sample: randint
            min: 5
            max: 8
          amplitude:
            sample: uniform
            min: -0.08
            max: 0.12
          sigma:
            sample: uniform
            min: 0.7
            max: 1.5
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.2
          center:
          - sample: uniform
            min: 3.0
            max: 22.0
          - sample: uniform
            min: 3.0
            max: 13.5
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    holes:
    - operator: dirichlet
      value: param:u_hole_value
  v:
    outer:
    - operator: neumann
      value: 0.0
    holes:
    - operator: dirichlet
      value: param:v_hole_value
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 72
seed: 4320
