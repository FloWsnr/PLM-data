preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.05
    max: 0.09
  Dv:
    sample: uniform
    min: 2.0
    max: 3.4
  a:
    sample: uniform
    min: 0.08
    max: 0.18
  b:
    sample: uniform
    min: 0.65
    max: 0.95
  domain_center_x:
    sample: uniform
    min: -0.4
    max: 0.4
  domain_center_y:
    sample: uniform
    min: -0.4
    max: 0.4
  u_outer_value:
    sample: uniform
    min: 0.86
    max: 1.16
  v_outer_value:
    sample: uniform
    min: 0.62
    max: 0.92
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 9.5
    max: 12.5
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.17
time:
  dt: 0.015
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.88
          max: 1.08
        generators:
        - count:
            sample: randint
            min: 5
            max: 9
          amplitude:
            sample: uniform
            min: -0.1
            max: 0.16
          sigma:
            sample: uniform
            min: 0.8
            max: 1.7
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.4
          center:
          - sample: uniform
            min: -5.5
            max: 5.5
          - sample: uniform
            min: -5.5
            max: 5.5
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.68
          max: 0.95
        modes:
        - amplitude:
            sample: uniform
            min: 0.035
            max: 0.09
          cycles: [2.0, 3.0]
          phase:
            sample: uniform
            min: -1.2
            max: 1.2
          angle:
            sample: uniform
            min: -0.8
            max: 0.8
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value: param:u_outer_value
  v:
    outer:
    - operator: dirichlet
      value: param:v_outer_value
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 64
seed: 4250
