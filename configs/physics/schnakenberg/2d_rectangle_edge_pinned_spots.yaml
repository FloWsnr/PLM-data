preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 1.8
    max: 2.7
  a:
    sample: uniform
    min: 0.05
    max: 0.12
  b:
    sample: uniform
    min: 0.65
    max: 0.9
  domain_size_x:
    sample: uniform
    min: 20.0
    max: 28.0
  domain_size_y:
    sample: uniform
    min: 14.0
    max: 20.0
  u_left_value:
    sample: uniform
    min: 0.72
    max: 0.92
  u_right_value:
    sample: uniform
    min: 0.95
    max: 1.2
  v_left_value:
    sample: uniform
    min: 0.72
    max: 0.95
  v_right_value:
    sample: uniform
    min: 0.58
    max: 0.82
domain:
  allow_sampling: true
  type: rectangle
  size:
  - param:domain_size_x
  - param:domain_size_y
  mesh_resolution: [160, 128]
time:
  dt: 0.015
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.82
          max: 1.02
        generators:
        - count:
            sample: randint
            min: 4
            max: 7
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.14
          sigma:
            sample: uniform
            min: 0.8
            max: 1.8
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.2
          center:
          - sample: uniform
            min: 3.0
            max: 24.0
          - sample: uniform
            min: 2.5
            max: 17.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.68
          max: 0.95
        modes:
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.08
          cycles: [1.0, 2.0]
          phase:
            sample: uniform
            min: -1.2
            max: 1.2
          angle:
            sample: uniform
            min: -0.35
            max: 0.35
        - amplitude:
            sample: uniform
            min: 0.02
            max: 0.08
          cycles: [0.0, 4.0]
          phase:
            sample: uniform
            min: -1.2
            max: 1.2
boundary_conditions:
  u:
    x-:
    - operator: dirichlet
      value: param:u_left_value
    x+:
    - operator: dirichlet
      value: param:u_right_value
    y-:
    - operator: neumann
      value: 0.0
    y+:
    - operator: neumann
      value: 0.0
  v:
    x-:
    - operator: dirichlet
      value: param:v_left_value
    x+:
    - operator: dirichlet
      value: param:v_right_value
    y-:
    - operator: neumann
      value: 0.0
    y+:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 128]
  num_frames: 64
seed: 4220
