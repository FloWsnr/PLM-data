preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.04
    max: 0.065
  Dv:
    sample: uniform
    min: 2.4
    max: 4.8
  a:
    sample: uniform
    min: 0.06
    max: 0.12
  b:
    sample: uniform
    min: 0.75
    max: 0.95
  domain_center_x:
    sample: uniform
    min: -0.5
    max: 0.5
  domain_center_y:
    sample: uniform
    min: -0.5
    max: 0.5
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 9.0
    max: 12.0
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.17
time:
  dt: 0.012
  t_end: 24.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.86
          max: 1.05
        amplitude:
          sample: uniform
          min: 0.06
          max: 0.18
        frequency:
          sample: uniform
          min: 0.55
          max: 1.05
        center:
        - param:domain_center_x
        - param:domain_center_y
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.72
          max: 0.98
        std:
          sample: uniform
          min: 0.03
          max: 0.08
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
  v:
    outer:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 76
seed: 4240
