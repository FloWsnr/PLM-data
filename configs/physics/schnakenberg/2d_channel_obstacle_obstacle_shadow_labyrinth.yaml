preset: schnakenberg
parameters:
  Du:
    sample: uniform
    min: 0.045
    max: 0.085
  Dv:
    sample: uniform
    min: 1.8
    max: 4.4
  a:
    sample: uniform
    min: 0.05
    max: 0.13
  b:
    sample: uniform
    min: 0.62
    max: 0.96
  u_inlet_value:
    sample: uniform
    min: 0.66
    max: 1.06
  u_outlet_value:
    sample: uniform
    min: 0.9
    max: 1.32
  v_inlet_value:
    sample: uniform
    min: 0.76
    max: 1.22
  v_outlet_value:
    sample: uniform
    min: 0.48
    max: 0.9
  obstacle_absorption:
    sample: uniform
    min: 0.001
    max: 0.018
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 26.0
    max: 38.0
  height:
    sample: uniform
    min: 9.0
    max: 15.0
  obstacle_center:
  - sample: uniform
    min: 9.0
    max: 22.0
  - sample: uniform
    min: 3.2
    max: 7.8
  obstacle_radius:
    sample: uniform
    min: 1.2
    max: 3.0
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.18
time:
  dt: 0.01
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.78
          max: 1.08
        modes:
        - amplitude:
            sample: uniform
            min: -0.1
            max: 0.16
          cycles:
          - sample: uniform
            min: 1.0
            max: 5.0
          - sample: uniform
            min: 0.5
            max: 3.0
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
          angle:
            sample: uniform
            min: -0.9
            max: 0.9
        - amplitude:
            sample: uniform
            min: -0.08
            max: 0.12
          cycles:
          - sample: uniform
            min: 0.5
            max: 2.5
          - sample: uniform
            min: 2.0
            max: 5.0
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
          angle:
            sample: uniform
            min: -0.9
            max: 0.9
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.62
          max: 1.0
        generators:
        - count:
            sample: randint
            min: 5
            max: 12
          amplitude:
            sample: uniform
            min: -0.12
            max: 0.16
          sigma:
            sample: uniform
            min: 0.55
            max: 2.2
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 4.5
          center:
          - sample: uniform
            min: 8.0
            max: 28.0
          - sample: uniform
            min: 2.0
            max: 11.5
boundary_conditions:
  u:
    inlet:
    - operator: dirichlet
      value: param:u_inlet_value
    outlet:
    - operator: dirichlet
      value: param:u_outlet_value
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:obstacle_absorption
  v:
    inlet:
    - operator: dirichlet
      value: param:v_inlet_value
    outlet:
    - operator: dirichlet
      value: param:v_outlet_value
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: robin
      value: 0.0
      operator_parameters:
        alpha: param:obstacle_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 66
seed: 4350
