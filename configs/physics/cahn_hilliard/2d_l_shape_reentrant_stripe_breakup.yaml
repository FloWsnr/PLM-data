preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.0035
    max: 0.006
  barrier_height:
    sample: uniform
    min: 90.0
    max: 145.0
  mobility:
    sample: uniform
    min: 0.4
    max: 0.9
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 1.08
    max: 1.28
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.16
  cutout_width:
    sample: uniform
    min: 0.42
    max: 0.58
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.47
          max: 0.54
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 1.0
                max: 1.8
              - sample: uniform
                min: 1.4
                max: 2.5
            phase:
              sample: uniform
              min: -3.14
              max: 3.14
            angle:
              sample: uniform
              min: -0.5
              max: 0.2
          - amplitude:
              sample: uniform
              min: 0.025
              max: 0.055
            cycles:
              - sample: uniform
                min: 2.4
                max: 3.8
              - sample: uniform
                min: 0.6
                max: 1.2
            phase:
              sample: uniform
              min: -3.14
              max: 3.14
            angle:
              sample: uniform
              min: 0.35
              max: 0.85
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_l_shape
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [176, 160]
  num_frames: 36
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
