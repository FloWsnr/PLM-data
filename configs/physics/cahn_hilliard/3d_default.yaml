preset: cahn_hilliard
parameters:
  lmbda: 0.02
  barrier_height: 100.0
  mobility: 1.0
  theta: 0.5
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [16, 16, 16]
time:
  $ref: time.cahn_hilliard_default
inputs:
  c:
    initial_condition:
      type: random_perturbation
      params:
        mean: 0.63
        std: 0.02
boundary_conditions:
  c:
    $ref: boundary_field.scalar.full_periodic_3d
output:
  $ref: output.template.scalar_c
  resolution: [16, 16, 16]
  num_frames: 5
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
