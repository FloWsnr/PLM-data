preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.0034
    max: 0.0062
  barrier_height:
    sample: uniform
    min: 90.0
    max: 145.0
  mobility:
    sample: uniform
    min: 0.5
    max: 1.0
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.72
    max: 0.92
  branch_length:
    sample: uniform
    min: 0.64
    max: 0.84
  branch_angle_degrees:
    sample: uniform
    min: 38.0
    max: 54.0
  channel_width:
    sample: uniform
    min: 0.15
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.42
          max: 0.5
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.28
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 0.36
                max: 0.82
              - sample: uniform
                min: -0.08
                max: 0.08
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: -0.22
              max: -0.08
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.82
                max: 1.32
              - sample: uniform
                min: -0.46
                max: 0.46
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_y_bifurcation
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [208, 176]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
