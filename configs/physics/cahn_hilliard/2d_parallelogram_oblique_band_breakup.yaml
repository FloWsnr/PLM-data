preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.005
    max: 0.008
  barrier_height:
    sample: uniform
    min: 85.0
    max: 135.0
  mobility:
    sample: uniform
    min: 0.4
    max: 0.9
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
    - sample: uniform
      min: 1.0
      max: 1.18
    - 0.0
  axis_y:
    - sample: uniform
      min: -0.28
      max: -0.12
    - sample: uniform
      min: 0.86
      max: 1.0
  mesh_resolution: [160, 128]
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.47
          max: 0.53
        modes:
          - amplitude:
              sample: uniform
              min: 0.06
              max: 0.12
            cycles:
              - sample: uniform
                min: 1.4
                max: 2.4
              - sample: uniform
                min: 0.4
                max: 1.0
            phase:
              sample: uniform
              min: -3.14
              max: 3.14
            angle:
              sample: uniform
              min: 0.35
              max: 0.85
          - amplitude:
              sample: uniform
              min: 0.02
              max: 0.05
            cycles:
              - sample: uniform
                min: 2.5
                max: 4.0
              - sample: uniform
                min: 1.0
                max: 2.0
            phase:
              sample: uniform
              min: -3.14
              max: 3.14
            angle:
              sample: uniform
              min: -0.55
              max: -0.15
boundary_conditions:
  c:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
