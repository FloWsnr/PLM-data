preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.0042
    max: 0.0075
  barrier_height:
    sample: uniform
    min: 80.0
    max: 130.0
  mobility:
    sample: uniform
    min: 0.45
    max: 0.95
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.18
    max: 1.34
  height:
    sample: uniform
    min: 0.86
    max: 1.02
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.22
          max: 0.32
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.58
          max: 0.68
        - sample: uniform
          min: 0.42
          max: 0.54
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.92
          max: 1.02
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.84
          max: 0.96
        - sample: uniform
          min: 0.64
          max: 0.78
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.46
          max: 0.55
        std:
          sample: uniform
          min: 0.025
          max: 0.05
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_multi_hole_plate
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [176, 144]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
