preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.006
    max: 0.01
  barrier_height:
    sample: uniform
    min: 80.0
    max: 130.0
  mobility:
    sample: uniform
    min: 0.4
    max: 0.9
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: disk
  center:
    - sample: uniform
      min: -0.035
      max: 0.035
    - sample: uniform
      min: -0.035
      max: 0.035
  radius:
    sample: uniform
    min: 0.55
    max: 0.62
  mesh_size:
    sample: uniform
    min: 0.0075
    max: 0.0088
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.48
          max: 0.54
        amplitude:
          sample: uniform
          min: 0.06
          max: 0.12
        frequency:
          sample: uniform
          min: 10.0
          max: 18.0
        center:
          - sample: uniform
            min: -0.05
            max: 0.05
          - sample: uniform
            min: -0.05
            max: 0.05
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
