preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.004
    max: 0.0068
  barrier_height:
    sample: uniform
    min: 105.0
    max: 160.0
  mobility:
    sample: uniform
    min: 0.45
    max: 1.05
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.12
    max: 1.28
  height:
    sample: uniform
    min: 0.9
    max: 1.06
  holes:
    - center:
        - sample: uniform
          min: 0.28
          max: 0.36
        - sample: uniform
          min: 0.26
          max: 0.36
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.62
          max: 0.76
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
    - center:
        - sample: uniform
          min: 0.86
          max: 0.98
        - sample: uniform
          min: 0.3
          max: 0.42
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.0105
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.38
          max: 0.47
        generators:
          - count:
              sample: randint
              min: 3
              max: 5
            amplitude:
              sample: uniform
              min: 0.14
              max: 0.3
            sigma:
              sample: uniform
              min: 0.035
              max: 0.055
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.5
            center:
              - sample: uniform
                min: 0.2
                max: 1.02
              - sample: uniform
                min: 0.2
                max: 0.82
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_multi_hole_plate
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [176, 152]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
