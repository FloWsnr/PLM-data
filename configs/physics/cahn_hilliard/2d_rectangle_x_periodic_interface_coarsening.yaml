preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.004
    max: 0.007
  barrier_height:
    sample: uniform
    min: 85.0
    max: 135.0
  mobility:
    sample: uniform
    min: 0.35
    max: 0.85
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 1.15
      max: 1.35
    - sample: uniform
      min: 0.78
      max: 0.96
  mesh_resolution: [160, 128]
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.5
          max: 0.54
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - 0.0
              - sample: uniform
                min: 1.0
                max: 1.8
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
          - amplitude:
              sample: uniform
              min: -0.04
              max: -0.015
            cycles:
              - sample: uniform
                min: 2.0
                max: 3.5
              - 0.0
            phase:
              sample: uniform
              min: -3.14
              max: 3.14
boundary_conditions:
  c:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [160, 128]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
