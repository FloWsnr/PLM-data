preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.005
    max: 0.008
  barrier_height:
    sample: uniform
    min: 85.0
    max: 135.0
  mobility:
    sample: uniform
    min: 0.5
    max: 1.0
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: disk
  center:
    - sample: uniform
      min: -0.025
      max: 0.025
    - sample: uniform
      min: -0.025
      max: 0.025
  radius:
    sample: uniform
    min: 0.56
    max: 0.64
  mesh_size:
    sample: uniform
    min: 0.0078
    max: 0.0092
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.34
          max: 0.46
        generators:
          - count:
              sample: randint
              min: 5
              max: 8
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.28
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: -0.44
                max: 0.44
              - sample: uniform
                min: -0.44
                max: 0.44
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [128, 128]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
