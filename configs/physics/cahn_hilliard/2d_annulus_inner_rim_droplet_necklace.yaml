preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.005
    max: 0.008
  barrier_height:
    sample: uniform
    min: 85.0
    max: 135.0
  mobility:
    sample: uniform
    min: 0.4
    max: 0.9
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.36
  outer_radius:
    sample: uniform
    min: 0.62
    max: 0.72
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.01
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.39
          max: 0.47
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.28
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.34
                max: 0.48
              - sample: uniform
                min: -0.08
                max: 0.08
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.26
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: -0.48
                max: -0.34
              - sample: uniform
                min: -0.08
                max: 0.08
          - count: 1
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.24
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: -0.08
                max: 0.08
              - sample: uniform
                min: 0.34
                max: 0.48
          - count: 1
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.24
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: -0.08
                max: 0.08
              - sample: uniform
                min: -0.48
                max: -0.34
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_annulus
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [144, 144]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
