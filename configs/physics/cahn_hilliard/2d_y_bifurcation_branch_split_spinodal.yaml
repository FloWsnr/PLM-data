preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.0045
    max: 0.008
  barrier_height:
    sample: uniform
    min: 80.0
    max: 130.0
  mobility:
    sample: uniform
    min: 0.4
    max: 0.9
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.68
    max: 0.86
  branch_length:
    sample: uniform
    min: 0.68
    max: 0.9
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 0.14
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.0095
    max: 0.0115
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.47
          max: 0.55
        std:
          sample: uniform
          min: 0.02
          max: 0.045
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_y_bifurcation
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
