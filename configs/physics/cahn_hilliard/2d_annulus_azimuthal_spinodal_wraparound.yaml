preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.0048
    max: 0.0085
  barrier_height:
    sample: uniform
    min: 80.0
    max: 120.0
  mobility:
    sample: uniform
    min: 0.45
    max: 0.95
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.22
    max: 0.3
  outer_radius:
    sample: uniform
    min: 0.58
    max: 0.66
  mesh_size:
    sample: uniform
    min: 0.008
    max: 0.0095
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.47
          max: 0.55
        std:
          sample: uniform
          min: 0.025
          max: 0.05
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_annulus
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [144, 144]
  num_frames: 36
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
