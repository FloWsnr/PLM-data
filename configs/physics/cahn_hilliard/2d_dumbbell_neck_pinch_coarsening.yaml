preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.004
    max: 0.007
  barrier_height:
    sample: uniform
    min: 90.0
    max: 150.0
  mobility:
    sample: uniform
    min: 0.5
    max: 1.0
  theta:
    sample: uniform
    min: 0.84
    max: 1.0
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -0.44
      max: -0.36
    - 0.0
  right_center:
    - sample: uniform
      min: 0.36
      max: 0.44
    - 0.0
  lobe_radius:
    sample: uniform
    min: 0.34
    max: 0.42
  neck_width:
    sample: uniform
    min: 0.1
    max: 0.17
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.0105
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.48
          max: 0.54
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 1.4
                max: 2.2
              - 0.0
            phase:
              sample: uniform
              min: -3.14
              max: 3.14
          - amplitude:
              sample: uniform
              min: 0.03
              max: 0.07
            cycles:
              - 0.0
              - sample: uniform
                min: 1.4
                max: 2.6
            phase:
              sample: uniform
              min: -3.14
              max: 3.14
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
