preset: cahn_hilliard
parameters:
  lmbda:
    sample: uniform
    min: 0.004
    max: 0.0068
  barrier_height:
    sample: uniform
    min: 85.0
    max: 125.0
  mobility:
    sample: uniform
    min: 0.35
    max: 0.85
  theta:
    sample: uniform
    min: 0.9
    max: 1.0
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 0.84
    max: 1.02
  lane_spacing:
    sample: uniform
    min: 0.32
    max: 0.44
  n_bends:
    sample: randint
    min: 3
    max: 4
  channel_width:
    sample: uniform
    min: 0.13
    max: 0.18
  mesh_size:
    sample: uniform
    min: 0.0085
    max: 0.0105
time:
  dt: 2.0e-06
  t_end: 2.4e-04
inputs:
  c:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.4
          max: 0.49
        generators:
          - count:
              sample: randint
              min: 3
              max: 5
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.22
            sigma:
              sample: uniform
              min: 0.05
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.1
            center:
              - sample: uniform
                min: 0.08
                max: 0.92
              - sample: uniform
                min: -0.05
                max: 1.28
boundary_conditions:
  c:
    $ref: boundary_field.scalar.homogeneous_neumann_channel
output:
  $ref: output.template.scalar_c
  formats: [numpy, gif]
  resolution: [176, 256]
  num_frames: 33
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
