preset: van_der_pol
parameters:
  Du:
    sample: uniform
    min: 0.07
    max: 0.16
  Dv:
    sample: uniform
    min: 0.12
    max: 0.28
  mu:
    sample: uniform
    min: 3.5
    max: 6.5
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 58.0
    max: 70.0
  height:
    sample: uniform
    min: 32.0
    max: 38.0
  obstacle_center:
    - sample: uniform
      min: 24.0
      max: 34.0
    - sample: uniform
      min: 14.0
      max: 24.0
  obstacle_radius:
    sample: uniform
    min: 4.2
    max: 5.8
  mesh_size:
    sample: uniform
    min: 0.28
    max: 0.4
time:
  dt: 0.0055
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.12
          max: 0.12
        generators:
          - count:
              sample: randint
              min: 3
              max: 6
            amplitude:
              sample: uniform
              min: 0.55
              max: 1.25
            sigma:
              sample: uniform
              min: 2.4
              max: 5.2
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 3.4
            center:
              - sample: uniform
                min: 6.0
                max: 26.0
              - sample: uniform
                min: 7.0
                max: 31.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        modes:
          - amplitude:
              sample: uniform
              min: 0.22
              max: 0.58
            cycles:
              - sample: uniform
                min: 0.06
                max: 0.16
              - sample: uniform
                min: 0.05
                max: 0.14
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.8
              max: 1.5
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.1
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.45
              max: -0.12
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.1
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 59
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4321
