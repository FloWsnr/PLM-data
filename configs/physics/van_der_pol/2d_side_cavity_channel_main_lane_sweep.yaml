preset: van_der_pol
parameters:
  cavity_x:
    sample: uniform
    min: 26.0
    max: 42.0
  Du:
    sample: uniform
    min: 0.18
    max: 0.34
  Dv:
    sample: uniform
    min: 0.03
    max: 0.08
  mu:
    sample: uniform
    min: 5.5
    max: 8.5
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 58.0
    max: 72.0
  height:
    sample: uniform
    min: 22.0
    max: 28.0
  cavity_width:
    sample: uniform
    min: 14.0
    max: 22.0
  cavity_depth:
    sample: uniform
    min: 12.0
    max: 20.0
  cavity_center_x: "param:cavity_x"
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.34
time:
  dt: 0.0045
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.1
          max: 0.1
        modes:
          - amplitude:
              sample: uniform
              min: 0.65
              max: 1.35
            cycles:
              - sample: uniform
                min: 0.04
                max: 0.12
              - sample: uniform
                min: 0.08
                max: 0.2
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.6
              max: 0.6
          - amplitude:
              sample: uniform
              min: -0.75
              max: -0.25
            cycles:
              - sample: uniform
                min: 0.12
                max: 0.24
              - sample: uniform
                min: 0.03
                max: 0.1
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -1.0
              max: 1.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.2
              max: 0.65
            sigma:
              sample: uniform
              min: 1.8
              max: 3.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.5
            center:
              - sample: uniform
                min: 8.0
                max: 54.0
              - sample: uniform
                min: 5.0
                max: 21.0
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.55
              max: -0.75
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.75
              max: 1.55
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.06
            max: 0.18
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.18
              max: 0.55
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.55
              max: -0.18
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.06
            max: 0.18
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 57
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4391
