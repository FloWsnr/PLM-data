preset: van_der_pol
parameters:
  throat_x:
    sample: uniform
    min: 27.0
    max: 34.0
  Du:
    sample: uniform
    min: 0.18
    max: 0.36
  Dv:
    sample: uniform
    min: 0.025
    max: 0.075
  mu:
    sample: uniform
    min: 5.8
    max: 8.5
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 58.0
    max: 72.0
  height:
    sample: uniform
    min: 32.0
    max: 40.0
  throat_height:
    sample: uniform
    min: 14.0
    max: 20.0
  constriction_center_x: "param:throat_x"
  constriction_radius:
    sample: uniform
    min: 15.0
    max: 21.0
  mesh_size:
    sample: uniform
    min: 0.3
    max: 0.42
time:
  dt: 0.0045
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.12
          max: 0.12
        modes:
          - amplitude:
              sample: uniform
              min: 0.55
              max: 1.15
            cycles:
              - sample: uniform
                min: 0.05
                max: 0.14
              - sample: uniform
                min: 0.08
                max: 0.2
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.9
              max: 0.9
          - amplitude:
              sample: uniform
              min: -0.8
              max: -0.25
            cycles:
              - sample: uniform
                min: 0.12
                max: 0.24
              - sample: uniform
                min: 0.03
                max: 0.1
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -1.1
              max: 1.1
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.6
            sigma:
              sample: uniform
              min: 2.0
              max: 4.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 8.0
                max: 54.0
              - sample: uniform
                min: 7.0
                max: 31.0
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.22
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.08
            max: 0.22
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 57
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4351
