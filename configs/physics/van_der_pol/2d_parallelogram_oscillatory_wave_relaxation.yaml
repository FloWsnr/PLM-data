preset: van_der_pol
parameters:
  Du:
    sample: uniform
    min: 0.18
    max: 0.34
  Dv:
    sample: uniform
    min: 0.025
    max: 0.08
  mu:
    sample: uniform
    min: 2.8
    max: 4.8
domain:
  allow_sampling: true
  type: parallelogram
  origin:
    - sample: uniform
      min: -0.8
      max: 0.8
    - sample: uniform
      min: -0.8
      max: 0.8
  axis_x:
    - sample: uniform
      min: 38.0
      max: 46.0
    - 0.0
  axis_y:
    - sample: uniform
      min: 8.0
      max: 14.0
    - sample: uniform
      min: 34.0
      max: 42.0
  mesh_resolution:
    - sample: randint
      min: 144
      max: 176
    - sample: randint
      min: 144
      max: 176
time:
  dt: 0.0075
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.08
          max: 0.08
        modes:
          - amplitude:
              sample: uniform
              min: 0.45
              max: 0.9
            cycles:
              - sample: uniform
                min: 0.04
                max: 0.12
              - sample: uniform
                min: 0.08
                max: 0.18
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.9
              max: 0.9
          - amplitude:
              sample: uniform
              min: -0.7
              max: -0.25
            cycles:
              - sample: uniform
                min: 0.1
                max: 0.22
              - sample: uniform
                min: 0.02
                max: 0.1
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -1.1
              max: 1.1
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.03
          max: 0.03
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.48
            cycles:
              - sample: uniform
                min: 0.06
                max: 0.16
              - sample: uniform
                min: 0.06
                max: 0.16
            phase:
              sample: uniform
              min: 1.0
              max: 5.4
            angle:
              sample: uniform
              min: -1.0
              max: 1.0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 160]
  num_frames: 61
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4221
