preset: van_der_pol
parameters:
  Du:
    sample: uniform
    min: 0.07
    max: 0.16
  Dv:
    sample: uniform
    min: 0.1
    max: 0.24
  mu:
    sample: uniform
    min: 3.8
    max: 6.8
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 26.0
    max: 34.0
  branch_length:
    sample: uniform
    min: 30.0
    max: 40.0
  branch_angle_degrees:
    sample: uniform
    min: 28.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 8.0
    max: 11.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.3
time:
  dt: 0.0055
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.12
          max: 0.12
        generators:
          - count:
              sample: randint
              min: 2
              max: 5
            amplitude:
              sample: uniform
              min: 0.65
              max: 1.45
            sigma:
              sample: uniform
              min: 1.6
              max: 3.4
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 3.2
            center:
              - sample: uniform
                min: 6.0
                max: 28.0
              - sample: uniform
                min: -4.0
                max: 4.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.5
            cycles:
              - sample: uniform
                min: 0.06
                max: 0.16
              - sample: uniform
                min: 0.05
                max: 0.14
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.6
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.5
              max: -0.7
    outlet_lower:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.45
              max: -0.12
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.15
              max: 0.55
    outlet_lower:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 59
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4361
