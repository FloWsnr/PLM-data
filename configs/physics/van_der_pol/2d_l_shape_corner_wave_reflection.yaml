preset: van_der_pol
parameters:
  Du:
    sample: uniform
    min: 0.1
    max: 0.22
  Dv:
    sample: uniform
    min: 0.04
    max: 0.12
  mu:
    sample: uniform
    min: 3.2
    max: 6.0
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 38.0
    max: 46.0
  outer_height:
    sample: uniform
    min: 38.0
    max: 46.0
  cutout_width:
    sample: uniform
    min: 14.0
    max: 20.0
  cutout_height:
    sample: uniform
    min: 14.0
    max: 20.0
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.34
time:
  dt: 0.006
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.12
          max: 0.12
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.65
              max: 1.35
            sigma:
              sample: uniform
              min: 2.0
              max: 4.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 8.0
                max: 27.0
              - sample: uniform
                min: 8.0
                max: 27.0
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: -1.25
              max: -0.5
            sigma:
              sample: uniform
              min: 1.8
              max: 3.6
            aspect_ratio:
              sample: uniform
              min: 1.4
              max: 3.5
            center:
              - sample: uniform
                min: 4.0
                max: 18.0
              - sample: uniform
                min: 24.0
                max: 38.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.52
            cycles:
              - sample: uniform
                min: 0.05
                max: 0.15
              - sample: uniform
                min: 0.08
                max: 0.22
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.7
              max: 0.7
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 59
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4301
