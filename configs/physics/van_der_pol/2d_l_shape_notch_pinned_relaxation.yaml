preset: van_der_pol
parameters:
  Du:
    sample: uniform
    min: 0.04
    max: 0.11
  Dv:
    sample: uniform
    min: 0.14
    max: 0.28
  mu:
    sample: uniform
    min: 5.0
    max: 8.0
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 36.0
    max: 44.0
  outer_height:
    sample: uniform
    min: 36.0
    max: 44.0
  cutout_width:
    sample: uniform
    min: 12.0
    max: 18.0
  cutout_height:
    sample: uniform
    min: 12.0
    max: 18.0
  mesh_size:
    sample: uniform
    min: 0.23
    max: 0.32
time:
  dt: 0.0048
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 16.0
            max: 24.0
          - sample: uniform
            min: 16.0
            max: 24.0
        region_values:
          "00":
            sample: uniform
            min: 0.8
            max: 1.6
          "01":
            sample: uniform
            min: -1.6
            max: -0.7
          "10":
            sample: uniform
            min: -0.3
            max: 0.5
          "11":
            sample: uniform
            min: 0.4
            max: 1.3
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.04
          max: 0.04
        std:
          sample: uniform
          min: 0.07
          max: 0.18
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.12
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.45
              max: -0.75
  v:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.12
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.2
              max: 0.65
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 57
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4311
