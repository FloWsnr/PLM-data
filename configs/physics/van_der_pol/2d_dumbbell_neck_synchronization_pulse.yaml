preset: van_der_pol
parameters:
  center_y:
    sample: uniform
    min: 18.0
    max: 22.0
  Du:
    sample: uniform
    min: 0.18
    max: 0.32
  Dv:
    sample: uniform
    min: 0.02
    max: 0.06
  mu:
    sample: uniform
    min: 5.5
    max: 8.5
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 11.0
      max: 14.0
    - param:center_y
  right_center:
    - sample: uniform
      min: 31.0
      max: 35.0
    - param:center_y
  lobe_radius:
    sample: uniform
    min: 9.0
    max: 11.5
  neck_width:
    sample: uniform
    min: 3.8
    max: 5.8
  mesh_size:
    sample: uniform
    min: 0.22
    max: 0.3
time:
  dt: 0.0045
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.15
          max: 0.15
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 1.1
              max: 1.8
            sigma:
              sample: uniform
              min: 1.2
              max: 2.5
            aspect_ratio:
              sample: uniform
              min: 1.5
              max: 3.8
            center:
              - sample: uniform
                min: 18.0
                max: 27.0
              - sample: uniform
                min: 16.0
                max: 24.0
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: -1.3
              max: -0.45
            sigma:
              sample: uniform
              min: 1.8
              max: 3.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.3
            center:
              - sample: uniform
                min: 6.0
                max: 40.0
              - sample: uniform
                min: 13.0
                max: 27.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.03
          max: 0.03
        std:
          sample: uniform
          min: 0.08
          max: 0.18
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.12
  v:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.12
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 144]
  num_frames: 57
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4291
