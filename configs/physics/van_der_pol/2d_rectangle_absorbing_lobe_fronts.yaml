preset: van_der_pol
parameters:
  Du:
    sample: uniform
    min: 0.035
    max: 0.09
  Dv:
    sample: uniform
    min: 0.1
    max: 0.22
  mu:
    sample: uniform
    min: 4.5
    max: 7.2
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 38.0
      max: 46.0
    - sample: uniform
      min: 28.0
      max: 36.0
  mesh_resolution:
    - sample: randint
      min: 160
      max: 192
    - sample: randint
      min: 136
      max: 168
time:
  dt: 0.006
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.18
          max: 0.18
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.8
              max: 1.45
            sigma:
              sample: uniform
              min: 2.0
              max: 4.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 6.0
                max: 24.0
              - sample: uniform
                min: 6.0
                max: 28.0
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: -1.3
              max: -0.55
            sigma:
              sample: uniform
              min: 2.2
              max: 5.0
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 3.2
            center:
              - sample: uniform
                min: 18.0
                max: 40.0
              - sample: uniform
                min: 5.0
                max: 30.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.04
          max: 0.04
        std:
          sample: uniform
          min: 0.06
          max: 0.16
boundary_conditions:
  u:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 1.1
              max: 1.8
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.8
              max: -1.1
    y-:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.12
    y+:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.12
  v:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.55
              max: -0.18
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.18
              max: 0.55
    y-:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
    y+:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 61
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4211
