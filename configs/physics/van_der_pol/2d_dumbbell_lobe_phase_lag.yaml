preset: van_der_pol
parameters:
  center_y:
    sample: uniform
    min: 18.0
    max: 22.0
  Du:
    sample: uniform
    min: 0.06
    max: 0.14
  Dv:
    sample: uniform
    min: 0.08
    max: 0.18
  mu:
    sample: uniform
    min: 2.5
    max: 5.5
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 11.0
      max: 14.0
    - param:center_y
  right_center:
    - sample: uniform
      min: 30.0
      max: 34.0
    - param:center_y
  lobe_radius:
    sample: uniform
    min: 9.0
    max: 11.0
  neck_width:
    sample: uniform
    min: 5.0
    max: 7.2
  mesh_size:
    sample: uniform
    min: 0.22
    max: 0.3
time:
  dt: 0.0065
  t_end: 19.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.1
          max: 0.1
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.45
            sigma:
              sample: uniform
              min: 1.7
              max: 3.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 5.0
                max: 17.0
              - sample: uniform
                min: 13.0
                max: 27.0
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: -1.45
              max: -0.65
            sigma:
              sample: uniform
              min: 1.8
              max: 3.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 27.0
                max: 39.0
              - sample: uniform
                min: 13.0
                max: 27.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.03
          max: 0.03
        modes:
          - amplitude:
              sample: uniform
              min: 0.2
              max: 0.55
            cycles:
              - sample: uniform
                min: 0.08
                max: 0.18
              - sample: uniform
                min: 0.04
                max: 0.12
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [176, 144]
  num_frames: 59
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4281
