preset: van_der_pol
parameters:
  throat_x:
    sample: uniform
    min: 27.0
    max: 34.0
  Du:
    sample: uniform
    min: 0.08
    max: 0.18
  Dv:
    sample: uniform
    min: 0.12
    max: 0.26
  mu:
    sample: uniform
    min: 4.2
    max: 7.0
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 58.0
    max: 72.0
  height:
    sample: uniform
    min: 32.0
    max: 40.0
  throat_height:
    sample: uniform
    min: 12.0
    max: 18.0
  constriction_center_x: "param:throat_x"
  constriction_radius:
    sample: uniform
    min: 16.0
    max: 22.0
  mesh_size:
    sample: uniform
    min: 0.3
    max: 0.42
time:
  dt: 0.0055
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.12
          max: 0.12
        generators:
          - count:
              sample: randint
              min: 2
              max: 5
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.55
            sigma:
              sample: uniform
              min: 2.0
              max: 4.8
            aspect_ratio:
              sample: uniform
              min: 1.3
              max: 3.4
            center:
              - sample: uniform
                min: 22.0
                max: 42.0
              - sample: uniform
                min: 12.0
                max: 28.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.04
          max: 0.04
        std:
          sample: uniform
          min: 0.06
          max: 0.16
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.65
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.1
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.5
              max: -0.15
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.1
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 59
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4341
