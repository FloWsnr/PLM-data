preset: van_der_pol
parameters:
  domain_center_x:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_center_y:
    sample: uniform
    min: -1.0
    max: 1.0
  Du:
    sample: uniform
    min: 0.2
    max: 0.4
  Dv:
    sample: uniform
    min: 0.02
    max: 0.06
  mu:
    sample: uniform
    min: 1.5
    max: 3.5
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 4.5
    max: 7.0
  outer_radius:
    sample: uniform
    min: 17.0
    max: 21.0
  mesh_size:
    sample: uniform
    min: 0.23
    max: 0.31
time:
  dt: 0.008
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split: ["param:domain_center_x", "param:domain_center_y"]
        region_values:
          "00":
            sample: uniform
            min: -1.2
            max: -0.45
          "01":
            sample: uniform
            min: 0.5
            max: 1.3
          "10":
            sample: uniform
            min: -0.6
            max: 0.2
          "11":
            sample: uniform
            min: 0.8
            max: 1.55
  v:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: -0.08
          max: 0.08
        amplitude:
          sample: uniform
          min: 0.22
          max: 0.58
        frequency:
          sample: uniform
          min: 0.22
          max: 0.42
        center: ["param:domain_center_x", "param:domain_center_y"]
boundary_conditions:
  u:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.55
              max: -0.75
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.75
              max: 1.55
  v:
    inner:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.1
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.03
            max: 0.1
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 61
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4271
