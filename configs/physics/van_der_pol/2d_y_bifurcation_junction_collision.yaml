preset: van_der_pol
parameters:
  Du:
    sample: uniform
    min: 0.18
    max: 0.34
  Dv:
    sample: uniform
    min: 0.025
    max: 0.075
  mu:
    sample: uniform
    min: 5.5
    max: 8.5
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 26.0
    max: 34.0
  branch_length:
    sample: uniform
    min: 30.0
    max: 40.0
  branch_angle_degrees:
    sample: uniform
    min: 30.0
    max: 44.0
  channel_width:
    sample: uniform
    min: 8.0
    max: 11.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.3
time:
  dt: 0.0045
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.1
          max: 0.1
        generators:
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: 0.9
              max: 1.7
            sigma:
              sample: uniform
              min: 1.4
              max: 3.0
            aspect_ratio:
              sample: uniform
              min: 1.3
              max: 3.4
            center:
              - sample: uniform
                min: 30.0
                max: 58.0
              - sample: uniform
                min: 8.0
                max: 24.0
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: -1.6
              max: -0.75
            sigma:
              sample: uniform
              min: 1.4
              max: 3.0
            aspect_ratio:
              sample: uniform
              min: 1.3
              max: 3.4
            center:
              - sample: uniform
                min: 30.0
                max: 58.0
              - sample: uniform
                min: -24.0
                max: -8.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.04
          max: 0.04
        std:
          sample: uniform
          min: 0.07
          max: 0.18
boundary_conditions:
  u:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.85
              max: 1.55
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -1.55
              max: -0.85
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.55
              max: -0.18
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.18
              max: 0.55
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 57
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4371
