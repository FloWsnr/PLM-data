preset: van_der_pol
parameters:
  domain_center_x:
    sample: uniform
    min: -1.5
    max: 1.5
  domain_center_y:
    sample: uniform
    min: -1.5
    max: 1.5
  Du:
    sample: uniform
    min: 0.12
    max: 0.26
  Dv:
    sample: uniform
    min: 0.04
    max: 0.1
  mu:
    sample: uniform
    min: 3.4
    max: 6.2
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 17.0
    max: 22.0
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.32
time:
  dt: 0.006
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: -0.18
          max: 0.18
        amplitude:
          sample: uniform
          min: 0.8
          max: 1.4
        frequency:
          sample: uniform
          min: 0.28
          max: 0.46
        center: ["param:domain_center_x", "param:domain_center_y"]
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.55
            sigma:
              sample: uniform
              min: 2.2
              max: 4.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.3
            center:
              - sample: uniform
                min: -9.0
                max: 9.0
              - sample: uniform
                min: -9.0
                max: 9.0
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.02
            max: 0.08
  v:
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 61
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4241
