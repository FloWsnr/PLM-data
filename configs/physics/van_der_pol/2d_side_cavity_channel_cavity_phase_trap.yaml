preset: van_der_pol
parameters:
  cavity_x:
    sample: uniform
    min: 26.0
    max: 42.0
  Du:
    sample: uniform
    min: 0.06
    max: 0.14
  Dv:
    sample: uniform
    min: 0.1
    max: 0.22
  mu:
    sample: uniform
    min: 3.5
    max: 6.5
domain:
  allow_sampling: true
  type: side_cavity_channel
  length:
    sample: uniform
    min: 58.0
    max: 72.0
  height:
    sample: uniform
    min: 22.0
    max: 28.0
  cavity_width:
    sample: uniform
    min: 14.0
    max: 22.0
  cavity_depth:
    sample: uniform
    min: 12.0
    max: 20.0
  cavity_center_x: "param:cavity_x"
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.34
time:
  dt: 0.006
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.12
          max: 0.12
        generators:
          - count:
              sample: randint
              min: 2
              max: 5
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.55
            sigma:
              sample: uniform
              min: 1.8
              max: 3.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 22.0
                max: 48.0
              - sample: uniform
                min: 24.0
                max: 42.0
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: -1.25
              max: -0.55
            sigma:
              sample: uniform
              min: 2.0
              max: 4.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 8.0
                max: 54.0
              - sample: uniform
                min: 6.0
                max: 20.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.55
            cycles:
              - sample: uniform
                min: 0.06
                max: 0.16
              - sample: uniform
                min: 0.05
                max: 0.15
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha:
            sample: uniform
            min: 0.04
            max: 0.14
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 59
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
seed: 4381
