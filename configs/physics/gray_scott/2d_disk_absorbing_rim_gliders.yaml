preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.7e-05
    max: 2.5e-05
  Dv:
    sample: uniform
    min: 1.4e-05
    max: 2.9e-05
  F:
    sample: uniform
    min: 0.013
    max: 0.016
  k:
    sample: uniform
    min: 0.052
    max: 0.056
  rim_exchange:
    sample: uniform
    min: 0.2
    max: 0.55
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: -0.0016
            max: -0.0006
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: 0.0006
            max: 0.0016
domain:
  allow_sampling: true
  type: disk
  center:
    - sample: uniform
      min: -0.035
      max: 0.035
    - sample: uniform
      min: -0.035
      max: 0.035
  radius:
    sample: uniform
    min: 1.14
    max: 1.28
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
time:
  dt: 0.25
  t_end: 520.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.96
          max: 1.02
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: -0.42
              max: -0.22
            sigma:
              sample: uniform
              min: 0.055
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: -0.78
                max: 0.78
              - sample: uniform
                min: -0.78
                max: 0.78
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.0
          max: 0.012
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: 0.10
              max: 0.22
            sigma:
              sample: uniform
              min: 0.05
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: -0.78
                max: 0.78
              - sample: uniform
                min: -0.78
                max: 0.78
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 72
seed: 4290
