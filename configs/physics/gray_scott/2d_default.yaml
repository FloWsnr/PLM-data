preset: gray_scott
parameters:
  Du: 2.0e-05
  Dv: 1.0e-05
  F: 0.037
  k: 0.06
domain:
  type: rectangle
  size: [2.5, 2.5]
  mesh_resolution: [128, 128]
time:
  dt: 1.0
  t_end: 3000.0
inputs:
  u:
    initial_condition:
      type: gray_scott_patch
      params:
        background: 1.0
        patch_value: 0.5
        center: [1.25, 1.25]
        half_width: [0.2, 0.2]
  v:
    initial_condition:
      type: gray_scott_patch
      params:
        background: 0.0
        patch_value: 0.25
        center: [1.25, 1.25]
        half_width: [0.2, 0.2]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [96, 96]
  num_frames: 100
seed: 42
