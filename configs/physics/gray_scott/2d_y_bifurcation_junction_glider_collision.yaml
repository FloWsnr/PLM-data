preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.7e-05
    max: 2.5e-05
  Dv:
    sample: uniform
    min: 1.3e-05
    max: 2.8e-05
  F:
    sample: uniform
    min: 0.013
    max: 0.016
  k:
    sample: uniform
    min: 0.052
    max: 0.056
  upper_v_drive:
    sample: uniform
    min: 0.055
    max: 0.11
  lower_v_drive:
    sample: uniform
    min: 0.075
    max: 0.14
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.0012
            max: 0.0012
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.0012
            max: 0.0012
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 1.5
    max: 1.85
  branch_length:
    sample: uniform
    min: 1.8
    max: 2.35
  branch_angle_degrees:
    sample: uniform
    min: 38.0
    max: 55.0
  channel_width:
    sample: uniform
    min: 0.62
    max: 0.82
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.25
  t_end: 560.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: -0.1
              max: -0.04
            cycles: [2.0, 1.0]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
            angle:
              sample: uniform
              min: -0.3
              max: 0.5
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.04
          max: 0.085
        modes:
          - amplitude:
              sample: uniform
              min: 0.035
              max: 0.085
            cycles: [2.0, 1.0]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
            angle:
              sample: uniform
              min: -0.4
              max: 0.4
          - amplitude:
              sample: uniform
              min: -0.025
              max: 0.055
            cycles: [0.0, 2.0]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value: 1.0
    outlet_lower:
      - operator: dirichlet
        value: 1.0
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value: "param:upper_v_drive"
    outlet_lower:
      - operator: dirichlet
        value: "param:lower_v_drive"
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 72
seed: 4370
