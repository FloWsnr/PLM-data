preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.9e-05
    max: 2.8e-05
  Dv:
    sample: uniform
    min: 0.9e-05
    max: 1.6e-05
  F:
    sample: uniform
    min: 0.075
    max: 0.082
  k:
    sample: uniform
    min: 0.059
    max: 0.063
  notch_v_drive:
    sample: uniform
    min: 0.03
    max: 0.07
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.0006
            max: 0.0018
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.0012
            max: 0.0012
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 2.45
    max: 2.85
  outer_height:
    sample: uniform
    min: 2.45
    max: 2.85
  cutout_width:
    sample: uniform
    min: 0.85
    max: 1.2
  cutout_height:
    sample: uniform
    min: 0.85
    max: 1.2
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.019
time:
  dt: 0.4
  t_end: 360.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: -0.1
              max: -0.04
            cycles: [3.0, 1.0]
            phase:
              sample: uniform
              min: -0.7
              max: 0.7
            angle:
              sample: uniform
              min: -0.3
              max: 0.6
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.0
          max: 0.012
        generators:
          - count:
              sample: randint
              min: 8
              max: 12
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 0.05
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 2.0
              max: 4.8
            center:
              - sample: uniform
                min: 0.25
                max: 2.05
              - sample: uniform
                min: 0.25
                max: 2.05
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: 1.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: "param:notch_v_drive"
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 56
seed: 4310
