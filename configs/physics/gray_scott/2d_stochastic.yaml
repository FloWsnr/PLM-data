preset: gray_scott
parameters:
  Du: 2.0e-05
  Dv: 1.0e-05
  F: 0.037
  k: 0.06
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.005
      y:
        type: constant
        params:
          value: 0.0
domain:
  type: rectangle
  size: [2.5, 2.5]
  mesh_resolution: [96, 96]
time:
  dt: 1.0
  t_end: 180.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 1.0
        blobs:
          - amplitude: -0.32
            sigma: 0.14
            center: [1.0, 1.05]
          - amplitude: -0.18
            sigma: 0.11
            center: [1.55, 1.35]
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        blobs:
          - amplitude: 0.22
            sigma: 0.12
            center: [1.0, 1.05]
          - amplitude: 0.1
            sigma: 0.1
            center: [1.55, 1.35]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
stochastic:
  states:
    u:
      coupling: saturating_self
      intensity: 0.0035
      offset: 0.8
    v:
      coupling: saturating_self
      intensity: 0.0035
      offset: 0.8
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  resolution: [96, 96]
  num_frames: 36
seed: 42
