preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.8e-05
    max: 2.5e-05
  Dv:
    sample: uniform
    min: 1.8e-05
    max: 3.2e-05
  F:
    sample: uniform
    min: 0.013
    max: 0.016
  k:
    sample: uniform
    min: 0.044
    max: 0.048
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.0
      y:
        type: constant
        params:
          value: 0.0
domain:
  allow_sampling: true
  type: annulus
  center:
    - sample: uniform
      min: -0.04
      max: 0.04
    - sample: uniform
      min: -0.04
      max: 0.04
  inner_radius:
    sample: uniform
    min: 0.24
    max: 0.36
  outer_radius:
    sample: uniform
    min: 1.15
    max: 1.32
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
time:
  dt: 0.5
  t_end: 460.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.9
          max: 0.98
        amplitude:
          sample: uniform
          min: -0.08
          max: -0.035
        frequency:
          sample: uniform
          min: 2.2
          max: 3.8
        center: [0.0, 0.0]
  v:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.045
          max: 0.075
        amplitude:
          sample: uniform
          min: 0.025
          max: 0.065
        frequency:
          sample: uniform
          min: 2.4
          max: 4.2
        center: [0.0, 0.0]
boundary_conditions:
  u:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  v:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 72
seed: 4240
