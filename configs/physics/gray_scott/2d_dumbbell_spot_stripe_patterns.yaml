preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.7e-05
    max: 2.4e-05
  Dv:
    sample: uniform
    min: 0.85e-05
    max: 1.4e-05
  F:
    sample: uniform
    min: 0.036
    max: 0.040
  k:
    sample: uniform
    min: 0.058
    max: 0.062
  lobe_offset:
    sample: uniform
    min: 0.66
    max: 0.78
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.0
      y:
        type: constant
        params:
          value: 0.0
domain:
  allow_sampling: true
  type: dumbbell
  left_center: ["param:lobe_offset", 0.0]
  right_center:
    - sample: uniform
      min: 1.95
      max: 2.2
    - 0.0
  lobe_radius:
    sample: uniform
    min: 0.48
    max: 0.58
  neck_width:
    sample: uniform
    min: 0.22
    max: 0.34
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.25
  t_end: 560.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.0
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: -0.55
              max: -0.32
            sigma:
              sample: uniform
              min: 0.045
              max: 0.09
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.3
            center:
              - sample: uniform
                min: 0.25
                max: 0.9
              - sample: uniform
                min: -0.28
                max: 0.28
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: -0.48
              max: -0.26
            sigma:
              sample: uniform
              min: 0.045
              max: 0.095
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.3
            center:
              - sample: uniform
                min: 1.65
                max: 2.3
              - sample: uniform
                min: -0.28
                max: 0.28
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.045
          max: 0.075
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.10
              max: 0.22
            sigma:
              sample: uniform
              min: 0.04
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.25
                max: 0.9
              - sample: uniform
                min: -0.28
                max: 0.28
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.09
              max: 0.20
            sigma:
              sample: uniform
              min: 0.04
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 1.65
                max: 2.3
              - sample: uniform
                min: -0.28
                max: 0.28
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 64
seed: 4230
