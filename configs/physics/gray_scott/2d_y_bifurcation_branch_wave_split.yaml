preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.8e-05
    max: 2.6e-05
  Dv:
    sample: uniform
    min: 1.4e-05
    max: 2.8e-05
  F:
    sample: uniform
    min: 0.017
    max: 0.020
  k:
    sample: uniform
    min: 0.049
    max: 0.052
  inlet_v_drive:
    sample: uniform
    min: 0.04
    max: 0.09
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.001
            max: 0.0025
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.0004
            max: 0.0004
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 1.55
    max: 1.9
  branch_length:
    sample: uniform
    min: 1.75
    max: 2.25
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 49.0
  channel_width:
    sample: uniform
    min: 0.62
    max: 0.82
  mesh_size:
    sample: uniform
    min: 0.011
    max: 0.015
time:
  dt: 0.5
  t_end: 560.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.0
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: -0.28
              max: -0.12
            sigma:
              sample: uniform
              min: 0.045
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 0.22
                max: 1.85
              - sample: uniform
                min: -0.32
                max: 0.32
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.0
          max: 0.012
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.17
            sigma:
              sample: uniform
              min: 0.05
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 0.22
                max: 1.85
              - sample: uniform
                min: -0.32
                max: 0.32
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value: 1.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 1.0
  v:
    inlet:
      - operator: dirichlet
        value: "param:inlet_v_drive"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 72
seed: 4360
