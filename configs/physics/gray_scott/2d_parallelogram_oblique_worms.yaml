preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.9e-05
    max: 2.8e-05
  Dv:
    sample: uniform
    min: 0.9e-05
    max: 1.6e-05
  F:
    sample: uniform
    min: 0.014
    max: 0.018
  k:
    sample: uniform
    min: 0.050
    max: 0.054
  axis_x_length:
    sample: uniform
    min: 2.3
    max: 2.65
  axis_y_x:
    sample: uniform
    min: 0.45
    max: 0.82
  axis_y_y:
    sample: uniform
    min: 2.2
    max: 2.6
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.0014
            max: 0.0014
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.0012
            max: 0.003
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: ["param:axis_x_length", 0.0]
  axis_y: ["param:axis_y_x", "param:axis_y_y"]
  mesh_resolution: [144, 144]
time:
  dt: 0.4
  t_end: 520.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.94
          max: 1.02
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: -0.28
              max: -0.11
            sigma:
              sample: uniform
              min: 0.035
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 2.0
              max: 5.0
            center:
              - sample: uniform
                min: 0.35
                max: 2.2
              - sample: uniform
                min: 0.35
                max: 2.2
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.0
          max: 0.012
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.22
            sigma:
              sample: uniform
              min: 0.05
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 2.0
              max: 5.0
            center:
              - sample: uniform
                min: 0.35
                max: 2.2
              - sample: uniform
                min: 0.35
                max: 2.2
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [144, 144]
  num_frames: 56
seed: 4270
