preset: gray_scott
parameters:
  Du: 2.0e-05
  Dv: 1.0e-05
  F: 0.037
  k: 0.06
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.01
      y:
        type: constant
        params:
          value: 0.0
      z:
        type: constant
        params:
          value: 0.005
domain:
  type: box
  size: [2.5, 2.5, 2.5]
  mesh_resolution: [18, 18, 18]
time:
  dt: 1.0
  t_end: 120.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 1.0
        blobs:
          - amplitude:
              sample: uniform
              min: -0.34
              max: -0.24
            sigma:
              sample: uniform
              min: 0.16
              max: 0.24
            center:
              - sample: uniform
                min: 0.85
                max: 1.2
              - sample: uniform
                min: 0.85
                max: 1.65
              - sample: uniform
                min: 0.85
                max: 1.65
          - amplitude:
              sample: uniform
              min: -0.22
              max: -0.14
            sigma:
              sample: uniform
              min: 0.12
              max: 0.2
            center:
              - sample: uniform
                min: 1.3
                max: 1.7
              - sample: uniform
                min: 0.85
                max: 1.65
              - sample: uniform
                min: 0.85
                max: 1.65
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        blobs:
          - amplitude:
              sample: uniform
              min: 0.14
              max: 0.22
            sigma:
              sample: uniform
              min: 0.15
              max: 0.22
            center:
              - sample: uniform
                min: 0.9
                max: 1.2
              - sample: uniform
                min: 0.9
                max: 1.6
              - sample: uniform
                min: 0.9
                max: 1.6
          - amplitude:
              sample: uniform
              min: 0.07
              max: 0.13
            sigma:
              sample: uniform
              min: 0.12
              max: 0.18
            center:
              - sample: uniform
                min: 1.3
                max: 1.7
              - sample: uniform
                min: 0.9
                max: 1.6
              - sample: uniform
                min: 0.9
                max: 1.6
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
  v:
    $ref: boundary_field.scalar.full_periodic_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  resolution: [18, 18, 18]
  num_frames: 12
seed: 42
