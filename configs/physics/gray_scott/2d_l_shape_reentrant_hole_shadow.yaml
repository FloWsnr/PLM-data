preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.7e-05
    max: 2.4e-05
  Dv:
    sample: uniform
    min: 0.85e-05
    max: 1.45e-05
  F:
    sample: uniform
    min: 0.038
    max: 0.041
  k:
    sample: uniform
    min: 0.056
    max: 0.060
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.0
      y:
        type: constant
        params:
          value: 0.0
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 2.55
    max: 2.95
  outer_height:
    sample: uniform
    min: 2.55
    max: 2.95
  cutout_width:
    sample: uniform
    min: 0.75
    max: 1.1
  cutout_height:
    sample: uniform
    min: 0.75
    max: 1.1
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.019
time:
  dt: 0.5
  t_end: 700.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.95
          max: 1.02
        generators:
          - count:
              sample: randint
              min: 5
              max: 8
            amplitude:
              sample: uniform
              min: -0.3
              max: -0.12
            sigma:
              sample: uniform
              min: 0.04
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 0.28
                max: 2.15
              - sample: uniform
                min: 0.28
                max: 2.15
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.04
          max: 0.085
        modes:
          - amplitude:
              sample: uniform
              min: 0.055
              max: 0.12
            cycles: [2.0, 1.0]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
            angle:
              sample: uniform
              min: 0.2
              max: 0.9
          - amplitude:
              sample: uniform
              min: -0.025
              max: 0.075
            cycles: [0.0, 3.0]
            phase:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: 1.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 60
seed: 4300
