preset: gray_scott
parameters:
  Du: 2.0e-05
  Dv: 1.0e-05
  F: 0.037
  k: 0.06
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.01
      y:
        type: constant
        params:
          value: 0.0
domain:
  type: rectangle
  size:
  - 2.5
  - 2.5
  mesh_resolution:
  - 128
  - 128
time:
  dt: 1.0
  t_end: 400.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 1.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: -0.36
            max: -0.26
          sigma:
            sample: uniform
            min: 0.11
            max: 0.18
          center:
          - sample: uniform
            min: 0.85
            max: 1.15
          - sample: uniform
            min: 0.85
            max: 1.65
        - count: 1
          amplitude:
            sample: uniform
            min: -0.24
            max: -0.16
          sigma:
            sample: uniform
            min: 0.08
            max: 0.14
          center:
          - sample: uniform
            min: 1.35
            max: 1.75
          - sample: uniform
            min: 0.85
            max: 1.65
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.16
            max: 0.24
          sigma:
            sample: uniform
            min: 0.1
            max: 0.16
          center:
          - sample: uniform
            min: 0.9
            max: 1.2
          - sample: uniform
            min: 0.9
            max: 1.6
        - count: 1
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.14
          sigma:
            sample: uniform
            min: 0.08
            max: 0.14
          center:
          - sample: uniform
            min: 1.3
            max: 1.7
          - sample: uniform
            min: 0.9
            max: 1.6
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  resolution:
  - 96
  - 96
  num_frames: 40
seed: 42
