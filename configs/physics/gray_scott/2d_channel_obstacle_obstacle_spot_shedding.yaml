preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.7e-05
    max: 2.4e-05
  Dv:
    sample: uniform
    min: 0.85e-05
    max: 1.45e-05
  F:
    sample: uniform
    min: 0.029
    max: 0.033
  k:
    sample: uniform
    min: 0.060
    max: 0.064
  obstacle_v_drive:
    sample: uniform
    min: 0.08
    max: 0.16
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.0012
            max: 0.0028
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.0008
            max: 0.0008
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 4.0
    max: 4.6
  height:
    sample: uniform
    min: 2.25
    max: 2.65
  obstacle_center:
    - sample: uniform
      min: 1.55
      max: 2.25
    - sample: uniform
      min: 0.85
      max: 1.75
  obstacle_radius:
    sample: uniform
    min: 0.24
    max: 0.36
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.02
time:
  dt: 0.5
  t_end: 520.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.96
          max: 1.02
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: -0.46
              max: -0.24
            sigma:
              sample: uniform
              min: 0.06
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 0.45
                max: 3.6
              - sample: uniform
                min: 0.45
                max: 2.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.0
          max: 0.012
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: 0.11
              max: 0.23
            sigma:
              sample: uniform
              min: 0.055
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 0.45
                max: 3.6
              - sample: uniform
                min: 0.45
                max: 2.0
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value: 1.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value: 0.92
  v:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value: "param:obstacle_v_drive"
solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 64
seed: 4350
