preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.6e-05
    max: 2.3e-05
  Dv:
    sample: uniform
    min: 0.8e-05
    max: 1.35e-05
  F:
    sample: uniform
    min: 0.014
    max: 0.018
  k:
    sample: uniform
    min: 0.050
    max: 0.054
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.0
      y:
        type: constant
        params:
          value: 0.0
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 1.16
    max: 1.32
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
time:
  dt: 0.5
  t_end: 650.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.92
          max: 1.0
        amplitude:
          sample: uniform
          min: -0.12
          max: -0.055
        frequency:
          sample: uniform
          min: 2.6
          max: 4.2
        center: ["param:domain_center_x", "param:domain_center_y"]
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.006
          max: 0.02
        generators:
          - count:
              sample: randint
              min: 5
              max: 8
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.22
            sigma:
              sample: uniform
              min: 0.05
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: -0.8
                max: 0.8
              - sample: uniform
                min: -0.8
                max: 0.8
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 72
seed: 4280
