preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.6e-05
    max: 2.4e-05
  Dv:
    sample: uniform
    min: 1.2e-05
    max: 2.6e-05
  F:
    sample: uniform
    min: 0.012
    max: 0.016
  k:
    sample: uniform
    min: 0.047
    max: 0.051
  dumbbell_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.0
      y:
        type: constant
        params:
          value: 0.0
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -0.82
      max: -0.68
    - "param:dumbbell_center_y"
  right_center:
    - sample: uniform
      min: 0.68
      max: 0.82
    - "param:dumbbell_center_y"
  lobe_radius:
    sample: uniform
    min: 0.5
    max: 0.62
  neck_width:
    sample: uniform
    min: 0.16
    max: 0.26
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.25
  t_end: 480.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.96
          max: 1.02
        generators:
          - count:
              sample: randint
              min: 2
              max: 3
            amplitude:
              sample: uniform
              min: -0.34
              max: -0.16
            sigma:
              sample: uniform
              min: 0.045
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 3.2
            center:
              - sample: uniform
                min: -0.95
                max: -0.35
              - sample: uniform
                min: -0.24
                max: 0.24
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: -0.24
              max: -0.1
            sigma:
              sample: uniform
              min: 0.04
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 0.35
                max: 0.95
              - sample: uniform
                min: -0.24
                max: 0.24
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.0
          max: 0.008
        generators:
          - count:
              sample: randint
              min: 2
              max: 3
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.17
            sigma:
              sample: uniform
              min: 0.04
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 3.0
            center:
              - sample: uniform
                min: -0.95
                max: -0.35
              - sample: uniform
                min: -0.24
                max: 0.24
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: 0.06
              max: 0.14
            sigma:
              sample: uniform
              min: 0.035
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 0.35
                max: 0.95
              - sample: uniform
                min: -0.24
                max: 0.24
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 72
seed: 4250
