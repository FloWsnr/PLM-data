preset: gray_scott
parameters:
  Du:
    sample: uniform
    min: 1.7e-05
    max: 2.4e-05
  Dv:
    sample: uniform
    min: 0.85e-05
    max: 1.4e-05
  F:
    sample: uniform
    min: 0.036
    max: 0.039
  k:
    sample: uniform
    min: 0.058
    max: 0.061
  axis_x_length:
    sample: uniform
    min: 2.45
    max: 2.85
  axis_y_x:
    sample: uniform
    min: 0.25
    max: 0.58
  axis_y_y:
    sample: uniform
    min: 2.35
    max: 2.75
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.0
      y:
        type: constant
        params:
          value: 0.0
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: ["param:axis_x_length", 0.0]
  axis_y: ["param:axis_y_x", "param:axis_y_y"]
  mesh_resolution: [144, 144]
time:
  dt: 0.5
  t_end: 700.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.92
          max: 1.0
        modes:
          - amplitude:
              sample: uniform
              min: -0.11
              max: -0.045
            cycles: [2.0, 1.0]
            phase:
              sample: uniform
              min: -1.0
              max: 1.0
            angle:
              sample: uniform
              min: -0.4
              max: 0.4
          - amplitude:
              sample: uniform
              min: -0.06
              max: 0.02
            cycles: [1.0, 3.0]
            phase:
              sample: uniform
              min: -1.0
              max: 1.0
            angle:
              sample: uniform
              min: 0.2
              max: 0.8
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.0
          max: 0.012
        generators:
          - count:
              sample: randint
              min: 5
              max: 8
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.055
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 0.35
                max: 2.2
              - sample: uniform
                min: 0.35
                max: 2.2
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [144, 144]
  num_frames: 60
seed: 4260
