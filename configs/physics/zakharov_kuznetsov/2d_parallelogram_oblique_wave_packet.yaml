preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 3.4
    max: 5.4
  theta:
    sample: uniform
    min: 0.58
    max: 0.72
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
  - sample: uniform
    min: 14.0
    max: 16.5
  - 0.0
  axis_y:
  - sample: uniform
    min: -4.0
    max: -2.0
  - sample: uniform
    min: 10.0
    max: 12.0
  mesh_resolution: [176, 128]
time:
  dt: 0.004
  t_end: 1.8
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude:
          sample: uniform
          min: 0.42
          max: 0.72
        sigma:
          sample: uniform
          min: 0.8
          max: 1.25
        center:
        - sample: uniform
          min: 4.0
          max: 6.4
        - sample: uniform
          min: 3.5
          max: 8.2
        wavevector:
        - sample: uniform
          min: 2.2
          max: 4.2
        - sample: uniform
          min: -2.6
          max: 2.6
        phase:
          sample: uniform
          min: 0.0
          max: 6.283
boundary_conditions:
  u:
    x-:
    - operator: periodic
      pair_with: x+
    x+:
    - operator: periodic
      pair_with: x-
    y-:
    - operator: neumann
      value: 0.0
    y+:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [176, 128]
  num_frames: 45
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 45

