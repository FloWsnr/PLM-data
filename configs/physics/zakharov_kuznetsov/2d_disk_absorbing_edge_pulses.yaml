preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 4.8
    max: 7.4
  theta:
    sample: uniform
    min: 0.6
    max: 0.78
domain:
  allow_sampling: true
  type: disk
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 5.8
    max: 6.5
  mesh_size:
    sample: uniform
    min: 0.084
    max: 0.096
time:
  dt: 0.0035
  t_end: 1.5
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 2
            max: 3
          amplitude:
            sample: uniform
            min: 0.42
            max: 0.82
          sigma:
            sample: uniform
            min: 0.32
            max: 0.58
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.8
          center:
          - sample: uniform
            min: -2.6
            max: 1.2
          - sample: uniform
            min: -2.8
            max: 2.8
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [160, 160]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 47
