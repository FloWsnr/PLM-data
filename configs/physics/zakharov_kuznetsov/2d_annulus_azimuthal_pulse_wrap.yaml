preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 3.0
    max: 5.0
  theta:
    sample: uniform
    min: 0.56
    max: 0.72
domain:
  allow_sampling: true
  type: annulus
  center:
  - sample: uniform
    min: -0.15
    max: 0.15
  - sample: uniform
    min: -0.15
    max: 0.15
  inner_radius:
    sample: uniform
    min: 1.35
    max: 1.75
  outer_radius:
    sample: uniform
    min: 5.8
    max: 6.6
  mesh_size:
    sample: uniform
    min: 0.084
    max: 0.096
time:
  dt: 0.002
  t_end: 1.8
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.42
            max: 0.72
          sigma:
            sample: uniform
            min: 0.45
            max: 0.75
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 2.8
          center:
          - sample: uniform
            min: -4.4
            max: -3.1
          - sample: uniform
            min: -1.2
            max: 1.2
        - count: 1
          amplitude:
            sample: uniform
            min: 0.18
            max: 0.38
          sigma:
            sample: uniform
            min: 0.42
            max: 0.72
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.1
          center:
          - sample: uniform
            min: 2.9
            max: 4.4
          - sample: uniform
            min: -2.5
            max: 2.5
boundary_conditions:
  u:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [160, 160]
  num_frames: 45
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 48
