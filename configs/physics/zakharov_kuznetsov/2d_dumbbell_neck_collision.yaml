preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 2.6
    max: 4.4
  theta:
    sample: uniform
    min: 0.64
    max: 0.82
domain:
  allow_sampling: true
  type: dumbbell
  left_center: [-5.2, 0.0]
  right_center: [5.2, 0.0]
  lobe_radius:
    sample: uniform
    min: 3.0
    max: 3.45
  neck_width:
    sample: uniform
    min: 1.55
    max: 2.15
  mesh_size:
    sample: uniform
    min: 0.082
    max: 0.094
time:
  dt: 0.003
  t_end: 1.35
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.015
          max: 0.015
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.48
            max: 0.78
          sigma:
            sample: uniform
            min: 0.28
            max: 0.48
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 3.0
          center:
          - sample: uniform
            min: -2.8
            max: -1.0
          - sample: uniform
            min: -0.5
            max: 0.5
        - count: 1
          amplitude:
            sample: uniform
            min: -0.5
            max: -0.22
          sigma:
            sample: uniform
            min: 0.3
            max: 0.5
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.4
          center:
          - sample: uniform
            min: 1.0
            max: 2.8
          - sample: uniform
            min: -0.55
            max: 0.55
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [192, 128]
  num_frames: 39
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 51
