preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 5.4
    max: 7.2
  theta:
    sample: uniform
    min: 0.5
    max: 0.58
domain:
  allow_sampling: true
  type: rectangle
  size:
  - sample: uniform
    min: 11.5
    max: 13.5
  - sample: uniform
    min: 10.5
    max: 12.5
  mesh_resolution: [144, 144]
time:
  dt: 0.006
  t_end: 2.4
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.7
            max: 1.15
          sigma:
            sample: uniform
            min: 0.42
            max: 0.65
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.35
          center:
          - sample: uniform
            min: 2.0
            max: 4.0
          - sample: uniform
            min: 4.0
            max: 8.0
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.22
            max: 0.48
          sigma:
            sample: uniform
            min: 0.32
            max: 0.55
          aspect_ratio:
            sample: uniform
            min: 1.1
            max: 2.6
          center:
          - sample: uniform
            min: 6.0
            max: 10.0
          - sample: uniform
            min: 2.8
            max: 9.2
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [144, 144]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
