preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 2.0
    max: 3.8
  theta:
    sample: uniform
    min: 0.66
    max: 0.84
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 12.5
    max: 14.5
  height:
    sample: uniform
    min: 5.4
    max: 6.4
  obstacle_center:
  - sample: uniform
    min: 6.0
    max: 7.3
  - sample: uniform
    min: 2.5
    max: 3.5
  obstacle_radius:
    sample: uniform
    min: 0.7
    max: 1.0
  mesh_size:
    sample: uniform
    min: 0.043
    max: 0.052
time:
  dt: 0.0018
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.28
            max: 0.52
          sigma:
            sample: uniform
            min: 0.34
            max: 0.62
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.5
          center:
          - sample: uniform
            min: 2.2
            max: 4.0
          - sample: uniform
            min: 2.0
            max: 4.6
        - count: 1
          amplitude:
            sample: uniform
            min: -0.28
            max: -0.12
          sigma:
            sample: uniform
            min: 0.32
            max: 0.58
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.5
          center:
          - sample: uniform
            min: 7.8
            max: 10.2
          - sample: uniform
            min: 2.0
            max: 4.6
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: dirichlet
      value: 0.0
    obstacle:
    - operator: dirichlet
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [224, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 55
