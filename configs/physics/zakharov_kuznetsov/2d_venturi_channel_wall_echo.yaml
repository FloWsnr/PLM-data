preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 2.8
    max: 5.2
  theta:
    sample: uniform
    min: 0.66
    max: 0.84
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 12.0
    max: 14.0
  height:
    sample: uniform
    min: 5.4
    max: 6.4
  throat_height:
    sample: uniform
    min: 2.3
    max: 3.1
  constriction_center_x:
    sample: uniform
    min: 5.6
    max: 7.0
  constriction_radius:
    sample: uniform
    min: 2.5
    max: 3.4
  mesh_size:
    sample: uniform
    min: 0.042
    max: 0.052
time:
  dt: 0.0025
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        modes:
        - amplitude:
            sample: uniform
            min: 0.2
            max: 0.38
          cycles:
          - sample: uniform
            min: 0.42
            max: 0.68
          - sample: uniform
            min: 0.42
            max: 0.72
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: -0.3
            max: 0.3
        - amplitude:
            sample: uniform
            min: -0.22
            max: 0.22
          cycles:
          - sample: uniform
            min: 0.75
            max: 1.05
          - sample: uniform
            min: 0.2
            max: 0.42
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: 0.5
            max: 1.0
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: dirichlet
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [224, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 59
