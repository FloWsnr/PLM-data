preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 4.6
    max: 7.2
  theta:
    sample: uniform
    min: 0.58
    max: 0.76
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 13.0
    max: 15.0
  height:
    sample: uniform
    min: 5.6
    max: 6.5
  obstacle_center:
  - sample: uniform
    min: 5.7
    max: 7.2
  - sample: uniform
    min: 2.6
    max: 3.5
  obstacle_radius:
    sample: uniform
    min: 0.62
    max: 0.9
  mesh_size:
    sample: uniform
    min: 0.043
    max: 0.052
time:
  dt: 0.0025
  t_end: 1.1
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.62
            max: 0.95
          sigma:
            sample: uniform
            min: 0.28
            max: 0.48
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.6
          center:
          - sample: uniform
            min: 1.6
            max: 3.0
          - sample: uniform
            min: 2.1
            max: 4.4
        - count: 1
          amplitude:
            sample: uniform
            min: 0.2
            max: 0.45
          sigma:
            sample: uniform
            min: 0.24
            max: 0.42
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 2.8
          center:
          - sample: uniform
            min: 3.5
            max: 5.0
          - sample: uniform
            min: 1.2
            max: 5.0
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [224, 128]
  num_frames: 39
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 54

