preset: zakharov_kuznetsov
parameters:
  alpha: 6.0
  theta: 0.5
domain:
  type: box
  size: [20.0, 20.0, 20.0]
  mesh_resolution: [20, 20, 20]
time:
  $ref: time.zk_default
inputs:
  u:
    initial_condition:
      type: gaussian_bump
      params:
        amplitude: 1.0
        sigma: 3.0
        center: [10.0, 10.0, 10.0]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
output:
  formats:
    $ref: output.formats.numpy
  fields:
    u:
      $ref: output.mode.scalar
  resolution: [16, 16, 16]
  num_frames: 5
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
