preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 3.8
    max: 6.2
  theta:
    sample: uniform
    min: 0.6
    max: 0.78
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 12.5
    max: 14.5
  height:
    sample: uniform
    min: 7.0
    max: 8.2
  holes:
  - center:
    - sample: uniform
      min: 3.0
      max: 3.8
    - sample: uniform
      min: 3.2
      max: 4.6
    radius:
      sample: uniform
      min: 0.45
      max: 0.68
  - center:
    - sample: uniform
      min: 6.0
      max: 7.2
    - sample: uniform
      min: 3.2
      max: 4.6
    radius:
      sample: uniform
      min: 0.45
      max: 0.68
  - center:
    - sample: uniform
      min: 9.2
      max: 10.4
    - sample: uniform
      min: 3.2
      max: 4.6
    radius:
      sample: uniform
      min: 0.45
      max: 0.68
  mesh_size:
    sample: uniform
    min: 0.052
    max: 0.064
time:
  dt: 0.0028
  t_end: 1.15
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 2
            max: 3
          amplitude:
            sample: uniform
            min: 0.35
            max: 0.78
          sigma:
            sample: uniform
            min: 0.24
            max: 0.44
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 2.8
          center:
          - sample: uniform
            min: 1.2
            max: 4.4
          - sample: uniform
            min: 1.2
            max: 6.8
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    holes:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [192, 144]
  num_frames: 39
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 56

