preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 3.2
    max: 5.4
  theta:
    sample: uniform
    min: 0.62
    max: 0.8
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 1.6
    max: 2.2
  outer_radius:
    sample: uniform
    min: 6.1
    max: 6.8
  mesh_size:
    sample: uniform
    min: 0.088
    max: 0.1
time:
  dt: 0.0035
  t_end: 1.6
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.22
            max: 0.42
          cycles:
          - sample: uniform
            min: 0.36
            max: 0.62
          - sample: uniform
            min: 0.34
            max: 0.58
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: -0.7
            max: 0.7
        - amplitude:
            sample: uniform
            min: -0.28
            max: 0.28
          cycles:
          - sample: uniform
            min: 0.65
            max: 0.95
          - sample: uniform
            min: 0.16
            max: 0.32
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: 0.8
            max: 1.35
boundary_conditions:
  u:
    inner:
    - operator: dirichlet
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [160, 160]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 49

