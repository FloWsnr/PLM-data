preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 2.4
    max: 4.2
  theta:
    sample: uniform
    min: 0.66
    max: 0.84
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 10.0
    max: 11.6
  outer_height:
    sample: uniform
    min: 10.0
    max: 11.6
  cutout_width:
    sample: uniform
    min: 3.8
    max: 5.0
  cutout_height:
    sample: uniform
    min: 3.8
    max: 5.0
  mesh_size:
    sample: uniform
    min: 0.074
    max: 0.086
time:
  dt: 0.003
  t_end: 1.35
inputs:
  u:
    initial_condition:
      type: gaussian_wave_packet
      params:
        amplitude:
          sample: uniform
          min: 0.38
          max: 0.7
        sigma:
          sample: uniform
          min: 0.65
          max: 1.0
        center:
        - sample: uniform
          min: 1.6
          max: 3.8
        - sample: uniform
          min: 5.0
          max: 8.4
        wavevector:
        - sample: uniform
          min: 1.8
          max: 3.6
        - sample: uniform
          min: -3.0
          max: 0.8
        phase:
          sample: uniform
          min: 0.0
          max: 6.283
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [160, 160]
  num_frames: 39
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 53

