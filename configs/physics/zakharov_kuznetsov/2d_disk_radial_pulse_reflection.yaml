preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 2.0
    max: 3.8
  theta:
    sample: uniform
    min: 0.58
    max: 0.74
domain:
  allow_sampling: true
  type: disk
  center:
  - sample: uniform
    min: -0.25
    max: 0.25
  - sample: uniform
    min: -0.25
    max: 0.25
  radius:
    sample: uniform
    min: 5.7
    max: 6.4
  mesh_size:
    sample: uniform
    min: 0.086
    max: 0.096
time:
  dt: 0.0018
  t_end: 1.8
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: -0.04
          max: 0.04
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.26
        frequency:
          sample: uniform
          min: 0.55
          max: 0.95
        center:
        - sample: uniform
          min: -0.7
          max: 0.7
        - sample: uniform
          min: -0.7
          max: 0.7
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [160, 160]
  num_frames: 45
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 46
