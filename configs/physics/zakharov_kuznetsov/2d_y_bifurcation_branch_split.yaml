preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 3.0
    max: 5.0
  theta:
    sample: uniform
    min: 0.6
    max: 0.78
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 4.8
    max: 5.8
  branch_length:
    sample: uniform
    min: 5.6
    max: 6.8
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 1.05
    max: 1.32
  mesh_size:
    sample: uniform
    min: 0.042
    max: 0.052
time:
  dt: 0.0018
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.45
            max: 0.75
          sigma:
            sample: uniform
            min: 0.32
            max: 0.56
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: 1.3
            max: 2.7
          - sample: uniform
            min: -0.35
            max: 0.35
        - count: 1
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.32
          sigma:
            sample: uniform
            min: 0.3
            max: 0.52
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 2.8
          center:
          - sample: uniform
            min: 3.4
            max: 4.8
          - sample: uniform
            min: -0.38
            max: 0.38
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: neumann
      value: 0.0
    outlet_lower:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [192, 144]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 60
