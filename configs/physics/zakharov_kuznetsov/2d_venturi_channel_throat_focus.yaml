preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 4.4
    max: 7.0
  theta:
    sample: uniform
    min: 0.58
    max: 0.76
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 12.5
    max: 14.5
  height:
    sample: uniform
    min: 5.4
    max: 6.4
  throat_height:
    sample: uniform
    min: 2.1
    max: 2.8
  constriction_center_x:
    sample: uniform
    min: 5.8
    max: 7.2
  constriction_radius:
    sample: uniform
    min: 2.4
    max: 3.2
  mesh_size:
    sample: uniform
    min: 0.042
    max: 0.052
time:
  dt: 0.0025
  t_end: 1.05
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.62
            max: 1.0
          sigma:
            sample: uniform
            min: 0.28
            max: 0.5
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: 1.4
            max: 3.2
          - sample: uniform
            min: 2.0
            max: 4.6
        - count: 1
          amplitude:
            sample: uniform
            min: -0.22
            max: 0.18
          sigma:
            sample: uniform
            min: 0.24
            max: 0.42
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 2.8
          center:
          - sample: uniform
            min: 4.2
            max: 5.6
          - sample: uniform
            min: 1.2
            max: 5.2
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [224, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 58

