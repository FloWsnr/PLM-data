preset: zakharov_kuznetsov
parameters:
  alpha:
    sample: uniform
    min: 4.6
    max: 7.0
  theta:
    sample: uniform
    min: 0.58
    max: 0.74
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -5.6
    max: -5.0
  - 0.0
  right_center:
  - sample: uniform
    min: 5.0
    max: 5.6
  - 0.0
  lobe_radius:
    sample: uniform
    min: 3.1
    max: 3.6
  neck_width:
    sample: uniform
    min: 1.35
    max: 1.85
  mesh_size:
    sample: uniform
    min: 0.082
    max: 0.096
time:
  dt: 0.0035
  t_end: 1.6
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.72
            max: 1.05
          sigma:
            sample: uniform
            min: 0.35
            max: 0.58
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 1.8
          center:
          - sample: uniform
            min: -5.8
            max: -3.8
          - sample: uniform
            min: -1.4
            max: 1.4
        - count: 1
          amplitude:
            sample: uniform
            min: 0.18
            max: 0.42
          sigma:
            sample: uniform
            min: 0.3
            max: 0.52
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 2.6
          center:
          - sample: uniform
            min: -1.2
            max: 1.2
          - sample: uniform
            min: -0.55
            max: 0.55
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
output:
  formats: [numpy, gif]
  fields:
    u: scalar
  resolution: [192, 128]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 50

