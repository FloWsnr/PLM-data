preset: zakharov_kuznetsov
parameters:
  alpha: 6.0
  theta: 0.5
domain:
  type: box
  size:
  - 20.0
  - 20.0
  - 20.0
  mesh_resolution:
  - 20
  - 20
  - 20
time:
  $ref: time.zk_default
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 2.4
            max: 3.6
          center:
          - sample: uniform
            min: 5.5
            max: 14.5
          - sample: uniform
            min: 5.5
            max: 14.5
          - sample: uniform
            min: 5.5
            max: 14.5
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
output:
  formats:
    $ref: output.formats.standard
  fields:
    u:
      $ref: output.mode.scalar
  resolution:
  - 16
  - 16
  - 16
  num_frames: 5
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
