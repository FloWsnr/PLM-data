preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 0.82
    max: 1.22
  a:
    sample: uniform
    min: 2.0
    max: 2.35
  b:
    sample: uniform
    min: 3.45
    max: 4.65
  dumbbell_center_y:
    sample: uniform
    min: -0.8
    max: 0.8
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - 0.0
  - param:dumbbell_center_y
  right_center:
  - sample: uniform
    min: 18.0
    max: 23.0
  - param:dumbbell_center_y
  lobe_radius:
    sample: uniform
    min: 8.5
    max: 10.8
  neck_width:
    sample: uniform
    min: 2.7
    max: 4.4
  mesh_size:
    sample: uniform
    min: 0.18
    max: 0.24
time:
  dt: 0.028
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.95
          max: 2.25
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.28
          sigma:
            sample: uniform
            min: 1.0
            max: 1.8
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.4
          center:
          - sample: uniform
            min: -6.5
            max: 4.0
          - sample: uniform
            min: -5.5
            max: 5.5
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: -0.1
            max: 0.18
          sigma:
            sample: uniform
            min: 1.0
            max: 2.0
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.4
          center:
          - sample: uniform
            min: 14.0
            max: 26.0
          - sample: uniform
            min: -5.5
            max: 5.5
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.55
          max: 2.05
        std:
          sample: uniform
          min: 0.03
          max: 0.07
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
  v:
    outer:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 144
  num_frames: 73
seed: 4280
