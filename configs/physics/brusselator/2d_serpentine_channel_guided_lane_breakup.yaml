preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 0.82
    max: 1.22
  a:
    sample: uniform
    min: 2.0
    max: 2.35
  b:
    sample: uniform
    min: 3.45
    max: 4.65
  u_inlet_value:
    sample: uniform
    min: 2.05
    max: 2.35
  v_inlet_value:
    sample: uniform
    min: 1.72
    max: 2.15
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 17.0
    max: 22.0
  lane_spacing:
    sample: uniform
    min: 4.6
    max: 6.2
  n_bends:
    sample: randint
    min: 3
    max: 4
  channel_width:
    sample: uniform
    min: 3.0
    max: 4.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.17
time:
  dt: 0.028
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.92
          max: 2.16
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.17
          cycles:
          - 2.0
          - 0.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.12
          cycles:
          - 0.0
          - 2.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.55
          max: 1.95
        std:
          sample: uniform
          min: 0.03
          max: 0.07
boundary_conditions:
  u:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_inlet_value
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  v:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_inlet_value
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 160
  num_frames: 73
seed: 4380
