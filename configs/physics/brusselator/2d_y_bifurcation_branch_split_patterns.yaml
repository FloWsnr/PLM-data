preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.11
    max: 0.16
  Dv:
    sample: uniform
    min: 1.05
    max: 1.45
  a:
    sample: uniform
    min: 2.0
    max: 2.25
  b:
    sample: uniform
    min: 3.6
    max: 4.4
  u_inlet_value:
    sample: uniform
    min: 2.02
    max: 2.25
  v_inlet_value:
    sample: uniform
    min: 1.62
    max: 1.92
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 10.0
    max: 13.0
  branch_length:
    sample: uniform
    min: 13.0
    max: 17.0
  branch_angle_degrees:
    sample: uniform
    min: 35.0
    max: 50.0
  channel_width:
    sample: uniform
    min: 3.8
    max: 5.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.17
time:
  dt: 0.02
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.95
          max: 2.12
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.05
            max: 0.16
          sigma:
            sample: uniform
            min: 0.8
            max: 1.5
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.3
          center:
          - sample: uniform
            min: 1.0
            max: 11.0
          - sample: uniform
            min: -2.0
            max: 2.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.55
          max: 1.85
        std:
          sample: uniform
          min: 0.03
          max: 0.07
boundary_conditions:
  u:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_inlet_value
    outlet_upper:
    - operator: neumann
      value: 0.0
    outlet_lower:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  v:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_inlet_value
    outlet_upper:
    - operator: neumann
      value: 0.0
    outlet_lower:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 160
  num_frames: 73
seed: 4360
