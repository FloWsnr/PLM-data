preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.1
    max: 0.14
  Dv:
    sample: uniform
    min: 1.05
    max: 1.35
  a:
    sample: uniform
    min: 1.95
    max: 2.15
  b:
    sample: uniform
    min: 3.25
    max: 3.85
  domain_size_x:
    sample: uniform
    min: 24.0
    max: 31.0
  domain_size_y:
    sample: uniform
    min: 18.0
    max: 24.0
  u_left_value:
    sample: uniform
    min: 1.85
    max: 2.05
  u_right_value:
    sample: uniform
    min: 2.0
    max: 2.22
  v_left_value:
    sample: uniform
    min: 1.48
    max: 1.75
  v_right_value:
    sample: uniform
    min: 1.62
    max: 1.92
  wall_exchange:
    sample: uniform
    min: 0.005
    max: 0.02
domain:
  allow_sampling: true
  type: rectangle
  size:
  - param:domain_size_x
  - param:domain_size_y
  mesh_resolution:
  - 160
  - 128
time:
  dt: 0.02
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.9
          max: 2.08
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: 0.05
            max: 0.16
          sigma:
            sample: uniform
            min: 1.0
            max: 2.0
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.4
          center:
          - sample: uniform
            min: 3.0
            max: 27.0
          - sample: uniform
            min: 2.5
            max: 21.5
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.55
          max: 1.85
        modes:
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.1
          cycles:
          - 1.0
          - 0.0
          phase:
            sample: uniform
            min: -0.7
            max: 0.7
        - amplitude:
            sample: uniform
            min: 0.03
            max: 0.08
          cycles:
          - 0.0
          - 2.0
          phase:
            sample: uniform
            min: -0.7
            max: 0.7
boundary_conditions:
  u:
    x-:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_left_value
    x+:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_right_value
    y-:
    - operator: robin
      value:
        type: constant
        params:
          value: param:u_left_value
      operator_parameters:
        alpha: param:wall_exchange
    y+:
    - operator: robin
      value:
        type: constant
        params:
          value: param:u_right_value
      operator_parameters:
        alpha: param:wall_exchange
  v:
    x-:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_left_value
    x+:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_right_value
    y-:
    - operator: robin
      value:
        type: constant
        params:
          value: param:v_left_value
      operator_parameters:
        alpha: param:wall_exchange
    y+:
    - operator: robin
      value:
        type: constant
        params:
          value: param:v_right_value
      operator_parameters:
        alpha: param:wall_exchange
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 160
  - 128
  num_frames: 73
seed: 4210
