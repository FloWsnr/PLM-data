preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.07
    max: 0.1
  Dv:
    sample: uniform
    min: 0.92
    max: 1.35
  a:
    sample: uniform
    min: 2.2
    max: 2.45
  b:
    sample: uniform
    min: 4.6
    max: 5.3
  domain_size_x:
    sample: uniform
    min: 31.0
    max: 38.0
  domain_size_y:
    sample: uniform
    min: 31.0
    max: 38.0
domain:
  allow_sampling: true
  type: rectangle
  size:
  - param:domain_size_x
  - param:domain_size_y
  mesh_resolution:
  - 160
  - 160
time:
  dt: 0.025
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 2.15
          max: 2.42
        std:
          sample: uniform
          min: 0.055
          max: 0.105
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.95
          max: 2.35
        std:
          sample: uniform
          min: 0.045
          max: 0.09
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 160
  - 160
  num_frames: 65
seed: 4200
