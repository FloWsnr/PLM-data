preset: brusselator
parameters:
  Du: 1.0
  Dv: 8.0
  a: 2.0
  b: 4.5
domain:
  type: box
  size: [20.0, 20.0, 20.0]
  mesh_resolution: [32, 32, 32]
time:
  dt: 0.05
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 2.0
        std: 0.05
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 2.25
        std: 0.05
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
  v:
    $ref: boundary_field.scalar.full_periodic_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [20, 20, 20]
  num_frames: 30
seed: 42
