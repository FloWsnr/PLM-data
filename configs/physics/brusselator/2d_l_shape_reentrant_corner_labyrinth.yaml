preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 0.82
    max: 1.22
  a:
    sample: uniform
    min: 2.0
    max: 2.35
  b:
    sample: uniform
    min: 3.45
    max: 4.65
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 23.0
    max: 29.0
  outer_height:
    sample: uniform
    min: 23.0
    max: 29.0
  cutout_width:
    sample: uniform
    min: 8.0
    max: 12.0
  cutout_height:
    sample: uniform
    min: 8.0
    max: 12.0
  mesh_size:
    sample: uniform
    min: 0.18
    max: 0.24
time:
  dt: 0.028
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.95
          max: 2.25
        generators:
        - count:
            sample: randint
            min: 4
            max: 7
          amplitude:
            sample: uniform
            min: 0.08
            max: 0.22
          sigma:
            sample: uniform
            min: 1.0
            max: 2.1
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.0
          center:
          - sample: uniform
            min: 2.0
            max: 20.0
          - sample: uniform
            min: 2.0
            max: 20.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.55
          max: 2.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.07
            max: 0.14
          cycles:
          - 1.0
          - 2.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
          angle:
            sample: uniform
            min: 0.0
            max: 0.8
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.1
          cycles:
          - 3.0
          - 1.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
  v:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 176
  - 176
  num_frames: 73
seed: 4300
