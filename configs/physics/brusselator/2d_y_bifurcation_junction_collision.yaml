preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.1
    max: 0.14
  Dv:
    sample: uniform
    min: 1.05
    max: 1.35
  a:
    sample: uniform
    min: 1.95
    max: 2.15
  b:
    sample: uniform
    min: 3.25
    max: 3.85
  u_upper_value:
    sample: uniform
    min: 1.82
    max: 2.02
  u_lower_value:
    sample: uniform
    min: 2.0
    max: 2.2
  v_upper_value:
    sample: uniform
    min: 1.62
    max: 1.9
  v_lower_value:
    sample: uniform
    min: 1.45
    max: 1.75
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 10.0
    max: 13.0
  branch_length:
    sample: uniform
    min: 12.0
    max: 16.0
  branch_angle_degrees:
    sample: uniform
    min: 38.0
    max: 54.0
  channel_width:
    sample: uniform
    min: 3.8
    max: 5.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.17
time:
  dt: 0.02
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.88
          max: 2.05
        modes:
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.1
          cycles:
          - 1.0
          - 1.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
          angle:
            sample: uniform
            min: -0.4
            max: 0.6
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.55
          max: 1.85
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.04
            max: 0.12
          sigma:
            sample: uniform
            min: 0.9
            max: 1.6
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.0
          center:
          - sample: uniform
            min: 6.0
            max: 20.0
          - sample: uniform
            min: -8.0
            max: 8.0
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_upper_value
    outlet_lower:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_lower_value
    walls:
    - operator: neumann
      value: 0.0
  v:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_upper_value
    outlet_lower:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_lower_value
    walls:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 160
  num_frames: 73
seed: 4370
