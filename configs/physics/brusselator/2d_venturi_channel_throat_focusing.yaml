preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.07
    max: 0.1
  Dv:
    sample: uniform
    min: 0.92
    max: 1.35
  a:
    sample: uniform
    min: 2.2
    max: 2.45
  b:
    sample: uniform
    min: 4.6
    max: 5.3
  u_inlet_value:
    sample: uniform
    min: 2.22
    max: 2.48
  v_inlet_value:
    sample: uniform
    min: 1.95
    max: 2.35
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 28.0
    max: 34.0
  height:
    sample: uniform
    min: 10.0
    max: 14.0
  throat_height:
    sample: uniform
    min: 3.0
    max: 5.0
  constriction_center_x:
    sample: uniform
    min: 12.0
    max: 18.0
  constriction_radius:
    sample: uniform
    min: 6.0
    max: 8.0
  mesh_size:
    sample: uniform
    min: 0.17
    max: 0.23
time:
  dt: 0.025
  t_end: 17.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 2.08
          max: 2.35
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.12
            max: 0.28
          sigma:
            sample: uniform
            min: 0.9
            max: 1.6
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.6
          center:
          - sample: uniform
            min: 2.0
            max: 14.0
          - sample: uniform
            min: 2.0
            max: 11.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.82
          max: 2.25
        std:
          sample: uniform
          min: 0.035
          max: 0.08
boundary_conditions:
  u:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_inlet_value
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
  v:
    inlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_inlet_value
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 128
  num_frames: 65
seed: 4400
