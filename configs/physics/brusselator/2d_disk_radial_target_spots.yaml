preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 0.82
    max: 1.22
  a:
    sample: uniform
    min: 2.0
    max: 2.35
  b:
    sample: uniform
    min: 3.45
    max: 4.65
  domain_center_x:
    sample: uniform
    min: -0.8
    max: 0.8
  domain_center_y:
    sample: uniform
    min: -0.8
    max: 0.8
domain:
  allow_sampling: true
  type: disk
  center:
  - param:domain_center_x
  - param:domain_center_y
  radius:
    sample: uniform
    min: 16.5
    max: 20.5
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.3
time:
  dt: 0.028
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 1.95
          max: 2.25
        amplitude:
          sample: uniform
          min: 0.14
          max: 0.28
        frequency:
          sample: uniform
          min: 0.38
          max: 0.72
        center:
        - param:domain_center_x
        - param:domain_center_y
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.55
          max: 2.05
        std:
          sample: uniform
          min: 0.035
          max: 0.07
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
  v:
    outer:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 176
  - 176
  num_frames: 73
seed: 4240
