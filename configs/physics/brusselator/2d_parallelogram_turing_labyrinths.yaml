preset: brusselator
parameters:
  Du: 1.0
  Dv: 8.0
  a: 2.0
  b: 4.5
domain:
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: [40.0, 0.0]
  axis_y: [10.0, 40.0]
  mesh_resolution: [128, 128]
time:
  dt: 0.05
  t_end: 40.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 2.0
        std: 0.05
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 2.25
        std: 0.05
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  resolution: [96, 96]
  num_frames: 100
seed: 42
