preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 0.82
    max: 1.22
  a:
    sample: uniform
    min: 2.0
    max: 2.35
  b:
    sample: uniform
    min: 3.45
    max: 4.65
  axis_x_length:
    sample: uniform
    min: 31.0
    max: 38.0
  axis_y_x:
    sample: uniform
    min: 5.5
    max: 12.0
  axis_y_y:
    sample: uniform
    min: 29.0
    max: 37.0
domain:
  allow_sampling: true
  type: parallelogram
  origin:
  - 0.0
  - 0.0
  axis_x:
  - param:axis_x_length
  - 0.0
  axis_y:
  - param:axis_y_x
  - param:axis_y_y
  mesh_resolution:
  - 160
  - 160
time:
  dt: 0.028
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 2.0
          max: 2.25
        modes:
        - amplitude:
            sample: uniform
            min: 0.06
            max: 0.14
          cycles:
          - 2.0
          - 1.0
          phase:
            sample: uniform
            min: -0.8
            max: 0.8
          angle:
            sample: uniform
            min: -0.45
            max: 0.45
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.11
          cycles:
          - 0.0
          - 3.0
          phase:
            sample: uniform
            min: -0.8
            max: 0.8
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.65
          max: 2.15
        std:
          sample: uniform
          min: 0.04
          max: 0.08
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 160
  - 160
  num_frames: 65
seed: 4220
