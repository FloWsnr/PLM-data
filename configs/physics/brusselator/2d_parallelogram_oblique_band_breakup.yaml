preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.07
    max: 0.095
  Dv:
    sample: uniform
    min: 0.76
    max: 1.05
  a:
    sample: uniform
    min: 2.0
    max: 2.15
  b:
    sample: uniform
    min: 3.25
    max: 3.75
  axis_x_length:
    sample: uniform
    min: 26.0
    max: 34.0
  axis_y_x:
    sample: uniform
    min: -10.0
    max: -4.0
  axis_y_y:
    sample: uniform
    min: 22.0
    max: 30.0
domain:
  allow_sampling: true
  type: parallelogram
  origin:
  - 0.0
  - 0.0
  axis_x:
  - param:axis_x_length
  - 0.0
  axis_y:
  - param:axis_y_x
  - param:axis_y_y
  mesh_resolution:
  - 160
  - 144
time:
  dt: 0.032
  t_end: 22.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.95
          max: 2.18
        modes:
        - amplitude:
            sample: uniform
            min: 0.11
            max: 0.2
          cycles:
          - 1.0
          - 1.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
          angle:
            sample: uniform
            min: 0.2
            max: 0.9
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.12
          cycles:
          - 3.0
          - -1.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
          angle:
            sample: uniform
            min: -0.6
            max: 0.2
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.48
          max: 1.82
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: -0.12
            max: 0.18
          sigma:
            sample: uniform
            min: 1.2
            max: 2.4
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.8
          center:
          - sample: uniform
            min: 4.0
            max: 29.0
          - sample: uniform
            min: 3.0
            max: 27.0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 160
  - 144
  num_frames: 73
seed: 4230
