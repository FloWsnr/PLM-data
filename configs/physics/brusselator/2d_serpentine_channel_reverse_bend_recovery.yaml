preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.1
    max: 0.14
  Dv:
    sample: uniform
    min: 1.05
    max: 1.35
  a:
    sample: uniform
    min: 1.95
    max: 2.15
  b:
    sample: uniform
    min: 3.25
    max: 3.85
  u_outlet_value:
    sample: uniform
    min: 1.88
    max: 2.12
  v_outlet_value:
    sample: uniform
    min: 1.55
    max: 1.85
  wall_exchange:
    sample: uniform
    min: 0.005
    max: 0.02
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 16.0
    max: 21.0
  lane_spacing:
    sample: uniform
    min: 4.8
    max: 6.3
  n_bends:
    sample: randint
    min: 3
    max: 4
  channel_width:
    sample: uniform
    min: 3.0
    max: 4.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.17
time:
  dt: 0.02
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.9
          max: 2.08
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: 0.05
            max: 0.14
          sigma:
            sample: uniform
            min: 0.8
            max: 1.5
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.2
          center:
          - sample: uniform
            min: 1.0
            max: 19.0
          - sample: uniform
            min: -1.5
            max: 19.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.55
          max: 1.85
        modes:
        - amplitude:
            sample: uniform
            min: 0.04
            max: 0.1
          cycles:
          - 1.0
          - 2.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
          angle:
            sample: uniform
            min: -0.6
            max: 0.6
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_outlet_value
    walls:
    - operator: robin
      value:
        type: constant
        params:
          value: param:u_outlet_value
      operator_parameters:
        alpha: param:wall_exchange
  v:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_outlet_value
    walls:
    - operator: robin
      value:
        type: constant
        params:
          value: param:v_outlet_value
      operator_parameters:
        alpha: param:wall_exchange
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 160
  num_frames: 73
seed: 4390
