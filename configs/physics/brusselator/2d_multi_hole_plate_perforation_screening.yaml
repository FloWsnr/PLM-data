preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.055
    max: 0.085
  Dv:
    sample: uniform
    min: 0.82
    max: 1.22
  a:
    sample: uniform
    min: 2.0
    max: 2.35
  b:
    sample: uniform
    min: 3.45
    max: 4.65
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 28.0
    max: 31.0
  height:
    sample: uniform
    min: 18.0
    max: 23.0
  holes:
  - center:
    - sample: uniform
      min: 6.2
      max: 7.4
    - sample: uniform
      min: 5.0
      max: 6.4
    radius:
      sample: uniform
      min: 1.15
      max: 1.65
    boundary_name: holes
  - center:
    - sample: uniform
      min: 13.0
      max: 15.0
    - sample: uniform
      min: 5.0
      max: 6.4
    radius:
      sample: uniform
      min: 1.1
      max: 1.55
    boundary_name: holes
  - center:
    - sample: uniform
      min: 20.5
      max: 23.0
    - sample: uniform
      min: 5.0
      max: 6.4
    radius:
      sample: uniform
      min: 1.15
      max: 1.65
    boundary_name: holes
  - center:
    - sample: uniform
      min: 8.0
      max: 9.5
    - sample: uniform
      min: 13.0
      max: 16.0
    radius:
      sample: uniform
      min: 1.1
      max: 1.55
    boundary_name: holes
  - center:
    - sample: uniform
      min: 16.0
      max: 18.0
    - sample: uniform
      min: 13.0
      max: 16.0
    radius:
      sample: uniform
      min: 1.15
      max: 1.65
    boundary_name: holes
  - center:
    - sample: uniform
      min: 23.0
      max: 25.0
    - sample: uniform
      min: 13.0
      max: 16.0
    radius:
      sample: uniform
      min: 1.1
      max: 1.5
    boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.17
    max: 0.23
time:
  dt: 0.028
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.95
          max: 2.25
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.18
          cycles:
          - 2.0
          - 1.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
          angle:
            sample: uniform
            min: 0.0
            max: 0.9
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.12
          cycles:
          - 0.0
          - 3.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.55
          max: 2.05
        std:
          sample: uniform
          min: 0.035
          max: 0.075
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    holes:
    - operator: neumann
      value: 0.0
  v:
    outer:
    - operator: neumann
      value: 0.0
    holes:
    - operator: neumann
      value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 144
  num_frames: 73
seed: 4320
