preset: brusselator
parameters:
  Du:
    sample: uniform
    min: 0.07
    max: 0.095
  Dv:
    sample: uniform
    min: 0.76
    max: 1.05
  a:
    sample: uniform
    min: 2.0
    max: 2.15
  b:
    sample: uniform
    min: 3.25
    max: 3.75
  u_outlet_value:
    sample: uniform
    min: 1.9
    max: 2.2
  v_outlet_value:
    sample: uniform
    min: 1.55
    max: 1.95
  u_obstacle_value:
    sample: uniform
    min: 2.18
    max: 2.42
  v_obstacle_value:
    sample: uniform
    min: 1.85
    max: 2.25
  wall_exchange:
    sample: uniform
    min: 0.02
    max: 0.06
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 28.0
    max: 34.0
  height:
    sample: uniform
    min: 12.0
    max: 16.0
  obstacle_center:
  - sample: uniform
    min: 12.0
    max: 17.5
  - sample: uniform
    min: 3.8
    max: 8.4
  obstacle_radius:
    sample: uniform
    min: 2.3
    max: 3.4
  mesh_size:
    sample: uniform
    min: 0.18
    max: 0.24
time:
  dt: 0.032
  t_end: 22.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 1.95
          max: 2.2
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.16
          cycles:
          - 2.0
          - 0.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
        - amplitude:
            sample: uniform
            min: 0.05
            max: 0.12
          cycles:
          - 0.0
          - 2.0
          phase:
            sample: uniform
            min: -0.6
            max: 0.6
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 1.55
          max: 1.9
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: -0.08
            max: 0.15
          sigma:
            sample: uniform
            min: 1.0
            max: 2.0
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 2.4
          center:
          - sample: uniform
            min: 5.0
            max: 28.0
          - sample: uniform
            min: 2.0
            max: 13.0
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_outlet_value
    walls:
    - operator: robin
      value:
        type: constant
        params:
          value: param:u_outlet_value
      operator_parameters:
        alpha: param:wall_exchange
    obstacle:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:u_obstacle_value
  v:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_outlet_value
    walls:
    - operator: robin
      value:
        type: constant
        params:
          value: param:v_outlet_value
      operator_parameters:
        alpha: param:wall_exchange
    obstacle:
    - operator: dirichlet
      value:
        type: constant
        params:
          value: param:v_obstacle_value
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats:
  - numpy
  - gif
  resolution:
  - 192
  - 128
  num_frames: 73
seed: 4350
