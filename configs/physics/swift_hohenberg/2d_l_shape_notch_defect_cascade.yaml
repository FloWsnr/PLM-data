preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: 0.0
    max: 0.22
  q0:
    sample: uniform
    min: 1.02
    max: 1.35
  alpha:
    sample: uniform
    min: 0.55
    max: 1.15
  beta:
    sample: uniform
    min: -1.18
    max: -0.7
  gamma:
    sample: uniform
    min: -0.45
    max: -0.08
  theta:
    sample: uniform
    min: 0.52
    max: 0.62
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.25
            max: 0.15
          y:
            sample: uniform
            min: 0.008
            max: 0.025
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.1
            max: 0.36
          x:
            sample: uniform
            min: -0.025
            max: -0.008
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 36.0
    max: 46.0
  outer_height:
    sample: uniform
    min: 32.0
    max: 42.0
  cutout_width:
    sample: uniform
    min: 10.0
    max: 16.0
  cutout_height:
    sample: uniform
    min: 12.0
    max: 18.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.26
time:
  dt: 0.09
  t_end: 17.1
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.03
          max: 0.03
        modes:
        - amplitude:
            sample: uniform
            min: 0.18
            max: 0.4
          cycles:
          - sample: uniform
            min: 0.16
            max: 0.34
          - sample: uniform
            min: 0.06
            max: 0.18
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
          angle:
            sample: uniform
            min: -0.7
            max: 0.7
        - amplitude:
            sample: uniform
            min: -0.18
            max: 0.18
          cycles:
          - sample: uniform
            min: 0.04
            max: 0.14
          - sample: uniform
            min: 0.2
            max: 0.4
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
boundary_conditions:
  u:
    outer:
    - operator: simply_supported
    notch:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [176, 160]
  num_frames: 58
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5320
