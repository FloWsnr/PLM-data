preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.14
    max: 0.08
  q0:
    sample: uniform
    min: 0.82
    max: 1.08
  alpha:
    sample: uniform
    min: 1.35
    max: 1.9
  beta:
    sample: uniform
    min: -1.18
    max: -0.72
  gamma:
    sample: uniform
    min: -0.34
    max: -0.1
  theta:
    sample: uniform
    min: 0.55
    max: 0.65
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.18
            max: 0.42
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.38
            max: -0.12
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 34.0
    max: 44.0
  outer_height:
    sample: uniform
    min: 34.0
    max: 44.0
  cutout_width:
    sample: uniform
    min: 12.0
    max: 18.0
  cutout_height:
    sample: uniform
    min: 12.0
    max: 18.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.26
time:
  dt: 0.1
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split:
        - sample: uniform
          min: 15.0
          max: 23.0
        - sample: uniform
          min: 15.0
          max: 23.0
        region_values:
          "00":
            sample: uniform
            min: 0.12
            max: 0.34
          "01":
            sample: uniform
            min: -0.28
            max: -0.08
          "10":
            sample: uniform
            min: -0.14
            max: 0.08
          "11":
            sample: uniform
            min: 0.24
            max: 0.52
boundary_conditions:
  u:
    outer:
    - operator: simply_supported
    notch:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 67
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5310
