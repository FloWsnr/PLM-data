preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: 0.04
    max: 0.24
  q0:
    sample: uniform
    min: 0.95
    max: 1.28
  alpha:
    sample: uniform
    min: 0.15
    max: 0.75
  beta:
    sample: uniform
    min: -1.25
    max: -0.8
  gamma:
    sample: uniform
    min: -0.28
    max: -0.05
  theta:
    sample: uniform
    min: 0.5
    max: 0.6
  axis_x_length:
    sample: uniform
    min: 42.0
    max: 52.0
  axis_y_x:
    sample: uniform
    min: 7.0
    max: 14.0
  axis_y_y:
    sample: uniform
    min: 32.0
    max: 42.0
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.34
            max: 0.68
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.28
            max: 0.12
          x:
            sample: uniform
            min: -0.012
            max: 0.018
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
  - param:axis_x_length
  - 0.0
  axis_y:
  - param:axis_y_x
  - param:axis_y_y
  mesh_resolution: [176, 144]
time:
  dt: 0.09
  t_end: 16.2
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.025
          max: 0.025
        modes:
        - amplitude:
            sample: uniform
            min: 0.18
            max: 0.34
          cycles:
          - sample: uniform
            min: 0.18
            max: 0.34
          - sample: uniform
            min: 0.04
            max: 0.12
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
          angle:
            sample: uniform
            min: 0.25
            max: 0.75
        - amplitude:
            sample: uniform
            min: -0.16
            max: 0.16
          cycles:
          - sample: uniform
            min: 0.04
            max: 0.14
          - sample: uniform
            min: 0.18
            max: 0.36
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
          angle:
            sample: uniform
            min: -0.25
            max: 0.35
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [176, 144]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5240
