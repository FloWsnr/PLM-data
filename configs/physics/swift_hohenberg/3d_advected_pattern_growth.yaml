preset: swift_hohenberg
parameters:
  r: -0.28
  q0: 1.0
  alpha: 1.6
  beta: -1.0
  gamma: -1.0
  theta: 0.5
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.25
      y:
        type: constant
        params:
          value: -0.1
      z:
        type: constant
        params:
          value: 0.15
domain:
  type: box
  size:
  - 20.0
  - 20.0
  - 20.0
  mesh_resolution:
  - 12
  - 12
  - 12
time:
  dt: 0.1
  t_end: 1.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 2.0
            max: 3.0
          aspect_ratio: 1.0
          center:
          - sample: uniform
            min: 6.25
            max: 13.75
          - sample: uniform
            min: 6.25
            max: 13.75
          - sample: uniform
            min: 6.25
            max: 13.75
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
output:
  formats:
    $ref: output.formats.standard
  fields:
    u:
      $ref: output.mode.scalar
  resolution:
  - 12
  - 12
  - 12
  num_frames: 4
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
