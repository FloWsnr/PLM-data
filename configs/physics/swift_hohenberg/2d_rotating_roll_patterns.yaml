preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.12
    max: 0.12
  q0:
    sample: uniform
    min: 0.78
    max: 1.08
  alpha:
    sample: uniform
    min: 1.35
    max: 1.9
  beta:
    sample: uniform
    min: -1.18
    max: -0.68
  gamma:
    sample: uniform
    min: -0.34
    max: -0.08
  theta:
    sample: uniform
    min: 0.52
    max: 0.62
  domain_size:
    sample: uniform
    min: 40.0
    max: 48.0
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: -2.3
            max: -1.5
          y:
            sample: uniform
            min: 0.07
            max: 0.11
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: 1.5
            max: 2.3
          x:
            sample: uniform
            min: -0.11
            max: -0.07
domain:
  allow_sampling: true
  type: rectangle
  size:
  - param:domain_size
  - param:domain_size
  mesh_resolution: [160, 160]
time:
  dt: 0.1
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.015
          max: 0.015
        std:
          sample: uniform
          min: 0.14
          max: 0.28
boundary_conditions:
  u:
    $ref: boundary_field.scalar.simply_supported_2d
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 67
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5220
