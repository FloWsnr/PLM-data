preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: 0.02
    max: 0.22
  q0:
    sample: uniform
    min: 0.92
    max: 1.25
  alpha:
    sample: uniform
    min: 0.0
    max: 0.4
  beta:
    sample: uniform
    min: -1.3
    max: -0.82
  gamma:
    sample: uniform
    min: -0.3
    max: -0.04
  theta:
    sample: uniform
    min: 0.52
    max: 0.62
  domain_center_x:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_center_y:
    sample: uniform
    min: -1.2
    max: 1.2
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: -0.045
            max: -0.018
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: 0.018
            max: 0.045
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 20.0
    max: 24.0
  mesh_size:
    sample: uniform
    min: 0.23
    max: 0.29
time:
  dt: 0.09
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: -0.02
          max: 0.02
        amplitude:
          sample: uniform
          min: 0.22
          max: 0.48
        frequency:
          sample: uniform
          min: 0.72
          max: 1.18
        center:
        - param:domain_center_x
        - param:domain_center_y
boundary_conditions:
  u:
    $ref: boundary_field.scalar.simply_supported_outer
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 61
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5260
