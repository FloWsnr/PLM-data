preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.08
    max: 0.16
  q0:
    sample: uniform
    min: 0.88
    max: 1.18
  alpha:
    sample: uniform
    min: 1.1
    max: 1.72
  beta:
    sample: uniform
    min: -1.22
    max: -0.72
  gamma:
    sample: uniform
    min: -0.32
    max: -0.08
  theta:
    sample: uniform
    min: 0.54
    max: 0.64
  lobe_y:
    sample: uniform
    min: -0.8
    max: 0.8
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.28
            max: 0.62
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.018
            max: 0.018
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -13.4
    max: -11.4
  - param:lobe_y
  right_center:
  - sample: uniform
    min: 11.4
    max: 13.4
  - param:lobe_y
  lobe_radius:
    sample: uniform
    min: 10.0
    max: 12.2
  neck_width:
    sample: uniform
    min: 3.0
    max: 5.2
  mesh_size:
    sample: uniform
    min: 0.18
    max: 0.24
time:
  dt: 0.1
  t_end: 19.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: 0.35
            max: 0.85
          sigma:
            sample: uniform
            min: 1.3
            max: 2.8
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.0
          center:
          - sample: uniform
            min: -18.0
            max: -5.0
          - sample: uniform
            min: -5.8
            max: 5.8
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: -0.45
            max: 0.35
          sigma:
            sample: uniform
            min: 1.4
            max: 3.2
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.4
          center:
          - sample: uniform
            min: 5.0
            max: 18.0
          - sample: uniform
            min: -5.8
            max: 5.8
boundary_conditions:
  u:
    outer:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 64
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5290
