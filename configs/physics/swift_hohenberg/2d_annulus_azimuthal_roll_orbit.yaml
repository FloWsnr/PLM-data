preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.08
    max: 0.14
  q0:
    sample: uniform
    min: 0.86
    max: 1.16
  alpha:
    sample: uniform
    min: 1.15
    max: 1.75
  beta:
    sample: uniform
    min: -1.22
    max: -0.72
  gamma:
    sample: uniform
    min: -0.32
    max: -0.08
  theta:
    sample: uniform
    min: 0.54
    max: 0.64
  domain_center_x:
    sample: uniform
    min: -0.8
    max: 0.8
  domain_center_y:
    sample: uniform
    min: -0.8
    max: 0.8
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: -0.085
            max: -0.045
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: 0.045
            max: 0.085
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 5.2
    max: 7.8
  outer_radius:
    sample: uniform
    min: 20.0
    max: 24.0
  mesh_size:
    sample: uniform
    min: 0.22
    max: 0.29
time:
  dt: 0.1
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 5
            max: 9
          amplitude:
            sample: uniform
            min: 0.32
            max: 0.78
          sigma:
            sample: uniform
            min: 1.4
            max: 3.0
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.8
          center:
          - sample: uniform
            min: -15.0
            max: 15.0
          - sample: uniform
            min: -15.0
            max: 15.0
boundary_conditions:
  u:
    inner:
    - operator: simply_supported
    outer:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 67
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5270
