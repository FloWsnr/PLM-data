preset: swift_hohenberg
parameters:
  r: -0.28
  q0: 1.0
  alpha: 1.6
  beta: -1.0
  gamma: -1.0
  theta: 0.5
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.9
      y:
        type: constant
        params:
          value: -0.4
domain:
  type: rectangle
  size: [40.0, 40.0]
  mesh_resolution: [128, 128]
time:
  dt: 0.1
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        blobs:
          - amplitude: 1.0
            sigma: 3.0
            center: [20.0, 20.0]
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  formats:
    $ref: output.formats.numpy_gif
  fields:
    u:
      $ref: output.mode.scalar
  resolution: [64, 64]
  num_frames: 10
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
