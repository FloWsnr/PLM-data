preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: 0.08
    max: 0.22
  q0:
    sample: uniform
    min: 0.82
    max: 1.12
  alpha:
    sample: uniform
    min: 0.85
    max: 1.45
  beta:
    sample: uniform
    min: -1.2
    max: -0.72
  gamma:
    sample: uniform
    min: -0.24
    max: -0.06
  theta:
    sample: uniform
    min: 0.54
    max: 0.64
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.24
            max: 0.56
      y:
        type: affine
        params:
          y:
            sample: uniform
            min: -0.018
            max: 0.018
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 44.0
    max: 54.0
  height:
    sample: uniform
    min: 32.0
    max: 40.0
  holes:
  - center:
    - sample: uniform
      min: 10.0
      max: 14.0
    - sample: uniform
      min: 9.0
      max: 13.0
    radius:
      sample: uniform
      min: 2.6
      max: 4.0
    boundary_name: holes
  - center:
    - sample: uniform
      min: 24.0
      max: 30.0
    - sample: uniform
      min: 18.0
      max: 24.0
    radius:
      sample: uniform
      min: 2.8
      max: 4.4
    boundary_name: holes
  - center:
    - sample: uniform
      min: 38.0
      max: 44.0
    - sample: uniform
      min: 9.0
      max: 15.0
    radius:
      sample: uniform
      min: 2.4
      max: 3.8
    boundary_name: holes
  - center:
    - sample: uniform
      min: 14.0
      max: 20.0
    - sample: uniform
      min: 24.0
      max: 31.0
    radius:
      sample: uniform
      min: 2.2
      max: 3.6
    boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.18
    max: 0.24
time:
  dt: 0.1
  t_end: 19.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.02
          max: 0.02
        std:
          sample: uniform
          min: 0.13
          max: 0.28
boundary_conditions:
  u:
    outer:
    - operator: simply_supported
    holes:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 64
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5330
