preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.06
    max: 0.16
  q0:
    sample: uniform
    min: 0.88
    max: 1.18
  alpha:
    sample: uniform
    min: 1.05
    max: 1.7
  beta:
    sample: uniform
    min: -1.22
    max: -0.72
  gamma:
    sample: uniform
    min: -0.32
    max: -0.08
  theta:
    sample: uniform
    min: 0.54
    max: 0.64
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.35
            max: 0.72
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.16
            max: 0.16
          x:
            sample: uniform
            min: -0.006
            max: 0.006
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 48.0
    max: 58.0
  height:
    sample: uniform
    min: 30.0
    max: 38.0
  throat_height:
    sample: uniform
    min: 11.0
    max: 16.0
  constriction_center_x:
    sample: uniform
    min: 22.0
    max: 34.0
  constriction_radius:
    sample: uniform
    min: 16.0
    max: 24.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.27
time:
  dt: 0.1
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 4
            max: 7
          amplitude:
            sample: uniform
            min: 0.28
            max: 0.72
          sigma:
            sample: uniform
            min: 1.4
            max: 3.0
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.2
          center:
          - sample: uniform
            min: 16.0
            max: 40.0
          - sample: uniform
            min: 8.0
            max: 30.0
boundary_conditions:
  u:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 61
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5370
