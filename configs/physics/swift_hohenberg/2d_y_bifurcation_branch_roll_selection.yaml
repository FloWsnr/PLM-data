preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.06
    max: 0.16
  q0:
    sample: uniform
    min: 0.86
    max: 1.16
  alpha:
    sample: uniform
    min: 1.1
    max: 1.72
  beta:
    sample: uniform
    min: -1.22
    max: -0.72
  gamma:
    sample: uniform
    min: -0.32
    max: -0.08
  theta:
    sample: uniform
    min: 0.54
    max: 0.64
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.28
            max: 0.62
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.16
            max: 0.16
          x:
            sample: uniform
            min: -0.008
            max: 0.008
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 18.0
    max: 24.0
  branch_length:
    sample: uniform
    min: 20.0
    max: 28.0
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 50.0
  channel_width:
    sample: uniform
    min: 8.0
    max: 11.0
  mesh_size:
    sample: uniform
    min: 0.16
    max: 0.22
time:
  dt: 0.1
  t_end: 20.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: 0.28
            max: 0.7
          sigma:
            sample: uniform
            min: 1.2
            max: 2.6
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.2
          center:
          - sample: uniform
            min: 4.0
            max: 22.0
          - sample: uniform
            min: -3.5
            max: 3.5
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: -0.42
            max: 0.24
          sigma:
            sample: uniform
            min: 1.4
            max: 3.2
          aspect_ratio:
            sample: uniform
            min: 1.0
            max: 3.4
          center:
          - sample: uniform
            min: 20.0
            max: 40.0
          - sample: uniform
            min: 6.0
            max: 18.0
boundary_conditions:
  u:
    inlet:
    - operator: simply_supported
    outlet_upper:
    - operator: simply_supported
    outlet_lower:
    - operator: simply_supported
    walls:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 67
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5390
