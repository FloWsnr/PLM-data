preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: 0.06
    max: 0.2
  q0:
    sample: uniform
    min: 1.05
    max: 1.38
  alpha:
    sample: uniform
    min: 1.45
    max: 2.05
  beta:
    sample: uniform
    min: -1.25
    max: -0.72
  gamma:
    sample: uniform
    min: -0.22
    max: -0.05
  theta:
    sample: uniform
    min: 0.55
    max: 0.65
  lobe_y:
    sample: uniform
    min: -0.7
    max: 0.7
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.7
            max: -0.32
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.08
            max: 0.08
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -13.2
    max: -11.2
  - param:lobe_y
  right_center:
  - sample: uniform
    min: 11.2
    max: 13.2
  - param:lobe_y
  lobe_radius:
    sample: uniform
    min: 9.8
    max: 11.8
  neck_width:
    sample: uniform
    min: 2.0
    max: 3.6
  mesh_size:
    sample: uniform
    min: 0.17
    max: 0.23
time:
  dt: 0.1
  t_end: 21.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.22
          max: 0.48
        value_right:
          sample: uniform
          min: -0.42
          max: -0.16
        x_split:
          sample: uniform
          min: -1.0
          max: 1.0
        axis: 0
boundary_conditions:
  u:
    outer:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 70
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5300
