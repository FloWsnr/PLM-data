preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.06
    max: 0.16
  q0:
    sample: uniform
    min: 0.88
    max: 1.18
  alpha:
    sample: uniform
    min: 1.0
    max: 1.65
  beta:
    sample: uniform
    min: -1.22
    max: -0.72
  gamma:
    sample: uniform
    min: -0.32
    max: -0.08
  theta:
    sample: uniform
    min: 0.54
    max: 0.64
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.42
            max: 0.82
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.22
            max: 0.22
          x:
            sample: uniform
            min: -0.012
            max: 0.012
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 48.0
    max: 58.0
  height:
    sample: uniform
    min: 28.0
    max: 36.0
  obstacle_center:
  - sample: uniform
    min: 18.0
    max: 27.0
  - sample: uniform
    min: 11.0
    max: 19.0
  obstacle_radius:
    sample: uniform
    min: 4.0
    max: 6.2
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.27
time:
  dt: 0.1
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 4
            max: 7
          amplitude:
            sample: uniform
            min: 0.28
            max: 0.72
          sigma:
            sample: uniform
            min: 1.3
            max: 2.8
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 3.4
          center:
          - sample: uniform
            min: 5.0
            max: 22.0
          - sample: uniform
            min: 6.0
            max: 28.0
boundary_conditions:
  u:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
    obstacle:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 61
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5350
