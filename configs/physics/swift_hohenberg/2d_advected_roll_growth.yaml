preset: swift_hohenberg
parameters:
  r: -0.28
  q0: 1.0
  alpha: 1.6
  beta: -1.0
  gamma: -1.0
  theta: 0.5
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: 0.6
      y:
        type: constant
        params:
          value: -0.25
domain:
  type: rectangle
  size:
  - 40.0
  - 40.0
  mesh_resolution:
  - 128
  - 128
time:
  dt: 0.1
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
        - count: 1
          amplitude:
            sample: uniform
            min: 0.85
            max: 1.15
          sigma:
            sample: uniform
            min: 2.4
            max: 3.6
          center:
          - sample: uniform
            min: 15.5
            max: 24.5
          - sample: uniform
            min: 15.5
            max: 24.5
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  formats:
    $ref: output.formats.standard
  fields:
    u:
      $ref: output.mode.scalar
  resolution:
  - 64
  - 64
  num_frames: 10
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
