preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: 0.14
    max: 0.3
  q0:
    sample: uniform
    min: 1.05
    max: 1.38
  alpha:
    sample: uniform
    min: 0.75
    max: 1.35
  beta:
    sample: uniform
    min: -1.18
    max: -0.72
  gamma:
    sample: uniform
    min: -0.22
    max: -0.05
  theta:
    sample: uniform
    min: 0.52
    max: 0.62
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.82
            max: -0.42
      y:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.12
            max: 0.42
          x:
            sample: uniform
            min: -0.018
            max: -0.004
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 46.0
    max: 56.0
  height:
    sample: uniform
    min: 30.0
    max: 38.0
  obstacle_center:
  - sample: uniform
    min: 24.0
    max: 36.0
  - sample: uniform
    min: 12.0
    max: 22.0
  obstacle_radius:
    sample: uniform
    min: 4.2
    max: 6.8
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.27
time:
  dt: 0.09
  t_end: 16.2
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.03
          max: 0.03
        modes:
        - amplitude:
            sample: uniform
            min: 0.2
            max: 0.42
          cycles:
          - sample: uniform
            min: 0.16
            max: 0.32
          - sample: uniform
            min: 0.05
            max: 0.16
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
          angle:
            sample: uniform
            min: -0.45
            max: 0.45
        - amplitude:
            sample: uniform
            min: -0.18
            max: 0.18
          cycles:
          - sample: uniform
            min: 0.04
            max: 0.14
          - sample: uniform
            min: 0.18
            max: 0.36
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
boundary_conditions:
  u:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
    obstacle:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5360
