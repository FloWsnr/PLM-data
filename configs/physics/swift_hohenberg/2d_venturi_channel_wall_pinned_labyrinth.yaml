preset: swift_hohenberg
parameters:
  r:
    sample: uniform
    min: -0.18
    max: 0.02
  q0:
    sample: uniform
    min: 0.72
    max: 0.98
  alpha:
    sample: uniform
    min: 1.55
    max: 2.05
  beta:
    sample: uniform
    min: -1.1
    max: -0.62
  gamma:
    sample: uniform
    min: -0.38
    max: -0.12
  theta:
    sample: uniform
    min: 0.55
    max: 0.65
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.25
            max: 0.15
          y:
            sample: uniform
            min: -0.018
            max: 0.018
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.28
            max: 0.08
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 48.0
    max: 58.0
  height:
    sample: uniform
    min: 30.0
    max: 38.0
  throat_height:
    sample: uniform
    min: 10.0
    max: 15.0
  constriction_center_x:
    sample: uniform
    min: 20.0
    max: 34.0
  constriction_radius:
    sample: uniform
    min: 16.0
    max: 24.0
  mesh_size:
    sample: uniform
    min: 0.2
    max: 0.27
time:
  dt: 0.1
  t_end: 22.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.025
          max: 0.025
        modes:
        - amplitude:
            sample: uniform
            min: 0.2
            max: 0.44
          cycles:
          - sample: uniform
            min: 0.12
            max: 0.28
          - sample: uniform
            min: 0.04
            max: 0.14
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
          angle:
            sample: uniform
            min: 0.2
            max: 0.8
        - amplitude:
            sample: uniform
            min: -0.2
            max: 0.12
          cycles:
          - sample: uniform
            min: 0.04
            max: 0.14
          - sample: uniform
            min: 0.16
            max: 0.32
          phase:
            sample: uniform
            min: -3.14159
            max: 3.14159
boundary_conditions:
  u:
    inlet:
    - operator: simply_supported
    outlet:
    - operator: simply_supported
    walls:
    - operator: simply_supported
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 73
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 5380
