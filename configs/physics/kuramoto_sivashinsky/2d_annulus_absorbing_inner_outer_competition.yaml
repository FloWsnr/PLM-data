preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.64
    max: 0.78
  hyperdiffusion:
    sample: uniform
    min: 0.95
    max: 1.28
  anti_diffusion:
    sample: uniform
    min: 0.95
    max: 1.45
  nonlinear_strength:
    sample: uniform
    min: 0.75
    max: 1.2
  damping:
    sample: uniform
    min: 0.035
    max: 0.08
  advection_x:
    sample: uniform
    min: -0.09
    max: 0.09
  advection_y:
    sample: uniform
    min: -0.09
    max: 0.09
  advection_z: 0.0
domain:
  allow_sampling: true
  type: annulus
  center:
  - sample: uniform
    min: -0.35
    max: 0.35
  - sample: uniform
    min: -0.35
    max: 0.35
  inner_radius:
    sample: uniform
    min: 3.8
    max: 5.6
  outer_radius:
    sample: uniform
    min: 16.5
    max: 19.0
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.3
time:
  dt: 0.025
  t_end: 9.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: -0.03
          max: 0.03
        amplitude:
          sample: uniform
          min: 0.18
          max: 0.35
        frequency:
          sample: uniform
          min: 0.85
          max: 1.35
        center:
        - sample: uniform
          min: -0.8
          max: 0.8
        - sample: uniform
          min: -0.8
          max: 0.8
boundary_conditions:
  u:
    inner:
    - operator: dirichlet
      value: 0.0
    outer:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 48
