preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.57
    max: 0.7
  hyperdiffusion:
    sample: uniform
    min: 0.85
    max: 1.18
  anti_diffusion:
    sample: uniform
    min: 1.05
    max: 1.58
  nonlinear_strength:
    sample: uniform
    min: 0.85
    max: 1.35
  damping:
    sample: uniform
    min: 0.006
    max: 0.032
  advection_x:
    sample: uniform
    min: -0.08
    max: 0.12
  advection_y:
    sample: uniform
    min: -0.08
    max: 0.12
  advection_z: 0.0
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 30.0
    max: 36.0
  outer_height:
    sample: uniform
    min: 30.0
    max: 36.0
  cutout_width:
    sample: uniform
    min: 12.0
    max: 17.0
  cutout_height:
    sample: uniform
    min: 12.0
    max: 17.0
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.3
time:
  dt: 0.04
  t_end: 14.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: -0.45
            max: 0.45
          sigma:
            sample: uniform
            min: 1.5
            max: 3.2
          center:
          - sample: uniform
            min: 8.0
            max: 24.0
          - sample: uniform
            min: 8.0
            max: 24.0
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 3.8
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 51

