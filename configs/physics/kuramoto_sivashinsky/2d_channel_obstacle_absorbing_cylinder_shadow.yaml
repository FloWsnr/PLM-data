preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.68
    max: 0.82
  hyperdiffusion:
    sample: uniform
    min: 1.05
    max: 1.4
  anti_diffusion:
    sample: uniform
    min: 0.78
    max: 1.22
  nonlinear_strength:
    sample: uniform
    min: 0.6
    max: 1.05
  damping:
    sample: uniform
    min: 0.055
    max: 0.12
  advection_x:
    sample: uniform
    min: 0.08
    max: 0.2
  advection_y:
    sample: uniform
    min: -0.08
    max: 0.08
  advection_z: 0.0
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 42.0
    max: 50.0
  height:
    sample: uniform
    min: 30.0
    max: 34.0
  obstacle_center:
  - sample: uniform
    min: 18.0
    max: 28.0
  - sample: uniform
    min: 13.5
    max: 20.5
  obstacle_radius:
    sample: uniform
    min: 4.5
    max: 6.5
  mesh_size:
    sample: uniform
    min: 0.26
    max: 0.32
time:
  dt: 0.025
  t_end: 7.5
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.2
          cycles:
          - sample: uniform
            min: 0.08
            max: 0.16
          - sample: uniform
            min: 0.16
            max: 0.3
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: -0.4
            max: 0.5
        - amplitude:
            sample: uniform
            min: -0.14
            max: 0.14
          cycles:
          - sample: uniform
            min: 0.18
            max: 0.32
          - sample: uniform
            min: 0.06
            max: 0.16
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: 0.5
            max: 1.15
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: dirichlet
      value: 0.0
    obstacle:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 56
