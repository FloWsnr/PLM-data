preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.58
    max: 0.7
  hyperdiffusion:
    sample: uniform
    min: 0.78
    max: 1.05
  anti_diffusion:
    sample: uniform
    min: 1.2
    max: 1.75
  nonlinear_strength:
    sample: uniform
    min: 0.9
    max: 1.4
  damping:
    sample: uniform
    min: 0.008
    max: 0.035
  advection_x:
    sample: uniform
    min: 0.12
    max: 0.25
  advection_y:
    sample: uniform
    min: -0.04
    max: 0.04
  advection_z: 0.0
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 42.0
    max: 50.0
  height:
    sample: uniform
    min: 30.0
    max: 34.0
  obstacle_center:
  - sample: uniform
    min: 18.0
    max: 28.0
  - sample: uniform
    min: 14.0
    max: 20.0
  obstacle_radius:
    sample: uniform
    min: 4.0
    max: 6.0
  mesh_size:
    sample: uniform
    min: 0.26
    max: 0.32
time:
  dt: 0.035
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.2
            max: 0.58
          sigma:
            sample: uniform
            min: 1.4
            max: 3.2
          center:
          - sample: uniform
            min: 4.0
            max: 16.0
          - sample: uniform
            min: 8.0
            max: 24.0
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 4.0
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
    obstacle:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 55

