preset: kuramoto_sivashinsky
parameters:
  theta: 0.5
  hyperdiffusion: 1.0
  anti_diffusion: 1.0
  nonlinear_strength: 1.0
  damping: 0.03
  advection_x: 0.0
  advection_y: 0.0
  advection_z: 0.0
domain:
  type: box
  size: [16.0, 16.0, 16.0]
  mesh_resolution: [20, 20, 20]
time:
  $ref: time.ks_default
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std: 0.01
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
output:
  $ref: output.template.scalar_uv
  formats:
    $ref: output.formats.standard
  resolution: [16, 16, 16]
  num_frames: 5
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
