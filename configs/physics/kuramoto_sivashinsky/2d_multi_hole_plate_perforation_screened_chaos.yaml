preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.58
    max: 0.7
  hyperdiffusion:
    sample: uniform
    min: 0.82
    max: 1.15
  anti_diffusion:
    sample: uniform
    min: 1.08
    max: 1.6
  nonlinear_strength:
    sample: uniform
    min: 0.85
    max: 1.35
  damping:
    sample: uniform
    min: 0.006
    max: 0.032
  advection_x:
    sample: uniform
    min: -0.06
    max: 0.12
  advection_y:
    sample: uniform
    min: -0.08
    max: 0.08
  advection_z: 0.0
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 38.0
    max: 42.0
  height:
    sample: uniform
    min: 30.0
    max: 34.0
  holes:
  - center:
    - sample: uniform
      min: 8.8
      max: 10.5
    - sample: uniform
      min: 8.8
      max: 10.5
    radius:
      sample: uniform
      min: 2.0
      max: 2.8
  - center:
    - sample: uniform
      min: 20.0
      max: 22.0
    - sample: uniform
      min: 8.5
      max: 10.5
    radius:
      sample: uniform
      min: 2.0
      max: 2.8
  - center:
    - sample: uniform
      min: 14.0
      max: 16.0
    - sample: uniform
      min: 21.0
      max: 23.0
    radius:
      sample: uniform
      min: 2.0
      max: 2.8
  - center:
    - sample: uniform
      min: 29.0
      max: 31.0
    - sample: uniform
      min: 21.0
      max: 23.0
    radius:
      sample: uniform
      min: 2.0
      max: 2.8
  mesh_size:
    sample: uniform
    min: 0.26
    max: 0.32
time:
  dt: 0.04
  t_end: 14.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.01
          max: 0.01
        std:
          sample: uniform
          min: 0.035
          max: 0.08
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    holes:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 53

