preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.64
    max: 0.78
  hyperdiffusion:
    sample: uniform
    min: 0.98
    max: 1.32
  anti_diffusion:
    sample: uniform
    min: 0.9
    max: 1.4
  nonlinear_strength:
    sample: uniform
    min: 0.72
    max: 1.18
  damping:
    sample: uniform
    min: 0.035
    max: 0.085
  advection_x:
    sample: uniform
    min: -0.1
    max: -0.02
  advection_y:
    sample: uniform
    min: -0.04
    max: 0.04
  advection_z: 0.0
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 18.0
    max: 24.0
  branch_length:
    sample: uniform
    min: 24.0
    max: 32.0
  branch_angle_degrees:
    sample: uniform
    min: 30.0
    max: 44.0
  channel_width:
    sample: uniform
    min: 8.0
    max: 12.0
  mesh_size:
    sample: uniform
    min: 0.22
    max: 0.28
time:
  dt: 0.025
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: 0.22
            max: 0.55
          sigma:
            sample: uniform
            min: 1.1
            max: 2.4
          center:
          - sample: uniform
            min: 24.0
            max: 42.0
          - sample: uniform
            min: 5.0
            max: 15.0
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 4.0
        - count:
            sample: randint
            min: 1
            max: 2
          amplitude:
            sample: uniform
            min: -0.55
            max: -0.22
          sigma:
            sample: uniform
            min: 1.1
            max: 2.4
          center:
          - sample: uniform
            min: 24.0
            max: 42.0
          - sample: uniform
            min: -15.0
            max: -5.0
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 4.0
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: dirichlet
      value: 0.0
    outlet_lower:
    - operator: dirichlet
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 60
