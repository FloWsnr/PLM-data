preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.68
    max: 0.82
  hyperdiffusion:
    sample: uniform
    min: 1.05
    max: 1.4
  anti_diffusion:
    sample: uniform
    min: 0.78
    max: 1.22
  nonlinear_strength:
    sample: uniform
    min: 0.6
    max: 1.05
  damping:
    sample: uniform
    min: 0.055
    max: 0.12
  advection_x:
    sample: uniform
    min: -0.12
    max: 0.12
  advection_y:
    sample: uniform
    min: -0.05
    max: 0.05
  advection_z: 0.0
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -13.5
    max: -11.5
  - 0.0
  right_center:
  - sample: uniform
    min: 11.5
    max: 13.5
  - 0.0
  lobe_radius:
    sample: uniform
    min: 11.5
    max: 13.5
  neck_width:
    sample: uniform
    min: 3.2
    max: 5.2
  mesh_size:
    sample: uniform
    min: 0.27
    max: 0.33
time:
  dt: 0.025
  t_end: 7.5
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.2
          cycles:
          - sample: uniform
            min: 0.10
            max: 0.2
          - sample: uniform
            min: 0.18
            max: 0.32
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: -0.8
            max: 0.8
        - amplitude:
            sample: uniform
            min: -0.14
            max: 0.14
          cycles:
          - sample: uniform
            min: 0.18
            max: 0.3
          - sample: uniform
            min: 0.08
            max: 0.18
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: 0.6
            max: 1.2
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 50
