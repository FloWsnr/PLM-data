preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.58
    max: 0.72
  hyperdiffusion:
    sample: uniform
    min: 0.82
    max: 1.15
  anti_diffusion:
    sample: uniform
    min: 1.12
    max: 1.68
  nonlinear_strength:
    sample: uniform
    min: 0.9
    max: 1.42
  damping:
    sample: uniform
    min: 0.008
    max: 0.04
  advection_x:
    sample: uniform
    min: 0.08
    max: 0.18
  advection_y:
    sample: uniform
    min: -0.04
    max: 0.04
  advection_z: 0.0
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 18.0
    max: 24.0
  branch_length:
    sample: uniform
    min: 24.0
    max: 32.0
  branch_angle_degrees:
    sample: uniform
    min: 28.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 8.0
    max: 12.0
  mesh_size:
    sample: uniform
    min: 0.22
    max: 0.28
time:
  dt: 0.035
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.2
            max: 0.58
          sigma:
            sample: uniform
            min: 1.1
            max: 2.4
          center:
          - sample: uniform
            min: 2.0
            max: 14.0
          - sample: uniform
            min: -3.5
            max: 3.5
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 4.0
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet_upper:
    - operator: neumann
      value: 0.0
    outlet_lower:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 59

