preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.64
    max: 0.78
  hyperdiffusion:
    sample: uniform
    min: 0.98
    max: 1.32
  anti_diffusion:
    sample: uniform
    min: 0.9
    max: 1.38
  nonlinear_strength:
    sample: uniform
    min: 0.72
    max: 1.18
  damping:
    sample: uniform
    min: 0.035
    max: 0.085
  advection_x:
    sample: uniform
    min: 0.06
    max: 0.18
  advection_y:
    sample: uniform
    min: -0.06
    max: 0.06
  advection_z: 0.0
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 38.0
    max: 42.0
  height:
    sample: uniform
    min: 30.0
    max: 34.0
  holes:
  - center: [9.5, 9.5]
    radius:
      sample: uniform
      min: 2.2
      max: 3.0
  - center: [21.0, 9.5]
    radius:
      sample: uniform
      min: 2.2
      max: 3.0
  - center: [15.0, 22.0]
    radius:
      sample: uniform
      min: 2.2
      max: 3.0
  - center: [30.0, 22.0]
    radius:
      sample: uniform
      min: 2.2
      max: 3.0
  mesh_size:
    sample: uniform
    min: 0.26
    max: 0.32
time:
  dt: 0.025
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: -0.42
            max: 0.42
          sigma:
            sample: uniform
            min: 1.4
            max: 3.0
          center:
          - sample: uniform
            min: 5.0
            max: 34.0
          - sample: uniform
            min: 5.0
            max: 27.0
          aspect_ratio:
            sample: uniform
            min: 1.3
            max: 4.0
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    holes:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 54
