preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.55
    max: 0.65
  hyperdiffusion:
    sample: uniform
    min: 0.9
    max: 1.12
  anti_diffusion:
    sample: uniform
    min: 1.0
    max: 1.32
  nonlinear_strength:
    sample: uniform
    min: 0.85
    max: 1.18
  damping:
    sample: uniform
    min: 0.004
    max: 0.025
  advection_x:
    sample: uniform
    min: -0.04
    max: 0.04
  advection_y:
    sample: uniform
    min: -0.04
    max: 0.04
  advection_z: 0.0
domain:
  allow_sampling: true
  type: rectangle
  size:
  - sample: uniform
    min: 32.0
    max: 42.0
  - sample: uniform
    min: 32.0
    max: 42.0
  mesh_resolution: [128, 128]
time:
  dt: 0.05
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.005
          max: 0.005
        std:
          sample: uniform
          min: 0.015
          max: 0.045
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 42
