preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.64
    max: 0.78
  hyperdiffusion:
    sample: uniform
    min: 0.95
    max: 1.3
  anti_diffusion:
    sample: uniform
    min: 0.95
    max: 1.45
  nonlinear_strength:
    sample: uniform
    min: 0.75
    max: 1.2
  damping:
    sample: uniform
    min: 0.035
    max: 0.085
  advection_x:
    sample: uniform
    min: -0.08
    max: 0.08
  advection_y:
    sample: uniform
    min: -0.08
    max: 0.08
  advection_z: 0.0
domain:
  allow_sampling: true
  type: disk
  center:
  - sample: uniform
    min: -0.4
    max: 0.4
  - sample: uniform
    min: -0.4
    max: 0.4
  radius:
    sample: uniform
    min: 15.5
    max: 18.5
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.28
time:
  dt: 0.025
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.03
          max: 0.03
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.22
            max: 0.55
          sigma:
            sample: uniform
            min: 1.6
            max: 3.2
          center:
          - sample: uniform
            min: -8.0
            max: 8.0
          - sample: uniform
            min: -8.0
            max: 8.0
          aspect_ratio:
            sample: uniform
            min: 1.4
            max: 4.0
boundary_conditions:
  u:
    outer:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 46
