preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.64
    max: 0.78
  hyperdiffusion:
    sample: uniform
    min: 0.98
    max: 1.32
  anti_diffusion:
    sample: uniform
    min: 0.9
    max: 1.35
  nonlinear_strength:
    sample: uniform
    min: 0.72
    max: 1.18
  damping:
    sample: uniform
    min: 0.035
    max: 0.085
  advection_x:
    sample: uniform
    min: 0.03
    max: 0.14
  advection_y:
    sample: uniform
    min: -0.12
    max: 0.02
  advection_z: 0.0
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 31.0
    max: 37.0
  outer_height:
    sample: uniform
    min: 31.0
    max: 37.0
  cutout_width:
    sample: uniform
    min: 13.0
    max: 18.0
  cutout_height:
    sample: uniform
    min: 10.0
    max: 15.0
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.3
time:
  dt: 0.025
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.12
            max: 0.3
          cycles:
          - sample: uniform
            min: 0.08
            max: 0.18
          - sample: uniform
            min: 0.16
            max: 0.3
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: -0.5
            max: 0.4
        - amplitude:
            sample: uniform
            min: -0.22
            max: 0.22
          cycles:
          - sample: uniform
            min: 0.16
            max: 0.3
          - sample: uniform
            min: 0.08
            max: 0.16
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: 0.5
            max: 1.2
boundary_conditions:
  u:
    outer:
    - operator: neumann
      value: 0.0
    notch:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 52
