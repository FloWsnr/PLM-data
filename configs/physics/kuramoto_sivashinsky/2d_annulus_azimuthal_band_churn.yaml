preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.56
    max: 0.68
  hyperdiffusion:
    sample: uniform
    min: 0.82
    max: 1.12
  anti_diffusion:
    sample: uniform
    min: 1.08
    max: 1.58
  nonlinear_strength:
    sample: uniform
    min: 0.8
    max: 1.25
  damping:
    sample: uniform
    min: 0.006
    max: 0.028
  advection_x:
    sample: uniform
    min: -0.1
    max: 0.1
  advection_y:
    sample: uniform
    min: -0.1
    max: 0.1
  advection_z: 0.0
domain:
  allow_sampling: true
  type: annulus
  center:
  - sample: uniform
    min: -0.4
    max: 0.4
  - sample: uniform
    min: -0.4
    max: 0.4
  inner_radius:
    sample: uniform
    min: 4.5
    max: 6.5
  outer_radius:
    sample: uniform
    min: 16.0
    max: 18.5
  mesh_size:
    sample: uniform
    min: 0.24
    max: 0.3
time:
  dt: 0.045
  t_end: 15.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 3
            max: 5
          amplitude:
            sample: uniform
            min: -0.35
            max: 0.35
          sigma:
            sample: uniform
            min: 1.4
            max: 3.0
          center:
          - sample: uniform
            min: -11.0
            max: 11.0
          - sample: uniform
            min: -11.0
            max: 11.0
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 3.5
boundary_conditions:
  u:
    inner:
    - operator: neumann
      value: 0.0
    outer:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 47

