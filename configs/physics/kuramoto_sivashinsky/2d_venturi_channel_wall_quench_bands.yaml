preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.64
    max: 0.78
  hyperdiffusion:
    sample: uniform
    min: 0.98
    max: 1.32
  anti_diffusion:
    sample: uniform
    min: 0.9
    max: 1.38
  nonlinear_strength:
    sample: uniform
    min: 0.72
    max: 1.18
  damping:
    sample: uniform
    min: 0.04
    max: 0.09
  advection_x:
    sample: uniform
    min: 0.05
    max: 0.16
  advection_y:
    sample: uniform
    min: -0.06
    max: 0.06
  advection_z: 0.0
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 44.0
    max: 52.0
  height:
    sample: uniform
    min: 28.0
    max: 34.0
  throat_height:
    sample: uniform
    min: 9.0
    max: 14.0
  constriction_center_x:
    sample: uniform
    min: 20.0
    max: 28.0
  constriction_radius:
    sample: uniform
    min: 18.0
    max: 25.0
  mesh_size:
    sample: uniform
    min: 0.27
    max: 0.34
time:
  dt: 0.025
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.12
            max: 0.28
          cycles:
          - sample: uniform
            min: 0.08
            max: 0.18
          - sample: uniform
            min: 0.16
            max: 0.32
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: -0.5
            max: 0.45
        - amplitude:
            sample: uniform
            min: -0.2
            max: 0.2
          cycles:
          - sample: uniform
            min: 0.16
            max: 0.3
          - sample: uniform
            min: 0.08
            max: 0.18
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: 0.55
            max: 1.2
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 58
