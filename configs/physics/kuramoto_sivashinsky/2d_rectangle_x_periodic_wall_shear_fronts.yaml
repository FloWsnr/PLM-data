preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.64
    max: 0.78
  hyperdiffusion:
    sample: uniform
    min: 1.0
    max: 1.3
  anti_diffusion:
    sample: uniform
    min: 0.9
    max: 1.35
  nonlinear_strength:
    sample: uniform
    min: 0.7
    max: 1.15
  damping:
    sample: uniform
    min: 0.045
    max: 0.09
  advection_x:
    sample: uniform
    min: 0.12
    max: 0.24
  advection_y:
    sample: uniform
    min: -0.04
    max: 0.04
  advection_z: 0.0
domain:
  allow_sampling: true
  type: rectangle
  size:
  - sample: uniform
    min: 42.0
    max: 52.0
  - sample: uniform
    min: 22.0
    max: 30.0
  mesh_resolution: [160, 128]
time:
  dt: 0.03
  t_end: 9.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background: 0.0
        modes:
        - amplitude:
            sample: uniform
            min: 0.08
            max: 0.22
          cycles:
          - sample: uniform
            min: 0.08
            max: 0.16
          - sample: uniform
            min: 0.18
            max: 0.34
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: -0.4
            max: 0.4
        - amplitude:
            sample: uniform
            min: -0.14
            max: 0.14
          cycles:
          - sample: uniform
            min: 0.16
            max: 0.28
          - sample: uniform
            min: 0.06
            max: 0.14
          phase:
            sample: uniform
            min: 0.0
            max: 6.283
          angle:
            sample: uniform
            min: 0.55
            max: 1.15
boundary_conditions:
  u:
    x-:
    - operator: periodic
      pair_with: x+
    x+:
    - operator: periodic
      pair_with: x-
    y-:
    - operator: dirichlet
      value: 0.0
    y+:
    - operator: dirichlet
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 41
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 43
