preset: kuramoto_sivashinsky
parameters:
  theta:
    sample: uniform
    min: 0.58
    max: 0.7
  hyperdiffusion:
    sample: uniform
    min: 0.78
    max: 1.05
  anti_diffusion:
    sample: uniform
    min: 1.18
    max: 1.72
  nonlinear_strength:
    sample: uniform
    min: 0.9
    max: 1.42
  damping:
    sample: uniform
    min: 0.006
    max: 0.032
  advection_x:
    sample: uniform
    min: 0.16
    max: 0.3
  advection_y:
    sample: uniform
    min: -0.04
    max: 0.04
  advection_z: 0.0
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 44.0
    max: 52.0
  height:
    sample: uniform
    min: 28.0
    max: 34.0
  throat_height:
    sample: uniform
    min: 10.0
    max: 16.0
  constriction_center_x:
    sample: uniform
    min: 20.0
    max: 28.0
  constriction_radius:
    sample: uniform
    min: 17.0
    max: 24.0
  mesh_size:
    sample: uniform
    min: 0.27
    max: 0.34
time:
  dt: 0.035
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.02
        generators:
        - count:
            sample: randint
            min: 2
            max: 4
          amplitude:
            sample: uniform
            min: 0.22
            max: 0.6
          sigma:
            sample: uniform
            min: 1.4
            max: 3.0
          center:
          - sample: uniform
            min: 5.0
            max: 17.0
          - sample: uniform
            min: 7.0
            max: 25.0
          aspect_ratio:
            sample: uniform
            min: 1.2
            max: 4.2
boundary_conditions:
  u:
    inlet:
    - operator: neumann
      value: 0.0
    outlet:
    - operator: neumann
      value: 0.0
    walls:
    - operator: neumann
      value: 0.0
output:
  $ref: output.template.scalar_uv
  resolution: [128, 128]
  num_frames: 37
solver:
  $ref: solver.profile.nonlinear_mixed_direct_bt
seed: 57

