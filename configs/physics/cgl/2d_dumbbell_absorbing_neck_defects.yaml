preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.3
    max: 0.58
  D_i:
    sample: uniform
    min: -1.7
    max: -0.95
  a_r:
    sample: uniform
    min: 0.55
    max: 0.95
  a_i:
    sample: uniform
    min: 0.35
    max: 1.15
  b_r:
    sample: uniform
    min: -0.95
    max: -0.58
  b_i:
    sample: uniform
    min: 0.72
    max: 1.42
  theta:
    sample: uniform
    min: 0.56
    max: 0.7
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -20.0
      max: -17.0
    - 0.0
  right_center:
    - sample: uniform
      min: 17.0
      max: 20.0
    - 0.0
  lobe_radius:
    sample: uniform
    min: 16.0
    max: 20.0
  neck_width:
    sample: uniform
    min: 5.5
    max: 9.0
  mesh_size:
    sample: uniform
    min: 0.34
    max: 0.44
time:
  dt: 0.08
  t_end: 24.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.42
          max: 0.7
        modes:
          - amplitude:
              sample: uniform
              min: 0.28
              max: 0.52
            cycles:
              - sample: uniform
                min: 0.07
                max: 0.13
              - sample: uniform
                min: 0.05
                max: 0.12
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: -4.0
            max: 4.0
          - sample: uniform
            min: -3.0
            max: 3.0
        region_values:
          "00":
            sample: uniform
            min: -0.75
            max: -0.35
          "01":
            sample: uniform
            min: 0.35
            max: 0.78
          "10":
            sample: uniform
            min: 0.1
            max: 0.45
          "11":
            sample: uniform
            min: -0.35
            max: 0.05
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value: 0.0
  v:
    outer:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 842
