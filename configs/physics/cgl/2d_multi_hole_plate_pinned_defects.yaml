preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.45
    max: 0.82
  D_i:
    sample: uniform
    min: 1.05
    max: 1.95
  a_r:
    sample: uniform
    min: 0.62
    max: 1.05
  a_i:
    sample: uniform
    min: -0.15
    max: 0.45
  b_r:
    sample: uniform
    min: -1.05
    max: -0.72
  b_i:
    sample: uniform
    min: 0.8
    max: 1.55
  theta:
    sample: uniform
    min: 0.5
    max: 0.64
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 58.0
    max: 68.0
  height:
    sample: uniform
    min: 38.0
    max: 46.0
  holes:
    - center:
        - sample: uniform
          min: 13.0
          max: 17.0
        - sample: uniform
          min: 11.0
          max: 15.0
      radius:
        sample: uniform
        min: 3.0
        max: 4.8
      boundary_name: holes
    - center:
        - sample: uniform
          min: 30.0
          max: 35.0
        - sample: uniform
          min: 23.0
          max: 29.0
      radius:
        sample: uniform
        min: 3.2
        max: 5.0
      boundary_name: holes
    - center:
        - sample: uniform
          min: 45.0
          max: 52.0
        - sample: uniform
          min: 10.0
          max: 16.0
      radius:
        sample: uniform
        min: 2.8
        max: 4.5
      boundary_name: holes
    - center:
        - sample: uniform
          min: 18.0
          max: 24.0
        - sample: uniform
          min: 27.0
          max: 34.0
      radius:
        sample: uniform
        min: 2.8
        max: 4.4
      boundary_name: holes
  mesh_size:
    sample: uniform
    min: 0.32
    max: 0.42
time:
  dt: 0.09
  t_end: 27.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.28
          max: 0.48
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: 0.35
              max: 0.8
            sigma:
              sample: uniform
              min: 2.0
              max: 4.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.0
            center:
              - sample: uniform
                min: 8.0
                max: 56.0
              - sample: uniform
                min: 7.0
                max: 36.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        generators:
          - count:
              sample: randint
              min: 5
              max: 9
            amplitude:
              sample: uniform
              min: -0.65
              max: 0.65
            sigma:
              sample: uniform
              min: 1.8
              max: 4.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 8.0
                max: 56.0
              - sample: uniform
                min: 7.0
                max: 36.0
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    holes:
      - operator: dirichlet
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    holes:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1142
