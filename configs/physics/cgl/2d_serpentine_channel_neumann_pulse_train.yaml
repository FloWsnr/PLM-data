preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.72
    max: 1.02
  D_i:
    sample: uniform
    min: 1.55
    max: 2.45
  a_r:
    sample: uniform
    min: 0.78
    max: 1.18
  a_i:
    sample: uniform
    min: -0.22
    max: 0.22
  b_r:
    sample: uniform
    min: -1.16
    max: -0.86
  b_i:
    sample: uniform
    min: 1.12
    max: 1.82
  theta:
    sample: uniform
    min: 0.5
    max: 0.6
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 42.0
    max: 52.0
  lane_spacing:
    sample: uniform
    min: 10.5
    max: 13.5
  n_bends:
    sample: randint
    min: 4
    max: 6
  channel_width:
    sample: uniform
    min: 5.4
    max: 7.2
  mesh_size:
    sample: uniform
    min: 0.32
    max: 0.42
time:
  dt: 0.1
  t_end: 34.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.68
          max: 0.94
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.36
            cycles:
              - sample: uniform
                min: 0.08
                max: 0.16
              - sample: uniform
                min: 0.06
                max: 0.13
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.4
              max: 0.4
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.06
          max: 0.06
        std:
          sample: uniform
          min: 0.08
          max: 0.18
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1642
