preset: cgl
parameters:
  # Canonical CGL: D_r=1, D_i=b, a_r=r, a_i=0, b_r=-1, b_i=-c
  # Using r=1, b=2, c=-1.2 => 1+bc = -1.4 < 0 (Benjamin-Feir unstable)
  D_r: 1.0
  D_i: 2.0
  a_r: 1.0
  a_i: 0.0
  b_r: -1.0
  b_i: 1.2
  theta: 0.5
domain:
  type: box
  size: [50.0, 50.0, 50.0]
  mesh_resolution: [20, 20, 20]
time:
  dt: 0.1
  t_end: 50.0
inputs:
  u:
    initial_condition:
      type: random_perturbation
      params:
        mean: 1.0
        std: 0.05
  v:
    initial_condition:
      type: random_perturbation
      params:
        mean: 0.0
        std: 0.05
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
  v:
    $ref: boundary_field.scalar.full_periodic_3d
output:
  $ref: output.template.cgl
  formats:
    $ref: output.formats.numpy
  resolution: [32, 32, 32]
  num_frames: 5
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
