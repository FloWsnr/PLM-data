preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.28
    max: 0.58
  D_i:
    sample: uniform
    min: 0.85
    max: 1.65
  a_r:
    sample: uniform
    min: 0.5
    max: 0.92
  a_i:
    sample: uniform
    min: 0.55
    max: 1.35
  b_r:
    sample: uniform
    min: -0.98
    max: -0.62
  b_i:
    sample: uniform
    min: 0.62
    max: 1.35
  theta:
    sample: uniform
    min: 0.54
    max: 0.68
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 42.0
    max: 52.0
  lane_spacing:
    sample: uniform
    min: 10.5
    max: 13.0
  n_bends:
    sample: randint
    min: 4
    max: 6
  channel_width:
    sample: uniform
    min: 5.4
    max: 7.2
  mesh_size:
    sample: uniform
    min: 0.32
    max: 0.42
time:
  dt: 0.08
  t_end: 24.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.18
          max: 0.36
        generators:
          - count:
              sample: randint
              min: 4
              max: 8
            amplitude:
              sample: uniform
              min: 0.38
              max: 0.86
            sigma:
              sample: uniform
              min: 1.8
              max: 3.8
            aspect_ratio:
              sample: uniform
              min: 1.3
              max: 3.5
            center:
              - sample: uniform
                min: 5.0
                max: 42.0
              - sample: uniform
                min: -2.0
                max: 42.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.05
          max: 0.05
        std:
          sample: uniform
          min: 0.04
          max: 0.12
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.75
              max: 1.05
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.0
              max: 0.25
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.25
              max: 0.7
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.5
              max: -0.15
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1542
