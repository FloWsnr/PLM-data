preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.3
    max: 0.62
  D_i:
    sample: uniform
    min: -1.35
    max: -0.62
  a_r:
    sample: uniform
    min: 0.52
    max: 0.92
  a_i:
    sample: uniform
    min: 0.55
    max: 1.35
  b_r:
    sample: uniform
    min: -0.98
    max: -0.62
  b_i:
    sample: uniform
    min: -1.25
    max: -0.48
  theta:
    sample: uniform
    min: 0.56
    max: 0.7
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 48.0
    max: 58.0
  outer_height:
    sample: uniform
    min: 50.0
    max: 64.0
  cutout_width:
    sample: uniform
    min: 20.0
    max: 28.0
  cutout_height:
    sample: uniform
    min: 18.0
    max: 26.0
  mesh_size:
    sample: uniform
    min: 0.34
    max: 0.44
time:
  dt: 0.08
  t_end: 23.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.45
          max: 0.72
        modes:
          - amplitude:
              sample: uniform
              min: 0.28
              max: 0.56
            cycles:
              - sample: uniform
                min: 0.07
                max: 0.14
              - sample: uniform
                min: 0.07
                max: 0.14
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.75
              max: 0.75
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        modes:
          - amplitude:
              sample: uniform
              min: 0.32
              max: 0.62
            cycles:
              - sample: uniform
                min: 0.04
                max: 0.1
              - sample: uniform
                min: 0.1
                max: 0.18
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.6
              max: 0.6
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1042
