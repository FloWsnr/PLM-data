          - amplitude:
              sample: uniform
              min: 0.22
              max: 0.48
            cycles:
              - sample: uniform
                min: 0.08
                max: 0.15
              - sample: uniform
                min: 0.06
                max: 0.13
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.75
              max: 0.75
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.2
            cycles:
              - sample: uniform
                min: 0.02
                max: 0.07
              - sample: uniform
                min: 0.11
                max: 0.2
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.35
              max: 0.35
