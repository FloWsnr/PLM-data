              sample: uniform
              min: 0.0
              max: 0.9
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.55
              max: 0.9
    holes:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.2
              max: 0.2
    holes:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1242
