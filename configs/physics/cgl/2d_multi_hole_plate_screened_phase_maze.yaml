    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.08
          max: 0.08
        modes:
          - amplitude:
              sample: uniform
              min: 0.28
              max: 0.58
            cycles:
              - sample: uniform
                min: 0.05
