preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.25
    max: 0.54
  D_i:
    sample: uniform
    min: -1.35
    max: -0.65
  a_r:
    sample: uniform
    min: 0.44
    max: 0.82
  a_i:
    sample: uniform
    min: 0.72
    max: 1.5
  b_r:
    sample: uniform
    min: -0.9
    max: -0.54
  b_i:
    sample: uniform
    min: -1.2
    max: -0.5
  theta:
    sample: uniform
    min: 0.56
    max: 0.7
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 66.0
    max: 80.0
  height:
    sample: uniform
    min: 34.0
    max: 42.0
  obstacle_center:
    - sample: uniform
      min: 27.0
      max: 38.0
    - sample: uniform
      min: 14.0
      max: 25.0
  obstacle_radius:
    sample: uniform
    min: 4.5
    max: 7.5
  mesh_size:
    sample: uniform
    min: 0.34
    max: 0.44
time:
  dt: 0.08
  t_end: 22.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.2
          max: 0.4
        generators:
          - count:
              sample: randint
              min: 3
              max: 6
            amplitude:
              sample: uniform
              min: 0.38
              max: 0.82
            sigma:
              sample: uniform
              min: 2.5
              max: 5.0
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 3.4
            center:
              - sample: uniform
                min: 8.0
                max: 60.0
              - sample: uniform
                min: 8.0
                max: 28.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.04
          max: 0.04
        std:
          sample: uniform
          min: 0.04
          max: 0.12
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.75
              max: 1.08
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.25
              max: 0.65
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1442
