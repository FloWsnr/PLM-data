preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.52
    max: 0.9
  D_i:
    sample: uniform
    min: 1.2
    max: 2.1
  a_r:
    sample: uniform
    min: 0.68
    max: 1.08
  a_i:
    sample: uniform
    min: -0.2
    max: 0.4
  b_r:
    sample: uniform
    min: -1.1
    max: -0.76
  b_i:
    sample: uniform
    min: 0.92
    max: 1.58
  theta:
    sample: uniform
    min: 0.5
    max: 0.62
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 66.0
    max: 78.0
  height:
    sample: uniform
    min: 34.0
    max: 42.0
  obstacle_center:
    - sample: uniform
      min: 27.0
      max: 38.0
    - sample: uniform
      min: 15.0
      max: 25.0
  obstacle_radius:
    sample: uniform
    min: 5.0
    max: 8.0
  mesh_size:
    sample: uniform
    min: 0.34
    max: 0.44
time:
  dt: 0.1
  t_end: 30.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.55
          max: 0.82
        std:
          sample: uniform
          min: 0.06
          max: 0.15
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.05
        modes:
          - amplitude:
              sample: uniform
              min: 0.2
              max: 0.45
            cycles:
              - sample: uniform
                min: 0.07
                max: 0.13
              - sample: uniform
                min: 0.05
                max: 0.11
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.35
              max: 0.65
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1342
