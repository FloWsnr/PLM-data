preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.78
    max: 1.05
  D_i:
    sample: uniform
    min: 1.35
    max: 2.15
  a_r:
    sample: uniform
    min: 0.75
    max: 1.15
  a_i:
    sample: uniform
    min: -0.22
    max: 0.22
  b_r:
    sample: uniform
    min: -1.2
    max: -0.9
  b_i:
    sample: uniform
    min: 1.15
    max: 1.75
  theta:
    sample: uniform
    min: 0.5
    max: 0.6
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
    - sample: uniform
      min: 58.0
      max: 72.0
    - 0.0
  axis_y:
    - sample: uniform
      min: 12.0
      max: 28.0
    - sample: uniform
      min: 54.0
      max: 70.0
  mesh_resolution: [160, 160]
time:
  dt: 0.12
  t_end: 34.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.78
          max: 1.06
        std:
          sample: uniform
          min: 0.05
          max: 0.14
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        modes:
          - amplitude:
              sample: uniform
              min: 0.04
              max: 0.14
            cycles:
              - sample: uniform
                min: 0.07
                max: 0.13
              - sample: uniform
                min: 0.03
                max: 0.09
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.65
              max: 0.65
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 61
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
