preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.26
    max: 0.55
  D_i:
    sample: uniform
    min: 0.85
    max: 1.7
  a_r:
    sample: uniform
    min: 0.48
    max: 0.9
  a_i:
    sample: uniform
    min: 0.65
    max: 1.45
  b_r:
    sample: uniform
    min: -0.95
    max: -0.58
  b_i:
    sample: uniform
    min: 0.62
    max: 1.35
  theta:
    sample: uniform
    min: 0.54
    max: 0.68
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 32.0
    max: 42.0
  branch_length:
    sample: uniform
    min: 34.0
    max: 44.0
  branch_angle_degrees:
    sample: uniform
    min: 30.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 8.5
    max: 11.0
  mesh_size:
    sample: uniform
    min: 0.22
    max: 0.3
time:
  dt: 0.08
  t_end: 24.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.15
          max: 0.32
        generators:
          - count:
              sample: randint
              min: 3
              max: 6
            amplitude:
              sample: uniform
              min: 0.42
              max: 0.9
            sigma:
              sample: uniform
              min: 2.0
              max: 4.2
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 3.2
            center:
              - sample: uniform
                min: 4.0
                max: 44.0
              - sample: uniform
                min: -12.0
                max: 12.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.04
          max: 0.04
        std:
          sample: uniform
          min: 0.04
          max: 0.12
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.78
              max: 1.08
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.0
              max: 0.22
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.0
              max: 0.22
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.2
              max: 0.62
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: -0.55
              max: -0.18
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.18
              max: 0.55
    walls:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 49
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 1742
