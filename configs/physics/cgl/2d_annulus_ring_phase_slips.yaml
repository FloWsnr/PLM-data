preset: cgl
parameters:
  domain_center_x:
    sample: uniform
    min: -1.4
    max: 1.4
  domain_center_y:
    sample: uniform
    min: -1.4
    max: 1.4
  D_r:
    sample: uniform
    min: 0.58
    max: 0.92
  D_i:
    sample: uniform
    min: 1.55
    max: 2.45
  a_r:
    sample: uniform
    min: 0.72
    max: 1.15
  a_i:
    sample: uniform
    min: -0.28
    max: 0.28
  b_r:
    sample: uniform
    min: -1.18
    max: -0.84
  b_i:
    sample: uniform
    min: 1.05
    max: 1.82
  theta:
    sample: uniform
    min: 0.5
    max: 0.62
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 7.0
    max: 11.0
  outer_radius:
    sample: uniform
    min: 27.0
    max: 33.0
  mesh_size:
    sample: uniform
    min: 0.36
    max: 0.46
time:
  dt: 0.1
  t_end: 34.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.48
          max: 0.72
        amplitude:
          sample: uniform
          min: 0.28
          max: 0.52
        frequency:
          sample: uniform
          min: 0.42
          max: 0.68
        center: ["param:domain_center_x", "param:domain_center_y"]
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        modes:
          - amplitude:
              sample: uniform
              min: 0.24
              max: 0.46
            cycles:
              - sample: uniform
                min: 0.08
                max: 0.15
              - sample: uniform
                min: 0.08
                max: 0.15
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307179586
            angle:
              sample: uniform
              min: -0.8
              max: 0.8
boundary_conditions:
  u:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  v:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 542
