preset: cgl
parameters:
  # Canonical CGL-like Benjamin-Feir regime: D_i * b_i > D_r.
  D_r:
    sample: uniform
    min: 0.85
    max: 1.1
  D_i:
    sample: uniform
    min: 1.7
    max: 2.4
  a_r:
    sample: uniform
    min: 0.82
    max: 1.18
  a_i:
    sample: uniform
    min: -0.16
    max: 0.16
  b_r:
    sample: uniform
    min: -1.16
    max: -0.86
  b_i:
    sample: uniform
    min: 1.02
    max: 1.48
  theta:
    sample: uniform
    min: 0.5
    max: 0.6
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 56.0
      max: 72.0
    - sample: uniform
      min: 56.0
      max: 72.0
  mesh_resolution: [160, 160]
time:
  dt: 0.12
  t_end: 36.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.82
          max: 1.08
        std:
          sample: uniform
          min: 0.045
          max: 0.13
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.06
          max: 0.06
        std:
          sample: uniform
          min: 0.045
          max: 0.13
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 61
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 42
