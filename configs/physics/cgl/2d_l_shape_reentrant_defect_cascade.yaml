preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.55
    max: 0.9
  D_i:
    sample: uniform
    min: 1.2
    max: 2.05
  a_r:
    sample: uniform
    min: 0.68
    max: 1.08
  a_i:
    sample: uniform
    min: -0.25
    max: 0.35
  b_r:
    sample: uniform
    min: -1.08
    max: -0.78
  b_i:
    sample: uniform
    min: 0.88
    max: 1.52
  theta:
    sample: uniform
    min: 0.5
    max: 0.62
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 50.0
    max: 60.0
  outer_height:
    sample: uniform
    min: 50.0
    max: 62.0
  cutout_width:
    sample: uniform
    min: 18.0
    max: 26.0
  cutout_height:
    sample: uniform
    min: 18.0
    max: 28.0
  mesh_size:
    sample: uniform
    min: 0.34
    max: 0.44
time:
  dt: 0.1
  t_end: 30.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.25
          max: 0.45
        generators:
          - count:
              sample: randint
              min: 4
              max: 8
            amplitude:
              sample: uniform
              min: 0.45
              max: 0.95
            sigma:
              sample: uniform
              min: 2.4
              max: 5.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 3.0
            center:
              - sample: uniform
                min: 8.0
                max: 42.0
              - sample: uniform
                min: 8.0
                max: 42.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.08
          max: 0.08
        std:
          sample: uniform
          min: 0.06
          max: 0.16
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 942
