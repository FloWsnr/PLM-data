preset: cgl
parameters:
  D_r:
    sample: uniform
    min: 0.62
    max: 0.98
  D_i:
    sample: uniform
    min: 1.15
    max: 2.05
  a_r:
    sample: uniform
    min: 0.74
    max: 1.18
  a_i:
    sample: uniform
    min: -0.22
    max: 0.42
  b_r:
    sample: uniform
    min: -1.15
    max: -0.82
  b_i:
    sample: uniform
    min: 0.88
    max: 1.55
  theta:
    sample: uniform
    min: 0.5
    max: 0.62
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -21.0
      max: -18.0
    - 0.0
  right_center:
    - sample: uniform
      min: 18.0
      max: 21.0
    - 0.0
  lobe_radius:
    sample: uniform
    min: 17.0
    max: 21.0
  neck_width:
    sample: uniform
    min: 7.0
    max: 12.0
  mesh_size:
    sample: uniform
    min: 0.36
    max: 0.46
time:
  dt: 0.1
  t_end: 32.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.28
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.72
              max: 1.12
            sigma:
              sample: uniform
              min: 3.0
              max: 5.8
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 3.0
            center:
              - sample: uniform
                min: -28.0
                max: -8.0
              - sample: uniform
                min: -10.0
                max: 10.0
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: 0.25
              max: 0.65
            sigma:
              sample: uniform
              min: 3.5
              max: 7.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.3
            center:
              - sample: uniform
                min: 8.0
                max: 28.0
              - sample: uniform
                min: -10.0
                max: 10.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.04
          max: 0.04
        generators:
          - count:
              sample: randint
              min: 2
              max: 5
            amplitude:
              sample: uniform
              min: -0.95
              max: 0.95
            sigma:
              sample: uniform
              min: 2.8
              max: 5.5
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 2.8
            center:
              - sample: uniform
                min: -27.0
                max: 27.0
              - sample: uniform
                min: -10.0
                max: 10.0
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 742
