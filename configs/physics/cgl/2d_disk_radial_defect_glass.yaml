preset: cgl
parameters:
  domain_center_x:
    sample: uniform
    min: -1.8
    max: 1.8
  domain_center_y:
    sample: uniform
    min: -1.8
    max: 1.8
  D_r:
    sample: uniform
    min: 0.62
    max: 0.95
  D_i:
    sample: uniform
    min: 1.35
    max: 2.25
  a_r:
    sample: uniform
    min: 0.7
    max: 1.12
  a_i:
    sample: uniform
    min: -0.35
    max: 0.35
  b_r:
    sample: uniform
    min: -1.12
    max: -0.82
  b_i:
    sample: uniform
    min: 0.95
    max: 1.72
  theta:
    sample: uniform
    min: 0.5
    max: 0.62
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 24.0
    max: 30.0
  mesh_size:
    sample: uniform
    min: 0.34
    max: 0.42
time:
  dt: 0.1
  t_end: 32.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.45
          max: 0.72
        amplitude:
          sample: uniform
          min: 0.32
          max: 0.58
        frequency:
          sample: uniform
          min: 0.32
          max: 0.58
        center:
          - sample: uniform
            min: -2.5
            max: 2.5
          - sample: uniform
            min: -2.5
            max: 2.5
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.06
          max: 0.06
        generators:
          - count:
              sample: randint
              min: 4
              max: 8
            amplitude:
              sample: uniform
              min: -0.45
              max: 0.45
            sigma:
              sample: uniform
              min: 2.2
              max: 4.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.7
            center:
              - sample: uniform
                min: -13.0
                max: 13.0
              - sample: uniform
                min: -13.0
                max: 13.0
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
output:
  $ref: output.template.cgl
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 55
solver:
  $ref: solver.profile.nonlinear_mixed_direct
seed: 342
