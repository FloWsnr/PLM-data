preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 0.78
    max: 1.2
  mu_r:
    sample: uniform
    min: 0.78
    max: 1.18
  sigma:
    sample: uniform
    min: 0.005
    max: 0.032
  pulse_amplitude:
    sample: uniform
    min: 3.8
    max: 6.8
  pulse_frequency:
    sample: uniform
    min: 9.0
    max: 15.0
  pulse_width:
    sample: uniform
    min: 0.038
    max: 0.07
  pulse_delay:
    sample: uniform
    min: 0.08
    max: 0.16
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.25
    max: 2.6
  height:
    sample: uniform
    min: 0.96
    max: 1.1
  throat_height:
    sample: uniform
    min: 0.5
    max: 0.66
  constriction_center_x:
    sample: uniform
    min: 1.08
    max: 1.36
  constriction_radius:
    sample: uniform
    min: 0.68
    max: 0.9
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.021
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.28
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            center:
            - sample: uniform
              min: 0.22
              max: 0.42
            - sample: uniform
              min: 0.42
              max: 0.62
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.28
              max: 0.28
            sigma:
              sample: uniform
              min: 0.065
              max: 0.105
            center:
            - sample: uniform
              min: 0.3
              max: 0.52
            - sample: uniform
              min: 0.36
              max: 0.68
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.1
              max: 0.1
            sigma:
              sample: uniform
              min: 0.1
              max: 0.18
            center:
            - sample: uniform
              min: 0.55
              max: 0.9
            - sample: uniform
              min: 0.32
              max: 0.72
            wavevector:
            - sample: uniform
              min: 9.0
              max: 17.0
            - sample: uniform
              min: -5.0
              max: 5.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.004
              max: 0.013
boundary_conditions:
  electric_field:
    inlet:
    - operator: absorbing
      value:
        type: zero
        params: {}
    outlet:
    - operator: absorbing
      value:
        type: zero
        params: {}
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.005
  t_end: 0.82
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [224, 128]
  num_frames: 57
seed: 66

