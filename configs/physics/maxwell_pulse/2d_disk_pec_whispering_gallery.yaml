preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 1.1
    max: 1.85
  mu_r:
    sample: uniform
    min: 0.95
    max: 1.4
  sigma:
    sample: uniform
    min: 0.012
    max: 0.045
  pulse_amplitude:
    sample: uniform
    min: 2.4
    max: 4.6
  pulse_frequency:
    sample: uniform
    min: 6.0
    max: 10.5
  pulse_width:
    sample: uniform
    min: 0.07
    max: 0.12
  pulse_delay:
    sample: uniform
    min: 0.18
    max: 0.31
domain:
  allow_sampling: true
  type: disk
  center:
  - sample: uniform
    min: -0.03
    max: 0.03
  - sample: uniform
    min: -0.03
    max: 0.03
  radius:
    sample: uniform
    min: 0.9
    max: 1.02
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.5
              max: 0.95
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            center:
            - sample: uniform
              min: 0.46
              max: 0.68
            - sample: uniform
              min: 0.12
              max: 0.34
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.45
              max: 0.85
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            center:
            - sample: uniform
              min: 0.3
              max: 0.56
            - sample: uniform
              min: 0.34
              max: 0.58
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.13
              max: -0.06
            sigma:
              sample: uniform
              min: 0.1
              max: 0.18
            center:
            - sample: uniform
              min: -0.2
              max: 0.08
            - sample: uniform
              min: 0.45
              max: 0.68
            wavevector:
            - sample: uniform
              min: 4.0
              max: 9.0
            - sample: uniform
              min: 10.0
              max: 18.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.055
                max: 0.055
              cycles:
              - sample: uniform
                min: 2.0
                max: 4.0
              - sample: uniform
                min: 3.0
                max: 6.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: -0.8
                max: 0.8
boundary_conditions:
  electric_field:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.006
  t_end: 0.96
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [160, 160]
  num_frames: 61
seed: 55

