preset: maxwell_pulse
parameters:
  epsilon_r: 1.0
  mu_r: 1.0
  sigma: 0.05
  pulse_amplitude: 4.0
  pulse_frequency: 8.0
  pulse_width: 0.06
  pulse_delay: 0.18
domain:
  type: rectangle
  size:
  - 1.0
  - 1.0
  mesh_resolution:
  - 32
  - 32
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: 1.0
            sigma: 0.05
            center:
            - 0.25
            - 0.5
        y:
          type: zero
          params: {}
    initial_condition:
      components:
        x:
          type: gaussian_noise
          params:
            mean: 0.0
            std: 0.03
        y:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  electric_field:
    x-:
    - operator: absorbing
      value:
        type: zero
        params: {}
    x+:
    - operator: absorbing
      value:
        type: zero
        params: {}
    y-:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
    y+:
    - operator: dirichlet
      value:
      - 0.0
      - 0.0
time:
  dt: 0.01
  t_end: 0.4
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  $ref: output.template.electric_field
  resolution:
  - 64
  - 64
  num_frames: 12
seed: 42
