preset: maxwell_pulse
parameters:
  dumbbell_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  epsilon_r:
    sample: uniform
    min: 0.78
    max: 1.22
  mu_r:
    sample: uniform
    min: 0.82
    max: 1.2
  sigma:
    sample: uniform
    min: 0.004
    max: 0.025
  pulse_amplitude:
    sample: uniform
    min: 4.2
    max: 7.0
  pulse_frequency:
    sample: uniform
    min: 8.0
    max: 13.5
  pulse_width:
    sample: uniform
    min: 0.045
    max: 0.08
  pulse_delay:
    sample: uniform
    min: 0.08
    max: 0.17
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -0.76
    max: -0.62
  - "param:dumbbell_center_y"
  right_center:
  - sample: uniform
    min: 0.62
    max: 0.76
  - "param:dumbbell_center_y"
  lobe_radius:
    sample: uniform
    min: 0.39
    max: 0.48
  neck_width:
    sample: uniform
    min: 0.16
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.023
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.35
            sigma:
              sample: uniform
              min: 0.048
              max: 0.08
            center:
            - sample: uniform
              min: -0.82
              max: -0.55
            - sample: uniform
              min: -0.12
              max: 0.12
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.3
              max: 0.3
            sigma:
              sample: uniform
              min: 0.065
              max: 0.11
            center:
            - sample: uniform
              min: -0.72
              max: -0.46
            - sample: uniform
              min: -0.22
              max: 0.22
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            center:
            - sample: uniform
              min: -0.78
              max: -0.52
            - sample: uniform
              min: 0.08
              max: 0.28
            wavevector:
            - sample: uniform
              min: 10.0
              max: 18.0
            - sample: uniform
              min: -4.0
              max: 4.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.004
              max: 0.012
boundary_conditions:
  electric_field:
    outer:
    - operator: absorbing
      value:
        type: zero
        params: {}
time:
  dt: 0.005
  t_end: 0.82
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [192, 128]
  num_frames: 57
seed: 58

