preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 1.08
    max: 1.75
  mu_r:
    sample: uniform
    min: 0.88
    max: 1.3
  sigma:
    sample: uniform
    min: 0.018
    max: 0.06
  pulse_amplitude:
    sample: uniform
    min: 2.2
    max: 4.4
  pulse_frequency:
    sample: uniform
    min: 5.0
    max: 9.0
  pulse_width:
    sample: uniform
    min: 0.08
    max: 0.14
  pulse_delay:
    sample: uniform
    min: 0.16
    max: 0.3
domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 2.2
    max: 2.55
  height:
    sample: uniform
    min: 0.98
    max: 1.12
  throat_height:
    sample: uniform
    min: 0.44
    max: 0.6
  constriction_center_x:
    sample: uniform
    min: 1.0
    max: 1.28
  constriction_radius:
    sample: uniform
    min: 0.72
    max: 0.95
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.021
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.9
              max: -0.48
            sigma:
              sample: uniform
              min: 0.055
              max: 0.09
            center:
            - sample: uniform
              min: 1.55
              max: 1.95
            - sample: uniform
              min: 0.36
              max: 0.72
        y:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.3
            frequency:
              sample: uniform
              min: 11.0
              max: 19.0
            center:
            - sample: uniform
              min: 1.02
              max: 1.3
            - sample: uniform
              min: 0.44
              max: 0.62
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.05
                max: 0.05
              cycles:
              - sample: uniform
                min: 2.0
                max: 5.0
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: -0.45
                max: 0.45
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 1
                max: 3
              amplitude:
                sample: uniform
                min: -0.07
                max: 0.07
              sigma:
                sample: uniform
                min: 0.07
                max: 0.13
              aspect_ratio:
                sample: uniform
                min: 1.2
                max: 2.1
              center:
              - sample: uniform
                min: 0.45
                max: 1.75
              - sample: uniform
                min: 0.24
                max: 0.82
boundary_conditions:
  electric_field:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: absorbing
      value:
        type: zero
        params: {}
    walls:
    - operator: absorbing
      value:
        type: zero
        params: {}
time:
  dt: 0.006
  t_end: 0.96
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [224, 128]
  num_frames: 61
seed: 67

