preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 1.05
    max: 1.75
  mu_r:
    sample: uniform
    min: 0.88
    max: 1.32
  sigma:
    sample: uniform
    min: 0.018
    max: 0.06
  pulse_amplitude:
    sample: uniform
    min: 2.4
    max: 4.6
  pulse_frequency:
    sample: uniform
    min: 5.0
    max: 9.0
  pulse_width:
    sample: uniform
    min: 0.075
    max: 0.13
  pulse_delay:
    sample: uniform
    min: 0.16
    max: 0.3
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.2
    max: 2.55
  height:
    sample: uniform
    min: 0.92
    max: 1.1
  obstacle_center:
  - sample: uniform
    min: 0.9
    max: 1.18
  - sample: uniform
    min: 0.42
    max: 0.66
  obstacle_radius:
    sample: uniform
    min: 0.13
    max: 0.19
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.021
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.9
              max: -0.5
            sigma:
              sample: uniform
              min: 0.055
              max: 0.09
            center:
            - sample: uniform
              min: 1.55
              max: 1.95
            - sample: uniform
              min: 0.34
              max: 0.7
        y:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.3
            frequency:
              sample: uniform
              min: 10.0
              max: 18.0
            center:
            - sample: uniform
              min: 1.1
              max: 1.45
            - sample: uniform
              min: 0.42
              max: 0.62
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.05
                max: 0.05
              cycles:
              - sample: uniform
                min: 2.0
                max: 5.0
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: -0.5
                max: 0.5
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 1
                max: 3
              amplitude:
                sample: uniform
                min: -0.07
                max: 0.07
              sigma:
                sample: uniform
                min: 0.07
                max: 0.13
              aspect_ratio:
                sample: uniform
                min: 1.2
                max: 2.2
              center:
              - sample: uniform
                min: 0.38
                max: 1.8
              - sample: uniform
                min: 0.24
                max: 0.78
boundary_conditions:
  electric_field:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet:
    - operator: absorbing
      value:
        type: zero
        params: {}
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
    obstacle:
    - operator: absorbing
      value:
        type: zero
        params: {}
time:
  dt: 0.006
  t_end: 0.96
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [224, 128]
  num_frames: 61
seed: 65
