preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 0.85
    max: 1.22
  mu_r:
    sample: uniform
    min: 0.82
    max: 1.18
  sigma:
    sample: uniform
    min: 0.006
    max: 0.03
  pulse_amplitude:
    sample: uniform
    min: 3.4
    max: 6.0
  pulse_frequency:
    sample: uniform
    min: 8.5
    max: 13.5
  pulse_width:
    sample: uniform
    min: 0.042
    max: 0.078
  pulse_delay:
    sample: uniform
    min: 0.1
    max: 0.19
domain:
  allow_sampling: true
  type: annulus
  center:
  - sample: uniform
    min: -0.04
    max: 0.04
  - sample: uniform
    min: -0.04
    max: 0.04
  inner_radius:
    sample: uniform
    min: 0.26
    max: 0.36
  outer_radius:
    sample: uniform
    min: 0.92
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.02
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.25
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            center:
            - sample: uniform
              min: 0.46
              max: 0.64
            - sample: uniform
              min: -0.09
              max: 0.12
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.55
              max: -0.25
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            center:
            - sample: uniform
              min: 0.32
              max: 0.52
            - sample: uniform
              min: 0.28
              max: 0.48
    initial_condition:
      components:
        x:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: -0.05
              max: 0.05
            frequency:
              sample: uniform
              min: 10.0
              max: 18.0
            center: [0.0, 0.0]
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.003
              max: 0.01
boundary_conditions:
  electric_field:
    inner:
    - operator: dirichlet
      value: [0.0, 0.0]
    outer:
    - operator: absorbing
      value:
        type: zero
        params: {}
time:
  dt: 0.005
  t_end: 0.72
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [160, 160]
  num_frames: 57
seed: 56

