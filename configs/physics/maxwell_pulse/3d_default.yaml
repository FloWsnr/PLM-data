preset: maxwell_pulse
parameters:
  epsilon_r: 1.0
  mu_r: 1.0
  sigma: 0.05
  pulse_amplitude: 4.0
  pulse_frequency: 6.0
  pulse_width: 0.08
  pulse_delay: 0.2
domain:
  type: box
  size: [1.0, 1.0, 1.0]
  mesh_resolution: [10, 10, 10]
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude: 1.0
            sigma: 0.08
            center: [0.25, 0.5, 0.5]
        y:
          type: zero
          params: {}
        z:
          type: zero
          params: {}
    initial_condition:
      components:
        x:
          type: constant
          params:
            value: 0.0
        y:
          type: constant
          params:
            value: 0.0
        z:
          type: constant
          params:
            value: 0.0
boundary_conditions:
  electric_field:
    x-:
      - operator: absorbing
        value: {type: zero, params: {}}
    x+:
      - operator: absorbing
        value: {type: zero, params: {}}
    y-:
      - operator: absorbing
        value: {type: zero, params: {}}
    y+:
      - operator: absorbing
        value: {type: zero, params: {}}
    z-:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
    z+:
      - operator: dirichlet
        value: [0.0, 0.0, 0.0]
time:
  dt: 0.015
  t_end: 0.45
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  $ref: output.template.electric_field
  resolution: [24, 24, 24]
  num_frames: 12
seed: 42
