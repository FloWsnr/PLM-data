preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 0.7
    max: 1.05
  mu_r:
    sample: uniform
    min: 0.78
    max: 1.14
  sigma:
    sample: uniform
    min: 0.004
    max: 0.025
  pulse_amplitude:
    sample: uniform
    min: 4.0
    max: 7.2
  pulse_frequency:
    sample: uniform
    min: 10.0
    max: 16.0
  pulse_width:
    sample: uniform
    min: 0.032
    max: 0.058
  pulse_delay:
    sample: uniform
    min: 0.075
    max: 0.15
domain:
  allow_sampling: true
  type: disk
  center:
  - sample: uniform
    min: -0.04
    max: 0.04
  - sample: uniform
    min: -0.04
    max: 0.04
  radius:
    sample: uniform
    min: 0.94
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.019
inputs:
  electric_field:
    source:
      components:
        x:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.28
              max: 0.52
            frequency:
              sample: uniform
              min: 16.0
              max: 25.0
            center:
            - sample: uniform
              min: -0.08
              max: 0.08
            - sample: uniform
              min: -0.08
              max: 0.08
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.42
              max: 0.42
            sigma:
              sample: uniform
              min: 0.08
              max: 0.13
            center:
            - sample: uniform
              min: -0.18
              max: 0.18
            - sample: uniform
              min: -0.18
              max: 0.18
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 2
                max: 4
              amplitude:
                sample: uniform
                min: -0.09
                max: 0.09
              sigma:
                sample: uniform
                min: 0.055
                max: 0.095
              aspect_ratio:
                sample: uniform
                min: 1.0
                max: 2.0
              center:
              - sample: uniform
                min: -0.55
                max: 0.55
              - sample: uniform
                min: -0.55
                max: 0.55
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.004
              max: 0.012
boundary_conditions:
  electric_field:
    outer:
    - operator: absorbing
      value:
        type: zero
        params: {}
time:
  dt: 0.004
  t_end: 0.56
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [160, 160]
  num_frames: 57
seed: 54

