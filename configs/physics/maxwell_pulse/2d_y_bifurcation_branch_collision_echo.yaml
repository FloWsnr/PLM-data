preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 1.05
    max: 1.7
  mu_r:
    sample: uniform
    min: 0.88
    max: 1.3
  sigma:
    sample: uniform
    min: 0.018
    max: 0.06
  pulse_amplitude:
    sample: uniform
    min: 2.4
    max: 4.6
  pulse_frequency:
    sample: uniform
    min: 5.0
    max: 9.5
  pulse_width:
    sample: uniform
    min: 0.075
    max: 0.13
  pulse_delay:
    sample: uniform
    min: 0.16
    max: 0.3
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.82
    max: 1.04
  branch_length:
    sample: uniform
    min: 1.0
    max: 1.24
  branch_angle_degrees:
    sample: uniform
    min: 42.0
    max: 58.0
  channel_width:
    sample: uniform
    min: 0.22
    max: 0.3
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.021
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.75
              max: -0.38
            sigma:
              sample: uniform
              min: 0.055
              max: 0.09
            center:
            - sample: uniform
              min: 1.42
              max: 1.78
            - sample: uniform
              min: 0.36
              max: 0.62
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.38
              max: 0.75
            sigma:
              sample: uniform
              min: 0.055
              max: 0.09
            center:
            - sample: uniform
              min: 1.42
              max: 1.78
            - sample: uniform
              min: -0.62
              max: -0.36
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.12
            sigma:
              sample: uniform
              min: 0.08
              max: 0.15
            center:
            - sample: uniform
              min: 1.18
              max: 1.58
            - sample: uniform
              min: 0.35
              max: 0.68
            wavevector:
            - sample: uniform
              min: -14.0
              max: -7.0
            - sample: uniform
              min: -8.0
              max: -2.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.12
            sigma:
              sample: uniform
              min: 0.08
              max: 0.15
            center:
            - sample: uniform
              min: 1.18
              max: 1.58
            - sample: uniform
              min: -0.68
              max: -0.35
            wavevector:
            - sample: uniform
              min: -14.0
              max: -7.0
            - sample: uniform
              min: 2.0
              max: 8.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
boundary_conditions:
  electric_field:
    inlet:
    - operator: dirichlet
      value: [0.0, 0.0]
    outlet_upper:
    - operator: absorbing
      value:
        type: zero
        params: {}
    outlet_lower:
    - operator: absorbing
      value:
        type: zero
        params: {}
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.006
  t_end: 1.02
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [192, 160]
  num_frames: 61
seed: 69
