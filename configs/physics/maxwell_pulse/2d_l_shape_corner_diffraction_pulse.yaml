preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 0.82
    max: 1.25
  mu_r:
    sample: uniform
    min: 0.78
    max: 1.16
  sigma:
    sample: uniform
    min: 0.004
    max: 0.03
  pulse_amplitude:
    sample: uniform
    min: 3.8
    max: 6.8
  pulse_frequency:
    sample: uniform
    min: 8.0
    max: 14.0
  pulse_width:
    sample: uniform
    min: 0.04
    max: 0.075
  pulse_delay:
    sample: uniform
    min: 0.08
    max: 0.17
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 1.18
    max: 1.38
  outer_height:
    sample: uniform
    min: 1.18
    max: 1.38
  cutout_width:
    sample: uniform
    min: 0.38
    max: 0.55
  cutout_height:
    sample: uniform
    min: 0.38
    max: 0.55
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.021
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.75
              max: 1.25
            sigma:
              sample: uniform
              min: 0.045
              max: 0.075
            center:
            - sample: uniform
              min: 0.16
              max: 0.34
            - sample: uniform
              min: 0.16
              max: 0.34
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.25
              max: 0.65
            sigma:
              sample: uniform
              min: 0.055
              max: 0.09
            center:
            - sample: uniform
              min: 0.2
              max: 0.42
            - sample: uniform
              min: 0.22
              max: 0.48
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.14
              max: 0.14
            sigma:
              sample: uniform
              min: 0.09
              max: 0.16
            center:
            - sample: uniform
              min: 0.42
              max: 0.7
            - sample: uniform
              min: 0.42
              max: 0.7
            wavevector:
            - sample: uniform
              min: 7.0
              max: 14.0
            - sample: uniform
              min: 7.0
              max: 14.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.004
              max: 0.014
boundary_conditions:
  electric_field:
    outer:
    - operator: absorbing
      value:
        type: zero
        params: {}
    notch:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.005
  t_end: 0.78
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [160, 160]
  num_frames: 57
seed: 60

