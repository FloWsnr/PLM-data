preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 1.1
    max: 1.9
  mu_r:
    sample: uniform
    min: 0.72
    max: 1.08
  sigma:
    sample: uniform
    min: 0.018
    max: 0.06
  pulse_amplitude:
    sample: uniform
    min: 2.4
    max: 4.2
  pulse_frequency:
    sample: uniform
    min: 5.5
    max: 9.5
  pulse_width:
    sample: uniform
    min: 0.065
    max: 0.115
  pulse_delay:
    sample: uniform
    min: 0.15
    max: 0.27
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
  - sample: uniform
    min: 0.94
    max: 1.12
  - sample: uniform
    min: -0.02
    max: 0.08
  axis_y:
  - sample: uniform
    min: -0.36
    max: -0.16
  - sample: uniform
    min: 0.98
    max: 1.22
  mesh_resolution:
  - sample: randint
    min: 128
    max: 152
  - sample: randint
    min: 128
    max: 152
inputs:
  electric_field:
    source:
      components:
        x:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.36
            frequency:
              sample: uniform
              min: 12.0
              max: 20.0
            center:
            - sample: uniform
              min: 0.44
              max: 0.62
            - sample: uniform
              min: 0.38
              max: 0.62
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.72
              max: -0.38
            sigma:
              sample: uniform
              min: 0.075
              max: 0.12
            center:
            - sample: uniform
              min: 0.58
              max: 0.86
            - sample: uniform
              min: 0.38
              max: 0.68
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.08
                max: 0.08
              cycles:
              - sample: uniform
                min: 3.0
                max: 6.0
              - sample: uniform
                min: 1.0
                max: 2.5
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: 0.25
                max: 0.9
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.08
                max: 0.08
              cycles:
              - sample: uniform
                min: 1.0
                max: 2.5
              - sample: uniform
                min: 3.0
                max: 6.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: -0.9
                max: -0.25
boundary_conditions:
  electric_field:
    x-:
    - operator: dirichlet
      value: [0.0, 0.0]
    x+:
    - operator: dirichlet
      value: [0.0, 0.0]
    y-:
    - operator: absorbing
      value:
        type: zero
        params: {}
    y+:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.006
  t_end: 0.9
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [160, 144]
  num_frames: 55
seed: 53
