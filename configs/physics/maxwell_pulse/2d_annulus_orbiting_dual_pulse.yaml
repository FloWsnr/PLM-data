preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 1.0
    max: 1.55
  mu_r:
    sample: uniform
    min: 0.9
    max: 1.35
  sigma:
    sample: uniform
    min: 0.015
    max: 0.055
  pulse_amplitude:
    sample: uniform
    min: 2.5
    max: 4.8
  pulse_frequency:
    sample: uniform
    min: 5.0
    max: 9.0
  pulse_width:
    sample: uniform
    min: 0.085
    max: 0.14
  pulse_delay:
    sample: uniform
    min: 0.16
    max: 0.3
domain:
  allow_sampling: true
  type: annulus
  center:
  - sample: uniform
    min: -0.03
    max: 0.03
  - sample: uniform
    min: -0.03
    max: 0.03
  inner_radius:
    sample: uniform
    min: 0.34
    max: 0.46
  outer_radius:
    sample: uniform
    min: 0.96
    max: 1.1
  mesh_size:
    sample: uniform
    min: 0.017
    max: 0.021
inputs:
  electric_field:
    source:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.16
                max: 0.34
              cycles:
              - sample: uniform
                min: 2.0
                max: 4.0
              - sample: uniform
                min: 3.0
                max: 5.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: 0.25
                max: 0.9
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: 0.16
                max: 0.34
              cycles:
              - sample: uniform
                min: 3.0
                max: 5.0
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: -0.9
                max: -0.25
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.06
              max: 0.14
            sigma:
              sample: uniform
              min: 0.09
              max: 0.15
            center:
            - sample: uniform
              min: -0.68
              max: -0.48
            - sample: uniform
              min: 0.12
              max: 0.36
            wavevector:
            - sample: uniform
              min: 4.0
              max: 8.0
            - sample: uniform
              min: -16.0
              max: -8.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.14
              max: -0.06
            sigma:
              sample: uniform
              min: 0.09
              max: 0.15
            center:
            - sample: uniform
              min: 0.48
              max: 0.68
            - sample: uniform
              min: -0.36
              max: -0.12
            wavevector:
            - sample: uniform
              min: -8.0
              max: -4.0
            - sample: uniform
              min: 8.0
              max: 16.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
boundary_conditions:
  electric_field:
    inner:
    - operator: absorbing
      value:
        type: zero
        params: {}
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.006
  t_end: 1.02
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [160, 160]
  num_frames: 61
seed: 57
