preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 0.78
    max: 1.2
  mu_r:
    sample: uniform
    min: 0.78
    max: 1.18
  sigma:
    sample: uniform
    min: 0.006
    max: 0.032
  pulse_amplitude:
    sample: uniform
    min: 3.8
    max: 6.7
  pulse_frequency:
    sample: uniform
    min: 8.0
    max: 14.0
  pulse_width:
    sample: uniform
    min: 0.04
    max: 0.075
  pulse_delay:
    sample: uniform
    min: 0.08
    max: 0.17
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.86
    max: 1.08
  branch_length:
    sample: uniform
    min: 0.95
    max: 1.2
  branch_angle_degrees:
    sample: uniform
    min: 38.0
    max: 55.0
  channel_width:
    sample: uniform
    min: 0.22
    max: 0.3
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.021
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.3
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            center:
            - sample: uniform
              min: 0.18
              max: 0.35
            - sample: uniform
              min: -0.04
              max: 0.04
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.24
              max: 0.24
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            center:
            - sample: uniform
              min: 0.2
              max: 0.42
            - sample: uniform
              min: -0.07
              max: 0.07
    initial_condition:
      components:
        x:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: 0.06
              max: 0.14
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            center:
            - sample: uniform
              min: 0.42
              max: 0.75
            - sample: uniform
              min: -0.06
              max: 0.06
            wavevector:
            - sample: uniform
              min: 10.0
              max: 18.0
            - sample: uniform
              min: -2.0
              max: 2.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.004
              max: 0.012
boundary_conditions:
  electric_field:
    inlet:
    - operator: absorbing
      value:
        type: zero
        params: {}
    outlet_upper:
    - operator: absorbing
      value:
        type: zero
        params: {}
    outlet_lower:
    - operator: absorbing
      value:
        type: zero
        params: {}
    walls:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.005
  t_end: 0.82
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [192, 160]
  num_frames: 57
seed: 68

