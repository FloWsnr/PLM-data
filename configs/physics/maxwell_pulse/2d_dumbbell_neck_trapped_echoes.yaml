preset: maxwell_pulse
parameters:
  dumbbell_center_y:
    sample: uniform
    min: -0.03
    max: 0.03
  epsilon_r:
    sample: uniform
    min: 1.15
    max: 1.8
  mu_r:
    sample: uniform
    min: 0.9
    max: 1.35
  sigma:
    sample: uniform
    min: 0.018
    max: 0.06
  pulse_amplitude:
    sample: uniform
    min: 2.0
    max: 4.2
  pulse_frequency:
    sample: uniform
    min: 4.5
    max: 8.0
  pulse_width:
    sample: uniform
    min: 0.08
    max: 0.14
  pulse_delay:
    sample: uniform
    min: 0.16
    max: 0.3
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
  - sample: uniform
    min: -0.7
    max: -0.58
  - "param:dumbbell_center_y"
  right_center:
  - sample: uniform
    min: 0.58
    max: 0.7
  - "param:dumbbell_center_y"
  lobe_radius:
    sample: uniform
    min: 0.4
    max: 0.5
  neck_width:
    sample: uniform
    min: 0.1
    max: 0.17
  mesh_size:
    sample: uniform
    min: 0.017
    max: 0.022
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.5
              max: 0.9
            sigma:
              sample: uniform
              min: 0.055
              max: 0.085
            center:
            - sample: uniform
              min: -0.1
              max: 0.1
            - sample: uniform
              min: -0.04
              max: 0.04
        y:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.28
            frequency:
              sample: uniform
              min: 14.0
              max: 24.0
            center: [0.0, 0.0]
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 1
                max: 2
              amplitude:
                sample: uniform
                min: -0.1
                max: 0.1
              sigma:
                sample: uniform
                min: 0.07
                max: 0.12
              aspect_ratio:
                sample: uniform
                min: 1.4
                max: 2.4
              center:
              - sample: uniform
                min: 0.45
                max: 0.78
              - sample: uniform
                min: -0.24
                max: 0.24
        y:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 1
                max: 2
              amplitude:
                sample: uniform
                min: -0.1
                max: 0.1
              sigma:
                sample: uniform
                min: 0.07
                max: 0.12
              aspect_ratio:
                sample: uniform
                min: 1.4
                max: 2.4
              center:
              - sample: uniform
                min: -0.78
                max: -0.45
              - sample: uniform
                min: -0.24
                max: 0.24
boundary_conditions:
  electric_field:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.006
  t_end: 1.08
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [192, 128]
  num_frames: 61
seed: 59

