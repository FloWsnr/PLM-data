preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 1.05
    max: 1.75
  mu_r:
    sample: uniform
    min: 0.88
    max: 1.32
  sigma:
    sample: uniform
    min: 0.02
    max: 0.065
  pulse_amplitude:
    sample: uniform
    min: 2.0
    max: 4.0
  pulse_frequency:
    sample: uniform
    min: 4.5
    max: 8.5
  pulse_width:
    sample: uniform
    min: 0.08
    max: 0.14
  pulse_delay:
    sample: uniform
    min: 0.17
    max: 0.31
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.36
    max: 1.56
  height:
    sample: uniform
    min: 0.96
    max: 1.12
  holes:
  - center:
    - sample: uniform
      min: 0.34
      max: 0.43
    - sample: uniform
      min: 0.5
      max: 0.64
    radius:
      sample: uniform
      min: 0.08
      max: 0.11
  - center:
    - sample: uniform
      min: 0.66
      max: 0.78
    - sample: uniform
      min: 0.28
      max: 0.4
    radius:
      sample: uniform
      min: 0.06
      max: 0.09
  - center:
    - sample: uniform
      min: 0.98
      max: 1.12
    - sample: uniform
      min: 0.58
      max: 0.76
    radius:
      sample: uniform
      min: 0.075
      max: 0.105
  mesh_size:
    sample: uniform
    min: 0.017
    max: 0.022
inputs:
  electric_field:
    source:
      components:
        x:
          type: radial_cosine
          params:
            base: 0.0
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.34
            frequency:
              sample: uniform
              min: 12.0
              max: 21.0
            center:
            - sample: uniform
              min: 0.66
              max: 0.84
            - sample: uniform
              min: 0.42
              max: 0.62
        y:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.22
                max: 0.22
              cycles:
              - sample: uniform
                min: 2.0
                max: 4.0
              - sample: uniform
                min: 2.0
                max: 4.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: -0.7
                max: 0.7
    initial_condition:
      components:
        x:
          type: sine_waves
          params:
            background: 0.0
            modes:
            - amplitude:
                sample: uniform
                min: -0.06
                max: 0.06
              cycles:
              - sample: uniform
                min: 3.0
                max: 6.0
              - sample: uniform
                min: 2.0
                max: 5.0
              phase:
                sample: uniform
                min: 0.0
                max: 6.283185307
              angle:
                sample: uniform
                min: -0.6
                max: 0.6
        y:
          type: gaussian_wave_packet
          params:
            amplitude:
              sample: uniform
              min: -0.12
              max: 0.12
            sigma:
              sample: uniform
              min: 0.08
              max: 0.15
            center:
            - sample: uniform
              min: 0.48
              max: 1.08
            - sample: uniform
              min: 0.24
              max: 0.82
            wavevector:
            - sample: uniform
              min: -12.0
              max: 12.0
            - sample: uniform
              min: -12.0
              max: 12.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185307
boundary_conditions:
  electric_field:
    outer:
    - operator: dirichlet
      value: [0.0, 0.0]
    holes:
    - operator: absorbing
      value:
        type: zero
        params: {}
time:
  dt: 0.006
  t_end: 1.02
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [192, 144]
  num_frames: 61
seed: 63

