preset: maxwell_pulse
parameters:
  epsilon_r:
    sample: uniform
    min: 0.8
    max: 1.18
  mu_r:
    sample: uniform
    min: 0.82
    max: 1.2
  sigma:
    sample: uniform
    min: 0.006
    max: 0.032
  pulse_amplitude:
    sample: uniform
    min: 3.6
    max: 6.5
  pulse_frequency:
    sample: uniform
    min: 8.0
    max: 14.0
  pulse_width:
    sample: uniform
    min: 0.04
    max: 0.075
  pulse_delay:
    sample: uniform
    min: 0.09
    max: 0.18
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.42
    max: 1.62
  height:
    sample: uniform
    min: 0.94
    max: 1.08
  holes:
  - center:
    - sample: uniform
      min: 0.36
      max: 0.44
    - sample: uniform
      min: 0.28
      max: 0.36
    radius:
      sample: uniform
      min: 0.06
      max: 0.085
  - center:
    - sample: uniform
      min: 0.72
      max: 0.82
    - sample: uniform
      min: 0.6
      max: 0.72
    radius:
      sample: uniform
      min: 0.065
      max: 0.095
  - center:
    - sample: uniform
      min: 1.04
      max: 1.16
    - sample: uniform
      min: 0.3
      max: 0.42
    radius:
      sample: uniform
      min: 0.06
      max: 0.09
  mesh_size:
    sample: uniform
    min: 0.017
    max: 0.022
inputs:
  electric_field:
    source:
      components:
        x:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.3
            sigma:
              sample: uniform
              min: 0.04
              max: 0.065
            center:
            - sample: uniform
              min: 0.16
              max: 0.28
            - sample: uniform
              min: 0.38
              max: 0.62
        y:
          type: gaussian_bump
          params:
            amplitude:
              sample: uniform
              min: -0.42
              max: 0.42
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            center:
            - sample: uniform
              min: 0.22
              max: 0.38
            - sample: uniform
              min: 0.36
              max: 0.66
    initial_condition:
      components:
        x:
          type: gaussian_blobs
          params:
            background: 0.0
            generators:
            - count:
                sample: randint
                min: 2
                max: 4
              amplitude:
                sample: uniform
                min: -0.08
                max: 0.08
              sigma:
                sample: uniform
                min: 0.055
                max: 0.1
              aspect_ratio:
                sample: uniform
                min: 1.2
                max: 2.2
              center:
              - sample: uniform
                min: 0.25
                max: 1.25
              - sample: uniform
                min: 0.18
                max: 0.84
        y:
          type: gaussian_noise
          params:
            mean: 0.0
            std:
              sample: uniform
              min: 0.004
              max: 0.012
boundary_conditions:
  electric_field:
    outer:
    - operator: absorbing
      value:
        type: zero
        params: {}
    holes:
    - operator: dirichlet
      value: [0.0, 0.0]
time:
  dt: 0.005
  t_end: 0.8
solver:
  $ref: solver.profile.constant_lhs_curl_direct
output:
  formats: [numpy, gif]
  fields:
    electric_field: components
  resolution: [192, 128]
  num_frames: 57
seed: 62

