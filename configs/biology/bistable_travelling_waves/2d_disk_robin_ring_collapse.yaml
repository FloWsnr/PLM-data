preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.18
    max: 0.34
  a:
    sample: uniform
    min: 0.56
    max: 0.68
  wall_absorption:
    sample: uniform
    min: 0.35
    max: 0.82
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
coefficients:
  velocity:
    type: zero
    params: {}
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.95
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.019
time:
  dt: 0.01
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.5
          max: 0.58
        amplitude:
          sample: uniform
          min: 0.18
          max: 0.28
        frequency:
          sample: uniform
          min: 7.0
          max: 11.0
        center:
          - sample: uniform
            min: -0.06
            max: 0.06
          - sample: uniform
            min: -0.06
            max: 0.06
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
