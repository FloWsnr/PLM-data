preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.72
    max: 1.05
  a:
    sample: uniform
    min: 0.22
    max: 0.34
coefficients:
  velocity:
    type: zero
    params: {}
domain:
  allow_sampling: true
  type: rectangle
  size:
  - sample: uniform
    min: 10.5
    max: 12.5
  - sample: uniform
    min: 6.5
    max: 8.0
  mesh_resolution:
  - 192
  - 128
time:
  dt: 0.018
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left: 1.0
        value_right: 0.0
        x_split:
          sample: uniform
          min: 1.4
          max: 3.2
        axis: 0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution:
  - 192
  - 128
  num_frames: 91
seed: 42
