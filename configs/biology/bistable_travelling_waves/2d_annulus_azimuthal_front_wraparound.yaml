preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.18
    max: 0.32
  a:
    sample: uniform
    min: 0.16
    max: 0.28
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: -0.72
            max: -0.4
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: 0.4
            max: 0.72
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.4
  outer_radius:
    sample: uniform
    min: 0.92
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.022
time:
  dt: 0.008
  t_end: 8.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.01
          max: 0.05
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.98
              max: 1.08
            sigma:
              sample: uniform
              min: 0.12
              max: 0.16
            aspect_ratio:
              sample: uniform
              min: 2.2
              max: 3.4
            center:
              - sample: uniform
                min: 0.56
                max: 0.78
              - sample: uniform
                min: -0.14
                max: 0.14
          - count: 1
            amplitude:
              sample: uniform
              min: 0.76
              max: 0.94
            sigma:
              sample: uniform
              min: 0.09
              max: 0.13
            aspect_ratio:
              sample: uniform
              min: 1.6
              max: 2.8
            center:
              - sample: uniform
                min: 0.24
                max: 0.54
              - sample: uniform
                min: 0.12
                max: 0.42
boundary_conditions:
  u:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 81
seed: 42
