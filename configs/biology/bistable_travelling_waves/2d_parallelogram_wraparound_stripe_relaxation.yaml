preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.22
    max: 0.38
  a:
    sample: uniform
    min: 0.44
    max: 0.52
  axis_x_length:
    sample: uniform
    min: 1.08
    max: 1.28
  axis_y_shear:
    sample: uniform
    min: 0.24
    max: 0.42
  axis_y_height:
    sample: uniform
    min: 1.0
    max: 1.22
coefficients:
  velocity:
    type: zero
    params: {}
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: ["param:axis_x_length", 0.0]
  axis_y: ["param:axis_y_shear", "param:axis_y_height"]
  mesh_resolution: [160, 160]
time:
  dt: 0.01
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.5
          max: 0.56
        modes:
          - amplitude:
              sample: uniform
              min: 0.16
              max: 0.25
            cycles:
              - sample: uniform
                min: 0.9
                max: 1.3
              - sample: uniform
                min: 2.4
                max: 3.2
            phase:
              sample: uniform
              min: -0.35
              max: 0.35
            angle:
              sample: uniform
              min: 0.45
              max: 0.78
          - amplitude:
              sample: uniform
              min: -0.12
              max: -0.06
            cycles:
              - sample: uniform
                min: 1.6
                max: 2.4
              - sample: uniform
                min: 0.8
                max: 1.3
            phase:
              sample: uniform
              min: 0.4
              max: 1.1
            angle:
              sample: uniform
              min: -0.15
              max: 0.15
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 81
seed: 42
