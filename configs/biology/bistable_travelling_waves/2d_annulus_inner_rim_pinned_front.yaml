preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.24
    max: 0.44
  a:
    sample: uniform
    min: 0.46
    max: 0.56
  wall_absorption:
    sample: uniform
    min: 0.28
    max: 0.62
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: 0.35
            max: 0.72
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.72
            max: -0.35
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.26
    max: 0.38
  outer_radius:
    sample: uniform
    min: 0.92
    max: 1.02
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.022
time:
  dt: 0.008
  t_end: 7.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inner:
      - operator: dirichlet
        value: 1.0
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 75
seed: 42
