preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.38
    max: 0.62
  a:
    sample: uniform
    min: 0.48
    max: 0.58
  center_y:
    sample: uniform
    min: 0.46
    max: 0.54
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: -0.12
            max: -0.04
          y:
            sample: uniform
            min: -0.18
            max: 0.18
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.05
            max: 0.05
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 0.28
      max: 0.34
    - "param:center_y"
  right_center:
    - sample: uniform
      min: 0.66
      max: 0.72
    - "param:center_y"
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.27
  neck_width:
    sample: uniform
    min: 0.1
    max: 0.15
  mesh_size:
    sample: uniform
    min: 0.013
    max: 0.017
time:
  dt: 0.008
  t_end: 8.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.92
              max: 1.08
            sigma:
              sample: uniform
              min: 0.07
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.16
                max: 0.28
              - sample: uniform
                min: 0.42
                max: 0.58
          - count: 1
            amplitude:
              sample: uniform
              min: 0.58
              max: 0.82
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 1.9
            center:
              - sample: uniform
                min: 0.72
                max: 0.84
              - sample: uniform
                min: 0.42
                max: 0.58
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 71
seed: 42
