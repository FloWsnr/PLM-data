preset: bistable_travelling_waves
parameters:
  D: 1.0
  a: 0.3
coefficients:
  velocity:
    type: zero
    params: {}
domain:
  type: box
  size:
  - 8.0
  - 5.0
  - 5.0
  mesh_resolution:
  - 32
  - 20
  - 20
time:
  dt: 0.02
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left: 1.0
        value_right: 0.0
        x_split:
          sample: uniform
          min: 1.86
          max: 3.14
        axis: 0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_3d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u_numpy
  resolution:
  - 32
  - 20
  - 20
  num_frames: 20
seed: 42
