preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.18
    max: 0.32
  a:
    sample: uniform
    min: 0.28
    max: 0.4
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.1
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.48
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.18
            max: 0.32
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.06
                max: 0.14
              cycles: [0.5, 0.0]
              phase:
                sample: uniform
                min: 1.1
                max: 1.9
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: "param:channel_length"
  lane_spacing: "param:lane_spacing"
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.008
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value: 1.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 75
seed: 42
