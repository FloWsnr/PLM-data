preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.16
    max: 0.3
  a:
    sample: uniform
    min: 0.54
    max: 0.66
  wall_exchange:
    sample: uniform
    min: 0.18
    max: 0.48
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          constant:
            sample: uniform
            min: 0.04
            max: 0.12
          y:
            sample: uniform
            min: -0.18
            max: 0.18
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.04
            max: 0.04
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.14
    max: 1.26
  height:
    sample: uniform
    min: 0.86
    max: 0.98
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.46
          max: 0.62
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 0.86
          max: 0.98
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
time:
  dt: 0.008
  t_end: 8.0
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.46
            max: 0.64
          - sample: uniform
            min: 0.32
            max: 0.48
        region_values:
          "00":
            sample: uniform
            min: 0.86
            max: 1.0
          "01":
            sample: uniform
            min: 0.52
            max: 0.68
          "10":
            sample: uniform
            min: 0.1
            max: 0.24
          "11":
            sample: uniform
            min: 0.34
            max: 0.48
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_exchange"
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: dirichlet
        value: 0.0
    holes_right:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_exchange"
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 73
seed: 42
