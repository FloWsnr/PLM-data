preset: bistable_travelling_waves
parameters:
  D:
    sample: uniform
    min: 0.62
    max: 0.95
  a:
    sample: uniform
    min: 0.34
    max: 0.46
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
coefficients:
  velocity:
    type: zero
    params: {}
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.94
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.019
time:
  dt: 0.01
  t_end: 8.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background: 0.0
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.96
              max: 1.04
            sigma:
              sample: uniform
              min: 0.13
              max: 0.18
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: -0.1
                max: 0.1
              - sample: uniform
                min: -0.1
                max: 0.1
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.42
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: -0.36
                max: 0.36
              - sample: uniform
                min: -0.36
                max: 0.36
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
