preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.022
    max: 0.05
  r:
    sample: uniform
    min: 0.7
    max: 1.15
  K:
    sample: uniform
    min: 0.9
    max: 1.2
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.16
            max: 0.3
      y:
        type: affine
        params:
          y:
            sample: uniform
            min: 0.06
            max: 0.18
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.08
  branch_length:
    sample: uniform
    min: 0.84
    max: 1.06
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.022
    max: 0.028
time:
  dt: 0.008
  t_end: 7.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value: "param:K"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 71
seed: 42
