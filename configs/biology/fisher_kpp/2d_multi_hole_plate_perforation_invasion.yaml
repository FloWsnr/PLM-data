preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.025
    max: 0.055
  r:
    sample: uniform
    min: 0.65
    max: 1.15
  K:
    sample: uniform
    min: 0.9
    max: 1.2
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.1
            max: 0.22
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.08
            max: 0.08
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.16
    max: 1.28
  height:
    sample: uniform
    min: 0.86
    max: 0.98
  holes:
    - center:
        - sample: uniform
          min: 0.24
          max: 0.32
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.44
          max: 0.6
      radius:
        sample: uniform
        min: 0.06
        max: 0.085
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 0.88
          max: 0.98
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.08
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.018
    max: 0.024
time:
  dt: 0.008
  t_end: 8.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left: "param:K"
        value_right: 0.0
        x_split:
          sample: uniform
          min: 0.16
          max: 0.3
        axis: 0
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: dirichlet
        value: 0.0
    holes_right:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 73
seed: 42
