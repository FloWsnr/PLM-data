preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.018
    max: 0.05
  r:
    sample: uniform
    min: 0.45
    max: 0.85
  K:
    sample: uniform
    min: 0.9
    max: 1.2
  wall_absorption:
    sample: uniform
    min: 0.25
    max: 0.6
  domain_center_x:
    sample: uniform
    min: -0.04
    max: 0.04
  domain_center_y:
    sample: uniform
    min: -0.04
    max: 0.04
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: 0.08
            max: 0.18
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.18
            max: -0.08
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.95
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
time:
  dt: 0.01
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.42
          max: 0.56
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.24
        frequency:
          sample: uniform
          min: 5.0
          max: 9.0
        center:
          - sample: uniform
            min: -0.05
            max: 0.05
          - sample: uniform
            min: -0.05
            max: 0.05
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 81
seed: 42
