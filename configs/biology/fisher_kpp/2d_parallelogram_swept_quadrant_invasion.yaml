preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.04
    max: 0.09
  r:
    sample: uniform
    min: 0.6
    max: 1.0
  K:
    sample: uniform
    min: 0.9
    max: 1.2
  axis_x_length:
    sample: uniform
    min: 1.0
    max: 1.18
  axis_y_shear:
    sample: uniform
    min: 0.28
    max: 0.46
  axis_y_height:
    sample: uniform
    min: 1.02
    max: 1.22
  drift_x:
    sample: uniform
    min: 0.08
    max: 0.2
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value: "param:drift_x"
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.15
            max: 0.15
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x: ["param:axis_x_length", 0.0]
  axis_y: ["param:axis_y_shear", "param:axis_y_height"]
  mesh_resolution: [160, 160]
time:
  dt: 0.01
  t_end: 8.5
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.4
            max: 0.62
          - sample: uniform
            min: 0.42
            max: 0.64
        region_values:
          "00":
            sample: uniform
            min: 0.78
            max: 1.02
          "01":
            sample: uniform
            min: 0.22
            max: 0.4
          "10":
            sample: uniform
            min: 0.46
            max: 0.7
          "11":
            sample: uniform
            min: 0.02
            max: 0.16
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 75
seed: 42
