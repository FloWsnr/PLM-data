preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.07
    max: 0.16
  r:
    sample: uniform
    min: 0.75
    max: 1.3
  K:
    sample: uniform
    min: 0.9
    max: 1.25
coefficients:
  velocity:
    type: zero
    params: {}
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 10.5
      max: 12.5
    - sample: uniform
      min: 6.8
      max: 8.4
  mesh_resolution:
    - 192
    - 128
time:
  dt: 0.02
  t_end: 16.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left: param:K
        value_right: 0.0
        x_split:
          sample: uniform
          min: 1.4
          max: 3.3
        axis: 0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution:
    - 192
    - 128
  num_frames: 81
seed: 42
