preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.025
    max: 0.08
  r:
    sample: uniform
    min: 0.45
    max: 0.9
  K:
    sample: uniform
    min: 0.9
    max: 1.15
  drift_speed:
    sample: uniform
    min: 0.06
    max: 0.18
  shear_strength:
    sample: uniform
    min: 0.12
    max: 0.3
coefficients:
  velocity:
    components:
      x:
        type: sine_waves
        params:
          background: "param:drift_speed"
          modes:
            - amplitude: "param:shear_strength"
              cycles: [0.0, 1.0]
              phase:
                sample: uniform
                min: -0.45
                max: 0.45
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.05
            max: 0.05
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 1.45
      max: 1.85
    - sample: uniform
      min: 1.35
      max: 1.7
  mesh_resolution: [160, 160]
time:
  dt: 0.012
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.44
          max: 0.6
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.2
              - sample: uniform
                min: 1.8
                max: 2.6
            phase:
              sample: uniform
              min: -0.35
              max: 0.35
            angle:
              sample: uniform
              min: 0.3
              max: 1.0
          - amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            cycles:
              - sample: uniform
                min: 1.5
                max: 2.3
              - sample: uniform
                min: 0.8
                max: 1.4
            phase:
              sample: uniform
              min: 0.25
              max: 0.95
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 81
seed: 42
