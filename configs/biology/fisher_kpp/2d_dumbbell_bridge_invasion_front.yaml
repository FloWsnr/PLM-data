preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.06
    max: 0.12
  r:
    sample: uniform
    min: 0.8
    max: 1.3
  K:
    sample: uniform
    min: 0.9
    max: 1.2
  center_y:
    sample: uniform
    min: 2.8
    max: 3.2
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: 0.02
            max: 0.08
      y:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.02
            max: 0.02
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 3.0
      max: 3.35
    - "param:center_y"
  right_center:
    - sample: uniform
      min: 6.65
      max: 7.1
    - "param:center_y"
  lobe_radius:
    sample: uniform
    min: 1.6
    max: 1.95
  neck_width:
    sample: uniform
    min: 0.78
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.07
    max: 0.09
time:
  dt: 0.018
  t_end: 18.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left: "param:K"
        value_right: 0.0
        x_split:
          sample: uniform
          min: 1.9
          max: 3.4
        axis: 0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [176, 128]
  num_frames: 91
seed: 42
