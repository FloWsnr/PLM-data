preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.008
    max: 0.018
  r:
    sample: uniform
    min: 0.3
    max: 0.55
  K:
    sample: uniform
    min: 0.9
    max: 1.15
  wall_exchange:
    sample: uniform
    min: 0.18
    max: 0.36
  channel_length:
    sample: uniform
    min: 1.02
    max: 1.18
  lane_spacing:
    sample: uniform
    min: 0.4
    max: 0.52
coefficients:
  velocity:
    components:
      x:
        type: constant
        params:
          value:
            sample: uniform
            min: -0.1
            max: -0.04
      y:
        type: sine_waves
        params:
          background: 0.0
          modes:
            - amplitude:
                sample: uniform
                min: 0.04
                max: 0.1
              cycles: [0.5, 0.0]
              phase:
                sample: uniform
                min: 1.1
                max: 1.9
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: "param:channel_length"
  lane_spacing: "param:lane_spacing"
  n_bends:
    sample: randint
    min: 3
    max: 5
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.02
    max: 0.026
time:
  dt: 0.008
  t_end: 3.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value: "param:K"
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_exchange"
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 61
seed: 42
