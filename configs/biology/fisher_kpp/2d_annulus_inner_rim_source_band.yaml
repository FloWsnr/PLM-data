preset: fisher_kpp
parameters:
  D:
    sample: uniform
    min: 0.02
    max: 0.05
  r:
    sample: uniform
    min: 0.55
    max: 1.0
  K:
    sample: uniform
    min: 0.9
    max: 1.25
  wall_absorption:
    sample: uniform
    min: 0.18
    max: 0.48
coefficients:
  velocity:
    components:
      x:
        type: affine
        params:
          y:
            sample: uniform
            min: 0.25
            max: 0.55
      y:
        type: affine
        params:
          x:
            sample: uniform
            min: -0.55
            max: -0.25
domain:
  allow_sampling: true
  type: annulus
  center: [0.0, 0.0]
  inner_radius:
    sample: uniform
    min: 0.26
    max: 0.38
  outer_radius:
    sample: uniform
    min: 0.92
    max: 1.02
  mesh_size:
    sample: uniform
    min: 0.017
    max: 0.021
time:
  dt: 0.008
  t_end: 8.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inner:
      - operator: dirichlet
        value: "param:K"
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.nonlinear_mixed_direct
output:
  $ref: output.template.scalar_u
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 81
seed: 42
