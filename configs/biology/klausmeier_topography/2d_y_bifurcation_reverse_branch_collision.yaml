preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.08
    max: 1.34
  m:
    sample: uniform
    min: 0.42
    max: 0.56
  D:
    sample: uniform
    min: 1.2
    max: 2.1
  Dn:
    sample: uniform
    min: 0.35
    max: 0.7
  V:
    sample: uniform
    min: 38.0
    max: 62.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.025
        max: 0.055
      y:
        sample: uniform
        min: -0.015
        max: 0.015

domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 54.0
    max: 66.0
  branch_length:
    sample: uniform
    min: 62.0
    max: 78.0
  branch_angle_degrees:
    sample: uniform
    min: 36.0
    max: 48.0
  channel_width:
    sample: uniform
    min: 15.0
    max: 19.0
  mesh_size:
    sample: uniform
    min: 0.42
    max: 0.58

time:
  dt: 0.008
  t_end: 22.0

inputs:
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.02
          max: 1.22
        std:
          sample: uniform
          min: 0.015
          max: 0.055
  n:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.34
          max: 0.54
        generators:
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.35
            sigma:
              sample: uniform
              min: 4.5
              max: 7.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 88.0
                max: 128.0
              - sample: uniform
                min: 18.0
                max: 48.0
          - count:
              sample: randint
              min: 4
              max: 7
            amplitude:
              sample: uniform
              min: 0.85
              max: 1.35
            sigma:
              sample: uniform
              min: 4.5
              max: 7.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 88.0
                max: 128.0
              - sample: uniform
                min: -48.0
                max: -18.0

boundary_conditions:
  w:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.88
              max: 1.1
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.88
              max: 1.1
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.88
              max: 1.1
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.88
              max: 1.1
  n:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value: 0.0
    outlet_lower:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 89

seed: 42
