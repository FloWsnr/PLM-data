preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.02
    max: 1.24
  m:
    sample: uniform
    min: 0.52
    max: 0.66
  D:
    sample: uniform
    min: 1.3
    max: 2.4
  Dn:
    sample: uniform
    min: 0.55
    max: 1.0
  V:
    sample: uniform
    min: 70.0
    max: 104.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.08
        max: 0.15
      y:
        sample: uniform
        min: -0.02
        max: 0.02

domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 122.0
    max: 142.0
  height:
    sample: uniform
    min: 70.0
    max: 86.0
  obstacle_center:
    - sample: uniform
      min: 48.0
      max: 66.0
    - sample: uniform
      min: 33.0
      max: 45.0
  obstacle_radius:
    sample: uniform
    min: 9.0
    max: 14.0
  mesh_size:
    sample: uniform
    min: 0.48
    max: 0.64

time:
  dt: 0.01
  t_end: 34.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.94
          max: 1.18
  n:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.78
          max: 1.04
        std:
          sample: uniform
          min: 0.14
          max: 0.28

boundary_conditions:
  w:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.92
              max: 1.16
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
  n:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0
    obstacle:
      - operator: dirichlet
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 101

seed: 42
