preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 0.98
    max: 1.18
  m:
    sample: uniform
    min: 0.56
    max: 0.7
  D:
    sample: uniform
    min: 1.8
    max: 3.2
  Dn:
    sample: uniform
    min: 0.55
    max: 0.95
  V:
    sample: uniform
    min: 44.0
    max: 72.0

coefficients:
  topography:
    type: gaussian_bump
    params:
      amplitude:
        sample: uniform
        min: -6.5
        max: -4.0
      sigma:
        sample: uniform
        min: 20.0
        max: 32.0
      center:
        - sample: uniform
          min: 58.0
          max: 76.0
        - sample: uniform
          min: 58.0
          max: 76.0

domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 104.0
    max: 122.0
  outer_height:
    sample: uniform
    min: 96.0
    max: 112.0
  cutout_width:
    sample: uniform
    min: 32.0
    max: 44.0
  cutout_height:
    sample: uniform
    min: 42.0
    max: 54.0
  mesh_size:
    sample: uniform
    min: 0.5
    max: 0.68

time:
  dt: 0.012
  t_end: 28.0

inputs:
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.88
          max: 1.12
        std:
          sample: uniform
          min: 0.02
          max: 0.08
  n:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.38
          max: 0.6
        generators:
          - count:
              sample: randint
              min: 8
              max: 13
            amplitude:
              sample: uniform
              min: 0.55
              max: 1.05
            sigma:
              sample: uniform
              min: 4.5
              max: 8.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 8.0
                max: 86.0
              - sample: uniform
                min: 8.0
                max: 86.0

boundary_conditions:
  w:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.12
    notch:
      - operator: neumann
        value: 0.0
  n:
    outer:
      - operator: dirichlet
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 89

seed: 42
