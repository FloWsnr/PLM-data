preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.0
    max: 1.22
  m:
    sample: uniform
    min: 0.52
    max: 0.66
  D:
    sample: uniform
    min: 1.4
    max: 2.6
  Dn:
    sample: uniform
    min: 0.55
    max: 1.05
  V:
    sample: uniform
    min: 70.0
    max: 104.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.08
        max: 0.14
      y:
        sample: uniform
        min: 0.03
        max: 0.07

domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 112.0
    max: 128.0
  height:
    sample: uniform
    min: 92.0
    max: 108.0
  holes:
    - center:
        - sample: uniform
          min: 28.0
          max: 34.0
        - sample: uniform
          min: 30.0
          max: 42.0
      radius:
        sample: uniform
        min: 7.0
        max: 10.0
    - center:
        - sample: uniform
          min: 58.0
          max: 68.0
        - sample: uniform
          min: 54.0
          max: 70.0
      radius:
        sample: uniform
        min: 8.0
        max: 11.0
    - center:
        - sample: uniform
          min: 88.0
          max: 98.0
        - sample: uniform
          min: 28.0
          max: 42.0
      radius:
        sample: uniform
        min: 7.0
        max: 10.0
  mesh_size:
    sample: uniform
    min: 0.48
    max: 0.64

time:
  dt: 0.01
  t_end: 36.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.94
          max: 1.18
  n:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.78
          max: 1.04
        std:
          sample: uniform
          min: 0.14
          max: 0.28

boundary_conditions:
  w:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
    holes:
      - operator: neumann
        value: 0.0
  n:
    outer:
      - operator: dirichlet
        value: 0.0
    holes:
      - operator: neumann
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 101

seed: 42
