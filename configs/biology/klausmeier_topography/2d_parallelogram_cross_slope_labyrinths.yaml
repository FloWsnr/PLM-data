preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 0.94
    max: 1.16
  m:
    sample: uniform
    min: 0.6
    max: 0.74
  D:
    sample: uniform
    min: 2.2
    max: 4.0
  Dn:
    sample: uniform
    min: 0.85
    max: 1.45
  V:
    sample: uniform
    min: 62.0
    max: 92.0

coefficients:
  topography:
    type: sine_waves
    params:
      background: 0.0
      modes:
        - amplitude:
            sample: uniform
            min: 2.8
            max: 4.4
          cycles:
            - sample: uniform
              min: 0.024
              max: 0.04
            - sample: uniform
              min: 0.006
              max: 0.014
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
          angle:
            sample: uniform
            min: -0.7
            max: 0.7
        - amplitude:
            sample: uniform
            min: 1.2
            max: 2.2
          cycles:
            - sample: uniform
              min: 0.0
              max: 0.012
            - sample: uniform
              min: 0.028
              max: 0.046
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
          angle:
            sample: uniform
            min: -0.25
            max: 0.45

domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
    - sample: uniform
      min: 100.0
      max: 120.0
    - sample: uniform
      min: -10.0
      max: 8.0
  axis_y:
    - sample: uniform
      min: -28.0
      max: -12.0
    - sample: uniform
      min: 92.0
      max: 110.0
  mesh_resolution:
    - sample: randint
      min: 136
      max: 168
    - sample: randint
      min: 128
      max: 160

time:
  dt: 0.012
  t_end: 42.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.88
          max: 1.12
  n:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.34
          max: 0.56
        generators:
          - count:
              sample: randint
              min: 8
              max: 13
            amplitude:
              sample: uniform
              min: 0.45
              max: 0.85
            sigma:
              sample: uniform
              min: 4.8
              max: 8.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 8.0
                max: 108.0
              - sample: uniform
                min: 8.0
                max: 108.0

boundary_conditions:
  w:
    $ref: boundary_field.scalar.full_periodic_2d
  n:
    $ref: boundary_field.scalar.full_periodic_2d

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [176, 160]
  num_frames: 121

seed: 42
