preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 0.92
    max: 1.14
  m:
    sample: uniform
    min: 0.62
    max: 0.78
  D:
    sample: uniform
    min: 2.1
    max: 3.8
  Dn:
    sample: uniform
    min: 0.85
    max: 1.35
  V:
    sample: uniform
    min: 60.0
    max: 92.0

coefficients:
  topography:
    type: sine_waves
    params:
      background: 0.0
      modes:
        - amplitude:
            sample: uniform
            min: 2.4
            max: 4.0
          cycles:
            - sample: uniform
              min: 0.02
              max: 0.036
            - sample: uniform
              min: 0.008
              max: 0.018
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
          angle:
            sample: uniform
            min: -0.3
            max: 0.3
        - amplitude:
            sample: uniform
            min: 1.1
            max: 2.0
          cycles:
            - 0.0
            - sample: uniform
              min: 0.038
              max: 0.06
          phase:
            sample: uniform
            min: 0.0
            max: 6.283185
          angle: 0.0

domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -54.0
      max: -47.0
    - 0.0
  right_center:
    - sample: uniform
      min: 47.0
      max: 56.0
    - 0.0
  lobe_radius:
    sample: uniform
    min: 34.0
    max: 40.0
  neck_width:
    sample: uniform
    min: 10.0
    max: 17.0
  mesh_size:
    sample: uniform
    min: 0.46
    max: 0.64

time:
  dt: 0.012
  t_end: 48.0

inputs:
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.9
          max: 1.14
        std:
          sample: uniform
          min: 0.02
          max: 0.08
  n:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: -6.0
            max: 6.0
          - sample: uniform
            min: -4.0
            max: 4.0
        region_values:
          "00":
            sample: uniform
            min: 0.3
            max: 0.52
          "01":
            sample: uniform
            min: 0.78
            max: 1.05
          "10":
            sample: uniform
            min: 0.58
            max: 0.82
          "11":
            sample: uniform
            min: 0.34
            max: 0.58

boundary_conditions:
  w:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.86
              max: 1.08
  n:
    outer:
      - operator: dirichlet
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 121

seed: 42
