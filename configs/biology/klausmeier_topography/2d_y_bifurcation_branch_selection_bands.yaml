preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.02
    max: 1.24
  m:
    sample: uniform
    min: 0.52
    max: 0.66
  D:
    sample: uniform
    min: 1.2
    max: 2.2
  Dn:
    sample: uniform
    min: 0.5
    max: 0.95
  V:
    sample: uniform
    min: 70.0
    max: 104.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.08
        max: 0.15
      y:
        sample: uniform
        min: 0.01
        max: 0.05

domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 52.0
    max: 64.0
  branch_length:
    sample: uniform
    min: 58.0
    max: 72.0
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 16.0
    max: 20.0
  mesh_size:
    sample: uniform
    min: 0.42
    max: 0.58

time:
  dt: 0.01
  t_end: 32.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.96
          max: 1.18
  n:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.8
          max: 1.06
        std:
          sample: uniform
          min: 0.14
          max: 0.28

boundary_conditions:
  w:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.92
              max: 1.16
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
  n:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value: 0.0
    outlet_lower:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 97

seed: 42
