preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.0
    max: 1.22
  m:
    sample: uniform
    min: 0.52
    max: 0.66
  D:
    sample: uniform
    min: 1.3
    max: 2.5
  Dn:
    sample: uniform
    min: 0.55
    max: 1.0
  V:
    sample: uniform
    min: 70.0
    max: 104.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.08
        max: 0.15
      y:
        sample: uniform
        min: -0.02
        max: 0.02

domain:
  allow_sampling: true
  type: venturi_channel
  length:
    sample: uniform
    min: 130.0
    max: 150.0
  height:
    sample: uniform
    min: 76.0
    max: 90.0
  throat_height:
    sample: uniform
    min: 34.0
    max: 46.0
  constriction_center_x:
    sample: uniform
    min: 58.0
    max: 84.0
  constriction_radius:
    sample: uniform
    min: 38.0
    max: 52.0
  mesh_size:
    sample: uniform
    min: 0.5
    max: 0.66

time:
  dt: 0.01
  t_end: 34.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.94
          max: 1.18
  n:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.78
          max: 1.04
        std:
          sample: uniform
          min: 0.14
          max: 0.28

boundary_conditions:
  w:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.92
              max: 1.16
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
  n:
    inlet:
      - operator: dirichlet
        value: 0.0
    outlet:
      - operator: dirichlet
        value: 0.0
    walls:
      - operator: dirichlet
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 101

seed: 42
