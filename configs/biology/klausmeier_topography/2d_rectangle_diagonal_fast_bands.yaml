preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.06
    max: 1.28
  m:
    sample: uniform
    min: 0.5
    max: 0.62
  D:
    sample: uniform
    min: 1.1
    max: 1.9
  Dn:
    sample: uniform
    min: 0.45
    max: 0.9
  V:
    sample: uniform
    min: 96.0
    max: 132.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.09
        max: 0.15
      y:
        sample: uniform
        min: 0.1
        max: 0.17

domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 92.0
      max: 108.0
    - sample: uniform
      min: 92.0
      max: 108.0
  mesh_resolution:
    - sample: randint
      min: 136
      max: 168
    - sample: randint
      min: 136
      max: 168

time:
  dt: 0.008
  t_end: 24.0

inputs:
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.96
          max: 1.18
        std:
          sample: uniform
          min: 0.02
          max: 0.08
  n:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.72
          max: 0.96
        modes:
          - amplitude:
              sample: uniform
              min: 0.18
              max: 0.34
            cycles:
              - sample: uniform
                min: 0.026
                max: 0.044
              - 0.0
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: 0.45
              max: 0.95
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            cycles:
              - 0.0
              - sample: uniform
                min: 0.032
                max: 0.052
            phase:
              sample: uniform
              min: 0.0
              max: 6.283185
            angle:
              sample: uniform
              min: -0.35
              max: 0.35

boundary_conditions:
  w:
    $ref: boundary_field.scalar.full_periodic_2d
  n:
    $ref: boundary_field.scalar.full_periodic_2d

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 97

seed: 42
