preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.0
    max: 1.24
  m:
    sample: uniform
    min: 0.5
    max: 0.64
  D:
    sample: uniform
    min: 1.3
    max: 2.4
  Dn:
    sample: uniform
    min: 0.55
    max: 1.0
  V:
    sample: uniform
    min: 70.0
    max: 104.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.08
        max: 0.15
      y:
        sample: uniform
        min: -0.025
        max: 0.025

domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: -52.0
      max: -46.0
    - 0.0
  right_center:
    - sample: uniform
      min: 46.0
      max: 54.0
    - 0.0
  lobe_radius:
    sample: uniform
    min: 32.0
    max: 38.0
  neck_width:
    sample: uniform
    min: 15.0
    max: 24.0
  mesh_size:
    sample: uniform
    min: 0.48
    max: 0.66

time:
  dt: 0.01
  t_end: 36.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.94
          max: 1.16
  n:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.28
          max: 0.46
        generators:
          - count:
              sample: randint
              min: 5
              max: 8
            amplitude:
              sample: uniform
              min: 0.6
              max: 1.05
            sigma:
              sample: uniform
              min: 4.0
              max: 7.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: -78.0
                max: -18.0
              - sample: uniform
                min: -24.0
                max: 24.0
          - count:
              sample: randint
              min: 5
              max: 8
            amplitude:
              sample: uniform
              min: 0.55
              max: 0.98
            sigma:
              sample: uniform
              min: 4.0
              max: 7.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.8
            center:
              - sample: uniform
                min: 18.0
                max: 80.0
              - sample: uniform
                min: -24.0
                max: 24.0

boundary_conditions:
  w:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.14
  n:
    outer:
      - operator: dirichlet
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 101

seed: 42
