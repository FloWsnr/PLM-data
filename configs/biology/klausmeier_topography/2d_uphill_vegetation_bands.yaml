preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.0
    max: 1.22
  m:
    sample: uniform
    min: 0.58
    max: 0.68
  D:
    sample: uniform
    min: 1.6
    max: 2.7
  Dn:
    sample: uniform
    min: 0.75
    max: 1.15
  V:
    sample: uniform
    min: 82.0
    max: 118.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.16
        max: 0.24
      y:
        sample: uniform
        min: -0.025
        max: 0.025

domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 96.0
      max: 112.0
    - sample: uniform
      min: 96.0
      max: 112.0
  mesh_resolution:
    - sample: randint
      min: 128
      max: 152
    - sample: randint
      min: 128
      max: 152

time:
  dt: 0.01
  t_end: 36.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.92
          max: 1.16
  n:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.82
          max: 1.08
        std:
          sample: uniform
          min: 0.14
          max: 0.28

boundary_conditions:
  w:
    $ref: boundary_field.scalar.full_periodic_2d
  n:
    $ref: boundary_field.scalar.full_periodic_2d

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 121

seed: 42
