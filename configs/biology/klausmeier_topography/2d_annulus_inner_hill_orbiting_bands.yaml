preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 1.0
    max: 1.22
  m:
    sample: uniform
    min: 0.52
    max: 0.68
  D:
    sample: uniform
    min: 1.5
    max: 2.8
  Dn:
    sample: uniform
    min: 0.6
    max: 1.05
  V:
    sample: uniform
    min: 70.0
    max: 104.0

coefficients:
  topography:
    type: affine
    params:
      x:
        sample: uniform
        min: 0.07
        max: 0.13
      y:
        sample: uniform
        min: -0.1
        max: -0.04

domain:
  allow_sampling: true
  type: annulus
  center:
    - sample: uniform
      min: -2.0
      max: 2.0
    - sample: uniform
      min: -2.0
      max: 2.0
  inner_radius:
    sample: uniform
    min: 14.0
    max: 20.0
  outer_radius:
    sample: uniform
    min: 52.0
    max: 60.0
  mesh_size:
    sample: uniform
    min: 0.5
    max: 0.68

time:
  dt: 0.01
  t_end: 34.0

inputs:
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.94
          max: 1.18
  n:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.28
          max: 0.48
        generators:
          - count:
              sample: randint
              min: 10
              max: 16
            amplitude:
              sample: uniform
              min: 0.5
              max: 0.95
            sigma:
              sample: uniform
              min: 4.0
              max: 7.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: -46.0
                max: 46.0
              - sample: uniform
                min: -46.0
                max: 46.0

boundary_conditions:
  w:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.12
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.9
              max: 1.12
  n:
    inner:
      - operator: dirichlet
        value: 0.0
    outer:
      - operator: dirichlet
        value: 0.0

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [176, 176]
  num_frames: 101

seed: 42
