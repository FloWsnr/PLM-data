preset: klausmeier_topography

parameters:
  a: 1.5
  m: 0.45
  D: 10.0
  Dn: 1.0
  V: 50.0

# Complex terrain: 3 hills + 2 valleys creating a landscape with topography-
# driven water redistribution. Water pools in valleys, vegetation concentrates
# near valley edges where water supply is highest. This scenario produces
# STATIC spatial patterns (not traveling waves), because water is trapped
# in valley basins with no net directional flow.
coefficients:
  topography:
    type: gaussian_blobs
    params:
      background: 0.0
      blobs:
        - amplitude: 3.0
          sigma: 15.0
          center: [25.0, 75.0]
        - amplitude: 2.5
          sigma: 18.0
          center: [75.0, 80.0]
        - amplitude: 1.5
          sigma: 12.0
          center: [80.0, 35.0]
        - amplitude: -1.5
          sigma: 20.0
          center: [50.0, 50.0]
        - amplitude: -2.0
          sigma: 16.0
          center: [20.0, 20.0]

domain:
  type: rectangle
  size: [100.0, 100.0]
  mesh_resolution: [128, 128]

time:
  dt: 0.05
  t_end: 200.0

# Initial conditions near the lower (sparse-vegetation) steady state:
# w* ≈ 1.36, n* ≈ 0.33 for a=1.5, m=0.45.
inputs:
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 1.5
        std: 0.05
  n:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.3
        std: 0.02

boundary_conditions:
  w:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
  n:
    $ref: boundary_field.scalar.homogeneous_neumann_2d

solver:
  $ref: solver.profile.constant_lhs_scalar_spd

output:
  $ref: output.template.scalar_wn_topography
  resolution: [96, 96]
  num_frames: 100

seed: 42
