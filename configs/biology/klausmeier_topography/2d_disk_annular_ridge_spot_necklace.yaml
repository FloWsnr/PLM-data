preset: klausmeier_topography

parameters:
  a:
    sample: uniform
    min: 0.9
    max: 1.12
  m:
    sample: uniform
    min: 0.62
    max: 0.78
  D:
    sample: uniform
    min: 2.4
    max: 4.2
  Dn:
    sample: uniform
    min: 0.75
    max: 1.3
  V:
    sample: uniform
    min: 58.0
    max: 86.0

coefficients:
  topography:
    type: radial_cosine
    params:
      base: 0.0
      amplitude:
        sample: uniform
        min: 1.2
        max: 2.2
      frequency:
        sample: uniform
        min: 0.11
        max: 0.18
      center:
        - sample: uniform
          min: -5.0
          max: 5.0
        - sample: uniform
          min: -5.0
          max: 5.0

domain:
  allow_sampling: true
  type: disk
  center:
    - sample: uniform
      min: -3.0
      max: 3.0
    - sample: uniform
      min: -3.0
      max: 3.0
  radius:
    sample: uniform
    min: 50.0
    max: 58.0
  mesh_size:
    sample: uniform
    min: 0.5
    max: 0.66

time:
  dt: 0.012
  t_end: 46.0

inputs:
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.92
          max: 1.14
        std:
          sample: uniform
          min: 0.02
          max: 0.08
  n:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.62
          max: 0.86
        amplitude:
          sample: uniform
          min: 0.18
          max: 0.34
        frequency:
          sample: uniform
          min: 0.16
          max: 0.24
        center:
          - sample: uniform
            min: -6.0
            max: 6.0
          - sample: uniform
            min: -6.0
            max: 6.0

boundary_conditions:
  w:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.84
              max: 1.08
  n:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.0
              max: 0.04

solver:
  $ref: solver.profile.constant_lhs_scalar_nonsymmetric

output:
  $ref: output.template.scalar_wn_topography
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 121

seed: 42
