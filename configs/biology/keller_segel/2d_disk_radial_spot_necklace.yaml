preset: keller_segel
parameters:
  domain_center_x:
    sample: uniform
    min: -0.6
    max: 0.6
  domain_center_y:
    sample: uniform
    min: -0.6
    max: 0.6
  D_rho:
    sample: uniform
    min: 0.2
    max: 0.32
  D_c:
    sample: uniform
    min: 1.0
    max: 1.6
  chi0:
    sample: uniform
    min: 6.2
    max: 8.8
  alpha:
    sample: uniform
    min: 0.82
    max: 1.16
  beta:
    sample: uniform
    min: 0.5
    max: 0.8
  r:
    sample: uniform
    min: 0.02
    max: 0.1
  ring_frequency:
    sample: uniform
    min: 0.8
    max: 1.35
  c_wall_exchange:
    sample: uniform
    min: 0.06
    max: 0.16
  c_wall_value:
    sample: uniform
    min: 0.7
    max: 1.12
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 7.8
    max: 9.5
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.135
time:
  dt: 0.012
  t_end: 20.0
inputs:
  rho:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.3
          max: 0.48
        amplitude:
          sample: uniform
          min: 0.24
          max: 0.4
        frequency: "param:ring_frequency"
        center: ["param:domain_center_x", "param:domain_center_y"]
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.14
          max: 0.24
        std:
          sample: uniform
          min: 0.05
          max: 0.1
boundary_conditions:
  rho:
    outer:
      - operator: neumann
        value: 0.0
  c:
    outer:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_wall_value"
        operator_parameters:
          alpha: "param:c_wall_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 73
seed: 42
