preset: keller_segel

parameters:
  domain_origin_x:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_origin_y:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_size_x:
    sample: uniform
    min: 20.0
    max: 24.0
  domain_height:
    sample: uniform
    min: 12.0
    max: 16.0
  domain_shear:
    sample: uniform
    min: 6.0
    max: 10.0
  D_rho:
    sample: uniform
    min: 0.3
    max: 0.44
  D_c:
    sample: uniform
    min: 1.4
    max: 2.1
  chi0:
    sample: uniform
    min: 5.6
    max: 7.8
  alpha:
    sample: uniform
    min: 0.82
    max: 1.12
  beta:
    sample: uniform
    min: 0.68
    max: 0.95
  r:
    sample: uniform
    min: 0.02
    max: 0.1

domain:
  allow_sampling: true
  type: parallelogram
  origin: ["param:domain_origin_x", "param:domain_origin_y"]
  axis_x: ["param:domain_size_x", 0.0]
  axis_y: ["param:domain_shear", "param:domain_height"]
  mesh_resolution: [192, 144]

time:
  dt: 0.01
  t_end: 12.0

inputs:
  rho:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.68
          max: 0.82
        std:
          sample: uniform
          min: 0.04
          max: 0.07
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.18
          max: 0.3
        std:
          sample: uniform
          min: 0.02
          max: 0.05

boundary_conditions:
  rho:
    $ref: boundary_field.scalar.full_periodic_2d
  c:
    $ref: boundary_field.scalar.full_periodic_2d

solver:
  $ref: solver.profile.constant_lhs_scalar_spd

output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 57

seed: 42
