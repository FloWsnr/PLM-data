preset: keller_segel
parameters:
  D_rho:
    sample: uniform
    min: 0.3
    max: 0.48
  D_c:
    sample: uniform
    min: 1.55
    max: 2.45
  chi0:
    sample: uniform
    min: 4.6
    max: 6.8
  alpha:
    sample: uniform
    min: 0.78
    max: 1.08
  beta:
    sample: uniform
    min: 0.72
    max: 1.04
  r:
    sample: uniform
    min: 0.08
    max: 0.2
  rho_upper_value:
    sample: uniform
    min: 0.72
    max: 1.0
  rho_lower_value:
    sample: uniform
    min: 0.58
    max: 0.86
  c_inlet_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  c_inlet_value:
    sample: uniform
    min: 0.92
    max: 1.22
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 8.0
    max: 10.0
  branch_length:
    sample: uniform
    min: 6.0
    max: 8.0
  branch_angle_degrees:
    sample: uniform
    min: 28.0
    max: 38.0
  channel_width:
    sample: uniform
    min: 1.8
    max: 2.4
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.015
  t_end: 16.0
inputs:
  rho:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.34
          max: 0.54
        value_right:
          sample: uniform
          min: 0.68
          max: 0.9
        x_split:
          sample: uniform
          min: 5.5
          max: 8.5
        axis: 0
  c:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.12
          max: 0.22
boundary_conditions:
  rho:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:rho_upper_value"
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:rho_lower_value"
    walls:
      - operator: neumann
        value: 0.0
  c:
    inlet:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_inlet_value"
        operator_parameters:
          alpha: "param:c_inlet_exchange"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
