preset: keller_segel
parameters:
  D_rho:
    sample: uniform
    min: 0.22
    max: 0.34
  D_c:
    sample: uniform
    min: 1.25
    max: 2.0
  chi0:
    sample: uniform
    min: 6.0
    max: 8.8
  alpha:
    sample: uniform
    min: 0.9
    max: 1.3
  beta:
    sample: uniform
    min: 0.55
    max: 0.85
  r:
    sample: uniform
    min: 0.05
    max: 0.15
  rho_inlet_value:
    sample: uniform
    min: 0.82
    max: 1.12
  c_inlet_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  c_inlet_value:
    sample: uniform
    min: 0.92
    max: 1.22
  c_obstacle_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  c_obstacle_value:
    sample: uniform
    min: 0.82
    max: 1.12
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 8.0
    max: 10.0
  obstacle_center:
    - sample: uniform
      min: 8.5
      max: 11.0
    - sample: uniform
      min: 3.4
      max: 5.6
  obstacle_radius:
    sample: uniform
    min: 1.4
    max: 1.9
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.16
time:
  dt: 0.012
  t_end: 18.0
inputs:
  rho:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.34
          max: 0.56
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.28
            sigma:
              sample: uniform
              min: 1.0
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 3.0
                max: 6.0
              - sample: uniform
                min: 2.8
                max: 6.2
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 7.0
                max: 10.0
              - sample: uniform
                min: 2.2
                max: 6.6
  c:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.12
          max: 0.24
boundary_conditions:
  rho:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:rho_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
  c:
    inlet:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_inlet_value"
        operator_parameters:
          alpha: "param:c_inlet_exchange"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_obstacle_value"
        operator_parameters:
          alpha: "param:c_obstacle_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
