preset: keller_segel
parameters:
  D_rho:
    sample: uniform
    min: 0.3
    max: 0.48
  D_c:
    sample: uniform
    min: 1.5
    max: 2.4
  chi0:
    sample: uniform
    min: 4.6
    max: 6.6
  alpha:
    sample: uniform
    min: 0.8
    max: 1.08
  beta:
    sample: uniform
    min: 0.7
    max: 1.05
  r:
    sample: uniform
    min: 0.08
    max: 0.2
  rho_notch_exchange:
    sample: uniform
    min: 0.03
    max: 0.1
  rho_notch_value:
    sample: uniform
    min: 0.14
    max: 0.3
  c_notch_exchange:
    sample: uniform
    min: 0.05
    max: 0.16
  c_notch_value:
    sample: uniform
    min: 0.88
    max: 1.24
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 15.0
    max: 18.0
  outer_height:
    sample: uniform
    min: 15.0
    max: 19.0
  cutout_width:
    sample: uniform
    min: 5.0
    max: 7.5
  cutout_height:
    sample: uniform
    min: 6.0
    max: 8.5
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.015
  t_end: 16.0
inputs:
  rho:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.42
          max: 0.64
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.14
              max: 0.26
            sigma:
              sample: uniform
              min: 1.0
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 2.5
            center:
              - sample: uniform
                min: 2.0
                max: 6.5
              - sample: uniform
                min: 9.0
                max: 15.0
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 7.0
                max: 14.5
              - sample: uniform
                min: 1.8
                max: 5.4
          - count: 1
            amplitude:
              sample: uniform
              min: 0.05
              max: 0.14
            sigma:
              sample: uniform
              min: 0.7
              max: 1.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 5.5
                max: 8.5
              - sample: uniform
                min: 5.5
                max: 8.8
  c:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 5.0
            max: 8.5
          - sample: uniform
            min: 6.0
            max: 9.5
        region_values:
          "00":
            sample: uniform
            min: 0.12
            max: 0.24
          "01":
            sample: uniform
            min: 0.24
            max: 0.44
          "10":
            sample: uniform
            min: 0.16
            max: 0.32
          "11":
            sample: uniform
            min: 0.28
            max: 0.5
boundary_conditions:
  rho:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:rho_notch_value"
        operator_parameters:
          alpha: "param:rho_notch_exchange"
  c:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_notch_value"
        operator_parameters:
          alpha: "param:c_notch_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
