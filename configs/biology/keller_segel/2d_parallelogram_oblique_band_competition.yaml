preset: keller_segel
parameters:
  domain_origin_x:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_origin_y:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_size_x:
    sample: uniform
    min: 20.0
    max: 24.0
  domain_height:
    sample: uniform
    min: 12.0
    max: 16.0
  domain_shear:
    sample: uniform
    min: 6.0
    max: 10.0
  D_rho:
    sample: uniform
    min: 0.3
    max: 0.5
  D_c:
    sample: uniform
    min: 1.8
    max: 2.7
  chi0:
    sample: uniform
    min: 4.2
    max: 6.6
  alpha:
    sample: uniform
    min: 0.76
    max: 1.06
  beta:
    sample: uniform
    min: 0.72
    max: 1.02
  r:
    sample: uniform
    min: 0.08
    max: 0.22
  rho_wall_exchange:
    sample: uniform
    min: 0.03
    max: 0.08
  rho_wall_value:
    sample: uniform
    min: 0.18
    max: 0.34
  c_wall_exchange:
    sample: uniform
    min: 0.05
    max: 0.12
  c_wall_value:
    sample: uniform
    min: 0.8
    max: 1.16
domain:
  allow_sampling: true
  type: parallelogram
  origin: ["param:domain_origin_x", "param:domain_origin_y"]
  axis_x: ["param:domain_size_x", 0.0]
  axis_y: ["param:domain_shear", "param:domain_height"]
  mesh_resolution: [192, 144]
time:
  dt: 0.015
  t_end: 18.0
inputs:
  rho:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.56
          max: 0.76
        modes:
          - amplitude:
              sample: uniform
              min: 0.12
              max: 0.18
            cycles:
              - sample: uniform
                min: 0.6
                max: 1.1
              - sample: uniform
                min: 2.0
                max: 3.2
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: 0.55
              max: 1.35
          - amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            cycles:
              - sample: uniform
                min: 1.1
                max: 1.8
              - sample: uniform
                min: 0.8
                max: 1.4
            phase:
              sample: uniform
              min: 0.0
              max: 1.0
            angle:
              sample: uniform
              min: -0.3
              max: 0.3
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.18
          max: 0.32
        std:
          sample: uniform
          min: 0.02
          max: 0.05
boundary_conditions:
  rho:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:rho_wall_value"
        operator_parameters:
          alpha: "param:rho_wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:rho_wall_value"
        operator_parameters:
          alpha: "param:rho_wall_exchange"
  c:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_wall_value"
        operator_parameters:
          alpha: "param:c_wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_wall_value"
        operator_parameters:
          alpha: "param:c_wall_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 65
seed: 42
