preset: keller_segel
parameters:
  domain_center_x:
    sample: uniform
    min: -0.5
    max: 0.5
  domain_center_y:
    sample: uniform
    min: -0.5
    max: 0.5
  D_rho:
    sample: uniform
    min: 0.22
    max: 0.36
  D_c:
    sample: uniform
    min: 1.5
    max: 2.45
  chi0:
    sample: uniform
    min: 5.8
    max: 8.4
  alpha:
    sample: uniform
    min: 0.88
    max: 1.24
  beta:
    sample: uniform
    min: 0.6
    max: 0.95
  r:
    sample: uniform
    min: 0.05
    max: 0.16
  c_inner_exchange:
    sample: uniform
    min: 0.05
    max: 0.16
  c_inner_value:
    sample: uniform
    min: 0.92
    max: 1.28
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 2.8
    max: 3.8
  outer_radius:
    sample: uniform
    min: 8.0
    max: 9.4
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.135
time:
  dt: 0.015
  t_end: 16.0
inputs:
  rho:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.48
          max: 0.72
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.32
            sigma:
              sample: uniform
              min: 0.7
              max: 1.15
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: -0.8
                max: 0.8
              - sample: uniform
                min: 4.8
                max: 6.8
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 0.65
              max: 1.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: -6.4
                max: -4.6
              - sample: uniform
                min: -0.8
                max: 0.8
          - count: 1
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.22
            sigma:
              sample: uniform
              min: 0.6
              max: 1.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 4.4
                max: 6.2
              - sample: uniform
                min: -5.2
                max: -3.2
  c:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.14
          max: 0.26
boundary_conditions:
  rho:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  c:
    inner:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_inner_value"
        operator_parameters:
          alpha: "param:c_inner_exchange"
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
