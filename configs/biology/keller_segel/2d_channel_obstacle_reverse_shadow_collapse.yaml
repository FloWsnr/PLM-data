preset: keller_segel
parameters:
  D_rho:
    sample: uniform
    min: 0.3
    max: 0.48
  D_c:
    sample: uniform
    min: 1.5
    max: 2.35
  chi0:
    sample: uniform
    min: 4.6
    max: 6.8
  alpha:
    sample: uniform
    min: 0.78
    max: 1.08
  beta:
    sample: uniform
    min: 0.72
    max: 1.04
  r:
    sample: uniform
    min: 0.08
    max: 0.2
  c_obstacle_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  c_obstacle_value:
    sample: uniform
    min: 0.84
    max: 1.12
  c_outlet_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
  c_outlet_value:
    sample: uniform
    min: 0.72
    max: 1.02
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 8.0
    max: 10.0
  obstacle_center:
    - sample: uniform
      min: 8.5
      max: 11.0
    - sample: uniform
      min: 3.4
      max: 5.6
  obstacle_radius:
    sample: uniform
    min: 1.4
    max: 1.9
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.16
time:
  dt: 0.015
  t_end: 16.0
inputs:
  rho:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.32
          max: 0.52
        value_right:
          sample: uniform
          min: 0.66
          max: 0.9
        x_split:
          sample: uniform
          min: 7.0
          max: 11.0
        axis: 0
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.14
          max: 0.26
        std:
          sample: uniform
          min: 0.015
          max: 0.03
boundary_conditions:
  rho:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
  c:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_outlet_value"
        operator_parameters:
          alpha: "param:c_outlet_exchange"
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_obstacle_value"
        operator_parameters:
          alpha: "param:c_obstacle_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
