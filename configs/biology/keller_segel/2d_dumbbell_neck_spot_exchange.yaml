preset: keller_segel
parameters:
  left_center_x:
    sample: uniform
    min: -6.0
    max: -5.0
  right_center_x:
    sample: uniform
    min: 5.0
    max: 6.0
  center_y:
    sample: uniform
    min: -0.4
    max: 0.4
  D_rho:
    sample: uniform
    min: 0.32
    max: 0.48
  D_c:
    sample: uniform
    min: 1.5
    max: 2.5
  chi0:
    sample: uniform
    min: 4.6
    max: 6.8
  alpha:
    sample: uniform
    min: 0.8
    max: 1.12
  beta:
    sample: uniform
    min: 0.65
    max: 1.0
  r:
    sample: uniform
    min: 0.08
    max: 0.2
domain:
  allow_sampling: true
  type: dumbbell
  left_center: ["param:left_center_x", "param:center_y"]
  right_center: ["param:right_center_x", "param:center_y"]
  lobe_radius:
    sample: uniform
    min: 3.4
    max: 4.0
  neck_width:
    sample: uniform
    min: 1.4
    max: 2.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.012
  t_end: 18.0
inputs:
  rho:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.72
          max: 0.92
        value_right:
          sample: uniform
          min: 0.36
          max: 0.56
        x_split:
          sample: uniform
          min: -0.5
          max: 0.5
        axis: 0
  c:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.12
          max: 0.24
        value_right:
          sample: uniform
          min: 0.42
          max: 0.68
        x_split:
          sample: uniform
          min: -0.5
          max: 0.5
        axis: 0
boundary_conditions:
  rho:
    outer:
      - operator: neumann
        value: 0.0
  c:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
