preset: keller_segel
parameters:
  domain_size_x:
    sample: uniform
    min: 20.0
    max: 24.0
  domain_size_y:
    sample: uniform
    min: 12.0
    max: 16.0
  D_rho:
    sample: uniform
    min: 0.32
    max: 0.52
  D_c:
    sample: uniform
    min: 1.8
    max: 2.8
  chi0:
    sample: uniform
    min: 4.4
    max: 6.8
  alpha:
    sample: uniform
    min: 0.78
    max: 1.08
  beta:
    sample: uniform
    min: 0.72
    max: 1.05
  r:
    sample: uniform
    min: 0.08
    max: 0.22
  rho_wall_exchange:
    sample: uniform
    min: 0.03
    max: 0.08
  rho_wall_value:
    sample: uniform
    min: 0.18
    max: 0.36
  c_wall_exchange:
    sample: uniform
    min: 0.05
    max: 0.12
  c_wall_value:
    sample: uniform
    min: 0.82
    max: 1.18
domain:
  allow_sampling: true
  type: rectangle
  size: ["param:domain_size_x", "param:domain_size_y"]
  mesh_resolution: [192, 144]
time:
  dt: 0.015
  t_end: 18.0
inputs:
  rho:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.58
          max: 0.78
        modes:
          - amplitude:
              sample: uniform
              min: 0.12
              max: 0.2
            cycles:
              - sample: uniform
                min: 0.5
                max: 0.9
              - sample: uniform
                min: 2.0
                max: 3.2
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: 0.0
              max: 0.35
          - amplitude:
              sample: uniform
              min: 0.04
              max: 0.08
            cycles:
              - sample: uniform
                min: 1.2
                max: 1.8
              - sample: uniform
                min: 0.8
                max: 1.4
            phase:
              sample: uniform
              min: 0.0
              max: 1.0
            angle:
              sample: uniform
              min: -0.3
              max: 0.3
  c:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.18
          max: 0.34
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 0.6
                max: 1.1
              - sample: uniform
                min: 1.8
                max: 2.8
            phase:
              sample: uniform
              min: -0.7
              max: 0.7
            angle:
              sample: uniform
              min: 0.15
              max: 0.7
boundary_conditions:
  rho:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:rho_wall_value"
        operator_parameters:
          alpha: "param:rho_wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:rho_wall_value"
        operator_parameters:
          alpha: "param:rho_wall_exchange"
  c:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_wall_value"
        operator_parameters:
          alpha: "param:c_wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_wall_value"
        operator_parameters:
          alpha: "param:c_wall_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 65
seed: 42
