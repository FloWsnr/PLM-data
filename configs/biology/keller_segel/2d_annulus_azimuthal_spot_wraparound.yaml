preset: keller_segel
parameters:
  domain_center_x:
    sample: uniform
    min: -0.5
    max: 0.5
  domain_center_y:
    sample: uniform
    min: -0.5
    max: 0.5
  D_rho:
    sample: uniform
    min: 0.26
    max: 0.4
  D_c:
    sample: uniform
    min: 1.45
    max: 2.35
  chi0:
    sample: uniform
    min: 5.2
    max: 7.8
  alpha:
    sample: uniform
    min: 0.82
    max: 1.16
  beta:
    sample: uniform
    min: 0.58
    max: 0.92
  r:
    sample: uniform
    min: 0.02
    max: 0.12
  ring_frequency:
    sample: uniform
    min: 0.7
    max: 1.15
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 3.0
    max: 3.8
  outer_radius:
    sample: uniform
    min: 8.0
    max: 9.2
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.135
time:
  dt: 0.012
  t_end: 18.0
inputs:
  rho:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.56
          max: 0.74
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.22
        frequency: "param:ring_frequency"
        center: ["param:domain_center_x", "param:domain_center_y"]
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.18
          max: 0.32
        std:
          sample: uniform
          min: 0.02
          max: 0.04
boundary_conditions:
  rho:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  c:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 73
seed: 42
