preset: keller_segel

parameters:
  domain_size_x:
    sample: uniform
    min: 18.0
    max: 24.0
  domain_size_y:
    sample: uniform
    min: 18.0
    max: 24.0
  D_rho:
    sample: uniform
    min: 0.28
    max: 0.42
  D_c:
    sample: uniform
    min: 1.4
    max: 2.1
  chi0:
    sample: uniform
    min: 5.8
    max: 8.0
  alpha:
    sample: uniform
    min: 0.82
    max: 1.12
  beta:
    sample: uniform
    min: 0.68
    max: 0.95
  r:
    sample: uniform
    min: 0.02
    max: 0.1

domain:
  allow_sampling: true
  type: rectangle
  size: ["param:domain_size_x", "param:domain_size_y"]
  mesh_resolution: [160, 160]

time:
  dt: 0.01
  t_end: 12.0

inputs:
  rho:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.68
          max: 0.82
        std:
          sample: uniform
          min: 0.04
          max: 0.07
  c:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.18
          max: 0.3
        std:
          sample: uniform
          min: 0.02
          max: 0.05

boundary_conditions:
  rho:
    $ref: boundary_field.scalar.full_periodic_2d
  c:
    $ref: boundary_field.scalar.full_periodic_2d

solver:
  $ref: solver.profile.constant_lhs_scalar_spd

output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 57

seed: 42
