preset: keller_segel
parameters:
  D_rho:
    sample: uniform
    min: 0.3
    max: 0.48
  D_c:
    sample: uniform
    min: 1.55
    max: 2.45
  chi0:
    sample: uniform
    min: 4.6
    max: 6.8
  alpha:
    sample: uniform
    min: 0.78
    max: 1.08
  beta:
    sample: uniform
    min: 0.72
    max: 1.04
  r:
    sample: uniform
    min: 0.08
    max: 0.2
  rho_outlet_value:
    sample: uniform
    min: 0.74
    max: 1.02
  c_outlet_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  c_outlet_value:
    sample: uniform
    min: 0.92
    max: 1.22
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 7.5
    max: 9.5
  lane_spacing:
    sample: uniform
    min: 3.0
    max: 4.2
  n_bends:
    sample: randint
    min: 2
    max: 3
  channel_width:
    sample: uniform
    min: 1.6
    max: 2.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.015
  t_end: 16.0
inputs:
  rho:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.42
          max: 0.64
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 0.4
                max: 0.8
              - sample: uniform
                min: 1.8
                max: 2.8
            phase:
              sample: uniform
              min: -0.55
              max: 0.55
            angle:
              sample: uniform
              min: 0.1
              max: 1.0
  c:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.12
          max: 0.22
boundary_conditions:
  rho:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:rho_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
  c:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_outlet_value"
        operator_parameters:
          alpha: "param:c_outlet_exchange"
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
