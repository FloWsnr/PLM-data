preset: keller_segel
parameters:
  D_rho:
    sample: uniform
    min: 0.24
    max: 0.36
  D_c:
    sample: uniform
    min: 1.4
    max: 2.2
  chi0:
    sample: uniform
    min: 5.5
    max: 8.0
  alpha:
    sample: uniform
    min: 0.9
    max: 1.24
  beta:
    sample: uniform
    min: 0.6
    max: 0.9
  r:
    sample: uniform
    min: 0.05
    max: 0.14
  center_hole_exchange:
    sample: uniform
    min: 0.08
    max: 0.18
  right_hole_exchange:
    sample: uniform
    min: 0.06
    max: 0.16
  c_center_hole_value:
    sample: uniform
    min: 0.94
    max: 1.26
  c_right_hole_value:
    sample: uniform
    min: 0.82
    max: 1.14
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 12.0
    max: 14.5
  holes:
    - center:
        - sample: uniform
          min: 4.2
          max: 5.8
        - sample: uniform
          min: 3.2
          max: 4.9
      radius:
        sample: uniform
        min: 1.0
        max: 1.35
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 9.2
          max: 11.4
        - sample: uniform
          min: 5.0
          max: 7.4
      radius:
        sample: uniform
        min: 1.0
        max: 1.45
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 14.8
          max: 17.0
        - sample: uniform
          min: 3.0
          max: 4.9
      radius:
        sample: uniform
        min: 1.0
        max: 1.35
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.012
  t_end: 18.0
inputs:
  rho:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.58
          max: 0.82
        std:
          sample: uniform
          min: 0.04
          max: 0.08
  c:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 7.0
            max: 11.0
          - sample: uniform
            min: 4.5
            max: 7.5
        region_values:
          "00":
            sample: uniform
            min: 0.12
            max: 0.24
          "01":
            sample: uniform
            min: 0.28
            max: 0.48
          "10":
            sample: uniform
            min: 0.18
            max: 0.34
          "11":
            sample: uniform
            min: 0.34
            max: 0.54
boundary_conditions:
  rho:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: neumann
        value: 0.0
    holes_right:
      - operator: neumann
        value: 0.0
  c:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_center_hole_value"
        operator_parameters:
          alpha: "param:center_hole_exchange"
    holes_right:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:c_right_hole_value"
        operator_parameters:
          alpha: "param:right_hole_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_rho_c
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
