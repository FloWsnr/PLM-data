preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 50.0
    max: 78.0
  Dv:
    sample: uniform
    min: 0.38
    max: 0.74
  Dw:
    sample: uniform
    min: 36.0
    max: 62.0
  alpha:
    sample: uniform
    min: 0.1
    max: 0.16
  mu_u:
    sample: uniform
    min: 0.11
    max: 0.16
  rho_u:
    sample: uniform
    min: 0.78
    max: 1.02
  gamma_v:
    sample: uniform
    min: 0.05
    max: 0.1
  rho_w:
    sample: uniform
    min: 2.6
    max: 3.8
  gamma_w:
    sample: uniform
    min: 0.0008
    max: 0.002
  mu_w:
    sample: uniform
    min: 18.0
    max: 30.0
  sigma_u:
    sample: uniform
    min: 0.018
    max: 0.05
  Ku:
    sample: uniform
    min: 0.00012
    max: 0.00032
  sigma_w:
    sample: uniform
    min: 0.008
    max: 0.02
  Kw:
    sample: uniform
    min: 0.00006
    max: 0.0002
  u_inlet_value:
    sample: uniform
    min: 0.3
    max: 0.46
  w_inlet_value:
    sample: uniform
    min: 0.08
    max: 0.16
  wall_exchange:
    sample: uniform
    min: 0.03
    max: 0.1
  u_wall_value:
    sample: uniform
    min: 0.18
    max: 0.3
  w_wall_value:
    sample: uniform
    min: 0.03
    max: 0.08
  v_obstacle_value:
    sample: uniform
    min: 0.82
    max: 0.96
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 8.0
    max: 10.0
  obstacle_center:
    - sample: uniform
      min: 8.5
      max: 11.0
    - sample: uniform
      min: 3.2
      max: 5.6
  obstacle_radius:
    sample: uniform
    min: 1.3
    max: 1.8
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.08
  t_end: 82.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.1
          max: 0.18
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.54
          max: 0.7
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.32
            sigma:
              sample: uniform
              min: 1.0
              max: 1.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 7.5
                max: 11.2
              - sample: uniform
                min: 3.0
                max: 6.2
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.015
          max: 0.03
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
    obstacle:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_obstacle_value"
  w:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
    obstacle:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
seed: 42
