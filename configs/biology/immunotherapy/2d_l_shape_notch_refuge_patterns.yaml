preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 28.0
    max: 48.0
  Dv:
    sample: uniform
    min: 0.48
    max: 0.88
  Dw:
    sample: uniform
    min: 18.0
    max: 32.0
  alpha:
    sample: uniform
    min: 0.05
    max: 0.09
  mu_u:
    sample: uniform
    min: 0.13
    max: 0.19
  rho_u:
    sample: uniform
    min: 0.4
    max: 0.64
  gamma_v:
    sample: uniform
    min: 0.11
    max: 0.18
  rho_w:
    sample: uniform
    min: 1.4
    max: 2.2
  gamma_w:
    sample: uniform
    min: 0.0012
    max: 0.004
  mu_w:
    sample: uniform
    min: 24.0
    max: 40.0
  sigma_u:
    sample: uniform
    min: 0.0
    max: 0.015
  Ku:
    sample: uniform
    min: 0.0
    max: 0.00008
  sigma_w:
    sample: uniform
    min: 0.0
    max: 0.006
  Kw:
    sample: uniform
    min: 0.0
    max: 0.00005
  notch_exchange:
    sample: uniform
    min: 0.02
    max: 0.06
  u_notch_value:
    sample: uniform
    min: 0.05
    max: 0.12
  v_notch_value:
    sample: uniform
    min: 0.74
    max: 0.9
  w_notch_value:
    sample: uniform
    min: 0.01
    max: 0.03
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 16.0
    max: 20.0
  outer_height:
    sample: uniform
    min: 16.0
    max: 20.0
  cutout_width:
    sample: uniform
    min: 5.5
    max: 8.0
  cutout_height:
    sample: uniform
    min: 5.5
    max: 8.5
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.14
time:
  dt: 0.1
  t_end: 96.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.18
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.05
              max: 0.14
            sigma:
              sample: uniform
              min: 1.0
              max: 1.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.3
            center:
              - sample: uniform
                min: 2.0
                max: 6.5
              - sample: uniform
                min: 9.5
                max: 15.5
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 6.0
            max: 9.0
          - sample: uniform
            min: 6.5
            max: 9.5
        region_values:
          "00":
            sample: uniform
            min: 0.48
            max: 0.66
          "01":
            sample: uniform
            min: 0.7
            max: 0.92
          "10":
            sample: uniform
            min: 0.58
            max: 0.76
          "11":
            sample: uniform
            min: 0.62
            max: 0.82
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.008
          max: 0.02
        std:
          sample: uniform
          min: 0.001
          max: 0.004
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_notch_value"
        operator_parameters:
          alpha: "param:notch_exchange"
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_notch_value"
        operator_parameters:
          alpha: "param:notch_exchange"
  w:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_notch_value"
        operator_parameters:
          alpha: "param:notch_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
