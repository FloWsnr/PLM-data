preset: immunotherapy
parameters:
  domain_origin_x:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_origin_y:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_size_x:
    sample: uniform
    min: 18.0
    max: 24.0
  domain_height:
    sample: uniform
    min: 14.0
    max: 18.0
  domain_shear:
    sample: uniform
    min: 5.0
    max: 9.0
  Du:
    sample: uniform
    min: 32.0
    max: 52.0
  Dv:
    sample: uniform
    min: 0.38
    max: 0.76
  Dw:
    sample: uniform
    min: 22.0
    max: 38.0
  alpha:
    sample: uniform
    min: 0.06
    max: 0.1
  mu_u:
    sample: uniform
    min: 0.11
    max: 0.17
  rho_u:
    sample: uniform
    min: 0.48
    max: 0.74
  gamma_v:
    sample: uniform
    min: 0.08
    max: 0.16
  rho_w:
    sample: uniform
    min: 1.7
    max: 2.7
  gamma_w:
    sample: uniform
    min: 0.001
    max: 0.0032
  mu_w:
    sample: uniform
    min: 20.0
    max: 34.0
  sigma_u:
    sample: uniform
    min: 0.0
    max: 0.014
  Ku:
    sample: uniform
    min: 0.0
    max: 0.00006
  sigma_w:
    sample: uniform
    min: 0.0
    max: 0.006
  Kw:
    sample: uniform
    min: 0.0
    max: 0.00005
  u_lower_value:
    sample: uniform
    min: 0.12
    max: 0.24
  v_upper_value:
    sample: uniform
    min: 0.68
    max: 0.88
  w_lower_value:
    sample: uniform
    min: 0.02
    max: 0.06
  lower_exchange:
    sample: uniform
    min: 0.02
    max: 0.06
  upper_exchange:
    sample: uniform
    min: 0.02
    max: 0.06
domain:
  allow_sampling: true
  type: parallelogram
  origin: ["param:domain_origin_x", "param:domain_origin_y"]
  axis_x: ["param:domain_size_x", 0.0]
  axis_y: ["param:domain_shear", "param:domain_height"]
  mesh_resolution: [224, 160]
time:
  dt: 0.08
  t_end: 78.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.1
          max: 0.18
        std:
          sample: uniform
          min: 0.01
          max: 0.03
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 9.0
            max: 13.0
          - sample: uniform
            min: 6.5
            max: 10.0
        region_values:
          "00":
            sample: uniform
            min: 0.46
            max: 0.64
          "01":
            sample: uniform
            min: 0.58
            max: 0.78
          "10":
            sample: uniform
            min: 0.68
            max: 0.92
          "11":
            sample: uniform
            min: 0.52
            max: 0.74
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.02
          max: 0.04
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.012
              max: 0.03
            sigma:
              sample: uniform
              min: 1.1
              max: 2.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.5
            center:
              - sample: uniform
                min: 3.0
                max: 7.0
              - sample: uniform
                min: 2.0
                max: 5.0
          - count: 1
            amplitude:
              sample: uniform
              min: 0.008
              max: 0.024
            sigma:
              sample: uniform
              min: 1.0
              max: 1.8
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 11.0
                max: 18.0
              - sample: uniform
                min: 9.0
                max: 14.0
boundary_conditions:
  u:
    x-:
      - operator: neumann
        value: 0.0
    x+:
      - operator: neumann
        value: 0.0
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_lower_value"
        operator_parameters:
          alpha: "param:lower_exchange"
    y+:
      - operator: neumann
        value: 0.0
  v:
    x-:
      - operator: neumann
        value: 0.0
    x+:
      - operator: neumann
        value: 0.0
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_upper_value"
        operator_parameters:
          alpha: "param:upper_exchange"
  w:
    x-:
      - operator: neumann
        value: 0.0
    x+:
      - operator: neumann
        value: 0.0
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_lower_value"
        operator_parameters:
          alpha: "param:lower_exchange"
    y+:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
seed: 42
