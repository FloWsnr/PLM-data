preset: immunotherapy
parameters:
  domain_origin_x:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_origin_y:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_size_x:
    sample: uniform
    min: 18.0
    max: 24.0
  domain_height:
    sample: uniform
    min: 14.0
    max: 18.0
  domain_shear:
    sample: uniform
    min: 4.0
    max: 8.0
  Du:
    sample: uniform
    min: 40.0
    max: 62.0
  Dv:
    sample: uniform
    min: 0.45
    max: 0.8
  Dw:
    sample: uniform
    min: 28.0
    max: 48.0
  alpha:
    sample: uniform
    min: 0.08
    max: 0.13
  mu_u:
    sample: uniform
    min: 0.12
    max: 0.18
  rho_u:
    sample: uniform
    min: 0.64
    max: 0.9
  gamma_v:
    sample: uniform
    min: 0.06
    max: 0.12
  rho_w:
    sample: uniform
    min: 2.1
    max: 3.1
  gamma_w:
    sample: uniform
    min: 0.0009
    max: 0.003
  mu_w:
    sample: uniform
    min: 22.0
    max: 38.0
  sigma_u:
    sample: uniform
    min: 0.006
    max: 0.022
  Ku:
    sample: uniform
    min: 0.00002
    max: 0.00014
  sigma_w:
    sample: uniform
    min: 0.002
    max: 0.01
  Kw:
    sample: uniform
    min: 0.00002
    max: 0.0001
  wall_exchange:
    sample: uniform
    min: 0.03
    max: 0.1
  u_wall_value:
    sample: uniform
    min: 0.24
    max: 0.38
  v_wall_value:
    sample: uniform
    min: 0.58
    max: 0.76
  w_wall_value:
    sample: uniform
    min: 0.05
    max: 0.12
domain:
  allow_sampling: true
  type: parallelogram
  origin: ["param:domain_origin_x", "param:domain_origin_y"]
  axis_x: ["param:domain_size_x", 0.0]
  axis_y: ["param:domain_shear", "param:domain_height"]
  mesh_resolution: [224, 160]
time:
  dt: 0.09
  t_end: 92.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.22
          max: 0.34
        modes:
          - amplitude:
              sample: uniform
              min: 0.04
              max: 0.09
            cycles:
              - sample: uniform
                min: 0.7
                max: 1.2
              - sample: uniform
                min: 1.7
                max: 2.8
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: 0.35
              max: 1.15
          - amplitude:
              sample: uniform
              min: 0.02
              max: 0.05
            cycles:
              - sample: uniform
                min: 1.2
                max: 2.2
              - sample: uniform
                min: 0.5
                max: 1.1
            phase:
              sample: uniform
              min: 0.2
              max: 1.0
            angle:
              sample: uniform
              min: -0.2
              max: 0.3
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.68
          max: 0.82
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 0.7
                max: 1.3
              - sample: uniform
                min: 1.8
                max: 3.0
            phase:
              sample: uniform
              min: -0.5
              max: 0.5
            angle:
              sample: uniform
              min: 0.55
              max: 1.25
          - amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            cycles:
              - sample: uniform
                min: 1.2
                max: 2.0
              - sample: uniform
                min: 0.6
                max: 1.3
            phase:
              sample: uniform
              min: 0.15
              max: 0.95
            angle:
              sample: uniform
              min: -0.15
              max: 0.25
  w:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.04
          max: 0.07
        modes:
          - amplitude:
              sample: uniform
              min: 0.008
              max: 0.018
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.4
              - sample: uniform
                min: 1.0
                max: 1.9
            phase:
              sample: uniform
              min: -0.7
              max: 0.7
            angle:
              sample: uniform
              min: 0.1
              max: 0.9
boundary_conditions:
  u:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
  v:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
  w:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
seed: 42
