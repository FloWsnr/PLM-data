preset: immunotherapy
parameters:
  domain_size_x:
    sample: uniform
    min: 20.0
    max: 26.0
  domain_size_y:
    sample: uniform
    min: 14.0
    max: 18.0
  Du:
    sample: uniform
    min: 42.0
    max: 68.0
  Dv:
    sample: uniform
    min: 0.4
    max: 0.8
  Dw:
    sample: uniform
    min: 30.0
    max: 54.0
  alpha:
    sample: uniform
    min: 0.09
    max: 0.14
  mu_u:
    sample: uniform
    min: 0.11
    max: 0.17
  rho_u:
    sample: uniform
    min: 0.72
    max: 0.98
  gamma_v:
    sample: uniform
    min: 0.05
    max: 0.1
  rho_w:
    sample: uniform
    min: 2.4
    max: 3.4
  gamma_w:
    sample: uniform
    min: 0.0008
    max: 0.0022
  mu_w:
    sample: uniform
    min: 20.0
    max: 34.0
  sigma_u:
    sample: uniform
    min: 0.015
    max: 0.04
  Ku:
    sample: uniform
    min: 0.00008
    max: 0.00025
  sigma_w:
    sample: uniform
    min: 0.004
    max: 0.014
  Kw:
    sample: uniform
    min: 0.00004
    max: 0.00016
  lower_exchange:
    sample: uniform
    min: 0.03
    max: 0.1
  upper_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
  u_lower_value:
    sample: uniform
    min: 0.18
    max: 0.32
  u_upper_value:
    sample: uniform
    min: 0.32
    max: 0.48
  v_lower_value:
    sample: uniform
    min: 0.76
    max: 0.9
  v_upper_value:
    sample: uniform
    min: 0.24
    max: 0.42
  w_lower_value:
    sample: uniform
    min: 0.03
    max: 0.07
  w_upper_value:
    sample: uniform
    min: 0.08
    max: 0.16
domain:
  allow_sampling: true
  type: rectangle
  size: ["param:domain_size_x", "param:domain_size_y"]
  mesh_resolution: [224, 160]
time:
  dt: 0.08
  t_end: 84.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.2
          max: 0.32
        modes:
          - amplitude:
              sample: uniform
              min: 0.04
              max: 0.09
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.3
              - sample: uniform
                min: 1.5
                max: 2.5
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: -0.15
              max: 0.35
          - amplitude:
              sample: uniform
              min: 0.02
              max: 0.05
            cycles:
              - sample: uniform
                min: 1.2
                max: 2.2
              - sample: uniform
                min: 0.5
                max: 1.1
            phase:
              sample: uniform
              min: 0.2
              max: 1.0
            angle:
              sample: uniform
              min: 0.2
              max: 1.0
  v:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.66
          max: 0.8
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.16
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.4
              - sample: uniform
                min: 1.6
                max: 2.6
            phase:
              sample: uniform
              min: -0.5
              max: 0.5
            angle:
              sample: uniform
              min: -0.15
              max: 0.25
          - amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            cycles:
              - sample: uniform
                min: 1.3
                max: 2.1
              - sample: uniform
                min: 0.6
                max: 1.2
            phase:
              sample: uniform
              min: 0.2
              max: 1.1
            angle:
              sample: uniform
              min: 0.35
              max: 1.0
  w:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.03
          max: 0.06
        modes:
          - amplitude:
              sample: uniform
              min: 0.008
              max: 0.02
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.4
              - sample: uniform
                min: 1.0
                max: 1.8
            phase:
              sample: uniform
              min: -0.7
              max: 0.7
            angle:
              sample: uniform
              min: -0.2
              max: 0.55
boundary_conditions:
  u:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_lower_value"
        operator_parameters:
          alpha: "param:lower_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_upper_value"
        operator_parameters:
          alpha: "param:upper_exchange"
  v:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_lower_value"
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_upper_value"
  w:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_lower_value"
        operator_parameters:
          alpha: "param:lower_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_upper_value"
        operator_parameters:
          alpha: "param:upper_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
seed: 42
