preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 28.0
    max: 48.0
  Dv:
    sample: uniform
    min: 0.45
    max: 0.82
  Dw:
    sample: uniform
    min: 20.0
    max: 36.0
  alpha:
    sample: uniform
    min: 0.06
    max: 0.1
  mu_u:
    sample: uniform
    min: 0.12
    max: 0.18
  rho_u:
    sample: uniform
    min: 0.46
    max: 0.72
  gamma_v:
    sample: uniform
    min: 0.08
    max: 0.16
  rho_w:
    sample: uniform
    min: 1.6
    max: 2.6
  gamma_w:
    sample: uniform
    min: 0.001
    max: 0.0035
  mu_w:
    sample: uniform
    min: 20.0
    max: 34.0
  sigma_u:
    sample: uniform
    min: 0.0
    max: 0.012
  Ku:
    sample: uniform
    min: 0.0
    max: 0.00006
  sigma_w:
    sample: uniform
    min: 0.0
    max: 0.005
  Kw:
    sample: uniform
    min: 0.0
    max: 0.00005
  center_exchange:
    sample: uniform
    min: 0.02
    max: 0.06
  u_center_hole_value:
    sample: uniform
    min: 0.12
    max: 0.22
  v_center_hole_value:
    sample: uniform
    min: 0.12
    max: 0.28
  w_center_hole_value:
    sample: uniform
    min: 0.02
    max: 0.06
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 12.0
    max: 15.0
  holes:
    - center:
        - sample: uniform
          min: 4.2
          max: 5.8
        - sample: uniform
          min: 3.2
          max: 4.9
      radius:
        sample: uniform
        min: 0.95
        max: 1.3
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 9.2
          max: 11.4
        - sample: uniform
          min: 5.0
          max: 7.2
      radius:
        sample: uniform
        min: 1.0
        max: 1.4
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 14.8
          max: 17.0
        - sample: uniform
          min: 3.0
          max: 4.8
      radius:
        sample: uniform
        min: 0.95
        max: 1.3
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.14
time:
  dt: 0.09
  t_end: 76.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.1
          max: 0.18
        std:
          sample: uniform
          min: 0.01
          max: 0.03
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 7.0
            max: 11.0
          - sample: uniform
            min: 4.5
            max: 7.5
        region_values:
          "00":
            sample: uniform
            min: 0.48
            max: 0.66
          "01":
            sample: uniform
            min: 0.66
            max: 0.88
          "10":
            sample: uniform
            min: 0.56
            max: 0.78
          "11":
            sample: uniform
            min: 0.7
            max: 0.92
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.02
          max: 0.04
        generators:
          - count:
              sample: randint
              min: 2
              max: 3
            amplitude:
              sample: uniform
              min: 0.01
              max: 0.03
            sigma:
              sample: uniform
              min: 0.9
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 3.0
                max: 19.0
              - sample: uniform
                min: 2.0
                max: 12.0
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_center_hole_value"
        operator_parameters:
          alpha: "param:center_exchange"
    holes_right:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_center_hole_value"
        operator_parameters:
          alpha: "param:center_exchange"
    holes_right:
      - operator: neumann
        value: 0.0
  w:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_center_hole_value"
        operator_parameters:
          alpha: "param:center_exchange"
    holes_right:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
seed: 42
