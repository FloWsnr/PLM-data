preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 40.0
    max: 64.0
  Dv:
    sample: uniform
    min: 0.46
    max: 0.84
  Dw:
    sample: uniform
    min: 30.0
    max: 54.0
  alpha:
    sample: uniform
    min: 0.08
    max: 0.14
  mu_u:
    sample: uniform
    min: 0.12
    max: 0.18
  rho_u:
    sample: uniform
    min: 0.66
    max: 0.92
  gamma_v:
    sample: uniform
    min: 0.06
    max: 0.12
  rho_w:
    sample: uniform
    min: 2.2
    max: 3.2
  gamma_w:
    sample: uniform
    min: 0.0009
    max: 0.003
  mu_w:
    sample: uniform
    min: 22.0
    max: 38.0
  sigma_u:
    sample: uniform
    min: 0.006
    max: 0.024
  Ku:
    sample: uniform
    min: 0.00002
    max: 0.00014
  sigma_w:
    sample: uniform
    min: 0.002
    max: 0.01
  Kw:
    sample: uniform
    min: 0.00002
    max: 0.00008
  u_upper_value:
    sample: uniform
    min: 0.26
    max: 0.4
  w_upper_value:
    sample: uniform
    min: 0.06
    max: 0.14
  lower_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  v_lower_value:
    sample: uniform
    min: 0.78
    max: 0.94
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 8.0
    max: 10.0
  branch_length:
    sample: uniform
    min: 6.0
    max: 8.0
  branch_angle_degrees:
    sample: uniform
    min: 28.0
    max: 38.0
  channel_width:
    sample: uniform
    min: 1.8
    max: 2.4
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.14
time:
  dt: 0.09
  t_end: 94.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.22
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.22
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 9.0
                max: 12.0
              - sample: uniform
                min: 1.0
                max: 4.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.56
          max: 0.7
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.14
              max: 0.28
            sigma:
              sample: uniform
              min: 0.8
              max: 1.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 9.0
                max: 12.0
              - sample: uniform
                min: -4.2
                max: -1.0
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 6.0
                max: 9.0
              - sample: uniform
                min: -0.8
                max: 0.8
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.02
          max: 0.04
        std:
          sample: uniform
          min: 0.003
          max: 0.006
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_upper_value"
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_lower_value"
        operator_parameters:
          alpha: "param:lower_exchange"
    walls:
      - operator: neumann
        value: 0.0
  w:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_upper_value"
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
