preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 40.0
    max: 64.0
  Dv:
    sample: uniform
    min: 0.46
    max: 0.86
  Dw:
    sample: uniform
    min: 30.0
    max: 52.0
  alpha:
    sample: uniform
    min: 0.08
    max: 0.14
  mu_u:
    sample: uniform
    min: 0.12
    max: 0.18
  rho_u:
    sample: uniform
    min: 0.66
    max: 0.94
  gamma_v:
    sample: uniform
    min: 0.06
    max: 0.12
  rho_w:
    sample: uniform
    min: 2.2
    max: 3.2
  gamma_w:
    sample: uniform
    min: 0.0009
    max: 0.003
  mu_w:
    sample: uniform
    min: 22.0
    max: 38.0
  sigma_u:
    sample: uniform
    min: 0.006
    max: 0.022
  Ku:
    sample: uniform
    min: 0.00002
    max: 0.00012
  sigma_w:
    sample: uniform
    min: 0.002
    max: 0.01
  Kw:
    sample: uniform
    min: 0.00002
    max: 0.00008
  u_outlet_value:
    sample: uniform
    min: 0.24
    max: 0.38
  w_outlet_value:
    sample: uniform
    min: 0.05
    max: 0.12
  obstacle_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  u_obstacle_value:
    sample: uniform
    min: 0.12
    max: 0.22
  v_obstacle_value:
    sample: uniform
    min: 0.68
    max: 0.84
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 8.0
    max: 10.0
  obstacle_center:
    - sample: uniform
      min: 8.5
      max: 11.0
    - sample: uniform
      min: 3.2
      max: 5.6
  obstacle_radius:
    sample: uniform
    min: 1.3
    max: 1.8
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.09
  t_end: 94.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.14
          max: 0.24
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 13.0
                max: 18.0
              - sample: uniform
                min: 2.5
                max: 7.0
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.66
          max: 0.78
        std:
          sample: uniform
          min: 0.02
          max: 0.05
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.02
          max: 0.04
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.01
              max: 0.028
            sigma:
              sample: uniform
              min: 0.9
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 3.0
                max: 8.0
              - sample: uniform
                min: 2.0
                max: 7.5
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_obstacle_value"
        operator_parameters:
          alpha: "param:obstacle_exchange"
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_obstacle_value"
        operator_parameters:
          alpha: "param:obstacle_exchange"
  w:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
