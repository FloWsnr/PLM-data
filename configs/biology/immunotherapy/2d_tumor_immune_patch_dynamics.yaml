preset: immunotherapy
parameters:
  domain_size_x:
    sample: uniform
    min: 18.0
    max: 24.0
  domain_size_y:
    sample: uniform
    min: 16.0
    max: 22.0
  Du:
    sample: uniform
    min: 24.0
    max: 42.0
  Dv:
    sample: uniform
    min: 0.55
    max: 1.0
  Dw:
    sample: uniform
    min: 18.0
    max: 34.0
  alpha:
    sample: uniform
    min: 0.045
    max: 0.085
  mu_u:
    sample: uniform
    min: 0.16
    max: 0.24
  rho_u:
    sample: uniform
    min: 0.38
    max: 0.62
  gamma_v:
    sample: uniform
    min: 0.12
    max: 0.22
  rho_w:
    sample: uniform
    min: 1.2
    max: 2.1
  gamma_w:
    sample: uniform
    min: 0.0015
    max: 0.0045
  mu_w:
    sample: uniform
    min: 24.0
    max: 40.0
  sigma_u:
    sample: uniform
    min: 0.0
    max: 0.006
  Ku:
    sample: uniform
    min: 0.0
    max: 0.00004
  sigma_w:
    sample: uniform
    min: 0.0
    max: 0.003
  Kw:
    sample: uniform
    min: 0.0
    max: 0.00002
domain:
  allow_sampling: true
  type: rectangle
  size: ["param:domain_size_x", "param:domain_size_y"]
  mesh_resolution: [192, 192]
time:
  dt: 0.09
  t_end: 96.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.08
          max: 0.16
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.04
              max: 0.12
            sigma:
              sample: uniform
              min: 0.9
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.3
            center:
              - sample: uniform
                min: 3.0
                max: 9.0
              - sample: uniform
                min: 3.0
                max: 11.0
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 11.0
                max: 20.5
              - sample: uniform
                min: 4.0
                max: 18.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.78
          max: 0.9
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 1.0
              max: 2.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 3.0
                max: 21.0
              - sample: uniform
                min: 2.5
                max: 19.0
  w:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.01
          max: 0.02
        std:
          sample: uniform
          min: 0.0015
          max: 0.004
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
  v:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
  w:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
