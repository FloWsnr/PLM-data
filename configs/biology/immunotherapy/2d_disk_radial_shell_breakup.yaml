preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 30.0
    max: 50.0
  Dv:
    sample: uniform
    min: 0.55
    max: 0.95
  Dw:
    sample: uniform
    min: 22.0
    max: 40.0
  alpha:
    sample: uniform
    min: 0.075
    max: 0.125
  mu_u:
    sample: uniform
    min: 0.13
    max: 0.2
  rho_u:
    sample: uniform
    min: 0.56
    max: 0.82
  gamma_v:
    sample: uniform
    min: 0.07
    max: 0.14
  rho_w:
    sample: uniform
    min: 1.8
    max: 2.8
  gamma_w:
    sample: uniform
    min: 0.0012
    max: 0.0035
  mu_w:
    sample: uniform
    min: 28.0
    max: 42.0
  sigma_u:
    sample: uniform
    min: 0.0
    max: 0.016
  Ku:
    sample: uniform
    min: 0.0
    max: 0.00008
  sigma_w:
    sample: uniform
    min: 0.0
    max: 0.006
  Kw:
    sample: uniform
    min: 0.0
    max: 0.00005
  shell_frequency:
    sample: uniform
    min: 0.32
    max: 0.58
domain:
  allow_sampling: true
  type: disk
  center: [0.0, 0.0]
  radius:
    sample: uniform
    min: 7.5
    max: 9.2
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.14
time:
  dt: 0.1
  t_end: 104.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.18
          max: 0.28
        std:
          sample: uniform
          min: 0.02
          max: 0.05
  v:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.58
          max: 0.68
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.2
        frequency: "param:shell_frequency"
        center: [0.0, 0.0]
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.018
          max: 0.03
        generators:
          - count:
              sample: randint
              min: 2
              max: 3
            amplitude:
              sample: uniform
              min: 0.01
              max: 0.03
            sigma:
              sample: uniform
              min: 0.9
              max: 1.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: -5.0
                max: 5.0
              - sample: uniform
                min: -5.0
                max: 5.0
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
  v:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
  w:
    $ref: boundary_field.scalar.homogeneous_neumann_outer
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
