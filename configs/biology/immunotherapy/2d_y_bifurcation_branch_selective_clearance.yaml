preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 48.0
    max: 76.0
  Dv:
    sample: uniform
    min: 0.38
    max: 0.74
  Dw:
    sample: uniform
    min: 36.0
    max: 62.0
  alpha:
    sample: uniform
    min: 0.1
    max: 0.16
  mu_u:
    sample: uniform
    min: 0.11
    max: 0.17
  rho_u:
    sample: uniform
    min: 0.78
    max: 1.02
  gamma_v:
    sample: uniform
    min: 0.05
    max: 0.1
  rho_w:
    sample: uniform
    min: 2.6
    max: 3.8
  gamma_w:
    sample: uniform
    min: 0.0008
    max: 0.002
  mu_w:
    sample: uniform
    min: 18.0
    max: 30.0
  sigma_u:
    sample: uniform
    min: 0.018
    max: 0.048
  Ku:
    sample: uniform
    min: 0.00012
    max: 0.0003
  sigma_w:
    sample: uniform
    min: 0.007
    max: 0.02
  Kw:
    sample: uniform
    min: 0.00005
    max: 0.00018
  u_inlet_value:
    sample: uniform
    min: 0.28
    max: 0.44
  w_inlet_value:
    sample: uniform
    min: 0.08
    max: 0.16
  upper_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
  lower_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
  v_upper_value:
    sample: uniform
    min: 0.16
    max: 0.36
  v_lower_value:
    sample: uniform
    min: 0.56
    max: 0.82
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 8.0
    max: 10.0
  branch_length:
    sample: uniform
    min: 6.0
    max: 8.0
  branch_angle_degrees:
    sample: uniform
    min: 28.0
    max: 38.0
  channel_width:
    sample: uniform
    min: 1.8
    max: 2.4
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.14
time:
  dt: 0.08
  t_end: 82.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.08
          max: 0.16
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.58
          max: 0.72
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.26
            sigma:
              sample: uniform
              min: 0.8
              max: 1.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 6.0
                max: 9.0
              - sample: uniform
                min: -0.8
                max: 0.8
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.28
            sigma:
              sample: uniform
              min: 0.8
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 9.0
                max: 12.0
              - sample: uniform
                min: -4.0
                max: -1.0
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.015
          max: 0.03
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_inlet_value"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_upper_value"
        operator_parameters:
          alpha: "param:upper_exchange"
    outlet_lower:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_lower_value"
        operator_parameters:
          alpha: "param:lower_exchange"
    walls:
      - operator: neumann
        value: 0.0
  w:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_inlet_value"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
seed: 42
