preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 46.0
    max: 72.0
  Dv:
    sample: uniform
    min: 0.42
    max: 0.78
  Dw:
    sample: uniform
    min: 34.0
    max: 60.0
  alpha:
    sample: uniform
    min: 0.1
    max: 0.16
  mu_u:
    sample: uniform
    min: 0.11
    max: 0.17
  rho_u:
    sample: uniform
    min: 0.74
    max: 1.0
  gamma_v:
    sample: uniform
    min: 0.05
    max: 0.1
  rho_w:
    sample: uniform
    min: 2.5
    max: 3.6
  gamma_w:
    sample: uniform
    min: 0.0008
    max: 0.0022
  mu_w:
    sample: uniform
    min: 18.0
    max: 30.0
  sigma_u:
    sample: uniform
    min: 0.012
    max: 0.04
  Ku:
    sample: uniform
    min: 0.00008
    max: 0.00024
  sigma_w:
    sample: uniform
    min: 0.005
    max: 0.016
  Kw:
    sample: uniform
    min: 0.00004
    max: 0.00016
  left_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  right_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
  u_left_hole_value:
    sample: uniform
    min: 0.22
    max: 0.36
  u_right_hole_value:
    sample: uniform
    min: 0.32
    max: 0.48
  w_left_hole_value:
    sample: uniform
    min: 0.04
    max: 0.09
  w_right_hole_value:
    sample: uniform
    min: 0.08
    max: 0.16
  v_center_hole_value:
    sample: uniform
    min: 0.82
    max: 0.94
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 12.0
    max: 15.0
  holes:
    - center:
        - sample: uniform
          min: 4.2
          max: 5.8
        - sample: uniform
          min: 3.2
          max: 4.9
      radius:
        sample: uniform
        min: 0.95
        max: 1.3
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 9.2
          max: 11.4
        - sample: uniform
          min: 5.0
          max: 7.2
      radius:
        sample: uniform
        min: 1.0
        max: 1.4
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 14.8
          max: 17.0
        - sample: uniform
          min: 3.0
          max: 4.8
      radius:
        sample: uniform
        min: 0.95
        max: 1.3
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.14
time:
  dt: 0.08
  t_end: 84.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.2
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.9
              max: 1.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 3.0
                max: 19.0
              - sample: uniform
                min: 2.0
                max: 12.0
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.56
          max: 0.72
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.24
            sigma:
              sample: uniform
              min: 0.9
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 3.0
                max: 19.0
              - sample: uniform
                min: 2.0
                max: 12.0
  w:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 7.0
            max: 11.0
          - sample: uniform
            min: 4.5
            max: 7.5
        region_values:
          "00":
            sample: uniform
            min: 0.02
            max: 0.04
          "01":
            sample: uniform
            min: 0.04
            max: 0.07
          "10":
            sample: uniform
            min: 0.03
            max: 0.05
          "11":
            sample: uniform
            min: 0.05
            max: 0.08
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_left_hole_value"
        operator_parameters:
          alpha: "param:left_exchange"
    hole_center:
      - operator: neumann
        value: 0.0
    holes_right:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:u_right_hole_value"
        operator_parameters:
          alpha: "param:right_exchange"
  v:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_center_hole_value"
        operator_parameters:
          alpha: "param:left_exchange"
    holes_right:
      - operator: dirichlet
        value: 0.0
  w:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_left_hole_value"
        operator_parameters:
          alpha: "param:left_exchange"
    hole_center:
      - operator: neumann
        value: 0.0
    holes_right:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:w_right_hole_value"
        operator_parameters:
          alpha: "param:right_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 61
seed: 42
