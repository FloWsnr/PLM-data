preset: immunotherapy
parameters:
  Du:
    sample: uniform
    min: 40.0
    max: 64.0
  Dv:
    sample: uniform
    min: 0.46
    max: 0.84
  Dw:
    sample: uniform
    min: 30.0
    max: 54.0
  alpha:
    sample: uniform
    min: 0.08
    max: 0.14
  mu_u:
    sample: uniform
    min: 0.12
    max: 0.18
  rho_u:
    sample: uniform
    min: 0.66
    max: 0.92
  gamma_v:
    sample: uniform
    min: 0.06
    max: 0.12
  rho_w:
    sample: uniform
    min: 2.2
    max: 3.2
  gamma_w:
    sample: uniform
    min: 0.0009
    max: 0.003
  mu_w:
    sample: uniform
    min: 22.0
    max: 38.0
  sigma_u:
    sample: uniform
    min: 0.006
    max: 0.024
  Ku:
    sample: uniform
    min: 0.00002
    max: 0.00012
  sigma_w:
    sample: uniform
    min: 0.002
    max: 0.01
  Kw:
    sample: uniform
    min: 0.00002
    max: 0.00008
  u_outlet_value:
    sample: uniform
    min: 0.22
    max: 0.36
  w_outlet_value:
    sample: uniform
    min: 0.04
    max: 0.1
  wall_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
  v_wall_value:
    sample: uniform
    min: 0.74
    max: 0.9
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 7.5
    max: 9.5
  lane_spacing:
    sample: uniform
    min: 3.0
    max: 4.2
  n_bends:
    sample: randint
    min: 2
    max: 3
  channel_width:
    sample: uniform
    min: 1.6
    max: 2.0
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.14
time:
  dt: 0.09
  t_end: 94.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.22
        generators:
          - count:
              sample: randint
              min: 2
              max: 3
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.8
              max: 1.3
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 1.5
                max: 7.0
              - sample: uniform
                min: -2.5
                max: 2.5
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.56
          max: 0.72
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.22
            sigma:
              sample: uniform
              min: 0.8
              max: 1.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 1.5
                max: 7.5
              - sample: uniform
                min: -2.8
                max: 2.8
  w:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.025
          max: 0.05
        modes:
          - amplitude:
              sample: uniform
              min: 0.008
              max: 0.018
            cycles:
              - sample: uniform
                min: 0.5
                max: 0.9
              - sample: uniform
                min: 0.8
                max: 1.6
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: 0.9
              max: 1.7
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:v_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
  w:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
