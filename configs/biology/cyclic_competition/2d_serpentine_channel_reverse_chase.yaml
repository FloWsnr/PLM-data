preset: cyclic_competition
parameters:
  wall_absorption:
    sample: uniform
    min: 0.08
    max: 0.22
  u_outlet_value:
    sample: uniform
    min: 0.68
    max: 0.86
  v_inlet_value:
    sample: uniform
    min: 0.68
    max: 0.86
  w_wall_value:
    sample: uniform
    min: 0.4
    max: 0.58
  Du:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dv:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dw:
    sample: uniform
    min: 0.002
    max: 0.0055
  a:
    sample: uniform
    min: 0.48
    max: 0.68
  b:
    sample: uniform
    min: 1.48
    max: 1.9
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.38
    max: 0.48
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.012
time:
  dt: 0.01
  t_end: 9.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.64
                max: 0.98
              - sample: uniform
                min: 0.28
                max: 0.56
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.12
                max: 0.3
              - sample: uniform
                min: -0.06
                max: 0.06
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.14
              max: 0.26
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.42
                max: 0.7
              - sample: uniform
                min: 0.28
                max: 0.56
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_outlet_value"
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
  w:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_wall_value"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 224]
  num_frames: 61
seed: 42
