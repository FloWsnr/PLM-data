preset: cyclic_competition
parameters:
  wall_absorption:
    sample: uniform
    min: 0.08
    max: 0.22
  outer_u_value:
    sample: uniform
    min: 0.62
    max: 0.84
  notch_v_value:
    sample: uniform
    min: 0.6
    max: 0.82
  Du:
    sample: uniform
    min: 0.0025
    max: 0.006
  Dv:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dw:
    sample: uniform
    min: 0.002
    max: 0.0055
  a:
    sample: uniform
    min: 0.48
    max: 0.68
  b:
    sample: uniform
    min: 1.48
    max: 1.9
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 1.04
    max: 1.22
  outer_height:
    sample: uniform
    min: 1.04
    max: 1.24
  cutout_width:
    sample: uniform
    min: 0.32
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.34
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 0.012
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.42
            max: 0.68
          - sample: uniform
            min: 0.38
            max: 0.64
        region_values:
          "00":
            sample: uniform
            min: 0.42
            max: 0.62
          "01":
            sample: uniform
            min: 0.18
            max: 0.34
          "10":
            sample: uniform
            min: 0.08
            max: 0.18
          "11":
            sample: uniform
            min: 0.14
            max: 0.26
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.42
            max: 0.68
          - sample: uniform
            min: 0.38
            max: 0.64
        region_values:
          "00":
            sample: uniform
            min: 0.12
            max: 0.24
          "01":
            sample: uniform
            min: 0.46
            max: 0.66
          "10":
            sample: uniform
            min: 0.2
            max: 0.36
          "11":
            sample: uniform
            min: 0.1
            max: 0.22
  w:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.42
            max: 0.68
          - sample: uniform
            min: 0.38
            max: 0.64
        region_values:
          "00":
            sample: uniform
            min: 0.12
            max: 0.24
          "01":
            sample: uniform
            min: 0.18
            max: 0.32
          "10":
            sample: uniform
            min: 0.44
            max: 0.66
          "11":
            sample: uniform
            min: 0.18
            max: 0.32
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:outer_u_value"
    notch:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:notch_v_value"
  w:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
    notch:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 61
seed: 42
