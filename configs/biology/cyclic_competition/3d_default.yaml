preset: cyclic_competition
parameters:
  Du: 0.2
  Dv: 0.2
  Dw: 0.2
  a: 0.5
  b: 2.0
domain:
  type: box
  size: [40.0, 40.0, 40.0]
  mesh_resolution: [40, 40, 40]
time:
  dt: 0.02
  t_end: 100.0
inputs:
  u:
    initial_condition:
      type: random_perturbation
      params:
        mean: 0.286
        std: 0.1
  v:
    initial_condition:
      type: random_perturbation
      params:
        mean: 0.286
        std: 0.1
  w:
    initial_condition:
      type: random_perturbation
      params:
        mean: 0.286
        std: 0.1
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_3d
  v:
    $ref: boundary_field.scalar.full_periodic_3d
  w:
    $ref: boundary_field.scalar.full_periodic_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  resolution: [24, 24, 24]
  num_frames: 50
seed: 42
