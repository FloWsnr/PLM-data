preset: cyclic_competition
parameters:
  domain_size_x:
    sample: uniform
    min: 2.2
    max: 2.7
  domain_size_y:
    sample: uniform
    min: 1.8
    max: 2.3
  Du:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dv:
    sample: uniform
    min: 0.003
    max: 0.0075
  Dw:
    sample: uniform
    min: 0.002
    max: 0.0055
  a:
    sample: uniform
    min: 0.46
    max: 0.64
  b:
    sample: uniform
    min: 1.58
    max: 1.92
  u_left_value:
    sample: uniform
    min: 0.72
    max: 0.9
  v_right_value:
    sample: uniform
    min: 0.72
    max: 0.9
  w_top_value:
    sample: uniform
    min: 0.64
    max: 0.84
domain:
  allow_sampling: true
  type: rectangle
  size: ["param:domain_size_x", "param:domain_size_y"]
  mesh_resolution: [160, 144]
time:
  dt: 0.015
  t_end: 10.5
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.9
            max: 1.45
          - sample: uniform
            min: 0.8
            max: 1.3
        region_values:
          "00":
            sample: uniform
            min: 0.46
            max: 0.68
          "01":
            sample: uniform
            min: 0.22
            max: 0.38
          "10":
            sample: uniform
            min: 0.08
            max: 0.2
          "11":
            sample: uniform
            min: 0.16
            max: 0.3
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.95
            max: 1.5
          - sample: uniform
            min: 0.75
            max: 1.25
        region_values:
          "00":
            sample: uniform
            min: 0.12
            max: 0.24
          "01":
            sample: uniform
            min: 0.36
            max: 0.58
          "10":
            sample: uniform
            min: 0.2
            max: 0.34
          "11":
            sample: uniform
            min: 0.52
            max: 0.74
  w:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.85
            max: 1.4
          - sample: uniform
            min: 0.75
            max: 1.25
        region_values:
          "00":
            sample: uniform
            min: 0.18
            max: 0.3
          "01":
            sample: uniform
            min: 0.56
            max: 0.78
          "10":
            sample: uniform
            min: 0.18
            max: 0.32
          "11":
            sample: uniform
            min: 0.28
            max: 0.42
boundary_conditions:
  u:
    x-:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_left_value"
    x+:
      - operator: neumann
        value: 0.0
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
  v:
    x-:
      - operator: neumann
        value: 0.0
    x+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_right_value"
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: neumann
        value: 0.0
  w:
    x-:
      - operator: neumann
        value: 0.0
    x+:
      - operator: neumann
        value: 0.0
    y-:
      - operator: neumann
        value: 0.0
    y+:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_top_value"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [160, 144]
  num_frames: 61
seed: 42
