preset: cyclic_competition
parameters:
  u_inlet_value:
    sample: uniform
    min: 0.72
    max: 0.9
  v_outlet_value:
    sample: uniform
    min: 0.68
    max: 0.88
  Du:
    sample: uniform
    min: 0.003
    max: 0.007
  Dv:
    sample: uniform
    min: 0.003
    max: 0.007
  Dw:
    sample: uniform
    min: 0.0025
    max: 0.0065
  a:
    sample: uniform
    min: 0.4
    max: 0.6
  b:
    sample: uniform
    min: 1.66
    max: 2.02
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.36
    max: 0.46
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.01
    max: 0.012
time:
  dt: 0.01
  t_end: 7.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.1
          max: 0.16
  v:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.08
          max: 0.14
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.08
          max: 0.14
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.22
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.46
                max: 0.68
              - sample: uniform
                min: 0.26
                max: 0.56
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
  w:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 224]
  num_frames: 61
seed: 42
