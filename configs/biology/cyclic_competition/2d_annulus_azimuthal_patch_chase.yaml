preset: cyclic_competition
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  Du:
    sample: uniform
    min: 0.0018
    max: 0.0045
  Dv:
    sample: uniform
    min: 0.0016
    max: 0.0042
  Dw:
    sample: uniform
    min: 0.0018
    max: 0.0048
  a:
    sample: uniform
    min: 0.32
    max: 0.5
  b:
    sample: uniform
    min: 1.95
    max: 2.35
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 0.28
    max: 0.38
  outer_radius:
    sample: uniform
    min: 0.92
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.016
time:
  dt: 0.012
  t_end: 11.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.08
          max: 0.14
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.04
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 2.0
              max: 4.2
            center:
              - sample: uniform
                min: 0.5
                max: 0.76
              - sample: uniform
                min: -0.18
                max: 0.12
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.22
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.8
              max: 3.6
            center:
              - sample: uniform
                min: 0.18
                max: 0.5
              - sample: uniform
                min: 0.45
                max: 0.76
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.08
          max: 0.14
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.04
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 2.0
              max: 4.2
            center:
              - sample: uniform
                min: -0.76
                max: -0.5
              - sample: uniform
                min: -0.12
                max: 0.18
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.22
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.8
              max: 3.6
            center:
              - sample: uniform
                min: -0.52
                max: -0.18
              - sample: uniform
                min: -0.76
                max: -0.45
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.08
          max: 0.14
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.04
              max: 0.075
            aspect_ratio:
              sample: uniform
              min: 2.0
              max: 4.2
            center:
              - sample: uniform
                min: -0.12
                max: 0.12
              - sample: uniform
                min: 0.54
                max: 0.8
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.22
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.8
              max: 3.6
            center:
              - sample: uniform
                min: -0.12
                max: 0.12
              - sample: uniform
                min: -0.8
                max: -0.54
boundary_conditions:
  u:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  v:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  w:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
stochastic:
  states:
    u:
      coupling: saturating_self
      intensity: 0.0055
      offset: 0.24
    v:
      coupling: saturating_self
      intensity: 0.0055
      offset: 0.24
    w:
      coupling: saturating_self
      intensity: 0.0055
      offset: 0.24
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
