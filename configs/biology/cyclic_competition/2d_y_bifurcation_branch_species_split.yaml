preset: cyclic_competition
parameters:
  u_inlet_value:
    sample: uniform
    min: 0.72
    max: 0.9
  v_upper_value:
    sample: uniform
    min: 0.68
    max: 0.88
  w_lower_value:
    sample: uniform
    min: 0.68
    max: 0.88
  Du:
    sample: uniform
    min: 0.003
    max: 0.007
  Dv:
    sample: uniform
    min: 0.003
    max: 0.007
  Dw:
    sample: uniform
    min: 0.0025
    max: 0.0065
  a:
    sample: uniform
    min: 0.4
    max: 0.6
  b:
    sample: uniform
    min: 1.66
    max: 2.02
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.9
    max: 1.08
  branch_length:
    sample: uniform
    min: 0.84
    max: 1.06
  branch_angle_degrees:
    sample: uniform
    min: 32.0
    max: 42.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
time:
  dt: 0.01
  t_end: 7.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.1
          max: 0.16
  v:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.08
          max: 0.14
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.08
          max: 0.14
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_inlet_value"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_upper_value"
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  w:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_lower_value"
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [208, 160]
  num_frames: 61
seed: 42
