preset: cyclic_competition
parameters:
  notch_u_value:
    sample: uniform
    min: 0.7
    max: 0.88
  notch_v_value:
    sample: uniform
    min: 0.04
    max: 0.14
  Du:
    sample: uniform
    min: 0.003
    max: 0.007
  Dv:
    sample: uniform
    min: 0.003
    max: 0.007
  Dw:
    sample: uniform
    min: 0.0025
    max: 0.0065
  a:
    sample: uniform
    min: 0.4
    max: 0.6
  b:
    sample: uniform
    min: 1.68
    max: 2.06
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 1.04
    max: 1.22
  outer_height:
    sample: uniform
    min: 1.04
    max: 1.24
  cutout_width:
    sample: uniform
    min: 0.28
    max: 0.42
  cutout_height:
    sample: uniform
    min: 0.4
    max: 0.58
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 0.012
  t_end: 8.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.18
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.22
              max: 0.34
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.36
                max: 0.6
              - sample: uniform
                min: 0.34
                max: 0.58
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.18
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.2
              max: 0.32
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.14
                max: 0.34
              - sample: uniform
                min: 0.72
                max: 1.02
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.2
              max: 0.32
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.68
                max: 0.96
              - sample: uniform
                min: 0.12
                max: 0.32
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:notch_u_value"
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:notch_v_value"
  w:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 61
seed: 42
