preset: cyclic_competition
parameters:
  wall_absorption:
    sample: uniform
    min: 0.08
    max: 0.2
  obstacle_u_value:
    sample: uniform
    min: 0.72
    max: 0.9
  wall_v_value:
    sample: uniform
    min: 0.06
    max: 0.16
  inlet_w_value:
    sample: uniform
    min: 0.34
    max: 0.5
  Du:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dv:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dw:
    sample: uniform
    min: 0.002
    max: 0.0055
  a:
    sample: uniform
    min: 0.48
    max: 0.68
  b:
    sample: uniform
    min: 1.48
    max: 1.9
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.08
    max: 2.38
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  obstacle_center:
    - sample: uniform
      min: 0.9
      max: 1.14
    - sample: uniform
      min: 0.38
      max: 0.62
  obstacle_radius:
    sample: uniform
    min: 0.14
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
time:
  dt: 0.01
  t_end: 9.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.4
                max: 0.72
              - sample: uniform
                min: 0.62
                max: 0.88
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.4
                max: 0.72
              - sample: uniform
                min: 0.16
                max: 0.42
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.14
              max: 0.24
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 1.2
                max: 1.6
              - sample: uniform
                min: 0.34
                max: 0.66
boundary_conditions:
  u:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:obstacle_u_value"
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:wall_v_value"
    obstacle:
      - operator: neumann
        value: 0.0
  w:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:inlet_w_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 144]
  num_frames: 61
seed: 42
