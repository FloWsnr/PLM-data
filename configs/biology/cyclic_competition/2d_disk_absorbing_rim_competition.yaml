preset: cyclic_competition
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  wall_absorption:
    sample: uniform
    min: 0.18
    max: 0.45
  Du:
    sample: uniform
    min: 0.0025
    max: 0.0075
  Dv:
    sample: uniform
    min: 0.003
    max: 0.008
  Dw:
    sample: uniform
    min: 0.002
    max: 0.0065
  a:
    sample: uniform
    min: 0.48
    max: 0.7
  b:
    sample: uniform
    min: 1.45
    max: 1.9
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.94
    max: 1.06
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.016
time:
  dt: 0.012
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.22
          max: 0.3
        amplitude:
          sample: uniform
          min: 0.06
          max: 0.12
        frequency:
          sample: uniform
          min: 3.2
          max: 5.4
        center: ["param:domain_center_x", "param:domain_center_y"]
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.18
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.22
              max: 0.36
            sigma:
              sample: uniform
              min: 0.08
              max: 0.14
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: -0.22
                max: 0.22
              - sample: uniform
                min: -0.2
                max: 0.2
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.12
          max: 0.18
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: -0.65
                max: 0.65
              - sample: uniform
                min: -0.65
                max: 0.65
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
  v:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
  w:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 61
seed: 42
