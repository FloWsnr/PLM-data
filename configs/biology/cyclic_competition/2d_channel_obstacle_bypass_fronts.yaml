preset: cyclic_competition
parameters:
  u_inlet_value:
    sample: uniform
    min: 0.72
    max: 0.9
  v_outlet_value:
    sample: uniform
    min: 0.68
    max: 0.88
  w_obstacle_value:
    sample: uniform
    min: 0.62
    max: 0.84
  Du:
    sample: uniform
    min: 0.003
    max: 0.007
  Dv:
    sample: uniform
    min: 0.003
    max: 0.007
  Dw:
    sample: uniform
    min: 0.0025
    max: 0.0065
  a:
    sample: uniform
    min: 0.4
    max: 0.6
  b:
    sample: uniform
    min: 1.66
    max: 2.04
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.05
    max: 2.35
  height:
    sample: uniform
    min: 0.92
    max: 1.08
  obstacle_center:
    - sample: uniform
      min: 0.92
      max: 1.16
    - sample: uniform
      min: 0.42
      max: 0.6
  obstacle_radius:
    sample: uniform
    min: 0.14
    max: 0.2
  mesh_size:
    sample: uniform
    min: 0.015
    max: 0.018
time:
  dt: 0.01
  t_end: 7.5
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.1
          max: 0.16
  v:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.08
          max: 0.14
  w:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 0.08
          max: 0.14
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:u_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:v_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
  w:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:w_obstacle_value"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [224, 144]
  num_frames: 61
seed: 42
