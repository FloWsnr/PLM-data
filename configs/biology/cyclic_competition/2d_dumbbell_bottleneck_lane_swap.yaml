preset: cyclic_competition
parameters:
  dumbbell_center_y:
    sample: uniform
    min: 0.47
    max: 0.53
  wall_absorption:
    sample: uniform
    min: 0.08
    max: 0.22
  Du:
    sample: uniform
    min: 0.0025
    max: 0.006
  Dv:
    sample: uniform
    min: 0.0025
    max: 0.006
  Dw:
    sample: uniform
    min: 0.002
    max: 0.005
  a:
    sample: uniform
    min: 0.48
    max: 0.68
  b:
    sample: uniform
    min: 1.5
    max: 1.9
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 0.24
      max: 0.3
    - "param:dumbbell_center_y"
  right_center:
    - sample: uniform
      min: 0.7
      max: 0.76
    - "param:dumbbell_center_y"
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.255
  neck_width:
    sample: uniform
    min: 0.08
    max: 0.16
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 0.012
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.52
          max: 0.72
        value_right:
          sample: uniform
          min: 0.12
          max: 0.22
        x_split:
          sample: uniform
          min: 0.44
          max: 0.56
        axis: 0
  v:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.12
          max: 0.22
        value_right:
          sample: uniform
          min: 0.52
          max: 0.72
        x_split:
          sample: uniform
          min: 0.44
          max: 0.56
        axis: 0
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.16
          max: 0.24
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.6
            center:
              - sample: uniform
                min: 0.42
                max: 0.58
              - sample: uniform
                min: 0.4
                max: 0.6
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
  v:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
  w:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: "param:wall_absorption"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 61
seed: 42
