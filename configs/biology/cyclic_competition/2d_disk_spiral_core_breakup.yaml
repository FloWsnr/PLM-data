preset: cyclic_competition
parameters:
  domain_center_x:
    sample: uniform
    min: -0.06
    max: 0.06
  domain_center_y:
    sample: uniform
    min: -0.06
    max: 0.06
  Du:
    sample: uniform
    min: 0.002
    max: 0.0052
  Dv:
    sample: uniform
    min: 0.0018
    max: 0.0048
  Dw:
    sample: uniform
    min: 0.002
    max: 0.0055
  a:
    sample: uniform
    min: 0.28
    max: 0.48
  b:
    sample: uniform
    min: 2.0
    max: 2.4
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 0.96
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.016
time:
  dt: 0.012
  t_end: 11.5
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.08
          max: 0.14
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.2
              max: 0.32
            sigma:
              sample: uniform
              min: 0.055
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 2.4
            center:
              - sample: uniform
                min: -0.62
                max: -0.18
              - sample: uniform
                min: 0.12
                max: 0.62
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.045
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: -0.15
                max: 0.2
              - sample: uniform
                min: -0.08
                max: 0.28
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.08
          max: 0.14
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.2
              max: 0.32
            sigma:
              sample: uniform
              min: 0.055
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 2.4
            center:
              - sample: uniform
                min: 0.15
                max: 0.68
              - sample: uniform
                min: -0.68
                max: -0.12
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.045
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 0.0
                max: 0.36
              - sample: uniform
                min: 0.04
                max: 0.42
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.07
          max: 0.13
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.24
              max: 0.38
            sigma:
              sample: uniform
              min: 0.05
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 2.6
            center:
              - sample: uniform
                min: -0.18
                max: 0.18
              - sample: uniform
                min: 0.26
                max: 0.74
          - count: 1
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.2
            sigma:
              sample: uniform
              min: 0.045
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: -0.34
                max: 0.02
              - sample: uniform
                min: -0.16
                max: 0.24
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
  w:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
stochastic:
  states:
    u:
      coupling: saturating_self
      intensity: 0.005
      offset: 0.22
    v:
      coupling: saturating_self
      intensity: 0.005
      offset: 0.22
    w:
      coupling: saturating_self
      intensity: 0.005
      offset: 0.22
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
