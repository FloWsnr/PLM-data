preset: cyclic_competition
parameters:
  Du:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dv:
    sample: uniform
    min: 0.0025
    max: 0.0065
  Dw:
    sample: uniform
    min: 0.002
    max: 0.0055
  a:
    sample: uniform
    min: 0.48
    max: 0.68
  b:
    sample: uniform
    min: 1.48
    max: 1.9
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.16
    max: 1.3
  height:
    sample: uniform
    min: 0.88
    max: 1.02
  holes:
    - center:
        - sample: uniform
          min: 0.22
          max: 0.3
        - sample: uniform
          min: 0.22
          max: 0.34
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 0.5
          max: 0.6
        - sample: uniform
          min: 0.58
          max: 0.76
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes_mid
    - center:
        - sample: uniform
          min: 0.7
          max: 0.8
        - sample: uniform
          min: 0.26
          max: 0.42
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes_mid
    - center:
        - sample: uniform
          min: 0.94
          max: 1.04
        - sample: uniform
          min: 0.22
          max: 0.36
      radius:
        sample: uniform
        min: 0.05
        max: 0.075
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 0.01
  t_end: 9.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.1
                max: 0.28
              - sample: uniform
                min: 0.4
                max: 0.64
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.28
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.42
                max: 0.7
              - sample: uniform
                min: 0.18
                max: 0.34
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.1
          max: 0.16
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.28
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.92
                max: 1.1
              - sample: uniform
                min: 0.38
                max: 0.66
boundary_conditions:
  u:
    outer:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.72
              max: 0.88
    holes_left:
      - operator: neumann
        value: 0.0
    holes_mid:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.06
              max: 0.14
    holes_right:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.68
              max: 0.86
    holes_mid:
      - operator: neumann
        value: 0.0
    holes_right:
      - operator: neumann
        value: 0.0
  w:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    holes_mid:
      - operator: neumann
        value: 0.0
    holes_right:
      - operator: dirichlet
        value:
          type: constant
          params:
            value:
              sample: uniform
              min: 0.68
              max: 0.86
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 61
seed: 42
