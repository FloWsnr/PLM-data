preset: cyclic_competition
parameters:
  dumbbell_center_y:
    sample: uniform
    min: 0.47
    max: 0.53
  Du:
    sample: uniform
    min: 0.0018
    max: 0.0045
  Dv:
    sample: uniform
    min: 0.0018
    max: 0.0045
  Dw:
    sample: uniform
    min: 0.0012
    max: 0.0035
  a:
    sample: uniform
    min: 0.46
    max: 0.66
  b:
    sample: uniform
    min: 1.82
    max: 2.2
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 0.24
      max: 0.3
    - "param:dumbbell_center_y"
  right_center:
    - sample: uniform
      min: 0.7
      max: 0.76
    - "param:dumbbell_center_y"
  lobe_radius:
    sample: uniform
    min: 0.22
    max: 0.255
  neck_width:
    sample: uniform
    min: 0.05
    max: 0.1
  mesh_size:
    sample: uniform
    min: 0.009
    max: 0.011
time:
  dt: 0.012
  t_end: 10.5
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.07
          max: 0.13
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.22
              max: 0.36
            sigma:
              sample: uniform
              min: 0.045
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.14
                max: 0.32
              - sample: uniform
                min: 0.3
                max: 0.7
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.34
                max: 0.46
              - sample: uniform
                min: 0.4
                max: 0.6
  v:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.07
          max: 0.13
        generators:
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.22
              max: 0.36
            sigma:
              sample: uniform
              min: 0.045
              max: 0.085
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.68
                max: 0.86
              - sample: uniform
                min: 0.3
                max: 0.7
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.04
              max: 0.07
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 0.54
                max: 0.66
              - sample: uniform
                min: 0.4
                max: 0.6
  w:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.06
          max: 0.12
        generators:
          - count:
              sample: randint
              min: 1
              max: 3
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.3
            sigma:
              sample: uniform
              min: 0.035
              max: 0.06
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.4
                max: 0.6
              - sample: uniform
                min: 0.38
                max: 0.62
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
  w:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uvw
  formats: [numpy, gif]
  resolution: [192, 160]
  num_frames: 73
seed: 42
