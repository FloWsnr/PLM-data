preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.046
    max: 0.074
  Dh:
    sample: uniform
    min: 1.3
    max: 2.0
  rho_a:
    sample: uniform
    min: 0.9
    max: 1.08
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.12
  mu_a:
    sample: uniform
    min: 0.82
    max: 0.98
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.012
    max: 0.028
  sigma_h:
    sample: uniform
    min: 0.006
    max: 0.02
  tau:
    sample: uniform
    min: 1.0
    max: 1.85
  a_upper_value:
    sample: uniform
    min: 0.94
    max: 1.08
  a_lower_value:
    sample: uniform
    min: 0.84
    max: 1.0
  h_inlet_value:
    sample: uniform
    min: 1.12
    max: 1.28
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 8.0
    max: 10.0
  branch_length:
    sample: uniform
    min: 6.0
    max: 8.0
  branch_angle_degrees:
    sample: uniform
    min: 28.0
    max: 38.0
  channel_width:
    sample: uniform
    min: 1.8
    max: 2.4
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.015
  t_end: 16.0
inputs:
  a:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.76
          max: 0.9
        value_right:
          sample: uniform
          min: 0.9
          max: 1.02
        x_split:
          sample: uniform
          min: 5.5
          max: 8.5
        axis: 0
  h:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 1.04
          max: 1.16
boundary_conditions:
  a:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:a_upper_value"
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:a_lower_value"
    walls:
      - operator: neumann
        value: 0.0
  h:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:h_inlet_value"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
