preset: gierer_meinhardt
parameters:
  domain_center_x:
    sample: uniform
    min: -0.6
    max: 0.6
  domain_center_y:
    sample: uniform
    min: -0.6
    max: 0.6
  Da:
    sample: uniform
    min: 0.03
    max: 0.046
  Dh:
    sample: uniform
    min: 1.45
    max: 2.3
  rho_a:
    sample: uniform
    min: 0.93
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.05
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.65
    max: 1.05
  ring_frequency:
    sample: uniform
    min: 0.55
    max: 0.9
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 7.5
    max: 9.2
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.145
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.84
          max: 0.96
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.2
        frequency: "param:ring_frequency"
        center: ["param:domain_center_x", "param:domain_center_y"]
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.08
          max: 1.22
        std:
          sample: uniform
          min: 0.02
          max: 0.04
boundary_conditions:
  a:
    outer:
      - operator: neumann
        value: 0.0
  h:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 73
seed: 42
