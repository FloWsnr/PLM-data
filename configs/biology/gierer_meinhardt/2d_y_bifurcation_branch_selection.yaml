preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.036
    max: 0.056
  Dh:
    sample: uniform
    min: 1.5
    max: 2.3
  rho_a:
    sample: uniform
    min: 0.94
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.04
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.75
    max: 1.2
  a_inlet_value:
    sample: uniform
    min: 0.94
    max: 1.1
  inlet_exchange:
    sample: uniform
    min: 0.05
    max: 0.14
  h_upper_value:
    sample: uniform
    min: 1.16
    max: 1.34
  h_lower_value:
    sample: uniform
    min: 1.02
    max: 1.2
  upper_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
  lower_exchange:
    sample: uniform
    min: 0.04
    max: 0.12
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 8.0
    max: 10.0
  branch_length:
    sample: uniform
    min: 6.0
    max: 8.0
  branch_angle_degrees:
    sample: uniform
    min: 28.0
    max: 38.0
  channel_width:
    sample: uniform
    min: 1.8
    max: 2.4
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.76
          max: 0.9
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 0.9
              max: 1.5
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 2.5
                max: 5.5
              - sample: uniform
                min: -0.5
                max: 0.5
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.8
              max: 1.3
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 7.0
                max: 9.6
              - sample: uniform
                min: -0.9
                max: 0.9
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.04
          max: 1.16
        std:
          sample: uniform
          min: 0.018
          max: 0.04
boundary_conditions:
  a:
    inlet:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:a_inlet_value"
        operator_parameters:
          alpha: "param:inlet_exchange"
    outlet_upper:
      - operator: neumann
        value: 0.0
    outlet_lower:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
  h:
    inlet:
      - operator: neumann
        value: 0.0
    outlet_upper:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_upper_value"
        operator_parameters:
          alpha: "param:upper_exchange"
    outlet_lower:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_lower_value"
        operator_parameters:
          alpha: "param:lower_exchange"
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
