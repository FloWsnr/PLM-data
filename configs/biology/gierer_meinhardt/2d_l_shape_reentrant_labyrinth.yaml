preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.046
    max: 0.074
  Dh:
    sample: uniform
    min: 1.3
    max: 2.0
  rho_a:
    sample: uniform
    min: 0.9
    max: 1.08
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.12
  mu_a:
    sample: uniform
    min: 0.82
    max: 0.98
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.012
    max: 0.028
  sigma_h:
    sample: uniform
    min: 0.006
    max: 0.02
  tau:
    sample: uniform
    min: 1.0
    max: 1.85
  notch_exchange:
    sample: uniform
    min: 0.05
    max: 0.16
  a_notch_value:
    sample: uniform
    min: 0.82
    max: 1.0
  h_notch_value:
    sample: uniform
    min: 1.1
    max: 1.3
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 15.0
    max: 18.0
  outer_height:
    sample: uniform
    min: 15.0
    max: 19.0
  cutout_width:
    sample: uniform
    min: 5.0
    max: 7.5
  cutout_height:
    sample: uniform
    min: 6.0
    max: 8.5
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.015
  t_end: 16.0
inputs:
  a:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.78
          max: 0.92
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 1.0
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 2.5
            center:
              - sample: uniform
                min: 2.0
                max: 6.5
              - sample: uniform
                min: 9.0
                max: 15.0
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 7.0
                max: 14.5
              - sample: uniform
                min: 1.8
                max: 5.4
          - count: 1
            amplitude:
              sample: uniform
              min: 0.05
              max: 0.14
            sigma:
              sample: uniform
              min: 0.7
              max: 1.2
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 5.5
                max: 8.5
              - sample: uniform
                min: 5.5
                max: 8.8
  h:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 5.0
            max: 8.5
          - sample: uniform
            min: 6.0
            max: 9.5
        region_values:
          "00":
            sample: uniform
            min: 1.0
            max: 1.14
          "01":
            sample: uniform
            min: 1.12
            max: 1.28
          "10":
            sample: uniform
            min: 1.04
            max: 1.2
          "11":
            sample: uniform
            min: 1.14
            max: 1.3
boundary_conditions:
  a:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:a_notch_value"
        operator_parameters:
          alpha: "param:notch_exchange"
  h:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_notch_value"
        operator_parameters:
          alpha: "param:notch_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
