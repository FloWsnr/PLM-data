preset: gierer_meinhardt
parameters:
  domain_center_x:
    sample: uniform
    min: -0.6
    max: 0.6
  domain_center_y:
    sample: uniform
    min: -0.6
    max: 0.6
  Da:
    sample: uniform
    min: 0.044
    max: 0.072
  Dh:
    sample: uniform
    min: 1.3
    max: 2.0
  rho_a:
    sample: uniform
    min: 0.9
    max: 1.08
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.12
  mu_a:
    sample: uniform
    min: 0.82
    max: 0.98
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.012
    max: 0.028
  sigma_h:
    sample: uniform
    min: 0.006
    max: 0.02
  tau:
    sample: uniform
    min: 1.0
    max: 1.8
  wall_exchange:
    sample: uniform
    min: 0.06
    max: 0.16
  a_wall_value:
    sample: uniform
    min: 0.78
    max: 0.94
  h_wall_value:
    sample: uniform
    min: 1.08
    max: 1.24
  ring_frequency:
    sample: uniform
    min: 0.35
    max: 0.65
domain:
  allow_sampling: true
  type: disk
  center: ["param:domain_center_x", "param:domain_center_y"]
  radius:
    sample: uniform
    min: 7.8
    max: 9.5
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.145
time:
  dt: 0.015
  t_end: 16.0
inputs:
  a:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.8
          max: 0.92
        generators:
          - count:
              sample: randint
              min: 2
              max: 4
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 1.1
              max: 2.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: -5.0
                max: 5.0
              - sample: uniform
                min: -5.0
                max: 5.0
  h:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 1.08
          max: 1.2
        amplitude:
          sample: uniform
          min: 0.04
          max: 0.1
        frequency: "param:ring_frequency"
        center: ["param:domain_center_x", "param:domain_center_y"]
boundary_conditions:
  a:
    outer:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:a_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
  h:
    outer:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
