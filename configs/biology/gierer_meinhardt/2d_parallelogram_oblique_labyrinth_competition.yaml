preset: gierer_meinhardt
parameters:
  domain_origin_x:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_origin_y:
    sample: uniform
    min: -1.2
    max: 1.2
  domain_size_x:
    sample: uniform
    min: 20.0
    max: 24.0
  domain_height:
    sample: uniform
    min: 12.0
    max: 16.0
  domain_shear:
    sample: uniform
    min: 6.0
    max: 10.0
  Da:
    sample: uniform
    min: 0.046
    max: 0.074
  Dh:
    sample: uniform
    min: 1.3
    max: 2.0
  rho_a:
    sample: uniform
    min: 0.88
    max: 1.08
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.12
  mu_a:
    sample: uniform
    min: 0.82
    max: 0.98
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.012
    max: 0.028
  sigma_h:
    sample: uniform
    min: 0.006
    max: 0.02
  tau:
    sample: uniform
    min: 1.0
    max: 1.85
  wall_exchange:
    sample: uniform
    min: 0.05
    max: 0.12
  a_wall_value:
    sample: uniform
    min: 0.8
    max: 0.97
  h_wall_value:
    sample: uniform
    min: 1.08
    max: 1.24
domain:
  allow_sampling: true
  type: parallelogram
  origin: ["param:domain_origin_x", "param:domain_origin_y"]
  axis_x: ["param:domain_size_x", 0.0]
  axis_y: ["param:domain_shear", "param:domain_height"]
  mesh_resolution: [192, 144]
time:
  dt: 0.015
  t_end: 16.0
inputs:
  a:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.89
          max: 1.02
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 0.7
                max: 1.2
              - sample: uniform
                min: 1.9
                max: 3.1
            phase:
              sample: uniform
              min: -0.55
              max: 0.55
            angle:
              sample: uniform
              min: 0.55
              max: 1.35
          - amplitude:
              sample: uniform
              min: 0.03
              max: 0.08
            cycles:
              - sample: uniform
                min: 1.2
                max: 1.9
              - sample: uniform
                min: 0.8
                max: 1.4
            phase:
              sample: uniform
              min: 0.1
              max: 1.0
            angle:
              sample: uniform
              min: -0.25
              max: 0.3
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.1
          max: 1.24
        std:
          sample: uniform
          min: 0.02
          max: 0.04
boundary_conditions:
  a:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:a_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:a_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
  h:
    x-:
      - operator: periodic
        pair_with: x+
    x+:
      - operator: periodic
        pair_with: x-
    y-:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
    y+:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_wall_value"
        operator_parameters:
          alpha: "param:wall_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [192, 144]
  num_frames: 65
seed: 42
