preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.036
    max: 0.056
  Dh:
    sample: uniform
    min: 1.55
    max: 2.35
  rho_a:
    sample: uniform
    min: 0.94
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.04
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.72
    max: 1.18
  notch_a_value:
    sample: uniform
    min: 0.92
    max: 1.08
  notch_h_value:
    sample: uniform
    min: 1.14
    max: 1.28
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 15.0
    max: 18.0
  outer_height:
    sample: uniform
    min: 15.0
    max: 19.0
  cutout_width:
    sample: uniform
    min: 5.0
    max: 7.5
  cutout_height:
    sample: uniform
    min: 6.0
    max: 8.5
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 5.5
            max: 8.0
          - sample: uniform
            min: 6.0
            max: 9.0
        region_values:
          "00":
            sample: uniform
            min: 0.76
            max: 0.9
          "01":
            sample: uniform
            min: 0.9
            max: 1.08
          "10":
            sample: uniform
            min: 0.74
            max: 0.88
          "11":
            sample: uniform
            min: 0.82
            max: 0.98
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.08
          max: 1.22
        std:
          sample: uniform
          min: 0.02
          max: 0.04
boundary_conditions:
  a:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:notch_a_value"
  h:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:notch_h_value"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 73
seed: 42
