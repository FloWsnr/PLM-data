preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.036
    max: 0.056
  Dh:
    sample: uniform
    min: 1.5
    max: 2.3
  rho_a:
    sample: uniform
    min: 0.94
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.04
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.75
    max: 1.2
  h_obstacle_value:
    sample: uniform
    min: 1.08
    max: 1.18
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 8.0
    max: 10.0
  obstacle_center:
    - sample: uniform
      min: 8.5
      max: 11.0
    - sample: uniform
      min: 3.4
      max: 5.6
  obstacle_radius:
    sample: uniform
    min: 1.4
    max: 1.9
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.16
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.76
          max: 0.9
        value_right:
          sample: uniform
          min: 0.9
          max: 1.04
        x_split:
          sample: uniform
          min: 7.0
          max: 11.0
        axis: 0
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.04
          max: 1.16
        std:
          sample: uniform
          min: 0.015
          max: 0.03
boundary_conditions:
  a:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
  h:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:h_obstacle_value"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
