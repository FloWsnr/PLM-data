preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.036
    max: 0.056
  Dh:
    sample: uniform
    min: 1.5
    max: 2.3
  rho_a:
    sample: uniform
    min: 0.94
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.04
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.75
    max: 1.2
  left_hole_exchange:
    sample: uniform
    min: 0.08
    max: 0.18
  right_hole_exchange:
    sample: uniform
    min: 0.06
    max: 0.16
  a_left_hole_value:
    sample: uniform
    min: 0.82
    max: 0.96
  a_center_hole_value:
    sample: uniform
    min: 0.74
    max: 0.88
  h_center_hole_value:
    sample: uniform
    min: 1.14
    max: 1.28
  h_right_hole_value:
    sample: uniform
    min: 1.08
    max: 1.22
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 12.0
    max: 14.5
  holes:
    - center:
        - sample: uniform
          min: 4.2
          max: 5.8
        - sample: uniform
          min: 3.2
          max: 4.9
      radius:
        sample: uniform
        min: 1.0
        max: 1.35
      boundary_name: holes_left
    - center:
        - sample: uniform
          min: 9.2
          max: 11.4
        - sample: uniform
          min: 5.0
          max: 7.4
      radius:
        sample: uniform
        min: 1.0
        max: 1.45
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 14.8
          max: 17.0
        - sample: uniform
          min: 3.0
          max: 4.9
      radius:
        sample: uniform
        min: 1.0
        max: 1.35
      boundary_name: holes_right
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.88
          max: 1.02
        std:
          sample: uniform
          min: 0.03
          max: 0.06
  h:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 7.0
            max: 11.0
          - sample: uniform
            min: 4.5
            max: 7.5
        region_values:
          "00":
            sample: uniform
            min: 1.02
            max: 1.14
          "01":
            sample: uniform
            min: 1.12
            max: 1.26
          "10":
            sample: uniform
            min: 1.08
            max: 1.2
          "11":
            sample: uniform
            min: 1.16
            max: 1.3
boundary_conditions:
  a:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:a_left_hole_value"
        operator_parameters:
          alpha: "param:left_hole_exchange"
    hole_center:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:a_center_hole_value"
    holes_right:
      - operator: neumann
        value: 0.0
  h:
    outer:
      - operator: neumann
        value: 0.0
    holes_left:
      - operator: neumann
        value: 0.0
    hole_center:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:h_center_hole_value"
    holes_right:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_right_hole_value"
        operator_parameters:
          alpha: "param:right_hole_exchange"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
