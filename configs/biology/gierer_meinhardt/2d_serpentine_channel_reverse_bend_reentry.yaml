preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.046
    max: 0.074
  Dh:
    sample: uniform
    min: 1.3
    max: 2.0
  rho_a:
    sample: uniform
    min: 0.9
    max: 1.08
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.12
  mu_a:
    sample: uniform
    min: 0.82
    max: 0.98
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.012
    max: 0.028
  sigma_h:
    sample: uniform
    min: 0.006
    max: 0.02
  tau:
    sample: uniform
    min: 1.0
    max: 1.85
  a_outlet_value:
    sample: uniform
    min: 0.94
    max: 1.1
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length:
    sample: uniform
    min: 7.5
    max: 9.5
  lane_spacing:
    sample: uniform
    min: 3.0
    max: 4.2
  n_bends:
    sample: randint
    min: 2
    max: 3
  channel_width:
    sample: uniform
    min: 1.6
    max: 2.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.015
  t_end: 16.0
inputs:
  a:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.86
          max: 0.98
        modes:
          - amplitude:
              sample: uniform
              min: 0.08
              max: 0.14
            cycles:
              - sample: uniform
                min: 0.4
                max: 0.8
              - sample: uniform
                min: 1.8
                max: 2.8
            phase:
              sample: uniform
              min: -0.55
              max: 0.55
            angle:
              sample: uniform
              min: 0.1
              max: 1.0
  h:
    initial_condition:
      type: constant
      params:
        value:
          sample: uniform
          min: 1.04
          max: 1.16
boundary_conditions:
  a:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:a_outlet_value"
    walls:
      - operator: neumann
        value: 0.0
  h:
    inlet:
      - operator: neumann
        value: 0.0
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
