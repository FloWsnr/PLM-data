preset: gierer_meinhardt
parameters:
  domain_center_x:
    sample: uniform
    min: -0.5
    max: 0.5
  domain_center_y:
    sample: uniform
    min: -0.5
    max: 0.5
  Da:
    sample: uniform
    min: 0.045
    max: 0.072
  Dh:
    sample: uniform
    min: 1.3
    max: 2.0
  rho_a:
    sample: uniform
    min: 0.9
    max: 1.08
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.12
  mu_a:
    sample: uniform
    min: 0.82
    max: 0.98
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.012
    max: 0.028
  sigma_h:
    sample: uniform
    min: 0.006
    max: 0.02
  tau:
    sample: uniform
    min: 1.0
    max: 1.8
  a_inner_exchange:
    sample: uniform
    min: 0.03
    max: 0.1
  h_inner_exchange:
    sample: uniform
    min: 0.05
    max: 0.16
  a_inner_value:
    sample: uniform
    min: 0.9
    max: 1.06
  h_inner_value:
    sample: uniform
    min: 1.12
    max: 1.28
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 2.8
    max: 3.8
  outer_radius:
    sample: uniform
    min: 8.0
    max: 9.4
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.135
time:
  dt: 0.015
  t_end: 16.0
inputs:
  a:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.74
          max: 0.88
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.16
              max: 0.3
            sigma:
              sample: uniform
              min: 0.65
              max: 1.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: -0.8
                max: 0.8
              - sample: uniform
                min: 4.8
                max: 6.8
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 0.65
              max: 1.1
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: -6.4
                max: -4.6
              - sample: uniform
                min: -0.8
                max: 0.8
          - count: 1
            amplitude:
              sample: uniform
              min: 0.1
              max: 0.22
            sigma:
              sample: uniform
              min: 0.6
              max: 1.0
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 4.4
                max: 6.2
              - sample: uniform
                min: -5.2
                max: -3.2
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.08
          max: 1.22
        std:
          sample: uniform
          min: 0.035
          max: 0.065
boundary_conditions:
  a:
    inner:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:a_inner_value"
        operator_parameters:
          alpha: "param:a_inner_exchange"
    outer:
      - operator: neumann
        value: 0.0
  h:
    inner:
      - operator: robin
        value:
          type: constant
          params:
            value: "param:h_inner_value"
        operator_parameters:
          alpha: "param:h_inner_exchange"
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 65
seed: 42
