preset: gierer_meinhardt
parameters:
  left_center_x:
    sample: uniform
    min: -6.0
    max: -5.0
  right_center_x:
    sample: uniform
    min: 5.0
    max: 6.0
  center_y:
    sample: uniform
    min: -0.4
    max: 0.4
  Da:
    sample: uniform
    min: 0.036
    max: 0.056
  Dh:
    sample: uniform
    min: 1.55
    max: 2.35
  rho_a:
    sample: uniform
    min: 0.94
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.04
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.75
    max: 1.2
domain:
  allow_sampling: true
  type: dumbbell
  left_center: ["param:left_center_x", "param:center_y"]
  right_center: ["param:right_center_x", "param:center_y"]
  lobe_radius:
    sample: uniform
    min: 3.4
    max: 4.0
  neck_width:
    sample: uniform
    min: 1.4
    max: 2.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 0.96
          max: 1.14
        value_right:
          sample: uniform
          min: 0.78
          max: 0.94
        x_split:
          sample: uniform
          min: -0.5
          max: 0.5
        axis: 0
  h:
    initial_condition:
      type: step
      params:
        value_left:
          sample: uniform
          min: 1.04
          max: 1.18
        value_right:
          sample: uniform
          min: 1.18
          max: 1.34
        x_split:
          sample: uniform
          min: -0.5
          max: 0.5
        axis: 0
boundary_conditions:
  a:
    outer:
      - operator: neumann
        value: 0.0
  h:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
