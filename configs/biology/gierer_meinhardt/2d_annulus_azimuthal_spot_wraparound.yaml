preset: gierer_meinhardt
parameters:
  domain_center_x:
    sample: uniform
    min: -0.5
    max: 0.5
  domain_center_y:
    sample: uniform
    min: -0.5
    max: 0.5
  Da:
    sample: uniform
    min: 0.03
    max: 0.046
  Dh:
    sample: uniform
    min: 1.45
    max: 2.35
  rho_a:
    sample: uniform
    min: 0.93
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.05
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.62
    max: 1.0
  ring_frequency:
    sample: uniform
    min: 0.7
    max: 1.1
domain:
  allow_sampling: true
  type: annulus
  center: ["param:domain_center_x", "param:domain_center_y"]
  inner_radius:
    sample: uniform
    min: 3.0
    max: 3.8
  outer_radius:
    sample: uniform
    min: 8.0
    max: 9.2
  mesh_size:
    sample: uniform
    min: 0.11
    max: 0.135
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: 0.82
          max: 0.94
        amplitude:
          sample: uniform
          min: 0.12
          max: 0.18
        frequency: "param:ring_frequency"
        center: ["param:domain_center_x", "param:domain_center_y"]
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.08
          max: 1.22
        std:
          sample: uniform
          min: 0.02
          max: 0.04
boundary_conditions:
  a:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  h:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 73
seed: 42
