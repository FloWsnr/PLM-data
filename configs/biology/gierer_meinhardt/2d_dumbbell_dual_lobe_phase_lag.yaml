preset: gierer_meinhardt
parameters:
  left_center_x:
    sample: uniform
    min: -6.0
    max: -5.0
  right_center_x:
    sample: uniform
    min: 5.0
    max: 6.0
  center_y:
    sample: uniform
    min: -0.4
    max: 0.4
  Da:
    sample: uniform
    min: 0.045
    max: 0.072
  Dh:
    sample: uniform
    min: 1.3
    max: 2.0
  rho_a:
    sample: uniform
    min: 0.9
    max: 1.08
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.12
  mu_a:
    sample: uniform
    min: 0.82
    max: 0.98
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.012
    max: 0.028
  sigma_h:
    sample: uniform
    min: 0.006
    max: 0.02
  tau:
    sample: uniform
    min: 1.0
    max: 1.8
domain:
  allow_sampling: true
  type: dumbbell
  left_center: ["param:left_center_x", "param:center_y"]
  right_center: ["param:right_center_x", "param:center_y"]
  lobe_radius:
    sample: uniform
    min: 3.4
    max: 4.0
  neck_width:
    sample: uniform
    min: 1.4
    max: 2.0
  mesh_size:
    sample: uniform
    min: 0.12
    max: 0.15
time:
  dt: 0.015
  t_end: 16.0
inputs:
  a:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.8
          max: 0.92
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 1.0
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: -5.2
                max: -3.4
              - sample: uniform
                min: -1.2
                max: 1.2
          - count: 1
            amplitude:
              sample: uniform
              min: 0.08
              max: 0.18
            sigma:
              sample: uniform
              min: 1.0
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.4
            center:
              - sample: uniform
                min: 3.4
                max: 5.2
              - sample: uniform
                min: -1.2
                max: 1.2
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.08
          max: 1.22
        std:
          sample: uniform
          min: 0.02
          max: 0.04
boundary_conditions:
  a:
    outer:
      - operator: neumann
        value: 0.0
  h:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 65
seed: 42
