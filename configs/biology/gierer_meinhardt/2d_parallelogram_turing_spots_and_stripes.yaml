preset: gierer_meinhardt
parameters:
  domain_origin_x:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_origin_y:
    sample: uniform
    min: -1.0
    max: 1.0
  domain_size_x:
    sample: uniform
    min: 18.0
    max: 22.0
  domain_height:
    sample: uniform
    min: 16.0
    max: 20.0
  domain_shear:
    sample: uniform
    min: 4.0
    max: 7.5
  Da:
    sample: uniform
    min: 0.034
    max: 0.054
  Dh:
    sample: uniform
    min: 1.65
    max: 2.45
  rho_a:
    sample: uniform
    min: 0.94
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.9
    max: 1.06
  mu_h:
    sample: uniform
    min: 0.78
    max: 0.94
  sigma_a:
    sample: uniform
    min: 0.008
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.75
    max: 1.22
domain:
  allow_sampling: true
  type: parallelogram
  origin: ["param:domain_origin_x", "param:domain_origin_y"]
  axis_x: ["param:domain_size_x", 0.0]
  axis_y: ["param:domain_shear", "param:domain_height"]
  mesh_resolution: [160, 160]
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 0.88
          max: 1.02
        std:
          sample: uniform
          min: 0.035
          max: 0.065
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.08
          max: 1.22
        std:
          sample: uniform
          min: 0.02
          max: 0.045
boundary_conditions:
  a:
    $ref: boundary_field.scalar.full_periodic_2d
  h:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
