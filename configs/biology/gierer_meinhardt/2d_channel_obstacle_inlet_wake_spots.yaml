preset: gierer_meinhardt
parameters:
  Da:
    sample: uniform
    min: 0.036
    max: 0.056
  Dh:
    sample: uniform
    min: 1.5
    max: 2.3
  rho_a:
    sample: uniform
    min: 0.94
    max: 1.14
  rho_h:
    sample: uniform
    min: 0.9
    max: 1.08
  mu_a:
    sample: uniform
    min: 0.88
    max: 1.04
  mu_h:
    sample: uniform
    min: 0.76
    max: 0.92
  sigma_a:
    sample: uniform
    min: 0.009
    max: 0.02
  sigma_h:
    sample: uniform
    min: 0.004
    max: 0.016
  tau:
    sample: uniform
    min: 0.75
    max: 1.2
  a_inlet_value:
    sample: uniform
    min: 0.96
    max: 1.12
  h_inlet_value:
    sample: uniform
    min: 1.14
    max: 1.28
  a_obstacle_value:
    sample: uniform
    min: 0.74
    max: 0.88
  h_obstacle_value:
    sample: uniform
    min: 1.18
    max: 1.34
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 18.0
    max: 22.0
  height:
    sample: uniform
    min: 8.0
    max: 10.0
  obstacle_center:
    - sample: uniform
      min: 8.5
      max: 11.0
    - sample: uniform
      min: 3.4
      max: 5.6
  obstacle_radius:
    sample: uniform
    min: 1.4
    max: 1.9
  mesh_size:
    sample: uniform
    min: 0.13
    max: 0.16
time:
  dt: 0.012
  t_end: 18.0
inputs:
  a:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: 0.76
          max: 0.88
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.12
              max: 0.24
            sigma:
              sample: uniform
              min: 1.0
              max: 1.6
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 3.0
                max: 6.0
              - sample: uniform
                min: 2.8
                max: 6.2
          - count: 1
            amplitude:
              sample: uniform
              min: 0.06
              max: 0.14
            sigma:
              sample: uniform
              min: 0.8
              max: 1.4
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.8
            center:
              - sample: uniform
                min: 7.0
                max: 10.0
              - sample: uniform
                min: 2.2
                max: 6.6
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: 1.04
          max: 1.16
        std:
          sample: uniform
          min: 0.015
          max: 0.03
boundary_conditions:
  a:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:a_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:a_obstacle_value"
  h:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:h_inlet_value"
    outlet:
      - operator: neumann
        value: 0.0
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: "param:h_obstacle_value"
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
