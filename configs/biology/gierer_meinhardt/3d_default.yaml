preset: gierer_meinhardt
parameters:
  Da: 0.05
  Dh: 2.0
  rho_a: 1.0
  rho_h: 1.0
  mu_a: 1.0
  mu_h: 1.0
  sigma_a: 0.01
  sigma_h: 0.0
  tau: 1.0
domain:
  type: box
  size: [10.0, 10.0, 10.0]
  mesh_resolution: [32, 32, 32]
time:
  dt: 0.01
  t_end: 20.0
inputs:
  a:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 1.0
        std: 0.05
  h:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 1.0
        std: 0.05
boundary_conditions:
  a:
    $ref: boundary_field.scalar.full_periodic_3d
  h:
    $ref: boundary_field.scalar.full_periodic_3d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_ah
  resolution: [20, 20, 20]
  num_frames: 30
seed: 42
