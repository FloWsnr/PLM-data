preset: fitzhugh_nagumo
parameters:
  u_inlet_value:
    sample: uniform
    min: 0.76
    max: 0.95
  v_inlet_value:
    sample: uniform
    min: -0.12
    max: 0.03
  outlet_absorption:
    sample: uniform
    min: 0.08
    max: 0.18
  Du:
    sample: uniform
    min: 0.001
    max: 0.0016
  Dv:
    sample: uniform
    min: 0.025
    max: 0.05
  tau:
    sample: uniform
    min: 0.14
    max: 0.26
  b:
    sample: uniform
    min: 0.58
    max: 0.8
  a:
    sample: uniform
    min: -0.08
    max: 0.0
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.96
    max: 1.12
  obstacle_center:
    - sample: uniform
      min: 0.9
      max: 1.08
    - sample: uniform
      min: 0.44
      max: 0.64
  obstacle_radius:
    sample: uniform
    min: 0.12
    max: 0.17
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.005
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:u_inlet_value
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:outlet_absorption
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: dirichlet
        value: 0.0
  v:
    inlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:v_inlet_value
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:outlet_absorption
    walls:
      - operator: neumann
        value: 0.0
    obstacle:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 61
seed: 42
