preset: fitzhugh_nagumo
parameters:
  notch_absorption:
    sample: uniform
    min: 0.06
    max: 0.18
  Du:
    sample: uniform
    min: 0.00095
    max: 0.00145
  Dv:
    sample: uniform
    min: 0.04
    max: 0.065
  tau:
    sample: uniform
    min: 0.06
    max: 0.12
  b:
    sample: uniform
    min: 0.44
    max: 0.58
  a:
    sample: uniform
    min: -0.03
    max: 0.03
domain:
  allow_sampling: true
  type: l_shape
  outer_width:
    sample: uniform
    min: 0.96
    max: 1.22
  outer_height:
    sample: uniform
    min: 0.98
    max: 1.24
  cutout_width:
    sample: uniform
    min: 0.24
    max: 0.46
  cutout_height:
    sample: uniform
    min: 0.28
    max: 0.5
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.004
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.04
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.58
              max: 0.96
            sigma:
              sample: uniform
              min: 0.07
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.6
            center:
              - sample: uniform
                min: 0.34
                max: 0.68
              - sample: uniform
                min: 0.34
                max: 0.74
          - count: 1
            amplitude:
              sample: uniform
              min: 0.28
              max: 0.76
            sigma:
              sample: uniform
              min: 0.06
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 0.56
                max: 0.96
              - sample: uniform
                min: 0.08
                max: 0.42
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.14
              max: 0.34
            sigma:
              sample: uniform
              min: 0.04
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.2
            center:
              - sample: uniform
                min: 0.14
                max: 0.42
              - sample: uniform
                min: 0.62
                max: 0.96
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.04
          max: 0.02
        std:
          sample: uniform
          min: 0.035
          max: 0.08
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:notch_absorption
  v:
    outer:
      - operator: neumann
        value: 0.0
    notch:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:notch_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
