preset: fitzhugh_nagumo
parameters:
  wall_absorption:
    sample: uniform
    min: 0.05
    max: 0.12
  u_center_value:
    sample: uniform
    min: 0.78
    max: 0.96
  v_center_value:
    sample: uniform
    min: -0.14
    max: 0.02
  Du:
    sample: uniform
    min: 0.001
    max: 0.00165
  Dv:
    sample: uniform
    min: 0.028
    max: 0.048
  tau:
    sample: uniform
    min: 0.14
    max: 0.24
  b:
    sample: uniform
    min: 0.58
    max: 0.8
  a:
    sample: uniform
    min: -0.08
    max: 0.0
domain:
  allow_sampling: true
  type: multi_hole_plate
  width:
    sample: uniform
    min: 1.02
    max: 1.14
  height:
    sample: uniform
    min: 1.1
    max: 1.24
  holes:
    - center:
        - sample: uniform
          min: 0.56
          max: 0.68
        - sample: uniform
          min: 0.8
          max: 0.9
      radius:
        sample: uniform
        min: 0.055
        max: 0.075
      boundary_name: hole_upper
    - center:
        - sample: uniform
          min: 0.44
          max: 0.58
        - sample: uniform
          min: 0.5
          max: 0.64
      radius:
        sample: uniform
        min: 0.06
        max: 0.08
      boundary_name: hole_center
    - center:
        - sample: uniform
          min: 0.62
          max: 0.76
        - sample: uniform
          min: 0.24
          max: 0.34
      radius:
        sample: uniform
        min: 0.055
        max: 0.075
      boundary_name: hole_lower
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.005
  t_end: 14.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std:
          sample: uniform
          min: 0.015
          max: 0.04
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std:
          sample: uniform
          min: 0.015
          max: 0.04
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    hole_upper:
      - operator: dirichlet
        value: 0.0
    hole_center:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:u_center_value
    hole_lower:
      - operator: dirichlet
        value: 0.0
  v:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    hole_upper:
      - operator: dirichlet
        value: 0.0
    hole_center:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:v_center_value
    hole_lower:
      - operator: dirichlet
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 192]
  num_frames: 81
seed: 42
