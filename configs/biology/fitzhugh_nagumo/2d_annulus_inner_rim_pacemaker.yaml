preset: fitzhugh_nagumo
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  outer_absorption:
    sample: uniform
    min: 0.06
    max: 0.14
  u_inner_value:
    sample: uniform
    min: 0.75
    max: 0.96
  v_inner_value:
    sample: uniform
    min: -0.12
    max: 0.02
  Du:
    sample: uniform
    min: 0.00105
    max: 0.00175
  Dv:
    sample: uniform
    min: 0.028
    max: 0.048
  tau:
    sample: uniform
    min: 0.16
    max: 0.28
  b:
    sample: uniform
    min: 0.58
    max: 0.78
  a:
    sample: uniform
    min: -0.08
    max: 0.0
domain:
  allow_sampling: true
  type: annulus
  center: [param:domain_center_x, param:domain_center_y]
  inner_radius:
    sample: uniform
    min: 0.24
    max: 0.34
  outer_radius:
    sample: uniform
    min: 0.9
    max: 1.04
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.005
  t_end: 14.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std:
          sample: uniform
          min: 0.015
          max: 0.04
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std:
          sample: uniform
          min: 0.015
          max: 0.04
boundary_conditions:
  u:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:u_inner_value
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:outer_absorption
  v:
    inner:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:v_inner_value
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:outer_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 81
seed: 42
