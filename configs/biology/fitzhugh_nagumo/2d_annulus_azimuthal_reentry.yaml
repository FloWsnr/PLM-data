preset: fitzhugh_nagumo
parameters:
  domain_center_x:
    sample: uniform
    min: -0.05
    max: 0.05
  domain_center_y:
    sample: uniform
    min: -0.05
    max: 0.05
  Du:
    sample: uniform
    min: 0.0009
    max: 0.0015
  Dv:
    sample: uniform
    min: 0.035
    max: 0.06
  tau:
    sample: uniform
    min: 0.08
    max: 0.16
  b:
    sample: uniform
    min: 0.48
    max: 0.68
  a:
    sample: uniform
    min: -0.04
    max: 0.02
  v_background:
    sample: uniform
    min: -0.08
    max: 0.02
domain:
  allow_sampling: true
  type: annulus
  center: [param:domain_center_x, param:domain_center_y]
  inner_radius:
    sample: uniform
    min: 0.26
    max: 0.38
  outer_radius:
    sample: uniform
    min: 0.92
    max: 1.05
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.005
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.05
          max: 0.02
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.62
              max: 0.9
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.2
              max: 2.1
            center:
              - sample: uniform
                min: 0.44
                max: 0.72
              - sample: uniform
                min: 0.04
                max: 0.32
          - count: 1
            amplitude:
              sample: uniform
              min: 0.52
              max: 0.82
            sigma:
              sample: uniform
              min: 0.06
              max: 0.1
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 1.9
            center:
              - sample: uniform
                min: -0.74
                max: -0.46
              - sample: uniform
                min: -0.36
                max: -0.08
          - count:
              sample: randint
              min: 1
              max: 2
            amplitude:
              sample: uniform
              min: 0.18
              max: 0.34
            sigma:
              sample: uniform
              min: 0.05
              max: 0.08
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 1.5
            center:
              - sample: uniform
                min: -0.16
                max: 0.12
              - sample: uniform
                min: 0.44
                max: 0.72
  v:
    initial_condition:
      type: constant
      params:
        value: param:v_background
boundary_conditions:
  u:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
  v:
    inner:
      - operator: neumann
        value: 0.0
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
