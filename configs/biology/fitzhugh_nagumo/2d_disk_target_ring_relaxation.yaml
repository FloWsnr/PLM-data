preset: fitzhugh_nagumo
parameters:
  domain_center_x:
    sample: uniform
    min: -0.06
    max: 0.06
  domain_center_y:
    sample: uniform
    min: -0.06
    max: 0.06
  ic_center_x:
    sample: uniform
    min: -0.08
    max: 0.08
  ic_center_y:
    sample: uniform
    min: -0.08
    max: 0.08
  Du:
    sample: uniform
    min: 0.0009
    max: 0.00135
  Dv:
    sample: uniform
    min: 0.032
    max: 0.05
  tau:
    sample: uniform
    min: 0.09
    max: 0.17
  b:
    sample: uniform
    min: 0.48
    max: 0.64
  a:
    sample: uniform
    min: -0.03
    max: 0.02
  v_background:
    sample: uniform
    min: -0.1
    max: 0.04
domain:
  allow_sampling: true
  type: disk
  center: [param:domain_center_x, param:domain_center_y]
  radius:
    sample: uniform
    min: 0.92
    max: 1.08
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.005
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: radial_cosine
      params:
        base:
          sample: uniform
          min: -0.05
          max: 0.05
        amplitude:
          sample: uniform
          min: 0.55
          max: 0.85
        frequency:
          sample: uniform
          min: 7.0
          max: 11.0
        center: [param:ic_center_x, param:ic_center_y]
  v:
    initial_condition:
      type: constant
      params:
        value: param:v_background
boundary_conditions:
  u:
    outer:
      - operator: neumann
        value: 0.0
  v:
    outer:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [160, 160]
  num_frames: 73
seed: 42
