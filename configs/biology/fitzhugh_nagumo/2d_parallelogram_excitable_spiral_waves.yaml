preset: fitzhugh_nagumo
parameters:
  Du:
    sample: uniform
    min: 0.001
    max: 0.00145
  Dv:
    sample: uniform
    min: 0.04
    max: 0.066
  tau:
    sample: uniform
    min: 0.055
    max: 0.11
  b:
    sample: uniform
    min: 0.44
    max: 0.58
  a:
    sample: uniform
    min: -0.03
    max: 0.02
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
    - sample: uniform
      min: 1.9
      max: 2.35
    - 0.0
  axis_y:
    - sample: uniform
      min: 0.38
      max: 0.82
    - sample: uniform
      min: 1.75
      max: 2.25
  mesh_resolution: [192, 192]
time:
  dt: 0.004
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.04
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.72
              max: 0.98
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 2.4
            center:
              - sample: uniform
                min: 0.45
                max: 0.85
              - sample: uniform
                min: 0.35
                max: 0.75
          - count: 1
            amplitude:
              sample: uniform
              min: 0.72
              max: 0.98
            sigma:
              sample: uniform
              min: 0.08
              max: 0.12
            aspect_ratio:
              sample: uniform
              min: 1.1
              max: 2.4
            center:
              - sample: uniform
                min: 1.55
                max: 2.3
              - sample: uniform
                min: 1.05
                max: 1.75
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std:
          sample: uniform
          min: 0.03
          max: 0.055
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 81
seed: 42
