preset: fitzhugh_nagumo
parameters:
  inlet_absorption:
    sample: uniform
    min: 0.08
    max: 0.18
  u_upper_value:
    sample: uniform
    min: 0.72
    max: 0.92
  u_lower_value:
    sample: uniform
    min: 0.72
    max: 0.92
  v_upper_value:
    sample: uniform
    min: -0.12
    max: 0.02
  v_lower_value:
    sample: uniform
    min: -0.12
    max: 0.02
  Du:
    sample: uniform
    min: 0.001
    max: 0.0016
  Dv:
    sample: uniform
    min: 0.032
    max: 0.056
  tau:
    sample: uniform
    min: 0.1
    max: 0.22
  b:
    sample: uniform
    min: 0.52
    max: 0.74
  a:
    sample: uniform
    min: -0.06
    max: 0.01
domain:
  allow_sampling: true
  type: y_bifurcation
  inlet_length:
    sample: uniform
    min: 0.92
    max: 1.08
  branch_length:
    sample: uniform
    min: 0.88
    max: 1.08
  branch_angle_degrees:
    sample: uniform
    min: 34.0
    max: 44.0
  channel_width:
    sample: uniform
    min: 0.18
    max: 0.24
  mesh_size:
    sample: uniform
    min: 0.016
    max: 0.02
time:
  dt: 0.005
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:inlet_absorption
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:u_upper_value
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:u_lower_value
    walls:
      - operator: neumann
        value: 0.0
  v:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:inlet_absorption
    outlet_upper:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:v_upper_value
    outlet_lower:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:v_lower_value
    walls:
      - operator: neumann
        value: 0.0
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
