preset: fitzhugh_nagumo
parameters:
  wall_absorption:
    sample: uniform
    min: 0.06
    max: 0.16
  u_outlet_value:
    sample: uniform
    min: 0.76
    max: 0.95
  v_outlet_value:
    sample: uniform
    min: -0.12
    max: 0.03
  channel_length:
    sample: uniform
    min: 0.92
    max: 1.08
  lane_spacing:
    sample: uniform
    min: 0.38
    max: 0.5
  Du:
    sample: uniform
    min: 0.001
    max: 0.00165
  Dv:
    sample: uniform
    min: 0.03
    max: 0.052
  tau:
    sample: uniform
    min: 0.14
    max: 0.28
  b:
    sample: uniform
    min: 0.58
    max: 0.8
  a:
    sample: uniform
    min: -0.08
    max: 0.0
domain:
  allow_sampling: true
  type: serpentine_channel
  channel_length: param:channel_length
  lane_spacing: param:lane_spacing
  n_bends:
    sample: randint
    min: 2
    max: 4
  channel_width:
    sample: uniform
    min: 0.16
    max: 0.22
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.005
  t_end: 12.0
inputs:
  u:
    initial_condition:
      type: constant
      params:
        value: 0.0
  v:
    initial_condition:
      type: constant
      params:
        value: 0.0
boundary_conditions:
  u:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:u_outlet_value
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
  v:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    outlet:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:v_outlet_value
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [224, 160]
  num_frames: 73
seed: 42
