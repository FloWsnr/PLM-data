preset: fitzhugh_nagumo
parameters:
  wall_absorption:
    sample: uniform
    min: 0.04
    max: 0.1
  u_obstacle_value:
    sample: uniform
    min: 0.78
    max: 0.96
  v_obstacle_value:
    sample: uniform
    min: -0.14
    max: 0.02
  Du:
    sample: uniform
    min: 0.001
    max: 0.0016
  Dv:
    sample: uniform
    min: 0.038
    max: 0.064
  tau:
    sample: uniform
    min: 0.07
    max: 0.14
  b:
    sample: uniform
    min: 0.46
    max: 0.6
  a:
    sample: uniform
    min: -0.03
    max: 0.02
domain:
  allow_sampling: true
  type: channel_obstacle
  length:
    sample: uniform
    min: 2.0
    max: 2.3
  height:
    sample: uniform
    min: 0.96
    max: 1.12
  obstacle_center:
    - sample: uniform
      min: 0.92
      max: 1.1
    - sample: uniform
      min: 0.42
      max: 0.66
  obstacle_radius:
    sample: uniform
    min: 0.12
    max: 0.17
  mesh_size:
    sample: uniform
    min: 0.014
    max: 0.018
time:
  dt: 0.004
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std:
          sample: uniform
          min: 0.01
          max: 0.03
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean: 0.0
        std:
          sample: uniform
          min: 0.01
          max: 0.03
boundary_conditions:
  u:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:u_obstacle_value
  v:
    inlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    outlet:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    walls:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
    obstacle:
      - operator: dirichlet
        value:
          type: constant
          params:
            value: param:v_obstacle_value
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [224, 128]
  num_frames: 61
seed: 42
