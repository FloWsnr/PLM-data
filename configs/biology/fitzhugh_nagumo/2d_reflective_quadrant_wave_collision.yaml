preset: fitzhugh_nagumo
parameters:
  Du:
    sample: uniform
    min: 0.00125
    max: 0.00195
  Dv:
    sample: uniform
    min: 0.026
    max: 0.044
  tau:
    sample: uniform
    min: 0.16
    max: 0.3
  b:
    sample: uniform
    min: 0.6
    max: 0.82
  a:
    sample: uniform
    min: -0.09
    max: -0.015
domain:
  allow_sampling: true
  type: rectangle
  size:
    - sample: uniform
      min: 2.2
      max: 2.8
    - sample: uniform
      min: 1.6
      max: 2.0
  mesh_resolution: [208, 160]
time:
  dt: 0.005
  t_end: 14.0
inputs:
  u:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.85
            max: 1.45
          - sample: uniform
            min: 0.55
            max: 1.25
        region_values:
          "00":
            sample: uniform
            min: 0.82
            max: 1.05
          "01":
            sample: uniform
            min: 0.0
            max: 0.16
          "10":
            sample: uniform
            min: 0.55
            max: 0.84
          "11":
            sample: uniform
            min: -0.15
            max: 0.04
  v:
    initial_condition:
      type: quadrants
      params:
        split:
          - sample: uniform
            min: 0.85
            max: 1.45
          - sample: uniform
            min: 0.55
            max: 1.25
        region_values:
          "00":
            sample: uniform
            min: -0.04
            max: 0.06
          "01":
            sample: uniform
            min: 0.1
            max: 0.24
          "10":
            sample: uniform
            min: -0.15
            max: -0.02
          "11":
            sample: uniform
            min: 0.04
            max: 0.18
boundary_conditions:
  u:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
  v:
    $ref: boundary_field.scalar.homogeneous_neumann_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [208, 160]
  num_frames: 73
seed: 42
