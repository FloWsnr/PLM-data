preset: fitzhugh_nagumo
parameters:
  center_y:
    sample: uniform
    min: -0.04
    max: 0.04
  wall_absorption:
    sample: uniform
    min: 0.05
    max: 0.12
  Du:
    sample: uniform
    min: 0.001
    max: 0.0015
  Dv:
    sample: uniform
    min: 0.042
    max: 0.07
  tau:
    sample: uniform
    min: 0.07
    max: 0.14
  b:
    sample: uniform
    min: 0.46
    max: 0.6
  a:
    sample: uniform
    min: -0.03
    max: 0.02
  v_background:
    sample: uniform
    min: -0.06
    max: 0.0
domain:
  allow_sampling: true
  type: dumbbell
  left_center:
    - sample: uniform
      min: 0.76
      max: 0.94
    - param:center_y
  right_center:
    - sample: uniform
      min: 2.08
      max: 2.32
    - param:center_y
  lobe_radius:
    sample: uniform
    min: 0.5
    max: 0.64
  neck_width:
    sample: uniform
    min: 0.18
    max: 0.26
  mesh_size:
    sample: uniform
    min: 0.012
    max: 0.016
time:
  dt: 0.004
  t_end: 10.0
inputs:
  u:
    initial_condition:
      type: gaussian_blobs
      params:
        background:
          sample: uniform
          min: -0.02
          max: 0.03
        generators:
          - count: 1
            amplitude:
              sample: uniform
              min: 0.64
              max: 0.94
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 0.48
                max: 0.9
              - sample: uniform
                min: -0.18
                max: 0.18
          - count: 1
            amplitude:
              sample: uniform
              min: 0.64
              max: 0.94
            sigma:
              sample: uniform
              min: 0.07
              max: 0.11
            aspect_ratio:
              sample: uniform
              min: 1.0
              max: 2.0
            center:
              - sample: uniform
                min: 2.0
                max: 2.42
              - sample: uniform
                min: -0.18
                max: 0.18
  v:
    initial_condition:
      type: constant
      params:
        value: param:v_background
boundary_conditions:
  u:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
  v:
    outer:
      - operator: robin
        value: 0.0
        operator_parameters:
          alpha: param:wall_absorption
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 128]
  num_frames: 73
seed: 42
