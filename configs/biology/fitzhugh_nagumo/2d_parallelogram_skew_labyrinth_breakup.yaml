preset: fitzhugh_nagumo
parameters:
  Du:
    sample: uniform
    min: 0.0017
    max: 0.0025
  Dv:
    sample: uniform
    min: 0.028
    max: 0.048
  tau:
    sample: uniform
    min: 0.13
    max: 0.22
  b:
    sample: uniform
    min: 0.58
    max: 0.78
  a:
    sample: uniform
    min: -0.06
    max: 0.01
domain:
  allow_sampling: true
  type: parallelogram
  origin: [0.0, 0.0]
  axis_x:
    - sample: uniform
      min: 1.65
      max: 2.1
    - 0.0
  axis_y:
    - sample: uniform
      min: 0.65
      max: 1.05
    - sample: uniform
      min: 1.55
      max: 2.0
  mesh_resolution: [192, 192]
time:
  dt: 0.005
  t_end: 14.0
inputs:
  u:
    initial_condition:
      type: sine_waves
      params:
        background:
          sample: uniform
          min: 0.18
          max: 0.3
        modes:
          - amplitude:
              sample: uniform
              min: 0.35
              max: 0.55
            cycles:
              - sample: uniform
                min: 0.8
                max: 1.3
              - sample: uniform
                min: 1.6
                max: 2.4
            phase:
              sample: uniform
              min: -0.6
              max: 0.6
            angle:
              sample: uniform
              min: 0.35
              max: 1.15
          - amplitude:
              sample: uniform
              min: -0.22
              max: -0.1
            cycles:
              - sample: uniform
                min: 1.5
                max: 2.4
              - sample: uniform
                min: 0.7
                max: 1.3
            phase:
              sample: uniform
              min: 0.2
              max: 1.1
            angle:
              sample: uniform
              min: -0.25
              max: 0.25
  v:
    initial_condition:
      type: gaussian_noise
      params:
        mean:
          sample: uniform
          min: -0.03
          max: 0.03
        std:
          sample: uniform
          min: 0.02
          max: 0.05
boundary_conditions:
  u:
    $ref: boundary_field.scalar.full_periodic_2d
  v:
    $ref: boundary_field.scalar.full_periodic_2d
solver:
  $ref: solver.profile.constant_lhs_scalar_spd
output:
  $ref: output.template.scalar_uv
  formats: [numpy, gif]
  resolution: [192, 192]
  num_frames: 81
seed: 42
